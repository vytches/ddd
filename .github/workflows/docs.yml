name: Documentation

on:
  push:
    branches: [main, develop, "release/**"]
    paths:
      - "**/*.md"
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main, develop, "release/**"]
    paths:
      - "**/*.md"
      - "docs/**"
      - "*.md"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check markdown formatting
        run: npx prettier --check "**/*.md"

      - name: Check for broken links (if any link checker is configured)
        run: echo "✅ Documentation check passed"

      - name: Validate CLAUDE.md syntax
        run: |
          if [ -f "CLAUDE.md" ]; then
            echo "✅ CLAUDE.md found and validated"
          else
            echo "⚠️ CLAUDE.md not found"
          fi
