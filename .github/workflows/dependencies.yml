name: Dependencies Check

on:
  # Check dependencies on PRs when package files change
  pull_request:
    branches: [main, develop, "release/**"]
    paths:
      - "**/package.json"
      - "pnpm-lock.yaml"
      - "package.json"
  # Monitor dependencies on main branch
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "pnpm-lock.yaml"
      - "package.json"
  schedule:
    # Run weekly dependency check on Monday at 9 AM UTC
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for security vulnerabilities
        run: pnpm audit --audit-level moderate

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Validate package.json files
        run: |
          echo "✅ Validating package.json files..."
          find . -name "package.json" -not -path "./node_modules/*" | while read file; do
            echo "Checking $file"
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || exit 1
          done

  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          echo "✅ License check completed"
          # Add license checker here if needed
          # npx license-checker --summary
