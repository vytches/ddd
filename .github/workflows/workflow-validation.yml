name: Workflow Validation

on:
  push:
    branches: [main, develop, "release/**"]
    paths:
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop, "release/**"]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow syntax
        run: |
          echo "✅ Validating GitHub workflow files..."

          # Create a temporary Python script for YAML validation
          cat > validate_yaml.py << 'EOF'
          import yaml
          import sys
          import os

          def validate_file(filepath):
              try:
                  with open(filepath, 'r') as f:
                      yaml.safe_load(f)
                  print(f'✅ {filepath} - Valid YAML')
                  return True
              except yaml.YAMLError as e:
                  print(f'❌ {filepath} - Invalid YAML: {e}')
                  return False

          if __name__ == "__main__":
              filepath = sys.argv[1]
              if not validate_file(filepath):
                  sys.exit(1)
          EOF

          # Validate each workflow file
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              python3 validate_yaml.py "$file"
            fi
          done

          # Clean up
          rm validate_yaml.py

      - name: Check for required permissions
        run: |
          echo "✅ Checking workflow permissions..."
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [ -f "$file" ]; then
              if ! grep -q "permissions:" "$file"; then
                echo "⚠️ $file - Consider adding explicit permissions"
              else
                echo "✅ $file - Has permissions defined"
              fi
            fi
          done
