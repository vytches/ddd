name: CI

# OPTIMIZATION: Context-aware validation per ADR-0018
# - PR: Full validation (JSDoc, Quality Gates, E2E) ~8-15m
# - Main: Quick check (lint, test, build affected only) ~2-3m

on:
  # Only test on PRs - avoid duplicate runs after merge
  pull_request:
    branches: [main, develop, "release/**"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".vscode/**"
      - ".idea/**"
      - "**/.DS_Store"
  # Only run on main for deployment/release purposes
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".vscode/**"
      - ".idea/**"
      - "**/.DS_Store"

permissions:
  contents: read
  actions: read

env:
  NX_CLOUD_DISTRIBUTED_EXECUTION: true
  NX_DAEMON: false

jobs:
  main:
    runs-on: ubuntu-latest
    # Skip CI for documentation-only commits
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[docs only]')"
    strategy:
      matrix:
        # Use Node.js v22.x LTS (Jod) - required for dependency-cruiser styleText feature
        node-version: [22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main
          error-on-no-successful-workflow: false
        continue-on-error: true

      - name: Fallback SHA detection
        if: failure()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "NX_BASE=${{ github.event.before }}" >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Check if formatting needed
        id: check_format
        run: |
          # Check if any source files changed
          if git diff --name-only ${{ env.NX_BASE }}...${{ env.NX_HEAD }} | grep -E '\.(ts|js|jsx|tsx|json|md)$' > /dev/null; then
            echo "skip_format=false" >> $GITHUB_OUTPUT
            echo "Source files changed, checking formatting"
          else
            echo "skip_format=true" >> $GITHUB_OUTPUT
            echo "No source files changed, skipping format check"
          fi

      - name: Check formatting
        if: steps.check_format.outputs.skip_format == 'false'
        run: pnpm format:check

      - name: Lint affected projects
        run: pnpm nx affected --target=lint --parallel=3

      - name: Type check affected projects
        run: pnpm nx affected --target=type-check --parallel=3

      - name: JSDoc validation
        if: github.event_name == 'pull_request'
        run: node scripts/jsdoc-validator.js
        env:
          CI: true

      - name: Test affected projects
        run: pnpm nx affected --target=test --parallel=3 --verbose
        env:
          CI: true

      - name: Build affected projects
        run: pnpm nx affected --target=build --parallel=3

      # Enhanced Metadata System V2 - JSDoc injection
      - name: Inject JSDoc metadata
        if: github.event_name == 'pull_request'
        run: |
          echo "📝 Injecting JSDoc metadata for affected packages..."
          # Get list of affected packages
          AFFECTED_PACKAGES=$(pnpm nx print-affected --target=build --select=projects | tr ',' '\n' | sed 's/@vytches\/ddd-//')

          # Inject JSDoc for each affected package
          for pkg in $AFFECTED_PACKAGES; do
            if [ -d "packages/$pkg" ]; then
              echo "Processing $pkg..."
              node scripts/inject-yaml-jsdoc-ast.js --package=$pkg || true
            fi
          done

          echo "✅ JSDoc injection completed"

      # Verify JSDoc metadata injection
      - name: Verify JSDoc metadata
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Verifying JSDoc metadata injection..."
          node scripts/verify-jsdoc-injection.js --silent || {
            echo "⚠️ JSDoc injection verification failed. Running detailed report..."
            node scripts/comprehensive-jsdoc-report.js
            exit 1
          }

      # Architecture validation - check for circular dependencies
      - name: Check for circular dependencies
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Checking for circular dependencies between packages..."
          npx madge --circular packages/*/src/index.ts 2>&1 | tee circular-check.log
          if grep -q "Found.*circular" circular-check.log; then
            echo "❌ Circular dependencies detected!"
            cat circular-check.log
            exit 1
          else
            echo "✅ No circular dependencies between packages"
          fi

      - name: Check API surface stability
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Checking API surface for breaking changes..."
          pnpm nx build @vytches/ddd-contracts @vytches/ddd-events
          api-extractor run --local --config packages/contracts/api-extractor.json 2>&1 || true
          api-extractor run --local --config packages/events/api-extractor.json 2>&1 || true
          if git diff --name-only | grep -q "api-report"; then
            echo "⚠️ API surface changed! Review api-report/*.api.md diff carefully."
            git diff packages/*/api-report/
          else
            echo "✅ API surface unchanged"
          fi

      - name: Validate module boundaries
        if: github.event_name == 'pull_request'
        run: |
          echo "🔍 Validating module boundaries with dependency-cruiser..."
          pnpm deps:check
          echo "✅ Module boundaries validated successfully"

      - name: Check if quality gates needed
        id: check_gates
        run: |
          # Quality gates only on PRs - quick check on main
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if pnpm nx affected --target=build --dry-run | grep -q "No projects"; then
              echo "skip_gates=true" >> $GITHUB_OUTPUT
              echo "No projects affected, skipping quality gates"
            else
              echo "skip_gates=false" >> $GITHUB_OUTPUT
              echo "Projects affected, running quality gates"
            fi
          else
            echo "skip_gates=true" >> $GITHUB_OUTPUT
            echo "🚀 QUICK CHECK (main): Skipping quality gates (already done in PR)"
          fi

      - name: Run Quality Gates
        if: steps.check_gates.outputs.skip_gates == 'false'
        run: node scripts/quality-gates/quality-gates.js --ci --parallel
        env:
          NODE_ENV: ci

      # Bundle size monitoring
      - name: Check bundle sizes
        if: github.event_name == 'pull_request'
        run: |
          echo "📦 Checking bundle sizes..."
          node scripts/quality-gates/bundle-size-monitor.js --ci 2>&1 | tee bundle-check.log

          # Note: Core package was decomposed into meta-package architecture
          # Foundation packages (domain-primitives, value-objects, repositories, aggregates) 
          # should collectively stay under 200KB as per bundle-limits.json
          FOUNDATION_SIZE=$(grep -E "(domain-primitives|value-objects|repositories|aggregates|contracts)" bundle-check.log | grep -oE '[0-9]+\.[0-9]+KB' | grep -oE '[0-9]+\.[0-9]+' | awk '{sum += $1} END {print sum}' || echo "0")

          # Ensure foundation layer stays under 200KB (meta-package architecture)
          if [ "$(echo "$FOUNDATION_SIZE > 200" | bc 2>/dev/null || echo "0")" -eq 1 ]; then
            echo "❌ Foundation layer bundle size exceeded threshold: ${FOUNDATION_SIZE}KB > 200KB"
            echo "This indicates potential circular dependency issues!"
            exit 1
          else
            echo "✅ Foundation layer bundle size is optimal: ${FOUNDATION_SIZE}KB"
          fi

      # Coverage disabled - use separate workflow if needed
      # - name: Upload coverage to Codecov
      #   if: matrix.node-version == '20.x'
      #   uses: codecov/codecov-action@v3
      #   with:
      #     directory: ./coverage
      #     flags: unittests
      #     name: codecov-umbrella

  e2e:
    runs-on: ubuntu-latest
    needs: main
    # E2E only on PRs for comprehensive validation - skip on main for quick check
    if: github.event_name == 'pull_request' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[docs only]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      # Enhanced Metadata System V2 - JSDoc injection for production
      - name: Inject JSDoc metadata for all packages
        run: ./scripts/inject-jsdoc-all-packages.sh

      - name: Run E2E tests
        run: pnpm nx run-many --target=e2e --all --parallel=1

  security:
    runs-on: ubuntu-latest
    # Run security checks primarily on PRs for early feedback
    if: "github.event_name == 'pull_request' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[docs only]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level moderate

      - name: Check for known vulnerabilities
        run: pnpm nx run-many --target=security-check --all
