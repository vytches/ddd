name: Release

on:
  # Manual releases only - enterprise best practice
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (optional - leave auto for conventional commits)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - hotfix
          - publish-only
  # Tag-based publishing for completed releases
  push:
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".vscode/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  context-detection:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      is_hotfix: ${{ steps.detect.outputs.is_hotfix }}
      is_publish_only: ${{ steps.detect.outputs.is_publish_only }}
      validation_needed: ${{ steps.detect.outputs.validation_needed }}
      validation_mode: ${{ steps.detect.outputs.validation_mode }}
    steps:
      - name: Detect release context
        id: detect
        run: |
          echo "🔍 Analyzing release context..."

          # Publish-only mode - skip validation entirely
          if [[ "${{ github.event.inputs.release_type }}" == "publish-only" ]]; then
            echo "is_hotfix=false" >> $GITHUB_OUTPUT
            echo "is_publish_only=true" >> $GITHUB_OUTPUT
            echo "validation_mode=none" >> $GITHUB_OUTPUT
            echo "validation_needed=false" >> $GITHUB_OUTPUT
            echo "📦 PUBLISH-ONLY MODE: Skipping validation, publishing existing versions"
          # Hotfix detection
          elif [[ "${{ github.ref }}" == *"hotfix"* ]] || [[ "${{ github.event.inputs.release_type }}" == "hotfix" ]]; then
            echo "is_hotfix=true" >> $GITHUB_OUTPUT
            echo "is_publish_only=false" >> $GITHUB_OUTPUT
            echo "validation_mode=quick" >> $GITHUB_OUTPUT
            echo "validation_needed=true" >> $GITHUB_OUTPUT
            echo "🚨 HOTFIX MODE: Using quick validation path"
          else
            echo "is_hotfix=false" >> $GITHUB_OUTPUT
            echo "is_publish_only=false" >> $GITHUB_OUTPUT
            echo "validation_mode=full" >> $GITHUB_OUTPUT
            echo "validation_needed=true" >> $GITHUB_OUTPUT
            echo "🎯 STANDARD RELEASE: Using full validation"
          fi

          echo "📊 Context: release_type=${{ github.event.inputs.release_type }}, branch=${{ github.ref }}"

  validation:
    runs-on: ubuntu-latest
    needs: [context-detection]
    if: needs.context-detection.outputs.validation_needed == 'true'
    env:
      NX_DAEMON: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quick validation (Hotfix)
        if: needs.context-detection.outputs.is_hotfix == 'true'
        run: |
          echo "🚨 HOTFIX MODE: Running essential checks only"
          pnpm test --testNamePattern="(critical|security|hotfix)"
          pnpm lint --fix=false
          pnpm type-check
          echo "✅ Hotfix validation complete"

      - name: Full validation (Standard Release)
        if: needs.context-detection.outputs.is_hotfix == 'false'
        run: |
          echo "🎯 STANDARD RELEASE: Running full validation suite"
          pnpm test
          pnpm lint
          pnpm type-check
          pnpm build
          echo "✅ Full validation complete"

  release:
    runs-on: ubuntu-latest
    needs: [context-detection, validation]
    # Run if: validation succeeded OR publish-only mode (where validation is skipped)
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (needs.context-detection.outputs.is_publish_only == 'true' || needs.validation.result == 'success')
    permissions:
      contents: write
      packages: write
    env:
      NX_DAEMON: false
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v1
        continue-on-error: true
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          installation_id: ${{ secrets.APP_INSTALLATION_ID }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token || secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
          scope: "@vytches"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          if [[ "${{ needs.context-detection.outputs.is_hotfix }}" == "true" ]]; then
            echo "🚨 HOTFIX: Building affected packages only"
            pnpm nx affected --target=build --parallel=3
          else
            echo "🎯 STANDARD: Building all packages"
            pnpm build
          fi

      - name: Check if packages have changes
        id: changes
        if: needs.context-detection.outputs.is_publish_only != 'true'
        run: |
          if pnpm lerna changed; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📦 Found packages with changes"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No packages changed since last release"
          fi

      - name: Configure Git
        if: needs.context-detection.outputs.is_publish_only != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ steps.generate_token.outputs.token || secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Version packages
        if: needs.context-detection.outputs.is_publish_only != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          if [[ "${{ github.event.inputs.release_type }}" == "hotfix" ]]; then
            echo "🚨 HOTFIX: Creating patch version"
            pnpm lerna version patch --conventional-commits --yes
          elif [[ "${{ github.event.inputs.release_type }}" == "auto" || "${{ github.event.inputs.release_type }}" == "" ]]; then
            echo "🤖 AUTO: Using conventional commits detection"
            pnpm lerna version --conventional-commits --yes
          else
            echo "🎯 STANDARD: Creating ${{ github.event.inputs.release_type }} version"
            pnpm lerna version ${{ github.event.inputs.release_type }} --conventional-commits --yes
          fi
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token || secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: needs.context-detection.outputs.is_publish_only == 'true' || steps.changes.outputs.has_changes == 'true'
        run: |
          echo "📦 Publishing packages using pnpm publish (converts workspace:* to versions)..."
          bash scripts/publish-packages.sh
        env:
          REGISTRY: https://registry.npmjs.org
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "🎉 Release workflow completed!"
          echo "📊 Release type: ${{ github.event.inputs.release_type }}"
          echo "🔄 Validation mode: ${{ needs.context-detection.outputs.validation_mode }}"
          if [[ "${{ needs.context-detection.outputs.is_publish_only }}" == "true" ]]; then
            echo "📦 Mode: PUBLISH-ONLY (published from package.json versions)"
          else
            echo "📦 Had changes: ${{ steps.changes.outputs.has_changes }}"
          fi
