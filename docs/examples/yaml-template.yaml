# YAML Metadata Template for Enhanced Metadata System V2
# This file serves as a reference template for creating YAML metadata files
# IMPORTANT: System uses hierarchical inheritance:
# docs/global-settings.yaml → domain/[package]/.md-settings.yaml → [class-name].yaml

# =============================================================================
# GLOBAL SETTINGS TEMPLATE (docs/global-settings.yaml)
# =============================================================================
# Global Settings for VytchesDDD Enhanced Metadata System V2
# This file provides base metadata for ALL packages and classes

# === GLOBAL DEFAULTS ===
author: 'VytchesDDD Team'
since: '1.0.0'
license: 'MIT'
documentation-url: 'https://docs.vytches.com/ddd'
version: '0.5.0'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge' # merge | replace | append
  scope: 'global' # global | package | file | class | method

# === GLOBAL JSDOC PLACEMENT CONFIGURATION ===
jsdoc:
  placement-strategy: 'separate' # separate | constructor-only | class-only | smart
  class-documentation: 'enabled' # enabled | disabled | auto
  constructor-documentation: 'enabled' # enabled | disabled | auto
  content-strategy: 'distinct' # distinct | shared | primary-secondary

  class-defaults:
    description: 'VytchesDDD implementation following enterprise DDD patterns'
    business-context: 'Part of the VytchesDDD library for domain-driven design'
    author: 'VytchesDDD Team'
    since: '1.0.0'

# === FORMAT-SPECIFIC GLOBAL SETTINGS ===
formats:
  jsdoc:
    author: 'VytchesDDD Team'
    license: 'MIT'
  cli:
    detailed-description: |
      ## VytchesDDD Library
      Enterprise-grade Domain-Driven Design patterns

---
# =============================================================================
# PACKAGE SETTINGS TEMPLATE (domain/[package]/.md-settings.yaml)
# =============================================================================
# Package Settings for [PackageName] - Enhanced Metadata System V2
# Inherits from global-settings.yaml and adds package-specific metadata

# === PACKAGE IDENTITY ===
package-name: 'aggregates'
display-name: 'DDD Aggregates'
description: 'Core aggregate patterns for domain modeling'
business-context: 'Essential for maintaining business invariants'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE-SPECIFIC METADATA ===
domain: 'domain-modeling'
complexity: 'intermediate'
patterns:
  - 'aggregate-pattern'
  - 'event-sourcing'

dependencies:
  - '@vytches/ddd-contracts'
  - '@vytches/ddd-domain-primitives'

# === FORMAT-SPECIFIC OVERRIDES ===
formats:
  jsdoc:
    description: 'Core aggregate patterns with event sourcing'
  cli:
    description: |
      ## DDD Aggregates Package

      Core aggregate patterns implementing DDD principles

---
# =============================================================================
# CLASS/FILE METADATA TEMPLATE (domain/[package]/[class-name].yaml)
# =============================================================================
# [ClassName] - Universal Enhanced Metadata System V2
# Documentation ONLY for elements defined in [class-name].d.ts file

# === FILE METADATA ===
file-name: 'aggregate-root'
title: 'AggregateRoot - Enterprise Aggregate Root Implementation'
description: 'Core aggregate root class with event sourcing capabilities'
business-context: 'Main aggregate implementation following DDD principles'

# === GLOBAL HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  AggregateRoot:
    # === CLASS-LEVEL JSDOC CONFIGURATION ===
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'
      constructor-documentation: 'enabled'
      content-strategy: 'distinct'

    # === CLASS-LEVEL DOCUMENTATION ===
    class-doc:
      description: 'Enterprise aggregate root implementation'
      business-context: 'Core building block for domain aggregates'

      # Format-specific overrides
      formats:
        jsdoc:
          description: 'Enterprise aggregate root with event sourcing'
        cli:
          description: |
            ## AggregateRoot - Enterprise Aggregate Pattern

            Complete implementation of the Aggregate Root pattern

      hierarchy:
        strategy: 'append'
        scope: 'class-doc'

      custom-tags:
        since: '1.0.0'
        capabilities: 'Supports extensible capability system'

    # === CLASS HIERARCHY ===
    hierarchy:
      strategy: 'merge'
      scope: 'class'

    # === METHODS ===
    methods:
      # === CONSTRUCTOR ===
      constructor:
        description: 'Creates new aggregate instance'
        business-context: 'Initializes aggregate for domain operations'

        hierarchy:
          strategy: 'replace'
          scope: 'method'

        parameters:
          - name: 'params'
            type: 'IAggregateConstructorParams<TId>'
            description: 'Aggregate construction parameters'
            optional: false

        custom-tags:
          sinceVersion: '0.0.1'

        examples:
          - id: 'basic-construction'
            code: |
              const aggregate = new AggregateRoot({
                id: EntityId.fromText('order-123'),
                version: 0
              });

        # Format-specific overrides
        formats:
          jsdoc:
            business-context: 'Initializes new aggregate for business operations'
          cli:
            description: |
              ### Constructor - New Aggregate Creation

              Creates a new aggregate instance

      # === REGULAR METHOD ===
      commit:
        description: 'Commits pending events and increments version'
        business-context: 'Finalizes business transaction'

        returns:
          type: 'void'
          description: 'Clears pending events and increments version'

        custom-tags:
          warning: 'Clears pending events after commit'
          event-sourcing: "Events become part of aggregate's event history"
          concurrency: 'Version is incremented for optimistic locking'

        examples:
          - id: 'basic-commit'
            code: |
              aggregate.apply('OrderCreated', orderData);
              aggregate.commit();

      # === METHOD WITH PARAMETERS ===
      apply:
        description: 'Applies domain event'
        business-context: 'Records business changes as events'

        parameters:
          - name: 'eventTypeOrEvent'
            type: 'string | IExtendedDomainEvent<P>'
            description: 'Event type or complete event'
            optional: false
          - name: 'payload'
            type: 'P'
            description: 'Event payload'
            optional: true

        returns:
          type: 'void'
          description: 'Modifies aggregate state'

        custom-tags:
          visibility: 'protected'
          generics: 'P - Event payload type'

# === FILE-LEVEL ELEMENTS ===
types:
  ABC:
    description: 'Test type for aggregate'
    business-context: 'Used for testing'
    custom-tags:
      since: '1.0.0'
    examples:
      - id: 'basic-usage'
        code: |
          const testData: ABC = {
            id: 'test-123',
            value: 42
          };

interfaces:
  ITest:
    description: 'Test interface'
    business-context: 'Provides contract for test operations'
    properties:
      - name: 'name'
        type: 'string'
        description: 'Name identifier'
      - name: 'execute'
        type: '() => void'
        description: 'Execution method'

enums:
  IDtype:
    description: 'Identifier types enumeration'
    business-context: 'Valid identifier formats'
    values:
      - name: 'UUID'
        value: "'uuid'"
        description: 'UUID format'
      - name: 'TEXT'
        value: "'text'"
        description: 'Text format'

functions:
  isIdType:
    description: 'Type guard for IDtype'
    business-context: 'Validates identifier types'
    parameters:
      - name: 'value'
        type: 'string'
        description: 'Value to check'
    returns:
      type: 'value is keyof typeof IDtype'
      description: 'Type predicate'

# === IMPORTED REFERENCES (Optional) ===
imported:
  interfaces:
    - name: 'IAggregateRoot'
      from: '../aggregate-interfaces'
      description: 'Contract for aggregate roots'

# === ENVIRONMENT-SPECIFIC SETTINGS ===
environment:
  VYTCHES_LOGGER:
    custom-tags:
      logging: 'Structured logging enabled'
