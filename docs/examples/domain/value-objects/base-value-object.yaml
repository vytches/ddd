# BaseValueObject - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'base-value-object'
title: 'BaseValueObject - Enterprise Value Object Base Class'
description: 'Abstract base class for all value objects with validation and comparison'
business-context: 'Foundation for all value objects in the domain model'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ValueObjectValidator:
    description: 'Contract for value object validation functionality'
    business-context: 'Ensures consistent validation across all value objects'

    generic-parameters:
      - name: 'T'
        description: 'Type of value being validated'

    methods:
      validate:
        description: 'Validates a value according to value object rules'
        business-context: 'Core validation method for ensuring data integrity'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Value to validate'
            required: true

        returns:
          type: 'boolean'
          description: 'True if value is valid, false otherwise'

        examples:
          - id: 'basic-validation'
            code: |
              class EmailValidator implements ValueObjectValidator<string> {
                validate(value: string): boolean {
                  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
                }
              }

# === CLASSES ===
classes:
  BaseValueObject:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class providing common value object functionality'
      business-context: 'Foundation for creating immutable, comparable value objects'

      # Format-specific
      formats:
        jsdoc:
          description: 'Base class for value objects with validation'
        cli:
          description: |
            ## BaseValueObject

            Abstract base class that provides fundamental value object behavior including
            equality comparison, string representation, and validation contracts.

      hierarchy:
        strategy: 'append'
        scope: 'class-doc'

      custom-tags:
        since: '1.0.0'
        abstract: 'true'
        generic-parameters: 'T - The type of the underlying value'

    # === CLASS HIERARCHY ===
    hierarchy:
      strategy: 'merge'
      scope: 'class'

    # Methods
    methods:
      constructor:
        description: 'Creates a new value object with the specified value'
        business-context: 'Initializes value object with immutable value'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'The underlying value to store'
            required: true

        examples:
          - id: 'constructor-basic'
            code: |
              class EmailAddress extends BaseValueObject<string> {
                constructor(email: string) {
                  super(email);
                }
                
                validate(value: unknown): boolean {
                  return typeof value === 'string' && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
                }
              }

              const email = new EmailAddress('user@example.com');

      equals:
        description: 'Compares this value object with another for equality'
        business-context: 'Enables value-based equality instead of reference equality'

        parameters:
          - name: 'valueObject'
            type: 'BaseValueObject<T>'
            description: 'The value object to compare with'
            required: true

        returns:
          type: 'boolean'
          description: 'True if values are equal, false otherwise'

        examples:
          - id: 'equals-comparison'
            code: |
              const email1 = new EmailAddress('user@example.com');
              const email2 = new EmailAddress('user@example.com');
              const email3 = new EmailAddress('other@example.com');

              console.log(email1.equals(email2)); // true - same value
              console.log(email1.equals(email3)); // false - different value

      toString:
        description: 'Returns a string representation of the value object'
        business-context: 'Provides readable string format for logging and display'

        returns:
          type: 'string'
          description: 'String representation of the underlying value'

        examples:
          - id: 'toString-basic'
            code: |
              const email = new EmailAddress('user@example.com');
              console.log(email.toString()); // "user@example.com"

      toJSON:
        description: 'Returns a JSON representation of the value object'
        business-context: 'Enables serialization for storage and transport'

        returns:
          type: 'string'
          description: 'JSON string representation of the value'

        examples:
          - id: 'toJSON-serialization'
            code: |
              const email = new EmailAddress('user@example.com');
              console.log(email.toJSON()); // '"user@example.com"'

              // Use in JSON serialization
              const user = { id: 1, email };
              console.log(JSON.stringify(user)); // {"id":1,"email":"user@example.com"}

      getValue:
        description: 'Gets the underlying value stored in the value object'
        business-context: 'Provides access to the wrapped value when needed'

        returns:
          type: 'T'
          description: 'The underlying value'

        examples:
          - id: 'getValue-access'
            code: |
              const email = new EmailAddress('user@example.com');
              const rawValue = email.getValue(); // "user@example.com"

              // Use raw value for external APIs
              await externalService.updateEmail(rawValue);

      validate:
        description: 'Abstract method that must be implemented to validate values'
        business-context: 'Enforces domain-specific validation rules'

        parameters:
          - name: 'value'
            type: 'unknown'
            description: 'Value to validate'
            required: true

        returns:
          type: 'boolean'
          description: 'True if value passes validation, false otherwise'

        custom-tags:
          abstract: 'true'

        examples:
          - id: 'validate-implementation'
            code: |
              class Price extends BaseValueObject<number> {
                validate(value: unknown): boolean {
                  return typeof value === 'number' && value >= 0;
                }
              }

              class ProductCode extends BaseValueObject<string> {
                validate(value: unknown): boolean {
                  return typeof value === 'string' && 
                         value.length >= 3 && 
                         value.length <= 20 &&
                         /^[A-Z0-9-]+$/.test(value);
                }
              }
