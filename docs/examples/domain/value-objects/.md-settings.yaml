# Package Settings - Enhanced Metadata System V2
# Inherits from docs/global-settings.yaml

# === PACKAGE IDENTITY ===
package-name: 'value-objects'
display-name: 'DDD Value Objects'
description: 'Core value object implementations with enhanced validation'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'domain-modeling'
complexity: 'intermediate'
patterns:
  - 'value-object-pattern'
  - 'entity-id-pattern'
  - 'validation-pattern'

# === BUSINESS CONTEXT ===
business-context: |
  Value objects are fundamental building blocks in Domain-Driven Design that represent 
  descriptive aspects of the domain with no conceptual identity. This package provides 
  enterprise-grade value object implementations with enhanced validation and factory patterns.

# === DEPENDENCIES ===
dependencies:
  - '@vytches/ddd-contracts'
  - '@vytches/ddd-utils'
  - '@vytches/ddd-domain-primitives'

# === FORMAT-SPECIFIC OVERRIDES ===
formats:
  jsdoc:
    description: 'Value object implementations with validation'
    business-context: 'DDD value objects for identity and validation'
  cli:
    description: |
      ## Value Objects Package

      Enterprise-grade value object implementations providing:
      - Base value object functionality with equality comparison
      - Enhanced EntityId with LibUtils validation
      - Factory patterns for consistent object creation
      - Type-safe validation for UUID, integer, bigint, and text identifiers
    business-context: |
      Value objects eliminate primitive obsession and provide type safety in domain models.
      Essential for creating robust, validated domain entities with proper identity management.

# === PACKAGE STRUCTURE ===
main-exports:
  - 'BaseValueObject'
  - 'ValueObjectValidator'
  - 'EntityId'
  - 'EntityIdFactory'
  - 'IEntityId'
  - 'IEntityIdFactory'
  - 'IdType'
