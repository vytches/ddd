# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Central export hub for all event system contracts'
  business-context: 'Foundation for event-driven architecture and event sourcing patterns'

  formats:
    jsdoc:
      description: 'Event system contracts and interfaces'
    cli:
      description: |
        ## Event System Contracts Exports

        Complete event system including:
        - Domain event interfaces
        - Event bus contracts
        - Event dispatcher interfaces
        - Event persistence handlers
        - Event replay mechanisms
        - Event store contracts (basic and advanced)
        - Event utilities

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'event-system'
    pattern: 'event-driven-architecture'

