# Event Store Interfaces - Foundation Layer Event Storage Contracts
# Core event store interface definitions for event persistence

# === FILE METADATA ===
file-name: 'event-store.interfaces'
title: 'Event Store Interfaces - Event Persistence Contracts'
description: 'Core interface definitions for event store operations including event persistence, retrieval, and audit capabilities'
business-context: 'Provides standardized contracts for event sourcing persistence enabling reliable event storage and replay'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IEventUpcaster:
    description: 'Interface contract for event payload transformation between versions'
    business-context: 'Enables event schema evolution by transforming events from old formats to new formats during event replay'

    formats:
      jsdoc:
        description: 'Event upcaster for schema evolution'
        business-context: 'Event versioning and migration support'
      cli:
        description: |
          ## IEventUpcaster Interface

          Event schema transformation:

          **Schema Evolution:**
          - Transform old event payloads to new format
          - Preserve event semantics across versions
          - Enable backward compatibility
          - Support gradual migration

          **Use Cases:**
          - Field renaming in events
          - Data structure changes
          - Business rule evolution
          - System modernization

    generic-parameters:
      - name: 'TInput'
        description: 'Type of the source event payload'
        default: 'unknown'
      - name: 'TOutput'
        description: 'Type of the target event payload'
        default: 'unknown'

    methods:
      upcast:
        description: 'Transforms an event payload from source version to target version'
        business-context: 'Performs schema migration preserving business meaning while updating data structure'

        parameters:
          - name: 'payload'
            type: 'TInput'
            description: 'Source event payload to transform'
          - name: 'metadata'
            type: 'IEventMetadata'
            description: 'Optional event metadata for transformation context'
            optional: true

        returns:
          type: 'TOutput'
          description: 'Transformed event payload in target format'

        examples:
          - id: 'field-rename-upcaster'
            code: |
              // Upcaster for field renaming
              class CustomerEventUpcaster implements IEventUpcaster<OldCustomerEvent, NewCustomerEvent> {
                upcast(payload: OldCustomerEvent, metadata?: IEventMetadata): NewCustomerEvent {
                  return {
                    customerId: payload.userId, // Field renamed
                    customerName: payload.name,
                    email: payload.email,
                    // Add new field with default
                    customerType: 'standard',
                    // Preserve metadata
                    _version: metadata?.eventVersion || 1
                  };
                }
              }

          - id: 'structure-change-upcaster'
            code: |
              // Upcaster for structure changes
              class OrderEventUpcaster implements IEventUpcaster<OldOrderPayload, NewOrderPayload> {
                upcast(payload: OldOrderPayload): NewOrderPayload {
                  return {
                    orderId: payload.id,
                    // Flatten nested structure
                    customerInfo: {
                      id: payload.customer.customerId,
                      name: payload.customer.name
                    },
                    // Convert array to structured items
                    items: payload.products.map(p => ({
                      productId: p.id,
                      quantity: p.qty,
                      price: p.cost
                    }))
                  };
                }
              }

  IAuditEvent:
    description: 'Interface defining comprehensive audit event structure'
    business-context: 'Provides complete audit trail information for compliance and debugging purposes'

    formats:
      jsdoc:
        description: 'Comprehensive audit event structure'
        business-context: 'Complete audit trail for compliance'
      cli:
        description: |
          ## IAuditEvent Interface

          Comprehensive audit event information:

          **Audit Fields:**
          - Event identification and timing
          - Aggregate context and versioning
          - Actor information for accountability
          - Previous state for change tracking

          **Compliance Benefits:**
          - Complete change audit trail
          - Actor accountability tracking
          - State change documentation
          - Regulatory compliance support

    properties:
      - name: 'eventId'
        type: 'string'
        description: 'Unique identifier for the audit event'
        business-context: 'Enables event deduplication and tracking'

      - name: 'timestamp'
        type: 'Date'
        description: 'When the audited event occurred'
        business-context: 'Provides temporal context for audit trail'

      - name: 'aggregateId'
        type: 'unknown'
        description: 'Identifier of the aggregate that generated the event'
        business-context: 'Links audit event to source aggregate'

      - name: 'aggregateType'
        type: 'string'
        description: 'Type of the aggregate that generated the event'
        business-context: 'Enables aggregate-specific audit analysis'

      - name: 'aggregateVersion'
        type: 'number'
        description: 'Version of the aggregate when the event occurred'
        business-context: 'Provides aggregate state context for audit'

      - name: 'eventType'
        type: 'string'
        description: 'Type of the domain event being audited'
        business-context: 'Categorizes audit events by business operation'

      - name: 'payload'
        type: 'unknown'
        description: 'Event payload data for audit purposes'
        business-context: 'Contains business data for audit analysis'
        optional: true

      - name: 'metadata'
        type: 'IEventMetadata'
        description: 'Event metadata including correlation information'
        business-context: 'Provides additional audit context and traceability'
        optional: true

      - name: 'actor'
        type: 'unknown'
        description: 'Actor who performed the action that led to this event'
        business-context: 'Provides accountability and security audit trail'
        optional: true

      - name: 'previousState'
        type: 'unknown'
        description: 'Previous state before the event for change tracking'
        business-context: 'Enables before/after analysis for audit compliance'
        optional: true

  IEventStore:
    description: 'Core interface contract for event store persistence operations'
    business-context: 'Standardizes event sourcing persistence enabling reliable event storage, retrieval, and replay capabilities'

    formats:
      jsdoc:
        description: 'Event store persistence interface'
        business-context: 'Event sourcing persistence and retrieval'
      cli:
        description: |
          ## IEventStore Interface

          Core event sourcing persistence:

          **Storage Operations:**
          - Event persistence with optimistic concurrency
          - Event retrieval by aggregate ID
          - Version-based event filtering
          - Aggregate event stream management

          **Event Sourcing Benefits:**
          - Complete aggregate history
          - Point-in-time state reconstruction
          - Audit trail preservation
          - Event replay capabilities

    methods:
      getEvents:
        description: 'Retrieves all events for a specific aggregate'
        business-context: 'Loads complete event history for aggregate state reconstruction and analysis'

        parameters:
          - name: 'aggregateId'
            type: 'unknown'
            description: 'Identifier of the aggregate to load events for'

        returns:
          type: 'Promise<IExtendedDomainEvent[]>'
          description: 'Promise resolving to array of events ordered by version'

        examples:
          - id: 'load-aggregate-events'
            code: |
              // Load all events for aggregate reconstruction
              const aggregateId = EntityId.fromText('order-123');
              const events = await eventStore.getEvents(aggregateId);

              // Reconstruct aggregate from events
              const order = new OrderAggregate();
              order.loadFromHistory(events);

              console.log(`Loaded ${events.length} events for aggregate`);

      saveEvents:
        description: 'Persists events for an aggregate with optimistic concurrency control'
        business-context: 'Stores new events while preventing concurrent modification conflicts through version checking'

        parameters:
          - name: 'aggregateId'
            type: 'unknown'
            description: 'Identifier of the aggregate the events belong to'
          - name: 'events'
            type: 'IExtendedDomainEvent[]'
            description: 'Array of events to persist'
          - name: 'expectedVersion'
            type: 'number'
            description: 'Expected current version for optimistic concurrency control'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when events are persisted'

        throws:
          - type: 'ConcurrencyError'
            description: "When expected version doesn't match current version"

        examples:
          - id: 'save-aggregate-events'
            code: |
              // Save events with concurrency control
              const aggregateId = EntityId.fromText('order-123');
              const newEvents = aggregate.getDomainEvents();
              const expectedVersion = aggregate.getVersion();

              try {
                await eventStore.saveEvents(aggregateId, newEvents, expectedVersion);
                aggregate.commit(); // Clear events after successful save
              } catch (error) {
                if (error instanceof ConcurrencyError) {
                  // Handle concurrent modification
                  throw new Error('Aggregate was modified by another process');
                }
                throw error;
              }

      getEventsAfterVersion:
        description: 'Retrieves events that occurred after a specific aggregate version'
        business-context: 'Enables incremental event loading and delta synchronization for performance optimization'

        parameters:
          - name: 'aggregateId'
            type: 'unknown'
            description: 'Identifier of the aggregate to load events for'
          - name: 'version'
            type: 'number'
            description: 'Version number to start loading events after'

        returns:
          type: 'Promise<IExtendedDomainEvent[]>'
          description: 'Promise resolving to events after the specified version'

        examples:
          - id: 'incremental-event-loading'
            code: |
              // Load only new events since last snapshot
              const aggregateId = EntityId.fromText('order-123');
              const lastSnapshotVersion = 10;

              // Load only events after the snapshot
              const newEvents = await eventStore.getEventsAfterVersion(
                aggregateId, 
                lastSnapshotVersion
              );

              // Apply only new events to snapshot-restored aggregate
              newEvents.forEach(event => aggregate.apply(event));

              console.log(`Applied ${newEvents.length} incremental events`);

        custom-tags:
          performance-optimization: 'true'
          incremental-loading: 'true'
