# Event Dispatcher Interface - Foundation Layer Event Dispatch Contracts
# Core event dispatcher interface definitions for event processing and middleware

# === FILE METADATA ===
file-name: 'event-dispatcher.interface'
title: 'Event Dispatcher Interface - Event Processing Foundation'
description: 'Core interface definitions for event dispatching with middleware support and aggregate event processing'
business-context: 'Provides standardized contracts for event dispatching enabling organized event processing pipelines'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  EventMiddleware:
    description: 'Type definition for event processing middleware functions'
    business-context: 'Enables composable event processing pipeline with cross-cutting concerns like logging and validation'

    formats:
      jsdoc:
        description: 'Event middleware function type for processing pipeline'
      cli:
        description: |
          ## EventMiddleware Type

          Function type for event processing middleware:

          **Pipeline Pattern:**
          - Receives event and next function
          - Can transform, validate, or log events
          - Must call next() to continue pipeline
          - Async processing support

          **Common Applications:**
          - Event validation and sanitization
          - Audit logging and metrics
          - Error handling and retry logic
          - Performance monitoring

    function-signature:
      parameters:
        - name: 'event'
          type: 'IDomainEvent'
          description: 'Event being processed'
        - name: 'next'
          type: '(event: IDomainEvent) => Promise<void>'
          description: 'Function to continue pipeline processing'
      returns:
        type: 'Promise<void>'
        description: 'Promise that resolves when middleware completes'

    examples:
      - id: 'validation-middleware'
        code: |
          // Event validation middleware
          const validateEvent: EventMiddleware = async (event, next) => {
            if (!event.eventType) {
              throw new Error('Event type is required');
            }
            
            if (!event.payload) {
              throw new Error('Event payload is required');
            }
            
            await next(event);
          };

      - id: 'logging-middleware'
        code: |
          // Audit logging middleware
          const auditMiddleware: EventMiddleware = async (event, next) => {
            console.log(`Processing event: ${event.eventType}`);
            
            try {
              await next(event);
              console.log(`Event processed successfully: ${event.eventType}`);
            } catch (error) {
              console.error(`Event processing failed: ${event.eventType}`, error);
              throw error;
            }
          };

# === INTERFACES ===
interfaces:
  IEventProcessor:
    description: 'Interface contract for event processors that handle specific event types'
    business-context: 'Enables modular event processing by defining processors for specific event types with capability checking'

    formats:
      jsdoc:
        description: 'Event processor interface with capability checking'
        business-context: 'Modular event processing for specific event types'
      cli:
        description: |
          ## IEventProcessor Interface

          Contract for specialized event processors:

          **Core Responsibilities:**
          - Process specific types of events
          - Determine processing capability
          - Handle event-specific business logic

          **Architecture Benefits:**
          - Separation of concerns
          - Pluggable event processing
          - Type-specific optimization
          - Conditional processing support

    methods:
      process:
        description: 'Processes a domain event according to processor-specific logic'
        business-context: 'Executes domain-specific business logic for the event type this processor handles'

        parameters:
          - name: 'event'
            type: 'IDomainEvent'
            description: 'Domain event to process'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when processing completes'

        examples:
          - id: 'order-event-processor'
            code: |
              // Order-specific event processor
              class OrderEventProcessor implements IEventProcessor {
                async process(event: IDomainEvent): Promise<void> {
                  switch (event.eventType) {
                    case 'OrderCreated':
                      await this.handleOrderCreated(event);
                      break;
                    case 'OrderUpdated':
                      await this.handleOrderUpdated(event);
                      break;
                    default:
                      throw new Error(`Unsupported event type: ${event.eventType}`);
                  }
                }
                
                canProcess(event: IDomainEvent): boolean {
                  return ['OrderCreated', 'OrderUpdated'].includes(event.eventType);
                }
              }

      canProcess:
        description: 'Determines if this processor can handle the given event'
        business-context: 'Enables conditional processing and proper event routing to appropriate processors'

        parameters:
          - name: 'event'
            type: 'IDomainEvent'
            description: 'Event to check processing capability for'

        returns:
          type: 'boolean'
          description: 'True if processor can handle this event type'

        examples:
          - id: 'can-process-check'
            code: |
              // Check processing capability
              const processor = new OrderEventProcessor();

              const orderEvent = createDomainEvent('OrderCreated', {});
              const userEvent = createDomainEvent('UserRegistered', {});

              console.log(processor.canProcess(orderEvent)); // true
              console.log(processor.canProcess(userEvent)); // false

# === CLASSES ===
classes:
  IEventDispatcher:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class for event dispatching with aggregate support'
      business-context: 'Provides foundation for event dispatching enabling aggregate event management and batch event processing'

      formats:
        jsdoc:
          description: 'Abstract event dispatcher with aggregate event support'
          business-context: 'Event dispatching foundation for aggregates'
        cli:
          description: |
            ## IEventDispatcher Abstract Class

            Foundation for event dispatching:

            **Core Capabilities:**
            - Aggregate event dispatching with auto-commit
            - Single and batch event processing
            - Abstract contract for implementations

            **Aggregate Integration:**
            - Automatic event extraction from aggregates
            - Event commit after successful dispatch
            - Batch processing optimization

      custom-tags:
        since: '1.0.0'
        pattern: 'dispatcher-pattern'
        abstract: 'true'

    # Abstract Methods
    methods:
      dispatchEventsForAggregate:
        description: 'Dispatches all events from an aggregate and clears them'
        business-context: 'Streamlines aggregate event processing by automatically extracting, dispatching, and committing events'
        abstract: true

        parameters:
          - name: 'aggregate'
            type: 'IAggregateWithEvents'
            description: 'Aggregate containing events to dispatch'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when all events are dispatched'

        examples:
          - id: 'dispatch-aggregate-events'
            code: |
              // Process aggregate events
              const order = new OrderAggregate();
              order.processOrder(orderData);

              // Dispatch all pending events and commit
              await eventDispatcher.dispatchEventsForAggregate(order);

              // Aggregate events are now cleared
              console.log(order.hasChanges()); // false

        custom-tags:
          aggregate-integration: 'true'
          auto-commit: 'true'

      dispatchEvent:
        description: 'Dispatches a single domain event'
        business-context: 'Processes individual events through the dispatcher pipeline'
        abstract: true

        parameters:
          - name: 'event'
            type: 'IDomainEvent'
            description: 'Event to dispatch'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when event is dispatched'

        examples:
          - id: 'dispatch-single-event'
            code: |
              // Dispatch individual event
              const event = createDomainEvent('OrderCreated', orderData);
              await eventDispatcher.dispatchEvent(event);

        custom-tags:
          single-event: 'true'

      dispatchEvents:
        description: 'Dispatches multiple domain events'
        business-context: 'Enables batch event processing for efficient multi-event operations'
        abstract: true

        parameters:
          - name: 'events'
            type: 'IDomainEvent[]'
            description: 'Events to dispatch (spread parameter)'
            spread: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when all events are dispatched'

        examples:
          - id: 'dispatch-multiple-events'
            code: |
              // Dispatch multiple events
              const events = [
                createDomainEvent('OrderCreated', orderData),
                createDomainEvent('InventoryReserved', inventoryData),
                createDomainEvent('PaymentProcessed', paymentData)
              ];

              await eventDispatcher.dispatchEvents(...events);

        custom-tags:
          batch-processing: 'true'
          spread-parameter: 'true'

  IEnhancedEventDispatcher:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enhanced event dispatcher with middleware and processor support'
      business-context: 'Extends basic dispatching with middleware pipeline and pluggable processors for advanced event processing'

      formats:
        jsdoc:
          description: 'Enhanced dispatcher with middleware and processor support'
          business-context: 'Advanced event processing with extensible pipeline'
        cli:
          description: |
            ## IEnhancedEventDispatcher Abstract Class

            Advanced event dispatching capabilities:

            **Enhanced Features:**
            - Middleware pipeline for cross-cutting concerns
            - Pluggable event processors
            - Fluent configuration API
            - Extended processing capabilities

            **Enterprise Benefits:**
            - Composable event processing
            - Separation of concerns
            - Extensible architecture

      custom-tags:
        since: '1.0.0'
        extends: 'IEventDispatcher'
        enhanced: 'true'

    extends:
      - 'IEventDispatcher'

    # Abstract Methods
    methods:
      use:
        description: 'Adds middleware to the event processing pipeline'
        business-context: 'Enables cross-cutting concerns like logging, validation, and transformation in the event pipeline'
        abstract: true

        parameters:
          - name: 'middleware'
            type: 'EventMiddleware'
            description: 'Middleware function to add to pipeline'

        returns:
          type: 'this'
          description: 'Dispatcher instance for method chaining'

        examples:
          - id: 'add-middleware'
            code: |
              // Configure dispatcher with middleware
              const dispatcher = new ConcreteEnhancedEventDispatcher()
                .use(validationMiddleware)
                .use(auditMiddleware)
                .use(metricsMiddleware);

              // Middleware will process events in order
              await dispatcher.dispatchEvent(event);

        custom-tags:
          fluent-api: 'true'
          middleware-pipeline: 'true'

      registerProcessor:
        description: 'Registers an event processor for handling specific event types'
        business-context: 'Enables modular event processing by registering specialized processors for different event types'
        abstract: true

        parameters:
          - name: 'processor'
            type: 'IEventProcessor'
            description: 'Event processor to register'

        returns:
          type: 'this'
          description: 'Dispatcher instance for method chaining'

        examples:
          - id: 'register-processor'
            code: |
              // Register specialized processors
              const dispatcher = new ConcreteEnhancedEventDispatcher()
                .registerProcessor(new OrderEventProcessor())
                .registerProcessor(new InventoryEventProcessor())
                .registerProcessor(new PaymentEventProcessor());

              // Events will be routed to appropriate processors

        custom-tags:
          fluent-api: 'true'
          modular-processing: 'true'
