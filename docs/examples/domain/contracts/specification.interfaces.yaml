# Specification Interfaces - Foundation Layer Validation Contracts
# Core specification interface definitions for domain validation

# === FILE METADATA ===
file-name: 'specification.interfaces'
title: 'Specification Interfaces - Domain Validation Contracts'
description: 'Core interface definitions for specification pattern implementation enabling composable domain validation'
business-context: 'Provides standardized contracts for business rule validation using specification pattern with combinatorial logic'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ISpecification:
    description: 'Core interface contract for specification pattern implementation'
    business-context: 'Enables composable business rule validation with boolean logic operations for complex domain constraints'

    formats:
      jsdoc:
        description: 'Specification interface with combinatorial operations'
        business-context: 'Composable business rule validation'
      cli:
        description: |
          ## ISpecification Interface

          Foundation for specification pattern:

          **Core Capabilities:**
          - Boolean satisfaction checking
          - Combinatorial logic (AND, OR, NOT)
          - Optional naming and debugging support
          - Failure explanation mechanism

          **Business Rule Examples:**
          - Customer eligibility validation
          - Order processing constraints
          - Product availability checks
          - Discount application rules

          **Composability Benefits:**
          - Complex rules from simple specifications
          - Reusable business logic components
          - Testable validation units

    generic-parameters:
      - name: 'T'
        description: 'Type of entity or value object to validate'

    methods:
      isSatisfiedBy:
        description: 'Evaluates if the candidate satisfies this specification'
        business-context: 'Core validation method that determines if business rule is met by the candidate entity'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity or value to validate against specification'

        returns:
          type: 'boolean'
          description: 'True if candidate satisfies the specification'

        examples:
          - id: 'basic-satisfaction'
            code: |
              // Customer age specification
              class MinimumAgeSpecification implements ISpecification<Customer> {
                constructor(private minAge: number) {}
                
                isSatisfiedBy(customer: Customer): boolean {
                  return customer.age >= this.minAge;
                }
              }

              const ageSpec = new MinimumAgeSpecification(18);
              const customer = new Customer({ age: 25 });

              console.log(ageSpec.isSatisfiedBy(customer)); // true

      and:
        description: 'Combines this specification with another using AND logic'
        business-context: 'Creates composite specifications where both conditions must be satisfied'

        parameters:
          - name: 'other'
            type: 'ISpecification<T>'
            description: 'Specification to combine with using AND logic'

        returns:
          type: 'ISpecification<T>'
          description: 'New specification requiring both conditions'

        examples:
          - id: 'and-combination'
            code: |
              // Combine multiple specifications
              const ageSpec = new MinimumAgeSpecification(18);
              const creditSpec = new MinimumCreditScoreSpecification(650);

              // Customer must be 18+ AND have credit score 650+
              const loanEligibility = ageSpec.and(creditSpec);

              console.log(loanEligibility.isSatisfiedBy(customer));

      or:
        description: 'Combines this specification with another using OR logic'
        business-context: 'Creates composite specifications where either condition can be satisfied'

        parameters:
          - name: 'other'
            type: 'ISpecification<T>'
            description: 'Specification to combine with using OR logic'

        returns:
          type: 'ISpecification<T>'
          description: 'New specification requiring either condition'

        examples:
          - id: 'or-combination'
            code: |
              // Alternative qualification paths
              const highIncomeSpec = new MinimumIncomeSpecification(100000);
              const collateralSpec = new HasCollateralSpecification();

              // Customer needs high income OR collateral
              const alternativeQualification = highIncomeSpec.or(collateralSpec);

              console.log(alternativeQualification.isSatisfiedBy(customer));

      not:
        description: 'Creates a negated version of this specification'
        business-context: 'Inverts the specification logic for exclusion-based business rules'

        returns:
          type: 'ISpecification<T>'
          description: 'New specification with inverted logic'

        examples:
          - id: 'not-combination'
            code: |
              // Exclude blacklisted customers
              const blacklistSpec = new BlacklistedCustomerSpecification();
              const eligibleSpec = blacklistSpec.not();

              // Customer must NOT be blacklisted
              console.log(eligibleSpec.isSatisfiedBy(customer));

              // Complex negation
              const restrictedSpec = ageSpec.and(creditSpec).not();
              // NOT (age >= 18 AND credit >= 650)

      explainFailure:
        description: 'Optional method to explain why the specification failed'
        business-context: 'Provides human-readable feedback for business rule violations to aid debugging and user feedback'
        optional: true

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity that failed the specification'

        returns:
          type: 'string | null'
          description: 'Explanation of failure or null if not implemented'

        examples:
          - id: 'explain-failure'
            code: |
              // Specification with failure explanation
              class MinimumAgeSpecification implements ISpecification<Customer> {
                explainFailure(customer: Customer): string | null {
                  if (customer.age < this.minAge) {
                    return `Customer age ${customer.age} is below minimum required age of ${this.minAge}`;
                  }
                  return null;
                }
              }

              const spec = new MinimumAgeSpecification(18);
              const youngCustomer = new Customer({ age: 16 });

              if (!spec.isSatisfiedBy(youngCustomer)) {
                console.log(spec.explainFailure(youngCustomer));
                // "Customer age 16 is below minimum required age of 18"
              }

    properties:
      - name: 'name'
        type: 'string'
        description: 'Optional name for debugging and logging purposes'
        business-context: 'Enables specification identification in logs and debugging scenarios'
        optional: true
        readonly: true

      - name: 'description'
        type: 'string'
        description: 'Optional description for debugging and logging purposes'
        business-context: 'Provides human-readable explanation of the business rule'
        optional: true
        readonly: true

  IAsyncSpecification:
    description: 'Interface contract for asynchronous specification pattern implementation'
    business-context: 'Enables composable business rule validation with external dependencies like databases or web services'

    formats:
      jsdoc:
        description: 'Async specification interface with context support'
        business-context: 'Async business rule validation with external dependencies'
      cli:
        description: |
          ## IAsyncSpecification Interface

          Asynchronous specification pattern:

          **Async Capabilities:**
          - Database query validation
          - Web service integration
          - Complex calculation rules
          - Context-aware evaluation

          **Use Cases:**
          - Credit check validation
          - Inventory availability checking
          - Duplicate detection rules
          - External system integration

          **Context Support:**
          - User context for permissions
          - Tenant context for multi-tenancy
          - Environmental configuration

    generic-parameters:
      - name: 'T'
        description: 'Type of entity or value object to validate'

    methods:
      isSatisfiedByAsync:
        description: 'Asynchronously evaluates if the candidate satisfies this specification'
        business-context: 'Core async validation method for rules requiring external data or complex computations'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity or value to validate against specification'
          - name: 'context'
            type: 'Record<string, unknown>'
            description: 'Optional context for evaluation (user, tenant, environment)'
            optional: true

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true if candidate satisfies specification'

        examples:
          - id: 'async-credit-check'
            code: |
              // Async credit verification
              class CreditCheckSpecification implements IAsyncSpecification<Customer> {
                constructor(private creditService: CreditService) {}
                
                async isSatisfiedByAsync(
                  customer: Customer,
                  context?: Record<string, unknown>
                ): Promise<boolean> {
                  const creditScore = await this.creditService.getScore(customer.ssn);
                  return creditScore >= 650;
                }
              }

              const creditSpec = new CreditCheckSpecification(creditService);
              const isEligible = await creditSpec.isSatisfiedByAsync(customer);

          - id: 'context-aware-validation'
            code: |
              // Context-aware specification
              class TenantSpecificDiscountSpecification implements IAsyncSpecification<Order> {
                async isSatisfiedByAsync(
                  order: Order,
                  context?: Record<string, unknown>
                ): Promise<boolean> {
                  const tenantId = context?.tenantId as string;
                  const tenantRules = await this.getRulesForTenant(tenantId);
                  return order.amount >= tenantRules.minimumDiscountAmount;
                }
              }

      and:
        description: 'Combines this async specification with another using AND logic'
        business-context: 'Creates composite async specifications where both conditions must be satisfied'

        parameters:
          - name: 'other'
            type: 'IAsyncSpecification<T>'
            description: 'Async specification to combine with using AND logic'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New async specification requiring both conditions'

        examples:
          - id: 'async-and-combination'
            code: |
              // Combine async specifications
              const creditSpec = new CreditCheckSpecification(creditService);
              const fraudSpec = new FraudCheckSpecification(fraudService);

              // Customer must pass credit check AND fraud check
              const fullVerification = creditSpec.and(fraudSpec);

              const isVerified = await fullVerification.isSatisfiedByAsync(customer);

      or:
        description: 'Combines this async specification with another using OR logic'
        business-context: 'Creates composite async specifications where either condition can be satisfied'

        parameters:
          - name: 'other'
            type: 'IAsyncSpecification<T>'
            description: 'Async specification to combine with using OR logic'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New async specification requiring either condition'

      not:
        description: 'Creates a negated version of this async specification'
        business-context: 'Inverts async specification logic for exclusion-based business rules'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New async specification with inverted logic'

      explainFailureAsync:
        description: 'Optional method to asynchronously explain why the specification failed'
        business-context: 'Provides detailed failure explanations that may require external data lookups'
        optional: true

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity that failed the specification'
          - name: 'context'
            type: 'Record<string, unknown>'
            description: 'Optional context for failure explanation'
            optional: true

        returns:
          type: 'Promise<string | null>'
          description: 'Promise resolving to failure explanation or null'

        examples:
          - id: 'async-explain-failure'
            code: |
              // Async failure explanation
              class CreditCheckSpecification implements IAsyncSpecification<Customer> {
                async explainFailureAsync(
                  customer: Customer,
                  context?: Record<string, unknown>
                ): Promise<string | null> {
                  const creditScore = await this.creditService.getScore(customer.ssn);
                  if (creditScore < 650) {
                    return `Credit score ${creditScore} is below minimum required score of 650`;
                  }
                  return null;
                }
              }

    properties:
      - name: 'name'
        type: 'string'
        description: 'Optional name for debugging and logging purposes'
        business-context: 'Enables async specification identification in logs'
        optional: true
        readonly: true

      - name: 'description'
        type: 'string'
        description: 'Optional description for debugging and logging purposes'
        business-context: 'Provides human-readable explanation of async business rule'
        optional: true
        readonly: true
