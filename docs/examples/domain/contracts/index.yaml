# Index - Contracts Package Main Exports

# === FILE METADATA ===
file-name: 'index'
title: 'Contracts Package Public API'
description: 'Main export file for all domain contracts and interfaces'
business-context: 'Provides unified access to all contract definitions for domain-driven design'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Central export hub for all DDD contracts and foundational interfaces'
  business-context: 'Single entry point for accessing domain contracts, ensuring consistent API across the library'

  formats:
    jsdoc:
      description: 'Contracts package exports - foundation for DDD implementation'
    cli:
      description: |
        ## Contracts Package Exports

        Complete contract system including:
        - Event system interfaces and utilities
        - Aggregate interfaces and capabilities
        - Validation contracts
        - Repository patterns
        - Scheduling interfaces
        - Testing utilities
        - Domain primitives (EntityId)

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'contracts'
    pattern: 'facade-pattern'

# === EXPORTS DOCUMENTATION ===
exports:
  # Event System Exports
  events:
    description: 'Complete event system contracts and interfaces'
    business-context: 'Foundation for event-driven architecture and event sourcing'
    source: './events'
    type: 'namespace'
    includes:
      - 'Event bus interfaces'
      - 'Event store contracts'
      - 'Event replay mechanisms'
      - 'Event persistence handlers'
      - 'Domain event utilities'

  # Aggregate Exports
  aggregates:
    description: 'Aggregate-related interfaces and contracts'
    business-context: 'Core contracts for aggregate roots and domain entities'
    source: './aggregates'
    type: 'namespace'

  # Validation Exports
  validation:
    description: 'Validation system contracts and specifications'
    business-context: 'Interfaces for business rule validation and specifications'
    source: './validation'
    type: 'namespace'

  # Capabilities Exports
  capabilities:
    description: 'Capability system for extensible aggregates'
    business-context: 'Plugin architecture for adding cross-cutting concerns to aggregates'
    source: './capabilities'
    type: 'namespace'
    exported-items:
      - 'Capability'
      - 'CapabilityRegistry'
      - 'createCapabilityRegistry'
      - 'Various capability interfaces'

  # Domain Exports
  domain:
    description: 'Core domain primitives including EntityId'
    business-context: 'Foundation for entity identification and value objects'
    source: './domain'
    type: 'namespace'
    highlight: 'EntityId - Base implementation for all entity identifiers'

  # Scheduling Exports
  scheduling:
    description: 'Event scheduling and job management contracts'
    business-context: 'Interfaces for scheduled events and recurring jobs'
    source: './scheduling'
    type: 'namespace'
    includes:
      - 'BackoffStrategy enum'
      - 'JobStatus enum'
      - 'SchedulePriority enum'

  # Testing Exports
  testing:
    description: 'Testing utility contracts and interfaces'
    business-context: 'Foundation for test harnesses and test data builders'
    source: './testing'
    type: 'namespace'

  # Repository Exports
  repositories:
    description: 'Repository pattern contracts and unit of work'
    business-context: 'Interfaces for data persistence and aggregate storage'
    source: './repositories'
    type: 'namespace'

  # Shared Exports
  shared:
    description: 'Shared types and interfaces across domains'
    business-context: 'Common contracts used by multiple domains'
    source: './shared'
    type: 'namespace'
