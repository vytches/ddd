# Domain Index - Core Domain Contracts Exports

# === FILE METADATA ===
file-name: 'index'
title: 'Domain Contracts Package Exports'
description: 'Core domain contracts and interfaces exports'
business-context: 'Provides unified access to domain primitive contracts'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Central export hub for core domain contracts including EntityId'
  business-context: 'Foundation for domain entity identification and value objects'

  formats:
    jsdoc:
      description: 'Core domain contracts and EntityId implementation'
    cli:
      description: |
        ## Domain Contracts Exports

        Core domain primitives including:
        - EntityId interfaces and types
        - EntityId base implementation
        - ID factory patterns

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'domain-primitives'

# === EXPORTS DOCUMENTATION ===
exports:
  IdType:
    description: 'Type definition for supported ID types'
    business-context: 'Defines valid ID type options (uuid, integer, bigint, custom)'
    source: './entity-id.interfaces'
    type: 'type'

  IEntityId:
    description: 'Core interface for entity identification'
    business-context: 'Contract that all entity IDs must implement'
    source: './entity-id.interfaces'
    type: 'type'

  IEntityIdConstructorParams:
    description: 'Constructor parameters for EntityId instances'
    business-context: 'Configuration options for creating entity IDs'
    source: './entity-id.interfaces'
    type: 'type'

  IEntityIdFactory:
    description: 'Factory interface for creating EntityId instances'
    business-context: 'Contract for EntityId factory methods'
    source: './entity-id.interfaces'
    type: 'type'

  EntityId:
    description: 'Base implementation of entity identification'
    business-context: 'Foundation class providing entity ID functionality with factory methods'
    source: './entity-id.implementation'
    highlight: 'Base EntityId implementation used across the library'
