# Capability Base - Foundation Layer Capabilities
# Core capability classes and interfaces for extensible behavior

# === FILE METADATA ===
file-name: 'capability-base'
title: 'Capability Base - Extensible Behavior Foundation'
description: 'Core capability classes and interfaces providing extensible behavior patterns for aggregates and projections'
business-context: 'Enables pluggable functionality extensions across domain objects using capability pattern'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  Capability:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class for implementing capability pattern in domain objects'
      business-context: 'Provides foundation for extensible behavior that can be attached to aggregates and projections without modifying core classes'

      # Format-specific
      formats:
        jsdoc:
          description: 'Abstract capability base class with type safety'
          business-context: 'Foundation for pluggable domain object behavior'
        cli:
          description: |
            ## Capability Base Class

            Abstract foundation for the capability pattern, enabling:
            - Type-safe capability identification
            - Extensible behavior attachment
            - Runtime capability discovery
            - Metadata support for configuration

      custom-tags:
        since: '1.0.0'
        pattern: 'capability-pattern'
        abstract: 'true'
        extensible: 'true'

    # Generic Parameters
    generic-parameters:
      - name: 'T'
        description: 'String literal type for capability identification'
        constraint: 'string'
        default: 'string'

    # Properties
    properties:
      - name: 'type'
        type: 'T'
        description: 'Unique type identifier for the capability'
        business-context: 'Enables runtime capability discovery and type checking'
        readonly: true
        abstract: true

      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Optional capability metadata for configuration'
        business-context: 'Allows capability customization and configuration storage'
        optional: true

    # Methods
    methods:
      isType:
        description: 'Type guard method to check if capability is of specific type'
        business-context: 'Enables safe type casting and conditional capability behavior'

        generic-parameters:
          - name: 'U'
            description: 'The type to check against'
            constraint: 'string'

        parameters:
          - name: 'type'
            type: 'U'
            description: 'The capability type to check against'

        returns:
          type: 'this is Capability<U>'
          description: 'Type predicate confirming capability type'

        examples:
          - id: 'is-type-basic'
            code: |
              // Type-safe capability checking
              const capability: Capability = getCapability();

              if (capability.isType('audit')) {
                // TypeScript knows this is Capability<'audit'>
                console.log('Audit capability found');
              }

              // Use in conditional logic
              const isVersioning = capability.isType('versioning');

        custom-tags:
          type-guard: 'true'
          type-safety: 'compile-time'

    # Static Methods
    static-methods:
      capabilityType:
        description: 'Static getter for compile-time capability type extraction'
        business-context: 'Enables capability registration and discovery at compile time'

        returns:
          type: 'string'
          description: 'The capability type identifier'

        throws:
          - type: 'Error'
            description: "When subclass doesn't override the static getter"

        examples:
          - id: 'capability-type-override'
            code: |
              // Capability implementation must override
              class AuditCapability extends Capability<'audit'> {
                readonly type = 'audit' as const;
                
                static get capabilityType(): string {
                  return 'audit';
                }
              }

              // Access capability type statically
              console.log(AuditCapability.capabilityType); // 'audit'

        custom-tags:
          abstract: 'true'
          must-override: 'true'

# === INTERFACES ===
interfaces:
  IAggregateCapability:
    description: 'Interface contract for capabilities that can be attached to aggregates'
    business-context: 'Standardizes capability lifecycle management for domain aggregates, enabling consistent behavior extension'

    formats:
      jsdoc:
        description: 'Aggregate capability interface with lifecycle methods'
        business-context: 'Capability contract for domain aggregate extensions'
      cli:
        description: |
          ## IAggregateCapability Interface

          Defines the contract for capabilities that enhance aggregate behavior:

          **Lifecycle Management:**
          - Attachment to aggregate instances
          - Optional detachment and cleanup
          - Type-safe capability identification

          **Usage Examples:**
          - Audit logging capabilities
          - Version tracking capabilities  
          - Event sourcing capabilities
          - Snapshot management capabilities

    generic-parameters:
      - name: 'T'
        description: 'String literal type for capability identification'
        constraint: 'string'
        default: 'string'

    extends:
      - 'Capability<T>'

    methods:
      attach:
        description: 'Called when capability is attached to an aggregate instance'
        business-context: 'Initializes capability state and establishes connection with aggregate for behavior extension'

        parameters:
          - name: 'aggregate'
            type: 'unknown'
            description: 'The aggregate instance to attach to'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'attach-basic'
            code: |
              // Audit capability attachment
              class AuditCapability implements IAggregateCapability<'audit'> {
                attach(aggregate: unknown): void {
                  // Initialize audit logging for aggregate
                  this.setupAuditListeners(aggregate);
                  console.log('Audit capability attached');
                }
              }

        custom-tags:
          lifecycle: 'attachment'

      detach:
        description: 'Optional cleanup method called when capability is removed'
        business-context: 'Performs cleanup operations and resource disposal when capability is no longer needed'
        optional: true

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'detach-basic'
            code: |
              // Optional cleanup implementation
              class AuditCapability implements IAggregateCapability<'audit'> {
                detach?(): void {
                  // Cleanup audit listeners and resources
                  this.cleanupAuditListeners();
                  console.log('Audit capability detached');
                }
              }

        custom-tags:
          lifecycle: 'detachment'
          cleanup: 'true'

  IProjectionCapability:
    description: 'Interface contract for capabilities that can be attached to projection engines'
    business-context: 'Standardizes capability lifecycle for read model projections, enabling consistent enhancement patterns'

    formats:
      jsdoc:
        description: 'Projection capability interface with async lifecycle'
        business-context: 'Capability contract for projection engine extensions'
      cli:
        description: |
          ## IProjectionCapability Interface

          Defines the contract for capabilities that enhance projection behavior:

          **Async Lifecycle:**
          - Attachment to projection engines
          - Async initialization and cleanup
          - Read model type safety

          **Common Use Cases:**
          - Checkpoint management
          - Circuit breaker patterns
          - Dead letter handling
          - Performance monitoring

    generic-parameters:
      - name: 'T'
        description: 'String literal type for capability identification'
        constraint: 'string'
        default: 'string'
      - name: 'TReadModel'
        description: 'Type of read model this capability works with'
        default: 'unknown'

    extends:
      - 'Capability<T>'

    methods:
      attach:
        description: 'Called when capability is attached to a projection engine'
        business-context: 'Establishes connection with projection engine for behavior enhancement'

        parameters:
          - name: 'context'
            type: 'unknown'
            description: 'The projection context to attach to'

        returns:
          type: 'void'
          description: 'No return value'

        custom-tags:
          lifecycle: 'attachment'

      detach:
        description: 'Optional cleanup method for projection capability removal'
        business-context: 'Performs cleanup when capability is no longer needed by projection'
        optional: true

        returns:
          type: 'void'
          description: 'No return value'

        custom-tags:
          lifecycle: 'detachment'
          cleanup: 'true'

      initialize:
        description: 'Optional async initialization for capability setup'
        business-context: 'Performs async setup operations like database connections or external service initialization'
        optional: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when initialization completes'

        examples:
          - id: 'initialize-async'
            code: |
              // Checkpoint capability with async initialization
              class CheckpointCapability implements IProjectionCapability<'checkpoint'> {
                async initialize(): Promise<void> {
                  // Setup database connection for checkpoint storage
                  await this.connectToDatabase();
                  console.log('Checkpoint capability initialized');
                }
              }

        custom-tags:
          lifecycle: 'initialization'
          async: 'true'

      cleanup:
        description: 'Optional async cleanup for resource disposal'
        business-context: 'Performs async cleanup like closing connections or finalizing external resources'
        optional: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when cleanup completes'

        examples:
          - id: 'cleanup-async'
            code: |
              // Circuit breaker with async cleanup
              class CircuitBreakerCapability implements IProjectionCapability<'circuit-breaker'> {
                async cleanup(): Promise<void> {
                  // Close monitoring connections
                  await this.closeConnections();
                  console.log('Circuit breaker capability cleaned up');
                }
              }

        custom-tags:
          lifecycle: 'cleanup'
          async: 'true'

# === TYPES ===
types:
  CapabilityType:
    description: 'Type helper to extract capability type from capability instance'
    business-context: 'Enables compile-time type extraction for capability registration and discovery'

    formats:
      jsdoc:
        description: 'Conditional type for extracting capability type string'
      cli:
        description: |
          ## CapabilityType Helper

          Advanced TypeScript utility type that extracts the type parameter
          from a Capability instance for compile-time type safety.

    generic-parameters:
      - name: 'T'
        description: 'Capability type to extract from'
        constraint: 'Capability'

  CapabilityConstructor:
    description: 'Type definition for capability constructor functions with static type information'
    business-context: 'Enables capability factory patterns and dependency injection with compile-time safety'

    formats:
      jsdoc:
        description: 'Constructor type with static capability type property'
      cli:
        description: |
          ## CapabilityConstructor Type

          Defines the shape of capability constructors including:
          - Constructor function signature
          - Static capabilityType property
          - Generic type parameter support

    generic-parameters:
      - name: 'T'
        description: 'Capability type the constructor creates'
        constraint: 'Capability'
        default: 'Capability'

  CapabilityMap:
    description: 'Type alias for Map storing capabilities by their type identifiers'
    business-context: 'Provides consistent capability storage and lookup structure across the system'

    formats:
      jsdoc:
        description: 'Map type for capability storage by string keys'
      cli:
        description: |
          ## CapabilityMap Type

          Standard Map structure for storing and retrieving capabilities:
          - Key: Capability type identifier string
          - Value: Capability instance
          - Used in capability registries and aggregate storage
