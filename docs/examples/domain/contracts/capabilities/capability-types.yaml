# Capability Types - Foundation Layer Capability Contracts
# Specific capability interface definitions for domain-driven behavior extension

# === FILE METADATA ===
file-name: 'capability-types'
title: 'Capability Types - Specialized Capability Contracts'
description: 'Specialized capability interface definitions for common domain-driven design patterns'
business-context: 'Provides standardized contracts for snapshot management, versioning, event sourcing, audit logging, and projection capabilities'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ISnapshotCapability:
    description: 'Capability interface for aggregate state snapshot management'
    business-context: 'Enables performance optimization through periodic state capture, reducing event replay requirements for large aggregates'

    formats:
      jsdoc:
        description: 'Aggregate snapshot capability with serialization support'
        business-context: 'Performance optimization for event sourcing'
      cli:
        description: |
          ## ISnapshotCapability Interface

          Provides aggregate state snapshot functionality:

          **Key Features:**
          - State serialization and deserialization
          - Metadata support for snapshot enrichment
          - Temporary state management for auditing
          - Timestamp tracking for snapshot lifecycle

          **Performance Benefits:**
          - Reduces event replay overhead
          - Enables faster aggregate reconstruction
          - Supports large aggregate optimization

    generic-parameters:
      - name: 'TState'
        description: 'Type of the aggregate state to snapshot'
        default: 'unknown'
      - name: 'TMeta'
        description: 'Type of snapshot metadata'
        default: 'unknown'

    extends:
      - "IAggregateCapability<'snapshot'>"

    methods:
      createSnapshot:
        description: 'Creates a snapshot of the current aggregate state'
        business-context: 'Captures aggregate state at a specific point in time to enable fast restoration without event replay'

        parameters:
          - name: 'serializer'
            type: '() => TState'
            description: 'Function to serialize aggregate state'
          - name: 'metadataCreator'
            type: '() => TMeta'
            description: 'Optional function to create snapshot metadata'
            optional: true

        returns:
          type: 'IAggregateSnapshot<TState, TMeta>'
          description: 'Complete snapshot with state, metadata, and versioning information'

        examples:
          - id: 'create-snapshot-basic'
            code: |
              // Create snapshot with custom serializer
              const snapshot = snapshotCapability.createSnapshot(
                () => ({ orderId: order.id, status: order.status }),
                () => ({ createdBy: 'system', reason: 'scheduled' })
              );

      restoreFromSnapshot:
        description: 'Restores aggregate state from a previously created snapshot'
        business-context: 'Enables fast aggregate reconstruction by applying snapshot state directly instead of replaying all events'

        parameters:
          - name: 'snapshot'
            type: 'IAggregateSnapshot<TState, TMeta>'
            description: 'The snapshot to restore from'
          - name: 'deserializer'
            type: '(state: TState) => void'
            description: 'Function to deserialize and apply state to aggregate'
          - name: 'metadataRestorer'
            type: '(metadata: TMeta) => void'
            description: 'Optional function to restore metadata'
            optional: true

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'restore-from-snapshot'
            code: |
              // Restore aggregate from snapshot
              snapshotCapability.restoreFromSnapshot(
                savedSnapshot,
                (state) => {
                  this.id = state.orderId;
                  this.status = state.status;
                },
                (meta) => console.log(`Restored: ${meta.reason}`)
              );

      saveTemporaryState:
        description: 'Saves current state temporarily for audit purposes'
        business-context: 'Provides audit trail support by preserving intermediate states during complex business operations'
        optional: true

        parameters:
          - name: 'state'
            type: 'TState'
            description: 'State to save temporarily'

        returns:
          type: 'void'
          description: 'No return value'

      getLastSnapshotTimestamp:
        description: 'Gets the timestamp of the last created snapshot'
        business-context: 'Enables snapshot lifecycle management and scheduling of periodic snapshots'
        optional: true

        returns:
          type: 'Date | null'
          description: 'Timestamp of last snapshot or null if none exists'

  IVersioningCapability:
    description: 'Capability interface for handling event schema evolution and versioning'
    business-context: 'Enables backward compatibility and event migration during system evolution without losing historical data'

    formats:
      jsdoc:
        description: 'Event versioning capability with upcaster support'
        business-context: 'Schema evolution and event migration support'
      cli:
        description: |
          ## IVersioningCapability Interface

          Handles event schema evolution:

          **Core Features:**
          - Event upcaster registration and management
          - Versioned event processing pipeline
          - Type registry for event evolution tracking
          - Compatibility layer for legacy events

          **Business Benefits:**
          - Maintains backward compatibility
          - Enables non-breaking schema changes
          - Supports gradual system migration

    extends:
      - "IAggregateCapability<'versioning'>"

    methods:
      registerUpcaster:
        description: 'Registers an event upcaster for transforming events between versions'
        business-context: 'Enables schema evolution by defining transformation rules from old event formats to new ones'

        generic-parameters:
          - name: 'TFrom'
            description: 'Source event payload type'
            default: 'unknown'
          - name: 'TTo'
            description: 'Target event payload type'
            default: 'unknown'

        parameters:
          - name: 'eventType'
            type: 'string'
            description: 'Type identifier of the event'
          - name: 'sourceVersion'
            type: 'number'
            description: 'Version number of the source event schema'
          - name: 'upcaster'
            type: 'IEventUpcaster<TFrom, TTo>'
            description: 'Upcaster implementation for the transformation'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'register-upcaster'
            code: |
              // Register event upcaster for schema evolution
              versioningCapability.registerUpcaster(
                'OrderCreated',
                1,
                {
                  upcast: (oldEvent) => ({
                    ...oldEvent,
                    customerId: oldEvent.userId, // Field renamed
                    metadata: { migrated: true }
                  })
                }
              );

      handleVersionedEvent:
        description: 'Processes events with version-aware handling and automatic upcasting'
        business-context: 'Ensures all events are processed with correct handlers regardless of their original schema version'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'The event to process with version information'
          - name: 'handlers'
            type: 'Map<string, (payload: unknown, metadata?: unknown) => void>'
            description: 'Map of event handlers by event type'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'handle-versioned-event'
            code: |
              // Process event with version handling
              const handlers = new Map([
                ['OrderCreated', (payload, metadata) => {
                  // Handle current version OrderCreated event
                  console.log(`Processing order: ${payload.orderId}`);
                }]
              ]);

              versioningCapability.handleVersionedEvent(legacyEvent, handlers);

      getRegisteredEventTypes:
        description: 'Returns list of all event types that have registered upcasters'
        business-context: 'Provides introspection capabilities for system maintenance and migration tracking'

        returns:
          type: 'string[]'
          description: 'Array of event type identifiers with registered upcasters'

      hasUpcaster:
        description: 'Checks if an upcaster is registered for a specific event type and version'
        business-context: 'Enables conditional processing and validation during event handling and migration'

        parameters:
          - name: 'eventType'
            type: 'string'
            description: 'The event type to check'
          - name: 'version'
            type: 'number'
            description: 'The event version to check'

        returns:
          type: 'boolean'
          description: 'True if upcaster exists for the event type and version'

  IEventSourcingCapability:
    description: 'Capability interface for event sourcing integration with event stores'
    business-context: 'Provides direct event store integration for aggregates, enabling complete event sourcing lifecycle management'

    formats:
      jsdoc:
        description: 'Event sourcing capability with event store integration'
        business-context: 'Complete event sourcing lifecycle management'
      cli:
        description: |
          ## IEventSourcingCapability Interface

          Provides event sourcing integration:

          **Core Functionality:**
          - Event store connectivity and management
          - Aggregate loading from event streams
          - Event persistence and stream management
          - Optimistic concurrency control support

          **Business Benefits:**
          - Complete audit trail preservation
          - Time-travel debugging capabilities
          - Event replay for testing and analysis

    extends:
      - "IAggregateCapability<'eventSourcing'>"

    methods:
      loadFromEventStore:
        description: 'Loads aggregate state by replaying events from the event store'
        business-context: 'Reconstructs aggregate state from its complete event history for accurate current state representation'

        parameters:
          - name: 'aggregateId'
            type: 'unknown'
            description: 'Identifier of the aggregate to load'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when aggregate is fully loaded'

        examples:
          - id: 'load-from-event-store'
            code: |
              // Load aggregate from event store
              await eventSourcingCapability.loadFromEventStore('order-123');

              // Aggregate now has state reconstructed from events
              console.log(aggregate.getCurrentState());

      saveToEventStore:
        description: 'Persists uncommitted events to the event store'
        business-context: 'Ensures all domain events are permanently stored for future replay and audit purposes'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when events are persisted'

        examples:
          - id: 'save-to-event-store'
            code: |
              // Save aggregate changes to event store
              aggregate.processOrder();
              await eventSourcingCapability.saveToEventStore();

              // Events are now persisted and aggregate is committed

      setEventStore:
        description: 'Sets the event store instance for this capability'
        business-context: 'Configures the persistence mechanism for event storage and retrieval'

        parameters:
          - name: 'eventStore'
            type: 'IEventStore'
            description: 'Event store implementation to use'

        returns:
          type: 'void'
          description: 'No return value'

      getEventStore:
        description: 'Gets the currently configured event store instance'
        business-context: 'Provides access to event store for advanced operations and diagnostics'

        returns:
          type: 'IEventStore | null'
          description: 'Current event store instance or null if not configured'

  IAuditCapability:
    description: 'Capability interface for comprehensive audit logging of aggregate operations'
    business-context: 'Provides detailed audit trail for compliance, debugging, and business analytics'

    formats:
      jsdoc:
        description: 'Audit capability with comprehensive logging'
        business-context: 'Compliance and audit trail management'
      cli:
        description: |
          ## IAuditCapability Interface

          Provides comprehensive audit logging:

          **Audit Features:**
          - Complete operation audit trail
          - Event statistics and analytics
          - Configurable audit event retention
          - Performance metrics collection

          **Compliance Benefits:**
          - Regulatory compliance support
          - Security audit trails
          - Business analytics data

    extends:
      - "IAggregateCapability<'audit'>"

    methods:
      getAuditLog:
        description: 'Retrieves the complete audit log for the aggregate'
        business-context: 'Provides access to audit trail for compliance reporting and debugging'

        returns:
          type: 'IAuditEvent[]'
          description: 'Array of audit events in chronological order'

        examples:
          - id: 'get-audit-log'
            code: |
              // Retrieve audit log for analysis
              const auditLog = auditCapability.getAuditLog();

              auditLog.forEach(event => {
                console.log(`${event.timestamp}: ${event.operation} by ${event.userId}`);
              });

      clearAuditLog:
        description: 'Clears the audit log for the aggregate'
        business-context: 'Enables audit log maintenance and privacy compliance by removing old audit entries'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'clear-audit-log'
            code: |
              // Clear audit log (e.g., for GDPR compliance)
              auditCapability.clearAuditLog();
              console.log(auditCapability.getAuditLog().length); // 0

      getAuditStatistics:
        description: 'Returns statistical information about audit events'
        business-context: 'Provides analytics data for performance monitoring and business intelligence'
        optional: true

        returns:
          type: '{ totalEvents: number; eventsByType: Record<string, number>; averageTimeBetweenEvents: number; }'
          description: 'Object containing audit statistics and metrics'

        examples:
          - id: 'get-audit-statistics'
            code: |
              // Get audit statistics for monitoring
              const stats = auditCapability.getAuditStatistics?.();
              if (stats) {
                console.log(`Total events: ${stats.totalEvents}`);
                console.log(`Most common: ${Object.entries(stats.eventsByType)[0]}`);
              }

  ICheckpointCapability:
    description: 'Projection capability interface for checkpoint-based event processing'
    business-context: 'Enables reliable event processing resume points for read model projections with crash recovery'

    formats:
      jsdoc:
        description: 'Checkpoint capability for projection resilience'
        business-context: 'Read model processing with crash recovery'
      cli:
        description: |
          ## ICheckpointCapability Interface

          Provides checkpoint-based projection processing:

          **Resilience Features:**
          - Processing position tracking
          - Crash recovery support
          - Configurable checkpoint intervals
          - State persistence with events

          **Operational Benefits:**
          - Fast projection restart
          - Processing guarantee support
          - Performance optimization

    generic-parameters:
      - name: 'TReadModel'
        description: 'Type of read model state to checkpoint'
        default: 'unknown'

    extends:
      - "IProjectionCapability<'checkpoint', TReadModel>"

    methods:
      saveCheckpoint:
        description: 'Saves a checkpoint with current processing position and read model state'
        business-context: 'Creates recovery point to enable fast projection restart from last known good state'

        parameters:
          - name: 'projectionId'
            type: 'string'
            description: 'Unique identifier for the projection'
          - name: 'eventId'
            type: 'string'
            description: 'ID of the last processed event'
          - name: 'position'
            type: 'number'
            description: 'Stream position of the last processed event'
          - name: 'state'
            type: 'TReadModel'
            description: 'Current read model state'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when checkpoint is saved'

        examples:
          - id: 'save-checkpoint'
            code: |
              // Save checkpoint after processing batch
              await checkpointCapability.saveCheckpoint(
                'user-stats-projection',
                'evt_12345',
                1000,
                currentReadModelState
              );

      loadCheckpoint:
        description: 'Loads the last saved checkpoint for a projection'
        business-context: 'Retrieves recovery point to resume processing from last known position instead of full replay'

        parameters:
          - name: 'projectionId'
            type: 'string'
            description: 'Unique identifier for the projection'

        returns:
          type: 'Promise<{ eventId: string; position: number; state: TReadModel; } | null>'
          description: 'Checkpoint data or null if no checkpoint exists'

        examples:
          - id: 'load-checkpoint'
            code: |
              // Load checkpoint on projection startup
              const checkpoint = await checkpointCapability.loadCheckpoint('user-stats-projection');

              if (checkpoint) {
                // Resume from checkpoint
                resumeProcessingFromPosition(checkpoint.position, checkpoint.state);
              } else {
                // Start from beginning
                startFullProjection();
              }

      getInterval:
        description: 'Gets the checkpoint interval configuration'
        business-context: 'Returns checkpoint frequency setting for performance tuning and resource management'

        returns:
          type: 'number'
          description: 'Number of events between checkpoints'

  ICircuitBreakerCapability:
    description: 'Projection capability interface for circuit breaker pattern implementation'
    business-context: 'Provides fault tolerance for projection processing by preventing cascade failures'

    formats:
      jsdoc:
        description: 'Circuit breaker capability for projection fault tolerance'
        business-context: 'Fault tolerance and cascade failure prevention'
      cli:
        description: |
          ## ICircuitBreakerCapability Interface

          Implements circuit breaker pattern for projections:

          **Fault Tolerance:**
          - Three-state circuit management (CLOSED/OPEN/HALF_OPEN)
          - Failure threshold configuration
          - Automatic recovery attempts
          - Success/failure tracking

          **System Benefits:**
          - Prevents cascade failures
          - Enables graceful degradation
          - Reduces resource waste

    generic-parameters:
      - name: 'TReadModel'
        description: 'Type of read model this circuit breaker protects'
        default: 'unknown'

    extends:
      - "IProjectionCapability<'circuitBreaker', TReadModel>"

    methods:
      recordSuccess:
        description: 'Records a successful operation to update circuit breaker state'
        business-context: 'Tracks successful operations to enable automatic recovery from OPEN state'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'record-success'
            code: |
              // Record successful event processing
              try {
                await processEvent(event);
                circuitBreakerCapability.recordSuccess();
              } catch (error) {
                circuitBreakerCapability.recordFailure();
                throw error;
              }

      recordFailure:
        description: 'Records a failed operation to update circuit breaker state'
        business-context: 'Tracks failures to determine when circuit should OPEN to prevent further damage'

        returns:
          type: 'void'
          description: 'No return value'

      isOpen:
        description: 'Checks if the circuit breaker is currently in OPEN state'
        business-context: 'Determines whether operations should be blocked to prevent cascade failures'

        returns:
          type: 'boolean'
          description: 'True if circuit is open and operations should be blocked'

        examples:
          - id: 'is-open-check'
            code: |
              // Check circuit state before processing
              if (circuitBreakerCapability.isOpen()) {
                throw new Error('Circuit breaker is open - service unavailable');
              }

              await processProjectionEvent(event);

      getState:
        description: 'Gets the current circuit breaker state'
        business-context: 'Provides detailed state information for monitoring and debugging'

        returns:
          type: "'CLOSED' | 'OPEN' | 'HALF_OPEN'"
          description: 'Current circuit breaker state'

      reset:
        description: 'Manually resets the circuit breaker to CLOSED state'
        business-context: 'Enables manual recovery for administrative override or testing scenarios'

        returns:
          type: 'void'
          description: 'No return value'

  IDeadLetterCapability:
    description: 'Projection capability interface for dead letter queue management'
    business-context: 'Handles permanently failed events to prevent data loss and enable manual recovery'

    formats:
      jsdoc:
        description: 'Dead letter capability for failed event management'
        business-context: 'Failed event handling and recovery management'
      cli:
        description: |
          ## IDeadLetterCapability Interface

          Manages failed events that cannot be processed:

          **Error Handling:**
          - Dead letter queue management
          - Failed event storage with error details
          - Manual retry mechanisms
          - Queue cleanup operations

          **Recovery Benefits:**
          - Prevents event loss
          - Enables manual intervention
          - Supports debugging and analysis

    generic-parameters:
      - name: 'TReadModel'
        description: 'Type of read model this dead letter handler supports'
        default: 'unknown'

    extends:
      - "IProjectionCapability<'deadLetter', TReadModel>"

    methods:
      sendToDeadLetter:
        description: 'Sends a failed event to the dead letter queue with error information'
        business-context: 'Preserves failed events for manual analysis and recovery instead of losing data'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'The event that failed to process'
          - name: 'error'
            type: 'Error'
            description: 'Error that caused the failure'
          - name: 'projectionId'
            type: 'string'
            description: 'ID of the projection that failed to process the event'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when event is stored in dead letter queue'

        examples:
          - id: 'send-to-dead-letter'
            code: |
              // Handle failed event processing
              try {
                await processProjectionEvent(event);
              } catch (error) {
                await deadLetterCapability.sendToDeadLetter(
                  event,
                  error,
                  'user-stats-projection'
                );
              }

      getDeadLetterEvents:
        description: 'Retrieves all dead letter events for a specific projection'
        business-context: 'Provides access to failed events for analysis and manual recovery operations'

        parameters:
          - name: 'projectionId'
            type: 'string'
            description: 'ID of the projection to get dead letters for'

        returns:
          type: 'Promise<Array<{ event: IExtendedDomainEvent; error: string; timestamp: Date; }>>'
          description: 'Array of dead letter entries with event, error, and timestamp'

        examples:
          - id: 'get-dead-letter-events'
            code: |
              // Retrieve failed events for analysis
              const deadLetters = await deadLetterCapability.getDeadLetterEvents('user-stats-projection');

              deadLetters.forEach(entry => {
                console.log(`Failed at ${entry.timestamp}: ${entry.error}`);
                console.log(`Event: ${entry.event.eventType}`);
              });

      retryDeadLetterEvent:
        description: 'Attempts to retry processing a specific dead letter event'
        business-context: 'Enables manual recovery of failed events after fixing underlying issues'

        parameters:
          - name: 'projectionId'
            type: 'string'
            description: 'ID of the projection'
          - name: 'eventId'
            type: 'string'
            description: 'ID of the dead letter event to retry'

        returns:
          type: 'Promise<boolean>'
          description: 'True if retry succeeded, false if it failed again'

        examples:
          - id: 'retry-dead-letter'
            code: |
              // Retry failed event after fixing issue
              const retrySucceeded = await deadLetterCapability.retryDeadLetterEvent(
                'user-stats-projection',
                'evt_failed_12345'
              );

              if (retrySucceeded) {
                console.log('Event successfully reprocessed');
              } else {
                console.log('Retry failed - event remains in dead letter queue');
              }

      clearDeadLetterQueue:
        description: 'Removes all dead letter events for a projection'
        business-context: 'Enables queue maintenance and cleanup after resolving systematic issues'

        parameters:
          - name: 'projectionId'
            type: 'string'
            description: 'ID of the projection to clear dead letters for'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when queue is cleared'

  IAggregateSnapshot:
    description: 'Interface defining the structure of aggregate state snapshots'
    business-context: 'Standardizes snapshot format for consistent storage and retrieval across different persistence mechanisms'

    formats:
      jsdoc:
        description: 'Aggregate snapshot data structure'
        business-context: 'Standardized snapshot format for persistence'
      cli:
        description: |
          ## IAggregateSnapshot Interface

          Defines aggregate snapshot structure:

          **Core Fields:**
          - Aggregate identification and versioning
          - Serialized state with type safety
          - Timestamp for snapshot lifecycle
          - Optional metadata for enrichment

          **Usage Context:**
          - Event sourcing optimization
          - Performance enhancement
          - Audit trail support

    generic-parameters:
      - name: 'TState'
        description: 'Type of the serialized aggregate state'
        default: 'unknown'
      - name: 'TMeta'
        description: 'Type of snapshot metadata'
        default: 'unknown'

    properties:
      - name: 'aggregateId'
        type: 'unknown'
        description: 'Unique identifier of the aggregate'
        business-context: 'Links snapshot to specific aggregate instance'

      - name: 'version'
        type: 'number'
        description: 'Version number of the aggregate when snapshot was created'
        business-context: 'Enables optimistic concurrency control and version tracking'

      - name: 'aggregateType'
        type: 'string'
        description: 'Type identifier of the aggregate'
        business-context: 'Enables proper deserialization and type-safe restoration'

      - name: 'state'
        type: 'TState'
        description: 'Serialized aggregate state data'
        business-context: 'Contains the actual aggregate state for fast restoration'

      - name: 'timestamp'
        type: 'Date'
        description: 'When the snapshot was created'
        business-context: 'Supports snapshot lifecycle management and audit trails'

      - name: 'metadata'
        type: 'TMeta | undefined'
        description: 'Optional metadata associated with the snapshot'
        business-context: 'Enables snapshot enrichment with operational data'
        optional: true

      - name: 'lastEventId'
        type: 'string | undefined'
        description: 'ID of the last event included in this snapshot'
        business-context: 'Enables incremental event replay from snapshot point'
        optional: true
