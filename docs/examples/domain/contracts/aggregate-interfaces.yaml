# Aggregate Interfaces - Foundation Layer Contracts
# Core interface definitions for aggregate functionality

# === FILE METADATA ===
file-name: 'aggregate-interfaces'
title: 'Aggregate Interfaces - Foundation Contracts'
description: 'Core interface definitions for aggregate behavior in the DDD framework'
business-context: 'Provides standardized contracts for aggregate event handling across all domain contexts'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IAggregateWithEvents:
    description: 'Core interface contract for aggregates with domain event capabilities'
    business-context: 'Standardizes event handling behavior across all domain aggregates, enabling consistent event sourcing and CQRS patterns'

    formats:
      jsdoc:
        description: 'Foundation interface for event-capable aggregates'
        business-context: 'Core DDD aggregate contract with event management'
      cli:
        description: |
          ## IAggregateWithEvents Interface

          The foundational interface for all aggregates that handle domain events in VytchesDDD.

          **Key Features:**
          - Domain event collection and management
          - Uncommitted changes tracking
          - Event commitment for persistence
          - Read-only event access for safety

          **Usage Pattern:**
          ```typescript
          class OrderAggregate implements IAggregateWithEvents {
            // Implementation handles event lifecycle
          }
          ```

    methods:
      getDomainEvents:
        description: 'Retrieves all uncommitted domain events from the aggregate'
        business-context: 'Provides read-only access to pending events for publication to event bus and persistence'

        returns:
          type: 'ReadonlyArray<IExtendedDomainEvent>'
          description: 'Read-only array of uncommitted domain events'

        examples:
          - id: 'get-events-basic'
            code: |
              // In aggregate implementation
              const events = aggregate.getDomainEvents();
              console.log(`Pending events: ${events.length}`);

              // Events are read-only for safety
              events.forEach(event => {
                console.log(`Event: ${event.eventType}`);
              });

        custom-tags:
          readonly: 'true'
          event-lifecycle: 'pending-events'

      commit:
        description: 'Clears all uncommitted domain events from the aggregate'
        business-context: 'Marks events as processed after successful publication and persistence, preventing duplicate processing'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'commit-basic'
            code: |
              // After processing business logic
              const events = aggregate.getDomainEvents();

              // Publish events to event bus
              await eventBus.publishMany(events);

              // Clear committed events
              aggregate.commit();

              // Verify no pending events
              console.log(aggregate.hasChanges()); // false

        custom-tags:
          event-lifecycle: 'commit-events'
          side-effects: 'clears-events'

      hasChanges:
        description: 'Checks if the aggregate has any uncommitted domain events'
        business-context: 'Enables conditional processing and optimization by detecting aggregates with pending state changes'

        returns:
          type: 'boolean'
          description: 'True if there are uncommitted events, false otherwise'

        examples:
          - id: 'has-changes-basic'
            code: |
              // Check before persistence
              if (aggregate.hasChanges()) {
                const events = aggregate.getDomainEvents();
                await eventBus.publishMany(events);
                aggregate.commit();
              }

              // Use in conditional logic
              const shouldSave = aggregate.hasChanges();
              if (shouldSave) {
                await repository.save(aggregate);
              }

        custom-tags:
          optimization: 'conditional-processing'
          event-lifecycle: 'change-detection'
