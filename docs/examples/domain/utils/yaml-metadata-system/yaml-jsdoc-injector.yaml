# yaml-jsdoc-injector - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'yaml-jsdoc-injector'
title: 'YamlJSDocInjector - YAML Metadata Injection System'
description: 'Hierarchical metadata injection system for JSDoc generation from YAML sources'
business-context: 'Powers the Enhanced Metadata System V2 for automatic JSDoc generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  YamlJSDocInjector:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'YAML Front Matter JSDoc Injection System with hierarchical metadata support'
      business-context: 'Transforms YAML metadata into JSDoc documentation with multi-level inheritance'

      formats:
        jsdoc:
          description: 'Hierarchical YAML to JSDoc transformer'
        cli:
          description: |
            ## YamlJSDocInjector

            Metadata injection features:
            - Hierarchical metadata resolution (global → package → class → method)
            - Multiple merge strategies (merge, replace, append)
            - Format-specific content (JSDoc vs CLI)
            - Environment-aware metadata
            - Custom tag support
            - Example extraction and formatting
            - Directive processing

      custom-tags:
        since: '2.0.0'
        version: 'V2'
        pattern: 'Hierarchical Metadata'

    # Methods
    methods:
      constructor:
        description: 'Creates YamlJSDocInjector instance'
        business-context: 'Initializes injector with base directory for metadata resolution'

        parameters:
          - name: 'baseDir'
            type: 'string'
            description: 'Base directory for metadata files'
            optional: true
            default: 'process.cwd()'

        examples:
          - id: 'create-injector'
            code: |
              const injector = new YamlJSDocInjector('/project/root');
              // Ready to process .d.ts files

      processFile:
        description: 'Process .d.ts file and inject metadata from YAML sources'
        business-context: 'Main entry point for transforming TypeScript declarations with YAML metadata'

        parameters:
          - name: 'dtsPath'
            type: 'string'
            description: 'Path to .d.ts file to process'

        returns:
          type: 'Promise<string>'
          description: 'Processed content with injected JSDoc'

        examples:
          - id: 'process-dts'
            code: |
              const processed = await injector.processFile(
                'dist/aggregates/aggregate-root.d.ts'
              );

              // Processed content includes JSDoc from:
              // 1. global-settings.yaml
              // 2. aggregates/.md-settings.yaml
              // 3. aggregate-root.yaml
              // 4. aggregate-root/commit.yaml (for methods)

        custom-tags:
          async: 'true'
          main: 'true'

      loadHierarchicalMetadata:
        description: 'Load hierarchical metadata: global → package → class'
        business-context: 'Loads metadata from all hierarchy levels for resolution'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: 'className'
            type: 'string'
            description: 'Class name'

        returns:
          type: 'Promise<void>'
          description: 'Metadata loaded into instance properties'

        custom-tags:
          private: 'true'
          async: 'true'

      loadYamlFile:
        description: 'Load YAML file and parse front matter'
        business-context: 'Reads and parses YAML metadata files'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to YAML file'

        returns:
          type: 'Promise<YamlMetadata | null>'
          description: 'Parsed metadata or null if not found'

        custom-tags:
          private: 'true'
          async: 'true'

      findAllDirectives:
        description: 'Find all injection directives in content'
        business-context: 'Locates YAML injection markers in TypeScript declarations'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'File content to search'

        returns:
          type: 'Array<DirectiveMatch>'
          description: 'Array of found directives'

        custom-tags:
          private: 'true'
          parser: 'true'

      processDirective:
        description: 'Process single directive and generate JSDoc content'
        business-context: 'Transforms directive into formatted JSDoc documentation'

        parameters:
          - name: 'directive'
            type: 'DirectiveMatch'
            description: 'Directive to process'
          - name: 'metadata'
            type: 'YamlMetadata'
            description: 'Available metadata'

        returns:
          type: 'string'
          description: 'Generated JSDoc content'

        custom-tags:
          private: 'true'
          transformer: 'true'

      resolveHierarchicalMetadata:
        description: 'Resolve hierarchical metadata with merge strategies'
        business-context: 'Applies hierarchy resolution rules to combine metadata levels'

        parameters:
          - name: 'directiveType'
            type: 'string'
            description: 'Type of directive'
          - name: 'methodName'
            type: 'string'
            description: 'Method name if applicable'
            optional: true

        returns:
          type: 'YamlMetadata'
          description: 'Resolved metadata after applying strategies'

        custom-tags:
          private: 'true'
          algorithm: 'Hierarchical resolution'

      mergeMetadata:
        description: 'Merge metadata based on hierarchy strategy'
        business-context: 'Applies merge, replace, or append strategy to metadata'

        parameters:
          - name: 'base'
            type: 'YamlMetadata'
            description: 'Base metadata'
          - name: 'overlay'
            type: 'YamlMetadata'
            description: 'Overlay metadata'
          - name: 'strategy'
            type: "'merge' | 'replace' | 'append'"
            description: 'Merge strategy'

        returns:
          type: 'YamlMetadata'
          description: 'Merged metadata'

        custom-tags:
          private: 'true'
          strategies: 'merge, replace, append'

      deepMerge:
        description: 'Deep merge objects'
        business-context: 'Recursively merges nested metadata objects'

        parameters:
          - name: 'target'
            type: 'any'
            description: 'Target object'
          - name: 'source'
            type: 'any'
            description: 'Source object'

        returns:
          type: 'any'
          description: 'Merged object'

        custom-tags:
          private: 'true'
          recursive: 'true'

      applyEnvironmentMetadata:
        description: 'Apply environment-specific metadata'
        business-context: 'Applies format-specific overrides (jsdoc, cli)'

        parameters:
          - name: 'metadata'
            type: 'YamlMetadata'
            description: 'Base metadata'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target format'

        returns:
          type: 'YamlMetadata'
          description: 'Metadata with environment overrides'

        custom-tags:
          private: 'true'
          format-aware: 'true'

      processResolvedMetadata:
        description: 'Process resolved metadata into JSDoc format'
        business-context: 'Transforms final metadata into JSDoc documentation'

        parameters:
          - name: 'metadata'
            type: 'YamlMetadata'
            description: 'Resolved metadata'
          - name: 'directiveType'
            type: 'string'
            description: 'Type of content to generate'

        returns:
          type: 'ProcessedMetadata'
          description: 'Processed metadata ready for JSDoc'

        custom-tags:
          private: 'true'
          transformer: 'true'

      extractJSDocTags:
        description: 'Extract JSDoc tags with dynamic property mapping'
        business-context: 'Maps YAML properties to JSDoc tags'

        parameters:
          - name: 'metadata'
            type: 'YamlMetadata'
            description: 'Metadata to extract from'

        returns:
          type: 'Record<string, string>'
          description: 'JSDoc tag mappings'

        custom-tags:
          private: 'true'
          mapper: 'Dynamic property mapping'

      extractExamples:
        description: 'Extract examples from YAML data'
        business-context: 'Processes example blocks from metadata'

        parameters:
          - name: 'metadata'
            type: 'YamlMetadata'
            description: 'Metadata containing examples'

        returns:
          type: 'Array<Example>'
          description: 'Extracted examples'

        custom-tags:
          private: 'true'
          extractor: 'true'

      buildStandardJSDoc:
        description: 'Build standard JSDoc content'
        business-context: 'Creates standard JSDoc block from metadata'

        parameters:
          - name: 'metadata'
            type: 'ProcessedMetadata'
            description: 'Processed metadata'

        returns:
          type: 'string'
          description: 'JSDoc block'

        custom-tags:
          private: 'true'
          builder: 'Standard format'

      buildCustomJSDoc:
        description: 'Build custom JSDoc with custom parameter'
        business-context: 'Creates customized JSDoc with special formatting'

        parameters:
          - name: 'metadata'
            type: 'ProcessedMetadata'
            description: 'Processed metadata'
          - name: 'customParam'
            type: 'string'
            description: 'Custom parameter'

        returns:
          type: 'string'
          description: 'Custom JSDoc block'

        custom-tags:
          private: 'true'
          builder: 'Custom format'

      buildEnvironmentJSDoc:
        description: 'Build environment-specific JSDoc'
        business-context: 'Creates JSDoc tailored for specific environment'

        parameters:
          - name: 'metadata'
            type: 'ProcessedMetadata'
            description: 'Processed metadata'
          - name: 'environment'
            type: 'string'
            description: 'Target environment'

        returns:
          type: 'string'
          description: 'Environment-specific JSDoc'

        custom-tags:
          private: 'true'
          builder: 'Environment-aware'

      replaceDirective:
        description: 'Replace directive in content with generated JSDoc'
        business-context: 'Substitutes directive markers with actual documentation'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Original content'
          - name: 'directive'
            type: 'DirectiveMatch'
            description: 'Directive to replace'
          - name: 'jsdoc'
            type: 'string'
            description: 'JSDoc to insert'

        returns:
          type: 'string'
          description: 'Content with replaced directive'

        custom-tags:
          private: 'true'
          replacer: 'true'

      extractPackageFromPath:
        description: 'Extract package name from file path'
        business-context: 'Determines package context from file location'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'

        returns:
          type: 'string'
          description: 'Package name'

        custom-tags:
          private: 'true'
          parser: 'Path parser'

      extractClassNameFromPath:
        description: 'Extract class name from file path'
        business-context: 'Determines class name from file naming'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'

        returns:
          type: 'string'
          description: 'Class name'

        custom-tags:
          private: 'true'
          parser: 'Path parser'

# === INTERFACES ===
interfaces:
  YamlMetadata:
    description: 'YAML metadata structure'
    business-context: 'Defines the structure of YAML metadata files'

    properties:
      - name: 'hierarchy'
        type: 'HierarchyConfig'
        description: 'Hierarchy configuration'
        optional: true

      - name: 'formats'
        type: 'FormatOverrides'
        description: 'Format-specific overrides'
        optional: true

      - name: 'methods'
        type: 'Record<string, any>'
        description: 'Method-specific metadata'
        optional: true

      - name: 'environment'
        type: 'Record<string, any>'
        description: 'Environment-specific metadata'
        optional: true

      - name: 'custom-tags'
        type: 'Record<string, string>'
        description: 'Custom JSDoc tags'
        optional: true

      - name: '[key: string]'
        type: 'any'
        description: 'Dynamic properties'

    custom-tags:
      flexible: 'true'
      extensible: 'true'

  ProcessedMetadata:
    description: 'Processed metadata ready for JSDoc'
    business-context: 'Intermediate format for JSDoc generation'

    properties:
      - name: 'jsdocTags'
        type: 'Record<string, string>'
        description: 'JSDoc tag mappings'

      - name: 'examples'
        type: 'Array<Example>'
        description: 'Code examples'

      - name: 'customTags'
        type: 'Record<string, string>'
        description: 'Custom tags'

  HierarchyConfig:
    description: 'Hierarchy configuration'
    business-context: 'Controls metadata inheritance behavior'

    properties:
      - name: 'strategy'
        type: "'merge' | 'replace' | 'append'"
        description: 'Merge strategy'

      - name: 'scope'
        type: 'string'
        description: 'Hierarchy scope identifier'

  Example:
    description: 'Code example structure'
    business-context: 'Represents a code example'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Example identifier'

      - name: 'code'
        type: 'string'
        description: 'Example code'

      - name: 'complexity'
        type: 'string'
        description: 'Complexity level'

# === EXAMPLES ===
examples:
  - id: 'complete-workflow'
    description: 'Complete metadata injection workflow'
    code: |
      // Initialize injector
      const injector = new YamlJSDocInjector('/project');

      // Process TypeScript declaration file
      const processed = await injector.processFile(
        'dist/domain-services/user-service.d.ts'
      );

      // Result includes hierarchical metadata:
      // - Global settings
      // - Package settings
      // - Class-level documentation
      // - Method-specific examples

      // Write processed content
      await fs.writeFile('dist/documented.d.ts', processed);
