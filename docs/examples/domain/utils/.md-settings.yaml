# Package Settings - Utils Package

# === PACKAGE IDENTITY ===
package-name: 'utils'
display-name: 'DDD Utils'
description: 'Core utility functions and helper classes for DDD patterns'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'infrastructure'
complexity: 'beginner'
patterns:
  - 'utility-pattern'
  - 'result-pattern'
  - 'value-object-helpers'
  - 'validation-helpers'

# === PACKAGE DEFAULTS ===
author: 'VytchesDDD Team'
since: '1.0.0'
category: 'utilities'

# === JSDOC CONFIGURATION ===
jsdoc:
  placement-strategy: 'separate'
  class-documentation: 'enabled'
  constructor-documentation: 'enabled'

  class-defaults:
    description: 'Utility function for DDD implementation'
    business-context: 'Infrastructure support for domain-driven design patterns'

# === PACKAGE EXPORTS ===
primary-exports:
  - 'LibUtils'
  - 'Result'
  - 'safeRun'

# === DEPENDENCIES ===
dependencies:
  - 'uuid'

# === USAGE CONTEXTS ===
usage-contexts:
  - 'Entity ID generation and validation'
  - 'Value object validation helpers'
  - 'Result pattern implementation'
  - 'Safe error handling'
  - 'General utility functions'
