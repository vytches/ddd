# file-cache - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'file-cache'
title: 'FileCache - File Caching System'
description: 'Singleton file cache with metadata parsing and method-level caching'
business-context: 'Optimizes file I/O and metadata parsing for enhanced metadata system performance'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  CachedFile:
    description: 'Cached file representation with metadata'
    business-context: 'Stores file content and parsed metadata for performance'

    properties:
      - name: 'content'
        type: 'string'
        description: 'Raw file content'

      - name: 'parsedMetadata'
        type: 'MetadataParseResult'
        description: 'Parsed file-level metadata'
        optional: true

      - name: 'parsedMethods'
        type: 'Map<string, MetadataParseResult>'
        description: 'Method-specific metadata cache'
        optional: true

      - name: 'lastModified'
        type: 'number'
        description: 'File modification timestamp'

      - name: 'size'
        type: 'number'
        description: 'File size in bytes'

# === CLASSES ===
classes:
  FileCache:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Singleton file cache for enhanced metadata system performance'
      business-context: 'Reduces file I/O operations and parsing overhead through intelligent caching'

      formats:
        jsdoc:
          description: 'High-performance file cache with metadata parsing'
        cli:
          description: |
            ## FileCache

            Caching features:
            - Singleton pattern for global cache
            - File content caching
            - Parsed metadata caching
            - Method-level metadata caching
            - Pre-warming capabilities
            - Cache statistics and monitoring
            - Memory usage tracking
            - Smart invalidation

      custom-tags:
        since: '2.0.0'
        pattern: 'Singleton'
        performance: 'optimized'

    # Methods
    methods:
      getInstance:
        description: 'Get singleton instance of FileCache'
        business-context: 'Ensures single cache instance across application'

        returns:
          type: 'FileCache'
          description: 'Singleton cache instance'

        examples:
          - id: 'get-instance'
            code: |
              const cache = FileCache.getInstance();
              // Returns singleton instance

        custom-tags:
          static: 'true'
          pattern: 'singleton'

      getFileContent:
        description: 'Get file content with caching'
        business-context: 'Reduces file I/O by caching file contents'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to file'

        returns:
          type: 'Promise<string | null>'
          description: 'File content or null if not found'

        examples:
          - id: 'get-content'
            code: |
              const content = await cache.getFileContent('/path/to/file.yaml');

              // First call: reads from disk (cache miss)
              // Subsequent calls: returns from cache (cache hit)

        custom-tags:
          async: 'true'
          cached: 'true'

      getParsedMetadata:
        description: 'Get parsed metadata with caching'
        business-context: 'Caches parsed metadata to avoid repeated parsing'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'
          - name: 'parser'
            type: '(content: string) => MetadataParseResult'
            description: 'Parser function'

        returns:
          type: 'Promise<MetadataParseResult | null>'
          description: 'Parsed metadata or null'

        examples:
          - id: 'get-parsed'
            code: |
              const metadata = await cache.getParsedMetadata(
                '/path/to/metadata.yaml',
                content => parseYAML(content)
              );

              // Parser only called on cache miss
              // Subsequent calls return cached parsed result

        custom-tags:
          async: 'true'
          lazy: 'true'

      getMethodMetadata:
        description: 'Get method-specific metadata with caching'
        business-context: 'Caches individual method metadata for fine-grained access'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'parser'
            type: '(content: string, methodName: string) => MetadataParseResult | null'
            description: 'Method parser function'

        returns:
          type: 'Promise<MetadataParseResult | null>'
          description: 'Method metadata or null'

        examples:
          - id: 'get-method'
            code: |
              const methodMeta = await cache.getMethodMetadata(
                '/dist/aggregate-root.yaml',
                'commit',
                (content, method) => parseMethodMetadata(content, method)
              );

              // Caches per method for efficiency

        custom-tags:
          async: 'true'
          granular: 'true'

      preWarmClassFile:
        description: 'Pre-warm cache for entire class file'
        business-context: 'Optimizes batch operations by pre-loading all method metadata'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Class file path'
          - name: 'methodNames'
            type: 'string[]'
            description: 'Methods to pre-warm'
          - name: 'methodParser'
            type: '(content: string, methodName: string) => MetadataParseResult | null'
            description: 'Parser for methods'

        returns:
          type: 'Promise<void>'
          description: 'Completes when cache is warmed'

        examples:
          - id: 'pre-warm'
            code: |
              // Pre-warm all methods in a class
              await cache.preWarmClassFile(
                '/dist/repository.yaml',
                ['save', 'findById', 'delete', 'update'],
                parseMethodMetadata
              );

              // All methods now cached for fast access

        custom-tags:
          async: 'true'
          optimization: 'batch'

      clearFile:
        description: 'Clear cache for specific file'
        business-context: 'Invalidates cache when file changes'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File to clear from cache'

        examples:
          - id: 'clear-file'
            code: |
              cache.clearFile('/path/to/changed.yaml');
              // File will be re-read on next access

        custom-tags:
          invalidation: 'targeted'

      clear:
        description: 'Clear entire cache'
        business-context: 'Resets cache for testing or memory management'

        examples:
          - id: 'clear-all'
            code: |
              cache.clear();
              // All cached data removed

        custom-tags:
          invalidation: 'complete'

      getStats:
        description: 'Get cache statistics'
        business-context: 'Monitors cache performance and effectiveness'

        returns:
          type: 'object'
          description: 'Cache performance statistics'

        examples:
          - id: 'get-stats'
            code: |
              const stats = cache.getStats();

              console.log(stats);
              // {
              //   cacheSize: 45,
              //   hitRate: 0.92,
              //   hits: 460,
              //   misses: 40,
              //   reads: 40,
              //   parses: 120
              // }

              console.log(`Cache hit rate: ${stats.hitRate * 100}%`);

        custom-tags:
          monitoring: 'true'

      getMemoryUsage:
        description: 'Get memory usage'
        business-context: 'Tracks cache memory consumption'

        returns:
          type: 'number'
          description: 'Approximate memory usage in bytes'

        examples:
          - id: 'memory-usage'
            code: |
              const bytes = cache.getMemoryUsage();
              const mb = bytes / (1024 * 1024);

              console.log(`Cache using ${mb.toFixed(2)} MB`);

              if (mb > 100) {
                cache.clear(); // Clear if too large
              }

        custom-tags:
          monitoring: 'true'
          memory: 'true'

# === EXAMPLES ===
examples:
  - id: 'complete-workflow'
    description: 'Complete file cache workflow'
    code: |
      const cache = FileCache.getInstance();

      // Pre-warm cache for performance
      await cache.preWarmClassFile(
        '/dist/aggregates/aggregate-root.yaml',
        ['constructor', 'commit', 'apply', 'loadFromHistory'],
        (content, method) => parseMethodFromYAML(content, method)
      );

      // Fast access to cached methods
      const commitMeta = await cache.getMethodMetadata(
        '/dist/aggregates/aggregate-root.yaml',
        'commit',
        parseMethodFromYAML
      ); // Cache hit!

      // Monitor performance
      const stats = cache.getStats();
      console.log(`Hit rate: ${(stats.hitRate * 100).toFixed(1)}%`);
      console.log(`Cache size: ${stats.cacheSize} files`);

      // Memory management
      const memoryMB = cache.getMemoryUsage() / (1024 * 1024);
      if (memoryMB > 50) {
        console.log('Cache too large, clearing old entries...');
        // In real implementation, would clear LRU entries
        cache.clear();
      }
