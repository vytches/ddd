# jsdoc-output-adapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'jsdoc-output-adapter'
title: 'JsDocOutputAdapter - Pure JSDoc Formatting'
description: 'Pure JSDoc formatting adapter following single responsibility principle'
business-context: 'Transforms resolved metadata into JSDoc comment format without loading logic'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  JsDocOutputAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Pure JSDoc formatting adapter with no metadata loading logic'
      business-context: 'Follows single responsibility principle for clean JSDoc generation'

      formats:
        jsdoc:
          description: 'JSDoc output formatting adapter'
        cli:
          description: |
            ## JsDocOutputAdapter

            JSDoc formatting features:
            - Pure formatting logic
            - Standard tag generation
            - Custom tag support
            - Example block formatting
            - Single tag injection
            - Tag name mapping
            - Clean separation of concerns

      custom-tags:
        since: '2.0.0'
        pattern: 'Adapter'
        principle: 'Single Responsibility'

    # Methods
    methods:
      format:
        description: 'Format resolved metadata as JSDoc comment'
        business-context: 'Main public method for transforming metadata to JSDoc format'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata to format'

        returns:
          type: 'string'
          description: 'Complete JSDoc comment block'

        examples:
          - id: 'format-jsdoc'
            code: |
              const adapter = new JsDocOutputAdapter();

              const metadata: ResolvedMetadata = {
                description: 'Creates a new user entity',
                parameters: [
                  { name: 'data', type: 'UserData', description: 'User data' }
                ],
                returns: { type: 'User', description: 'Created user' },
                since: '1.0.0',
                examples: ['const user = createUser(data);']
              };

              const jsdoc = adapter.format(metadata);

              // Returns:
              // /**
              //  * Creates a new user entity
              //  * @param {UserData} data - User data
              //  * @returns {User} Created user
              //  * @since 1.0.0
              //  * @example
              //  * const user = createUser(data);
              //  */

        custom-tags:
          public: 'true'
          main: 'true'

      formatSingleTag:
        description: 'Format metadata as single-line JSDoc tag (for injection)'
        business-context: 'Creates individual JSDoc tags for incremental documentation building'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key'
          - name: 'value'
            type: 'string'
            description: 'Tag value'

        returns:
          type: 'string'
          description: 'Formatted JSDoc tag'

        examples:
          - id: 'single-tag'
            code: |
              const tag = adapter.formatSingleTag('since', '2.0.0');
              // Returns: '@since 2.0.0'

              const customTag = adapter.formatSingleTag('author', 'DDD Team');
              // Returns: '@author DDD Team'

              const deprecatedTag = adapter.formatSingleTag('deprecated', 'Use newMethod instead');
              // Returns: '@deprecated Use newMethod instead'

        custom-tags:
          public: 'true'
          formatter: 'true'

      formatExamples:
        description: 'Format examples as JSDoc @example blocks'
        business-context: 'Converts example code arrays into properly formatted JSDoc example sections'

        parameters:
          - name: 'examples'
            type: 'string[]'
            description: 'Array of example code strings'

        returns:
          type: 'string'
          description: 'Formatted @example blocks'

        examples:
          - id: 'format-examples'
            code: |
              const examples = [
                'const result = calculate(10, 20);',
                'const async = await processAsync(data);'
              ];

              const formatted = adapter.formatExamples(examples);

              // Returns:
              // @example
              // const result = calculate(10, 20);
              // 
              // @example
              // const async = await processAsync(data);

        custom-tags:
          public: 'true'
          formatter: 'true'

      addStandardTags:
        description: 'Add standard JSDoc tags from metadata'
        business-context: 'Processes standard JSDoc tags like @param, @returns, @throws'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata containing standard tags'

        returns:
          type: 'string[]'
          description: 'Array of formatted tag lines'

        custom-tags:
          private: 'true'
          processor: 'true'

      addCustomTags:
        description: 'Add custom tags from metadata'
        business-context: 'Handles non-standard metadata as custom JSDoc tags'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata containing custom tags'

        returns:
          type: 'string[]'
          description: 'Array of custom tag lines'

        custom-tags:
          private: 'true'
          processor: 'true'

      addExamples:
        description: 'Add example blocks from metadata'
        business-context: 'Processes example arrays into JSDoc @example sections'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata containing examples'

        returns:
          type: 'string[]'
          description: 'Array of example block lines'

        custom-tags:
          private: 'true'
          processor: 'true'

      getJSDocTagName:
        description: 'Map metadata keys to JSDoc tag names'
        business-context: 'Standardizes metadata keys to JSDoc conventions'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key'

        returns:
          type: 'string'
          description: 'JSDoc tag name'

        examples:
          - id: 'tag-mapping'
            code: |
              // Standard mappings
              getJSDocTagName('description')    // 'description'
              getJSDocTagName('parameters')     // 'param'
              getJSDocTagName('returns')        // 'returns'
              getJSDocTagName('throws')         // 'throws'
              getJSDocTagName('since')          // 'since'
              getJSDocTagName('deprecated')     // 'deprecated'
              getJSDocTagName('author')         // 'author'

        custom-tags:
          private: 'true'
          mapper: 'true'

      formatCustomTagName:
        description: 'Format custom tag name from metadata key'
        business-context: 'Converts camelCase or kebab-case keys to JSDoc custom tag format'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key'

        returns:
          type: 'string'
          description: 'Formatted custom tag name'

        examples:
          - id: 'custom-tag-format'
            code: |
              // Examples:
              formatCustomTagName('customTag')        // '@custom-tag'
              formatCustomTagName('documentation-url') // '@documentation-url'
              formatCustomTagName('complexityNote')    // '@complexity-note'
              formatCustomTagName('businessContext')   // '@business-context'

        custom-tags:
          private: 'true'
          formatter: 'true'

# === EXAMPLES ===
examples:
  - id: 'complete-formatting'
    description: 'Complete JSDoc formatting workflow'
    code: |
      const adapter = new JsDocOutputAdapter();

      // Resolved metadata from hierarchy
      const metadata: ResolvedMetadata = {
        description: 'Processes payment transaction with validation',
        parameters: [
          {
            name: 'payment',
            type: 'PaymentData',
            description: 'Payment information'
          },
          {
            name: 'options',
            type: 'ProcessOptions',
            description: 'Processing options',
            optional: true
          }
        ],
        returns: {
          type: 'Promise<PaymentResult>',
          description: 'Payment processing result'
        },
        throws: [
          {
            type: 'ValidationError',
            description: 'Invalid payment data'
          },
          {
            type: 'PaymentError',
            description: 'Payment processing failed'
          }
        ],
        since: '2.0.0',
        deprecated: 'Use processPaymentV2 instead',
        author: 'Payment Team',
        examples: [
          'const result = await processPayment(data);',
          'const result = await processPayment(data, { retry: true });'
        ],
        // Custom tags
        complexity: 'intermediate',
        pattern: 'transaction-script',
        'business-domain': 'payments'
      };

      const jsdoc = adapter.format(metadata);

      console.log(jsdoc);
      // Outputs complete JSDoc:
      // /**
      //  * Processes payment transaction with validation
      //  * @param {PaymentData} payment - Payment information
      //  * @param {ProcessOptions} [options] - Processing options
      //  * @returns {Promise<PaymentResult>} Payment processing result
      //  * @throws {ValidationError} Invalid payment data
      //  * @throws {PaymentError} Payment processing failed
      //  * @since 2.0.0
      //  * @deprecated Use processPaymentV2 instead
      //  * @author Payment Team
      //  * @complexity intermediate
      //  * @pattern transaction-script
      //  * @business-domain payments
      //  * @example
      //  * const result = await processPayment(data);
      //  * @example
      //  * const result = await processPayment(data, { retry: true });
      //  */
