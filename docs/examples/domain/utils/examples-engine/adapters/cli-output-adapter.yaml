# cli-output-adapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'cli-output-adapter'
title: 'CliOutputAdapter - CLI Output Formatting'
description: 'Pure CLI/markdown formatting adapter for metadata display'
business-context: 'Formats resolved metadata for command-line and markdown output'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CliOutputAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Pure CLI/markdown formatting adapter following single responsibility principle'
      business-context: 'Transforms resolved metadata into human-readable CLI and markdown formats'

      formats:
        jsdoc:
          description: 'CLI output formatting adapter'
        cli:
          description: |
            ## CliOutputAdapter

            CLI formatting features:
            - Markdown-based output formatting
            - Hierarchical section rendering
            - Example code formatting
            - Business context emphasis
            - Custom section support
            - Summary generation
            - Text enhancement for terminals

      custom-tags:
        since: '2.0.0'
        pattern: 'Adapter'
        principle: 'Single Responsibility'

    # Methods
    methods:
      format:
        description: 'Format resolved metadata as CLI/markdown output'
        business-context: 'Main public method for transforming metadata to display format'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata to format'

        returns:
          type: 'string'
          description: 'Formatted markdown output'

        examples:
          - id: 'format-output'
            code: |
              const adapter = new CliOutputAdapter();
              const output = adapter.format(resolvedMetadata);

              // Output includes:
              // # Method Name
              // Description...
              // ## Business Context
              // Context explanation...
              // ## Examples
              // Code examples...

        custom-tags:
          public: 'true'
          main: 'true'

      formatSummary:
        description: 'Format metadata as compact one-line summary'
        business-context: 'Creates concise summary for listing or quick reference'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata to summarize'

        returns:
          type: 'string'
          description: 'One-line summary'

        examples:
          - id: 'format-summary'
            code: |
              const summary = adapter.formatSummary(metadata);
              // Returns: "createUser - Creates new user with validation"

        custom-tags:
          public: 'true'
          compact: 'true'

      formatExamplesOnly:
        description: 'Format only examples section'
        business-context: 'Extracts and formats just the code examples'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata containing examples'

        returns:
          type: 'string'
          description: 'Formatted examples section'

        examples:
          - id: 'examples-only'
            code: |
              const examples = adapter.formatExamplesOnly(metadata);
              // Returns formatted code blocks with descriptions

        custom-tags:
          public: 'true'
          partial: 'true'

      addBusinessContext:
        description: 'Add business context section'
        business-context: 'Formats business-focused explanation'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata with context'

        returns:
          type: 'string'
          description: 'Business context section'

        custom-tags:
          private: 'true'
          section: 'business-context'

      addMetadataInfo:
        description: 'Add metadata information section'
        business-context: 'Includes technical metadata details'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata to display'

        returns:
          type: 'string'
          description: 'Metadata info section'

        custom-tags:
          private: 'true'
          section: 'metadata'

      addWarnings:
        description: 'Add warnings section'
        business-context: 'Highlights important warnings or caveats'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata with warnings'

        returns:
          type: 'string'
          description: 'Warnings section'

        custom-tags:
          private: 'true'
          section: 'warnings'

      addExamples:
        description: 'Add examples section'
        business-context: 'Formats code examples with proper markdown'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata with examples'

        returns:
          type: 'string'
          description: 'Examples section'

        custom-tags:
          private: 'true'
          section: 'examples'

      addCustomSections:
        description: 'Add custom sections from metadata'
        business-context: 'Handles dynamic custom sections'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata with custom sections'

        returns:
          type: 'string'
          description: 'Custom sections'

        custom-tags:
          private: 'true'
          dynamic: 'true'

      formatSectionTitle:
        description: 'Convert metadata key to readable section title'
        business-context: 'Transforms camelCase or kebab-case to Title Case'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to format'

        returns:
          type: 'string'
          description: 'Formatted section title'

        examples:
          - id: 'format-title'
            code: |
              // Examples:
              formatSectionTitle('performanceNote')   // "Performance Note"
              formatSectionTitle('validation-rules')  // "Validation Rules"
              formatSectionTitle('customField')        // "Custom Field"

        custom-tags:
          private: 'true'
          formatter: 'true'

      enhanceForCLI:
        description: "Enhance text for CLI display (convert literal \\n to actual newlines)"
        business-context: 'Processes text for optimal terminal display'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to enhance'

        returns:
          type: 'string'
          description: 'Enhanced text'

        examples:
          - id: 'enhance-text'
            code: |
              const enhanced = enhanceForCLI('Line 1\\nLine 2');
              // Returns text with actual newlines for terminal

        custom-tags:
          private: 'true'
          text-processor: 'true'

# === EXAMPLES ===
examples:
  - id: 'complete-formatting'
    description: 'Complete CLI output formatting'
    code: |
      const adapter = new CliOutputAdapter();

      const metadata: ResolvedMetadata = {
        description: 'Creates a new user entity',
        businessContext: 'Handles user registration flow',
        examples: [
          {
            id: 'basic',
            code: 'const user = createUser(data);',
            description: 'Basic usage'
          }
        ],
        warnings: ['Requires email validation'],
        since: '1.0.0'
      };

      const output = adapter.format(metadata);

      console.log(output);
      // Outputs formatted markdown:
      // # createUser
      // 
      // Creates a new user entity
      // 
      // ## Business Context
      // Handles user registration flow
      // 
      // ## Examples
      // 
      // ### Basic usage
      // ```typescript
      // const user = createUser(data);
      // ```
      // 
      // ## Warnings
      // - Requires email validation
      // 
      // ## Metadata
      // - Since: 1.0.0
