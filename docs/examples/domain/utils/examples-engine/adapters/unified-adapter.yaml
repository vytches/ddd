# unified-adapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'unified-adapter'
title: 'UnifiedAdapter - Clean Architecture Adapter'
description: 'Main facade implementing clean adapter pattern for metadata formatting'
business-context: 'Separates metadata loading from output formatting for flexible documentation generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  UnifiedAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Main facade implementing clean architecture pattern for metadata operations'
      business-context: 'Provides unified interface for metadata loading and multi-format output generation'

      formats:
        jsdoc:
          description: 'Unified adapter for flexible documentation generation'
        cli:
          description: |
            ## UnifiedAdapter

            Clean architecture features:
            - Separation of concerns (loading vs formatting)
            - Format-agnostic metadata handling
            - Performance optimization with caching
            - Batch processing capabilities
            - Format-specific overrides
            - Performance monitoring
            - Cache management

      custom-tags:
        since: '2.0.0'
        pattern: 'Facade'
        principle: 'Clean Architecture'

    # Methods
    methods:
      constructor:
        description: 'Creates UnifiedAdapter instance with optional base directory'
        business-context: 'Initializes metadata engine and format adapters'

        parameters:
          - name: 'baseDir'
            type: 'string'
            description: 'Base directory for metadata files'
            optional: true

        examples:
          - id: 'create-adapter'
            code: |
              const adapter = new UnifiedAdapter('/project/root');
              // Ready for metadata operations

      formatMetadata:
        description: 'Main entry point - load metadata and format for specific output'
        business-context: 'Demonstrates clean architecture by separating loading from formatting'

        parameters:
          - name: 'config'
            type: 'MetadataConfig'
            description: 'Metadata configuration'
          - name: 'format'
            type: 'OutputFormat'
            description: "Output format ('jsdoc' or 'cli')"

        returns:
          type: 'Promise<string | null>'
          description: 'Formatted output or null if not found'

        examples:
          - id: 'format-metadata'
            code: |
              const config: MetadataConfig = {
                packageName: 'aggregates',
                className: 'AggregateRoot',
                methodName: 'commit'
              };

              // Format as JSDoc
              const jsdoc = await adapter.formatMetadata(config, 'jsdoc');

              // Format as CLI/Markdown
              const cli = await adapter.formatMetadata(config, 'cli');

        custom-tags:
          async: 'true'
          main: 'true'

      formatAllMethodsMetadata:
        description: 'Batch process all methods in a class (performance optimization)'
        business-context: 'Efficiently processes multiple methods with shared context'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: 'className'
            type: 'string'
            description: 'Class name'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Output format'

        returns:
          type: 'Promise<Record<string, string | null>>'
          description: 'Map of method names to formatted output'

        examples:
          - id: 'batch-format'
            code: |
              const allMethods = await adapter.formatAllMethodsMetadata(
                'repositories',
                'BaseRepository',
                'jsdoc'
              );

              // Returns:
              // {
              //   'save': '/** JSDoc for save */',
              //   'findById': '/** JSDoc for findById */',
              //   'delete': '/** JSDoc for delete */'
              // }

        custom-tags:
          async: 'true'
          batch: 'true'
          performance: 'optimized'

      getRawMetadata:
        description: 'Get raw metadata without formatting (for debugging/testing)'
        business-context: 'Provides access to unformatted metadata for analysis'

        parameters:
          - name: 'config'
            type: 'MetadataConfig'
            description: 'Metadata configuration'

        returns:
          type: 'Promise<ResolvedMetadata | null>'
          description: 'Raw resolved metadata'

        examples:
          - id: 'get-raw'
            code: |
              const raw = await adapter.getRawMetadata({
                packageName: 'events',
                className: 'DomainEvent',
                methodName: 'getAggregateId'
              });

              console.log(raw);
              // Shows complete metadata hierarchy

        custom-tags:
          async: 'true'
          debug: 'true'

      formatSingleTag:
        description: 'Format single tag for injection (JSDoc specific)'
        business-context: 'Handles individual tag formatting for fine control'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Tag key'
          - name: 'value'
            type: 'string'
            description: 'Tag value'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Output format'

        returns:
          type: 'string'
          description: 'Formatted tag'

        examples:
          - id: 'format-tag'
            code: |
              const tag = adapter.formatSingleTag(
                'since',
                '2.0.0',
                'jsdoc'
              );
              // Returns: '@since 2.0.0'

              const cliTag = adapter.formatSingleTag(
                'warning',
                'Experimental feature',
                'cli'
              );
              // Returns: '⚠️ **Warning**: Experimental feature'

        custom-tags:
          formatter: 'true'

      formatExamplesOnly:
        description: 'Format only examples (useful for specific use cases)'
        business-context: 'Extracts and formats just the example sections'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Output format'

        returns:
          type: 'string'
          description: 'Formatted examples'

        examples:
          - id: 'examples-only'
            code: |
              const examples = adapter.formatExamplesOnly(
                resolvedMetadata,
                'jsdoc'
              );

              // Returns JSDoc @example blocks

        custom-tags:
          partial: 'true'

      getCacheStats:
        description: 'Get performance statistics'
        business-context: 'Monitors cache performance for optimization'

        returns:
          type: 'object'
          description: 'Cache statistics'

        examples:
          - id: 'cache-stats'
            code: |
              const stats = adapter.getCacheStats();

              console.log(stats);
              // {
              //   cacheSize: 150,
              //   hitRate: 0.85,
              //   hits: 425,
              //   misses: 75,
              //   reads: 120,
              //   parses: 45
              // }

        custom-tags:
          monitoring: 'true'

      clearCache:
        description: 'Clear cache for testing/performance monitoring'
        business-context: 'Manages cache lifecycle for testing and memory management'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Specific file to clear, or all if omitted'
            optional: true

        examples:
          - id: 'clear-cache'
            code: |
              // Clear specific file
              adapter.clearCache('/path/to/metadata.yaml');

              // Clear all cache
              adapter.clearCache();

        custom-tags:
          management: 'true'

      applyFormatOverrides:
        description: 'Apply format-specific overrides to metadata'
        business-context: "Handles format-specific metadata like 'description.jsdoc' vs 'description.cli'"

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Base metadata'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Target format'

        returns:
          type: 'ResolvedMetadata'
          description: 'Metadata with format-specific overrides applied'

        custom-tags:
          private: 'true'
          transformer: 'true'

# === TYPES ===
types:
  OutputFormat:
    description: 'Supported output format types'
    business-context: 'Defines available formatting options'

    values:
      - name: 'jsdoc'
        description: 'JSDoc format for TypeScript declarations'
      - name: 'cli'
        description: 'CLI/Markdown format for terminal display'

# === FUNCTIONS ===
functions:
  formatAsJSDoc:
    description: 'Create JSDoc formatted output from metadata config'
    business-context: 'Convenience function for JSDoc generation'

    parameters:
      - name: 'config'
        type: 'MetadataConfig'
        description: 'Metadata configuration'
      - name: 'baseDir'
        type: 'string'
        description: 'Base directory'
        optional: true

    returns:
      type: 'Promise<string | null>'
      description: 'JSDoc formatted output'

    examples:
      - id: 'format-jsdoc'
        code: |
          const jsdoc = await formatAsJSDoc({
            packageName: 'cqrs',
            className: 'CommandBus',
            methodName: 'execute'
          });

  formatAsCLI:
    description: 'Create CLI formatted output from metadata config'
    business-context: 'Convenience function for CLI output'

    parameters:
      - name: 'config'
        type: 'MetadataConfig'
        description: 'Metadata configuration'
      - name: 'baseDir'
        type: 'string'
        description: 'Base directory'
        optional: true

    returns:
      type: 'Promise<string | null>'
      description: 'CLI formatted output'

    examples:
      - id: 'format-cli'
        code: |
          const cli = await formatAsCLI({
            packageName: 'policies',
            className: 'PolicyBuilder',
            methodName: 'must'
          });

  formatAllMethodsAsJSDoc:
    description: 'Batch format all methods in a class as JSDoc'
    business-context: 'Efficient batch JSDoc generation'

    parameters:
      - name: 'packageName'
        type: 'string'
        description: 'Package name'
      - name: 'className'
        type: 'string'
        description: 'Class name'
      - name: 'baseDir'
        type: 'string'
        description: 'Base directory'
        optional: true

    returns:
      type: 'Promise<Record<string, string | null>>'
      description: 'Map of method names to JSDoc'

    examples:
      - id: 'batch-jsdoc'
        code: |
          const allJSDoc = await formatAllMethodsAsJSDoc(
            'validation',
            'SpecificationValidator'
          );

  formatAllMethodsAsCLI:
    description: 'Batch format all methods in a class as CLI'
    business-context: 'Efficient batch CLI output generation'

    parameters:
      - name: 'packageName'
        type: 'string'
        description: 'Package name'
      - name: 'className'
        type: 'string'
        description: 'Class name'
      - name: 'baseDir'
        type: 'string'
        description: 'Base directory'
        optional: true

    returns:
      type: 'Promise<Record<string, string | null>>'
      description: 'Map of method names to CLI output'

    examples:
      - id: 'batch-cli'
        code: |
          const allCLI = await formatAllMethodsAsCLI(
            'messaging',
            'OutboxProcessor'
          );

# === EXAMPLES ===
examples:
  - id: 'complete-workflow'
    description: 'Complete metadata workflow with clean architecture'
    code: |
      // 1. Initialize adapter
      const adapter = new UnifiedAdapter();

      // 2. Define metadata configuration
      const config: MetadataConfig = {
        packageName: 'aggregates',
        className: 'AggregateRoot',
        methodName: 'applyEvent'
      };

      // 3. Get raw metadata for analysis
      const raw = await adapter.getRawMetadata(config);
      console.log('Hierarchy:', raw?.hierarchy);

      // 4. Format for different outputs
      const jsdoc = await adapter.formatMetadata(config, 'jsdoc');
      const cli = await adapter.formatMetadata(config, 'cli');

      // 5. Check performance
      const stats = adapter.getCacheStats();
      console.log(`Cache hit rate: ${stats.hitRate * 100}%`);

      // 6. Clear cache if needed
      if (stats.cacheSize > 1000) {
        adapter.clearCache();
      }
