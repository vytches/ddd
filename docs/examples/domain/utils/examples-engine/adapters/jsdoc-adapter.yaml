# jsdoc-adapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'jsdoc-adapter'
title: 'JSDocAdapter - JSDoc Generation Adapter'
description: 'Adapter for generating and injecting JSDoc documentation from examples and metadata'
business-context: 'Bridges example extraction system with JSDoc generation for API documentation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  JSDocAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'JSDoc adapter implementing infrastructure service for JSDoc generation operations'
      business-context: 'Processes examples and metadata into JSDoc format for TypeScript declarations'

      formats:
        jsdoc:
          description: 'JSDoc generation and injection adapter'
        cli:
          description: |
            ## JSDocAdapter

            JSDoc generation features:
            - Example extraction and formatting
            - Description and business context retrieval
            - Enhanced metadata integration
            - Fallback content generation
            - Directive processing
            - Parameter-based injection
            - Hierarchical metadata support

      custom-tags:
        since: '2.0.0'
        implements: 'IJSDocAdapter'
        pattern: 'Adapter'

    # Methods
    methods:
      constructor:
        description: 'Creates JSDocAdapter instance'
        business-context: 'Initializes adapter with engine and enhanced metadata support'

        examples:
          - id: 'create-adapter'
            code: |
              const adapter = new JSDocAdapter();
              // Adapter ready for JSDoc generation

      getDescriptionForMethod:
        description: 'Get description for method from example files'
        business-context: 'Retrieves method description from documentation metadata'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method to get description for'
          - name: 'packageName'
            type: 'string'
            description: 'Package containing method'

        returns:
          type: 'Promise<string>'
          description: 'Method description'

        examples:
          - id: 'get-description'
            code: |
              const description = await adapter.getDescriptionForMethod(
                'createUser',
                'domain-services'
              );
              // Returns: "Creates a new user entity with validation"

        custom-tags:
          async: 'true'

      getBusinessContextForMethod:
        description: 'Get business context for method from example files'
        business-context: 'Retrieves business-focused explanation of method purpose'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'

        returns:
          type: 'Promise<string>'
          description: 'Business context description'

        examples:
          - id: 'get-context'
            code: |
              const context = await adapter.getBusinessContextForMethod(
                'processPayment',
                'payment-service'
              );
              // Returns business-focused explanation

        custom-tags:
          async: 'true'

      getEnhancedMetadataForMethod:
        description: 'Get enhanced metadata for method using Enhanced Metadata System with global settings hierarchy'
        business-context: 'Retrieves complete hierarchical metadata for comprehensive documentation'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: '_filePath'
            type: 'string'
            description: 'File path for context'

        returns:
          type: 'Promise<{ [key: string]: string } | null>'
          description: 'Enhanced metadata object'

        examples:
          - id: 'get-enhanced'
            code: |
              const metadata = await adapter.getEnhancedMetadataForMethod(
                'aggregate',
                'aggregates',
                '/dist/aggregate-root.d.ts'
              );

              // Returns hierarchical metadata:
              // - Global settings
              // - Package settings
              // - Class metadata
              // - Method-specific metadata

        custom-tags:
          async: 'true'
          hierarchical: 'true'

      getExampleForMethod:
        description: 'Get best example for method at specific layer'
        business-context: 'Selects optimal example based on layer and complexity preferences'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: 'layer'
            type: 'LayerType'
            description: 'Preferred layer'
            optional: true
          - name: 'complexity'
            type: 'ComplexityLevel'
            description: 'Preferred complexity'
            optional: true

        returns:
          type: 'Promise<string>'
          description: 'Formatted example code'

        examples:
          - id: 'get-example'
            code: |
              const example = await adapter.getExampleForMethod(
                'validateUser',
                'validation',
                'domain',
                'basic'
              );

              // Returns formatted JSDoc example

        custom-tags:
          async: 'true'
          implements: 'IJSDocAdapter.getExampleForMethod'

      injectIntoJSDoc:
        description: 'Inject examples into JSDoc comments'
        business-context: 'Embeds examples and metadata into existing JSDoc blocks'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code with JSDoc to enhance'
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'

        returns:
          type: 'Promise<string>'
          description: 'Code with injected documentation'

        examples:
          - id: 'inject-jsdoc'
            code: |
              const enhanced = await adapter.injectIntoJSDoc(
                originalCode,
                'createAggregate',
                'aggregates'
              );

              // JSDoc blocks now include examples and metadata

        custom-tags:
          async: 'true'
          implements: 'IJSDocAdapter.injectIntoJSDoc'

      processEnhancedBlocks:
        description: 'Process enhanced JSDoc blocks with metadata support'
        business-context: 'Handles special enhanced JSDoc blocks with YAML metadata'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'
          - name: 'methodName'
            type: 'string'
            description: 'Method name'

        returns:
          type: 'Promise<string | null>'
          description: 'Processed JSDoc block or null'

        custom-tags:
          async: 'true'
          enhanced: 'true'

      processInjectionDirectives:
        description: 'Process JSDoc directives in file using YAML metadata system'
        business-context: 'Handles injection markers and replaces with actual documentation'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code with directives'
          - name: 'filePath'
            type: 'string'
            description: 'File path for context'

        returns:
          type: 'Promise<string>'
          description: 'Processed code'

        examples:
          - id: 'process-directives'
            code: |
              const processed = await adapter.processInjectionDirectives(
                codeWithDirectives,
                '/dist/user-service.d.ts'
              );

              // Directives replaced with actual content

        custom-tags:
          async: 'true'
          implements: 'IJSDocAdapter.processInjectionDirectives'

      injectWithParameters:
        description: 'Enhanced injection with parameter support'
        business-context: 'Provides fine-grained control over injection with parameters'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code to process'
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: 'params'
            type: 'InjectionParams'
            description: 'Injection parameters'
            optional: true

        returns:
          type: 'Promise<string>'
          description: 'Processed code with injections'

        examples:
          - id: 'inject-params'
            code: |
              const enhanced = await adapter.injectWithParameters(
                code,
                'processOrder',
                'order-service',
                {
                  layer: 'service',
                  complexity: 'intermediate',
                  examples: 2
                }
              );

        custom-tags:
          async: 'true'
          parameterized: 'true'

      createFallbackExample:
        description: 'Create fallback example when no example found'
        business-context: 'Generates placeholder documentation when examples are missing'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'layer'
            type: 'LayerType'
            description: 'Target layer'
            optional: true

        returns:
          type: 'string'
          description: 'Fallback example content'

        custom-tags:
          private: 'true'
          fallback: 'true'

      generateFallbackContent:
        description: 'Generate fallback content based on method name and layer'
        business-context: 'Creates contextual placeholder content'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'layer'
            type: 'LayerType'
            description: 'Layer context'

        returns:
          type: 'string'
          description: 'Generated fallback content'

        custom-tags:
          private: 'true'
          generator: 'true'

      extractPackageFromPath:
        description: 'Extract package name from file path'
        business-context: 'Determines package context from file location'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path'

        returns:
          type: 'string | null'
          description: 'Package name or null'

        custom-tags:
          private: 'true'
          parser: 'true'

      findInjectionDirectives:
        description: 'Find all injection directives in code (enhanced to support any metadata key)'
        business-context: 'Locates all injection markers for processing'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code to search'

        returns:
          type: 'DirectiveMatch[]'
          description: 'Found directives'

        custom-tags:
          private: 'true'
          scanner: 'true'

      isClassDeclaration:
        description: 'Check if the JSDoc comment is for a class declaration'
        business-context: 'Identifies class-level documentation blocks'

        parameters:
          - name: 'context'
            type: 'string'
            description: 'Code context'

        returns:
          type: 'boolean'
          description: 'True if class declaration'

        custom-tags:
          private: 'true'
          detector: 'true'

      getGlobalMetadataForClass:
        description: 'Get global metadata for a class from Enhanced Metadata System'
        business-context: 'Retrieves class-level metadata from hierarchy'

        parameters:
          - name: 'className'
            type: 'string'
            description: 'Class name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'

        returns:
          type: 'Promise<object | null>'
          description: 'Class metadata'

        custom-tags:
          private: 'true'
          async: 'true'

      extractClassNameFromContext:
        description: 'Extract class name from surrounding context'
        business-context: 'Determines class name from code context'

        parameters:
          - name: 'context'
            type: 'string'
            description: 'Code context'

        returns:
          type: 'string | null'
          description: 'Class name or null'

        custom-tags:
          private: 'true'
          parser: 'true'

      extractMethodNameFromContext:
        description: 'Extract method name from surrounding context'
        business-context: 'Determines method name from code context'

        parameters:
          - name: 'context'
            type: 'string'
            description: 'Code context'

        returns:
          type: 'string | null'
          description: 'Method name or null'

        custom-tags:
          private: 'true'
          parser: 'true'

      getJSDocTagName:
        description: 'Map metadata keys to JSDoc tags'
        business-context: 'Converts metadata properties to JSDoc tag names'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key'

        returns:
          type: 'string'
          description: 'JSDoc tag name'

        custom-tags:
          private: 'true'
          mapper: 'true'

      capitalize:
        description: 'Capitalize first letter'
        business-context: 'Utility for text formatting'

        parameters:
          - name: 'str'
            type: 'string'
            description: 'String to capitalize'

        returns:
          type: 'string'
          description: 'Capitalized string'

        custom-tags:
          private: 'true'
          utility: 'true'

# === TYPES ===
types:
  InjectionParams:
    description: 'Parameters for injection with fine control'
    business-context: 'Configures injection behavior'

    properties:
      - name: 'layer'
        type: 'LayerType'
        description: 'Preferred documentation layer'
        optional: true

      - name: 'complexity'
        type: 'ComplexityLevel'
        description: 'Preferred complexity level'
        optional: true

      - name: 'examples'
        type: 'number'
        description: 'Number of examples to include'
        optional: true

  DirectiveMatch:
    description: 'Matched injection directive'
    business-context: 'Represents found directive marker'

    properties:
      - name: 'match'
        type: 'string'
        description: 'Full match text'

      - name: 'type'
        type: 'string'
        description: 'Directive type'

      - name: 'index'
        type: 'number'
        description: 'Position in text'
