# enhanced-jsdoc-adapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'enhanced-jsdoc-adapter'
title: 'EnhancedJSDocAdapter - Enhanced JSDoc Generation'
description: 'Adapter for converting extract blocks to JSDoc format'
business-context: 'Transforms enhanced metadata extract blocks into properly formatted JSDoc comments'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EnhancedJSDocAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enhanced JSDoc adapter for extract block formatting'
      business-context: 'Converts enhanced metadata extract blocks into JSDoc documentation'

      formats:
        jsdoc:
          description: 'Enhanced JSDoc block formatter'
        cli:
          description: |
            ## EnhancedJSDocAdapter

            Extract block formatting features:
            - Convert extract blocks to JSDoc
            - Method documentation generation
            - Tag name mapping
            - Complete JSDoc comment generation
            - Proper indentation handling
            - Multi-block aggregation

      custom-tags:
        since: '2.0.0'
        pattern: 'Adapter'
        purpose: 'Extract block formatting'

    # Methods
    methods:
      formatBlock:
        description: 'Convert extract block to JSDoc format'
        business-context: 'Transforms single extract block into JSDoc formatted string'

        parameters:
          - name: 'block'
            type: 'ExtractBlock'
            description: 'Extract block to format'

        returns:
          type: 'string'
          description: 'JSDoc formatted block'

        examples:
          - id: 'format-block'
            code: |
              const block: ExtractBlock = {
                id: 'createUser:domain:basic',
                content: 'const user = createUser(data);',
                metadata: {
                  description: 'Create user example',
                  complexity: 'basic'
                }
              };

              const formatted = adapter.formatBlock(block);
              // Returns JSDoc formatted example

        custom-tags:
          public: 'true'
          transformer: 'true'

      formatMethodDoc:
        description: 'Format multiple blocks for method documentation'
        business-context: 'Aggregates multiple extract blocks into complete method documentation'

        parameters:
          - name: 'blocks'
            type: 'ExtractBlock[]'
            description: 'Array of extract blocks'

        returns:
          type: 'string'
          description: 'Complete method JSDoc'

        examples:
          - id: 'format-method'
            code: |
              const blocks: ExtractBlock[] = [
                {
                  id: 'method:basic',
                  content: 'Basic example code',
                  metadata: { complexity: 'basic' }
                },
                {
                  id: 'method:advanced',
                  content: 'Advanced example code',
                  metadata: { complexity: 'advanced' }
                }
              ];

              const methodDoc = adapter.formatMethodDoc(blocks);
              // Returns complete JSDoc with all examples

        custom-tags:
          public: 'true'
          aggregator: 'true'

      getJSDocTagName:
        description: 'Map metadata keys to JSDoc tags'
        business-context: 'Converts metadata property names to standard JSDoc tag names'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key'

        returns:
          type: 'string'
          description: 'JSDoc tag name'

        examples:
          - id: 'map-tags'
            code: |
              // Standard mappings
              getJSDocTagName('description')      // '@description'
              getJSDocTagName('businessContext')  // '@summary'
              getJSDocTagName('since')            // '@since'
              getJSDocTagName('deprecated')       // '@deprecated'
              getJSDocTagName('customTag')        // '@custom-tag'

        custom-tags:
          private: 'true'
          mapper: 'true'

      generateJSDocComment:
        description: 'Generate complete JSDoc comment'
        business-context: 'Creates properly formatted JSDoc comment block with indentation'

        parameters:
          - name: 'blocks'
            type: 'ExtractBlock[]'
            description: 'Extract blocks to include'
          - name: 'indent'
            type: 'string'
            description: 'Indentation string'
            optional: true

        returns:
          type: 'string'
          description: 'Complete JSDoc comment block'

        examples:
          - id: 'generate-comment'
            code: |
              const blocks: ExtractBlock[] = [
                {
                  id: 'example1',
                  content: 'Example code',
                  metadata: {
                    description: 'Method description',
                    since: '1.0.0',
                    author: 'Team'
                  }
                }
              ];

              const comment = adapter.generateJSDocComment(blocks, '  ');

              // Returns:
              // /**
              //  * Method description
              //  * @since 1.0.0
              //  * @author Team
              //  * @example
              //  * Example code
              //  */

        custom-tags:
          public: 'true'
          generator: 'true'

# === EXAMPLES ===
examples:
  - id: 'complete-workflow'
    description: 'Complete extract block to JSDoc workflow'
    code: |
      const adapter = new EnhancedJSDocAdapter();

      // Extract blocks from enhanced metadata
      const blocks: ExtractBlock[] = [
        {
          id: 'aggregate:commit:basic',
          content: `
            const aggregate = new AggregateRoot({ id });
            aggregate.apply('EventCreated', { data });
            aggregate.commit(); // Commits pending events
          `,
          metadata: {
            description: 'Commits pending domain events',
            businessContext: 'Finalizes business transaction',
            since: '1.0.0',
            complexity: 'basic',
            domain: 'domain-modeling'
          }
        },
        {
          id: 'aggregate:commit:advanced',
          content: `
            // With event persistence
            const events = aggregate.getUncommittedEvents();
            await eventStore.save(events);
            aggregate.commit();
          `,
          metadata: {
            complexity: 'advanced',
            pattern: 'event-sourcing'
          }
        }
      ];

      // Generate complete JSDoc
      const jsdoc = adapter.generateJSDocComment(blocks, '    ');

      console.log(jsdoc);
      // Outputs properly formatted JSDoc with:
      // - Description and business context
      // - Standard tags (@since, etc.)
      // - Multiple @example blocks
      // - Proper indentation
