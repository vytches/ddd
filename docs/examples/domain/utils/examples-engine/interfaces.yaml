# interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'interfaces'
title: 'Example Engine Interfaces - Core Contracts'
description: 'Core interfaces defining the example extraction and documentation system'
business-context: 'Establishes contracts for example processing, validation, and documentation generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IExampleEngine:
    description: 'Core example extraction engine interface'
    business-context: 'Defines the main contract for example discovery and processing'

    methods:
      scanFolder:
        description: 'Scan a folder for example files with metadata extraction'
        business-context: 'Discovers documentation files for processing'

        parameters:
          - name: 'folderPath'
            type: 'string'
            description: 'Path to folder to scan'

        returns:
          type: 'Promise<ExampleFile[]>'
          description: 'Array of discovered example files'

      extractTaggedContent:
        description: 'Extract tagged content from example file'
        business-context: 'Retrieves specific tagged examples from documentation'

        parameters:
          - name: 'file'
            type: 'ExampleFile'
            description: 'File to extract from'
          - name: 'tag'
            type: 'string'
            description: 'Tag identifier'

        returns:
          type: 'Promise<ExtractedExample | null>'
          description: 'Extracted example or null'

      formatOutput:
        description: 'Format extracted content for specific output type'
        business-context: 'Transforms content for target output format'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Content to format'
          - name: 'outputType'
            type: 'OutputType'
            description: 'Target format'

        returns:
          type: 'string'
          description: 'Formatted content'

      getExamplesForMethod:
        description: 'Get examples for a specific method across all layers'
        business-context: 'Collects all available examples for a method'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'

        returns:
          type: 'Promise<ExtractedExample[]>'
          description: 'Array of examples'

      validateExample:
        description: 'Validate extracted example against layer rules'
        business-context: 'Ensures example quality and compliance'

        parameters:
          - name: 'example'
            type: 'ExtractedExample'
            description: 'Example to validate'

        returns:
          type: 'Promise<ValidationResult>'
          description: 'Validation result'

    custom-tags:
      since: '2.0.0'
      category: 'core'

  IJSDocAdapter:
    description: 'JSDoc-specific adapter interface'
    business-context: 'Handles JSDoc generation and injection for API documentation'

    methods:
      getExampleForMethod:
        description: 'Get best example for method at specific layer'
        business-context: 'Selects optimal example for JSDoc documentation'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name'
          - name: 'packageName'
            type: 'string'
            description: 'Package name'
          - name: 'layer'
            type: 'LayerType'
            description: 'Documentation layer'
            optional: true
          - name: 'complexity'
            type: 'ComplexityLevel'
            description: 'Complexity level'
            optional: true

        returns:
          type: 'Promise<string>'
          description: 'Formatted JSDoc example'

      injectIntoJSDoc:
        description: 'Inject examples into JSDoc comments'
        business-context: 'Embeds examples into existing JSDoc blocks'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Source code with JSDoc'
          - name: 'methodName'
            type: 'string'
            description: 'Method to inject for'
          - name: 'packageName'
            type: 'string'
            description: 'Package context'

        returns:
          type: 'Promise<string>'
          description: 'Code with injected examples'

      processInjectionDirectives:
        description: 'Process JSDoc directives using YAML metadata system'
        business-context: 'Handles special JSDoc injection markers from YAML'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code with directives'
          - name: 'filePath'
            type: 'string'
            description: 'File path for context'

        returns:
          type: 'Promise<string>'
          description: 'Processed code'

    custom-tags:
      since: '2.0.0'
      category: 'adapter'
      output: 'jsdoc'

  ICLIAdapter:
    description: 'CLI-specific adapter interface'
    business-context: 'Handles command-line documentation generation and display'

    methods:
      getCompleteExample:
        description: 'Get complete example file for package'
        business-context: 'Retrieves full example documentation for CLI display'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package to get example for'
          - name: 'framework'
            type: 'string'
            description: 'Framework context'
            optional: true

        returns:
          type: 'Promise<string>'
          description: 'Complete example content'

      generateDocumentation:
        description: 'Generate documentation with specified options'
        business-context: 'Creates formatted documentation for CLI output'

        parameters:
          - name: 'options'
            type: 'GenerationOptions'
            description: 'Generation configuration'

        returns:
          type: 'Promise<string>'
          description: 'Generated documentation'

      listExamples:
        description: 'List available examples for package'
        business-context: 'Provides overview of available documentation'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package to list examples for'
            optional: true

        returns:
          type: 'Promise<ExampleFile[]>'
          description: 'List of example files'

    custom-tags:
      since: '2.0.0'
      category: 'adapter'
      output: 'cli'

  IExampleValidator:
    description: 'Example validation engine interface'
    business-context: 'Ensures example quality, correctness, and best practices compliance'

    methods:
      validateExample:
        description: 'Validate example against layer-specific rules'
        business-context: 'Checks example compliance with layer requirements'

        parameters:
          - name: 'example'
            type: 'ExtractedExample'
            description: 'Example to validate'
          - name: 'rules'
            type: 'ExampleValidationRules'
            description: 'Validation rules to apply'

        returns:
          type: 'ValidationResult'
          description: 'Validation outcome'

      validateCompilation:
        description: 'Check if example compiles successfully'
        business-context: 'Ensures code examples are syntactically correct'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Code content to validate'

        returns:
          type: 'Promise<ValidationResult>'
          description: 'Compilation result'

      validateBestPractices:
        description: 'Validate example follows best practices'
        business-context: 'Ensures examples demonstrate recommended patterns'

        parameters:
          - name: 'example'
            type: 'ExtractedExample'
            description: 'Example to check'

        returns:
          type: 'ValidationResult'
          description: 'Best practices validation result'

    custom-tags:
      since: '2.0.0'
      category: 'validation'

  IFileScanner:
    description: 'File system operations interface'
    business-context: 'Handles file discovery and parsing for example extraction'

    methods:
      scanDirectory:
        description: 'Scan directory for markdown files'
        business-context: 'Discovers documentation files in filesystem'

        parameters:
          - name: 'path'
            type: 'string'
            description: 'Directory path to scan'

        returns:
          type: 'Promise<string[]>'
          description: 'Array of file paths'

      parseExampleFile:
        description: 'Read and parse example file'
        business-context: 'Loads and processes documentation file content'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to file'

        returns:
          type: 'Promise<ExampleFile>'
          description: 'Parsed example file'

      extractMetadata:
        description: 'Extract metadata from file headers'
        business-context: 'Retrieves structured metadata from documentation'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'File content'

        returns:
          type: "ExampleFile['metadata']"
          description: 'Extracted metadata'

    custom-tags:
      since: '2.0.0'
      category: 'filesystem'

# === EXAMPLES ===
examples:
  - id: 'implement-engine'
    description: 'Implementing IExampleEngine'
    code: |
      class CustomExampleEngine implements IExampleEngine {
        async scanFolder(folderPath: string): Promise<ExampleFile[]> {
          // Implementation
          const scanner = new FileScanner();
          const files = await scanner.scanDirectory(folderPath);
          return Promise.all(files.map(f => scanner.parseExampleFile(f)));
        }
        
        async extractTaggedContent(
          file: ExampleFile,
          tag: string
        ): Promise<ExtractedExample | null> {
          const extractor = new TagExtractor();
          return extractor.extract(file, tag);
        }
        
        formatOutput(content: string, outputType: OutputType): string {
          switch (outputType) {
            case 'jsdoc':
              return this.formatForJSDoc(content);
            case 'cli':
              return this.formatForCLI(content);
            case 'markdown':
              return content;
            default:
              return content;
          }
        }
        
        async getExamplesForMethod(
          methodName: string,
          packageName: string
        ): Promise<ExtractedExample[]> {
          // Collect from all layers
          const examples: ExtractedExample[] = [];
          // ... implementation
          return examples;
        }
        
        async validateExample(
          example: ExtractedExample
        ): Promise<ValidationResult> {
          const validator = new ExampleValidator();
          return validator.validateExample(example, defaultRules);
        }
      }

  - id: 'implement-jsdoc-adapter'
    description: 'Implementing IJSDocAdapter'
    code: |
      class JSDocAdapter implements IJSDocAdapter {
        constructor(private engine: IExampleEngine) {}
        
        async getExampleForMethod(
          methodName: string,
          packageName: string,
          layer?: LayerType,
          complexity?: ComplexityLevel
        ): Promise<string> {
          const examples = await this.engine.getExamplesForMethod(
            methodName,
            packageName
          );
          
          // Filter and select best match
          const filtered = examples.filter(ex => 
            (!layer || ex.layer === layer) &&
            (!complexity || ex.complexity === complexity)
          );
          
          const best = filtered[0] || examples[0];
          return best ? this.engine.formatOutput(best.content, 'jsdoc') : '';
        }
        
        async injectIntoJSDoc(
          code: string,
          methodName: string,
          packageName: string
        ): Promise<string> {
          const example = await this.getExampleForMethod(
            methodName,
            packageName
          );
          
          // Inject into JSDoc block
          return code.replace(
            /@example\\s*$/m,
            `@example\\n${example}`
          );
        }
        
        async processInjectionDirectives(
          code: string,
          filePath: string
        ): Promise<string> {
          // Process YAML-based directives
          // ... implementation
          return code;
        }
      }
