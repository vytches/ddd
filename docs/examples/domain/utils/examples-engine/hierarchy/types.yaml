# types - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'types'
title: 'Hierarchy Types - Metadata Resolution Types'
description: 'Core type definitions for hierarchical metadata resolution system'
business-context: 'Defines structure and contracts for metadata hierarchy and resolution'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === ENUMS ===
enums:
  MetadataLevel:
    description: 'Hierarchy levels for metadata resolution'
    business-context: 'Defines precedence order for metadata inheritance'

    values:
      - name: 'GLOBAL'
        value: '0'
        description: 'Global settings (docs/global-settings.md)'

      - name: 'PACKAGE'
        value: '1'
        description: 'Package settings (packages/[package]/.md-settings.md)'

      - name: 'CLASS'
        value: '2'
        description: 'Class metadata (docs/examples/domain/[package]/[class].md)'

      - name: 'METHOD'
        value: '3'
        description: 'Method metadata (docs/examples/domain/[package]/[class]/[method].md)'

      - name: 'INLINE'
        value: '4'
        description: 'Inline metadata (highest priority)'

# === TYPES ===
types:
  ResolutionStrategy:
    description: 'Strategy for combining metadata from different levels'
    business-context: 'Controls how metadata is inherited and merged'

    values:
      - name: 'merge'
        description: 'Combines content from lower levels (default)'
      - name: 'replace'
        description: 'Completely overrides content from lower levels'
      - name: 'append'
        description: 'Adds content to existing metadata'

# === INTERFACES ===
interfaces:
  MetadataSource:
    description: 'Single source of metadata in hierarchy'
    business-context: 'Represents one level of metadata with its resolution strategy'

    properties:
      - name: 'level'
        type: 'MetadataLevel'
        description: 'Hierarchy level of this source'

      - name: 'filePath'
        type: 'string'
        description: 'Path to metadata file'

      - name: 'metadata'
        type: 'Record<string, any>'
        description: 'Raw metadata content'

      - name: 'strategy'
        type: 'ResolutionStrategy'
        description: 'How to apply this metadata'

  ResolvedMetadata:
    description: 'Final resolved metadata after hierarchy processing'
    business-context: 'Complete metadata ready for formatting and output'

    properties:
      - name: 'description'
        type: 'string'
        description: 'Method/class description'

      - name: 'businessContext'
        type: 'string'
        description: 'Business-focused explanation'

      - name: 'examples'
        type: 'string[]'
        description: 'Code examples array'

      - name: 'author'
        type: 'string'
        description: 'Author information'
        optional: true

      - name: 'since'
        type: 'string'
        description: 'Version introduced'
        optional: true

      - name: 'tags'
        type: 'string[]'
        description: 'Additional tags'
        optional: true

      - name: 'warnings'
        type: 'string[]'
        description: 'Warning messages'
        optional: true

      - name: '[key: string]'
        type: 'any'
        description: 'Additional dynamic properties'

  HierarchyConfig:
    description: 'Configuration for metadata resolution'
    business-context: 'Specifies what metadata to resolve and in what format'

    properties:
      - name: 'packageName'
        type: 'string'
        description: 'Package to resolve'

      - name: 'className'
        type: 'string'
        description: 'Class to resolve'

      - name: 'methodName'
        type: 'string'
        description: 'Method to resolve'

      - name: 'format'
        type: "'jsdoc' | 'cli'"
        description: 'Output format'
        optional: true

  MetadataParseResult:
    description: 'Result of parsing metadata file'
    business-context: 'Contains parsed metadata and any errors encountered'

    properties:
      - name: 'metadata'
        type: 'Record<string, any>'
        description: 'Parsed metadata object'

      - name: 'strategy'
        type: 'ResolutionStrategy'
        description: 'Resolution strategy found'

      - name: 'errors'
        type: 'string[]'
        description: 'Parse errors if any'
        optional: true

  PerformanceMetrics:
    description: 'Performance metrics for monitoring'
    business-context: 'Tracks system performance for optimization'

    properties:
      - name: 'cacheHits'
        type: 'number'
        description: 'Number of cache hits'

      - name: 'cacheMisses'
        type: 'number'
        description: 'Number of cache misses'

      - name: 'filesProcessed'
        type: 'number'
        description: 'Files processed count'

      - name: 'totalTime'
        type: 'number'
        description: 'Total processing time'

      - name: 'averageTime'
        type: 'number'
        description: 'Average processing time'

# === EXAMPLES ===
examples:
  - id: 'hierarchy-resolution'
    description: 'Complete hierarchy resolution example'
    code: |
      // Metadata hierarchy example
      const sources: MetadataSource[] = [
        {
          level: MetadataLevel.GLOBAL,
          filePath: '/docs/global-settings.md',
          metadata: {
            author: 'DDD Team',
            since: '1.0.0'
          },
          strategy: 'merge'
        },
        {
          level: MetadataLevel.PACKAGE,
          filePath: '/packages/aggregates/.md-settings.md',
          metadata: {
            complexity: 'intermediate',
            domain: 'domain-modeling'
          },
          strategy: 'merge'
        },
        {
          level: MetadataLevel.CLASS,
          filePath: '/docs/examples/domain/aggregates/aggregate-root.md',
          metadata: {
            description: 'Base aggregate root',
            businessContext: 'Core DDD pattern'
          },
          strategy: 'merge'
        },
        {
          level: MetadataLevel.METHOD,
          filePath: '/docs/examples/domain/aggregates/aggregate-root/commit.md',
          metadata: {
            description: 'Commits pending events',
            examples: ['aggregate.commit();']
          },
          strategy: 'replace' // Method overrides description
        }
      ];

      // Resolution produces final metadata
      const resolved: ResolvedMetadata = {
        description: 'Commits pending events', // From METHOD (replace)
        businessContext: 'Core DDD pattern',   // From CLASS (merge)
        complexity: 'intermediate',            // From PACKAGE (merge)
        domain: 'domain-modeling',             // From PACKAGE (merge)
        author: 'DDD Team',                    // From GLOBAL (merge)
        since: '1.0.0',                        // From GLOBAL (merge)
        examples: ['aggregate.commit();']      // From METHOD
      };
