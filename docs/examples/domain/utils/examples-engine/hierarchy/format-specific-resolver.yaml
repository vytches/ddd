# format-specific-resolver - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'format-specific-resolver'
title: 'FormatSpecificResolver - Format-Specific Resolution'
description: 'Resolver for format-specific metadata overrides and formatting'
business-context: 'Handles different output formats (JSDoc vs CLI) with format-specific customization'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  FormatSpecificResolver:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Static class for format-specific metadata resolution and formatting'
      business-context: 'Enables different content for JSDoc vs CLI output through dot notation overrides'

      formats:
        jsdoc:
          description: 'Format-specific metadata resolver'
        cli:
          description: |
            ## FormatSpecificResolver

            Format-specific features:
            - Dot notation overrides (e.g., description.jsdoc)
            - JSDoc comment generation
            - CLI/Markdown formatting
            - Text enhancement for terminals
            - Custom tag formatting
            - Format-aware content selection

      custom-tags:
        since: '2.0.0'
        pattern: 'Static Utility'
        feature: 'Format Overrides'

    # Methods
    methods:
      resolveForFormat:
        description: 'Resolve metadata for specific output format (jsdoc vs cli)'
        business-context: 'Applies format-specific overrides using dot notation'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Base resolved metadata'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target format'

        returns:
          type: 'ResolvedMetadata'
          description: 'Format-specific metadata'

        examples:
          - id: 'format-resolution'
            code: |
              const metadata: ResolvedMetadata = {
                description: 'Default description',
                'description.jsdoc': 'Concise JSDoc description',
                'description.cli': '## Extended CLI Description\\n\\nWith markdown',
                businessContext: 'Default context',
                'businessContext.jsdoc': 'Brief context',
                'warning.jsdoc': 'JSDoc-only warning'
              };

              // Resolve for JSDoc
              const jsdoc = FormatSpecificResolver.resolveForFormat(metadata, 'jsdoc');
              // Result:
              // {
              //   description: 'Concise JSDoc description',
              //   businessContext: 'Brief context',
              //   warning: 'JSDoc-only warning'
              // }

              // Resolve for CLI
              const cli = FormatSpecificResolver.resolveForFormat(metadata, 'cli');
              // Result:
              // {
              //   description: '## Extended CLI Description\\n\\nWith markdown',
              //   businessContext: 'Default context'
              //   // No warning (JSDoc-only)
              // }

        custom-tags:
          static: 'true'
          public: 'true'

      enhanceForCLI:
        description: "Enhance text for CLI display (convert \\n to actual newlines)"
        business-context: 'Processes escaped newlines for proper terminal display'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to enhance'

        returns:
          type: 'string'
          description: 'Enhanced text'

        examples:
          - id: 'enhance-cli'
            code: |
              const text = 'Line 1\\nLine 2\\n\\nLine 3';
              const enhanced = FormatSpecificResolver.enhanceForCLI(text);

              // Returns text with actual newlines:
              // Line 1
              // Line 2
              //
              // Line 3

        custom-tags:
          private: 'true'
          static: 'true'

      formatAsJSDoc:
        description: 'Format metadata as JSDoc comment'
        business-context: 'Generates complete JSDoc comment block from metadata'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata to format'

        returns:
          type: 'string'
          description: 'JSDoc comment block'

        examples:
          - id: 'format-jsdoc'
            code: |
              const metadata: ResolvedMetadata = {
                description: 'Creates user entity',
                since: '2.0.0',
                author: 'DDD Team',
                deprecated: 'Use createUserV2',
                examples: ['const user = createUser(data);']
              };

              const jsdoc = FormatSpecificResolver.formatAsJSDoc(metadata);

              // Returns:
              // /**
              //  * Creates user entity
              //  * @since 2.0.0
              //  * @author DDD Team
              //  * @deprecated Use createUserV2
              //  * @example
              //  * const user = createUser(data);
              //  */

        custom-tags:
          static: 'true'
          public: 'true'

      formatCustomTag:
        description: 'Format custom tag name from key'
        business-context: 'Converts camelCase to kebab-case JSDoc tags'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Tag key'

        returns:
          type: 'string'
          description: 'Formatted tag name'

        examples:
          - id: 'format-tags'
            code: |
              // Examples:
              formatCustomTag('abc')              // '@abc'
              formatCustomTag('customTag')        // '@custom-tag'
              formatCustomTag('documentation-url') // '@documentation-url'
              formatCustomTag('complexityNote')    // '@complexity-note'
              formatCustomTag('businessContext')   // '@business-context'

        custom-tags:
          private: 'true'
          static: 'true'

      formatForCLI:
        description: 'Format metadata for CLI display'
        business-context: 'Generates markdown-formatted output for terminal display'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata to format'

        returns:
          type: 'string'
          description: 'CLI-formatted output'

        examples:
          - id: 'format-cli'
            code: |
              const metadata: ResolvedMetadata = {
                description: 'User management service',
                businessContext: 'Handles user lifecycle',
                warnings: ['Requires authentication'],
                examples: [
                  'const service = new UserService();',
                  'await service.createUser(data);'
                ],
                since: '2.0.0'
              };

              const cli = FormatSpecificResolver.formatForCLI(metadata);

              // Returns markdown:
              // # User Management Service
              //
              // User management service
              //
              // ## Business Context
              // Handles user lifecycle
              //
              // ## Warnings
              // - Requires authentication
              //
              // ## Examples
              //
              // ```typescript
              // const service = new UserService();
              // ```
              //
              // ```typescript
              // await service.createUser(data);
              // ```
              //
              // ## Metadata
              // - Since: 2.0.0

        custom-tags:
          static: 'true'
          public: 'true'

# === EXAMPLES ===
examples:
  - id: 'complete-format-workflow'
    description: 'Complete format-specific resolution workflow'
    code: |
      // Metadata with format-specific overrides
      const metadata: ResolvedMetadata = {
        // Base values (used if no override)
        description: 'Generic description for all formats',
        businessContext: 'Standard business context',
        
        // JSDoc-specific overrides
        'description.jsdoc': 'Concise technical description',
        'businessContext.jsdoc': 'Brief business value',
        'warning.jsdoc': 'Experimental API',
        
        // CLI-specific overrides
        'description.cli': |
          ## Comprehensive Description
          
          This is a detailed explanation with:
          - Bullet points
          - Multiple paragraphs
          - Rich formatting
        ,
        'businessContext.cli': |
          ### Business Value
          
          Extended business context with examples and scenarios...
        ,
        
        // Shared metadata
        since: '2.0.0',
        author: 'DDD Team',
        examples: [
          'const result = operation();',
          'await asyncOperation();'
        ]
      };

      // Generate JSDoc output
      const jsdocResolved = FormatSpecificResolver.resolveForFormat(metadata, 'jsdoc');
      const jsdocComment = FormatSpecificResolver.formatAsJSDoc(jsdocResolved);

      console.log('JSDoc Output:');
      console.log(jsdocComment);
      // Outputs concise JSDoc with technical focus

      // Generate CLI output
      const cliResolved = FormatSpecificResolver.resolveForFormat(metadata, 'cli');
      const cliOutput = FormatSpecificResolver.formatForCLI(cliResolved);

      console.log('\nCLI Output:');
      console.log(cliOutput);
      // Outputs rich markdown with extended explanations
