# Event Bus - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'event-bus'
title: 'Event Bus Type Definitions'
description: 'Core event bus type definitions for domain, integration, and audit events'
business-context: 'Provides strongly-typed event bus interfaces for different event categories in event-driven architecture'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  IDomainEventBus:
    description: 'Type alias for domain event bus interface'
    business-context: 'Handles domain events within bounded contexts for internal state changes'

    formats:
      jsdoc:
        description: 'Event bus for domain events'
      cli:
        description: |
          ## IDomainEventBus
          Type-safe interface for domain event handling:
          - Publishes events within bounded context
          - Maintains event ordering
          - Supports async/sync handlers

    custom-tags:
      since: '1.0.0'
      category: 'domain'
      extends: 'IEventBus<IDomainEvent>'

  IIntegrationEventBus:
    description: 'Type alias for integration event bus interface'
    business-context: 'Manages events that cross bounded context boundaries for system integration'

    formats:
      jsdoc:
        description: 'Event bus for integration events'
      cli:
        description: |
          ## IIntegrationEventBus
          Cross-boundary event communication:
          - Publishes events between bounded contexts
          - Ensures eventual consistency
          - Handles external system integration

    custom-tags:
      since: '1.0.0'
      category: 'integration'
      extends: 'IEventBus<IIntegrationEvent>'

  IAuditEventBus:
    description: 'Type alias for audit event bus interface'
    business-context: 'Captures and distributes audit trail events for compliance and monitoring'

    formats:
      jsdoc:
        description: 'Event bus for audit events'
      cli:
        description: |
          ## IAuditEventBus
          Compliance and audit trail management:
          - Records all significant system actions
          - Maintains immutable audit log
          - Supports regulatory compliance

    custom-tags:
      since: '1.0.0'
      category: 'audit'
      extends: 'IEventBus<IAuditEvent>'
