# event-discovery-plugin - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'event-discovery-plugin'
title: 'Event Discovery Plugin - Auto-Discovery for Event Handlers'
description: 'Plugin for automatic discovery and registration of event handlers'
business-context: 'Enables automatic DI registration of decorated event handlers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IHandlerDiscoveryPlugin:
    description: 'Contract for handler discovery plugin functionality'
    business-context: 'Standard interface for DI auto-discovery plugins'

    formats:
      jsdoc:
        description: 'Handler discovery plugin interface'
      cli:
        description: |
          ## IHandlerDiscoveryPlugin Interface
          Standard interface for plugins that discover and register
          handlers with the DI system.

    properties:
      - name: 'name'
        type: 'string'
        readonly: true
        description: 'Plugin name identifier'

    methods:
      isAvailable:
        description: 'Checks if plugin is available for use'
        business-context: 'Allows conditional plugin loading'

        returns:
          type: 'boolean'
          description: 'True if plugin can be used'

      discoverHandlers:
        description: 'Discovers handlers from assemblies'
        business-context: 'Main discovery method for auto-registration'

        parameters:
          - name: 'assemblies'
            type: 'unknown[]'
            optional: true
            description: 'Optional list of modules/assemblies to scan'

        returns:
          type: 'Promise<HandlerInfo[]> | HandlerInfo[]'
          description: 'Discovered handler information'

  HandlerInfo:
    description: 'Information about discovered handler'
    business-context: 'Metadata for registering discovered handlers'

    formats:
      jsdoc:
        description: 'Discovered handler metadata'
      cli:
        description: |
          ## HandlerInfo Interface
          Contains metadata about a discovered handler for
          registration with the DI system.

    properties:
      - name: 'type'
        type: 'string'
        description: 'Handler type identifier'
      - name: 'messageType'
        type: 'unknown'
        description: 'Message/event type handled'
      - name: 'handlerType'
        type: 'unknown'
        description: 'Handler class type'
      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional handler metadata'

# === CLASSES ===
classes:
  EventDiscoveryPlugin:
    class-doc:
      description: 'Auto-discovery plugin for event handlers with DI integration'
      business-context: 'Automatically discovers and registers @EventHandler classes'

      formats:
        jsdoc:
          description: 'Event handler auto-discovery plugin'
          business-context: 'Automatic DI registration for event handlers'
        cli:
          description: |
            ## EventDiscoveryPlugin Class
            Plugin that automatically discovers event handlers decorated
            with @EventHandler and registers them with the DI system.
          business-context: |
            Essential component for event handler auto-registration.
            Eliminates manual DI configuration for event handlers.

      implements: ['IHandlerDiscoveryPlugin']

      custom-tags:
        complexity: 'Simple'
        di-integration: 'Auto-discovery plugin'

    properties:
      - name: 'name'
        type: 'string'
        readonly: true
        value: "'Event'"
        description: 'Plugin identifier'

    methods:
      constructor:
        description: 'Creates new event discovery plugin instance'
        business-context: 'Initializes plugin for auto-discovery'

        examples:
          - id: 'basic'
            code: |
              const plugin = new EventDiscoveryPlugin();
              // Plugin ready for use with DI system

      isAvailable:
        description: 'Checks if events package and reflection are available'
        business-context: 'Validates plugin dependencies before use'

        returns:
          type: 'boolean'
          description: 'True if reflection metadata is available'

        custom-tags:
          dependency-check: 'Validates reflection capabilities'

        examples:
          - id: 'basic'
            code: |
              if (plugin.isAvailable()) {
                console.log('Event discovery plugin is ready');
              }

      discoverHandlers:
        description: 'Discovers all event handlers ready for DI registration'
        business-context: 'Main discovery method for scanning assemblies'

        parameters:
          - name: 'assemblies'
            type: 'unknown[]'
            optional: true
            description: 'Optional modules/assemblies to scan'

        returns:
          type: 'Promise<HandlerInfo[]>'
          description: 'List of discovered event handlers'

        custom-tags:
          async: 'Asynchronous operation'
          scanning: 'Assembly scanning for handlers'

        examples:
          - id: 'basic'
            code: |
              const handlers = await plugin.discoverHandlers();
              console.log(`Discovered ${handlers.length} event handlers`);

          - id: 'with-assemblies'
            code: |
              import * as userModule from './user-module';
              import * as orderModule from './order-module';

              const handlers = await plugin.discoverHandlers([
                userModule,
                orderModule
              ]);

      scanAssemblyForEventHandlers:
        description: 'Scans specific assembly/module for event handlers'
        business-context: 'Assembly-specific handler discovery'

        parameters:
          - name: 'assembly'
            type: 'unknown'
            description: 'Module or assembly to scan'

        returns:
          type: 'Promise<HandlerInfo[]>'
          description: 'Event handlers found in assembly'

        custom-tags:
          private: 'Internal method'
          scanning: 'Single assembly scanning'

        examples:
          - id: 'basic'
            code: |
              // Internal usage - scans single assembly
              const handlers = await this.scanAssemblyForEventHandlers(module);

      isEventHandlerClass:
        description: 'Checks if value is an event handler class'
        business-context: 'Type guard for event handler identification'

        parameters:
          - name: 'value'
            type: 'unknown'
            description: 'Value to check'

        returns:
          type: 'value is new (...args: unknown[]) => unknown'
          description: 'Type guard result'

        custom-tags:
          private: 'Internal method'
          type-guard: 'Event handler class validation'

      isEventHandlerPendingDIRegistration:
        description: 'Checks if class is marked for DI auto-registration'
        business-context: 'Identifies handlers ready for DI registration'

        parameters:
          - name: 'target'
            type: 'unknown'
            description: 'Handler class to inspect'

        returns:
          type: 'boolean'
          description: 'True if handler is pending DI registration'

        custom-tags:
          private: 'Internal method'
          reflection: 'Metadata inspection'

      getEventHandlerDIMetadata:
        description: 'Gets DI metadata from event handler class'
        business-context: 'Extracts DI configuration from decorated handlers'

        parameters:
          - name: 'target'
            type: 'unknown'
            description: 'Handler class to inspect'

        returns:
          type: 'DIHandlerMetadata | undefined'
          description: 'DI metadata or undefined if none exists'

        custom-tags:
          private: 'Internal method'
          metadata-extraction: 'DI configuration extraction'

# === CONSTANTS ===
constants:
  eventDiscoveryPlugin:
    description: 'Pre-configured event discovery plugin instance'
    business-context: 'Ready-to-use plugin instance for DI systems'

    formats:
      jsdoc:
        description: 'Event discovery plugin singleton'
      cli:
        description: |
          ## eventDiscoveryPlugin Constant
          Pre-configured instance of EventDiscoveryPlugin ready
          for immediate use with DI systems.

    type: 'EventDiscoveryPlugin'

    examples:
      - id: 'basic'
        code: |
          import { eventDiscoveryPlugin } from '@vytches/ddd-events';

          // Register with DI system
          VytchesDDD.registerDiscoveryPlugin(eventDiscoveryPlugin);
