# Unified Event Bus - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'unified-event-bus'
title: 'Unified Event Bus Implementation'
description: 'Consolidated event bus handling domain, integration, and audit events'
business-context: 'Provides unified event handling infrastructure with context-aware routing and flexible subscription patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  UnifiedEventHandler:
    description: 'Handler function type for processing events'
    business-context: 'Defines contract for event handler functions with async/sync support'

    formats:
      jsdoc:
        description: 'Event handler function signature'
      cli:
        description: |
          ## UnifiedEventHandler
          Flexible event handler supporting:
          - Synchronous and asynchronous processing
          - Type-safe event handling
          - Any event type (domain, integration, audit)

# === CLASSES ===
classes:
  UnifiedEventBus:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Unified event bus consolidating all event types with smart routing'
      business-context: 'Central event infrastructure replacing separate domain/integration/audit buses for simplified architecture'

      # Format-specific
      formats:
        jsdoc:
          description: 'Unified bus for all event types with context routing'
        cli:
          description: |
            ## UnifiedEventBus
            Consolidated event bus features:
            - Single bus for all event types
            - Context-aware event routing
            - Auto-discovery through decorators
            - Flexible subscription patterns
            - Aggregate convenience methods

      hierarchy:
        strategy: 'append'
        scope: 'class-doc'

      custom-tags:
        since: '1.0.0'
        extends: 'BaseEventBus<BaseEvent>'
        implements: 'IEventBus<BaseEvent>'
        pattern: 'Event Bus'

    # === CLASS HIERARCHY ===
    hierarchy:
      strategy: 'merge'
      scope: 'class'

    # Methods
    methods:
      constructor:
        description: 'Creates a new unified event bus'
        business-context: 'Initializes bus with auto-registration of decorated handlers'

        parameters:
          - name: 'options'
            type: 'BaseEventBusOptions'
            description: 'Configuration options for event bus'
            optional: true

        examples:
          - id: 'basic'
            code: |
              const bus = new UnifiedEventBus();
              // With options
              const bus = new UnifiedEventBus({
                enableLogging: true,
                maxRetries: 3
              });

      publish:
        description: 'Publish an event with automatic routing to appropriate handlers'
        business-context: 'Core publishing method with intelligent handler selection based on event type and context'

        parameters:
          - name: 'event'
            type: 'IDomainEvent | IIntegrationEvent | IAuditEvent'
            description: 'Event to publish (any type)'

        returns:
          type: 'Promise<void>'
          description: 'Promise resolving when all handlers complete'

        examples:
          - id: 'publish'
            code: |
              await bus.publish(new OrderCreatedEvent(orderData));
              await bus.publish(new UserRegisteredIntegrationEvent(userData));
              await bus.publish(new SystemAuditEvent(auditData));

        custom-tags:
          async: 'true'
          routing: 'automatic'

      publishEventsForAggregate:
        description: 'Convenience method to publish all events from an aggregate'
        business-context: 'Simplifies aggregate event publishing pattern with automatic commit'

        parameters:
          - name: 'aggregate'
            type: '{ getDomainEvents(): IDomainEvent[]; commit(): void; }'
            description: 'Aggregate with pending events'

        returns:
          type: 'Promise<void>'
          description: 'Promise resolving when all events are published'

        examples:
          - id: 'aggregate'
            code: |
              const order = new OrderAggregate();
              order.confirmOrder();
              order.shipOrder();
              // Publishes all events and commits
              await bus.publishEventsForAggregate(order);

        custom-tags:
          async: 'true'
          convenience: 'true'

      subscribe:
        description: 'Subscribe to events with flexible context filtering'
        business-context: 'Flexible subscription supporting type-based and context-based filtering'

        parameters:
          - name: 'eventType'
            type: 'string | Constructor<T>'
            description: 'Event type (class or string)'
          - name: 'handlerOrContext'
            type: 'UnifiedEventHandler<T> | string | string[]'
            description: 'Handler function, context string, or context array'
            optional: true
          - name: 'handler'
            type: 'UnifiedEventHandler<T>'
            description: 'Handler function (when second param is context)'
            optional: true

        examples:
          - id: 'subscribe'
            code: |
              // Simple subscription
              bus.subscribe(OrderCreatedEvent, async (event) => {
                console.log('Order created:', event);
              });

              // Context-specific subscription
              bus.subscribe(OrderCreatedEvent, 'order-context', async (event) => {
                // Only handles events from order-context
              });

              // Multiple contexts
              bus.subscribe(OrderCreatedEvent, ['order', 'inventory'], handler);

      subscribeToContext:
        description: 'Subscribe to events for specific context(s)'
        business-context: 'Context-based subscription for bounded context isolation'

        parameters:
          - name: 'contextId'
            type: 'string | string[] | undefined'
            description: 'Context ID(s) to filter events'
          - name: 'eventType'
            type: 'string | Constructor<T>'
            description: 'Event type to subscribe to'
          - name: 'handler'
            type: 'UnifiedEventHandler<T>'
            description: 'Handler function'

      registerHandler:
        description: 'Register a class-based handler'
        business-context: 'Support for class-based handlers with handle method'

        parameters:
          - name: 'eventType'
            type: 'string | Constructor<T>'
            description: 'Event type to handle'
          - name: 'handler'
            type: '{ handle(event: T): Promise<void> | void; }'
            description: 'Handler class with handle method'

        examples:
          - id: 'class-handler'
            code: |
              class OrderHandler {
                async handle(event: OrderCreatedEvent) {
                  // Process order
                }
              }
              bus.registerHandler(OrderCreatedEvent, new OrderHandler());

      unsubscribe:
        description: 'Unsubscribe from events'
        business-context: 'Clean up subscriptions to prevent memory leaks'

        parameters:
          - name: 'eventType'
            type: 'string | Constructor<BaseEvent>'
            description: 'Event type to unsubscribe from'
          - name: 'handler'
            type: 'UnifiedEventHandler<BaseEvent> | { handle(event: BaseEvent): Promise<void> | void; }'
            description: 'Handler to remove'

      publishMany:
        description: 'Publish multiple events concurrently'
        business-context: 'Batch publishing for performance optimization'

        parameters:
          - name: 'events'
            type: 'Array<IDomainEvent | IIntegrationEvent | IAuditEvent>'
            description: 'Array of events to publish'

        returns:
          type: 'Promise<void>'
          description: 'Promise resolving when all events are published'

        custom-tags:
          async: 'true'
          performance: 'optimized'

      getHandlersForEvent:
        description: 'Get handlers for a specific event with context filtering'
        business-context: 'Internal method for selecting appropriate handlers based on event type and context'

        parameters:
          - name: 'event'
            type: 'BaseEvent'
            description: 'Event to get handlers for'

        returns:
          type: 'UnifiedEventHandler<BaseEvent>[]'
          description: 'Array of matching event handlers'

        custom-tags:
          protected: 'true'
          filtering: 'context-aware'

      registerHandlerWithContext:
        description: 'Register handler with context filtering'
        business-context: 'Internal method for registering handlers with context-based filtering support'

        custom-tags:
          private: 'true'
          internal: 'true'

      shouldHandleEvent:
        description: 'Check if handler should receive event based on context filtering'
        business-context: 'Context filtering logic to determine handler eligibility'

        custom-tags:
          private: 'true'
          filtering: 'context-based'

      executeHandlers:
        description: 'Execute handlers for an event (overrides base class)'
        business-context: 'Core execution method with middleware pipeline integration'

        parameters:
          - name: 'event'
            type: 'BaseEvent'
            description: 'Event to process'
          - name: 'handlers'
            type: 'UnifiedEventHandler<BaseEvent>[]'
            description: 'Handlers to execute'

        returns:
          type: 'Promise<void>'
          description: 'Promise resolving when all handlers complete'

        custom-tags:
          protected: 'true'
          async: 'true'
          override: 'true'

      buildMiddlewarePipeline:
        description: 'Build middleware pipeline for handler execution'
        business-context: 'Constructs composed middleware chain for advanced event processing'

        custom-tags:
          private: 'true'
          pattern: 'Pipeline'
