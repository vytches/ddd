# Package Settings for Events - Inherits from global-settings.yaml

# === PACKAGE IDENTITY ===
package-name: 'events'
display-name: 'DDD Events'
description: 'Comprehensive event-driven architecture infrastructure'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'event-driven-architecture'
complexity: 'intermediate'
patterns:
  - 'event-bus'
  - 'event-sourcing'
  - 'domain-events'
  - 'integration-events'
  - 'audit-events'

# === PACKAGE DEFAULTS ===
author: 'Events Team'
since: '1.0.0'

# === FORMAT-SPECIFIC OVERRIDES ===
formats:
  jsdoc:
    description: 'Enterprise event-driven architecture for domain, integration, and audit events'
    business-context: 'Unified event infrastructure for complex distributed systems'
  cli:
    description: |
      ## DDD Events Package
      Complete event-driven architecture infrastructure:
      - Unified event bus for all event types
      - Domain, integration, and audit events
      - Context-aware routing and filtering
      - Auto-discovery through decorators
      - Middleware pipeline support

# === CUSTOM TAGS ===
custom-tags:
  category: 'architecture'
  maturity: 'stable'
  enterprise: 'true'