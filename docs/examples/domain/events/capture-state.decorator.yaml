# capture-state.decorator - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'capture-state.decorator'
title: 'CaptureState Decorator - Automatic State Snapshot Decorator'
description: 'Method decorator that automatically captures object state before method execution'
business-context: 'Enables automatic audit trails and state change tracking'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FUNCTIONS ===
functions:
  captureState:
    description: 'Method decorator that captures object state before method execution'
    business-context: 'Provides automatic state tracking for audit purposes'

    formats:
      jsdoc:
        description: 'Captures state before method execution'
        business-context: 'Automatic audit state capture'
      cli:
        description: |
          ## captureState Decorator
          Method decorator that automatically captures the current state
          of an object implementing IAuditable before method execution.
        business-context: |
          Essential for audit trails and compliance. Automatically captures
          state changes without manual intervention in business logic.

    generic-parameters:
      - name: 'T'
        constraint: 'IAuditable'
        description: 'Type must implement IAuditable interface'

    parameters:
      - name: 'conditionOrSpecification'
        type: 'ISpecification<T> | ((instance: T, args: any[]) => boolean)'
        optional: true
        description: 'Optional condition or specification for conditional capture'

    returns:
      type: 'MethodDecorator'
      description: 'Method decorator for state capture'

    custom-tags:
      decorator: 'Method decorator'
      audit: 'State capture mechanism'
      conditional: 'Supports conditional capture'

    examples:
      - id: 'basic'
        code: |
          class OrderAggregate implements IAuditable {
            private snapshot: any = null;
            
            saveSnapshot(): void {
              this.snapshot = { ...this };
            }
            
            getPreviousState(): any | null {
              return this.snapshot;
            }
            
            @captureState()
            updateStatus(status: OrderStatus): void {
              // State automatically captured before this method
              this.status = status;
            }
          }

      - id: 'conditional'
        code: |
          class PaymentAggregate implements IAuditable {
            @captureState((instance, args) => args[0] > 10000)
            processPayment(amount: number): void {
              // State captured only for large payments
              this.amount = amount;
            }
          }

      - id: 'specification'
        code: |
          class UserAggregate implements IAuditable {
            @captureState(new HighValueUserSpec())
            updateProfile(profile: UserProfile): void {
              // State captured based on specification
              this.profile = profile;
            }
          }
