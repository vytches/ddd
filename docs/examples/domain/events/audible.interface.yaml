# audible.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'audible.interface'
title: 'Auditable Interface - Contract for Audit Capabilities'
description: 'Core interface for objects that can maintain audit snapshots'
business-context: 'Enables state capture for audit trail functionality'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IAuditable:
    description: 'Contract for auditable functionality'
    business-context: 'Provides snapshot capabilities for audit decorators'

    formats:
      jsdoc:
        description: 'Enables audit state capture'
        business-context: 'Required for @captureState decorator'
      cli:
        description: |
          ## IAuditable Interface
          Contract for objects that can maintain audit state snapshots.
          Used by the @captureState decorator for automatic state tracking.
        business-context: |
          Essential interface for implementing audit trails in domain objects.
          Enables automatic capture of object state changes for compliance.

    methods:
      saveSnapshot:
        description: 'Saves current state as a snapshot'
        business-context: 'Used internally by @captureState decorator'

        returns:
          type: 'void'
          description: 'No return value, side effect operation'

        custom-tags:
          internal: 'Used by decorators'
          audit: 'State capture mechanism'

        examples:
          - id: 'basic'
            code: |
              class AuditableEntity implements IAuditable {
                private snapshot: any = null;
                
                saveSnapshot(): void {
                  this.snapshot = { ...this };
                }
              }

      getPreviousState:
        description: 'Gets previous state captured by saveSnapshot'
        business-context: 'Retrieves last captured state for comparison'

        returns:
          type: 'any | null'
          description: 'Previous state or null if no snapshot exists'

        custom-tags:
          audit: 'State retrieval mechanism'
          nullable: 'Returns null when no snapshot'

        examples:
          - id: 'basic'
            code: |
              const previousState = auditableEntity.getPreviousState();
              if (previousState) {
                console.log('State changed from:', previousState);
              }
