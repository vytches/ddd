# integration-event-interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'integration-event-interfaces'
title: 'Integration Event Interfaces - Contracts for Cross-Context Communication'
description: 'Core interfaces and types for integration events and cross-bounded context communication'
business-context: 'Enables decoupled communication between bounded contexts'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IIntegrationEventMetadata:
    description: 'Metadata interface for integration events with cross-context capabilities'
    business-context: 'Rich metadata for bounded context communication and routing'

    formats:
      jsdoc:
        description: 'Integration event metadata with routing'
        business-context: 'Cross-context communication metadata'
      cli:
        description: |
          ## IIntegrationEventMetadata Interface
          Comprehensive metadata for integration events including
          correlation tracking, context routing, and versioning.
        business-context: |
          Essential for bounded context communication and event routing.
          Provides complete tracking and versioning for integration events.

    properties:
      - name: 'eventId'
        type: 'string'
        optional: true
        description: 'Unique event identifier'
      - name: 'timestamp'
        type: 'Date'
        optional: true
        description: 'Event creation timestamp'
      - name: 'correlationId'
        type: 'string'
        optional: true
        description: 'Correlation ID for related events'
      - name: 'causationId'
        type: 'string'
        optional: true
        description: 'ID of event that caused this event'
      - name: 'schemaVersion'
        type: 'number'
        optional: true
        description: 'Event schema version for contract versioning'
      - name: 'sourceContext'
        type: 'string'
        optional: true
        description: 'Source bounded context'
      - name: 'targetContext'
        type: 'string'
        optional: true
        description: 'Target bounded context (optional)'
      - name: 'routingKey'
        type: 'string'
        optional: true
        description: 'Routing path (topic/channel)'
      - name: 'actor'
        type: 'IActor'
        optional: true
        description: 'Actor who performed the action'
      - name: 'priority'
        type: 'IntegrationEventPriority'
        optional: true
        description: 'Event processing priority'
      - name: 'retryCount'
        type: 'number'
        optional: true
        description: 'Number of retry attempts'
      - name: 'maxRetries'
        type: 'number'
        optional: true
        description: 'Maximum retry attempts allowed'
      - name: 'delay'
        type: 'number'
        optional: true
        description: 'Processing delay in milliseconds'
      - name: 'expiry'
        type: 'Date'
        optional: true
        description: 'Event expiry timestamp'
      - name: 'tags'
        type: 'string[]'
        optional: true
        description: 'Classification tags'

  IIntegrationEvent:
    description: 'Standard interface for integration events in cross-context communication'
    business-context: 'Core contract for all integration events between bounded contexts'

    formats:
      jsdoc:
        description: 'Integration event interface'
        business-context: 'Cross-context communication contract'
      cli:
        description: |
          ## IIntegrationEvent Interface
          Standard structure for integration events enabling
          communication between different bounded contexts.

    generic-parameters:
      - name: 'T'
        default: 'unknown'
        description: 'Event payload type'

    properties:
      - name: 'eventId'
        type: 'string'
        readonly: true
        description: 'Unique event identifier'
      - name: 'timestamp'
        type: 'Date'
        readonly: true
        description: 'Event creation timestamp'
      - name: 'eventType'
        type: 'string'
        readonly: true
        description: 'Event type identifier'
      - name: 'payload'
        type: 'T'
        readonly: true
        optional: true
        description: 'Event-specific data'
      - name: 'metadata'
        type: 'IIntegrationEventMetadata'
        readonly: true
        optional: true
        description: 'Integration event metadata'

# === ENUMS ===
enums:
  IntegrationEventPriority:
    description: 'Priority levels for integration event processing'
    business-context: 'Controls processing order and resource allocation'

    formats:
      jsdoc:
        description: 'Integration event processing priorities'
      cli:
        description: |
          ## IntegrationEventPriority Enum
          Defines processing priority levels for integration events.

    values:
      - name: 'LOW'
        value: "'LOW'"
        description: 'Low priority processing'
      - name: 'NORMAL'
        value: "'NORMAL'"
        description: 'Normal priority processing'
      - name: 'HIGH'
        value: "'HIGH'"
        description: 'High priority processing'
      - name: 'CRITICAL'
        value: "'CRITICAL'"
        description: 'Critical priority processing'

  IntegrationEventStatus:
    description: 'Status values for integration event processing'
    business-context: 'Tracks processing lifecycle of integration events'

    formats:
      jsdoc:
        description: 'Integration event processing status'
      cli:
        description: |
          ## IntegrationEventStatus Enum
          Tracks the processing status of integration events.

    values:
      - name: 'PENDING'
        value: "'PENDING'"
        description: 'Event is pending processing'
      - name: 'PROCESSING'
        value: "'PROCESSING'"
        description: 'Event is currently being processed'
      - name: 'COMPLETED'
        value: "'COMPLETED'"
        description: 'Event processing completed successfully'
      - name: 'FAILED'
        value: "'FAILED'"
        description: 'Event processing failed'
      - name: 'RETRYING'
        value: "'RETRYING'"
        description: 'Event is being retried after failure'
      - name: 'EXPIRED'
        value: "'EXPIRED'"
        description: 'Event has expired and will not be processed'
