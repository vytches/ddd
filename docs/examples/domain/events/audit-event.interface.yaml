# audit-event.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'audit-event.interface'
title: 'Audit Event Interfaces - Complete Audit System Contracts'
description: 'Core interfaces and types for enterprise audit system'
business-context: 'Comprehensive audit trail functionality for compliance'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === ENUMS ===
enums:
  AuditActionType:
    description: 'Enumeration of audit action type values'
    business-context: 'Standard CRUD operations plus security actions'

    formats:
      jsdoc:
        description: 'Audit action types for compliance'
      cli:
        description: |
          ## AuditActionType Enum
          Standardized action types for audit trail compliance.

    values:
      - name: 'CREATE'
        value: "'CREATE'"
        description: 'Resource creation action'
      - name: 'READ'
        value: "'READ'"
        description: 'Resource access action'
      - name: 'UPDATE'
        value: "'UPDATE'"
        description: 'Resource modification action'
      - name: 'DELETE'
        value: "'DELETE'"
        description: 'Resource deletion action'
      - name: 'ACCESS'
        value: "'ACCESS'"
        description: 'Resource access (login, authentication)'
      - name: 'PERMISSION'
        value: "'PERMISSION'"
        description: 'Permission or authorization changes'
      - name: 'OTHER'
        value: "'OTHER'"
        description: 'Custom or other actions'

  AuditStatus:
    description: 'Enumeration of audit status values'
    business-context: 'Operation outcome tracking for audit records'

    formats:
      jsdoc:
        description: 'Operation status for audit events'
      cli:
        description: |
          ## AuditStatus Enum
          Tracks success/failure status of audited operations.

    values:
      - name: 'SUCCESS'
        value: "'SUCCESS'"
        description: 'Operation completed successfully'
      - name: 'FAILURE'
        value: "'FAILURE'"
        description: 'Operation failed'
      - name: 'ATTEMPT'
        value: "'ATTEMPT'"
        description: 'Operation attempt (before completion)'

# === INTERFACES ===
interfaces:
  IAuditEventMetadata:
    description: 'Contract for audit event metadata functionality'
    business-context: 'Rich metadata for comprehensive audit trails'

    formats:
      jsdoc:
        description: 'Audit event metadata with enterprise features'
        business-context: 'Complete audit context and tracking'
      cli:
        description: |
          ## IAuditEventMetadata Interface
          Comprehensive metadata for enterprise audit events including
          correlation tracking, actor information, and operation context.

    properties:
      - name: 'eventId'
        type: 'string'
        optional: true
        description: 'Unique event identifier'
      - name: 'timestamp'
        type: 'Date'
        optional: true
        description: 'Event creation timestamp'
      - name: 'correlationId'
        type: 'string'
        optional: true
        description: 'Correlation ID for related events'
      - name: 'causationId'
        type: 'string'
        optional: true
        description: 'ID of event that caused this event'
      - name: 'actionType'
        type: 'AuditActionType | string'
        optional: true
        description: 'Type of action performed'
      - name: 'status'
        type: 'AuditStatus | string'
        optional: true
        description: 'Operation execution status'
      - name: 'sessionId'
        type: 'string'
        optional: true
        description: 'User session identifier'
      - name: 'ipAddress'
        type: 'string'
        optional: true
        description: 'Source IP address'
      - name: 'source'
        type: 'string'
        optional: true
        description: 'Operation source (UI, API, SYSTEM)'
      - name: 'severity'
        type: 'string'
        optional: true
        description: 'Audit importance level'
      - name: 'module'
        type: 'string'
        optional: true
        description: 'System module where operation occurred'
      - name: 'duration'
        type: 'number'
        optional: true
        description: 'Operation duration in milliseconds'
      - name: 'actor'
        type: 'IActor'
        optional: true
        description: 'Actor who performed the operation'
      - name: 'owner'
        type: 'IActor'
        optional: true
        description: 'Resource owner'
      - name: 'resourceId'
        type: 'string'
        optional: true
        description: 'Identifier of affected resource'
      - name: 'resourceType'
        type: 'string'
        optional: true
        description: 'Type of affected resource'
      - name: '_previousState'
        type: 'unknown'
        optional: true
        description: 'Previous state for audit purposes'

  IAuditEvent:
    description: 'Contract for audit event functionality'
    business-context: 'Core audit event structure for compliance systems'

    formats:
      jsdoc:
        description: 'Standard audit event interface'
        business-context: 'Enterprise audit event contract'
      cli:
        description: |
          ## IAuditEvent Interface
          Standard structure for all audit events in the system.
          Provides consistent format for compliance and monitoring.

    generic-parameters:
      - name: 'P'
        default: 'unknown'
        description: 'Payload type'

    properties:
      - name: 'eventType'
        type: 'string'
        description: 'Type identifier for the audit event'
      - name: 'payload'
        type: 'P'
        optional: true
        description: 'Event-specific data'
      - name: 'metadata'
        type: 'IAuditEventMetadata'
        optional: true
        description: 'Rich audit metadata'

  IDomainToAuditEventTransformer:
    description: 'Contract for domain to audit event transformer functionality'
    business-context: 'Converts domain events to audit events for compliance'

    formats:
      jsdoc:
        description: 'Transforms domain events to audit events'
      cli:
        description: |
          ## IDomainToAuditEventTransformer Interface
          Transforms domain events into structured audit events
          for compliance and monitoring systems.

    generic-parameters:
      - name: 'D'
        default: 'unknown'
        description: 'Domain event type'
      - name: 'A'
        default: 'unknown'
        description: 'Audit event payload type'

    methods:
      transform:
        description: 'Transforms domain event to audit event'
        business-context: 'Core transformation for audit trail creation'

        parameters:
          - name: 'domainEvent'
            type: 'D'
            description: 'Source domain event'
          - name: 'additionalMetadata'
            type: 'Partial<IAuditEventMetadata>'
            optional: true
            description: 'Optional additional metadata'

        returns:
          type: 'IAuditEvent<A>'
          description: 'Transformed audit event'

  IAuditEventFilter:
    description: 'Contract for audit event filter functionality'
    business-context: 'Controls which events are processed for auditing'

    formats:
      jsdoc:
        description: 'Filters audit events for processing'
      cli:
        description: |
          ## IAuditEventFilter Interface
          Determines which audit events should be processed
          based on business rules and compliance requirements.

    methods:
      shouldProcess:
        description: 'Determines if event should be processed'
        business-context: 'Applies filtering rules for audit processing'

        generic-parameters:
          - name: 'T'
            default: 'unknown'
            description: 'Event payload type'

        parameters:
          - name: 'event'
            type: 'IAuditEvent<T>'
            description: 'Audit event to check'

        returns:
          type: 'boolean'
          description: 'True if event should be processed'

  IAuditService:
    description: 'Contract for audit service functionality'
    business-context: 'Main service interface for audit system'

    formats:
      jsdoc:
        description: 'Primary audit service interface'
        business-context: 'Enterprise audit service contract'
      cli:
        description: |
          ## IAuditService Interface
          Main service interface for the audit system.
          Provides high-level audit recording and management.

    methods:
      record:
        description: 'Records an audit event'
        business-context: 'Persists audit events for compliance'

        generic-parameters:
          - name: 'T'
            default: 'unknown'
            description: 'Event payload type'

        parameters:
          - name: 'event'
            type: 'IAuditEvent<T>'
            description: 'Audit event to record'

        returns:
          type: 'Promise<void>'
          description: 'Resolves when event is recorded'

      recordAction:
        description: 'Creates and records audit event from action details'
        business-context: 'Convenience method for direct audit recording'

        parameters:
          - name: 'action'
            type: 'AuditActionType | string'
            description: 'Type of action performed'
          - name: 'resourceType'
            type: 'string'
            description: 'Type of affected resource'
          - name: 'resourceId'
            type: 'string'
            description: 'Identifier of affected resource'
          - name: 'data'
            type: 'unknown'
            optional: true
            description: 'Additional action data'
          - name: 'metadata'
            type: 'Partial<IAuditEventMetadata>'
            optional: true
            description: 'Optional audit metadata'

        returns:
          type: 'Promise<void>'
          description: 'Resolves when action is recorded'
