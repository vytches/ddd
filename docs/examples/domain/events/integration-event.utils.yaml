# integration-event.utils - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'integration-event.utils'
title: 'Integration Event Utils - Utility Functions for Integration Events'
description: 'Utility functions for creating, serializing, and validating integration events'
business-context: 'Convenient helpers for integration event operations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FUNCTIONS ===
functions:
  createIntegrationEvent:
    description: 'Creates integration event with auto-generated metadata'
    business-context: 'Convenient factory function for integration event creation'

    formats:
      jsdoc:
        description: 'Integration event factory function'
        business-context: 'Quick event creation with defaults'
      cli:
        description: |
          ## createIntegrationEvent Function
          Factory function that creates integration events with
          auto-generated IDs, timestamps, and schema versions.

    generic-parameters:
      - name: 'P'
        default: 'unknown'
        description: 'Payload type'

    parameters:
      - name: 'eventType'
        type: 'string'
        description: 'Event type identifier'
      - name: 'payload'
        type: 'P'
        description: 'Event payload data'
      - name: 'metadata'
        type: 'Partial<IIntegrationEventMetadata>'
        optional: true
        description: 'Optional additional metadata'

    returns:
      type: 'IIntegrationEvent<P>'
      description: 'Fully formed integration event'

    custom-tags:
      factory: 'Factory function'
      auto-generation: 'Generates ID and timestamp'

    examples:
      - id: 'basic'
        code: |
          const orderEvent = createIntegrationEvent(
            'OrderCreatedEvent',
            { orderId: '123', customerId: '456' }
          );

          console.log('Created event:', orderEvent.eventId);

      - id: 'with-metadata'
        code: |
          const userEvent = createIntegrationEvent(
            'UserRegisteredEvent',
            userData,
            {
              sourceContext: 'user-management',
              targetContext: 'email-service',
              correlationId: 'req-789'
            }
          );

      - id: 'typed'
        code: |
          interface ProductData {
            productId: string;
            name: string;
            price: number;
          }

          const productEvent = createIntegrationEvent<ProductData>(
            'ProductUpdatedEvent',
            { productId: '123', name: 'Widget', price: 99.99 }
          );

  serializeIntegrationEvent:
    description: 'Serializes integration event to JSON string'
    business-context: 'Prepares events for transmission across system boundaries'

    formats:
      jsdoc:
        description: 'Integration event serialization utility'
      cli:
        description: |
          ## serializeIntegrationEvent Function
          Safely serializes integration events to JSON format
          for transmission via message queues, HTTP, or other protocols.

    parameters:
      - name: 'event'
        type: 'IIntegrationEvent'
        description: 'Integration event to serialize'

    returns:
      type: 'string'
      description: 'JSON string representation of event'

    custom-tags:
      serialization: 'JSON serialization'
      transmission: 'Cross-system communication'

    examples:
      - id: 'basic'
        code: |
          const event = createIntegrationEvent('OrderCreated', orderData);
          const json = serializeIntegrationEvent(event);

          await messageQueue.publish('orders', json);

      - id: 'with-validation'
        code: |
          try {
            const serialized = serializeIntegrationEvent(event);
            console.log('Event serialized, size:', serialized.length);
            return serialized;
          } catch (error) {
            console.error('Serialization failed:', error);
            throw new IntegrationEventError('Invalid event structure');
          }

  deserializeIntegrationEvent:
    description: 'Deserializes JSON string to integration event'
    business-context: 'Reconstructs events received from external systems'

    formats:
      jsdoc:
        description: 'Integration event deserialization utility'
      cli:
        description: |
          ## deserializeIntegrationEvent Function
          Safely deserializes JSON strings back to integration
          event objects with validation and error handling.

    generic-parameters:
      - name: 'P'
        default: 'unknown'
        description: 'Expected payload type'

    parameters:
      - name: 'jsonString'
        type: 'string'
        description: 'JSON string to deserialize'

    returns:
      type: 'IIntegrationEvent<P>'
      description: 'Reconstructed integration event'

    throws:
      - type: 'Error'
        description: 'When JSON is invalid or malformed'

    custom-tags:
      deserialization: 'JSON deserialization'
      validation: 'Input validation'

    examples:
      - id: 'basic'
        code: |
          const json = '{"eventType":"OrderCreated","payload":{"orderId":"123"}}';
          const event = deserializeIntegrationEvent<OrderData>(json);

          console.log('Event type:', event.eventType);

      - id: 'message-handling'
        code: |
          messageQueue.subscribe('orders', async (message) => {
            try {
              const event = deserializeIntegrationEvent(message.body);
              await processIntegrationEvent(event);
            } catch (error) {
              console.error('Failed to deserialize event:', error);
              await sendToDeadLetter(message);
            }
          });

  validateIntegrationEvent:
    description: 'Validates integration event structure and required fields'
    business-context: 'Ensures event integrity before processing or transmission'

    formats:
      jsdoc:
        description: 'Integration event validation utility'
      cli:
        description: |
          ## validateIntegrationEvent Function
          Validates integration event structure, required fields,
          and metadata consistency for reliable processing.

    parameters:
      - name: 'event'
        type: 'IIntegrationEvent'
        description: 'Integration event to validate'

    returns:
      type: 'boolean'
      description: 'True if event is valid, false otherwise'

    custom-tags:
      validation: 'Event structure validation'
      integrity: 'Data integrity check'

    examples:
      - id: 'basic'
        code: |
          const event = createIntegrationEvent('OrderCreated', orderData);

          if (validateIntegrationEvent(event)) {
            await publishEvent(event);
          } else {
            console.error('Invalid event structure');
          }

      - id: 'detailed-validation'
        code: |
          function safePublishEvent(event: IIntegrationEvent) {
            if (!validateIntegrationEvent(event)) {
              throw new ValidationError('Invalid integration event structure');
            }
            
            if (!event.eventType || !event.payload) {
              throw new ValidationError('Missing required event fields');
            }
            
            return publishEvent(event);
          }

  copyIntegrationEventWithMetadata:
    description: 'Creates copy of integration event with additional metadata'
    business-context: 'Enables event enrichment without mutation for routing and processing'

    formats:
      jsdoc:
        description: 'Integration event copying with metadata'
      cli:
        description: |
          ## copyIntegrationEventWithMetadata Function
          Creates immutable copy of integration event with
          additional or updated metadata for routing and context.

    generic-parameters:
      - name: 'P'
        default: 'unknown'
        description: 'Payload type'

    parameters:
      - name: 'event'
        type: 'IIntegrationEvent<P>'
        description: 'Original integration event'
      - name: 'metadata'
        type: 'Partial<IIntegrationEventMetadata>'
        description: 'Additional metadata to merge'

    returns:
      type: 'IIntegrationEvent<P>'
      description: 'New event with combined metadata'

    custom-tags:
      immutable: 'Creates new instance'
      metadata-enrichment: 'Enriches with routing info'

    examples:
      - id: 'basic'
        code: |
          const originalEvent = createIntegrationEvent('UserUpdated', userData);

          const enrichedEvent = copyIntegrationEventWithMetadata(
            originalEvent,
            {
              targetContext: 'notification-service',
              priority: IntegrationEventPriority.HIGH,
              routingKey: 'user.profile.updated'
            }
          );

      - id: 'context-routing'
        code: |
          // Route same event to multiple contexts with different metadata
          const baseEvent = createIntegrationEvent('OrderCompleted', orderData);

          const billingEvent = copyIntegrationEventWithMetadata(baseEvent, {
            targetContext: 'billing',
            routingKey: 'order.billing.complete'
          });

          const inventoryEvent = copyIntegrationEventWithMetadata(baseEvent, {
            targetContext: 'inventory',
            routingKey: 'order.inventory.complete'
          });
