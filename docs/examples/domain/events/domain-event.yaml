# domain-event - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'domain-event'
title: 'DomainEvent - Abstract Base Class for Domain Events'
description: 'Abstract base class providing common functionality for all domain events'
business-context: 'Foundation for domain-driven event architecture'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  DomainEvent:
    class-doc:
      description: 'Abstract base class for all domain events with common functionality'
      business-context: 'Foundation class for domain-driven event architecture'

      formats:
        jsdoc:
          description: 'Base class for domain events with metadata'
          business-context: 'Core domain event infrastructure'
        cli:
          description: |
            ## DomainEvent Class
            Abstract base class providing common functionality for all
            domain events including ID generation, timestamps, and metadata.
          business-context: |
            Essential foundation for domain-driven design event architecture.
            Provides consistent event structure and behavior across domains.

      implements: ['IExtendedDomainEvent<T>']
      abstract: true

      generic-parameters:
        - name: 'T'
          default: 'unknown'
          description: 'Type of event payload data'

      custom-tags:
        complexity: 'Medium'
        foundation: 'Base class for domain events'
        ddd-pattern: 'Domain event pattern'

    properties:
      - name: 'eventId'
        type: 'string'
        readonly: true
        description: 'Unique identifier for the event'
      - name: 'occurredOn'
        type: 'Date'
        readonly: true
        description: 'Timestamp when event occurred'
      - name: 'eventType'
        type: 'string'
        readonly: true
        description: 'Event type identifier (defaults to class name)'
      - name: 'payload'
        type: 'T | undefined'
        readonly: true
        optional: true
        description: 'Event-specific data payload'
      - name: 'metadata'
        type: 'IEventMetadata'
        readonly: true
        optional: true
        description: 'Additional event metadata'

    methods:
      constructor:
        description: 'Creates new domain event with auto-generated ID and timestamp'
        business-context: 'Initializes event with essential metadata'

        parameters:
          - name: 'payload'
            type: 'T'
            optional: true
            description: 'Event-specific data'
          - name: 'metadata'
            type: 'IEventMetadata'
            optional: true
            description: 'Optional additional metadata'

        custom-tags:
          auto-generation: 'Generates ID and timestamp automatically'

        examples:
          - id: 'basic'
            code: |
              class OrderCreatedEvent extends DomainEvent<OrderData> {
                constructor(orderData: OrderData) {
                  super(orderData, {
                    aggregateId: orderData.orderId,
                    aggregateType: 'Order',
                    version: 1
                  });
                }
              }

          - id: 'with-metadata'
            code: |
              class UserRegisteredEvent extends DomainEvent<UserData> {
                constructor(userData: UserData, correlationId?: string) {
                  super(userData, {
                    correlationId,
                    causationId: 'user-registration-flow',
                    actor: { id: 'system', type: 'service' }
                  });
                }
              }

      generateId:
        description: 'Generates unique identifier for the event'
        business-context: 'Provides consistent ID generation across events'

        returns:
          type: 'string'
          description: 'Unique event identifier (UUID)'

        custom-tags:
          static: 'Static method'
          protected: 'Protected method'
          id-generation: 'UUID generation'

        examples:
          - id: 'basic'
            code: |
              // Used internally by constructor
              const eventId = DomainEvent.generateId();
              console.log('Generated ID:', eventId); // UUID format

      withMetadata:
        description: 'Creates copy of event with additional metadata'
        business-context: 'Allows metadata enrichment without mutation'

        parameters:
          - name: 'metadata'
            type: 'Partial<IEventMetadata>'
            description: 'Metadata to merge with existing'

        returns:
          type: 'DomainEvent<T>'
          description: 'New event instance with combined metadata'

        custom-tags:
          immutable: 'Creates new instance'
          metadata-enrichment: 'Adds contextual information'

        examples:
          - id: 'basic'
            code: |
              const originalEvent = new OrderCreatedEvent(orderData);

              const enrichedEvent = originalEvent.withMetadata({
                correlationId: 'req-123',
                causationId: 'payment-completed-456',
                actor: { id: 'user-789', type: 'customer' }
              });

              // Original event unchanged, new event has combined metadata

          - id: 'pipeline'
            code: |
              const event = new UserUpdatedEvent(userData)
                .withMetadata({ correlationId: requestId })
                .withMetadata({ actor: currentUser })
                .withMetadata({ source: 'web-app' });

              // Fluent metadata enrichment
