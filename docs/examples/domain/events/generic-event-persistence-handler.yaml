# Generic Event Persistence Handler - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'generic-event-persistence-handler'
title: 'Generic Event Persistence Handler'
description: 'Abstract base class for implementing event persistence handlers'
business-context: 'Provides pluggable event persistence strategy for event sourcing infrastructure'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  GenericEventPersistenceHandler:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class for custom event persistence implementations'
      business-context: 'Enables pluggable persistence strategies for different event types in event sourcing'

      # Format-specific
      formats:
        jsdoc:
          description: 'Abstract event persistence handler with type-specific registration'
        cli:
          description: |
            ## GenericEventPersistenceHandler
            Extensible event persistence framework:
            - Type-specific handler registration
            - Pluggable persistence strategies
            - Version management abstraction
            - Event sourcing infrastructure support

      custom-tags:
        since: '1.0.0'
        abstract: 'true'
        implements: 'IEventPersistenceHandler'
        pattern: 'Strategy'

    # Methods
    methods:
      registerHandler:
        description: 'Register a persistence handler for a specific event type'
        business-context: 'Allows derived classes to register type-specific persistence logic'

        parameters:
          - name: 'eventType'
            type: 'string'
            description: 'The event type identifier to handle'
          - name: 'handler'
            type: '(payload: T) => Promise<number>'
            description: 'Handler function that persists the event and returns version'

        examples:
          - id: 'register'
            code: |
              class MyPersistenceHandler extends GenericEventPersistenceHandler {
                constructor() {
                  super();
                  this.registerHandler('OrderCreated', async (payload) => {
                    // Persist to database
                    const version = await db.saveEvent('OrderCreated', payload);
                    return version;
                  });
                }
              }

        custom-tags:
          protected: 'true'
          generic: 'T = unknown'

      handleEvent:
        description: 'Handle event persistence by delegating to registered type-specific handler'
        business-context: 'Core method that routes events to appropriate persistence handlers'

        parameters:
          - name: 'event'
            type: 'IDomainEvent'
            description: 'Domain event to persist'

        returns:
          type: 'Promise<number>'
          description: 'The version number after persistence'

        throws:
          - type: 'Error'
            description: 'When no handler is registered for the event type'

        examples:
          - id: 'handle'
            code: |
              const handler = new MyPersistenceHandler();
              const event = {
                eventType: 'OrderCreated',
                payload: { orderId: '123', amount: 100 }
              };
              const version = await handler.handleEvent(event);
              console.log('Persisted at version:', version);

        custom-tags:
          async: 'true'
          override: 'false'

      getCurrentVersion:
        description: 'Abstract method to get the current version of an aggregate'
        business-context: 'Template method for version retrieval, must be implemented by subclasses'

        parameters:
          - name: 'aggregateId'
            type: 'string | number'
            description: 'The aggregate identifier'

        returns:
          type: 'Promise<number | undefined>'
          description: "Current version or undefined if aggregate doesn't exist"

        examples:
          - id: 'implementation'
            code: |
              class SqlPersistenceHandler extends GenericEventPersistenceHandler {
                async getCurrentVersion(aggregateId: string | number): Promise<number | undefined> {
                  const result = await db.query(
                    'SELECT MAX(version) as version FROM events WHERE aggregate_id = ?',
                    [aggregateId]
                  );
                  return result[0]?.version;
                }
              }

        custom-tags:
          abstract: 'true'
          async: 'true'
