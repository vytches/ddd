# integration-event - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'integration-event'
title: 'IntegrationEvent - Base Class for Cross-Context Events'
description: 'Abstract base class for integration events with serialization and metadata support'
business-context: 'Foundation for cross-bounded context communication events'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  IntegrationEvent:
    class-doc:
      description: 'Abstract base class for integration events with cross-context capabilities'
      business-context: 'Foundation class for bounded context communication with serialization'

      formats:
        jsdoc:
          description: 'Base class for integration events'
          business-context: 'Cross-context communication foundation'
        cli:
          description: |
            ## IntegrationEvent Class
            Abstract base class providing common functionality for integration
            events including serialization, metadata, and cross-context routing.
          business-context: |
            Essential foundation for microservices and bounded context architecture.
            Enables consistent event structure and behavior across domain boundaries.

      implements: ['IIntegrationEvent<T>']
      abstract: true

      generic-parameters:
        - name: 'T'
          default: 'unknown'
          description: 'Type of event payload data'

      custom-tags:
        complexity: 'Medium'
        foundation: 'Base class for integration events'
        cross-context: 'Bounded context communication'
        serialization: 'JSON serialization support'

    properties:
      - name: 'eventId'
        type: 'string'
        readonly: true
        description: 'Unique identifier for the event'
      - name: 'timestamp'
        type: 'Date'
        readonly: true
        description: 'Event creation timestamp'
      - name: 'eventType'
        type: 'string'
        readonly: true
        description: 'Event type identifier (defaults to class name)'
      - name: 'payload'
        type: 'T | undefined'
        readonly: true
        optional: true
        description: 'Event-specific data payload'
      - name: 'metadata'
        type: 'IIntegrationEventMetadata'
        readonly: true
        optional: true
        description: 'Integration event metadata with routing info'

    methods:
      constructor:
        description: 'Creates new integration event with auto-generated ID and timestamp'
        business-context: 'Initializes event with integration-specific metadata'

        parameters:
          - name: 'payload'
            type: 'T'
            optional: true
            description: 'Event-specific data'
          - name: 'metadata'
            type: 'IIntegrationEventMetadata'
            optional: true
            description: 'Integration event metadata'

        custom-tags:
          auto-generation: 'Generates ID, timestamp, schema version'

        examples:
          - id: 'basic'
            code: |
              class OrderIntegrationEvent extends IntegrationEvent<OrderData> {
                constructor(orderData: OrderData) {
                  super(orderData, {
                    sourceContext: 'orders',
                    targetContext: 'inventory',
                    routingKey: 'order.created',
                    schemaVersion: 2
                  });
                }
              }

          - id: 'cross-context'
            code: |
              class CustomerUpdatedEvent extends IntegrationEvent<CustomerData> {
                constructor(customerData: CustomerData, correlationId?: string) {
                  super(customerData, {
                    sourceContext: 'customer-management',
                    correlationId,
                    priority: IntegrationEventPriority.HIGH,
                    actor: { id: 'system', type: 'service' }
                  });
                }
              }

      generateId:
        description: 'Generates unique identifier for the integration event'
        business-context: 'Provides consistent ID generation for cross-context tracking'

        returns:
          type: 'string'
          description: 'Unique event identifier (UUID)'

        custom-tags:
          static: 'Static method'
          protected: 'Protected method'
          id-generation: 'UUID generation'

        examples:
          - id: 'basic'
            code: |
              // Used internally by constructor
              const eventId = IntegrationEvent.generateId();
              console.log('Generated ID:', eventId); // UUID format

      withMetadata:
        description: 'Creates copy of event with additional metadata'
        business-context: 'Allows metadata enrichment for routing and context'

        parameters:
          - name: 'metadata'
            type: 'Partial<IIntegrationEventMetadata>'
            description: 'Metadata to merge with existing'

        returns:
          type: 'IntegrationEvent<T>'
          description: 'New event instance with combined metadata'

        custom-tags:
          immutable: 'Creates new instance'
          metadata-enrichment: 'Adds routing and context info'

        examples:
          - id: 'basic'
            code: |
              const originalEvent = new OrderIntegrationEvent(orderData);

              const enrichedEvent = originalEvent.withMetadata({
                targetContext: 'billing',
                priority: IntegrationEventPriority.HIGH,
                routingKey: 'order.high-value'
              });

              // Original event unchanged, new event has combined metadata

          - id: 'context-routing'
            code: |
              const event = new ProductUpdatedEvent(productData)
                .withMetadata({ sourceContext: 'catalog' })
                .withMetadata({ targetContext: 'inventory' })
                .withMetadata({ routingKey: 'product.updated' });

              // Fluent metadata enrichment for routing

      serialize:
        description: 'Serializes the event to JSON format'
        business-context: 'Enables event transmission across system boundaries'

        returns:
          type: 'string'
          description: 'Serialized event as JSON string'

        custom-tags:
          serialization: 'JSON serialization'
          cross-system: 'System boundary transmission'

        examples:
          - id: 'basic'
            code: |
              const event = new OrderIntegrationEvent(orderData);
              const json = event.serialize();

              // Send via message broker, HTTP, etc.
              await messageQueue.publish('orders', json);

          - id: 'with-validation'
            code: |
              try {
                const serialized = event.serialize();
                console.log('Event size:', serialized.length);
                return serialized;
              } catch (error) {
                console.error('Serialization failed:', error);
                throw new IntegrationEventError('Failed to serialize event');
              }

      deserialize:
        description: 'Deserializes JSON string to event instance'
        business-context: 'Reconstructs events received from external systems'

        generic-parameters:
          - name: 'E'
            description: 'Event class type'
          - name: 'P'
            description: 'Payload type'

        parameters:
          - name: 'EventClass'
            type: 'new (payload?: P, metadata?: IIntegrationEventMetadata) => E'
            description: 'Event class constructor'
          - name: 'jsonString'
            type: 'string'
            description: 'JSON string to deserialize'

        returns:
          type: 'E'
          description: 'Instance of the event class'

        custom-tags:
          static: 'Static method'
          deserialization: 'JSON deserialization'
          reconstruction: 'Event reconstruction'

        examples:
          - id: 'basic'
            code: |
              const json = '{"eventType":"OrderCreatedEvent","payload":{"orderId":"123"}}';
              const event = IntegrationEvent.deserialize(OrderIntegrationEvent, json);

              console.log('Reconstructed event:', event.eventType);

          - id: 'message-handling'
            code: |
              // Message queue consumer
              messageQueue.subscribe('orders', (message) => {
                try {
                  const event = IntegrationEvent.deserialize(
                    OrderIntegrationEvent, 
                    message.body
                  );
                  await processOrderEvent(event);
                } catch (error) {
                  console.error('Failed to deserialize event:', error);
                  await sendToDeadLetter(message);
                }
              });
