# Event Processor - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'event-processor'
title: 'Event Processor Interface'
description: 'Core interface for event processing in event-driven architecture'
business-context: 'Defines contract for processing domain events with potential side effects and event propagation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IEventProcessor:
    description: 'Contract for components that process domain events'
    business-context: 'Enables event-driven workflows by processing events and potentially publishing new events'

    formats:
      jsdoc:
        description: 'Event processor interface'
      cli:
        description: |
          ## IEventProcessor
          Core event processing contract:
          - Processes domain events asynchronously
          - Can trigger side effects
          - May publish new events to other buses

    properties:
      - name: 'process'
        type: 'method'
        description: 'Process a domain event with optional event bus access'

    methods:
      process:
        description: 'Processes a domain event and may publish resulting events'
        business-context: 'Core processing method for event-driven workflows and side effects'

        parameters:
          - name: 'event'
            type: 'IDomainEvent'
            description: 'The domain event to process'
          - name: 'eventBus'
            type: 'UnifiedEventBus'
            description: 'Optional unified event bus for publishing resulting events'
            optional: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when processing is complete'

        custom-tags:
          async: 'true'
          side-effects: 'possible'
