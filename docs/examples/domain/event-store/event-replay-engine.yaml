# EventReplayEngine - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'event-replay-engine'
title: 'EventReplayEngine - Advanced Event Replay System'
description: 'Comprehensive event replay engine with advanced filtering, session control, and batch processing capabilities'
business-context: 'Enterprise-grade event replay for projections, analytics, data migration, and event processing scenarios'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EventReplayEngine:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Advanced event replay engine providing comprehensive event processing capabilities with session control'
      business-context: 'Enterprise solution for event replay scenarios including projections, data migration, analytics, and system recovery'

      # Format-specific
      formats:
        jsdoc:
          description: 'Advanced event replay engine with filtering, batching, and session control'
        cli:
          description: |
            ## EventReplayEngine

            Comprehensive event replay system for enterprise applications.
            Provides advanced filtering, batch processing, session control, and progress monitoring.

      custom-tags:
        since: '1.0.0'
        pattern: 'Event Sourcing, Command Pattern, Observer Pattern'
        implements: 'IAdvancedEventReplay'
        use-case: 'Projections, analytics, data migration, system recovery'

    # Properties
    properties:
      - name: 'eventStore'
        type: 'IAdvancedEventStore'
        description: 'Advanced event store providing event reading capabilities'
        private: true
        readonly: true
        business-context: 'Source of events for replay operations'

      - name: 'logger'
        type: 'ILogger'
        description: 'Structured logger for replay operation tracking'
        private: true
        readonly: true
        business-context: 'Comprehensive logging for monitoring and debugging replay sessions'

      - name: 'activeSessions'
        type: 'Map<string, ReplaySession>'
        description: 'Registry of currently active replay sessions'
        private: true
        business-context: 'Session management for concurrent replay operations'

    # Methods
    methods:
      constructor:
        description: 'Creates a new event replay engine with advanced capabilities'
        business-context: 'Initializes the replay engine with event store integration and structured logging'

        parameters:
          - name: 'eventStore'
            type: 'IAdvancedEventStore'
            description: 'Advanced event store instance for reading events'

        examples:
          - id: 'basic'
            code: |
              const eventStore = new InMemoryEventStore();
              const replayEngine = new EventReplayEngine(eventStore);

          - id: 'production'
            code: |
              // Production setup with external event store
              const postgresEventStore = new PostgreSQLEventStore(connectionConfig);
              const replayEngine = new EventReplayEngine(postgresEventStore);

      replayFromStream:
        description: 'Replays events from a specific stream with optional filtering and configuration'
        business-context: 'Stream-specific replay for aggregate reconstruction, debugging, and analysis'

        parameters:
          - name: 'streamId'
            type: 'string'
            description: 'Unique identifier of the stream to replay events from'
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event handler function to process each replayed event'
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria to control which events are replayed'
            optional: true
          - name: 'config'
            type: 'IReplayConfig'
            description: 'Optional replay configuration for batching, timing, and behavior'
            optional: true

        returns:
          type: 'Promise<IReplayResult>'
          description: 'Promise resolving to comprehensive replay results with statistics and errors'

        examples:
          - id: 'stream-replay'
            code: |
              const result = await replayEngine.replayFromStream(
                'order-123',
                async (event) => {
                  console.log(`Processing event: ${event.eventType}`);
                  await processEvent(event);
                }
              );

              console.log(`Replayed ${result.eventsReplayed} events in ${result.duration}ms`);

          - id: 'filtered-stream-replay'
            code: |
              const result = await replayEngine.replayFromStream(
                'order-123',
                processOrderEvent,
                {
                  eventTypes: ['OrderCreated', 'OrderUpdated'],
                  fromStreamVersion: 5,
                  toStreamVersion: 20
                },
                {
                  batchSize: 50,
                  batchDelay: 100,
                  skipErrors: true
                }
              );

        custom-tags:
          stream-focused: 'Processes events from single stream'
          filtering: 'Supports comprehensive event filtering'
          error-handling: 'Configurable error handling strategies'

      replayAll:
        description: 'Replays events from all streams in chronological order with filtering capabilities'
        business-context: 'Global replay for building projections, analytics, and cross-aggregate processing'

        parameters:
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event handler function to process each replayed event'
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria for event selection across all streams'
            optional: true
          - name: 'config'
            type: 'IReplayConfig'
            description: 'Optional replay configuration for performance and behavior tuning'
            optional: true

        returns:
          type: 'Promise<IReplayResult>'
          description: 'Promise resolving to comprehensive replay results with performance metrics'

        examples:
          - id: 'full-replay'
            code: |
              const result = await replayEngine.replayAll(
                async (event) => {
                  await updateProjection(event);
                },
                {
                  fromTimestamp: startDate,
                  toTimestamp: endDate
                }
              );

          - id: 'projection-rebuild'
            code: |
              // Rebuild projections with specific event types
              const result = await replayEngine.replayAll(
                projectionHandler,
                {
                  eventTypes: ['OrderCreated', 'PaymentProcessed', 'InventoryUpdated'],
                  aggregateTypes: ['Order', 'Payment', 'Inventory']
                },
                {
                  batchSize: 200,
                  parallel: false,
                  reportProgress: true
                }
              );

        custom-tags:
          global-processing: 'Processes events across all streams'
          projections: 'Essential for projection rebuilding'
          analytics: 'Supports analytical processing'

      replayWithFilter:
        description: 'Replays events with custom filtering criteria and advanced configuration options'
        business-context: 'Flexible replay for custom scenarios requiring specific event selection'

        parameters:
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event handler function for processing matched events'
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Comprehensive filter criteria for event selection'
          - name: 'config'
            type: 'IReplayConfig'
            description: 'Optional replay configuration for behavior customization'
            optional: true

        returns:
          type: 'Promise<IReplayResult>'
          description: 'Promise resolving to detailed replay results with metrics and error information'

        examples:
          - id: 'custom-filter-replay'
            code: |
              const result = await replayEngine.replayWithFilter(
                customEventHandler,
                {
                  aggregateIds: ['order-123', 'order-456'],
                  eventTypes: ['OrderCreated', 'OrderCompleted'],
                  fromTimestamp: new Date('2024-01-01'),
                  maxEvents: 1000
                },
                {
                  batchSize: 100,
                  batchDelay: 50,
                  skipErrors: false,
                  reportProgress: true
                }
              );

        custom-tags:
          flexible-filtering: 'Supports complex filtering scenarios'
          custom-processing: 'Enables custom event processing logic'

      getEventsAsIterable:
        description: 'Returns an async iterable for streaming events matching filter criteria'
        business-context: 'Memory-efficient event streaming for large datasets and continuous processing'

        parameters:
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria for event selection'
            optional: true

        returns:
          type: 'AsyncIterable<IStoredEvent>'
          description: 'Async iterable yielding matching events on demand'

        examples:
          - id: 'stream-processing'
            code: |
              for await (const event of replayEngine.getEventsAsIterable({
                eventTypes: ['OrderCreated'],
                fromTimestamp: startDate
              })) {
                await processEvent(event);
                
                // Memory-efficient processing of large event streams
                if (shouldPause()) {
                  break;
                }
              }

          - id: 'real-time-analysis'
            code: |
              // Real-time event analysis
              const eventStream = replayEngine.getEventsAsIterable({
                aggregateTypes: ['Order', 'Payment']
              });

              for await (const event of eventStream) {
                await analytics.processEvent(event);
              }

        custom-tags:
          streaming: 'Memory-efficient event streaming'
          async-iteration: 'Supports async iteration patterns'
          large-datasets: 'Optimized for large event volumes'

      countEvents:
        description: 'Counts the total number of events matching the specified filter criteria'
        business-context: 'Planning and estimation for replay operations and resource allocation'

        parameters:
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria for counting events'
            optional: true

        returns:
          type: 'Promise<number>'
          description: 'Promise resolving to the total count of matching events'

        examples:
          - id: 'event-count'
            code: |
              const totalEvents = await replayEngine.countEvents();
              console.log(`Total events in store: ${totalEvents}`);

          - id: 'filtered-count'
            code: |
              const orderEvents = await replayEngine.countEvents({
                eventTypes: ['OrderCreated', 'OrderUpdated'],
                fromTimestamp: lastMonth
              });

              console.log(`Order events this month: ${orderEvents}`);

        custom-tags:
          planning: 'Replay planning and estimation'
          metrics: 'Event store metrics and statistics'

      estimateReplayDuration:
        description: 'Estimates the duration required to complete a replay operation based on configuration and event count'
        business-context: 'Resource planning and scheduling for replay operations in production environments'

        parameters:
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria for the replay to estimate'
            optional: true
          - name: 'config'
            type: 'IReplayConfig'
            description: 'Optional replay configuration affecting duration'
            optional: true

        returns:
          type: 'Promise<number>'
          description: 'Promise resolving to estimated duration in milliseconds'

        examples:
          - id: 'duration-estimation'
            code: |
              const estimatedDuration = await replayEngine.estimateReplayDuration(
                { eventTypes: ['OrderCreated'] },
                { batchSize: 100, batchDelay: 50 }
              );

              console.log(`Estimated duration: ${estimatedDuration / 1000} seconds`);

          - id: 'capacity-planning'
            code: |
              // Capacity planning for batch operations
              const scenarios = [
                { batchSize: 50, batchDelay: 100 },
                { batchSize: 200, batchDelay: 0 },
                { batchSize: 100, batchDelay: 50 }
              ];

              for (const config of scenarios) {
                const duration = await replayEngine.estimateReplayDuration(filter, config);
                console.log(`Config ${JSON.stringify(config)}: ${duration}ms`);
              }

        custom-tags:
          estimation: 'Duration and resource estimation'
          planning: 'Capacity planning for replay operations'

      startReplaySession:
        description: 'Starts a controllable replay session with pause, resume, and cancellation capabilities'
        business-context: 'Long-running replay operations requiring runtime control and monitoring'

        parameters:
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event handler function for processing events in the session'
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Optional filter criteria for event selection'
            optional: true
          - name: 'config'
            type: 'IReplayConfig'
            description: 'Optional replay configuration for session behavior'
            optional: true

        returns:
          type: 'Promise<IReplaySession>'
          description: 'Promise resolving to controllable replay session instance'

        examples:
          - id: 'controllable-session'
            code: |
              const session = await replayEngine.startReplaySession(
                eventHandler,
                { eventTypes: ['OrderCreated'] },
                { batchSize: 100, reportProgress: true }
              );

              // Monitor progress
              session.onProgress((progress) => {
                console.log(`Progress: ${progress.percentComplete}%`);
              });

              // Pause after 50% completion
              if (session.progress.percentComplete > 50) {
                await session.pause();
                await new Promise(resolve => setTimeout(resolve, 5000)); // Wait 5 seconds
                await session.resume();
              }

              // Wait for completion
              const result = await session.waitForCompletion();

          - id: 'error-handling-session'
            code: |
              const session = await replayEngine.startReplaySession(eventHandler);

              // Handle errors during replay
              session.onError(async (error, event) => {
                console.error(`Error processing event ${event.eventId}:`, error);
                // Return true to continue, false to stop
                return error.message.includes('transient');
              });

        custom-tags:
          session-control: 'Full session lifecycle management'
          monitoring: 'Real-time progress monitoring'
          error-handling: 'Advanced error handling and recovery'

      # Private methods (documented for completeness)
      executeReplay:
        description: 'Internal method executing replay operations with comprehensive error handling and progress tracking'
        business-context: 'Core replay execution logic with batch processing and progress reporting'

        parameters:
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event handler for processing events'
          - name: 'filter'
            type: 'IReplayFilter | undefined'
            description: 'Filter criteria for event selection'
          - name: 'config'
            type: 'Required<IReplayConfig>'
            description: 'Merged replay configuration with all defaults applied'
          - name: 'startTime'
            type: 'Date'
            description: 'Start time for performance tracking'

        returns:
          type: 'Promise<IReplayResult>'
          description: 'Promise resolving to comprehensive replay results'

        custom-tags:
          private: 'Internal implementation method'
          core-logic: 'Main replay execution logic'

      buildReadOptions:
        description: 'Builds event store read options from replay filter criteria'
        business-context: 'Translation layer between replay filters and event store query options'

        parameters:
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Replay filter to convert to read options'
            optional: true

        returns:
          type: 'Record<string, unknown>'
          description: 'Event store read options object'

        custom-tags:
          private: 'Internal implementation method'
          translation: 'Filter to options translation'

      matchesFilter:
        description: 'Determines if an event matches the specified filter criteria'
        business-context: 'Event filtering logic for complex replay scenarios'

        parameters:
          - name: 'event'
            type: 'IStoredEvent'
            description: 'Event to test against filter'
          - name: 'filter'
            type: 'IReplayFilter'
            description: 'Filter criteria to apply'
            optional: true

        returns:
          type: 'boolean'
          description: 'True if event matches filter, false otherwise'

        custom-tags:
          private: 'Internal implementation method'
          filtering: 'Event filtering logic'

      withTimeout:
        description: 'Adds timeout capability to promise-based operations'
        business-context: 'Prevents hanging operations during event processing'

        parameters:
          - name: 'promise'
            type: 'Promise<T>'
            description: 'Promise to add timeout to'
          - name: 'timeoutMs'
            type: 'number'
            description: 'Timeout duration in milliseconds'

        returns:
          type: 'Promise<T>'
          description: 'Promise that resolves or rejects based on timeout'

        custom-tags:
          private: 'Internal utility method'
          timeout: 'Operation timeout management'

      delay:
        description: 'Creates a delay promise for batch processing timing'
        business-context: 'Controls batch processing intervals to manage system load'

        parameters:
          - name: 'ms'
            type: 'number'
            description: 'Delay duration in milliseconds'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves after the specified delay'

        custom-tags:
          private: 'Internal utility method'
          timing: 'Batch processing timing control'

  ReplaySession:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Controllable replay session providing runtime control over long-running event replay operations'
      business-context: 'Session-based replay management for production scenarios requiring pause, resume, and cancellation'

      # Format-specific
      formats:
        jsdoc:
          description: 'Controllable replay session with pause/resume/cancel capabilities'
        cli:
          description: |
            ## ReplaySession

            Advanced replay session with full lifecycle control.
            Supports pause, resume, cancel operations with progress monitoring.

      custom-tags:
        since: '1.0.0'
        pattern: 'State Machine Pattern, Observer Pattern'
        implements: 'IReplaySession'
        use-case: 'Long-running replay operations, production maintenance'

    # Properties
    properties:
      - name: 'sessionId'
        type: 'string'
        description: 'Unique identifier for the replay session'
        readonly: true
        business-context: 'Session tracking and management identifier'

      - name: '_status'
        type: "'running' | 'paused' | 'completed' | 'failed' | 'cancelled'"
        description: 'Current session status state'
        private: true
        business-context: 'Session state management for lifecycle control'

      - name: '_progress'
        type: 'IReplayProgress'
        description: 'Current replay progress information'
        private: true
        business-context: 'Real-time progress tracking and reporting'

    # Methods
    methods:
      constructor:
        description: 'Creates a new controllable replay session with comprehensive configuration'
        business-context: 'Initializes session with full control capabilities and progress tracking'

        parameters:
          - name: 'sessionId'
            type: 'string'
            description: 'Unique session identifier'
          - name: 'eventStore'
            type: 'IAdvancedEventStore'
            description: 'Event store for reading events'
          - name: 'handler'
            type: 'ReplayEventHandler'
            description: 'Event processing handler'
          - name: 'filter'
            type: 'IReplayFilter | undefined'
            description: 'Optional event filter criteria'
          - name: 'config'
            type: 'Required<IReplayConfig>'
            description: 'Complete replay configuration'
          - name: 'logger'
            type: 'ILogger'
            description: 'Logger instance for session tracking'

      start:
        description: 'Starts the replay session and begins event processing'
        business-context: 'Initiates the replay operation with background processing'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when session startup completes'

        examples:
          - id: 'start-session'
            code: |
              const session = await replayEngine.startReplaySession(handler);
              await session.start();
              console.log(`Session ${session.sessionId} started`);

        custom-tags:
          lifecycle: 'Session lifecycle management'
          background: 'Starts background processing'

      pause:
        description: 'Pauses the replay session, stopping event processing temporarily'
        business-context: 'Temporary halt for maintenance, resource management, or manual intervention'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when session is paused'

        examples:
          - id: 'pause-session'
            code: |
              await session.pause();
              console.log('Session paused for maintenance');

        custom-tags:
          lifecycle: 'Session lifecycle management'
          control: 'Runtime session control'

      resume:
        description: 'Resumes a paused replay session, continuing event processing'
        business-context: 'Continues processing after maintenance or manual pause'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when session is resumed'

        examples:
          - id: 'resume-session'
            code: |
              await session.resume();
              console.log('Session resumed');

        custom-tags:
          lifecycle: 'Session lifecycle management'
          control: 'Runtime session control'

      cancel:
        description: 'Cancels the replay session, stopping all processing permanently'
        business-context: 'Permanent termination for error conditions or manual cancellation'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when session is cancelled'

        examples:
          - id: 'cancel-session'
            code: |
              await session.cancel();
              console.log('Session cancelled');

        custom-tags:
          lifecycle: 'Session lifecycle management'
          termination: 'Permanent session termination'

      waitForCompletion:
        description: 'Waits for the replay session to complete and returns the final result'
        business-context: 'Blocking wait for session completion with result retrieval'

        returns:
          type: 'Promise<IReplayResult>'
          description: 'Promise resolving to final replay results when session completes'

        throws:
          - type: 'Error'
            description: 'When session has not been started'

        examples:
          - id: 'wait-completion'
            code: |
              const session = await replayEngine.startReplaySession(handler);
              const result = await session.waitForCompletion();

              console.log(`Replay completed: ${result.eventsReplayed} events processed`);

        custom-tags:
          synchronization: 'Session completion synchronization'
          results: 'Result retrieval after completion'

      onProgress:
        description: 'Registers a progress handler to monitor replay progress in real-time'
        business-context: 'Real-time monitoring and reporting of replay progress for dashboards and alerts'

        parameters:
          - name: 'handler'
            type: 'ReplayProgressHandler'
            description: 'Function to call with progress updates'

        returns:
          type: '() => void'
          description: 'Unsubscribe function to remove the progress handler'

        examples:
          - id: 'progress-monitoring'
            code: |
              const unsubscribe = session.onProgress((progress) => {
                console.log(`Progress: ${progress.percentComplete}% (${progress.eventsPerSecond} events/sec)`);
                
                if (progress.percentComplete > 75) {
                  console.log('Replay nearly complete');
                }
              });

              // Later: unsubscribe();

        custom-tags:
          monitoring: 'Real-time progress monitoring'
          events: 'Event-driven progress updates'

      onError:
        description: 'Registers an error handler to manage errors during event processing'
        business-context: 'Error handling and recovery strategies for robust replay operations'

        parameters:
          - name: 'handler'
            type: 'ReplayErrorHandler'
            description: 'Function to handle errors and decide continuation'

        returns:
          type: '() => void'
          description: 'Unsubscribe function to remove the error handler'

        examples:
          - id: 'error-handling'
            code: |
              const unsubscribe = session.onError(async (error, event) => {
                console.error(`Error in event ${event.eventId}:`, error);
                
                // Log error and continue for transient errors
                if (error.message.includes('timeout') || error.message.includes('network')) {
                  await logError(error, event);
                  return true; // Continue processing
                }
                
                return false; // Stop processing for critical errors
              });

        custom-tags:
          error-handling: 'Advanced error handling and recovery'
          resilience: 'Error recovery strategies'

# === CONSTANTS ===
constants:
  DEFAULT_REPLAY_CONFIG:
    description: 'Default configuration values for event replay operations'
    business-context: 'Standard configuration providing balanced performance and reliability'

    value:
      batchSize: 100
      batchDelay: 0
      parallel: false
      maxWorkers: 4
      skipErrors: false
      eventTimeout: 30000
      reportProgress: true
      progressInterval: 1000

    custom-tags:
      configuration: 'Default replay settings'
      performance: 'Balanced performance configuration'
