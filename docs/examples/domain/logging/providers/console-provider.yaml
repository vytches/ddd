# Console Provider - Development-Friendly Console Logging

# === FILE METADATA ===
file-name: 'console-provider'
title: 'ConsoleProvider - Development and Production Console Logging'
description: 'Feature-rich console logging provider with formatting, colorization, and structured output options'
business-context: 'Versatile console logging provider supporting both development debugging with pretty formatting and production structured logging for log aggregation systems'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ConsoleProviderOptions:
    description: 'Configuration options for console output formatting and behavior'
    business-context: 'Flexible configuration supporting development debugging needs and production structured logging requirements'

    formats:
      jsdoc:
        description: 'Console provider configuration options'
      cli:
        description: |
          ## ConsoleProviderOptions Interface

          Configuration supporting:
          - **Colorization**: ANSI color support for development environments
          - **Format Control**: Pretty-print vs structured JSON output
          - **Stack Traces**: Optional error stack trace inclusion
          - **Environment Adaptation**: Different settings for dev vs production

    properties:
      - name: 'colorize'
        type: 'boolean'
        description: 'Enable ANSI color codes for log levels (default: true)'
        optional: true
        default: 'true'

      - name: 'prettyPrint'
        type: 'boolean'
        description: 'Use human-readable formatting instead of JSON (default: true)'
        optional: true
        default: 'true'

      - name: 'includeStackTrace'
        type: 'boolean'
        description: 'Include full stack traces for error-level logs (default: false)'
        optional: true
        default: 'false'

    custom-tags:
      since: '1.0.0'
      environment-aware: 'Different defaults for development vs production'

# === CLASSES ===
classes:
  ConsoleProvider:
    # Class Documentation
    class-doc:
      description: 'Production-ready console logging provider with intelligent formatting, colorization, and structured output for enterprise logging'
      business-context: 'Versatile logging provider supporting development debugging with readable output and production logging with structured JSON for log aggregation and monitoring systems'

      formats:
        jsdoc:
          description: 'Feature-rich console logging provider with formatting options'
        cli:
          description: |
            ## ConsoleProvider - Versatile Console Logging

            Enterprise console provider offering:
            - **Development Mode**: Pretty-printed, colorized output for debugging
            - **Production Mode**: Structured JSON output for log aggregation
            - **Smart Formatting**: Context-aware formatting with bounded context display
            - **Error Handling**: Optional stack trace inclusion for error investigation
            - **Performance**: Efficient formatting with minimal allocation overhead
            - **ANSI Colors**: Terminal-friendly color coding for log levels
            - **Correlation Display**: Abbreviated correlation IDs for readability

      custom-tags:
        since: '1.0.0'
        provider-type: 'Built-in console logging provider'
        environment-aware: 'Adapts formatting for development vs production'

    # Properties
    properties:
      - name: 'name'
        type: 'string'
        description: "Provider identifier ('console')"
        readonly: true
        value: "'console'"

    methods:
      constructor:
        description: 'Creates console provider with customizable formatting options'
        business-context: 'Configures console output for development debugging or production structured logging based on environment needs'

        parameters:
          - name: 'options'
            type: 'ConsoleProviderOptions'
            description: 'Optional formatting and display configuration'
            optional: true

        examples:
          - id: 'development-setup'
            code: |
              // Development-friendly configuration
              const devProvider = new ConsoleProvider({
                colorize: true,
                prettyPrint: true,
                includeStackTrace: true
              });

          - id: 'production-setup'
            code: |
              // Production structured logging
              const prodProvider = new ConsoleProvider({
                colorize: false,
                prettyPrint: false,
                includeStackTrace: false
              });

          - id: 'default-configuration'
            code: |
              // Uses sensible defaults for development
              const provider = new ConsoleProvider();
              // Equivalent to: colorize=true, prettyPrint=true, includeStackTrace=false

      write:
        description: 'Writes log event to console using appropriate console method based on log level'
        business-context: 'Routes log events to correct console methods (debug, info, warn, error) with level-appropriate formatting and optional stack trace display'

        parameters:
          - name: 'event'
            type: 'LogEvent'
            description: 'Structured log event to write to console'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'level-routing'
            code: |
              // Different log levels route to appropriate console methods
              provider.write(traceEvent);  // → console.debug()
              provider.write(debugEvent);  // → console.debug()
              provider.write(infoEvent);   // → console.info()
              provider.write(warnEvent);   // → console.warn()
              provider.write(errorEvent);  // → console.error() + optional stack
              provider.write(fatalEvent);  // → console.error() + optional stack

          - id: 'pretty-print-output'
            code: |
              // Pretty-print format (development):
              // 2024-01-15T10:30:45.123Z INFO [Orders] [OrderService] (req-12345) Order processed {"orderId":"123","amount":99.99}

              // Structured format (production):
              // {"timestamp":"2024-01-15T10:30:45.123Z","level":"info","message":"Order processed","context":{"name":"OrderService","boundedContext":"Orders","correlationId":"req-12345"},"data":{"orderId":"123","amount":99.99}}

      # Private methods for completeness
      private-methods:
        formatEvent:
          description: 'Selects formatting strategy based on prettyPrint configuration'
          business-context: 'Routes to appropriate formatter for development readability or production structured output'
          parameters:
            - name: 'event'
              type: 'LogEvent'
              description: 'Log event to format'
          returns:
            type: 'string'
            description: 'Formatted log string ready for console output'

        formatPretty:
          description: 'Creates human-readable log format for development'
          business-context: 'Produces readable output optimized for developer debugging with context display and error information'
          parameters:
            - name: 'event'
              type: 'LogEvent'
              description: 'Log event to format prettily'
          returns:
            type: 'string'
            description: 'Human-readable formatted log line'

        formatStructured:
          description: 'Creates JSON structured format for production logging'
          business-context: 'Produces structured JSON suitable for log aggregation systems like ELK stack, Splunk, or CloudWatch'
          parameters:
            - name: 'event'
              type: 'LogEvent'
              description: 'Log event to format as JSON'
          returns:
            type: 'string'
            description: 'JSON structured log entry'

        formatContext:
          description: 'Formats log context for pretty-print display with abbreviated correlation IDs'
          business-context: 'Creates compact context display showing bounded context, service name, and truncated correlation ID for readability'
          parameters:
            - name: 'context'
              type: 'LogContext'
              description: 'Log context to format for display'
          returns:
            type: 'string'
            description: "Formatted context string like '[Orders] [OrderService] (req-1234)'"

        colorizeLevel:
          description: 'Applies ANSI color codes to log level text for terminal display'
          business-context: 'Enhances development experience with color-coded log levels for quick visual scanning'
          parameters:
            - name: 'level'
              type: 'string'
              description: 'Log level string to colorize'
          returns:
            type: 'string'
            description: 'Log level with ANSI color codes or plain text if colorization disabled'

# === EXAMPLES ===
examples:
  development-logging:
    description: 'Development-focused logging setup with enhanced readability'
    code: |
      import { Logger, ConsoleProvider } from '@vytches/ddd-logging';

      // Configure logger for development
      const provider = new ConsoleProvider({
        colorize: true,        // Terminal colors for easy scanning
        prettyPrint: true,     // Human-readable format
        includeStackTrace: true // Full error details
      });

      Logger.configure({
        level: 'debug',
        provider,
        contextDetection: { enabled: true }
      });

      // Example output:
      // 2024-01-15T10:30:45.123Z DEBUG [Orders] [OrderService] (req-abc12) Processing order {"orderId":"123"}
      // 2024-01-15T10:30:45.200Z ERROR [Orders] [OrderService] (req-abc12) Payment failed Error: Insufficient funds
      //   at PaymentGateway.charge (/app/src/payment/gateway.ts:45:15)
      //   at OrderService.processPayment (/app/src/orders/service.ts:120:28)

  production-logging:
    description: 'Production-optimized structured logging for log aggregation'
    code: |
      // Production configuration for structured logging
      const provider = new ConsoleProvider({
        colorize: false,         // No ANSI codes in production logs
        prettyPrint: false,      // JSON structure for log aggregation
        includeStackTrace: false // Avoid log volume in production
      });

      Logger.configure({
        level: 'info',
        provider,
        masking: {
          enabled: true,
          sensitiveKeys: ['password', 'token', 'creditCard']
        }
      });

      // Example output:
      // {"timestamp":"2024-01-15T10:30:45.123Z","level":"info","message":"Order processed","context":{"name":"OrderService","boundedContext":"Orders","correlationId":"req-abc12345","userId":"user-789"},"data":{"orderId":"123","amount":99.99}}

  error-handling-with-stack-traces:
    description: 'Error logging with configurable stack trace inclusion'
    code: |
      const provider = new ConsoleProvider({
        includeStackTrace: process.env.NODE_ENV !== 'production'
      });

      try {
        await processOrder(order);
      } catch (error) {
        logger.error('Order processing failed', error, {
          orderId: order.id,
          userId: user.id,
          stage: 'payment'
        });
        
        // Development output includes full stack trace
        // Production output includes only error message
      }

  context-aware-formatting:
    description: 'Context formatting with bounded context and correlation display'
    code: |
      // Service in Orders bounded context
      class OrderService {
        private logger = Logger.create(); // Auto-detects context
        
        async processOrder(order: Order) {
          const correlatedLogger = this.logger
            .withCorrelationId(request.correlationId)
            .withUserId(request.userId);
            
          correlatedLogger.info('Processing order', { orderId: order.id });
          // Output: [Orders] [OrderService] (req-abc12) Processing order {"orderId":"123"}
          
          correlatedLogger.error('Payment failed', paymentError);
          // Output: [Orders] [OrderService] (req-abc12) Payment failed Error: Card declined
        }
      }

  multi-environment-setup:
    description: 'Environment-aware provider configuration'
    code: |
      const createProvider = () => {
        const isDevelopment = process.env.NODE_ENV === 'development';
        const isProduction = process.env.NODE_ENV === 'production';
        
        if (isDevelopment) {
          return new ConsoleProvider({
            colorize: true,
            prettyPrint: true,
            includeStackTrace: true
          });
        }
        
        if (isProduction) {
          return new ConsoleProvider({
            colorize: false,
            prettyPrint: false,
            includeStackTrace: false
          });
        }
        
        // Test/staging environments
        return new ConsoleProvider({
          colorize: true,
          prettyPrint: true,
          includeStackTrace: false
        });
      };

      Logger.configure({
        provider: createProvider(),
        level: process.env.LOG_LEVEL || 'info'
      });
