# Logging Package - DDD-First Enterprise Structured Logging

# === FILE METADATA ===
file-name: 'index'
title: 'Logging Package - DDD-First Enterprise Structured Logging'
description: 'Main exports and convenience utilities for enterprise DDD-aware structured logging'
business-context: 'Comprehensive logging solution designed specifically for Domain-Driven Design applications with enterprise features, automatic context detection, and seamless integration with DDD patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CONSTANTS ===
constants:
  Logger:
    description: 'Convenience constant providing simplified access to logging functionality with DDD-first design'
    business-context: 'Developer-friendly API facade enabling zero-configuration logging with automatic DDD context detection and enterprise features'

    formats:
      jsdoc:
        description: 'Main Logger utility with DDD-first design and enterprise features'
      cli:
        description: |
          ## Logger Constant - DDD-First Structured Logging

          The main Logger utility providing:
          - **Zero Configuration**: Works out of the box with sensible defaults
          - **Automatic Context Detection**: DDD bounded context and class detection from stack traces
          - **Enterprise Features**: Data masking, correlation tracking, multi-tenancy support
          - **Smart Formatting**: Development-friendly pretty-print vs production JSON
          - **Performance Optimized**: Efficient context detection and provider caching
          - **Framework Integration**: Seamless integration with CQRS, aggregates, and domain events

    methods:
      create:
        description: 'Creates logger with smart context detection or explicit context name'
        business-context: 'Primary factory method for creating DDD-aware loggers with automatic bounded context detection'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Explicit context name, or undefined for automatic detection from calling class'
            optional: true

        returns:
          type: 'Logger'
          description: 'Logger instance with detected or specified context'

        examples:
          - id: 'auto-detection'
            code: |
              import { Logger } from '@vytches/ddd-logging';

              // Automatic context detection from calling class
              class OrderService {
                private logger = Logger.create(); // Auto-detects "OrderService"
                
                processOrder(order: Order) {
                  this.logger.info('Processing order', { orderId: order.id });
                  // Output: [Orders] [OrderService] Processing order {"orderId":"123"}
                }
              }

          - id: 'explicit-context'
            code: |
              // Explicit context naming
              const paymentLogger = Logger.create('PaymentGateway');
              paymentLogger.info('Payment gateway initialized');

          - id: 'service-integration'
            code: |
              @Service()
              class CustomerService {
                private logger = Logger.create(); // Auto-detects "CustomerService"
                
                async createCustomer(data: CreateCustomerData): Promise<Customer> {
                  this.logger.info('Creating customer', { email: data.email });
                  // Automatic data masking applied to email
                  
                  const customer = new Customer(data);
                  await this.customerRepository.save(customer);
                  
                  this.logger.info('Customer created successfully', { 
                    customerId: customer.id 
                  });
                  
                  return customer;
                }
              }

      forContext:
        description: 'Alias for create() providing fluent API for context-aware logging'
        business-context: 'Fluent API method for creating contextual loggers with enhanced readability'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name for the logger'
            optional: true

        returns:
          type: 'Logger'
          description: 'Logger instance with specified or auto-detected context'

        examples:
          - id: 'fluent-context-creation'
            code: |
              import { Logger } from '@vytches/ddd-logging';

              // Fluent context creation
              const logger = Logger.forContext('AggregateService')
                .withCorrelationId('req-123')
                .withUserId('user-456')
                .withTenantId('tenant-789');
                
              logger.info('Aggregate operation started');

          - id: 'domain-service-logging'
            code: |
              class OrderDomainService {
                private logger = Logger.forContext('OrderDomainService');
                
                async calculateOrderTotal(order: Order): Promise<Money> {
                  const correlatedLogger = this.logger
                    .withCorrelationId(order.correlationId)
                    .withTenantId(order.tenantId);
                    
                  correlatedLogger.debug('Calculating order total', {
                    orderId: order.id,
                    itemCount: order.items.length
                  });
                  
                  return order.calculateTotal();
                }
              }

      configure:
        description: 'Configures global logger settings affecting all logger instances'
        business-context: 'Enterprise configuration method for setting organization-wide logging policies including security, compliance, and operational requirements'

        parameters:
          - name: 'config'
            type: 'LoggerConfiguration'
            description: 'Global configuration for all logger instances'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'enterprise-production-config'
            code: |
              import { Logger, ConsoleProvider } from '@vytches/ddd-logging';

              // Enterprise production configuration
              Logger.configure({
                level: 'info',
                provider: new ConsoleProvider({
                  colorize: false,         // No ANSI codes in production
                  prettyPrint: false,      // JSON for log aggregation
                  includeStackTrace: false
                }),
                contextDetection: {
                  enabled: true           // Auto-detect DDD contexts
                },
                masking: {
                  enabled: true,
                  sensitiveKeys: [
                    // Authentication
                    'password', 'token', 'apiKey', 'secretKey',
                    // Personal Information (GDPR)
                    'email', 'phone', 'ssn', 'address',
                    // Financial (PCI DSS)
                    'creditCard', 'bankAccount', 'cvv',
                    // Healthcare (HIPAA)  
                    'medicalRecord', 'patientId', 'diagnosis'
                  ],
                  replacement: '[REDACTED]'
                }
              });

          - id: 'development-config'
            code: |
              // Development-friendly configuration
              Logger.configure({
                level: 'debug',
                provider: new ConsoleProvider({
                  colorize: true,          // Terminal colors
                  prettyPrint: true,       // Human-readable format
                  includeStackTrace: true  // Full error details
                }),
                contextDetection: {
                  enabled: true,
                  includeStackTrace: false // Avoid noise in dev
                },
                masking: {
                  enabled: false          // Raw data for debugging
                }
              });

          - id: 'compliance-config'
            code: |
              // Compliance-focused configuration (GDPR/HIPAA)
              Logger.configure({
                level: 'info',
                masking: {
                  enabled: true,
                  patterns: [
                    // Email addresses
                    '\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b',
                    // Social Security Numbers
                    '\\b\\d{3}-\\d{2}-\\d{4}\\b',
                    // Credit Card Numbers
                    '\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b',
                    // Phone Numbers
                    '\\b\\d{3}-\\d{3}-\\d{4}\\b'
                  ],
                  sensitiveKeys: [
                    'personalData', 'healthInfo', 'financialData',
                    'biometric', 'genetic', 'location'
                  ],
                  replacement: '[PII_MASKED]'
                }
              });

# === EXAMPLES ===
examples:
  enterprise-application-setup:
    description: 'Complete enterprise application logging setup with DDD integration'
    code: |
      import { Logger, ConsoleProvider } from '@vytches/ddd-logging';

      // Application startup logging configuration
      export function setupEnterpriseLogging() {
        const isProduction = process.env.NODE_ENV === 'production';
        const isDevelopment = process.env.NODE_ENV === 'development';
        
        const provider = new ConsoleProvider({
          colorize: !isProduction,
          prettyPrint: !isProduction,
          includeStackTrace: isDevelopment
        });
        
        Logger.configure({
          level: process.env.LOG_LEVEL as LogLevel || (isProduction ? 'info' : 'debug'),
          provider,
          contextDetection: {
            enabled: true,
            includeStackTrace: false
          },
          masking: {
            enabled: isProduction,
            sensitiveKeys: [
              // Security
              'password', 'token', 'apiKey', 'secretKey', 'privateKey',
              // Personal Data (GDPR compliance)
              'email', 'phone', 'ssn', 'passport', 'driverLicense',
              // Financial Data (PCI compliance)
              'creditCard', 'bankAccount', 'routingNumber', 'cvv', 'pin',
              // Healthcare (HIPAA compliance)
              'medicalRecord', 'patientId', 'diagnosis', 'treatment',
              // Custom business data
              'internalId', 'customerSecret', 'contractTerms'
            ],
            patterns: isProduction ? [
              // Email pattern
              '\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b',
              // Credit card pattern
              '\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b',
              // SSN pattern
              '\\b\\d{3}-\\d{2}-\\d{4}\\b'
            ] : [],
            replacement: '[ENTERPRISE_MASKED]'
          }
        });
        
        // Log configuration applied
        const startupLogger = Logger.create('ApplicationStartup');
        startupLogger.info('Enterprise logging configured', {
          environment: process.env.NODE_ENV,
          logLevel: process.env.LOG_LEVEL || 'default',
          maskingEnabled: isProduction,
          contextDetection: true
        });
      }

  ddd-service-integration:
    description: 'DDD service integration with automatic context detection and correlation'
    code: |
      import { Logger } from '@vytches/ddd-logging';

      // Domain Service with automatic logging
      export class OrderProcessingService {
        private logger = Logger.create(); // Auto-detects "OrderProcessingService"
        
        async processOrder(
          command: ProcessOrderCommand, 
          correlationId: string
        ): Promise<ProcessOrderResult> {
          const correlatedLogger = this.logger
            .withCorrelationId(correlationId)
            .withUserId(command.userId)
            .withTenantId(command.tenantId);
          
          correlatedLogger.info('Starting order processing', {
            orderId: command.orderId,
            customerId: command.customerId
          });
          
          try {
            // Business logic with contextual logging
            const order = await this.orderRepository.findById(command.orderId);
            if (!order) {
              throw new OrderNotFoundError(command.orderId);
            }
            
            correlatedLogger.debug('Order retrieved', { 
              orderStatus: order.status,
              itemCount: order.items.length 
            });
            
            const validationResult = await this.validateOrder(order);
            correlatedLogger.debug('Order validation completed', { 
              isValid: validationResult.isValid 
            });
            
            if (!validationResult.isValid) {
              correlatedLogger.warn('Order validation failed', {
                validationErrors: validationResult.errors
              });
              throw new OrderValidationError(validationResult.errors);
            }
            
            const processedOrder = await this.executeOrderProcessing(order);
            
            correlatedLogger.info('Order processing completed successfully', {
              orderId: processedOrder.id,
              finalStatus: processedOrder.status,
              processingDuration: Date.now() - command.timestamp
            });
            
            return new ProcessOrderResult(processedOrder);
            
          } catch (error) {
            correlatedLogger.error('Order processing failed', error, {
              orderId: command.orderId,
              stage: 'processing',
              errorType: error.constructor.name
            });
            throw error;
          }
        }
      }

  microservices-distributed-logging:
    description: 'Microservices architecture with distributed logging and correlation tracking'
    code: |
      import { Logger } from '@vytches/ddd-logging';
      import express from 'express';

      // Middleware for correlation ID propagation
      const correlationMiddleware = (req: express.Request, res: express.Response, next: express.NextFunction) => {
        const correlationId = req.headers['x-correlation-id'] as string || generateCorrelationId();
        req.correlationId = correlationId;
        res.setHeader('x-correlation-id', correlationId);
        next();
      };

      // API Controller with distributed logging
      export class OrderController {
        private logger = Logger.create('OrderController');
        
        constructor(private orderService: OrderService) {}
        
        @Post('/orders')
        async createOrder(req: express.Request, res: express.Response) {
          const correlatedLogger = this.logger
            .withCorrelationId(req.correlationId)
            .withUserId(req.user?.id)
            .withRequestId(req.id)
            .withMetadata({
              userAgent: req.headers['user-agent'],
              clientIP: req.ip,
              endpoint: req.path
            });
          
          correlatedLogger.info('Order creation request received', {
            customerData: req.body.customer,  // Automatically masked if sensitive
            itemCount: req.body.items?.length
          });
          
          try {
            const command = new CreateOrderCommand(req.body, {
              correlationId: req.correlationId,
              userId: req.user.id,
              timestamp: Date.now()
            });
            
            const order = await this.orderService.createOrder(command);
            
            correlatedLogger.info('Order created successfully', {
              orderId: order.id,
              orderTotal: order.total,
              status: order.status
            });
            
            res.status(201).json({ 
              orderId: order.id,
              correlationId: req.correlationId 
            });
            
          } catch (error) {
            correlatedLogger.error('Order creation failed', error, {
              errorCode: error.code,
              validationErrors: error.validationErrors
            });
            
            res.status(400).json({ 
              error: 'Order creation failed',
              correlationId: req.correlationId 
            });
          }
        }
      }

      // Service Layer with correlation propagation
      export class OrderService {
        private logger = Logger.create('OrderService');
        
        async createOrder(command: CreateOrderCommand): Promise<Order> {
          const correlatedLogger = this.logger
            .withCorrelationId(command.metadata.correlationId)
            .withUserId(command.metadata.userId);
          
          correlatedLogger.info('Processing order creation command');
          
          // Correlation ID flows through entire request lifecycle
          const order = await this.orderRepository.save(
            new Order(command), 
            { correlationId: command.metadata.correlationId }
          );
          
          // Publish domain event with correlation context
          await this.eventBus.publish(
            new OrderCreatedEvent(order),
            { correlationId: command.metadata.correlationId }
          );
          
          correlatedLogger.info('Order created and events published');
          
          return order;
        }
      }

  cqrs-integration-example:
    description: 'CQRS integration with automatic command and query logging'
    code: |
      import { Logger, LogCommands, LogQueries } from '@vytches/ddd-logging';

      // Command Handler with automatic logging
      @LogCommands({
        includePayload: false,  // Security: don't log sensitive command data
        logLevel: 'info',
        contextName: 'OrderCommands'
      })
      export class CreateOrderCommandHandler {
        constructor(
          private orderService: OrderService,
          private eventBus: EventBus
        ) {}
        
        async handle(command: CreateOrderCommand): Promise<void> {
          // Automatic logging:
          // INFO [OrderCommands] [CreateOrderCommandHandler] [Command] Executing CreateOrderCommand
          
          const order = await this.orderService.createOrder(command);
          await this.eventBus.publish(new OrderCreatedEvent(order));
          
          // INFO [OrderCommands] [CreateOrderCommandHandler] [Command] CreateOrderCommand completed {"duration":"45.23ms","success":true}
        }
      }

      // Query Handler with performance monitoring
      @LogQueries({
        includePayload: true,
        logLevel: 'debug',
        contextName: 'OrderQueries'
      })
      export class GetOrderQueryHandler {
        constructor(private orderRepository: OrderRepository) {}
        
        async handle(query: GetOrderQuery): Promise<Order | null> {
          // Automatic logging with performance tracking:
          // DEBUG [OrderQueries] [GetOrderQueryHandler] [Query] Executing GetOrderQuery {"payload":{"orderId":"123"}}
          
          const order = await this.orderRepository.findById(query.orderId);
          
          // DEBUG [OrderQueries] [GetOrderQueryHandler] [Query] GetOrderQuery completed {"duration":"12.34ms","success":true}
          
          return order;
        }
      }

      // Event Handler with correlation tracking
      export class OrderEventHandler {
        private logger = Logger.create('OrderEventHandler');
        
        @EventHandler(OrderCreatedEvent)
        async handleOrderCreated(event: OrderCreatedEvent): Promise<void> {
          const correlatedLogger = this.logger
            .withCorrelationId(event.metadata.correlationId)
            .withMetadata({
              eventId: event.id,
              eventVersion: event.version,
              aggregateId: event.aggregateId
            });
          
          correlatedLogger.info('Processing OrderCreatedEvent', {
            orderId: event.orderId,
            customerId: event.customerId
          });
          
          // Process event...
          await this.notificationService.sendOrderConfirmation(event);
          
          correlatedLogger.info('Order confirmation sent');
        }
      }
