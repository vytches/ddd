# Package Settings for Logging - Enhanced Metadata System V2

# === PACKAGE IDENTITY ===
package-name: 'logging'
display-name: 'DDD Logging'
description: 'Enterprise structured logging with automatic context detection and DDD-first design'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'infrastructure'
complexity: 'intermediate'
patterns:
  - 'structured-logging'
  - 'context-detection'
  - 'data-masking'
  - 'correlation-tracking'
  - 'decorator-pattern'

# === BUSINESS CONTEXT ===
business-context: 'Provides comprehensive logging infrastructure specifically designed for Domain-Driven Design applications'

# === PACKAGE-LEVEL FORMAT OVERRIDES ===
formats:
  jsdoc:
    description: 'DDD-focused logging with automatic bounded context detection'
    business-context: 'Enables observability and debugging in complex domain models'
  cli:
    description: |
      ## Logging Package
      Enterprise logging solution with:
      - Automatic bounded context detection
      - Smart context detection from stack traces
      - Structured JSON logging with rich metadata
      - PII and sensitive data masking
      - Correlation ID tracking
      - CQRS integration decorators
      - Result pattern extensions
      - Zero configuration defaults
    business-context: |
      Essential for maintaining observability in production systems, debugging complex domain interactions, and ensuring compliance with data protection regulations

# === CUSTOM TAGS ===
custom-tags:
  author: 'VytchesDDD Team'
  since: '1.0.0'
  maturity: 'stable'
  enterprise: 'true'
  ddd-first: 'true'
