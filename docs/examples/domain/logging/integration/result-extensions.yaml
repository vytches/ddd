# Result Extensions - Result Pattern Logging Integration

# === FILE METADATA ===
file-name: 'result-extensions'
title: 'Result Extensions - Result Pattern Logging Integration'
description: 'Extensions for integrating logging with Result pattern implementations'
business-context: 'Seamless integration between Result pattern error handling and enterprise logging, enabling comprehensive success/failure tracking without breaking functional programming patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ResultLoggingOptions:
    description: 'Configuration options for Result pattern logging integration'
    business-context: 'Flexible configuration enabling customizable logging behavior for Result pattern success and failure scenarios'

    formats:
      jsdoc:
        description: 'Result pattern logging configuration'
      cli:
        description: |
          ## ResultLoggingOptions Interface

          Result logging configuration providing:
          - **Logger Control**: Custom logger instance or automatic creation
          - **Level Control**: Configurable log levels for success scenarios
          - **Value Logging**: Optional inclusion of success values in logs
          - **Error Logging**: Optional inclusion of error details in logs
          - **Context Naming**: Custom context names for Result operations

    properties:
      - name: 'logger'
        type: 'Logger'
        description: 'Custom logger instance, defaults to auto-created logger if not provided'
        optional: true

      - name: 'logLevel'
        type: "'debug' | 'info'"
        description: "Log level for success scenarios (default: 'info')"
        optional: true
        default: "'info'"

      - name: 'includeValue'
        type: 'boolean'
        description: 'Include success value in log data (default: false for security)'
        optional: true
        default: 'false'

      - name: 'includeError'
        type: 'boolean'
        description: 'Include error details in log data (default: false for conciseness)'
        optional: true
        default: 'false'

      - name: 'contextName'
        type: 'string'
        description: "Custom context name for auto-created logger (default: 'Result')"
        optional: true
        default: "'Result'"

    custom-tags:
      since: '1.0.0'
      pattern-integration: 'Result pattern functional programming integration'

  ResultLike:
    description: 'Generic interface for Result-like objects supporting tap operations'
    business-context: 'Universal interface enabling logging extensions to work with any Result pattern implementation (Result, Option, Either, etc.)'

    formats:
      jsdoc:
        description: 'Generic Result-like interface for tap operations'
      cli:
        description: |
          ## ResultLike Interface

          Universal Result interface supporting:
          - **Success Tapping**: Side-effect operations on success values
          - **Error Tapping**: Side-effect operations on error values
          - **Functional Chaining**: Maintains functional programming patterns
          - **Implementation Agnostic**: Works with any Result-like implementation

    type-parameters:
      - name: 'TValue'
        description: 'Type of success value'
      - name: 'TError'
        description: 'Type of error value'

    methods:
      tap:
        description: 'Execute side-effect function on success value without affecting Result'
        parameters:
          - name: 'fn'
            type: '(value: TValue) => void'
            description: 'Side-effect function to execute on success'
        returns:
          type: 'ResultLike<TValue, TError>'
          description: 'Same Result instance for chaining'

      tapError:
        description: 'Execute side-effect function on error value without affecting Result'
        parameters:
          - name: 'fn'
            type: '(error: TError) => void'
            description: 'Side-effect function to execute on error'
        returns:
          type: 'ResultLike<TValue, TError>'
          description: 'Same Result instance for chaining'

    custom-tags:
      since: '1.0.0'
      generic: 'Works with any Result pattern implementation'

# === CONSTANTS ===
constants:
  ResultLoggingExtensions:
    description: 'Collection of extension functions for integrating logging with Result pattern implementations'
    business-context: 'Functional programming utilities enabling comprehensive Result pattern logging while maintaining immutability and chain-ability'

    formats:
      jsdoc:
        description: 'Result pattern logging extension functions'
      cli:
        description: |
          ## ResultLoggingExtensions Constant

          Extension functions providing:
          - **Success Logging**: `tapLog()` for success scenario logging
          - **Error Logging**: `tapLogError()` for failure scenario logging
          - **Combined Logging**: `tapLogBoth()` for comprehensive logging
          - **Functional Style**: Maintains Result pattern immutability
          - **Chainable Operations**: Preserves functional programming flow

    methods:
      tapLog:
        description: 'Adds success logging to any Result-like object without affecting the Result value'
        business-context: 'Enables comprehensive success tracking in functional programming workflows while maintaining Result immutability'

        type-parameters:
          - name: 'TValue'
            description: 'Type of success value'
          - name: 'TError'
            description: 'Type of error value'

        parameters:
          - name: 'result'
            type: 'ResultLike<TValue, TError>'
            description: 'Result-like object to add logging to'
          - name: 'message'
            type: 'string'
            description: 'Log message for success scenarios'
          - name: 'options'
            type: 'ResultLoggingOptions'
            description: 'Optional logging configuration'
            optional: true
            default: '{}'

        returns:
          type: 'ResultLike<TValue, TError>'
          description: 'Same Result instance with success logging attached'

        examples:
          - id: 'basic-success-logging'
            code: |
              import { ResultLoggingExtensions } from '@vytches/ddd-logging';
              import { Result } from '@vytches/ddd-utils';

              const processOrder = async (orderId: string): Promise<Result<Order, OrderError>> => {
                const result = await orderService.getOrder(orderId);
                
                return ResultLoggingExtensions.tapLog(
                  result,
                  'Order retrieved successfully',
                  { includeValue: false }  // Security: don't log order details
                );
                
                // On success: INFO [Result] Order retrieved successfully
                // Result value unchanged, continues functional chain
              };

          - id: 'custom-logger-success'
            code: |
              const logger = Logger.forContext('OrderService');

              const result = await orderOperation()
                .then(r => ResultLoggingExtensions.tapLog(r, 'Operation completed', {
                  logger,
                  logLevel: 'debug',
                  includeValue: true
                }));

      tapLogError:
        description: 'Adds error logging to any Result-like object without affecting the Result error'
        business-context: 'Enables comprehensive error tracking in functional programming workflows while maintaining Result immutability and error information'

        type-parameters:
          - name: 'TValue'
            description: 'Type of success value'
          - name: 'TError'
            description: 'Type of error value'

        parameters:
          - name: 'result'
            type: 'ResultLike<TValue, TError>'
            description: 'Result-like object to add error logging to'
          - name: 'message'
            type: 'string'
            description: 'Log message for error scenarios'
          - name: 'options'
            type: 'ResultLoggingOptions'
            description: 'Optional logging configuration'
            optional: true
            default: '{}'

        returns:
          type: 'ResultLike<TValue, TError>'
          description: 'Same Result instance with error logging attached'

        examples:
          - id: 'error-tracking'
            code: |
              const processPayment = async (payment: Payment): Promise<Result<Receipt, PaymentError>> => {
                const result = await paymentGateway.charge(payment);
                
                return ResultLoggingExtensions.tapLogError(
                  result,
                  'Payment processing failed',
                  { includeError: true }  // Include error details for debugging
                );
                
                // On error: ERROR [Result] Payment processing failed {"errorDetails":{"code":"INSUFFICIENT_FUNDS","message":"..."}}
                // Error unchanged, continues functional chain
              };

      tapLogBoth:
        description: 'Adds both success and error logging to any Result-like object'
        business-context: 'Provides comprehensive operation logging covering both success and failure scenarios in a single functional call'

        type-parameters:
          - name: 'TValue'
            description: 'Type of success value'
          - name: 'TError'
            description: 'Type of error value'

        parameters:
          - name: 'result'
            type: 'ResultLike<TValue, TError>'
            description: 'Result-like object to add logging to'
          - name: 'successMessage'
            type: 'string'
            description: 'Log message for success scenarios'
          - name: 'errorMessage'
            type: 'string'
            description: 'Log message for error scenarios'
          - name: 'options'
            type: 'ResultLoggingOptions'
            description: 'Optional logging configuration'
            optional: true
            default: '{}'

        returns:
          type: 'ResultLike<TValue, TError>'
          description: 'Same Result instance with both success and error logging attached'

        examples:
          - id: 'comprehensive-logging'
            code: |
              const executeBusinessOperation = async (): Promise<Result<OperationResult, BusinessError>> => {
                const result = await businessService.performOperation();
                
                return ResultLoggingExtensions.tapLogBoth(
                  result,
                  'Business operation completed successfully',
                  'Business operation failed',
                  {
                    logger: Logger.forContext('BusinessService'),
                    includeValue: false,
                    includeError: true
                  }
                );
                
                // Success: INFO [BusinessService] Business operation completed successfully
                // Error: ERROR [BusinessService] Business operation failed {"errorDetails":{"type":"ValidationError","details":"..."}}
              };

# === PRIVATE FUNCTIONS ===
private-functions:
  resolveLogger:
    description: 'Internal utility for resolving logger instance from options'
    business-context: 'Performance optimization providing logger instance resolution with context detection fallback'

    parameters:
      - name: 'options'
        type: 'ResultLoggingOptions'
        description: 'Logging options containing optional logger and context name'

    returns:
      type: 'Logger'
      description: 'Resolved logger instance with appropriate context'

# === EXAMPLES ===
examples:
  functional-pipeline-logging:
    description: 'Comprehensive Result pattern pipeline with integrated logging'
    code: |
      import { Result } from '@vytches/ddd-utils';
      import { ResultLoggingExtensions } from '@vytches/ddd-logging';

      const processOrderWorkflow = async (orderId: string): Promise<Result<OrderConfirmation, WorkflowError>> => {
        const logger = Logger.forContext('OrderWorkflow').withCorrelationId(generateCorrelationId());
        
        return Result.success(orderId)
          .flatMap(id => getOrder(id))
          .flatMap(order => ResultLoggingExtensions.tapLog(
            validateOrder(order),
            'Order validation completed',
            { logger, includeValue: false }
          ))
          .flatMap(order => ResultLoggingExtensions.tapLogBoth(
            processPayment(order),
            'Payment processed successfully',
            'Payment processing failed',
            { logger, includeError: true }
          ))
          .flatMap(payment => ResultLoggingExtensions.tapLog(
            fulfillOrder(payment.orderId),
            'Order fulfillment initiated',
            { logger }
          ))
          .map(fulfillment => new OrderConfirmation(fulfillment))
          .tapError(error => logger.error('Order workflow failed', error));
          
        // Comprehensive logging throughout functional pipeline:
        // INFO [OrderWorkflow] (corr-123) Order validation completed
        // INFO [OrderWorkflow] (corr-123) Payment processed successfully
        // INFO [OrderWorkflow] (corr-123) Order fulfillment initiated
        // OR
        // ERROR [OrderWorkflow] (corr-123) Payment processing failed {"errorDetails":{"code":"CARD_DECLINED"}}
      };

  enterprise-service-integration:
    description: 'Enterprise service with Result pattern and comprehensive logging'
    code: |
      class EnterpriseOrderService {
        private logger = Logger.forContext('OrderService');
        
        async createOrder(command: CreateOrderCommand): Promise<Result<Order, CreateOrderError>> {
          const correlatedLogger = this.logger
            .withCorrelationId(command.metadata.correlationId)
            .withUserId(command.metadata.userId);
          
          return Result.success(command)
            .flatMap(cmd => ResultLoggingExtensions.tapLog(
              this.validateCommand(cmd),
              'Order command validation passed',
              { 
                logger: correlatedLogger,
                logLevel: 'debug',
                includeValue: false  // Security: don't log command details
              }
            ))
            .flatMap(cmd => ResultLoggingExtensions.tapLogBoth(
              this.reserveInventory(cmd.items),
              'Inventory reserved successfully',
              'Inventory reservation failed',
              { 
                logger: correlatedLogger,
                includeError: true
              }
            ))
            .flatMap(reservation => ResultLoggingExtensions.tapLog(
              this.createOrderEntity(command, reservation),
              'Order entity created',
              { logger: correlatedLogger }
            ))
            .flatMap(order => ResultLoggingExtensions.tapLog(
              this.saveOrder(order),
              'Order persisted successfully',
              { logger: correlatedLogger }
            ));
        }
      }

  error-handling-with-recovery:
    description: 'Result pattern error handling with logging and recovery strategies'
    code: |
      const robustOrderProcessing = async (orderId: string): Promise<Result<Order, ProcessingError>> => {
        const logger = Logger.forContext('RobustOrderProcessor');
        
        return getOrderFromPrimarySource(orderId)
          .flatMapError(primaryError => ResultLoggingExtensions.tapLogError(
            getOrderFromBackupSource(orderId),
            'Primary source failed, attempting backup',
            { 
              logger,
              includeError: true  // Log why primary failed
            }
          ))
          .flatMapError(backupError => ResultLoggingExtensions.tapLogError(
            getOrderFromCache(orderId),
            'Backup source failed, attempting cache',
            { logger, includeError: true }
          ))
          .tapError(cacheError => logger.error(
            'All order sources failed',
            cacheError,
            { orderId, fallbacksAttempted: ['primary', 'backup', 'cache'] }
          ))
          .tap(order => logger.info(
            'Order retrieved successfully',
            { orderId, source: order.metadata.source }
          ));
          
        // Comprehensive error recovery logging:
        // ERROR [RobustOrderProcessor] Primary source failed, attempting backup
        // ERROR [RobustOrderProcessor] Backup source failed, attempting cache  
        // INFO [RobustOrderProcessor] Order retrieved successfully {"orderId":"123","source":"cache"}
      };

  performance-monitoring-integration:
    description: 'Result pattern with performance monitoring and logging'
    code: |
      const performanceMonitoredOperation = async <T, E>(
        operation: () => Promise<Result<T, E>>,
        operationName: string
      ): Promise<Result<T, E>> => {
        const logger = Logger.forContext('PerformanceMonitor');
        const startTime = performance.now();
        
        return operation()
          .tap(value => {
            const duration = performance.now() - startTime;
            logger.info(`${operationName} completed successfully`, {
              duration: `${duration.toFixed(2)}ms`,
              success: true
            });
          })
          .tapError(error => {
            const duration = performance.now() - startTime;
            logger.error(`${operationName} failed`, error as Error, {
              duration: `${duration.toFixed(2)}ms`,
              success: false
            });
          });
      };

      // Usage with Result logging extensions
      const result = await performanceMonitoredOperation(
        async () => {
          const orderResult = await getOrder(orderId);
          return ResultLoggingExtensions.tapLog(
            orderResult,
            'Order data retrieved',
            { includeValue: false }
          );
        },
        'GetOrderOperation'
      );
