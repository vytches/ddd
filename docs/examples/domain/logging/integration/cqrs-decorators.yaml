# CQRS Decorators - Automatic CQRS Operation Logging

# === FILE METADATA ===
file-name: 'cqrs-decorators'
title: 'CQRS Decorators - Automatic Command and Query Logging'
description: 'Decorator-based automatic logging for CQRS command and query handlers with performance monitoring'
business-context: 'Enterprise CQRS integration providing automatic operation logging, performance monitoring, and correlation tracking for command and query handlers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  CQRSLoggingOptions:
    description: 'Configuration options for CQRS operation logging decorators'
    business-context: 'Flexible configuration enabling customizable logging behavior for different CQRS operation types and security requirements'

    formats:
      jsdoc:
        description: 'CQRS logging decorator configuration'
      cli:
        description: |
          ## CQRSLoggingOptions Interface

          CQRS logging configuration providing:
          - **Payload Control**: Optional command/query payload logging
          - **Data Masking**: Automatic sensitive data protection
          - **Log Level Control**: Configurable verbosity for different operations
          - **Context Naming**: Custom context names for specialized handlers
          - **Performance Tracking**: Built-in execution timing

    properties:
      - name: 'includePayload'
        type: 'boolean'
        description: 'Include command/query payload in log entries (default: false)'
        optional: true
        default: 'false'

      - name: 'maskSensitiveData'
        type: 'boolean'
        description: 'Apply data masking to logged payloads (default: false)'
        optional: true
        default: 'false'

      - name: 'logLevel'
        type: "'debug' | 'info'"
        description: "Log level for CQRS operations (default: 'info')"
        optional: true
        default: "'info'"

      - name: 'contextName'
        type: 'string'
        description: 'Custom context name override for the logger'
        optional: true

    custom-tags:
      since: '1.0.0'
      cqrs-integration: 'Designed specifically for CQRS pattern integration'

# === FUNCTIONS ===
functions:
  LogCommands:
    description: 'Class decorator for automatic logging of all command handler methods'
    business-context: 'Provides comprehensive command execution logging including timing, payload, success/failure status for enterprise command monitoring and debugging'

    parameters:
      - name: 'options'
        type: 'CQRSLoggingOptions'
        description: 'Optional logging configuration'
        optional: true
        default: '{}'

    returns:
      type: 'ClassDecorator'
      description: 'Decorator function that wraps all class methods with logging'

    examples:
      - id: 'basic-command-logging'
        code: |
          @LogCommands()
          class CreateOrderCommandHandler {
            async handle(command: CreateOrderCommand): Promise<Order> {
              // Method automatically logged with:
              // - Entry: "[Command] Executing CreateOrderCommand"
              // - Exit: "[Command] CreateOrderCommand completed" (with timing)
              // - Error: "[Command] CreateOrderCommand failed" (with error details)
              
              return await this.orderService.createOrder(command);
            }
          }

      - id: 'detailed-command-logging'
        code: |
          @LogCommands({
            includePayload: true,
            maskSensitiveData: true,
            logLevel: 'debug',
            contextName: 'OrderCommands'
          })
          class OrderCommandHandlers {
            async handleCreateOrder(command: CreateOrderCommand): Promise<Order> {
              // Logs include masked payload and custom context
              return await this.orderService.createOrder(command);
            }
            
            async handleUpdateOrder(command: UpdateOrderCommand): Promise<Order> {
              // All methods in class are automatically logged
              return await this.orderService.updateOrder(command);
            }
          }

    custom-tags:
      since: '1.0.0'
      decorator-type: 'Class decorator for command handlers'
      performance: 'Includes execution timing for performance monitoring'

  LogQueries:
    description: 'Class decorator for automatic logging of all query handler methods'
    business-context: 'Provides comprehensive query execution logging including timing, payload, success/failure status for enterprise query monitoring and performance analysis'

    parameters:
      - name: 'options'
        type: 'CQRSLoggingOptions'
        description: 'Optional logging configuration'
        optional: true
        default: '{}'

    returns:
      type: 'ClassDecorator'
      description: 'Decorator function that wraps all class methods with logging'

    examples:
      - id: 'basic-query-logging'
        code: |
          @LogQueries()
          class GetOrderQueryHandler {
            async handle(query: GetOrderQuery): Promise<Order | null> {
              // Method automatically logged with:
              // - Entry: "[Query] Executing GetOrderQuery"
              // - Exit: "[Query] GetOrderQuery completed" (with timing)
              // - Error: "[Query] GetOrderQuery failed" (with error details)
              
              return await this.orderRepository.findById(query.orderId);
            }
          }

      - id: 'performance-query-logging'
        code: |
          @LogQueries({
            logLevel: 'debug',
            includePayload: true
          })
          class OrderQueryHandlers {
            async handleGetOrder(query: GetOrderQuery): Promise<Order | null> {
              // Debug-level logging with query parameters
              return await this.orderRepository.findById(query.orderId);
            }
            
            async handleSearchOrders(query: SearchOrdersQuery): Promise<Order[]> {
              // Performance monitoring for complex queries
              return await this.orderRepository.search(query.criteria);
            }
          }

    custom-tags:
      since: '1.0.0'
      decorator-type: 'Class decorator for query handlers'
      performance: 'Includes execution timing for query performance analysis'

  LogCQRS:
    description: 'Universal class decorator for automatic logging of both command and query handlers'
    business-context: 'Provides unified logging for mixed CQRS handlers, simplifying configuration for services handling both commands and queries'

    parameters:
      - name: 'options'
        type: 'CQRSLoggingOptions'
        description: 'Optional logging configuration'
        optional: true
        default: '{}'

    returns:
      type: 'ClassDecorator'
      description: 'Decorator function that wraps all class methods with logging'

    examples:
      - id: 'unified-cqrs-logging'
        code: |
          @LogCQRS({
            includePayload: true,
            logLevel: 'info'
          })
          class OrderService {
            // Commands logged as "[CQRS] Executing CreateOrderCommand"
            async createOrder(command: CreateOrderCommand): Promise<Order> {
              return await this.orderRepository.save(new Order(command));
            }
            
            // Queries logged as "[CQRS] Executing GetOrderQuery"  
            async getOrder(query: GetOrderQuery): Promise<Order | null> {
              return await this.orderRepository.findById(query.orderId);
            }
          }

      - id: 'enterprise-cqrs-logging'
        code: |
          @LogCQRS({
            includePayload: false,  // Security: don't log sensitive payloads
            maskSensitiveData: true,
            logLevel: 'info',
            contextName: 'OrderManagement'
          })
          class EnterpriseOrderService {
            async processPayment(command: ProcessPaymentCommand): Promise<Payment> {
              // Logs without exposing payment details
              return await this.paymentGateway.charge(command);
            }
          }

    custom-tags:
      since: '1.0.0'
      decorator-type: 'Universal class decorator for mixed CQRS operations'
      flexibility: 'Single decorator for services handling both commands and queries'

# === PRIVATE FUNCTIONS ===
private-functions:
  createLoggingWrapper:
    description: 'Internal function creating method wrapper with performance monitoring and error handling'
    business-context: 'Core logging wrapper providing execution timing, payload handling, and comprehensive error logging for CQRS operations'

    parameters:
      - name: 'originalMethod'
        type: 'Function'
        description: 'Original handler method to wrap'
      - name: 'methodName'
        type: 'string'
        description: 'Method name for logging context'
      - name: 'operationType'
        type: 'string'
        description: "Operation type ('Command', 'Query', or 'CQRS')"
      - name: 'options'
        type: 'CQRSLoggingOptions'
        description: 'Logging configuration options'

    returns:
      type: 'Function'
      description: 'Wrapped method with logging capabilities'

    features:
      - 'Performance timing with millisecond precision'
      - 'Automatic operation name detection from command/query types'
      - 'Comprehensive error logging with context preservation'
      - 'Optional payload logging with masking support'
      - 'Logger creation and caching for performance'

  getOrCreateLogger:
    description: 'Internal utility for creating or retrieving cached logger instances'
    business-context: 'Performance optimization ensuring single logger instance per handler class with context detection fallback'

    parameters:
      - name: 'instance'
        type: 'Record<string, unknown>'
        description: 'Handler instance to attach logger to'
      - name: 'contextName'
        type: 'string | undefined'
        description: 'Optional custom context name'

    returns:
      type: 'Logger'
      description: 'Logger instance with appropriate context'

# === EXAMPLES ===
examples:
  enterprise-command-handler:
    description: 'Enterprise-grade command handler with comprehensive logging'
    code: |
      import { LogCommands } from '@vytches/ddd-logging';
      import { CommandHandler, ICommandHandler } from '@vytches/ddd-cqrs';

      @CommandHandler(CreateOrderCommand)
      @LogCommands({
        includePayload: false,      // Security: sensitive order data
        maskSensitiveData: true,
        logLevel: 'info',
        contextName: 'OrderCommands'
      })
      class CreateOrderCommandHandler implements ICommandHandler<CreateOrderCommand> {
        constructor(
          private orderService: OrderService,
          private eventBus: EventBus
        ) {}
        
        async execute(command: CreateOrderCommand): Promise<void> {
          // Automatic logging:
          // INFO [OrderCommands] [CreateOrderCommandHandler] [Command] Executing CreateOrderCommand {"operation":"Command","handler":"CreateOrderCommandHandler","method":"execute","operationName":"CreateOrderCommand"}
          
          const order = await this.orderService.createOrder(command);
          await this.eventBus.publish(new OrderCreatedEvent(order));
          
          // On success:
          // INFO [OrderCommands] [CreateOrderCommandHandler] [Command] CreateOrderCommand completed {"operation":"Command","handler":"CreateOrderCommandHandler","method":"execute","operationName":"CreateOrderCommand","duration":"45.23ms","success":true}
          
          // On error:
          // ERROR [OrderCommands] [CreateOrderCommandHandler] [Command] CreateOrderCommand failed {"operation":"Command","handler":"CreateOrderCommandHandler","method":"execute","operationName":"CreateOrderCommand","duration":"12.45ms","success":false}
        }
      }

  performance-optimized-query-handler:
    description: 'Query handler with performance monitoring and debug logging'
    code: |
      @QueryHandler(SearchOrdersQuery)
      @LogQueries({
        includePayload: true,
        logLevel: 'debug',  // Detailed logging for performance analysis
        contextName: 'OrderQueries'
      })
      class SearchOrdersQueryHandler implements IQueryHandler<SearchOrdersQuery> {
        constructor(private orderRepository: OrderRepository) {}
        
        async execute(query: SearchOrdersQuery): Promise<OrderSearchResult> {
          // Debug logging includes query parameters for performance analysis
          const startTime = Date.now();
          
          const results = await this.orderRepository.search({
            filters: query.filters,
            pagination: query.pagination,
            sorting: query.sorting
          });
          
          // Automatic performance logging helps identify slow queries
          // DEBUG [OrderQueries] [SearchOrdersQueryHandler] [Query] SearchOrdersQuery completed {"duration":"234.56ms","resultCount":45}
          
          return results;
        }
      }

  mixed-service-with-unified-logging:
    description: 'Service handling both commands and queries with unified logging'
    code: |
      @LogCQRS({
        includePayload: true,
        maskSensitiveData: true,
        logLevel: 'info'
      })
      class OrderApplicationService {
        constructor(
          private orderService: OrderService,
          private orderRepository: OrderRepository
        ) {}
        
        // Command operations
        async createOrder(command: CreateOrderCommand): Promise<Order> {
          // Logged as: [CQRS] Executing CreateOrderCommand
          return await this.orderService.createOrder(command);
        }
        
        async updateOrder(command: UpdateOrderCommand): Promise<Order> {
          // Logged as: [CQRS] Executing UpdateOrderCommand
          return await this.orderService.updateOrder(command);
        }
        
        // Query operations
        async getOrder(query: GetOrderQuery): Promise<Order | null> {
          // Logged as: [CQRS] Executing GetOrderQuery
          return await this.orderRepository.findById(query.orderId);
        }
        
        async searchOrders(query: SearchOrdersQuery): Promise<Order[]> {
          // Logged as: [CQRS] Executing SearchOrdersQuery
          return await this.orderRepository.search(query.criteria);
        }
      }

  conditional-logging-based-on-environment:
    description: 'Environment-aware CQRS logging configuration'
    code: |
      const createCQRSLoggingOptions = (): CQRSLoggingOptions => {
        const isProduction = process.env.NODE_ENV === 'production';
        const isDevelopment = process.env.NODE_ENV === 'development';
        
        if (isProduction) {
          return {
            includePayload: false,     // Security: no sensitive data in prod logs
            maskSensitiveData: true,
            logLevel: 'info'
          };
        }
        
        if (isDevelopment) {
          return {
            includePayload: true,      // Full debugging info in development
            maskSensitiveData: false,  // Raw data for debugging
            logLevel: 'debug'
          };
        }
        
        // Test/staging environment
        return {
          includePayload: true,
          maskSensitiveData: true,   // Practice production security
          logLevel: 'info'
        };
      };

      @LogCommands(createCQRSLoggingOptions())
      class EnvironmentAwareCommandHandler {
        // Logging behavior adapts to deployment environment
      }

  correlation-tracking-integration:
    description: 'CQRS logging with correlation ID and user context tracking'
    code: |
      @LogCommands({
        includePayload: true,
        logLevel: 'info'
      })
      class TrackedCommandHandler {
        constructor(private logger: Logger) {}
        
        async execute(command: CreateOrderCommand): Promise<void> {
          // Enhance logger with correlation context before processing
          const correlatedLogger = this.logger
            .withCorrelationId(command.metadata.correlationId)
            .withUserId(command.metadata.userId)
            .withTenantId(command.metadata.tenantId);
          
          // CQRS decorator uses enhanced logger context
          // INFO [Orders] [TrackedCommandHandler] (req-abc123) [Command] Executing CreateOrderCommand
          
          await this.orderService.createOrder(command);
        }
      }
