# Log Event - Structured Log Event Implementation

# === FILE METADATA ===
file-name: 'log-event'
title: 'LogEvent - Structured Log Event Implementation'
description: 'Core log event structure and builder for enterprise logging'
business-context: 'Standardized log event format enabling structured logging, correlation tracking, and enterprise observability'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  LogEvent:
    description: 'Structured log event interface containing all log metadata and context'
    business-context: 'Core data structure for log entries supporting enterprise features like correlation tracking, structured data, and error handling'

    formats:
      jsdoc:
        description: 'Structured log event with enterprise metadata'
      cli:
        description: |
          ## LogEvent Interface

          Core log event structure providing:
          - **Unique identification**: Generated ID for log correlation
          - **Temporal ordering**: Precise timestamp for event sequencing
          - **Contextual metadata**: Bounded context, correlation, user tracking
          - **Structured data**: Rich metadata with automatic masking
          - **Error handling**: Full error object capture with stack traces
          - **Tagging system**: Flexible tag-based organization

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier for this log event enabling correlation and deduplication'
        readonly: true

      - name: 'timestamp'
        type: 'Date'
        description: 'Precise timestamp when the log event was created'
        readonly: true

      - name: 'level'
        type: 'LogLevel'
        description: 'Log level (trace, debug, info, warn, error, fatal)'
        readonly: true

      - name: 'message'
        type: 'string'
        description: 'Primary log message describing the event'
        readonly: true

      - name: 'context'
        type: 'LogContext'
        description: 'DDD context information including bounded context, correlation, and user data'
        readonly: true

      - name: 'data'
        type: 'Record<string, unknown>'
        description: 'Optional structured data associated with the log event (automatically masked if sensitive)'
        readonly: true
        optional: true

      - name: 'error'
        type: 'Error'
        description: 'Optional error object with stack trace for error and fatal level events'
        readonly: true
        optional: true

      - name: 'tags'
        type: 'readonly string[]'
        description: 'Optional tags for categorizing and filtering log events'
        readonly: true
        optional: true

    custom-tags:
      since: '1.0.0'
      immutable: 'All properties are readonly for event integrity'
      enterprise-features: 'ID generation, correlation tracking, data masking'

  LogEventBuilder:
    description: 'Builder interface for constructing log events with fluent API'
    business-context: 'Provides type-safe and fluent API for building structured log events with validation'

    formats:
      jsdoc:
        description: 'Builder pattern for constructing log events'
      cli:
        description: |
          ## LogEventBuilder Interface

          Builder pattern providing:
          - **Fluent API**: Chainable method calls for event construction
          - **Type safety**: Compile-time validation of log event structure
          - **Incremental building**: Add data, errors, and tags as needed
          - **Immutable result**: Built events are immutable for integrity

    methods:
      withData:
        description: 'Adds structured data to the log event'
        parameters:
          - name: 'data'
            type: 'Record<string, unknown>'
            description: 'Structured data to add (will be merged with existing data)'
        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

      withError:
        description: 'Adds error object to the log event'
        parameters:
          - name: 'error'
            type: 'Error'
            description: 'Error object with message and stack trace'
        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

      withTags:
        description: 'Adds tags to the log event for categorization'
        parameters:
          - name: 'tags'
            type: '...string[]'
            description: 'Variable number of tags to add'
        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

      build:
        description: 'Constructs the final immutable log event'
        returns:
          type: 'LogEvent'
          description: 'Immutable log event with all specified properties'

    custom-tags:
      since: '1.0.0'
      pattern: 'Builder pattern for log event construction'

# === CLASSES ===
classes:
  DefaultLogEventBuilder:
    # Class Documentation
    class-doc:
      description: 'Default implementation of LogEventBuilder providing fluent log event construction'
      business-context: 'Production-ready builder implementation with automatic ID generation, timestamp creation, and data merging'

      formats:
        jsdoc:
          description: 'Default log event builder with fluent API'
        cli:
          description: |
            ## DefaultLogEventBuilder

            Production builder implementation providing:
            - **Automatic ID generation**: Unique IDs with timestamp and randomness
            - **Precise timestamping**: Millisecond precision event timing
            - **Data merging**: Intelligent merging of structured data
            - **Tag accumulation**: Additive tag management
            - **Immutable output**: Thread-safe immutable event creation

      custom-tags:
        since: '1.0.0'
        implementation: 'Default LogEventBuilder implementation'

    methods:
      constructor:
        description: 'Creates new log event builder with required base properties'
        business-context: 'Initializes builder with core event properties and generates unique ID with timestamp'

        parameters:
          - name: 'level'
            type: 'LogLevel'
            description: 'Log level for the event'
          - name: 'message'
            type: 'string'
            description: 'Primary log message'
          - name: 'context'
            type: 'LogContext'
            description: 'DDD logging context with bounded context and correlation data'

        examples:
          - id: 'basic-construction'
            code: |
              const context = new DefaultLogContextBuilder('OrderService')
                .withBoundedContext('OrderManagement')
                .withCorrelationId('req-123')
                .build();

              const builder = new DefaultLogEventBuilder('info', 'Order processed', context);

      withData:
        description: 'Adds structured data to the log event with intelligent merging'
        business-context: 'Accumulates structured metadata for rich log analysis while preserving existing data'

        parameters:
          - name: 'data'
            type: 'Record<string, unknown>'
            description: 'Structured data to merge with existing event data'

        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'data-accumulation'
            code: |
              const event = builder
                .withData({ orderId: 'order-123', customerId: 'cust-456' })
                .withData({ processingTime: '150ms', status: 'completed' })
                .build();
              // Results in merged data object with all properties

      withError:
        description: 'Associates error object with the log event for error tracking'
        business-context: 'Captures complete error information including stack traces for debugging and monitoring'

        parameters:
          - name: 'error'
            type: 'Error'
            description: 'Error object containing message, stack trace, and properties'

        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'error-capture'
            code: |
              try {
                await paymentService.processPayment(order);
              } catch (error) {
                const logEvent = builder
                  .withError(error)
                  .withData({ orderId: order.id, amount: order.total })
                  .build();
              }

      withTags:
        description: 'Adds tags for log event categorization and filtering'
        business-context: 'Enables flexible log categorization for monitoring, alerting, and analysis'

        parameters:
          - name: 'tags'
            type: '...string[]'
            description: 'Variable number of string tags to add'

        returns:
          type: 'LogEventBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'tag-categorization'
            code: |
              const event = builder
                .withTags('payment', 'critical', 'customer-facing')
                .withTags('retry-needed')  // Tags accumulate
                .build();

      build:
        description: 'Constructs final immutable log event with all accumulated properties'
        business-context: 'Creates thread-safe immutable log event ready for processing by log providers'

        returns:
          type: 'LogEvent'
          description: 'Immutable log event containing all specified properties and metadata'

        examples:
          - id: 'complete-event'
            code: |
              const logEvent = new DefaultLogEventBuilder('error', 'Payment failed', context)
                .withData({ orderId: 'order-123', amount: 99.99 })
                .withError(paymentError)
                .withTags('payment', 'error', 'retry-needed')
                .build();
                
              // logEvent is now immutable and ready for logging
