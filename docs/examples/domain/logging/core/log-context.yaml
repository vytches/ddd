# Log Context - DDD Context and Builder Implementation

# === FILE METADATA ===
file-name: 'log-context'
title: 'LogContext - DDD Context and Builder Implementation'
description: 'Log context interfaces and builder for DDD-aware structured logging'
business-context: 'Provides DDD bounded context awareness, correlation tracking, and enterprise context management for distributed systems'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  LogContext:
    description: 'DDD-aware logging context containing bounded context, correlation, and enterprise tracking data'
    business-context: 'Core context structure enabling distributed tracing, multi-tenancy, and DDD bounded context awareness across service boundaries'

    formats:
      jsdoc:
        description: 'DDD logging context with correlation tracking'
      cli:
        description: |
          ## LogContext Interface

          DDD-aware context providing:
          - **Bounded Context**: Automatic DDD domain context detection
          - **Correlation Tracking**: Request correlation across service boundaries
          - **Multi-tenancy**: Tenant isolation and filtering
          - **User Tracking**: User action correlation and audit trails
          - **Request Lifecycle**: Complete request tracking from entry to completion
          - **Session Management**: User session correlation
          - **Custom Metadata**: Flexible key-value metadata support

    properties:
      - name: 'name'
        type: 'string'
        description: 'Context name, typically class name or service name'
        readonly: true

      - name: 'boundedContext'
        type: 'string | undefined'
        description: 'DDD bounded context name for domain correlation'
        readonly: true
        optional: true

      - name: 'correlationId'
        type: 'string | undefined'
        description: 'Request correlation ID for distributed tracing'
        readonly: true
        optional: true

      - name: 'userId'
        type: 'string | undefined'
        description: 'User identifier for action correlation and audit trails'
        readonly: true
        optional: true

      - name: 'tenantId'
        type: 'string | undefined'
        description: 'Tenant identifier for multi-tenant applications'
        readonly: true
        optional: true

      - name: 'requestId'
        type: 'string | undefined'
        description: 'Request identifier for request lifecycle tracking'
        readonly: true
        optional: true

      - name: 'sessionId'
        type: 'string | undefined'
        description: 'User session identifier for session correlation'
        readonly: true
        optional: true

      - name: 'metadata'
        type: 'Record<string, unknown> | undefined'
        description: 'Custom metadata for application-specific context'
        readonly: true
        optional: true

    custom-tags:
      since: '1.0.0'
      ddd-integration: 'Bounded context awareness and domain correlation'
      enterprise-features: 'Multi-tenancy, correlation tracking, audit trails'

  LogContextBuilder:
    description: 'Fluent builder interface for constructing log contexts with validation'
    business-context: 'Type-safe builder pattern for constructing enterprise logging contexts with validation and fluent API'

    formats:
      jsdoc:
        description: 'Fluent builder for log context construction'
      cli:
        description: |
          ## LogContextBuilder Interface

          Fluent builder providing:
          - **Type Safety**: Compile-time validation of context construction
          - **Method Chaining**: Fluent API for readable context building
          - **Flexible Metadata**: Support for key-value and object metadata
          - **Validation**: Built-in validation for enterprise context requirements
          - **Immutable Output**: Thread-safe immutable context creation

    methods:
      withBoundedContext:
        description: 'Sets the DDD bounded context name for domain correlation'
        parameters:
          - name: 'context'
            type: 'string'
            description: 'Bounded context name from DDD domain model'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withCorrelationId:
        description: 'Sets correlation ID for distributed request tracing'
        parameters:
          - name: 'id'
            type: 'string'
            description: 'Unique correlation identifier for request tracking'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withUserId:
        description: 'Sets user ID for action correlation and audit trails'
        parameters:
          - name: 'id'
            type: 'string'
            description: 'User identifier for security and audit logging'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withTenantId:
        description: 'Sets tenant ID for multi-tenant application isolation'
        parameters:
          - name: 'id'
            type: 'string'
            description: 'Tenant identifier for data isolation and compliance'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withRequestId:
        description: 'Sets request ID for request lifecycle tracking'
        parameters:
          - name: 'id'
            type: 'string'
            description: 'Request identifier for end-to-end tracking'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withSessionId:
        description: 'Sets session ID for user session correlation'
        parameters:
          - name: 'id'
            type: 'string'
            description: 'Session identifier for user session tracking'
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      withMetadata:
        description: 'Adds custom metadata to the log context (overloaded method)'
        parameters:
          - name: 'keyOrMetadata'
            type: 'string | Record<string, unknown>'
            description: 'Metadata key or complete metadata object'
          - name: 'value'
            type: 'unknown'
            description: 'Metadata value (only when first parameter is string)'
            optional: true
        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

      build:
        description: 'Constructs the final immutable log context'
        returns:
          type: 'LogContext'
          description: 'Immutable log context with all specified properties'

    custom-tags:
      since: '1.0.0'
      pattern: 'Builder pattern for context construction'

# === CLASSES ===
classes:
  DefaultLogContextBuilder:
    # Class Documentation
    class-doc:
      description: 'Default implementation of LogContextBuilder providing fluent log context construction with enterprise features'
      business-context: 'Production-ready builder implementation with intelligent metadata merging, validation, and immutable output for enterprise logging contexts'

      formats:
        jsdoc:
          description: 'Default log context builder with enterprise features'
        cli:
          description: |
            ## DefaultLogContextBuilder

            Production builder implementation providing:
            - **Intelligent Merging**: Smart metadata merging preserving existing values
            - **Type Safety**: Runtime validation of context properties
            - **Immutable Output**: Thread-safe context creation
            - **Flexible Metadata**: Support for both key-value and object metadata
            - **Enterprise Ready**: Full support for multi-tenancy and correlation

      custom-tags:
        since: '1.0.0'
        implementation: 'Default LogContextBuilder implementation'

    methods:
      constructor:
        description: 'Creates new context builder with required context name'
        business-context: 'Initializes builder with mandatory context name, typically auto-detected class or service name'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Context name, typically class or service name'

        examples:
          - id: 'service-context'
            code: |
              const builder = new DefaultLogContextBuilder('OrderService');

          - id: 'auto-detected-context'
            code: |
              // Usually auto-detected by Logger.create()
              class PaymentProcessor {
                private logger = Logger.create(); // Auto-detects "PaymentProcessor"
              }

      withBoundedContext:
        description: 'Sets DDD bounded context for domain-specific logging correlation'
        business-context: 'Associates logs with specific DDD bounded contexts enabling domain-focused monitoring and troubleshooting'

        parameters:
          - name: 'boundedContext'
            type: 'string'
            description: 'DDD bounded context name from domain model'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'domain-context'
            code: |
              const context = new DefaultLogContextBuilder('OrderService')
                .withBoundedContext('OrderManagement')
                .build();

      withCorrelationId:
        description: 'Sets correlation ID for distributed request tracing across services'
        business-context: 'Enables end-to-end request tracking across microservices and domain boundaries for debugging and performance monitoring'

        parameters:
          - name: 'correlationId'
            type: 'string'
            description: 'Unique correlation identifier, often from HTTP headers'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'distributed-tracing'
            code: |
              // Typically from HTTP request headers
              const correlationId = request.headers['x-correlation-id'] || generateUUID();
              const context = builder
                .withCorrelationId(correlationId)
                .build();

      withUserId:
        description: 'Sets user ID for audit trails and user action correlation'
        business-context: 'Associates log entries with specific users for security auditing, troubleshooting user issues, and compliance requirements'

        parameters:
          - name: 'userId'
            type: 'string'
            description: 'User identifier from authentication system'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'user-audit-trail'
            code: |
              const context = builder
                .withUserId(authenticatedUser.id)
                .withCorrelationId(request.correlationId)
                .build();

      withTenantId:
        description: 'Sets tenant ID for multi-tenant application data isolation and compliance'
        business-context: 'Enables tenant-specific log filtering, compliance reporting, and data isolation in multi-tenant SaaS applications'

        parameters:
          - name: 'tenantId'
            type: 'string'
            description: 'Tenant identifier for multi-tenant isolation'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'multi-tenant-isolation'
            code: |
              const context = builder
                .withTenantId(request.tenantId)
                .withUserId(request.userId)
                .build();

      withRequestId:
        description: 'Sets request ID for complete request lifecycle tracking'
        business-context: 'Tracks individual requests from entry to completion enabling request-specific debugging and performance analysis'

        parameters:
          - name: 'requestId'
            type: 'string'
            description: 'Unique request identifier for lifecycle tracking'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'request-lifecycle'
            code: |
              const requestId = request.id || `req-${Date.now()}-${randomString()}`;
              const context = builder
                .withRequestId(requestId)
                .withCorrelationId(request.correlationId)
                .build();

      withSessionId:
        description: 'Sets session ID for user session correlation and analysis'
        business-context: 'Correlates log entries within user sessions for session-based analysis, security monitoring, and user experience troubleshooting'

        parameters:
          - name: 'sessionId'
            type: 'string'
            description: 'User session identifier'

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'session-correlation'
            code: |
              const context = builder
                .withSessionId(request.sessionId)
                .withUserId(request.userId)
                .build();

      withMetadata:
        description: 'Adds custom metadata using key-value pairs or object merging'
        business-context: 'Provides flexible mechanism for application-specific context data, configuration values, and custom tracking information'

        parameters:
          - name: 'keyOrMetadata'
            type: 'string | Record<string, unknown>'
            description: 'Metadata key string or complete metadata object to merge'
          - name: 'value'
            type: 'unknown'
            description: 'Metadata value when first parameter is a key'
            optional: true

        returns:
          type: 'LogContextBuilder'
          description: 'Builder instance for method chaining'

        examples:
          - id: 'key-value-metadata'
            code: |
              const context = builder
                .withMetadata('environment', 'production')
                .withMetadata('feature', 'order-processing-v2')
                .build();

          - id: 'object-metadata'
            code: |
              const context = builder
                .withMetadata({
                  environment: 'production',
                  version: '2.1.0',
                  region: 'us-east-1',
                  deployment: 'blue-green'
                })
                .build();

      build:
        description: 'Constructs final immutable log context with validation and optimization'
        business-context: 'Creates thread-safe immutable context suitable for concurrent logging operations with optional property elimination'

        returns:
          type: 'LogContext'
          description: 'Immutable log context with all specified properties, undefined properties omitted'

        examples:
          - id: 'complete-enterprise-context'
            code: |
              const context = new DefaultLogContextBuilder('OrderService')
                .withBoundedContext('OrderManagement')
                .withCorrelationId('req-123-456')
                .withUserId('user-789')
                .withTenantId('tenant-abc')
                .withRequestId('req-123')
                .withSessionId('session-def')
                .withMetadata({
                  operation: 'processOrder',
                  version: '2.1.0',
                  feature: 'enhanced-checkout'
                })
                .build();
                
              // context is now immutable and ready for logging
