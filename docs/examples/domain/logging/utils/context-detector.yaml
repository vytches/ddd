# Context Detector - Automatic DDD Context Detection

# === FILE METADATA ===
file-name: 'context-detector'
title: 'ContextDetector - Smart DDD Context Detection'
description: 'Automatic DDD bounded context and class detection from stack traces'
business-context: 'Enables zero-configuration logging with automatic DDD bounded context detection, reducing manual configuration and improving developer experience'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ContextDetectionResult:
    description: 'Result of automatic context detection containing DDD and technical context information'
    business-context: 'Comprehensive context information enabling DDD-aware logging with bounded context correlation and debugging support'

    formats:
      jsdoc:
        description: 'Auto-detected context information with DDD awareness'
      cli:
        description: |
          ## ContextDetectionResult Interface

          Detection result providing:
          - **Context Name**: Primary identifier, typically class name
          - **Bounded Context**: DDD domain context for business correlation
          - **Technical Details**: File, class, and method information for debugging
          - **Fallback Handling**: Graceful degradation when detection fails

    properties:
      - name: 'contextName'
        type: 'string'
        description: 'Primary context name, typically class name or file-based name'

      - name: 'boundedContext'
        type: 'string | undefined'
        description: 'Detected DDD bounded context from file path patterns'
        optional: true

      - name: 'fileName'
        type: 'string | undefined'
        description: 'Source file name without extension'
        optional: true

      - name: 'className'
        type: 'string | undefined'
        description: 'Detected class name from stack trace'
        optional: true

      - name: 'methodName'
        type: 'string | undefined'
        description: 'Method name where logging was initiated'
        optional: true

    custom-tags:
      since: '1.0.0'
      detection-source: 'Stack trace analysis with pattern matching'

  StackTraceFrame:
    description: 'Internal interface representing parsed stack trace frame information'
    business-context: 'Internal structure for stack trace parsing enabling reliable context detection across different JavaScript environments'

    formats:
      jsdoc:
        description: 'Parsed stack trace frame data'
      cli:
        description: |
          ## StackTraceFrame Interface

          Internal frame structure containing:
          - **Class Information**: Extracted class names from traces
          - **Method Context**: Method execution context
          - **File Details**: Source file information for path-based detection
          - **Full Path**: Complete file path for pattern matching

    properties:
      - name: 'className'
        type: 'string | undefined'
        description: 'Extracted class name from stack frame'
        optional: true

      - name: 'methodName'
        type: 'string | undefined'
        description: 'Method name from stack frame'
        optional: true

      - name: 'fileName'
        type: 'string | undefined'
        description: 'File name without path and extension'
        optional: true

      - name: 'filePath'
        type: 'string | undefined'
        description: 'Complete file path for pattern matching'
        optional: true

    custom-tags:
      since: '1.0.0'
      visibility: 'Internal interface for stack parsing'

# === CLASSES ===
classes:
  ContextDetector:
    # Class Documentation
    class-doc:
      description: 'Smart context detector using stack trace analysis for automatic DDD bounded context and class detection'
      business-context: 'Zero-configuration context detection enabling automatic DDD-aware logging without manual setup, improving developer productivity and reducing configuration overhead'

      formats:
        jsdoc:
          description: 'Automatic DDD context detection from stack traces'
        cli:
          description: |
            ## ContextDetector - Smart DDD Context Detection

            Enterprise context detection providing:
            - **Zero Configuration**: Automatic detection without setup
            - **DDD Awareness**: Bounded context detection from project structure
            - **Fallback Safety**: Graceful handling of detection failures
            - **Performance Optimized**: Efficient stack trace parsing
            - **Pattern Matching**: Intelligent pattern recognition for contexts
            - **Environment Agnostic**: Works across Node.js and browser environments

      custom-tags:
        since: '1.0.0'
        detection-strategy: 'Stack trace analysis with pattern matching'
        performance: 'Optimized for hot path execution'

    methods:
      detectContext:
        description: 'Detects DDD bounded context and class information from current execution stack'
        business-context: 'Primary detection method enabling automatic context discovery for DDD-aware logging without configuration'

        parameters:
          - name: 'skipFrames'
            type: 'number'
            description: 'Number of stack frames to skip (default: 3 to skip internal frames)'
            optional: true
            default: '3'

        returns:
          type: 'ContextDetectionResult'
          description: 'Detection result with context name, bounded context, and technical details'

        examples:
          - id: 'automatic-detection'
            code: |
              class OrderService {
                processOrder() {
                  // Auto-detects: contextName="OrderService", boundedContext from path
                  const result = ContextDetector.detectContext();
                  // Result: { contextName: "OrderService", boundedContext: "Orders", ... }
                }
              }

          - id: 'custom-skip-frames'
            code: |
              // Skip additional frames when called from wrapper functions
              function loggingWrapper() {
                // Skip 4 frames instead of default 3
                const context = ContextDetector.detectContext(4);
                return Logger.create(context.contextName);
              }

        custom-tags:
          static: true
          performance: 'Cached patterns for efficient detection'
          fallback: "Returns 'Unknown' context on detection failure"

    # Private methods documentation for completeness
    private-methods:
      captureStackTrace:
        description: 'Captures current execution stack trace with environment compatibility'
        business-context: 'Low-level stack capture handling different JavaScript engines and environments'
        returns:
          type: 'string'
          description: 'Raw stack trace string for parsing'

      parseStackFrame:
        description: 'Parses stack trace string to extract frame information'
        business-context: 'Extracts meaningful context from raw stack traces with test file filtering'
        parameters:
          - name: 'stack'
            type: 'string'
            description: 'Raw stack trace string'
          - name: 'skipFrames'
            type: 'number'
            description: 'Number of frames to skip from top'
        returns:
          type: 'StackTraceFrame | null'
          description: 'Parsed frame data or null if parsing fails'

      extractContextName:
        description: 'Determines primary context name from frame information'
        business-context: 'Prioritizes class names over file names for meaningful context identification'
        parameters:
          - name: 'frame'
            type: 'StackTraceFrame'
            description: 'Parsed stack frame data'
        returns:
          type: 'string'
          description: "Context name, defaulting to 'Unknown' if unable to determine"

      extractBoundedContext:
        description: 'Detects DDD bounded context from file path patterns'
        business-context: 'Uses configurable patterns to identify DDD domains from project structure'
        parameters:
          - name: 'frame'
            type: 'StackTraceFrame'
            description: 'Parsed stack frame with file path information'
        returns:
          type: 'string | undefined'
          description: 'Detected bounded context or undefined if not found'

# === CONSTANTS ===
constants:
  BOUNDED_CONTEXT_PATTERNS:
    description: 'Regular expression patterns for detecting DDD bounded contexts from file paths'
    business-context: 'Configurable patterns supporting various project structures and DDD organization conventions'

    formats:
      jsdoc:
        description: 'Regex patterns for bounded context detection'
      cli:
        description: |
          ## Bounded Context Detection Patterns

          Pattern matching for:
          - **Package Structure**: `packages/orders/src` → "Orders"
          - **Domain Folders**: `src/orders/` → "Orders"  
          - **Service Names**: `OrderService` → "Order"

          Supports common DDD project organizations.

    type: 'readonly RegExp[]'
    patterns:
      - pattern: '/packages/([^/]+)/src/'
        description: 'Detects bounded context from monorepo package structure'
      - pattern: '/src/([^/]+)/'
        description: 'Detects bounded context from domain folder structure'
      - pattern: '/([A-Z][a-z]+(?:[A-Z][a-z]+)*?)(?:Service|Handler|Repository|Controller)/'
        description: 'Detects bounded context from class naming conventions'

    custom-tags:
      since: '1.0.0'
      configurable: 'Patterns can be extended for custom project structures'

# === EXAMPLES ===
examples:
  automatic-ddd-detection:
    description: 'Demonstrates automatic DDD bounded context detection in action'
    code: |
      // File: packages/orders/src/services/OrderService.ts
      class OrderService {
        processOrder(order: Order) {
          const logger = Logger.create(); // Uses ContextDetector.detectContext()
          
          // Auto-detected context:
          // - contextName: "OrderService"
          // - boundedContext: "Orders" (from packages/orders/src pattern)
          // - fileName: "OrderService"
          // - className: "OrderService"  
          // - methodName: "processOrder"
          
          logger.info('Processing order', { orderId: order.id });
        }
      }

  fallback-handling:
    description: 'Shows graceful fallback when detection fails'
    code: |
      // In environments where stack traces aren't available
      const result = ContextDetector.detectContext();
      // Result: { 
      //   contextName: "Unknown", 
      //   boundedContext: undefined,
      //   fileName: undefined,
      //   className: undefined,
      //   methodName: undefined 
      // }

      // Logger still works with fallback context
      const logger = Logger.create(result.contextName); // Creates "Unknown" context

  custom-skip-frames:
    description: 'Handling wrapper functions with custom frame skipping'
    code: |
      function createDomainLogger() {
        // Skip additional frame to detect actual calling class
        const context = ContextDetector.detectContext(4);
        return Logger.create(context.contextName)
          .withBoundedContext(context.boundedContext || 'Unknown');
      }

      class PaymentService {
        processPayment() {
          const logger = createDomainLogger(); // Detects "PaymentService"
          logger.info('Payment processing started');
        }
      }
