# enhanced-command-bus - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'enhanced-command-bus'
title: 'EnhancedCommandBus - Command Bus with Metrics'
description: 'Enhanced command bus with built-in performance metrics and logging middleware'
business-context: 'Production-ready command bus with observability and performance tracking'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EnhancedCommandBus:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enhanced command bus with built-in metrics collection and logging middleware'
      business-context: 'Production-ready command bus providing observability and performance monitoring out-of-the-box'

      formats:
        jsdoc:
          description: 'EnhancedCommandBus with performance metrics and built-in logging'
        cli:
          description: |
            ## EnhancedCommandBus

            Production-ready command bus featuring:
            - Built-in performance metrics collection
            - Automatic logging middleware integration
            - Execution time tracking and averages
            - Error rate monitoring
            - Metrics reporting and reset capabilities
            - All standard CommandBus functionality

      custom-tags:
        extends: 'CommandBus'
        production-ready: 'Includes observability features'

    # Private Properties (for documentation completeness)
    properties:
      metrics:
        description: 'Internal metrics collection object'
        type: '{ executionCount: number; totalExecutionTime: number; errors: number }'
        readonly: false
        private: true
        business-context: 'Tracks command execution statistics for monitoring'

    # Methods
    methods:
      constructor:
        description: 'Creates enhanced command bus with metrics and logging'
        business-context: 'Initializes command bus with built-in observability features'

        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Dependency injection container for handler resolution'

        examples:
          - id: 'basic-setup'
            code: |
              const container = new SimpleContainer();
              const commandBus = new EnhancedCommandBus(container);

              // Built-in logging middleware is automatically added
              // Metrics collection starts immediately

          - id: 'with-additional-middleware'
            code: |
              const container = new SimpleContainer();
              const enhancedBus = new EnhancedCommandBus(container);

              // Add more middleware (logging is already included)
              enhancedBus
                .use(new ValidationMiddleware())
                .use(new RetryMiddleware({ maxAttempts: 3 }))
                .use(new CacheInvalidationMiddleware());

          - id: 'production-setup'
            code: |
              const container = new SimpleContainer();
              const enhancedBus = new EnhancedCommandBus(container);

              // Set up metrics monitoring
              setInterval(() => {
                const metrics = enhancedBus.getMetrics();
                console.log('Command Bus Metrics:', {
                  executionCount: metrics.executionCount,
                  averageExecutionTime: `${metrics.averageExecutionTime.toFixed(2)}ms`,
                  errorRate: `${((metrics.errors / metrics.executionCount) * 100).toFixed(2)}%`
                });
              }, 60000); // Log metrics every minute

        custom-tags:
          automatic-features: 'Automatically includes LoggingMiddleware'
          metrics-start: 'Metrics collection begins immediately'

      execute:
        description: 'Executes command with performance tracking and metrics collection'
        business-context: 'Standard command execution enhanced with automatic metrics collection'

        parameters:
          - name: 'command'
            type: 'T extends ICommand'
            description: 'Command instance to execute'

        returns:
          type: 'Promise<TResult>'
          description: 'Promise resolving to handler execution result'

        throws:
          - type: 'HandlerNotFoundError'
            description: 'When no handler is registered for command type'
          - type: 'Any handler errors'
            description: 'Re-throws errors from command handlers after updating error metrics'

        examples:
          - id: 'basic-execution-with-metrics'
            code: |
              const command = new CreateUserCommand(userData);

              // Execute command - metrics are collected automatically
              await enhancedBus.execute(command);

              // Check metrics after execution
              const metrics = enhancedBus.getMetrics();
              console.log(`Executed ${metrics.executionCount} commands`);
              console.log(`Average execution time: ${metrics.averageExecutionTime}ms`);

          - id: 'error-handling-with-metrics'
            code: |
              try {
                const command = new ProcessPaymentCommand(paymentData);
                await enhancedBus.execute(command);
              } catch (error) {
                // Error metrics are automatically updated
                const metrics = enhancedBus.getMetrics();
                console.log(`Error rate: ${(metrics.errors / metrics.executionCount) * 100}%`);
                throw error;
              }

          - id: 'performance-monitoring'
            code: |
              // Monitor slow commands
              const slowCommandThreshold = 1000; // 1 second

              const command = new ComplexAnalyticsCommand(params);
              const startTime = performance.now();

              await enhancedBus.execute(command);

              const executionTime = performance.now() - startTime;
              const metrics = enhancedBus.getMetrics();

              if (executionTime > slowCommandThreshold) {
                console.warn('Slow command detected:', {
                  command: command.constructor.name,
                  executionTime,
                  averageTime: metrics.averageExecutionTime
                });
              }

        custom-tags:
          override: 'Overrides base CommandBus.execute method'
          metrics-collection: 'Automatically collects execution time and error statistics'
          performance-tracking: 'Uses performance.now() for accurate timing'

      getMetrics:
        description: 'Returns current command bus performance metrics'
        business-context: 'Provides insights into command execution patterns for monitoring and optimization'

        returns:
          type: '{ executionCount: number; totalExecutionTime: number; errors: number; averageExecutionTime: number }'
          description: 'Current metrics including calculated average execution time'

        examples:
          - id: 'basic-metrics-retrieval'
            code: |
              const metrics = enhancedBus.getMetrics();
              console.log(JSON.stringify(metrics, null, 2));

              // Output:
              // {
              //   "executionCount": 150,
              //   "totalExecutionTime": 4500,
              //   "errors": 3,
              //   "averageExecutionTime": 30
              // }

          - id: 'performance-dashboard'
            code: |
              function generatePerformanceDashboard() {
                const metrics = enhancedBus.getMetrics();
                
                return {
                  summary: {
                    totalCommands: metrics.executionCount,
                    successfulCommands: metrics.executionCount - metrics.errors,
                    failedCommands: metrics.errors,
                    successRate: `${(((metrics.executionCount - metrics.errors) / metrics.executionCount) * 100).toFixed(2)}%`,
                    averageResponseTime: `${metrics.averageExecutionTime.toFixed(2)}ms`
                  },
                  health: {
                    status: metrics.errors / metrics.executionCount > 0.05 ? 'DEGRADED' : 'HEALTHY',
                    performance: metrics.averageExecutionTime > 1000 ? 'SLOW' : 'NORMAL'
                  }
                };
              }

          - id: 'monitoring-integration'
            code: |
              // Export metrics to monitoring system
              class CommandBusMetricsExporter {
                constructor(private enhancedBus: EnhancedCommandBus) {}
                
                exportToPrometheus() {
                  const metrics = this.enhancedBus.getMetrics();
                  return {
                    'command_bus_executions_total': metrics.executionCount,
                    'command_bus_errors_total': metrics.errors,
                    'command_bus_execution_time_avg_ms': metrics.averageExecutionTime,
                    'command_bus_execution_time_total_ms': metrics.totalExecutionTime
                  };
                }
                
                exportToApplicationInsights() {
                  const metrics = this.enhancedBus.getMetrics();
                  return {
                    name: 'CommandBusMetrics',
                    properties: {
                      executionCount: metrics.executionCount.toString(),
                      errorRate: ((metrics.errors / metrics.executionCount) * 100).toString(),
                      averageExecutionTime: metrics.averageExecutionTime.toString()
                    },
                    measurements: {
                      executionCount: metrics.executionCount,
                      totalExecutionTime: metrics.totalExecutionTime,
                      errors: metrics.errors,
                      averageExecutionTime: metrics.averageExecutionTime
                    }
                  };
                }
              }

        custom-tags:
          calculated-field: 'averageExecutionTime is calculated from totalExecutionTime / executionCount'
          immutable-snapshot: 'Returns snapshot of current metrics'
          monitoring-ready: 'Designed for integration with monitoring systems'

      resetMetrics:
        description: 'Resets all performance metrics to zero'
        business-context: 'Enables metrics reset for testing or periodic reporting cycles'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'periodic-reset'
            code: |
              // Reset metrics daily for fresh reporting
              setInterval(() => {
                const metrics = enhancedBus.getMetrics();
                
                // Log daily summary before reset
                console.log('Daily Command Bus Summary:', {
                  totalCommands: metrics.executionCount,
                  averageTime: metrics.averageExecutionTime,
                  errorRate: (metrics.errors / metrics.executionCount) * 100
                });
                
                // Reset for next period
                enhancedBus.resetMetrics();
              }, 24 * 60 * 60 * 1000); // Daily reset

          - id: 'testing-reset'
            code: |
              // Reset metrics before each test suite
              beforeEach(() => {
                enhancedBus.resetMetrics();
                
                const metrics = enhancedBus.getMetrics();
                expect(metrics.executionCount).toBe(0);
                expect(metrics.errors).toBe(0);
                expect(metrics.totalExecutionTime).toBe(0);
                expect(metrics.averageExecutionTime).toBe(0);
              });

          - id: 'conditional-reset'
            code: |
              // Reset when error rate gets too high
              function checkAndResetIfNeeded() {
                const metrics = enhancedBus.getMetrics();
                const errorRate = metrics.errors / metrics.executionCount;
                
                if (errorRate > 0.1 && metrics.executionCount > 100) {
                  console.warn('High error rate detected, resetting metrics');
                  enhancedBus.resetMetrics();
                }
              }

        custom-tags:
          side-effects: 'Resets internal metrics state'
          testing-utility: 'Useful for test isolation'

# === PRODUCTION USAGE PATTERNS ===
production-patterns:
  monitoring-setup:
    description: 'Setting up monitoring and alerting for EnhancedCommandBus'
    examples:
      - pattern: 'Health check endpoint'
        code: |
          app.get('/health/command-bus', (req, res) => {
            const metrics = enhancedBus.getMetrics();
            const errorRate = metrics.executionCount > 0 ? 
              (metrics.errors / metrics.executionCount) * 100 : 0;
            
            const health = {
              status: errorRate > 5 ? 'unhealthy' : 'healthy',
              metrics: {
                executionCount: metrics.executionCount,
                errorRate: `${errorRate.toFixed(2)}%`,
                averageExecutionTime: `${metrics.averageExecutionTime.toFixed(2)}ms`
              }
            };
            
            res.status(health.status === 'healthy' ? 200 : 503).json(health);
          });

      - pattern: 'Structured logging integration'
        code: |
          class MetricsLoggerMiddleware implements ICQRSMiddleware {
            constructor(private enhancedBus: EnhancedCommandBus) {}
            
            async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
              const result = await next();
              
              // Log metrics every 100 commands
              const metrics = this.enhancedBus.getMetrics();
              if (metrics.executionCount % 100 === 0) {
                logger.info('Command Bus Metrics Checkpoint', {
                  component: 'EnhancedCommandBus',
                  metrics: {
                    totalCommands: metrics.executionCount,
                    errorRate: (metrics.errors / metrics.executionCount) * 100,
                    averageExecutionTime: metrics.averageExecutionTime
                  }
                });
              }
              
              return result;
            }
          }

  performance-optimization:
    description: 'Using metrics to optimize command performance'
    strategies:
      - 'Monitor average execution time trends'
      - 'Identify slow command patterns'
      - 'Track error rate by command type'
      - 'Set performance budgets and alerts'
      - 'Use metrics for capacity planning'
