# QueryBus - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'query-bus'
title: 'QueryBus - Enterprise Query Dispatcher'
description: 'Query bus implementation with DI container integration and middleware support'
business-context: 'Core CQRS component for dispatching queries to handlers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  QueryBus:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enterprise query bus with dependency injection integration'
      business-context: 'Central dispatcher for queries in CQRS architecture'

      formats:
        jsdoc:
          description: 'QueryBus with DI container integration and middleware support'
        cli:
          description: |
            ## QueryBus
            Enterprise-grade query dispatcher providing:
            - Automatic handler discovery through DI container
            - Middleware pipeline for cross-cutting concerns
            - Type-safe query dispatching with return types
            - Validation support for queries

      custom-tags:
        extends: 'IQueryBus'

    # Constructor
    methods:
      constructor:
        description: 'Creates QueryBus with DI container integration'
        business-context: 'Initializes query bus with dependency injection support'

        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Dependency injection container for handler resolution'

        examples:
          - id: 'basic'
            code: |
              const container = new SimpleContainer();
              const queryBus = new QueryBus(container);

      # Core Methods
      execute:
        description: 'Executes query through registered handler with middleware pipeline'
        business-context: 'Dispatches query to appropriate handler with validation and middleware'

        parameters:
          - name: 'query'
            type: 'T extends IQuery<R>'
            description: 'Query instance to execute'

        returns:
          type: 'Promise<R>'
          description: 'Result from query handler execution (strongly typed)'

        throws:
          - type: 'HandlerNotFoundError'
            description: 'When no handler is registered for query type'
          - type: 'CQRSConfigurationError'
            description: 'When handler metadata is missing'

        examples:
          - id: 'basic-query'
            code: |
              @QueryHandler(GetUserQuery)
              class GetUserHandler implements IQueryHandler<GetUserQuery, User> {
                async execute(query: GetUserQuery): Promise<User> {
                  return await userRepository.findById(query.userId);
                }
              }

              const query = new GetUserQuery('user-123');
              const user = await queryBus.execute(query);

          - id: 'list-query'
            code: |
              @QueryHandler(GetUsersQuery)
              class GetUsersHandler implements IQueryHandler<GetUsersQuery, User[]> {
                async execute(query: GetUsersQuery): Promise<User[]> {
                  return await userRepository.findByFilter(query.filter);
                }
              }

              const query = new GetUsersQuery({ active: true });
              const users: User[] = await queryBus.execute(query);

          - id: 'complex-query-result'
            code: |
              interface OrderSummary {
                totalOrders: number;
                totalRevenue: number;
                averageOrderValue: number;
              }

              @QueryHandler(GetOrderSummaryQuery)
              class GetOrderSummaryHandler implements IQueryHandler<GetOrderSummaryQuery, OrderSummary> {
                async execute(query: GetOrderSummaryQuery): Promise<OrderSummary> {
                  const orders = await orderRepository.findByDateRange(query.dateRange);
                  return {
                    totalOrders: orders.length,
                    totalRevenue: orders.reduce((sum, order) => sum + order.amount, 0),
                    averageOrderValue: orders.length > 0 ? 
                      orders.reduce((sum, order) => sum + order.amount, 0) / orders.length : 0
                  };
                }
              }

        custom-tags:
          generic-constraints: 'T extends IQuery<R>, R'
          middleware: 'Supports ICQRSMiddleware pipeline'
          validation: 'Automatic validation for ICqrsValidatable queries'
          return-type: 'Strongly typed return based on query definition'

      use:
        description: 'Adds middleware to query execution pipeline'
        business-context: 'Enable cross-cutting concerns like logging, caching, performance monitoring'

        parameters:
          - name: 'middleware'
            type: 'ICQRSMiddleware'
            description: 'Middleware to add to execution pipeline'

        returns:
          type: 'this'
          description: 'QueryBus instance for method chaining'

        examples:
          - id: 'performance-middleware'
            code: |
              const performanceMiddleware = new PerformanceMiddleware();
              queryBus.use(performanceMiddleware);

          - id: 'caching-pipeline'
            code: |
              queryBus
                .use(new CacheMiddleware({ ttl: 300 }))
                .use(new LoggingMiddleware())
                .use(new PerformanceMiddleware());

        custom-tags:
          fluent-interface: 'Returns this for method chaining'
          pipeline-order: 'Middleware executes in registration order'
          common-middleware: 'Logging, caching, performance monitoring'

      # Manual Registration Methods
      register:
        description: 'Manually register a query handler'
        business-context: 'Allows explicit handler registration without decorators or DI'

        parameters:
          - name: 'queryType'
            type: 'unknown'
            description: 'Query class or string name'
          - name: 'handler'
            type: 'IQueryHandler<T, R>'
            description: 'Handler instance to register'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'manual-registration'
            code: |
              // Manual handler registration
              const handler = new GetUserHandler(userRepository);
              queryBus.register(GetUserQuery, handler);

              // Or using string name
              queryBus.register('GetUserQuery', handler);

              // Execute the query
              const query = new GetUserQuery('user-123');
              const user = await queryBus.execute(query);

        custom-tags:
          manual-registration: 'Supports both decorator and manual approaches'
          flexibility: 'Useful for dynamic handler registration'

      registerFactory:
        description: 'Register a query handler using factory function'
        business-context: 'Enables lazy initialization and dependency injection patterns'

        parameters:
          - name: 'queryType'
            type: 'unknown'
            description: 'Query class or string name'
          - name: 'factory'
            type: '() => IQueryHandler<T, R>'
            description: 'Factory function returning handler instance'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'factory-registration'
            code: |
              // Factory registration for lazy initialization
              queryBus.registerFactory(
                GetOrdersQuery,
                () => new GetOrdersHandler(orderRepository, cacheService)
              );

              // Handler created only when query is executed
              const query = new GetOrdersQuery({ status: 'pending' });
              const orders = await queryBus.execute(query);

        custom-tags:
          lazy-initialization: 'Handler created on first use'
          dependency-injection: 'Factory can resolve dependencies dynamically'

      discoverHandlers:
        description: 'Legacy handler discovery method (deprecated)'
        business-context: 'Handler discovery now automatic through DI container'

        returns:
          type: 'void'
          description: 'No return value (method does nothing)'

        examples:
          - id: 'deprecated-discovery'
            code: |
              // ❌ Deprecated - automatic discovery through DI
              // queryBus.discoverHandlers();

              // ✅ Handlers auto-discovered by CQRSDiscoveryPlugin
              VytchesDDD.configure(container);

        custom-tags:
          deprecated: 'true'
          replacement: 'Automatic discovery through CQRSDiscoveryPlugin'
