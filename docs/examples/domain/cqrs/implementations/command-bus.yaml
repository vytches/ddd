# CommandBus - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'command-bus'
title: 'CommandBus - Enterprise Command Dispatcher'
description: 'Command bus implementation with DI container integration and middleware support'
business-context: 'Core CQRS component for dispatching commands to handlers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CommandBus:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enterprise command bus with dependency injection integration'
      business-context: 'Central dispatcher for commands in CQRS architecture'

      formats:
        jsdoc:
          description: 'CommandBus with DI container integration and middleware support'
        cli:
          description: |
            ## CommandBus
            Enterprise-grade command dispatcher providing:
            - Automatic handler discovery through DI container
            - Middleware pipeline for cross-cutting concerns
            - Type-safe command dispatching
            - Validation support for commands

    # Constructor
    methods:
      constructor:
        description: 'Creates CommandBus with DI container integration'
        business-context: 'Initializes command bus with dependency injection support'

        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Dependency injection container for handler resolution'

        examples:
          - id: 'basic'
            code: |
              const container = new SimpleContainer();
              const commandBus = new CommandBus(container);

      # Core Methods
      execute:
        description: 'Executes command through registered handler with middleware pipeline'
        business-context: 'Dispatches command to appropriate handler with validation and middleware'

        parameters:
          - name: 'command'
            type: 'T extends ICommand'
            description: 'Command instance to execute'

        returns:
          type: 'Promise<TResult>'
          description: 'Result from command handler execution'

        throws:
          - type: 'HandlerNotFoundError'
            description: 'When no handler is registered for command type'
          - type: 'CQRSConfigurationError'
            description: 'When handler metadata is missing'

        examples:
          - id: 'basic-execution'
            code: |
              @CommandHandler(CreateUserCommand)
              class CreateUserHandler {
                async execute(cmd: CreateUserCommand): Promise<void> {
                  // Handler implementation
                }
              }

              const command = new CreateUserCommand(userData);
              await commandBus.execute(command);

          - id: 'with-result'
            code: |
              @CommandHandler(ProcessOrderCommand)
              class ProcessOrderHandler {
                async execute(cmd: ProcessOrderCommand): Promise<OrderResult> {
                  return { orderId: cmd.orderId, status: 'processed' };
                }
              }

              const command = new ProcessOrderCommand('order-123');
              const result = await commandBus.execute(command);

        custom-tags:
          generic-constraints: 'T extends ICommand, TResult = void'
          middleware: 'Supports ICQRSMiddleware pipeline'
          validation: 'Automatic validation for ICqrsValidatable commands'

      use:
        description: 'Adds middleware to command execution pipeline'
        business-context: 'Enable cross-cutting concerns like logging, validation, retry logic'

        parameters:
          - name: 'middleware'
            type: 'ICQRSMiddleware'
            description: 'Middleware to add to execution pipeline'

        returns:
          type: 'this'
          description: 'CommandBus instance for method chaining'

        examples:
          - id: 'logging-middleware'
            code: |
              const loggingMiddleware = new LoggingMiddleware();
              commandBus.use(loggingMiddleware);

          - id: 'chaining-middleware'
            code: |
              commandBus
                .use(new LoggingMiddleware())
                .use(new ValidationMiddleware())
                .use(new RetryMiddleware());

        custom-tags:
          fluent-interface: 'Returns this for method chaining'
          pipeline-order: 'Middleware executes in registration order'

      # Manual Registration Methods
      register:
        description: 'Manually register a command handler'
        business-context: 'Allows explicit handler registration without decorators or DI'

        parameters:
          - name: 'commandType'
            type: 'unknown'
            description: 'Command class or string name'
          - name: 'handler'
            type: 'ICommandHandler<T, TResult>'
            description: 'Handler instance to register'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'manual-registration'
            code: |
              // Manual handler registration
              const handler = new CreateUserHandler(userService);
              commandBus.register(CreateUserCommand, handler);

              // Or using string name
              commandBus.register('CreateUserCommand', handler);

              // Execute the command
              const command = new CreateUserCommand(userData);
              await commandBus.execute(command);

        custom-tags:
          manual-registration: 'Supports both decorator and manual approaches'
          flexibility: 'Useful for dynamic handler registration'

      registerFactory:
        description: 'Register a command handler using factory function'
        business-context: 'Enables lazy initialization and dependency injection patterns'

        parameters:
          - name: 'commandType'
            type: 'unknown'
            description: 'Command class or string name'
          - name: 'factory'
            type: '() => ICommandHandler<T, TResult>'
            description: 'Factory function returning handler instance'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'factory-registration'
            code: |
              // Factory registration for lazy initialization
              commandBus.registerFactory(
                ProcessOrderCommand,
                () => new ProcessOrderHandler(orderService, paymentService)
              );

              // Handler created only when command is executed
              const command = new ProcessOrderCommand(orderData);
              await commandBus.execute(command);

        custom-tags:
          lazy-initialization: 'Handler created on first use'
          dependency-injection: 'Factory can resolve dependencies dynamically'

      discoverHandlers:
        description: 'Legacy handler discovery method (deprecated)'
        business-context: 'Handler discovery now automatic through DI container'

        returns:
          type: 'void'
          description: 'No return value (method does nothing)'

        examples:
          - id: 'deprecated-discovery'
            code: |
              // ❌ Deprecated - automatic discovery through DI
              // commandBus.discoverHandlers();

              // ✅ Handlers auto-discovered by CQRSDiscoveryPlugin
              VytchesDDD.configure(container);

        custom-tags:
          deprecated: 'true'
          replacement: 'Automatic discovery through CQRSDiscoveryPlugin'
