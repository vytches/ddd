# cqrs-discovery-plugin - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'cqrs-discovery-plugin'
title: 'CQRSDiscoveryPlugin - Handler Auto-Discovery'
description: 'Plugin for automatic CQRS handler discovery and registration with DI container'
business-context: 'Enables automatic handler registration without manual configuration'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  HandlerInfo:
    description: 'Information about discovered CQRS handlers'
    business-context: 'Metadata structure for handler registration with DI container'

    properties:
      - name: 'type'
        type: "'command' | 'query' | 'event'"
        description: 'Type of handler discovered'
      - name: 'messageType'
        type: 'unknown'
        description: 'The message class this handler processes'
      - name: 'handlerType'
        type: 'Function'
        description: 'The handler class constructor'
      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional metadata from decorator'

  IHandlerDiscoveryPlugin:
    description: 'Interface for handler discovery plugins'
    business-context: 'Contract for pluggable handler discovery systems'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Plugin name for identification'
        readonly: true

    methods:
      discoverHandlers:
        description: 'Discovers handlers from provided assemblies'
        parameters:
          - name: 'assemblies'
            type: 'unknown[]'
            description: 'Modules/assemblies to scan for handlers'
            optional: true
        returns:
          type: 'Promise<HandlerInfo[]> | HandlerInfo[]'
          description: 'List of discovered handlers'

      isAvailable:
        description: 'Checks if discovery plugin is available'
        returns:
          type: 'boolean'
          description: 'True if plugin can discover handlers'

# === CLASSES ===
classes:
  CQRSDiscoveryPlugin:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Handler discovery plugin for CQRS command and query handlers'
      business-context: 'Automatically discovers handlers marked with @CommandHandler or @QueryHandler decorators'

      formats:
        jsdoc:
          description: 'CQRSDiscoveryPlugin for automatic handler discovery'
        cli:
          description: |
            ## CQRSDiscoveryPlugin

            Automatic handler discovery system that:
            - Scans modules for decorated handlers
            - Extracts handler metadata from decorators
            - Integrates with VytchesDDD service locator
            - Enables zero-configuration CQRS setup

      custom-tags:
        implements: 'IHandlerDiscoveryPlugin'

    # Properties
    properties:
      name:
        description: 'Plugin identifier'
        type: 'string'
        readonly: true
        default: "'CQRS'"
        business-context: 'Used by DI container to identify the plugin'

    # Methods
    methods:
      constructor:
        description: 'Creates new CQRS discovery plugin instance'
        business-context: 'Initializes plugin for handler discovery operations'

        examples:
          - id: 'basic-instantiation'
            code: |
              const discoveryPlugin = new CQRSDiscoveryPlugin();

          - id: 'with-di-container'
            code: |
              const container = new SimpleContainer();
              const plugin = new CQRSDiscoveryPlugin();

              // Register plugin with DI container
              VytchesDDD.configure(container, {
                discoveryPlugins: [plugin]
              });

      isAvailable:
        description: 'Checks if CQRS discovery is available'
        business-context: 'Validates that plugin can perform handler discovery'

        returns:
          type: 'boolean'
          description: 'Always returns true (plugin is part of CQRS package)'

        examples:
          - id: 'availability-check'
            code: |
              const plugin = new CQRSDiscoveryPlugin();
              const available = plugin.isAvailable();
              // available === true

        custom-tags:
          note: 'Always returns true since plugin is part of CQRS package'

      discoverHandlers:
        description: 'Discovers CQRS handlers from provided assemblies using metadata'
        business-context: 'Scans modules for handlers decorated with @CommandHandler or @QueryHandler'

        parameters:
          - name: 'assemblies'
            type: 'unknown[]'
            description: 'Array of modules/objects to scan for handlers'
            optional: true

        returns:
          type: 'Promise<HandlerInfo[]>'
          description: 'Array of discovered handler information'

        examples:
          - id: 'discover-from-modules'
            code: |
              // Import handler modules
              import * as UserHandlers from './handlers/user-handlers';
              import * as OrderHandlers from './handlers/order-handlers';

              const plugin = new CQRSDiscoveryPlugin();
              const handlers = await plugin.discoverHandlers([
                UserHandlers,
                OrderHandlers
              ]);

              // handlers contains HandlerInfo objects for all decorated handlers

          - id: 'automatic-registration'
            code: |
              const container = new SimpleContainer();
              const plugin = new CQRSDiscoveryPlugin();

              // Discover handlers
              const handlers = await plugin.discoverHandlers([
                await import('./handlers/user-handlers'),
                await import('./handlers/order-handlers')
              ]);

              // Register discovered handlers
              for (const handler of handlers) {
                container.register(
                  handler.metadata.serviceId || handler.handlerType.name,
                  handler.handlerType
                );
              }

          - id: 'integration-example'
            code: |
              // VytchesDDD integration
              const container = new SimpleContainer();

              // Configure with CQRS discovery
              await VytchesDDD.configure(container, {
                discoveryPlugins: [new CQRSDiscoveryPlugin()],
                assemblies: [
                  await import('./commands'),
                  await import('./queries'),
                  await import('./handlers')
                ]
              });

              // Handlers are automatically discovered and registered
              const commandBus = VytchesDDD.resolve<CommandBus>('commandBus');
              const queryBus = VytchesDDD.resolve<QueryBus>('queryBus');

        custom-tags:
          async: 'Returns Promise<HandlerInfo[]>'
          metadata-keys: "Scans for 'di:handler-type', 'di:registration-pending'"
          supported-types: 'command, query handlers'

  # Private methods are implementation details but worth documenting
  private-methods:
    scanModule:
      description: 'Internal method that scans individual module for handlers'
      business-context: 'Extracts handler metadata from module exports'

      parameters:
        - name: 'module'
          type: 'unknown'
          description: 'Module object to scan for handler classes'

      returns:
        type: 'HandlerInfo[]'
        description: 'Array of handlers found in the module'

      implementation-notes:
        - 'Iterates through module exports'
        - "Checks for 'di:handler-type' metadata"
        - "Validates 'di:registration-pending' flag"
        - 'Extracts handler metadata for registration'

# === INTEGRATION DETAILS ===
integration:
  discovery-process:
    description: 'Handler discovery and registration flow'
    steps:
      1: 'Plugin scans provided assemblies/modules'
      2: 'Identifies classes with handler metadata'
      3: 'Extracts HandlerInfo for each discovered handler'
      4: 'DI container registers handlers using metadata'
      5: 'CommandBus/QueryBus resolves handlers via DI'

  metadata-keys:
    description: 'Reflect-metadata keys used for discovery'
    keys:
      - 'di:handler-type': 'Identifies handler type (command/query)'
      - 'di:registration-pending': 'Flags handler for auto-registration'
      - 'di:handler-metadata': 'Contains handler registration metadata'

  supported-decorators:
    description: 'Decorators that mark handlers for discovery'
    decorators:
      - '@CommandHandler': 'Marks command handlers'
      - '@QueryHandler': 'Marks query handlers'
