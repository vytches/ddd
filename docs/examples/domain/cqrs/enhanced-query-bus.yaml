# EnhancedQueryBus - Performance-Optimized Query Processing
# Documentation for enhanced query bus with caching and resilience

# === FILE METADATA ===
file-name: 'enhanced-query-bus'
title: 'EnhancedQueryBus - Enterprise Query Processing'
description: 'Performance-optimized query bus with caching and resilience patterns'
business-context: 'Provides enterprise-grade query processing with result caching, automatic retries, and performance optimization'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  EnhancedQueryBusOptions:
    description: 'Configuration options for enhanced query bus features'
    business-context: 'Allows fine-tuning of caching, performance, and resilience capabilities for read operations'

    properties:
      enableMetrics:
        description: 'Enable performance metrics collection for query execution'
        business-context: 'Track query performance for monitoring and optimization'
        type: 'boolean'
        optional: true
        default: false

      enableCache:
        description: 'Enable query result caching for performance optimization'
        business-context: 'Reduces database load by caching frequently accessed query results'
        type: 'boolean'
        optional: true
        default: true

      cacheOptions:
        description: 'Cache configuration for query results'
        business-context: 'Fine-tune caching behavior for optimal performance'
        type: 'object'
        optional: true

        properties:
          ttl:
            description: 'Time-to-live for cached results in milliseconds'
            business-context: 'Controls how long query results remain fresh in cache'
            type: 'number'
            default: 60000

          maxSize:
            description: 'Maximum number of cached query results'
            business-context: 'Prevents unbounded memory growth from caching'
            type: 'number'
            default: 1000

          strategy:
            description: 'Cache eviction strategy (LRU, LFU, FIFO)'
            business-context: 'Determines which cached items to remove when cache is full'
            type: "'LRU' | 'LFU' | 'FIFO'"
            default: 'LRU'

      defaultTimeout:
        description: 'Default timeout in milliseconds for query execution'
        business-context: 'Prevents queries from running indefinitely and blocking resources'
        type: 'number'
        optional: true
        default: 30000

      defaultRetries:
        description: 'Default number of retry attempts for failed queries'
        business-context: 'Provides automatic recovery from transient failures in read operations'
        type: 'number'
        optional: true
        default: 3

      enableBatching:
        description: 'Enable query batching for improved throughput'
        business-context: 'Processes multiple queries together for better resource utilization'
        type: 'boolean'
        optional: true
        default: false

      maxBatchSize:
        description: 'Maximum number of queries to process in a single batch'
        business-context: 'Balances throughput with latency for batch processing'
        type: 'number'
        optional: true
        default: 100

      batchDelayMs:
        description: 'Delay in milliseconds before processing a batch'
        business-context: 'Allows accumulation of queries for more efficient batch processing'
        type: 'number'
        optional: true
        default: 50

      resilience:
        description: 'Resilience pattern configurations for fault tolerance'
        business-context: 'Comprehensive fault tolerance strategies for reliable query processing'
        type: 'object'
        optional: true

        properties:
          circuitBreaker:
            description: 'Circuit breaker configuration for query processing'
            type: 'object'
            properties:
              enabled:
                description: 'Enable circuit breaker pattern'
                type: 'boolean'
              failureThreshold:
                description: 'Number of failures before opening circuit'
                type: 'number'
              resetTimeout:
                description: 'Time in ms before attempting to close circuit'
                type: 'number'
              halfOpenMaxAttempts:
                description: 'Max attempts in half-open state'
                type: 'number'

          retry:
            description: 'Retry strategy configuration for failed queries'
            type: 'object'
            properties:
              enabled:
                description: 'Enable retry pattern'
                type: 'boolean'
              maxAttempts:
                description: 'Maximum retry attempts'
                type: 'number'
              baseDelay:
                description: 'Base delay between retries in ms'
                type: 'number'
              maxDelay:
                description: 'Maximum delay between retries in ms'
                type: 'number'
              backoffMultiplier:
                description: 'Exponential backoff multiplier'
                type: 'number'

          timeout:
            description: 'Timeout strategy configuration for queries'
            type: 'object'
            properties:
              enabled:
                description: 'Enable timeout pattern'
                type: 'boolean'
              timeoutMs:
                description: 'Timeout duration in milliseconds'
                type: 'number'

          bulkhead:
            description: 'Bulkhead isolation configuration for queries'
            type: 'object'
            properties:
              enabled:
                description: 'Enable bulkhead pattern'
                type: 'boolean'
              maxConcurrent:
                description: 'Maximum concurrent query executions'
                type: 'number'
              maxQueued:
                description: 'Maximum queued query requests'
                type: 'number'

# === CLASSES ===
classes:
  EnhancedQueryBus:
    # Class Documentation
    class-doc:
      description: 'Performance-optimized query bus with caching and enterprise resilience patterns'
      business-context: 'Provides high-performance query processing with result caching, automatic fault tolerance, and batching capabilities for enterprise read operations'

      formats:
        jsdoc:
          description: 'Enhanced query bus with caching, resilience patterns, and performance optimization'
        cli:
          description: |
            ## EnhancedQueryBus

            Enterprise-grade query bus implementation featuring:
            - Result caching with configurable TTL and eviction
            - Handler caching for performance
            - Automatic retry with exponential backoff
            - Circuit breaker for fault isolation
            - Bulkhead pattern for resource isolation
            - Query batching for throughput
            - Comprehensive metrics collection
            - Multiple cache strategies (LRU, LFU, FIFO)

      custom-tags:
        since: '1.0.0'
        extends: 'IQueryBus'
        category: 'enhanced'

# === USAGE PATTERNS ===
usage-patterns:
  - pattern: 'caching-configuration'
    description: 'Configure query bus with result caching'
    code: |
      const queryBus = new EnhancedQueryBus({
        enableCache: true,
        cacheOptions: {
          ttl: 300000, // 5 minutes
          maxSize: 500,
          strategy: 'LRU'
        },
        enableMetrics: true
      });

      // First call hits the handler
      const result1 = await queryBus.execute(getUserQuery);

      // Second call returns cached result
      const result2 = await queryBus.execute(getUserQuery);

  - pattern: 'resilience-configuration'
    description: 'Configure with full resilience patterns'
    code: |
      const resilientBus = new EnhancedQueryBus({
        defaultTimeout: 10000,
        defaultRetries: 3,
        resilience: {
          circuitBreaker: {
            enabled: true,
            failureThreshold: 3,
            resetTimeout: 30000
          },
          retry: {
            enabled: true,
            maxAttempts: 3,
            baseDelay: 500,
            backoffMultiplier: 1.5
          },
          bulkhead: {
            enabled: true,
            maxConcurrent: 10,
            maxQueued: 50
          }
        }
      });
