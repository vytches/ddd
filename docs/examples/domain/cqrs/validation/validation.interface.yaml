# validation.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'validation.interface'
title: 'ICqrsValidatable Interface - CQRS Validation Contract'
description: 'Interface contract for validatable CQRS commands and queries'
business-context: 'Enables automatic validation in CQRS pipeline through common interface'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ICqrsValidatable:
    description: 'Contract for commands and queries that support validation'
    business-context: 'Enables middleware to automatically validate CQRS messages before processing'

    formats:
      jsdoc:
        description: 'Interface for validatable CQRS commands and queries'
      cli:
        description: |
          ## ICqrsValidatable Interface

          Core validation contract that enables:
          - Automatic validation in CQRS pipeline
          - Self-validating commands and queries
          - Consistent validation across all handlers
          - Integration with validation middleware

    methods:
      validate:
        description: 'Validates the command or query data and throws on validation failure'
        business-context: 'Called by CQRS middleware before handler execution to ensure data integrity'

        parameters: []

        returns:
          type: 'Promise<void> | void'
          description: 'Completes successfully or throws validation error'

        examples:
          - id: 'command-validation'
            code: |
              class CreateUserCommand implements ICommand, ICqrsValidatable {
                constructor(
                  public readonly name: string,
                  public readonly email: string,
                  public readonly age: number
                ) {}
                
                validate(): void {
                  if (!this.name?.trim()) {
                    throw new CqrsValidationError("Name is required", "name");
                  }
                  if (!this.email?.includes("@")) {
                    throw new CqrsValidationError("Valid email required", "email");
                  }
                  if (this.age < 18) {
                    throw new CqrsValidationError("Must be 18 or older", "age");
                  }
                }
              }

          - id: 'query-validation'
            code: |
              class GetUsersByAgeQuery implements IQuery<User[]>, ICqrsValidatable {
                constructor(public readonly minAge: number) {}
                
                validate(): void {
                  if (this.minAge < 0) {
                    throw new CqrsValidationError("Age must be non-negative", "minAge");
                  }
                }
              }

          - id: 'async-validation'
            code: |
              class UpdateUserCommand implements ICommand, ICqrsValidatable {
                constructor(
                  public readonly userId: string,
                  public readonly email: string
                ) {}
                
                async validate(): Promise<void> {
                  if (!this.userId?.trim()) {
                    throw new CqrsValidationError("User ID required", "userId");
                  }
                  
                  // Async validation (e.g., check if email exists)
                  const exists = await userService.emailExists(this.email, this.userId);
                  if (exists) {
                    throw new CqrsValidationError("Email already in use", "email");
                  }
                }
              }

        custom-tags:
          optional-method: 'Implementation is optional - middleware checks for existence'
          async-support: 'Supports both synchronous and asynchronous validation'
          error-handling: 'Should throw CqrsValidationError or derived errors'
          middleware-integration: 'Automatically called by validation middleware'

        required: false

    implementation-notes:
      - 'Method is optional - only implement if validation is needed'
      - 'Middleware will check for method existence before calling'
      - 'Both sync and async validation patterns are supported'
      - 'Should throw CqrsValidationError for consistency'
      - 'Called before handler execution in CQRS pipeline'
