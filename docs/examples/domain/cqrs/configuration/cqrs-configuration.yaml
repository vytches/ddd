# cqrs-configuration - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'cqrs-configuration'
title: 'CQRSConfiguration - CQRS Setup and Configuration'
description: 'Configuration class for setting up CQRS buses with options and middleware'
business-context: 'Simplifies CQRS initialization with configurable buses and middleware pipeline'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CQRSConfiguration:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Configuration class that sets up CQRS buses with customizable options and middleware'
      business-context: 'Provides centralized configuration for command and query buses with dependency injection'

      formats:
        jsdoc:
          description: 'CQRSConfiguration for setting up command and query buses with options'
        cli:
          description: |
            ## CQRSConfiguration

            CQRS configuration manager providing:
            - Centralized bus setup with dependency injection
            - Choice between basic and enhanced buses
            - Automatic middleware application
            - Legacy auto-discovery support (deprecated)
            - Consistent configuration across application
            - Type-safe configuration options

      custom-tags:
        configuration-class: 'Manages CQRS setup and initialization'

    # Properties
    properties:
      commandBus:
        description: 'Configured command bus instance'
        type: 'ICommandBus'
        readonly: true
        business-context: 'Ready-to-use command bus with applied configuration and middleware'

      queryBus:
        description: 'Configured query bus instance'
        type: 'IQueryBus'
        readonly: true
        business-context: 'Ready-to-use query bus with applied configuration and middleware'

    # Methods
    methods:
      constructor:
        description: 'Creates CQRS configuration with customizable options'
        business-context: 'Sets up command and query buses according to configuration options'

        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Dependency injection container for handler resolution'
          - name: 'options'
            type: 'CQRSOptions'
            description: 'Configuration options for CQRS setup'
            optional: true
            default: '{}'

        examples:
          - id: 'basic-configuration'
            code: |
              const container = new SimpleContainer();
              const cqrsConfig = new CQRSConfiguration(container);

              // Uses default options:
              // - basic CommandBus and QueryBus
              // - no additional middleware
              // - no auto-discovery

              const commandBus = cqrsConfig.commandBus;
              const queryBus = cqrsConfig.queryBus;

          - id: 'enhanced-buses-configuration'
            code: |
              const container = new SimpleContainer();
              const cqrsConfig = new CQRSConfiguration(container, {
                commandBusType: 'enhanced',
                queryBusType: 'enhanced'
              });

              // Uses EnhancedCommandBus and EnhancedQueryBus
              // - Built-in metrics collection
              // - Automatic logging middleware

              const enhancedCommandBus = cqrsConfig.commandBus as EnhancedCommandBus;
              const enhancedQueryBus = cqrsConfig.queryBus as EnhancedQueryBus;

              // Access enhanced features
              const metrics = enhancedCommandBus.getMetrics();

          - id: 'with-middleware-pipeline'
            code: |
              const container = new SimpleContainer();
              const cqrsConfig = new CQRSConfiguration(container, {
                middlewares: [
                  new ValidationMiddleware(),
                  new RetryMiddleware({ maxAttempts: 3 }),
                  new PerformanceMiddleware(),
                  new LoggingMiddleware()
                ]
              });

              // All middleware is applied to both buses
              // Middleware executes in the order specified

          - id: 'production-configuration'
            code: |
              const container = new SimpleContainer();
              const cqrsConfig = new CQRSConfiguration(container, {
                commandBusType: 'enhanced',
                queryBusType: 'enhanced',
                middlewares: [
                  new CorrelationMiddleware(),
                  new AuthenticationMiddleware(),
                  new AuthorizationMiddleware(),
                  new ValidationMiddleware(),
                  new RetryMiddleware({ 
                    maxAttempts: 3,
                    backoffStrategy: 'exponential' 
                  }),
                  new CircuitBreakerMiddleware({
                    threshold: 5,
                    timeout: 30000
                  }),
                  new MetricsMiddleware(),
                  new ErrorHandlingMiddleware()
                ]
              });

              // Production-ready setup with full middleware stack

          - id: 'framework-integration'
            code: |
              // NestJS integration example
              @Module({})
              export class CQRSModule {
                static forRoot(options?: CQRSOptions): DynamicModule {
                  return {
                    module: CQRSModule,
                    providers: [
                      {
                        provide: 'CQRS_CONFIGURATION',
                        useFactory: (container: IDependencyContainer) => {
                          return new CQRSConfiguration(container, options);
                        },
                        inject: ['DI_CONTAINER']
                      },
                      {
                        provide: 'COMMAND_BUS',
                        useFactory: (config: CQRSConfiguration) => config.commandBus,
                        inject: ['CQRS_CONFIGURATION']
                      },
                      {
                        provide: 'QUERY_BUS',
                        useFactory: (config: CQRSConfiguration) => config.queryBus,
                        inject: ['CQRS_CONFIGURATION']
                      }
                    ],
                    exports: ['COMMAND_BUS', 'QUERY_BUS']
                  };
                }
              }

          - id: 'environment-based-configuration'
            code: |
              function createCQRSConfiguration(
                container: IDependencyContainer,
                environment: 'development' | 'production' | 'test'
              ): CQRSConfiguration {
                const baseOptions: CQRSOptions = {
                  middlewares: [new LoggingMiddleware()]
                };
                
                switch (environment) {
                  case 'development':
                    return new CQRSConfiguration(container, {
                      ...baseOptions,
                      commandBusType: 'enhanced',
                      queryBusType: 'enhanced',
                      middlewares: [
                        ...baseOptions.middlewares!,
                        new ValidationMiddleware(),
                        new DebugMiddleware()
                      ]
                    });
                    
                  case 'production':
                    return new CQRSConfiguration(container, {
                      ...baseOptions,
                      commandBusType: 'enhanced',
                      queryBusType: 'enhanced',
                      middlewares: [
                        ...baseOptions.middlewares!,
                        new ValidationMiddleware(),
                        new RetryMiddleware({ maxAttempts: 3 }),
                        new CircuitBreakerMiddleware(),
                        new MetricsMiddleware()
                      ]
                    });
                    
                  case 'test':
                    return new CQRSConfiguration(container, {
                      ...baseOptions,
                      middlewares: [] // Minimal middleware for faster tests
                    });
                    
                  default:
                    return new CQRSConfiguration(container, baseOptions);
                }
              }

        custom-tags:
          factory-pattern: 'Creates configured bus instances'
          middleware-application: 'Applies middleware to both buses automatically'
          deprecation-warning: 'autoDiscovery option is deprecated'

# === CONFIGURATION OPTIONS ===
configuration-options:
  commandBusType:
    description: 'Type of command bus to create'
    values:
      - value: "'basic'"
        description: 'Standard CommandBus without additional features'
        default: true
      - value: "'enhanced'"
        description: 'EnhancedCommandBus with metrics and logging'

  queryBusType:
    description: 'Type of query bus to create'
    values:
      - value: "'basic'"
        description: 'Standard QueryBus without additional features'
        default: true
      - value: "'enhanced'"
        description: 'EnhancedQueryBus with metrics and logging'

  middlewares:
    description: 'Array of middleware to apply to both buses'
    type: 'ICQRSMiddleware[]'
    default: '[]'
    application-order: 'Middleware is applied in array order'

  autoDiscovery:
    description: 'Enable automatic handler discovery (deprecated)'
    type: 'boolean'
    default: 'false'
    deprecated: 'Use DI container auto-discovery instead'

# === USAGE PATTERNS ===
usage-patterns:
  application-startup:
    description: 'Setting up CQRS during application initialization'
    examples:
      - pattern: 'Basic setup'
        code: |
          // Early in application startup
          const container = new SimpleContainer();
          VytchesDDD.configure(container);

          const cqrsConfig = new CQRSConfiguration(container, {
            commandBusType: 'enhanced',
            queryBusType: 'enhanced'
          });

          // Register buses in DI container
          container.registerInstance('commandBus', cqrsConfig.commandBus);
          container.registerInstance('queryBus', cqrsConfig.queryBus);

      - pattern: 'Module-based setup'
        code: |
          class ApplicationModule {
            private cqrsConfig: CQRSConfiguration;
            
            async initialize() {
              const container = new SimpleContainer();
              
              // Configure CQRS with environment-specific options
              this.cqrsConfig = new CQRSConfiguration(container, 
                this.getCQRSOptions()
              );
              
              // Make buses available globally
              this.registerGlobalServices();
            }
            
            private getCQRSOptions(): CQRSOptions {
              return {
                commandBusType: process.env.NODE_ENV === 'production' ? 'enhanced' : 'basic',
                queryBusType: process.env.NODE_ENV === 'production' ? 'enhanced' : 'basic',
                middlewares: this.createMiddlewarePipeline()
              };
            }
          }

  testing-configuration:
    description: 'Configuring CQRS for testing scenarios'
    examples:
      - pattern: 'Test isolation'
        code: |
          describe('CQRS Integration Tests', () => {
            let cqrsConfig: CQRSConfiguration;
            let container: IDependencyContainer;
            
            beforeEach(() => {
              container = new SimpleContainer();
              cqrsConfig = new CQRSConfiguration(container, {
                middlewares: [new TestingMiddleware()] // Minimal middleware
              });
            });
            
            afterEach(() => {
              // Clean up if needed
              container.dispose();
            });
          });

      - pattern: 'Mock middleware'
        code: |
          const mockMiddleware: ICQRSMiddleware = {
            async handle(context, next) {
              // Mock behavior for testing
              context.setMetadata('test-mode', true);
              return await next();
            }
          };

          const testConfig = new CQRSConfiguration(container, {
            middlewares: [mockMiddleware]
          });

# === BEST PRACTICES ===
best-practices:
  configuration-management:
    - 'Use environment-specific configuration files'
    - 'Validate configuration options at startup'
    - 'Document middleware order and dependencies'
    - 'Use factory functions for complex configurations'
    - 'Implement configuration validation and error handling'

  middleware-design:
    - 'Order middleware from general to specific'
    - 'Place authentication/authorization early in pipeline'
    - 'Add logging and metrics middleware for observability'
    - 'Keep middleware focused on single responsibility'
    - 'Test middleware in isolation and integration'

  production-readiness:
    - 'Use enhanced buses in production for observability'
    - 'Configure appropriate timeouts and retry policies'
    - 'Implement circuit breakers for external dependencies'
    - 'Set up monitoring and alerting for bus metrics'
    - 'Plan for graceful degradation scenarios'
