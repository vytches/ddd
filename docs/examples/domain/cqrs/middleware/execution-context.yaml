# execution-context - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'execution-context'
title: 'CQRSExecutionContext - Middleware Context Implementation'
description: 'Concrete implementation of ExecutionContext for CQRS operations'
business-context: 'Provides execution state and metadata management for middleware pipeline'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CQRSExecutionContext:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Concrete execution context implementation for CQRS middleware pipeline'
      business-context: 'Manages execution state and provides metadata communication between middleware'

      formats:
        jsdoc:
          description: 'CQRSExecutionContext for middleware pipeline execution'
        cli:
          description: |
            ## CQRSExecutionContext

            Execution context implementation providing:
            - Command/query instance access
            - Handler reference for middleware
            - Operation type identification
            - Metadata store for middleware communication
            - Type-safe property access

      custom-tags:
        implements: 'ExecutionContext'

    # Properties
    properties:
      commandOrQuery:
        description: 'The command or query instance being executed'
        type: 'ICommand | IQuery<unknown>'
        readonly: true
        business-context: 'Provides access to the actual message for middleware processing'

      handler:
        description: 'Handler instance that will execute the command/query'
        type: 'ICommandHandler<ICommand> | IQueryHandler<IQuery<unknown>, unknown>'
        readonly: true
        business-context: 'Reference to the handler for middleware inspection and decoration'

      type:
        description: 'Type of CQRS operation being executed'
        type: "'command' | 'query'"
        readonly: true
        business-context: 'Allows middleware to apply different logic for commands vs queries'

      metadata:
        description: 'Metadata store accessible to middleware pipeline'
        type: 'Map<string, unknown>'
        readonly: true
        business-context: 'Enables middleware communication and state sharing'

    # Methods
    methods:
      constructor:
        description: 'Creates execution context for CQRS operation'
        business-context: 'Initializes context with command/query, handler, and operation type'

        parameters:
          - name: 'commandOrQuery'
            type: 'ICommand | IQuery<unknown>'
            description: 'Command or query instance being executed'
          - name: 'handler'
            type: 'ICommandHandler<ICommand> | IQueryHandler<IQuery<unknown>, unknown>'
            description: 'Handler that will process the operation'
          - name: 'type'
            type: "'command' | 'query'"
            description: 'Type of CQRS operation'

        examples:
          - id: 'command-context'
            code: |
              const command = new CreateUserCommand({ name: 'John', email: 'john@example.com' });
              const handler = new CreateUserHandler(userRepository);

              const context = new CQRSExecutionContext(command, handler, 'command');

          - id: 'query-context'
            code: |
              const query = new GetUserQuery({ userId: 'user-123' });
              const handler = new GetUserHandler(userRepository);

              const context = new CQRSExecutionContext(query, handler, 'query');

      setMetadata:
        description: 'Sets metadata value for middleware communication'
        business-context: 'Allows middleware to store state and information for later use'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key identifier'
          - name: 'value'
            type: 'unknown'
            description: 'Metadata value to store'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'set-execution-metadata'
            code: |
              context.setMetadata('startTime', Date.now());
              context.setMetadata('correlationId', 'req-12345');
              context.setMetadata('userId', 'user-789');

          - id: 'middleware-state'
            code: |
              // In authentication middleware
              context.setMetadata('authenticated', true);
              context.setMetadata('userRoles', ['admin', 'user']);

              // In logging middleware
              context.setMetadata('logLevel', 'debug');
              context.setMetadata('traceId', generateTraceId());

      getMetadata:
        description: 'Retrieves metadata value by key with type safety'
        business-context: 'Enables middleware to access state set by previous middleware in pipeline'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to retrieve'

        returns:
          type: 'T | undefined'
          description: 'Metadata value cast to specified type, or undefined if not found'

        examples:
          - id: 'get-typed-metadata'
            code: |
              const startTime = context.getMetadata<number>('startTime');
              const correlationId = context.getMetadata<string>('correlationId');
              const authenticated = context.getMetadata<boolean>('authenticated');

              if (startTime) {
                const duration = Date.now() - startTime;
                console.log(`Execution took ${duration}ms`);
              }

          - id: 'conditional-processing'
            code: |
              class ConditionalMiddleware implements ICQRSMiddleware {
                async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
                  const userRoles = context.getMetadata<string[]>('userRoles');
                  const requiresAdmin = context.getMetadata<boolean>('requiresAdmin');
                  
                  if (requiresAdmin && !userRoles?.includes('admin')) {
                    throw new UnauthorizedError('Admin access required');
                  }
                  
                  return next();
                }
              }

          - id: 'performance-tracking'
            code: |
              class PerformanceMiddleware implements ICQRSMiddleware {
                async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
                  context.setMetadata('executionStart', performance.now());
                  
                  const result = await next();
                  
                  const startTime = context.getMetadata<number>('executionStart');
                  if (startTime) {
                    const duration = performance.now() - startTime;
                    context.setMetadata('executionDuration', duration);
                    
                    if (duration > 1000) { // Log slow operations
                      console.warn(`Slow ${context.type} execution: ${duration}ms`);
                    }
                  }
                  
                  return result;
                }
              }

        custom-tags:
          generic-type: 'T - Type to cast the retrieved value to'
          type-safety: 'Uses TypeScript generics for type-safe metadata access'
          undefined-handling: 'Returns undefined if key not found'

# === USAGE PATTERNS ===
usage-patterns:
  middleware-pipeline:
    description: 'Common patterns for using execution context in middleware'
    examples:
      - pattern: 'State sharing between middleware'
        code: |
          // Middleware 1: Set correlation ID
          context.setMetadata('correlationId', generateId());

          // Middleware 2: Use correlation ID for logging
          const correlationId = context.getMetadata<string>('correlationId');
          logger.info(`Processing request ${correlationId}`);

      - pattern: 'Conditional middleware execution'
        code: |
          if (context.type === 'command') {
            await this.validateCommand(context.commandOrQuery);
          } else {
            await this.cacheQuery(context);
          }

      - pattern: 'Performance monitoring'
        code: |
          const start = performance.now();
          context.setMetadata('startTime', start);

          const result = await next();

          const duration = performance.now() - start;
          context.setMetadata('duration', duration);

  metadata-conventions:
    description: 'Common metadata key conventions'
    keys:
      - 'correlationId': 'Request correlation identifier'
      - 'startTime': 'Execution start timestamp'
      - 'duration': 'Execution duration in milliseconds'
      - 'userId': 'Authenticated user identifier'
      - 'traceId': 'Distributed tracing identifier'
      - 'cacheHit': 'Whether query result was cached'
      - 'retryCount': 'Number of retry attempts'
