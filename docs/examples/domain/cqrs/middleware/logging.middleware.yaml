# logging.middleware - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'logging.middleware'
title: 'LoggingMiddleware - CQRS Execution Logging'
description: 'Middleware for logging CQRS command and query execution with context'
business-context: 'Provides execution tracking and performance monitoring for CQRS operations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  LoggingMiddleware:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Middleware that logs CQRS command and query execution with context and timing'
      business-context: 'Essential for monitoring, debugging, and performance analysis of CQRS operations'

      formats:
        jsdoc:
          description: 'CQRS logging middleware for execution tracking'
        cli:
          description: |
            ## LoggingMiddleware

            Comprehensive CQRS execution logging that provides:
            - Request/response logging with context
            - Execution timing and performance metrics
            - Error logging with stack traces
            - Customizable logger integration
            - Structured logging for observability

    # Properties
    properties:
      logger:
        description: 'Optional logger instance for custom logging behavior'
        type: '{ log: (message: string) => void } | undefined'
        private: true
        business-context: 'Allows integration with custom logging systems beyond console logging'

    # Methods
    methods:
      constructor:
        description: 'Creates logging middleware with optional custom logger'
        business-context: 'Initializes middleware with configurable logging behavior'

        parameters:
          - name: 'logger'
            type: '{ log: (message: string) => void } | undefined'
            description: 'Optional custom logger implementation'
            optional: true

        examples:
          - id: 'default-console-logging'
            code: |
              const loggingMiddleware = new LoggingMiddleware();
              // Uses console.log by default

          - id: 'custom-logger-integration'
            code: |
              const customLogger = {
                log: (message: string) => {
                  console.log(`[CQRS] ${new Date().toISOString()}: ${message}`);
                }
              };

              const loggingMiddleware = new LoggingMiddleware(customLogger);

          - id: 'structured-logger-integration'
            code: |
              import { Logger } from '@vytches/ddd-logging';

              const structuredLogger = {
                log: (message: string) => {
                  Logger.forContext('CQRS').info(message);
                }
              };

              const loggingMiddleware = new LoggingMiddleware(structuredLogger);

        custom-tags:
          default-behavior: 'Uses console.log when no custom logger provided'

      handle:
        description: 'Handles CQRS middleware execution with comprehensive logging'
        business-context: 'Logs request details, execution time, and response/error information'

        parameters:
          - name: 'context'
            type: 'ExecutionContext'
            description: 'CQRS execution context containing request and metadata'
          - name: 'next'
            type: '() => Promise<unknown>'
            description: 'Next middleware or handler in the execution pipeline'

        returns:
          type: 'Promise<unknown>'
          description: 'Result from next middleware or handler'

        examples:
          - id: 'command-execution-logging'
            code: |
              const commandBus = new CommandBus();
              commandBus.use(new LoggingMiddleware());

              // When executing a command:
              await commandBus.execute(new CreateUserCommand("john@example.com"));

              // Console output:
              // [CQRS] Executing: CreateUserCommand
              // [CQRS] Context: {"type": "command", "timestamp": "..."}
              // [CQRS] Completed: CreateUserCommand (45ms)

          - id: 'query-execution-logging'
            code: |
              const queryBus = new QueryBus();
              queryBus.use(new LoggingMiddleware());

              // When executing a query:
              const users = await queryBus.execute(new GetUsersQuery());

              // Console output:
              // [CQRS] Executing: GetUsersQuery
              // [CQRS] Context: {"type": "query", "timestamp": "..."}
              // [CQRS] Completed: GetUsersQuery (12ms) -> [5 users]

          - id: 'error-logging'
            code: |
              const commandBus = new CommandBus();
              commandBus.use(new LoggingMiddleware());

              try {
                await commandBus.execute(new InvalidCommand());
              } catch (error) {
                // Console output includes:
                // [CQRS] Executing: InvalidCommand
                // [CQRS] Error in InvalidCommand: Validation failed
                // [CQRS] Stack trace: ...
              }

        custom-tags:
          timing: 'Measures execution time from start to completion'
          error-handling: 'Logs errors with context and stack traces'
          context-logging: 'Includes execution context in log messages'

        throws:
          - type: 'Error'
            description: 'Re-throws any errors from the next handler for upstream handling'
