# middleware.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'middleware.interface'
title: 'CQRS Middleware Interfaces - Pipeline Contracts'
description: 'Core interfaces for CQRS middleware pipeline and execution context'
business-context: 'Enables cross-cutting concerns in command and query processing'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ICQRSMiddleware:
    description: 'Contract for CQRS middleware components in the execution pipeline'
    business-context: 'Enables cross-cutting concerns like logging, validation, retry, caching'

    formats:
      jsdoc:
        description: 'Interface for CQRS middleware pipeline components'
      cli:
        description: |
          ## ICQRSMiddleware

          Core middleware interface enabling:
          - Cross-cutting concerns (logging, validation, retry)
          - Pipeline-based processing
          - Request/response transformation
          - Error handling and recovery
          - Performance monitoring

    methods:
      handle:
        description: 'Processes command/query execution with middleware pipeline'
        business-context: 'Intercepts execution to apply cross-cutting concerns before/after handler'

        parameters:
          - name: 'context'
            type: 'ExecutionContext'
            description: 'Execution context containing command/query and handler information'
          - name: 'next'
            type: '() => Promise<unknown>'
            description: 'Next middleware or handler in the pipeline chain'

        returns:
          type: 'Promise<unknown>'
          description: 'Result from pipeline execution (may be transformed)'

        examples:
          - id: 'logging-middleware'
            code: |
              class LoggingMiddleware implements ICQRSMiddleware {
                async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
                  const start = Date.now();
                  console.log(`Executing ${context.type}: ${context.commandOrQuery.constructor.name}`);
                  
                  try {
                    const result = await next();
                    const duration = Date.now() - start;
                    console.log(`Completed in ${duration}ms`);
                    return result;
                  } catch (error) {
                    console.error(`Failed after ${Date.now() - start}ms:`, error);
                    throw error;
                  }
                }
              }

          - id: 'validation-middleware'
            code: |
              class ValidationMiddleware implements ICQRSMiddleware {
                async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
                  // Pre-processing validation
                  if ('validate' in context.commandOrQuery) {
                    await (context.commandOrQuery as any).validate();
                  }
                  
                  // Execute next middleware or handler
                  const result = await next();
                  
                  // Post-processing validation
                  if (context.type === 'query' && result) {
                    this.validateQueryResult(result);
                  }
                  
                  return result;
                }
                
                private validateQueryResult(result: unknown): void {
                  // Validate query result structure
                }
              }

          - id: 'caching-middleware'
            code: |
              class CachingMiddleware implements ICQRSMiddleware {
                constructor(private cache: CacheService) {}
                
                async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
                  // Only cache queries (read operations)
                  if (context.type === 'query') {
                    const cacheKey = this.generateCacheKey(context);
                    const cached = await this.cache.get(cacheKey);
                    
                    if (cached) {
                      context.setMetadata('cacheHit', true);
                      return cached;
                    }
                    
                    const result = await next();
                    await this.cache.set(cacheKey, result, 300); // 5 min TTL
                    context.setMetadata('cacheMiss', true);
                    return result;
                  }
                  
                  return next();
                }
                
                private generateCacheKey(context: ExecutionContext): string {
                  return `${context.commandOrQuery.constructor.name}:${JSON.stringify(context.commandOrQuery)}`;
                }
              }

        custom-tags:
          pipeline-pattern: 'Middleware executes in chain-of-responsibility pattern'
          async-required: 'Must return Promise for pipeline compatibility'
          error-handling: 'Should handle errors gracefully or propagate appropriately'

  ExecutionContext:
    description: 'Context object containing information about command/query execution'
    business-context: 'Provides execution metadata and state for middleware pipeline'

    formats:
      jsdoc:
        description: 'Execution context for CQRS operations'
      cli:
        description: |
          ## ExecutionContext

          Execution context providing:
          - Command/query instance being executed
          - Handler that will process the request
          - Execution type (command vs query)
          - Metadata store for middleware communication

    properties:
      commandOrQuery:
        description: 'The command or query being executed'
        type: 'unknown'
        readonly: true
        business-context: 'The actual message being processed by the handler'

      handler:
        description: 'Handler instance that will process the command/query'
        type: 'unknown'
        readonly: true
        business-context: 'The handler responsible for executing the business logic'

      type:
        description: 'Type of operation being executed'
        type: "'command' | 'query'"
        readonly: true
        business-context: 'Distinguishes between write operations (commands) and read operations (queries)'

      metadata:
        description: 'Metadata store for middleware communication'
        type: 'Map<string, unknown>'
        readonly: true
        business-context: 'Allows middleware to share state and information across pipeline'

    examples:
      - id: 'context-usage-in-middleware'
        code: |
          class PerformanceMiddleware implements ICQRSMiddleware {
            async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
              const operationType = context.type;
              const messageType = context.commandOrQuery.constructor.name;
              const handlerType = context.handler.constructor.name;
              
              console.log(`Starting ${operationType}: ${messageType} -> ${handlerType}`);
              
              // Store start time in metadata
              context.metadata.set('startTime', Date.now());
              
              const result = await next();
              
              const startTime = context.metadata.get('startTime') as number;
              const duration = Date.now() - startTime;
              
              console.log(`Completed ${operationType} in ${duration}ms`);
              
              return result;
            }
          }

      - id: 'metadata-communication'
        code: |
          class MetadataMiddleware implements ICQRSMiddleware {
            async handle(context: ExecutionContext, next: () => Promise<unknown>): Promise<unknown> {
              // Add correlation ID
              context.metadata.set('correlationId', generateCorrelationId());
              context.metadata.set('executionStart', new Date());
              
              // Process request
              const result = await next();
              
              // Log final metadata
              const correlationId = context.metadata.get('correlationId');
              const executionTime = Date.now() - (context.metadata.get('executionStart') as Date).getTime();
              
              console.log(`[${correlationId}] Execution completed in ${executionTime}ms`);
              
              return result;
            }
          }

    custom-tags:
      immutable-properties: 'Core properties are readonly'
      metadata-store: 'Metadata map is mutable for middleware communication'
      type-safety: 'Properties are typed based on operation type'
