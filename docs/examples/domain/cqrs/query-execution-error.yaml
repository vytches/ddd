# QueryExecutionError - Query Failure Handling
# Documentation for query execution error class

# === FILE METADATA ===
file-name: 'query-execution.error'
title: 'QueryExecutionError - Query Failure Handling'
description: 'Error class for handling query execution failures in CQRS'
business-context: 'Provides detailed error information when queries fail to execute'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  QueryExecutionError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Error thrown when query execution fails in the CQRS pipeline'
      business-context: 'Captures query type and original error for debugging read-side failures in CQRS applications'

      formats:
        jsdoc:
          description: 'Error class for query execution failures with detailed context'
        cli:
          description: |
            ## QueryExecutionError

            Comprehensive error class that captures query execution failures
            with full context including query type and original error details.
            Essential for debugging read-model issues and query optimization.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseError'
        category: 'errors'

    # Properties
    properties:
      queryType:
        description: 'The type/name of the query that failed to execute'
        business-context: 'Identifies which query failed for debugging and performance monitoring'
        type: 'string'
        readonly: true

        formats:
          jsdoc:
            description: 'Type identifier of the failed query'

      originalError:
        description: 'The original error that caused the query execution to fail'
        business-context: 'Preserves the root cause error for comprehensive error analysis'
        type: 'Error'
        readonly: true

        formats:
          jsdoc:
            description: 'Original error that caused the query failure'

    # Methods
    methods:
      constructor:
        description: 'Creates a new QueryExecutionError with query context'
        business-context: 'Initializes error with query type and original error for comprehensive error tracking'

        parameters:
          - name: 'queryType'
            type: 'string'
            description: 'The type/name of the query that failed'
          - name: 'originalError'
            type: 'Error'
            description: 'The original error that caused the failure'

        examples:
          - id: 'basic-usage'
            code: |
              try {
                const result = await queryBus.execute(getUserByIdQuery);
              } catch (error) {
                throw new QueryExecutionError(
                  'GetUserByIdQuery',
                  error as Error
                );
              }

          - id: 'with-caching'
            code: |
              class CachedQueryBus {
                async execute<T>(query: IQuery): Promise<T> {
                  const cacheKey = this.getCacheKey(query);
                  
                  try {
                    const cached = await this.cache.get(cacheKey);
                    if (cached) return cached;
                    
                    const result = await this.innerBus.execute(query);
                    await this.cache.set(cacheKey, result);
                    return result;
                  } catch (error) {
                    throw new QueryExecutionError(
                      query.constructor.name,
                      error as Error
                    );
                  }
                }
              }

# === USAGE PATTERNS ===
usage-patterns:
  - pattern: 'query-bus-integration'
    description: 'Automatic error wrapping in query bus'
    code: |
      class QueryBus {
        async execute<T>(query: IQuery): Promise<T> {
          try {
            const handler = this.resolveHandler(query);
            return await handler.handle(query);
          } catch (error) {
            throw new QueryExecutionError(
              query.constructor.name,
              error as Error
            );
          }
        }
      }

  - pattern: 'error-logging'
    description: 'Query error logging with context'
    code: |
      const logQueryError = (error: QueryExecutionError) => {
        logger.error('Query execution failed', {
          queryType: error.queryType,
          originalMessage: error.originalError.message,
          stack: error.originalError.stack,
          timestamp: new Date().toISOString()
        });
        
        // Send to monitoring service
        monitoring.trackQueryFailure({
          query: error.queryType,
          error: error.originalError.message
        });
      };
