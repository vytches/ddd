# query.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'query.interface'
title: 'IQuery Interface - Query Contract'
description: 'Core interface defining the contract for CQRS queries with return types'
business-context: 'Foundation for all query operations in CQRS architecture'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IQuery:
    description: 'Generic interface for CQRS queries representing read operations with typed results'
    business-context: 'Defines the contract for queries that retrieve data without modifying system state'

    formats:
      jsdoc:
        description: 'Base interface for all CQRS queries with typed return values'
      cli:
        description: |
          ## IQuery<TResult>

          Core query interface in CQRS architecture:
          - Generic interface with strongly-typed return values
          - Marker interface for query identification
          - Represents intent to read data without side effects
          - Used by QueryBus for type-safe dispatch
          - Foundation for query handler registration
          - Supports query validation and caching patterns

    # Generic parameters
    generic-parameters:
      - name: 'TResult'
        description: 'Type of data returned by the query'
        constraint: 'any'
        usage: 'Enables type-safe query results'

    # Empty interface - marker interface pattern with generic type
    custom-tags:
      interface-type: 'Generic marker interface'
      cqrs-role: 'Read operations (data retrieval)'
      handler-binding: 'Linked to handlers via @QueryHandler decorator'
      type-safety: 'Strongly-typed return values'
      side-effects: 'Should be side-effect free (idempotent)'
      caching: 'Results can be safely cached'

    examples:
      - id: 'simple-entity-query'
        code: |
          interface GetUserQuery extends IQuery<User> {
            readonly userId: string;
          }

          class GetUserQueryImpl implements GetUserQuery {
            constructor(public readonly userId: string) {}
          }

          // Usage with type safety
          const query = new GetUserQueryImpl('user-123');
          const user: User = await queryBus.execute(query);

      - id: 'list-query'
        code: |
          interface GetUsersQuery extends IQuery<User[]> {
            readonly filter?: UserFilter;
            readonly pagination?: PaginationOptions;
            readonly sortBy?: UserSortOptions;
          }

          class GetUsersQueryImpl implements GetUsersQuery {
            constructor(
              public readonly filter?: UserFilter,
              public readonly pagination?: PaginationOptions,
              public readonly sortBy?: UserSortOptions
            ) {}
          }

          // Usage with strongly typed results
          const query = new GetUsersQueryImpl(
            { active: true, role: 'admin' },
            { page: 1, size: 20 },
            { field: 'createdAt', direction: 'desc' }
          );

          const users: User[] = await queryBus.execute(query);

      - id: 'complex-result-query'
        code: |
          interface OrderSummary {
            totalOrders: number;
            totalRevenue: number;
            averageOrderValue: number;
            ordersByStatus: Record<OrderStatus, number>;
            revenueByMonth: { month: string; revenue: number }[];
          }

          interface GetOrderSummaryQuery extends IQuery<OrderSummary> {
            readonly dateRange: {
              startDate: Date;
              endDate: Date;
            };
            readonly includeRefunds?: boolean;
            readonly groupBy?: 'day' | 'week' | 'month';
          }

          class GetOrderSummaryQueryImpl implements GetOrderSummaryQuery {
            constructor(
              public readonly dateRange: {
                startDate: Date;
                endDate: Date;
              },
              public readonly includeRefunds: boolean = false,
              public readonly groupBy: 'day' | 'week' | 'month' = 'month'
            ) {}
          }

      - id: 'paginated-query'
        code: |
          interface PaginatedResult<T> {
            items: T[];
            totalItems: number;
            totalPages: number;
            currentPage: number;
            hasNextPage: boolean;
            hasPreviousPage: boolean;
          }

          interface GetOrdersQuery extends IQuery<PaginatedResult<Order>> {
            readonly customerId?: string;
            readonly status?: OrderStatus[];
            readonly dateRange?: DateRange;
            readonly pagination: {
              page: number;
              size: number;
            };
          }

          class GetOrdersQueryImpl implements GetOrdersQuery {
            constructor(
              public readonly pagination: { page: number; size: number },
              public readonly customerId?: string,
              public readonly status?: OrderStatus[],
              public readonly dateRange?: DateRange
            ) {}
          }

      - id: 'query-with-validation'
        code: |
          interface GetCustomerReportQuery extends IQuery<CustomerReport> {
            readonly customerId: string;
            readonly reportType: 'summary' | 'detailed' | 'analytics';
            readonly dateRange: DateRange;
            validate(): Promise<void>;
          }

          class GetCustomerReportQueryImpl implements GetCustomerReportQuery {
            constructor(
              public readonly customerId: string,
              public readonly reportType: 'summary' | 'detailed' | 'analytics',
              public readonly dateRange: DateRange
            ) {}
            
            async validate(): Promise<void> {
              if (!this.customerId) {
                throw new ValidationError('Customer ID is required');
              }
              
              if (this.dateRange.endDate <= this.dateRange.startDate) {
                throw new ValidationError('End date must be after start date');
              }
              
              const maxRangeMonths = 12;
              const rangeMonths = this.getDateRangeInMonths(this.dateRange);
              if (rangeMonths > maxRangeMonths) {
                throw new ValidationError(`Date range cannot exceed ${maxRangeMonths} months`);
              }
            }
            
            private getDateRangeInMonths(range: DateRange): number {
              const startDate = new Date(range.startDate);
              const endDate = new Date(range.endDate);
              return (endDate.getFullYear() - startDate.getFullYear()) * 12 + 
                     (endDate.getMonth() - startDate.getMonth());
            }
          }

      - id: 'cached-query'
        code: |
          interface GetSystemConfigQuery extends IQuery<SystemConfig> {
            readonly configSection?: string;
          }

          class GetSystemConfigQueryImpl implements GetSystemConfigQuery {
            constructor(public readonly configSection?: string) {}
            
            // Helper method for cache key generation
            getCacheKey(): string {
              return `system-config:${this.configSection || 'all'}`;
            }
            
            // Cache TTL helper
            getCacheTTL(): number {
              return 300; // 5 minutes for system config
            }
          }

    design-patterns:
      - pattern: 'Strongly-typed results'
        description: 'Use generic type parameter for return type safety'
        benefit: 'Compile-time type checking and IntelliSense support'

      - pattern: 'Immutable queries'
        description: 'All query properties should be readonly'
        benefit: 'Ensures query integrity and enables caching'

      - pattern: 'Self-contained data'
        description: 'Queries should include all necessary data for execution'
        benefit: 'Reduces coupling and enables query serialization'

      - pattern: 'Validation support'
        description: 'Implement validation methods for input validation'
        benefit: 'Early validation prevents invalid queries from reaching handlers'

      - pattern: 'Cache-friendly design'
        description: 'Include cache key and TTL helper methods'
        benefit: 'Enables efficient caching strategies'

    best-practices:
      naming:
        - 'Use descriptive nouns (GetUser, FindOrders, CalculateTotals)'
        - 'Start with action verb (Get, Find, Calculate, Generate)'
        - 'Be specific about what data is retrieved'
        - 'Include scope when applicable (GetUsersByRole, GetOrdersForCustomer)'

      return-types:
        - "Use specific types, avoid 'any' or 'unknown'"
        - 'Consider nullable types for optional results (User | null)'
        - 'Use arrays for multiple results (User[])'
        - 'Use custom types for complex results (OrderSummary, PaginatedResult<T>)'

      parameters:
        - 'Use readonly properties for immutability'
        - 'Group related parameters into objects'
        - 'Make optional parameters truly optional with defaults'
        - 'Use enums or union types for restricted values'

      performance:
        - 'Include pagination for large result sets'
        - 'Support filtering and sorting parameters'
        - 'Consider projection queries for large entities'
        - 'Design queries to support caching'

    common-result-patterns:
      - pattern: 'Single entity'
        type: 'Entity | null'
        usage: 'GetUserQuery extends IQuery<User | null>'

      - pattern: 'Entity list'
        type: 'Entity[]'
        usage: 'GetUsersQuery extends IQuery<User[]>'

      - pattern: 'Paginated results'
        type: 'PaginatedResult<Entity>'
        usage: 'SearchOrdersQuery extends IQuery<PaginatedResult<Order>>'

      - pattern: 'Aggregated data'
        type: 'Custom aggregate type'
        usage: 'GetSalesReportQuery extends IQuery<SalesReport>'

      - pattern: 'Count queries'
        type: 'number'
        usage: 'CountActiveUsersQuery extends IQuery<number>'

      - pattern: 'Existence checks'
        type: 'boolean'
        usage: 'CheckUserExistsQuery extends IQuery<boolean>'
