# CqrsValidationError - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'validation-error'
title: 'CqrsValidationError - CQRS Validation Error'
description: 'Specialized error class for CQRS validation failures with field-specific context'
business-context: 'Structured error handling for command/query validation with detailed field information'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CqrsValidationError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Specialized error class for CQRS validation failures extending BaseError'
      business-context: 'Provides structured validation error information with optional field context'

      extends: 'BaseError'

      formats:
        jsdoc:
          description: 'CQRS validation error with optional field-specific context'
        cli:
          description: |
            ## CqrsValidationError Class
            Specialized validation error for CQRS operations:
            - Extends BaseError for consistent error handling
            - Optional field-specific validation context
            - Structured error information for debugging
            - Integration with CQRS middleware pipeline

      custom-tags:
        error-hierarchy: 'BaseError -> CqrsValidationError'

    # Constructor
    methods:
      constructor:
        description: 'Creates CqrsValidationError with message and optional field context'
        business-context: 'Initialize validation error with descriptive message and field information'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Descriptive error message explaining validation failure'
          - name: 'field'
            type: 'string'
            description: 'Optional field name that failed validation'
            required: false

        examples:
          - id: 'general-validation'
            code: |
              throw new CqrsValidationError(
                'Command validation failed: invalid data format'
              );

          - id: 'field-specific-validation'
            code: |
              throw new CqrsValidationError(
                'Email format is invalid',
                'email'
              );

          - id: 'complex-validation'
            code: |
              // Command validation in handler
              if (!command.userId) {
                throw new CqrsValidationError(
                  'User ID is required for command execution',
                  'userId'
                );
              }

              if (command.amount <= 0) {
                throw new CqrsValidationError(
                  'Amount must be greater than zero',
                  'amount'
                );
              }

        custom-tags:
          field-context: 'Optional field parameter for specific validation failures'
          error-chaining: 'Maintains stack trace through BaseError'

    # Properties
    properties:
      - name: 'field'
        type: 'string | undefined'
        readonly: true
        description: 'Optional field name that failed validation'
        business-context: 'Provides context for which field caused validation failure'

        examples:
          - id: 'accessing-field'
            code: |
              try {
                await commandBus.execute(command);
              } catch (error) {
                if (error instanceof CqrsValidationError) {
                  console.error(`Validation failed for field: ${error.field}`);
                  console.error(`Error message: ${error.message}`);
                }
              }

        custom-tags:
          nullable: 'undefined when no specific field is associated'
          readonly: 'Cannot be modified after construction'

# === USAGE PATTERNS ===
usage-patterns:
  validation-middleware:
    description: 'Using CqrsValidationError in validation middleware'
    code: |
      class ValidationMiddleware implements ICQRSMiddleware {
        async handle<T>(
          request: T,
          next: () => Promise<unknown>
        ): Promise<unknown> {
          if ('validate' in request && typeof request.validate === 'function') {
            try {
              await request.validate();
            } catch (error) {
              throw new CqrsValidationError(
                `Command validation failed: ${error.message}`,
                'command'
              );
            }
          }
          return next();
        }
      }

  command-handler-validation:
    description: 'Command handler with structured validation'
    code: |
      @CommandHandler(CreateUserCommand)
      class CreateUserHandler {
        async execute(command: CreateUserCommand): Promise<void> {
          // Validate required fields
          if (!command.email) {
            throw new CqrsValidationError(
              'Email is required for user creation',
              'email'
            );
          }
          
          if (!command.email.includes('@')) {
            throw new CqrsValidationError(
              'Email must contain @ symbol',
              'email'
            );
          }
          
          if (command.age < 0) {
            throw new CqrsValidationError(
              'Age cannot be negative',
              'age'
            );
          }
          
          // Process valid command
          await this.userService.createUser(command);
        }
      }

  error-handling-patterns:
    description: 'Comprehensive error handling with field context'
    code: |
      class CqrsErrorHandler {
        static handleValidationError(error: CqrsValidationError): ErrorResponse {
          return {
            type: 'ValidationError',
            message: error.message,
            field: error.field,
            code: 'CQRS_VALIDATION_FAILED',
            timestamp: new Date().toISOString()
          };
        }
        
        static isFieldSpecific(error: CqrsValidationError): boolean {
          return error.field !== undefined;
        }
      }

      // Usage in controller/handler
      try {
        await commandBus.execute(command);
      } catch (error) {
        if (error instanceof CqrsValidationError) {
          const response = CqrsErrorHandler.handleValidationError(error);
          
          if (CqrsErrorHandler.isFieldSpecific(error)) {
            // Field-specific validation error
            logger.warn('Field validation failed', {
              field: error.field,
              message: error.message
            });
          } else {
            // General validation error
            logger.warn('Command validation failed', {
              message: error.message
            });
          }
          
          return response;
        }
      }

  query-validation:
    description: 'Query validation with CqrsValidationError'
    code: |
      @QueryHandler(GetUsersByAgeRangeQuery)
      class GetUsersByAgeRangeHandler {
        async execute(query: GetUsersByAgeRangeQuery): Promise<User[]> {
          if (query.minAge < 0) {
            throw new CqrsValidationError(
              'Minimum age cannot be negative',
              'minAge'
            );
          }
          
          if (query.maxAge < query.minAge) {
            throw new CqrsValidationError(
              'Maximum age must be greater than minimum age',
              'maxAge'
            );
          }
          
          return await this.userRepository.findByAgeRange(
            query.minAge,
            query.maxAge
          );
        }
      }
