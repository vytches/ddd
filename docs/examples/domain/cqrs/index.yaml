# Index - CQRS Package Exports
# Documentation for the main entry point of @vytches/ddd-cqrs package

# === FILE METADATA ===
file-name: 'index'
title: 'CQRS Package - Main Exports'
description: 'Central export hub for Command Query Responsibility Segregation patterns'
business-context: 'Entry point for implementing CQRS architecture with enterprise features'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === MODULE DOCUMENTATION ===
module-doc:
  description: 'Complete CQRS implementation with middleware, decorators, and resilience'
  business-context: 'Enables separation of commands and queries for scalable enterprise applications'

  formats:
    jsdoc:
      description: '@vytches/ddd-cqrs - Enterprise CQRS patterns with middleware support'
    cli:
      description: |
        ## DDD CQRS Package

        Enterprise-grade CQRS implementation with:
        - Command and Query buses
        - Middleware pipeline
        - Decorator-based handlers
        - Enhanced resilience features
        - DI integration support

  custom-tags:
    since: '1.0.0'
    module: '@vytches/ddd-cqrs'
    exports: 'Command/Query buses, handlers, middleware, and configuration'

# === EXPORTED ELEMENTS ===
exports:
  # Abstract Classes (Service Tokens)
  ICommandBus:
    description: 'Abstract command bus interface for DI'
    source: './abstracts'
    category: 'abstracts'

  IQueryBus:
    description: 'Abstract query bus interface for DI'
    source: './abstracts'
    category: 'abstracts'

  # Concrete Implementations
  CommandBus:
    description: 'Standard command bus implementation'
    source: './implementations'
    category: 'core'

  QueryBus:
    description: 'Standard query bus implementation'
    source: './implementations'
    category: 'core'

  # Enhanced Implementations
  EnhancedCommandBus:
    description: 'Command bus with resilience features'
    source: './implementations/enhanced'
    category: 'enhanced'

  EnhancedQueryBus:
    description: 'Query bus with resilience features'
    source: './implementations/enhanced'
    category: 'enhanced'

  # Decorators
  CommandHandler:
    description: 'Decorator for command handler registration'
    source: './decorators'
    category: 'decorators'

  QueryHandler:
    description: 'Decorator for query handler registration'
    source: './decorators'
    category: 'decorators'

  # Middleware
  CQRSExecutionContext:
    description: 'Execution context for middleware pipeline'
    source: './middleware'
    category: 'middleware'

  LoggingMiddleware:
    description: 'Built-in logging middleware'
    source: './middleware'
    category: 'middleware'

  # Validation
  CqrsValidationError:
    description: 'Validation error for CQRS operations'
    source: './validation'
    category: 'errors'

  # Errors
  CommandExecutionError:
    description: 'Error during command execution'
    source: './errors'
    category: 'errors'

  CQRSConfigurationError:
    description: 'CQRS configuration error'
    source: './errors'
    category: 'errors'

  HandlerNotFoundError:
    description: 'Handler not found error'
    source: './errors'
    category: 'errors'

  QueryExecutionError:
    description: 'Error during query execution'
    source: './errors'
    category: 'errors'

  # Configuration
  CQRSConfiguration:
    description: 'CQRS configuration class'
    source: './configuration'
    category: 'configuration'

  CQRSModule:
    description: 'CQRS module for framework integration'
    source: './configuration'
    category: 'configuration'

  # DI Integration
  CQRSDiscoveryPlugin:
    description: 'Auto-discovery plugin for DI containers'
    source: './di-integration'
    category: 'integration'

# === TYPE EXPORTS ===
type-exports:
  ICommand:
    description: 'Base command interface'
    source: './interfaces'
    category: 'interfaces'

  ICommandHandler:
    description: 'Command handler interface'
    source: './interfaces'
    category: 'interfaces'

  IQuery:
    description: 'Base query interface'
    source: './interfaces'
    category: 'interfaces'

  IQueryHandler:
    description: 'Query handler interface'
    source: './interfaces'
    category: 'interfaces'

  ExecutionContext:
    description: 'Execution context interface'
    source: './middleware'
    category: 'interfaces'

  ICQRSMiddleware:
    description: 'Middleware interface'
    source: './middleware'
    category: 'interfaces'

  ICqrsValidatable:
    description: 'Validatable interface for commands/queries'
    source: './validation'
    category: 'interfaces'

  CQRSOptions:
    description: 'Configuration options interface'
    source: './configuration'
    category: 'interfaces'

# === USAGE EXAMPLES ===
examples:
  - id: 'basic-import'
    code: |
      import { 
        CommandBus, 
        QueryBus, 
        CommandHandler, 
        QueryHandler 
      } from '@vytches/ddd-cqrs';

      // Define command handler
      @CommandHandler(CreateUserCommand)
      class CreateUserHandler {
        async execute(command: CreateUserCommand): Promise<void> {
          // Handle command
        }
      }

  - id: 'enhanced-import'
    code: |
      import { 
        EnhancedCommandBus,
        CQRSExecutionContext,
        LoggingMiddleware 
      } from '@vytches/ddd-cqrs';

      // Setup enhanced bus with middleware
      const commandBus = new EnhancedCommandBus({
        timeout: 30000,
        retryPolicy: { maxAttempts: 3 }
      });

      commandBus.use(new LoggingMiddleware());
