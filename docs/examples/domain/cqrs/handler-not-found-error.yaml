# HandlerNotFoundError - Handler Resolution Error
# Documentation for handler not found error class

# === FILE METADATA ===
file-name: 'handler-not-found.error'
title: 'HandlerNotFoundError - Handler Resolution Failure'
description: 'Error class for missing command or query handlers'
business-context: 'Ensures all commands and queries have registered handlers before execution'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  HandlerNotFoundError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Error thrown when no handler is found for a command or query'
      business-context: 'Prevents runtime failures by ensuring all CQRS operations have corresponding handlers registered'

      formats:
        jsdoc:
          description: 'Error class for missing command/query handler registration'
        cli:
          description: |
            ## HandlerNotFoundError

            Error class that identifies missing handlers in the CQRS pipeline.
            Provides detailed context about the handler type and bus type
            to facilitate quick debugging of registration issues.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseError'
        category: 'errors'

    # Properties
    properties:
      handlerType:
        description: 'The type/name of the missing handler'
        business-context: 'Identifies which command or query lacks a handler for quick resolution'
        type: 'string'
        readonly: true

        formats:
          jsdoc:
            description: 'Type identifier of the missing handler'

      busType:
        description: 'The type of bus (command or query) where handler was not found'
        business-context: 'Clarifies whether the missing handler is for command or query processing'
        type: "'command' | 'query'"
        readonly: true

        formats:
          jsdoc:
            description: 'Bus type where handler lookup failed'

    # Methods
    methods:
      constructor:
        description: 'Creates a new HandlerNotFoundError with handler context'
        business-context: 'Initializes error with handler type and bus type for precise error reporting'

        parameters:
          - name: 'handlerType'
            type: 'string'
            description: 'The type/name of the missing handler'
          - name: 'busType'
            type: "'command' | 'query'"
            description: 'The type of bus where handler was not found'

        examples:
          - id: 'command-handler-missing'
            code: |
              const handler = this.commandHandlers.get(command.constructor.name);
              if (!handler) {
                throw new HandlerNotFoundError(
                  command.constructor.name,
                  'command'
                );
              }

          - id: 'query-handler-missing'
            code: |
              class QueryBus {
                execute<T>(query: IQuery): Promise<T> {
                  const handlerName = `${query.constructor.name}Handler`;
                  const handler = this.handlers.get(handlerName);
                  
                  if (!handler) {
                    throw new HandlerNotFoundError(
                      query.constructor.name,
                      'query'
                    );
                  }
                  
                  return handler.handle(query);
                }
              }

# === USAGE PATTERNS ===
usage-patterns:
  - pattern: 'handler-registry'
    description: 'Handler resolution with error handling'
    code: |
      class HandlerRegistry {
        resolveHandler(operationType: string, busType: 'command' | 'query') {
          const handler = this.handlers.get(operationType);
          
          if (!handler) {
            throw new HandlerNotFoundError(operationType, busType);
          }
          
          return handler;
        }
      }

  - pattern: 'auto-discovery-validation'
    description: 'Validate handler auto-discovery results'
    code: |
      const validateAutoDiscovery = (commands: string[], handlers: Map<string, any>) => {
        const missingHandlers: string[] = [];
        
        for (const command of commands) {
          if (!handlers.has(`${command}Handler`)) {
            missingHandlers.push(command);
          }
        }
        
        if (missingHandlers.length > 0) {
          throw new HandlerNotFoundError(
            missingHandlers.join(', '),
            'command'
          );
        }
      };
