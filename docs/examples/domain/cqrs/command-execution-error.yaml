# CommandExecutionError - CQRS Error Handling
# Documentation for command execution error class

# === FILE METADATA ===
file-name: 'command-execution.error'
title: 'CommandExecutionError - Command Failure Handling'
description: 'Error class for handling command execution failures in CQRS'
business-context: 'Provides detailed error information when commands fail to execute'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CommandExecutionError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Error thrown when command execution fails in the CQRS pipeline'
      business-context: 'Captures command type and original error for debugging and error recovery in enterprise applications'

      formats:
        jsdoc:
          description: 'Error class for command execution failures with detailed context'
        cli:
          description: |
            ## CommandExecutionError

            Comprehensive error class that captures command execution failures
            with full context including command type and original error details.
            Essential for error handling and recovery strategies in CQRS systems.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseError'
        category: 'errors'

    # Properties
    properties:
      commandType:
        description: 'The type/name of the command that failed to execute'
        business-context: 'Identifies which command failed for debugging and monitoring'
        type: 'string'
        readonly: true

        formats:
          jsdoc:
            description: 'Type identifier of the failed command'

      originalError:
        description: 'The original error that caused the command execution to fail'
        business-context: 'Preserves the root cause error for comprehensive error analysis'
        type: 'Error'
        readonly: true

        formats:
          jsdoc:
            description: 'Original error that caused the command failure'

    # Methods
    methods:
      constructor:
        description: 'Creates a new CommandExecutionError with command context'
        business-context: 'Initializes error with command type and original error for comprehensive error tracking'

        parameters:
          - name: 'commandType'
            type: 'string'
            description: 'The type/name of the command that failed'
          - name: 'originalError'
            type: 'Error'
            description: 'The original error that caused the failure'

        examples:
          - id: 'basic-usage'
            code: |
              try {
                await commandBus.execute(createUserCommand);
              } catch (error) {
                throw new CommandExecutionError(
                  'CreateUserCommand',
                  error as Error
                );
              }

          - id: 'with-error-handling'
            code: |
              const handleCommandError = (error: Error, commandName: string) => {
                const executionError = new CommandExecutionError(commandName, error);
                logger.error('Command failed', {
                  command: executionError.commandType,
                  originalMessage: executionError.originalError.message
                });
                return executionError;
              };

# === USAGE PATTERNS ===
usage-patterns:
  - pattern: 'command-bus-integration'
    description: 'Automatic error wrapping in command bus'
    code: |
      class CommandBus {
        async execute<T>(command: ICommand): Promise<T> {
          try {
            return await this.handler.handle(command);
          } catch (error) {
            throw new CommandExecutionError(
              command.constructor.name,
              error as Error
            );
          }
        }
      }

  - pattern: 'error-recovery'
    description: 'Error recovery with retry logic'
    code: |
      const executeWithRetry = async (command: ICommand, maxRetries = 3) => {
        for (let i = 0; i < maxRetries; i++) {
          try {
            return await commandBus.execute(command);
          } catch (error) {
            if (error instanceof CommandExecutionError && i < maxRetries - 1) {
              await delay(1000 * Math.pow(2, i)); // Exponential backoff
              continue;
            }
            throw error;
          }
        }
      };
