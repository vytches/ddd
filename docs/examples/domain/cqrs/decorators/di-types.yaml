# DI Types - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'di-types'
title: 'DI Types - Dependency Injection Type Definitions'
description: 'Type definitions for dependency injection integration with CQRS decorators'
business-context: 'Comprehensive DI support for CQRS handlers with lifecycle and context management'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  ServiceLifetime:
    description: 'Service registration lifetime in DI container'
    business-context: 'Controls when and how service instances are created and managed'

    definition: "'transient' | 'singleton' | 'scoped'"

    values:
      - name: 'transient'
        description: 'New instance created for each resolution'
        business-context: 'For stateless handlers with no shared state'

      - name: 'singleton'
        description: 'Single instance shared across application'
        business-context: 'For handlers with expensive initialization or shared resources'

      - name: 'scoped'
        description: 'Single instance per request or operation scope'
        business-context: 'For handlers needing consistent state within operations'

    custom-tags:
      default-value: "'transient'"
      enterprise-pattern: 'Service Locator Pattern'

  ServiceToken:
    description: 'Token type for service identification in DI container'
    business-context: 'Flexible service identification using strings, symbols, or constructor functions'

    definition: 'string | symbol | (new (...args: unknown[]) => T)'

    examples:
      - id: 'string-token'
        code: |
          const token: ServiceToken = 'userService';

      - id: 'symbol-token'
        code: |
          const token: ServiceToken = Symbol('paymentHandler');

      - id: 'constructor-token'
        code: |
          const token: ServiceToken<UserHandler> = UserHandler;

    custom-tags:
      generic-parameter: 'T = unknown'
      token-types: 'String, Symbol, or Constructor'

# === INTERFACES ===
interfaces:
  DIDecoratorOptions:
    # Interface Documentation
    interface-doc:
      description: 'Base configuration options for dependency injection decorators'
      business-context: 'Common DI settings for service registration and context management'

      formats:
        jsdoc:
          description: 'Base DI configuration with service lifetime and context options'
        cli:
          description: |
            ## DIDecoratorOptions Interface
            Foundational DI configuration providing:
            - Service identification and lifetime management
            - Bounded context support for DDD scenarios
            - Auto-registration with dependency tracking
            - Service discovery and organization

    # Properties
    properties:
      - name: 'serviceId'
        type: 'string'
        required: false
        description: 'Unique identifier for service registration in DI container'
        business-context: 'Explicit service ID for resolution and debugging'

        examples:
          - id: 'explicit-service-id'
            code: |
              @CommandHandler(CreateUserCommand, {
                serviceId: 'createUserHandler'
              })

      - name: 'lifetime'
        type: 'ServiceLifetime'
        required: false
        description: 'Service instance lifetime in DI container'
        business-context: 'Controls instance creation and sharing strategy'

        examples:
          - id: 'singleton-handler'
            code: |
              @QueryHandler(GetConfigQuery, {
                lifetime: 'singleton' // Expensive initialization
              })

      - name: 'context'
        type: 'string'
        required: false
        description: 'Bounded context for context-aware DI resolution'
        business-context: 'DDD bounded context isolation for multi-tenant scenarios'

        examples:
          - id: 'bounded-context'
            code: |
              @CommandHandler(ProcessOrderCommand, {
                context: 'OrderManagement'
              })

      - name: 'autoRegister'
        type: 'boolean'
        required: false
        description: 'Automatically register handler with DI container'
        business-context: 'Control automatic service discovery and registration'

        custom-tags:
          default-value: 'true'

      - name: 'dependencies'
        type: 'ServiceToken[]'
        required: false
        description: 'Explicit dependencies for documentation and validation'
        business-context: 'Dependency tracking for proper initialization order'

        examples:
          - id: 'explicit-dependencies'
            code: |
              @CommandHandler(CreateOrderCommand, {
                dependencies: ['orderRepository', 'paymentService']
              })

      - name: 'tags'
        type: 'string[]'
        required: false
        description: 'Service tags for organization and discovery'
        business-context: 'Categorization for service queries and management'

        examples:
          - id: 'service-tags'
            code: |
              @QueryHandler(GetAnalyticsQuery, {
                tags: ['analytics', 'reporting', 'read-only']
              })

      - name: 'contextResolver'
        type: "'auto' | 'explicit' | 'none'"
        required: false
        description: 'Strategy for resolving service context'
        business-context: 'Control how bounded context is determined'

        custom-tags:
          default-value: "'auto'"

      - name: 'fallbackToGlobal'
        type: 'boolean'
        required: false
        description: 'Fall back to global container if not found in context'
        business-context: 'Graceful degradation for context-aware resolution'

        custom-tags:
          default-value: 'true'

  CommandHandlerOptions:
    # Interface Documentation
    interface-doc:
      description: 'Configuration options specific to command handler decorators'
      business-context: 'Command-specific DI settings with validation and timeout support'

      extends: 'DIDecoratorOptions'

      formats:
        jsdoc:
          description: 'Command handler DI options extending base configuration'
        cli:
          description: |
            ## CommandHandlerOptions Interface
            Command-specific DI configuration adding:
            - Command validation strategies
            - Execution timeout controls
            - All base DI features

    # Additional Properties (beyond DIDecoratorOptions)
    properties:
      - name: 'validation'
        type: "'strict' | 'loose' | 'none'"
        required: false
        description: 'Validation strategy for command processing'
        business-context: 'Control command validation rigor for business rule enforcement'

        examples:
          - id: 'strict-validation'
            code: |
              @CommandHandler(CreatePaymentCommand, {
                validation: 'strict' // Full validation required
              })

        custom-tags:
          default-value: "'loose'"

      - name: 'timeout'
        type: 'number'
        required: false
        description: 'Command execution timeout in milliseconds'
        business-context: 'Prevent long-running commands from blocking system'

        examples:
          - id: 'long-running-command'
            code: |
              @CommandHandler(ProcessBulkDataCommand, {
                timeout: 300000 // 5 minutes
              })

  QueryHandlerOptions:
    # Interface Documentation
    interface-doc:
      description: 'Configuration options specific to query handler decorators'
      business-context: 'Query-specific DI settings with caching and performance optimization'

      extends: 'DIDecoratorOptions'

      formats:
        jsdoc:
          description: 'Query handler DI options with caching and timeout support'
        cli:
          description: |
            ## QueryHandlerOptions Interface
            Query-specific DI configuration adding:
            - Query result caching options
            - Cache TTL configuration
            - Query timeout controls
            - All base DI features

    # Additional Properties (beyond DIDecoratorOptions)
    properties:
      - name: 'cacheable'
        type: 'boolean'
        required: false
        description: 'Enable result caching for query responses'
        business-context: 'Performance optimization for expensive or frequently accessed queries'

        examples:
          - id: 'cached-query'
            code: |
              @QueryHandler(GetUserProfileQuery, {
                cacheable: true,
                cacheTtl: 300 // 5 minutes
              })

        custom-tags:
          default-value: 'false'
          performance-optimization: 'Reduces database load'

      - name: 'cacheTtl'
        type: 'number'
        required: false
        description: 'Cache time-to-live in seconds'
        business-context: 'Balance between performance and data freshness'

        custom-tags:
          requires: 'cacheable: true'
          unit: 'seconds'

      - name: 'timeout'
        type: 'number'
        required: false
        description: 'Query execution timeout in milliseconds'
        business-context: 'Prevent slow queries from impacting user experience'

        examples:
          - id: 'fast-query-timeout'
            code: |
              @QueryHandler(GetDashboardDataQuery, {
                timeout: 5000 // 5 seconds for dashboard
              })

  DIHandlerMetadata:
    # Interface Documentation
    interface-doc:
      description: 'Runtime metadata for registered CQRS handlers in DI system'
      business-context: 'Tracking and debugging information for handler registration and lifecycle'

      formats:
        jsdoc:
          description: 'Handler metadata for DI container management and debugging'
        cli:
          description: |
            ## DIHandlerMetadata Interface
            Runtime handler information including:
            - Handler type classification
            - Message and handler type references
            - DI configuration snapshot
            - Registration tracking

    # Properties
    properties:
      - name: 'type'
        type: "'command' | 'query' | 'event'"
        required: true
        description: 'Classification of handler type'
        business-context: 'Categorization for proper routing and processing'

      - name: 'messageType'
        type: 'new (...args: unknown[]) => unknown'
        required: true
        description: 'Constructor function of message type handled'
        business-context: 'Type association for handler lookup and routing'

      - name: 'handlerType'
        type: 'new (...args: unknown[]) => unknown'
        required: true
        description: 'Constructor function of handler implementation'
        business-context: 'Handler instantiation reference for DI container'

      - name: 'options'
        type: 'DIDecoratorOptions'
        required: true
        description: 'DI configuration options snapshot'
        business-context: 'Configuration used for handler registration'

      - name: 'registeredAt'
        type: 'Date'
        required: true
        description: 'Timestamp when handler was registered'
        business-context: 'Registration tracking for debugging and auditing'

      - name: 'registeredWithDI'
        type: 'boolean'
        required: true
        description: 'Whether handler was successfully registered with DI container'
        business-context: 'Registration status for troubleshooting DI issues'

# === USAGE EXAMPLES ===
usage-examples:
  basic-command-handler:
    description: 'Simple command handler with DI options'
    code: |
      @CommandHandler(CreateUserCommand, {
        serviceId: 'createUserHandler',
        lifetime: 'transient',
        validation: 'strict'
      })
      class CreateUserHandler implements ICommandHandler<CreateUserCommand> {
        async execute(command: CreateUserCommand): Promise<void> {
          // Handler implementation
        }
      }

  enterprise-query-handler:
    description: 'Enterprise query handler with full DI configuration'
    code: |
      @QueryHandler(GetOrderHistoryQuery, {
        serviceId: 'orderHistoryHandler',
        lifetime: 'singleton',
        context: 'OrderManagement',
        cacheable: true,
        cacheTtl: 600,
        timeout: 10000,
        tags: ['orders', 'history', 'read-only'],
        dependencies: ['orderRepository', 'userService']
      })
      class GetOrderHistoryHandler {
        async execute(query: GetOrderHistoryQuery): Promise<OrderHistory[]> {
          // Cached query implementation
        }
      }

  context-aware-handlers:
    description: 'Bounded context isolation with DI'
    code: |
      // Order Management Context
      @CommandHandler(CreateOrderCommand, {
        context: 'OrderManagement',
        contextResolver: 'explicit'
      })

      // Payment Processing Context  
      @CommandHandler(ProcessPaymentCommand, {
        context: 'PaymentProcessing',
        fallbackToGlobal: false // Strict context isolation
      })
