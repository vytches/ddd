# SafeRun - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'safe-run'
title: 'SafeRun - Testing-Specific Safe Execution Utilities'
description: 'Enhanced safeRun utility specifically designed for testing DDD/CQRS patterns'
business-context: 'Provides type-safe error/success pattern for async operations in tests'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  SafeRunResult:
    description: 'Result tuple type for safe execution operations'
    business-context: 'Represents either [error, undefined] or [undefined, success_value] pattern'

    definition: 'readonly [E | undefined, T | undefined]'
    generic-parameters:
      - name: 'T'
        description: 'Success value type'
      - name: 'E'
        description: 'Error type, defaults to Error'
        default: 'Error'

# === FUNCTIONS ===
functions:
  safeRun:
    description: 'Execute a function safely and return error/success tuple'
    business-context: 'Fundamental building block for error handling in DDD test scenarios'

    overloads:
      - description: 'Synchronous safe execution'
        parameters:
          - name: 'fn'
            type: '() => T'
            description: 'Synchronous function to execute safely'
        returns:
          type: 'SafeRunResult<T, E>'
          description: 'Tuple with either error or success value'

      - description: 'Asynchronous safe execution'
        parameters:
          - name: 'fn'
            type: '() => Promise<T>'
            description: 'Asynchronous function to execute safely'
        returns:
          type: 'Promise<SafeRunResult<T, E>>'
          description: 'Promise resolving to tuple with either error or success value'

    examples:
      - id: 'sync-error-handling'
        description: 'Synchronous error handling in tests'
        code: |
          import { safeRun } from '@vytches/ddd-testing';

          const [error, result] = safeRun(() => {
            throw new ValidationError('Invalid input');
          });

          expect(error).toBeInstanceOf(ValidationError);
          expect(result).toBeUndefined();

      - id: 'async-success-handling'
        description: 'Asynchronous success handling in tests'
        code: |
          const [error, user] = await safeRun(async () => {
            return await userService.createUser({ name: 'John' });
          });

          expect(error).toBeUndefined();
          expect(user).toBeDefined();
          expect(user?.name).toBe('John');

    custom-tags:
      since: '1.0.0'
      testing: 'Core testing utility'
      pattern: 'Error handling pattern'

  safeRunTest:
    description: 'Enhanced safeRun with test context and debugging information'
    business-context: 'Provides additional context for debugging failed tests'

    parameters:
      - name: 'fn'
        type: '() => T | Promise<T>'
        description: 'Function to execute safely (sync or async)'
      - name: 'context'
        type: 'string'
        description: 'Optional context description for debugging'
        optional: true

    returns:
      type: 'SafeRunResult<T, E> | Promise<SafeRunResult<T, E>>'
      description: 'Result tuple or promise of tuple depending on function type'

    examples:
      - id: 'test-with-context'
        description: 'Safe execution with test context'
        code: |
          const [error, result] = await safeRunTest(
            async () => await complexBusinessOperation(),
            'Complex business operation test'
          );

          if (error) {
            console.log('Test failed in context:', error.message);
          }

    custom-tags:
      since: '1.0.0'
      testing: 'Enhanced testing utility'
      debugging: 'Provides test context'

  expectError:
    description: 'Type-safe error expectation utility for tests'
    business-context: 'Ensures test assertions match expected error types in DDD scenarios'

    parameters:
      - name: 'errorType'
        type: 'new (...args: any[]) => E'
        description: 'Constructor for expected error type'

    returns:
      type: '(result: SafeRunResult<any, E>) => E'
      description: 'Function that extracts and validates error from result tuple'

    examples:
      - id: 'validate-domain-error'
        description: 'Validate specific domain error type'
        code: |
          const [error] = safeRun(() => aggregate.processInvalidCommand());
          const domainError = expectError(DomainValidationError)(result);

          expect(domainError.code).toBe('INVALID_COMMAND');
          expect(domainError.details).toContain('command validation');

    custom-tags:
      since: '1.0.0'
      testing: 'Type-safe error validation'
      assertions: 'Test assertion helper'

  expectSuccess:
    description: 'Type-safe success expectation utility for tests'
    business-context: 'Ensures operations succeed and extracts success value for further testing'

    parameters:
      - name: 'result'
        type: 'SafeRunResult<T>'
        description: 'Result tuple to extract success value from'

    returns:
      type: 'T'
      description: 'Success value extracted from result tuple'

    examples:
      - id: 'extract-success-value'
        description: 'Extract and use success value'
        code: |
          const result = safeRun(() => userFactory.createValidUser());
          const user = expectSuccess(result);

          expect(user.id).toBeDefined();
          expect(user.email).toMatch(/^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/);

    custom-tags:
      since: '1.0.0'
      testing: 'Type-safe success validation'
      assertions: 'Test assertion helper'

  safeRunWithTimeout:
    description: 'Execute async function with timeout protection'
    business-context: 'Prevents tests from hanging on long-running operations'

    parameters:
      - name: 'fn'
        type: '() => Promise<T>'
        description: 'Async function to execute with timeout'
      - name: 'timeoutMs'
        type: 'number'
        description: 'Timeout in milliseconds'
      - name: 'context'
        type: 'string'
        description: 'Optional context for timeout errors'
        optional: true

    returns:
      type: 'Promise<SafeRunResult<T, E | Error>>'
      description: 'Promise resolving to result tuple or timeout error'

    examples:
      - id: 'timeout-protection'
        description: 'Protect async operations with timeout'
        code: |
          const [error, result] = await safeRunWithTimeout(
            () => slowExternalServiceCall(),
            5000,
            'External service integration test'
          );

          if (error?.message.includes('timeout')) {
            // Handle timeout scenario
            expect(error.message).toContain('External service integration test');
          }

    custom-tags:
      since: '1.0.0'
      testing: 'Timeout protection utility'
      async: 'Async operation safety'
