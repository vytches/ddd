# TestHarness - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'test-harness'
title: 'TestHarness - Advanced Testing Infrastructure'
description: 'Comprehensive testing infrastructure for DDD/CQRS scenarios'
business-context: 'Provides structured setup/teardown lifecycle for complex domain testing'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  TestHarnessOptions:
    description: 'Configuration options for test harness behavior'
    business-context: 'Controls harness lifecycle, timing, and debugging features'

    properties:
      - name: 'autoCleanup'
        type: 'boolean'
        description: 'Automatically clean up resources after each test'
        optional: true
        business-context: 'Prevents resource leaks between test runs'

      - name: 'enableTimeFreezing'
        type: 'boolean'
        description: 'Enable time control features'
        optional: true
        business-context: 'Allows deterministic testing of time-based business logic'

      - name: 'setupTimeout'
        type: 'number'
        description: 'Custom setup timeout in milliseconds'
        optional: true
        business-context: 'Prevents tests from hanging during setup phase'

      - name: 'teardownTimeout'
        type: 'number'
        description: 'Custom teardown timeout in milliseconds'
        optional: true
        business-context: 'Ensures clean resource disposal within time limits'

      - name: 'verbose'
        type: 'boolean'
        description: 'Enable detailed logging for debugging'
        optional: true
        business-context: 'Helps diagnose test infrastructure issues'

  TestHarnessState:
    description: 'Current state information for test harness'
    business-context: 'Provides visibility into harness lifecycle and health'

    properties:
      - name: 'isInitialized'
        type: 'boolean'
        description: 'Whether harness has been initialized'
        readonly: true

      - name: 'isSetup'
        type: 'boolean'
        description: 'Whether harness is currently set up'
        readonly: true

      - name: 'setupTime'
        type: 'Date | null'
        description: 'Timestamp of last setup completion'
        readonly: true

      - name: 'teardownTime'
        type: 'Date | null'
        description: 'Timestamp of last teardown completion'
        readonly: true

      - name: 'resourceCount'
        type: 'number'
        description: 'Number of registered resources'
        readonly: true

      - name: 'hasErrors'
        type: 'boolean'
        description: 'Whether any errors occurred during operations'
        readonly: true

  TestResource:
    description: 'Managed resource that requires cleanup'
    business-context: 'Represents resources like connections, files, or services that need disposal'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier for the resource'
        readonly: true

      - name: 'type'
        type: 'string'
        description: 'Type category of the resource'
        readonly: true

      - name: 'created'
        type: 'Date'
        description: 'When the resource was created'
        readonly: true

    methods:
      dispose:
        description: 'Clean up the resource'
        returns:
          type: 'Promise<void> | void'
          description: 'Promise or void depending on cleanup requirements'

# === CLASSES ===
classes:
  TestHarness:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class for structured test harness implementations'
      business-context: 'Provides consistent lifecycle management for complex test scenarios'

      custom-tags:
        abstract: 'Abstract base class'
        lifecycle: 'Manages setup/teardown lifecycle'
        resources: 'Automatic resource management'

    # Methods
    methods:
      constructor:
        description: 'Create new test harness with configuration options'
        business-context: 'Initialize harness with lifecycle and debugging settings'

        parameters:
          - name: 'options'
            type: 'TestHarnessOptions'
            description: 'Configuration for harness behavior'
            optional: true

      initialize:
        description: 'Initialize the test harness - must be called before using'
        business-context: 'Prepares harness infrastructure for test execution'

        returns:
          type: 'Promise<this>'
          description: 'Promise resolving to harness instance for chaining'

        examples:
          - id: 'basic-initialization'
            code: |
              const harness = new CustomTestHarness({
                autoCleanup: true,
                verbose: true
              });
              await harness.initialize();

      setup:
        description: 'Set up the test environment - called before each test'
        business-context: 'Prepares clean environment state for individual test execution'

        returns:
          type: 'Promise<this>'
          description: 'Promise resolving to harness instance for chaining'

      teardown:
        description: 'Clean up the test environment - called after each test'
        business-context: 'Restores environment to clean state after test execution'

        returns:
          type: 'Promise<this>'
          description: 'Promise resolving to harness instance for chaining'

      reset:
        description: 'Reset harness to clean state without full teardown/setup cycle'
        business-context: 'Efficient cleanup for lightweight test isolation'

        returns:
          type: 'Promise<this>'
          description: 'Promise resolving to harness instance for chaining'

      dispose:
        description: 'Dispose of harness and all resources - called when completely done'
        business-context: 'Final cleanup when no more tests will be run'

        returns:
          type: 'Promise<void>'
          description: 'Promise resolving when all resources are disposed'

      getState:
        description: 'Get current state information for the harness'
        business-context: 'Monitor harness health and lifecycle status'

        returns:
          type: 'TestHarnessState'
          description: 'Current state information object'

      getErrors:
        description: 'Get all errors that occurred during harness operations'
        business-context: 'Debug harness failures and infrastructure issues'

        returns:
          type: 'readonly Error[]'
          description: 'Array of errors encountered during operations'

  SimpleTestHarness:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Concrete test harness implementation with custom setup/teardown functions'
      business-context: 'Ready-to-use harness for simple test scenarios with custom lifecycle hooks'

      extends: 'TestHarness'

    # Methods
    methods:
      constructor:
        description: 'Create simple harness with optional custom setup/teardown functions'
        business-context: 'Quick harness setup for straightforward test scenarios'

        parameters:
          - name: 'options'
            type: 'TestHarnessOptions & { setupFn?: () => Promise<void> | void; teardownFn?: () => Promise<void> | void; }'
            description: 'Configuration including optional custom lifecycle functions'
            optional: true

        examples:
          - id: 'custom-lifecycle'
            code: |
              const harness = new SimpleTestHarness({
                autoCleanup: true,
                setupFn: async () => {
                  // Custom setup logic
                  await initializeTestDatabase();
                },
                teardownFn: async () => {
                  // Custom cleanup logic
                  await cleanupTestDatabase();
                }
              });

  TestResourceBuilder:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Builder for creating managed test resources'
      business-context: 'Fluent API for creating resources with proper disposal logic'

      patterns: 'Builder Pattern'

    # Methods
    methods:
      constructor:
        description: 'Create new resource builder for specific resource type'
        business-context: 'Initialize builder with resource type and optional ID'

        parameters:
          - name: 'type'
            type: 'string'
            description: 'Resource type identifier'
          - name: 'id'
            type: 'string'
            description: 'Optional unique identifier'
            optional: true

      withId:
        description: 'Set custom identifier for the resource'
        business-context: 'Override generated ID with custom identifier'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Custom resource identifier'

        returns:
          type: 'this'
          description: 'Builder instance for method chaining'

      withDisposal:
        description: 'Set custom disposal function for the resource'
        business-context: 'Define cleanup logic specific to resource type'

        parameters:
          - name: 'disposeFn'
            type: '() => Promise<void> | void'
            description: 'Function to clean up the resource'

        returns:
          type: 'this'
          description: 'Builder instance for method chaining'

      build:
        description: 'Create the configured test resource'
        business-context: 'Finalize resource configuration and create instance'

        returns:
          type: 'TestResource'
          description: 'Configured test resource ready for registration'

      create:
        description: 'Static factory method for creating resource builder'
        business-context: 'Convenient static entry point for resource creation'

        parameters:
          - name: 'type'
            type: 'string'
            description: 'Resource type identifier'
          - name: 'id'
            type: 'string'
            description: 'Optional unique identifier'
            optional: true

        returns:
          type: 'TestResourceBuilder'
          description: 'New builder instance'

        examples:
          - id: 'database-resource'
            code: |
              const dbResource = TestResourceBuilder
                .create('database', 'test-db')
                .withDisposal(async () => {
                  await testDb.close();
                  await testDb.cleanup();
                })
                .build();

        custom-tags:
          static: 'Static factory method'
