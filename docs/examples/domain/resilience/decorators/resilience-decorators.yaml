# ResilienceDecorators - Method Decorators Implementation

# === FILE METADATA ===
file-name: 'decorators/resilience-decorators'
title: 'ResilienceDecorators - Method Decorators Implementation'  
description: 'Method decorators for applying resilience patterns'
business-context: |
  Provides TypeScript decorators for applying resilience patterns to class methods.
  Enables declarative configuration of circuit breakers, retry policies, bulkheads,
  and timeouts through method decorators.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  BaseResilienceDecoratorConfig:
    description: 'Base configuration for resilience decorators'
    business-context: 'Common configuration options for all resilience decorators'

    properties:
      - name: 'contextProvider'
        type: '() => ResilienceContext'
        description: 'Function to provide resilience context'
        optional: true
      - name: 'enableMetrics'
        type: 'boolean'
        description: 'Whether to enable metrics collection'
        optional: true
      - name: 'decoratorName'
        type: 'string'
        description: 'Custom name for decorator identification'
        optional: true

  CircuitBreakerDecoratorConfig:
    description: 'Configuration for circuit breaker decorator'
    business-context: 'Extends circuit breaker config with decorator-specific options'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Circuit breaker name'
        optional: true
      - name: 'failureThreshold'
        type: 'number'
        description: 'Number of failures to trigger open state'
      - name: 'recoveryTimeout'
        type: 'number'
        description: 'Time to wait before attempting recovery'
      - name: 'successThreshold'
        type: 'number'
        description: 'Number of successes to close circuit'

  RetryDecoratorConfig:
    description: 'Configuration for retry decorator'
    business-context: 'Retry configuration with decorator-specific options'

    properties:
      - name: 'maxAttempts'
        type: 'number'
        description: 'Maximum retry attempts'
      - name: 'baseDelayMs'
        type: 'number'
        description: 'Base delay between retries'
      - name: 'maxDelayMs'
        type: 'number'
        description: 'Maximum delay between retries'
        optional: true
      - name: 'backoffType'
        type: 'string'
        description: 'Backoff strategy type'
        optional: true

  BulkheadDecoratorConfig:
    description: 'Configuration for bulkhead decorator'
    business-context: 'Bulkhead configuration with decorator-specific options'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Bulkhead name'
        optional: true
      - name: 'maxConcurrency'
        type: 'number'
        description: 'Maximum concurrent executions'
      - name: 'queueCapacity'
        type: 'number'
        description: 'Queue capacity for waiting operations'
        optional: true

  TimeoutDecoratorConfig:
    description: 'Configuration for timeout decorator'
    business-context: 'Timeout configuration with decorator-specific options'

    properties:
      - name: 'timeout'
        type: 'number'
        description: 'Timeout duration in milliseconds'

  CompositeResilienceConfig:
    description: 'Configuration for composite resilience decorator'
    business-context: 'Combines multiple resilience patterns in single decorator'

    properties:
      - name: 'circuitBreaker'
        type: 'CircuitBreakerConfig'
        description: 'Circuit breaker configuration'
        optional: true
      - name: 'retry'
        type: 'RetryConfig'
        description: 'Retry configuration'
        optional: true
      - name: 'bulkhead'
        type: 'BulkheadConfig'
        description: 'Bulkhead configuration'
        optional: true
      - name: 'timeout'
        type: 'number'
        description: 'Timeout in milliseconds'
        optional: true

  ResilienceDecoratorConfig:
    description: 'Type alias for base resilience decorator configuration'
    business-context: 'Common base type for all resilience decorators'

# === TYPES ===
types:
  ResilienceDecoratorConfig:
    description: 'Type alias for BaseResilienceDecoratorConfig'
    business-context: 'Common base type for all resilience decorators'

# === CONSTANTS ===
constants:
  CircuitBreaker:
    description: 'Circuit breaker decorator factory'
    business-context: 'Factory function for creating circuit breaker method decorators'
    type: '(config: CircuitBreakerDecoratorConfig) => MethodDecorator'
    
  Retry:
    description: 'Retry decorator factory'
    business-context: 'Factory function for creating retry method decorators'
    type: '(config: RetryDecoratorConfig) => MethodDecorator'
    
  Bulkhead:
    description: 'Bulkhead decorator factory'
    business-context: 'Factory function for creating bulkhead method decorators'
    type: '(config: BulkheadDecoratorConfig) => MethodDecorator'
    
  Resilience:
    description: 'Composite resilience decorator factory'
    business-context: 'Factory function for creating composite resilience method decorators'
    type: '(config: CompositeResilienceConfig) => MethodDecorator'
    
  Timeout:
    description: 'Timeout decorator factory'
    business-context: 'Factory function for creating timeout method decorators'
    type: '(config: TimeoutDecoratorConfig) => MethodDecorator'

# === FUNCTIONS ===
functions:
  CircuitBreaker:
    description: 'Circuit breaker method decorator'
    business-context: |
      Applies circuit breaker pattern to method calls. Automatically opens
      circuit on repeated failures and provides fail-fast behavior.

    parameters:
      - name: 'config'
        type: 'CircuitBreakerDecoratorConfig'
        description: 'Circuit breaker configuration'

    returns:
      type: '(target: unknown, propertyKey: string, descriptor: PropertyDescriptor) => PropertyDescriptor'
      description: 'Method decorator function'

    examples:
      - id: 'circuit-breaker-decorator'
        code: |
          class PaymentService {
            @CircuitBreaker({
              failureThreshold: 5,
              recoveryTimeout: 30000,
              successThreshold: 2
            })
            async processPayment(amount: number): Promise<PaymentResult> {
              return await this.paymentGateway.charge(amount);
            }
          }

  Retry:
    description: 'Retry method decorator'
    business-context: |
      Applies retry pattern to method calls. Automatically retries failed
      operations with configurable backoff strategies.

    parameters:
      - name: 'config'
        type: 'RetryDecoratorConfig'
        description: 'Retry configuration'

    returns:
      type: '(target: unknown, propertyKey: string, descriptor: PropertyDescriptor) => PropertyDescriptor'
      description: 'Method decorator function'

    examples:
      - id: 'retry-decorator'
        code: |
          class ApiService {
            @Retry({
              maxAttempts: 3,
              baseDelayMs: 1000,
              maxDelayMs: 10000,
              backoffType: 'exponential'
            })
            async fetchUserData(userId: string): Promise<User> {
              return await this.httpClient.get(`/users/${userId}`);
            }
          }

  Bulkhead:
    description: 'Bulkhead method decorator'
    business-context: |
      Applies bulkhead pattern to method calls. Limits concurrent executions
      and provides resource isolation for method calls.

    parameters:
      - name: 'config'
        type: 'BulkheadDecoratorConfig'
        description: 'Bulkhead configuration'

    returns:
      type: '(target: unknown, propertyKey: string, descriptor: PropertyDescriptor) => PropertyDescriptor'
      description: 'Method decorator function'

    examples:
      - id: 'bulkhead-decorator'
        code: |
          class DatabaseService {
            @Bulkhead({
              name: 'database-queries',
              maxConcurrency: 10,
              queueCapacity: 20
            })
            async queryDatabase(sql: string): Promise<QueryResult> {
              return await this.database.execute(sql);
            }
          }

  Resilience:
    description: 'Composite resilience method decorator'
    business-context: |
      Applies multiple resilience patterns to method calls. Combines
      circuit breaker, retry, bulkhead, and timeout patterns.

    parameters:
      - name: 'config'
        type: 'CompositeResilienceConfig'
        description: 'Composite resilience configuration'

    returns:
      type: '(target: unknown, propertyKey: string, descriptor: PropertyDescriptor) => PropertyDescriptor'
      description: 'Method decorator function'

    examples:
      - id: 'composite-resilience-decorator'
        code: |
          class OrderService {
            @Resilience({
              circuitBreaker: {
                failureThreshold: 3,
                recoveryTimeout: 30000
              },
              retry: {
                maxAttempts: 2,
                baseDelayMs: 500
              },
              bulkhead: {
                maxConcurrency: 5,
                queueCapacity: 10
              },
              timeout: 15000
            })
            async processOrder(order: Order): Promise<OrderResult> {
              return await this.orderProcessor.process(order);
            }
          }

  Timeout:
    description: 'Timeout method decorator'
    business-context: |
      Applies timeout pattern to method calls. Automatically cancels
      operations that exceed configured timeout duration.

    parameters:
      - name: 'config'
        type: 'TimeoutDecoratorConfig'
        description: 'Timeout configuration'

    returns:
      type: '(target: unknown, propertyKey: string, descriptor: PropertyDescriptor) => PropertyDescriptor'
      description: 'Method decorator function'

    examples:
      - id: 'timeout-decorator'
        code: |
          class FileService {
            @Timeout({ timeout: 30000 }) // 30 seconds
            async uploadFile(file: File): Promise<UploadResult> {
              return await this.storage.upload(file);
            }
          }

  getResilienceMetrics:
    description: 'Gets resilience metrics for decorated method'
    business-context: |
      Retrieves metrics and configuration information for methods
      decorated with resilience patterns.

    parameters:
      - name: 'instance'
        type: 'Record<string, unknown>'
        description: 'Class instance'
      - name: 'methodName'
        type: 'string'
        description: 'Method name'

    returns:
      type: 'object'
      description: 'Resilience metrics and configuration'
      properties:
        - name: 'config'
          type: 'BaseResilienceDecoratorConfig'
          description: 'Decorator configuration'
        - name: 'className'
          type: 'string'
          description: 'Class name'
        - name: 'methodName'
          type: 'string'
          description: 'Method name'

    examples:
      - id: 'get-metrics'
        code: |
          const service = new PaymentService();
          const metrics = getResilienceMetrics(service, 'processPayment');
          console.log(metrics.config, metrics.className, metrics.methodName);

# === USAGE PATTERNS ===
patterns:
  - name: 'Basic Method Decoration'
    description: 'Simple resilience pattern application'
    example: |
      class UserService {
        @CircuitBreaker({
          failureThreshold: 5,
          recoveryTimeout: 60000
        })
        async fetchUser(id: string): Promise<User> {
          return await this.userRepository.findById(id);
        }
        
        @Retry({ maxAttempts: 3, baseDelayMs: 1000 })
        async updateUser(user: User): Promise<void> {
          await this.userRepository.save(user);
        }
      }

  - name: 'Composite Resilience Pattern'
    description: 'Multiple patterns applied to critical operations'
    example: |
      class CriticalService {
        @Resilience({
          timeout: 10000,
          circuitBreaker: {
            failureThreshold: 3,
            recoveryTimeout: 30000
          },
          retry: {
            maxAttempts: 2,
            baseDelayMs: 500,
            maxDelayMs: 5000
          },
          bulkhead: {
            maxConcurrency: 5,
            queueCapacity: 15
          }
        })
        async performCriticalOperation(data: OperationData): Promise<Result> {
          return await this.externalService.execute(data);
        }
      }

  - name: 'Context-Aware Decorators'
    description: 'Using custom context providers'
    example: |
      class ContextAwareService {
        @CircuitBreaker({
          failureThreshold: 5,
          recoveryTimeout: 30000,
          contextProvider: () => ({
            correlationId: this.getCurrentCorrelationId(),
            userId: this.getCurrentUserId(),
            metadata: { service: 'context-aware' }
          }),
          enableMetrics: true
        })
        async contextAwareOperation(): Promise<void> {
          // Operation with context tracking
        }
        
        private getCurrentCorrelationId(): string {
          return `ctx-${Date.now()}`;
        }
        
        private getCurrentUserId(): string {
          return this.currentUser?.id || 'anonymous';
        }
      }