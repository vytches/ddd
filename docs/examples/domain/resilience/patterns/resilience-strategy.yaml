# ResilienceStrategy - Strategy Pattern Implementation

# === FILE METADATA ===
file-name: 'patterns/resilience-strategy'
title: 'ResilienceStrategy - Strategy Pattern Implementation'
description: 'Strategy pattern wrapper for composable resilience patterns'
business-context: |
  Provides strategy pattern implementation for resilience patterns, enabling
  composition and chaining of different resilience policies. Includes policy
  builder for fluent configuration and timeout strategies.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ResilienceStrategy:
    description: 'Base interface for all resilience strategies'
    business-context: 'Common contract for implementing resilience patterns'

    properties:
      - name: 'execute'
        type: '<T>(operation: (context: ResilienceContext) => Promise<T>, context: ResilienceContext) => Promise<T>'
        description: 'Executes operation with resilience protection'

# === CLASSES ===
classes:
  TimeoutStrategy:
    class-doc:
      description: 'Timeout-based resilience strategy'
      business-context: |
        Implements timeout protection as a strategy that can be composed
        with other resilience patterns. Provides configurable timeout
        with AbortSignal support.

      formats:
        jsdoc:
          description: 'Timeout strategy with AbortSignal integration'
        cli:
          description: |
            ## TimeoutStrategy
            Strategy-based timeout protection:
            - Configurable timeout duration
            - AbortSignal integration
            - Strategy composition support

      custom-tags:
        since: '1.0.0'
        pattern: 'Strategy Pattern'
        implements: 'ResilienceStrategy'

    methods:
      constructor:
        description: 'Creates timeout strategy with specified duration'
        business-context: 'Sets up timeout duration for operation protection'

        parameters:
          - name: 'timeoutMs'
            type: 'number'
            description: 'Timeout duration in milliseconds'

        examples:
          - id: 'timeout-strategy'
            code: |
              const timeoutStrategy = new TimeoutStrategy(5000); // 5 second timeout

      execute:
        description: 'Executes operation with timeout protection'
        business-context: 'Wraps operation with timeout enforcement'

        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
            description: 'Operation to execute with timeout'
          - name: 'context'
            type: 'ResilienceContext'
            description: 'Execution context'

        returns:
          type: 'Promise<T>'
          description: 'Operation result or timeout error'

        examples:
          - id: 'timeout-execution'
            code: |
              const result = await timeoutStrategy.execute(async (ctx) => {
                return await longRunningOperation();
              }, { correlationId: 'timeout-test' });

  CompositeResilienceStrategy:
    class-doc:
      description: 'Composite strategy for chaining multiple resilience patterns'
      business-context: |
        Allows composition of multiple resilience strategies into a single
        strategy that applies all configured patterns in sequence.

      formats:
        jsdoc:
          description: 'Composite resilience strategy for pattern chaining'
        cli:
          description: |
            ## CompositeResilienceStrategy
            Strategy composition providing:
            - Multiple pattern chaining
            - Ordered strategy execution
            - Builder pattern integration

      custom-tags:
        since: '1.0.0'
        pattern: 'Composite Pattern'
        implements: 'ResilienceStrategy'

    methods:
      constructor:
        description: 'Creates composite strategy with multiple strategies'
        business-context: 'Combines multiple resilience patterns into single strategy'

        parameters:
          - name: 'strategies'
            type: 'ResilienceStrategy[]'
            description: 'Array of strategies to compose'

        examples:
          - id: 'composite-creation'
            code: |
              const composite = new CompositeResilienceStrategy([
                new TimeoutStrategy(10000),
                circuitBreakerStrategy,
                retryStrategy
              ]);

      execute:
        description: 'Executes operation through composed strategies'
        business-context: 'Applies all configured resilience patterns in sequence'

        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
            description: 'Operation to protect'
          - name: 'context'
            type: 'ResilienceContext'
            description: 'Execution context'

        returns:
          type: 'Promise<T>'
          description: 'Operation result after all strategies applied'

        examples:
          - id: 'composite-execution'
            code: |
              const result = await composite.execute(async (ctx) => {
                return await protectedOperation();
              }, { correlationId: 'composite-test' });

  CircuitBreakerStrategy:
    class-doc:
      description: 'Circuit breaker strategy wrapper'
      business-context: |
        Wraps CircuitBreaker implementation as a strategy that can be composed
        with other resilience patterns. Provides circuit breaker functionality
        within the strategy pattern.

      formats:
        jsdoc:
          description: 'Circuit breaker strategy with state management'

      custom-tags:
        since: '1.0.0'
        pattern: 'Strategy Pattern'
        implements: 'ResilienceStrategy'

    methods:
      constructor:
        description: 'Creates circuit breaker strategy with configuration'
        parameters:
          - name: 'config'
            type: 'CircuitBreakerConfig'
            description: 'Circuit breaker configuration'

      execute:
        description: 'Executes operation through circuit breaker strategy'
        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
          - name: 'context'
            type: 'ResilienceContext'
        returns:
          type: 'Promise<T>'

      getMetrics:
        description: 'Returns circuit breaker metrics'
        returns:
          type: 'CircuitBreakerMetrics'

  RetryStrategy:
    class-doc:
      description: 'Retry strategy wrapper'
      business-context: |
        Wraps RetryPolicy implementation as a strategy that can be composed
        with other resilience patterns. Provides retry functionality
        within the strategy pattern.

      formats:
        jsdoc:
          description: 'Retry strategy with exponential backoff'

      custom-tags:
        since: '1.0.0'
        pattern: 'Strategy Pattern'
        implements: 'ResilienceStrategy'

    methods:
      constructor:
        description: 'Creates retry strategy with configuration'
        parameters:
          - name: 'config'
            type: 'RetryConfig'
            description: 'Retry configuration'

      execute:
        description: 'Executes operation through retry strategy'
        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
          - name: 'context'
            type: 'ResilienceContext'
        returns:
          type: 'Promise<T>'

  BulkheadStrategy:
    class-doc:
      description: 'Bulkhead strategy wrapper'
      business-context: |
        Wraps Bulkhead implementation as a strategy that can be composed
        with other resilience patterns. Provides resource isolation
        within the strategy pattern.

      formats:
        jsdoc:
          description: 'Bulkhead strategy with resource isolation'

      custom-tags:
        since: '1.0.0'
        pattern: 'Strategy Pattern'
        implements: 'ResilienceStrategy'

    methods:
      constructor:
        description: 'Creates bulkhead strategy with configuration'
        parameters:
          - name: 'config'
            type: 'BulkheadConfig'
            description: 'Bulkhead configuration'

      execute:
        description: 'Executes operation through bulkhead strategy'
        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
          - name: 'context'
            type: 'ResilienceContext'
        returns:
          type: 'Promise<T>'

      getMetrics:
        description: 'Returns bulkhead metrics'
        returns:
          type: 'BulkheadMetrics'

  ResiliencePolicyBuilder:
    class-doc:
      description: 'Fluent builder for creating resilience policies'
      business-context: |
        Provides fluent API for configuring and building composite
        resilience strategies with multiple patterns.

      formats:
        jsdoc:
          description: 'Fluent builder for resilience policy configuration'
        cli:
          description: |
            ## ResiliencePolicyBuilder
            Fluent policy building:
            - Chainable configuration methods
            - Multiple pattern support
            - Strategy composition

      custom-tags:
        since: '1.0.0'
        pattern: 'Builder Pattern'

    methods:
      create:
        description: 'Creates new resilience policy builder'
        business-context: 'Starting point for fluent policy configuration'

        returns:
          type: 'ResiliencePolicyBuilder'
          description: 'New builder instance'

        examples:
          - id: 'builder-creation'
            code: |
              const policy = ResiliencePolicyBuilder.create()
                .withCircuitBreaker({ failureThreshold: 5 })
                .withRetry({ maxAttempts: 3 })
                .withTimeout(10000)
                .build();

      withCircuitBreaker:
        description: 'Adds circuit breaker to policy'
        business-context: 'Configures circuit breaker pattern in policy'

        parameters:
          - name: 'config'
            type: 'CircuitBreakerConfig'
            description: 'Circuit breaker configuration'

        returns:
          type: 'ResiliencePolicyBuilder'
          description: 'Builder instance for chaining'

        examples:
          - id: 'circuit-breaker-config'
            code: |
              builder.withCircuitBreaker({
                failureThreshold: 3,
                recoveryTimeout: 30000
              });

      withRetry:
        description: 'Adds retry policy to strategy'
        business-context: 'Configures retry pattern in policy'

        parameters:
          - name: 'config'
            type: 'RetryConfig'
            description: 'Retry configuration'

        returns:
          type: 'ResiliencePolicyBuilder'
          description: 'Builder instance for chaining'

        examples:
          - id: 'retry-config'
            code: |
              builder.withRetry({
                maxAttempts: 3,
                baseDelayMs: 1000
              });

      withBulkhead:
        description: 'Adds bulkhead policy to strategy'
        business-context: 'Configures bulkhead pattern in policy'

        parameters:
          - name: 'config'
            type: 'BulkheadConfig'
            description: 'Bulkhead configuration'

        returns:
          type: 'ResiliencePolicyBuilder'
          description: 'Builder instance for chaining'

        examples:
          - id: 'bulkhead-config'
            code: |
              builder.withBulkhead({
                maxConcurrency: 5,
                queueCapacity: 15
              });

      withTimeout:
        description: 'Adds timeout to policy'
        business-context: 'Configures timeout protection in policy'

        parameters:
          - name: 'timeoutMs'
            type: 'number'
            description: 'Timeout duration in milliseconds'

        returns:
          type: 'ResiliencePolicyBuilder'
          description: 'Builder instance for chaining'

        examples:
          - id: 'timeout-config'
            code: |
              builder.withTimeout(15000); // 15 second timeout

      build:
        description: 'Builds composite resilience strategy'
        business-context: 'Creates final strategy with all configured patterns'

        returns:
          type: 'CompositeResilienceStrategy'
          description: 'Configured composite strategy'

        examples:
          - id: 'policy-build'
            code: |
              const policy = builder.build();
              
              // Use the built policy
              const result = await policy.execute(async (ctx) => {
                return await serviceOperation();
              }, context);

# === USAGE PATTERNS ===
patterns:
  - name: 'Basic Policy Builder'
    description: 'Creating resilience policy with multiple patterns'
    example: |
      const policy = ResiliencePolicyBuilder.create()
        .withTimeout(10000)
        .withCircuitBreaker({
          failureThreshold: 5,
          recoveryTimeout: 60000,
          successThreshold: 1,
          timeout: 8000
        })
        .withRetry({
          maxAttempts: 3,
          baseDelayMs: 1000,
          maxDelayMs: 10000
        })
        .build();

  - name: 'Service-Specific Policy'
    description: 'Tailored resilience policy for specific service'
    example: |
      class PaymentService {
        private resiliencePolicy = ResiliencePolicyBuilder.create()
          .withCircuitBreaker({ failureThreshold: 3, recoveryTimeout: 30000 })
          .withRetry({ maxAttempts: 2, baseDelayMs: 500 })
          .withBulkhead({ maxConcurrency: 10, queueCapacity: 20 })
          .withTimeout(15000)
          .build();
          
        async processPayment(payment: PaymentData): Promise<PaymentResult> {
          return await this.resiliencePolicy.execute(async (ctx) => {
            return await this.paymentGateway.charge(payment);
          }, { correlationId: payment.id });
        }
      }

  - name: 'Manual Strategy Composition'
    description: 'Creating composite strategy manually'
    example: |
      const strategies = [
        new TimeoutStrategy(8000),
        circuitBreaker,
        retryPolicy,
        bulkhead
      ];
      
      const composite = new CompositeResilienceStrategy(strategies);
      
      const result = await composite.execute(async (ctx) => {
        return await criticalOperation();
      }, { correlationId: 'manual-composite' });