# RetryPolicy - Intelligent Retry Implementation

# === FILE METADATA ===
file-name: 'patterns/retry'
title: 'RetryPolicy - Intelligent Retry Implementation'
description: 'Configurable retry logic with exponential backoff and jitter'
business-context: |
  Implements intelligent retry patterns for handling transient failures in
  distributed systems. Provides exponential backoff with jitter, configurable
  retry conditions, and comprehensive failure handling for external service
  calls and temporary resource unavailability.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  RetryConfig:
    interface-doc:
      description: 'Configuration for retry pattern'
      business-context: |
        Defines retry behavior including attempt limits, delays, backoff
        strategies, and conditions for retryable failures.
      
      custom-tags:
        since: '1.0.0'
        pattern: 'Configuration'
    
    properties:
      - name: 'maxAttempts'
        type: 'number'
        description: 'Maximum number of retry attempts'
      
      - name: 'baseDelay'
        type: 'number'
        description: 'Base delay in milliseconds between retries'
      
      - name: 'maxDelay'
        type: 'number'
        description: 'Maximum delay between retries'
        optional: true
      
      - name: 'backoffMultiplier'
        type: 'number'
        description: 'Multiplier for exponential backoff'
        optional: true
      
      - name: 'jitter'
        type: 'boolean'
        description: 'Add random jitter to delays'
        optional: true
      
      - name: 'retryableErrors'
        type: 'Array<ErrorConstructor | string>'
        description: 'Error types to retry'
        optional: true
  
  RetryMetrics:
    interface-doc:
      description: 'Performance metrics for retry operations'
      business-context: |
        Provides insights into retry behavior including attempt counts,
        delays, and failure patterns for monitoring and optimization.
      
      custom-tags:
        since: '1.0.0'
        pattern: 'Monitoring'
    
    properties:
      - name: 'attempt'
        type: 'number'
        description: 'Current attempt number'
      
      - name: 'totalAttempts'
        type: 'number'
        description: 'Total attempts made'
      
      - name: 'totalDelay'
        type: 'number'
        description: 'Cumulative delay across all retries'
      
      - name: 'lastError'
        type: 'Error | null'
        description: 'Most recent error encountered'
  
  RetryPolicyConfig:
    interface-doc:
      description: 'Internal retry policy configuration'
      business-context: |
        Extended configuration including internal state tracking
        for retry policy execution.
      
      custom-tags:
        since: '1.0.0'
        pattern: 'Configuration'
    
    properties:
      - name: 'attempts'
        type: 'number'
        description: 'Current attempt counter'
      
      - name: 'lastError'
        type: 'Error | undefined'
        description: 'Last encountered error'

# === CLASSES ===
classes:
  RetryPolicy:
    class-doc:
      description: 'Intelligent retry policy with backoff algorithms'
      business-context: |
        Handles transient failures with configurable retry logic, exponential
        backoff with jitter, and intelligent failure classification. Essential
        for robust external service integration and temporary resource failure
        recovery.

      formats:
        jsdoc:
          description: 'Retry policy with exponential backoff and jitter'
        cli:
          description: |
            ## RetryPolicy
            Enterprise retry pattern providing:
            - Exponential backoff with jitter
            - Configurable retry conditions
            - Maximum attempt limits
            - Intelligent failure classification

      custom-tags:
        since: '1.0.0'
        pattern: 'Retry Pattern'

    methods:
      constructor:
        description: 'Initializes retry policy with configuration'
        business-context: 'Sets up retry behavior, backoff algorithm, and failure conditions'

        parameters:
          - name: 'config'
            type: 'RetryConfig'
            description: 'Retry policy configuration'

        examples:
          - id: 'basic-retry'
            code: |
              const retryPolicy = new RetryPolicy({
                maxAttempts: 3,
                baseDelayMs: 1000,        // Start with 1 second
                maxDelayMs: 30000,        // Cap at 30 seconds
                backoffMultiplier: 2.0,   // Exponential backoff
                jitter: true              // Add randomization
              });

          - id: 'custom-conditions'
            code: |
              const apiRetryPolicy = new RetryPolicy({
                maxAttempts: 5,
                baseDelayMs: 500,
                shouldRetry: (error) => {
                  // Retry on timeout or rate limiting
                  return error.code === 'TIMEOUT' || 
                         error.code === 'RATE_LIMITED' ||
                         error.status === 503;
                }
              });

      execute:
        description: 'Executes operation with retry logic'
        business-context: 'Protects operation with intelligent retry and backoff'

        parameters:
          - name: 'operation'
            type: '(context: ResilienceContext) => Promise<T>'
            description: 'Async operation to retry'
          - name: 'context'
            type: 'ResilienceContext'
            description: 'Execution context'

        returns:
          type: 'Promise<T>'
          description: 'Operation result after all retry attempts'

        examples:
          - id: 'api-retry'
            code: |
              const context = { correlationId: 'api-123' };
              const result = await retryPolicy.execute(async (ctx) => {
                return await externalAPI.fetchData(userId);
              }, context);
              
              console.log('Data retrieved:', result);

          - id: 'database-retry'
            code: |
              const dbResult = await retryPolicy.execute(async (ctx) => {
                return await database.query('SELECT * FROM users WHERE id = ?', [id]);
              }, { 
                correlationId: 'db-query-123'
              });

      defaultConfig:
        description: 'Returns default retry configuration'
        business-context: 'Provides sensible defaults for common retry scenarios'

        returns:
          type: 'RetryConfig'
          description: 'Default configuration object'

        examples:
          - id: 'default-config'
            code: |
              const defaultConfig = RetryPolicy.defaultConfig();
              console.log('Default max attempts:', defaultConfig.maxAttempts);

      withConfig:
        description: 'Creates retry policy with custom configuration overrides'
        business-context: 'Convenient factory method for creating configured policies'

        parameters:
          - name: 'overrides'
            type: 'Partial<RetryConfig>'
            description: 'Configuration overrides'

        returns:
          type: 'RetryPolicy'
          description: 'New retry policy instance'

        examples:
          - id: 'custom-policy'
            code: |
              const customPolicy = RetryPolicy.withConfig({
                maxAttempts: 5,
                baseDelayMs: 2000
              });

  MaxRetriesExceededError:
    class-doc:
      description: 'Error thrown when max retry attempts exceeded'
      business-context: |
        Specific error type thrown when operations fail after exhausting
        all retry attempts. Indicates persistent failure requiring
        escalation or circuit breaker intervention.

      formats:
        jsdoc:
          description: 'Maximum retry attempts exceeded error'

      custom-tags:
        since: '1.0.0'
        extends: 'Error'

    methods:
      constructor:
        description: 'Creates max retries exceeded error'
        business-context: 'Used when operation fails after all retry attempts'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Error message'

        examples:
          - id: 'max-retries-error'
            code: |
              throw new MaxRetriesExceededError('Failed after 3 retry attempts');

  RetryMetrics:
    description: 'Retry policy performance metrics'
    business-context: 'Provides insights into retry effectiveness and operation reliability'

    properties:
      - name: 'totalAttempts'
        type: 'number'
        description: 'Total retry attempts made'
      - name: 'successfulRetries'
        type: 'number'
        description: 'Retries that succeeded after failure'
      - name: 'failedRetries'
        type: 'number'
        description: 'Retries that exhausted all attempts'
      - name: 'averageAttempts'
        type: 'number'
        description: 'Average attempts per operation'

# === USAGE PATTERNS ===
patterns:
  - name: 'API Call Retry'
    description: 'Retrying external API calls with backoff'
    example: |
      class DataService {
        private retryPolicy = new RetryPolicy({
          maxAttempts: 4,
          baseDelayMs: 1000,
          shouldRetry: (error) => error.status >= 500
        });
        
        async fetchUserData(id: string): Promise<UserData | null> {
          try {
            const result = await this.retryPolicy.execute(async (ctx) => {
              return await this.apiClient.getUser(id);
            }, { correlationId: `fetch-user-${id}` });
            
            return result;
          } catch (error) {
            console.error('All retry attempts failed:', error);
            return null;
          }
        }
      }

  - name: 'Database Retry'
    description: 'Retrying database operations on connection issues'
    example: |
      const dbRetryPolicy = new RetryPolicy({
        maxAttempts: 3,
        baseDelayMs: 2000,
        shouldRetry: (error) => 
          error.code === 'ECONNREFUSED' || 
          error.code === 'ENOTFOUND' ||
          error.message.includes('timeout')
      });

  - name: 'Message Queue Retry'
    description: 'Retrying message publishing with exponential backoff'
    example: |
      const messageRetry = new RetryPolicy({
        maxAttempts: 5,
        baseDelayMs: 500,
        maxDelayMs: 16000,
        jitter: true
      });
      
      await messageRetry.execute(async (ctx) => {
        return await messageQueue.publish(topic, message);
      }, { correlationId: 'msg-publish' });