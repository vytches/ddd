# MetricExporters - Export Format Implementations

# === FILE METADATA ===
file-name: 'observability/metric-exporters'
title: 'MetricExporters - Export Formatters'
description: 'Metric export format implementations'
business-context: |
  Provides various export formats for metrics, enabling integration
  with different monitoring systems including Prometheus, JSON APIs,
  CSV for analysis, and text for debugging.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  JsonMetricExporter:
    class-doc:
      description: 'Exports metrics in JSON format'
      business-context: |
        JSON exporter for REST APIs and modern monitoring systems
        that consume structured JSON data.

      custom-tags:
        since: '1.0.0'
        implements: 'MetricExporter'

    methods:
      constructor:
        description: 'Creates JSON metric exporter'
        business-context: 'Initializes JSON formatting options'

        parameters:
          - name: 'options'
            type: 'JsonExporterOptions'
            description: 'Export options'
            optional: true

      export:
        description: 'Exports metrics as JSON'
        business-context: 'Formats metrics for JSON consumers'

        parameters:
          - name: 'metrics'
            type: 'Metric[]'
            description: 'Metrics to export'

        returns:
          type: 'string'
          description: 'JSON formatted metrics'

      getFormat:
        description: 'Returns export format name'
        business-context: 'Identifies exporter type'

        returns:
          type: 'string'
          description: 'Format name "json"'

  PrometheusMetricExporter:
    class-doc:
      description: 'Exports metrics in Prometheus format'
      business-context: |
        Prometheus text exposition format exporter for integration
        with Prometheus monitoring and Grafana dashboards.

      custom-tags:
        since: '1.0.0'
        implements: 'MetricExporter'

    methods:
      constructor:
        description: 'Creates Prometheus metric exporter'
        business-context: 'Initializes Prometheus formatting'

        parameters:
          - name: 'options'
            type: 'PrometheusExporterOptions'
            description: 'Export options'
            optional: true

      export:
        description: 'Exports metrics in Prometheus format'
        business-context: 'Formats metrics for Prometheus scraping'

        parameters:
          - name: 'metrics'
            type: 'Metric[]'
            description: 'Metrics to export'

        returns:
          type: 'string'
          description: 'Prometheus formatted metrics'

      getFormat:
        description: 'Returns export format name'
        business-context: 'Identifies exporter type'

        returns:
          type: 'string'
          description: 'Format name "prometheus"'

      formatGauge:
        description: 'Formats gauge metric'
        business-context: 'Converts gauge to Prometheus format'

        parameters:
          - name: 'metric'
            type: 'Metric'
            description: 'Gauge metric'

        returns:
          type: 'string'
          description: 'Prometheus gauge format'

      formatCounter:
        description: 'Formats counter metric'
        business-context: 'Converts counter to Prometheus format'

        parameters:
          - name: 'metric'
            type: 'Metric'
            description: 'Counter metric'

        returns:
          type: 'string'
          description: 'Prometheus counter format'

      formatHistogram:
        description: 'Formats histogram metric'
        business-context: 'Converts histogram to Prometheus format'

        parameters:
          - name: 'metric'
            type: 'Metric'
            description: 'Histogram metric'

        returns:
          type: 'string'
          description: 'Prometheus histogram format'

  CsvMetricExporter:
    class-doc:
      description: 'Exports metrics in CSV format'
      business-context: |
        CSV exporter for spreadsheet analysis, data warehousing,
        and batch processing of metrics data.

      custom-tags:
        since: '1.0.0'
        implements: 'MetricExporter'

    methods:
      constructor:
        description: 'Creates CSV metric exporter'
        business-context: 'Initializes CSV formatting options'

        parameters:
          - name: 'options'
            type: 'CsvExporterOptions'
            description: 'Export options'
            optional: true

      export:
        description: 'Exports metrics as CSV'
        business-context: 'Formats metrics for spreadsheet analysis'

        parameters:
          - name: 'metrics'
            type: 'Metric[]'
            description: 'Metrics to export'

        returns:
          type: 'string'
          description: 'CSV formatted metrics'

      getFormat:
        description: 'Returns export format name'
        business-context: 'Identifies exporter type'

        returns:
          type: 'string'
          description: 'Format name "csv"'

      formatHeader:
        description: 'Formats CSV header row'
        business-context: 'Creates column headers'

        returns:
          type: 'string'
          description: 'CSV header'

      formatRow:
        description: 'Formats metric as CSV row'
        business-context: 'Converts metric to CSV row'

        parameters:
          - name: 'metric'
            type: 'Metric'
            description: 'Metric to format'

        returns:
          type: 'string'
          description: 'CSV row'

  TextMetricExporter:
    class-doc:
      description: 'Exports metrics in human-readable text'
      business-context: |
        Text exporter for debugging, logging, and human inspection
        of metrics data.

      custom-tags:
        since: '1.0.0'
        implements: 'MetricExporter'

    methods:
      constructor:
        description: 'Creates text metric exporter'
        business-context: 'Initializes text formatting options'

        parameters:
          - name: 'options'
            type: 'TextExporterOptions'
            description: 'Export options'
            optional: true

      export:
        description: 'Exports metrics as text'
        business-context: 'Formats metrics for human reading'

        parameters:
          - name: 'metrics'
            type: 'Metric[]'
            description: 'Metrics to export'

        returns:
          type: 'string'
          description: 'Text formatted metrics'

      getFormat:
        description: 'Returns export format name'
        business-context: 'Identifies exporter type'

        returns:
          type: 'string'
          description: 'Format name "text"'

  CompositeMetricExporter:
    class-doc:
      description: 'Combines multiple exporters'
      business-context: |
        Composite exporter that applies multiple export formats
        simultaneously for multi-system integration.

      custom-tags:
        since: '1.0.0'
        implements: 'MetricExporter'
        pattern: 'Composite Pattern'

    methods:
      constructor:
        description: 'Creates composite exporter'
        business-context: 'Combines multiple export formats'

        parameters:
          - name: 'exporters'
            type: 'MetricExporter[]'
            description: 'Exporters to combine'

      addExporter:
        description: 'Adds an exporter'
        business-context: 'Extends export capabilities'

        parameters:
          - name: 'exporter'
            type: 'MetricExporter'
            description: 'Exporter to add'

      removeExporter:
        description: 'Removes an exporter'
        business-context: 'Reduces export formats'

        parameters:
          - name: 'format'
            type: 'string'
            description: 'Format to remove'

      export:
        description: 'Exports in all formats'
        business-context: 'Applies all configured exporters'

        parameters:
          - name: 'metrics'
            type: 'Metric[]'
            description: 'Metrics to export'

        returns:
          type: 'Record<string, string>'
          description: 'Format-keyed results'

      getFormat:
        description: 'Returns all format names'
        business-context: 'Lists all export formats'

        returns:
          type: 'string'
          description: 'Comma-separated formats'

  MetricExporterFactory:
    class-doc:
      description: 'Factory for creating metric exporters'
      business-context: |
        Creates appropriate exporters based on format requirements,
        simplifying exporter instantiation and configuration.

      custom-tags:
        since: '1.0.0'
        pattern: 'Factory Pattern'

    methods:
      createExporter:
        description: 'Creates exporter by format'
        business-context: 'Instantiates appropriate exporter'

        parameters:
          - name: 'format'
            type: "'json' | 'prometheus' | 'csv' | 'text'"
            description: 'Export format'
          - name: 'options'
            type: 'unknown'
            description: 'Format-specific options'
            optional: true

        returns:
          type: 'MetricExporter'
          description: 'Created exporter'

      createCompositeExporter:
        description: 'Creates composite exporter'
        business-context: 'Creates multi-format exporter'

        parameters:
          - name: 'formats'
            type: 'string[]'
            description: 'Export formats'
          - name: 'options'
            type: 'Record<string, unknown>'
            description: 'Format options'
            optional: true

        returns:
          type: 'CompositeMetricExporter'
          description: 'Composite exporter'

      getSupportedFormats:
        description: 'Gets supported formats'
        business-context: 'Lists available export formats'

        returns:
          type: 'string[]'
          description: 'Supported format names'
