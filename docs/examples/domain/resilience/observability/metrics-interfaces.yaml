# MetricsInterfaces - Observability Contracts

# === FILE METADATA ===
file-name: 'observability/metrics-interfaces'
title: 'MetricsInterfaces - Observability Contracts'
description: 'Interfaces for metrics collection and observability'
business-context: |
  Defines contracts for metrics collection, event monitoring, and observability
  in resilience patterns. Enables monitoring, alerting, and performance analysis
  of resilience mechanisms in production systems.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  MetricType:
    description: 'Types of metrics supported'
    business-context: 'Different metric types for various monitoring scenarios'
    
  MetricValue:
    description: 'Union type for metric values'
    business-context: 'Flexible value type supporting different metric data types'
    
  MetricLabels:
    description: 'Key-value labels for metric tagging'
    business-context: 'Enables metric filtering and grouping in monitoring systems'

# === INTERFACES ===
interfaces:
  Metric:
    description: 'Base metric interface'
    business-context: 'Standard structure for all metric types'
    
    properties:
      - name: 'name'
        type: 'string'
        description: 'Metric identifier'
      - name: 'type'
        type: 'MetricType'
        description: 'Type of metric'
      - name: 'value'
        type: 'MetricValue'
        description: 'Current metric value'
      - name: 'labels'
        type: 'MetricLabels'
        description: 'Metric tags'
        optional: true
      - name: 'timestamp'
        type: 'Date'
        description: 'Metric timestamp'

  HistogramBucket:
    description: 'Histogram bucket definition'
    business-context: 'Defines ranges for histogram metrics'
    
    properties:
      - name: 'upperBound'
        type: 'number'
        description: 'Upper boundary of bucket'
      - name: 'count'
        type: 'number'
        description: 'Count of values in bucket'

  HistogramMetric:
    description: 'Histogram metric for distributions'
    business-context: 'Tracks value distributions for latency and size metrics'
    
    properties:
      - name: 'buckets'
        type: 'HistogramBucket[]'
        description: 'Histogram buckets'
      - name: 'sum'
        type: 'number'
        description: 'Sum of all values'
      - name: 'count'
        type: 'number'
        description: 'Total count'

  TimerMetric:
    description: 'Timer metric for durations'
    business-context: 'Tracks execution times and latencies'
    
    properties:
      - name: 'min'
        type: 'number'
        description: 'Minimum duration'
      - name: 'max'
        type: 'number'
        description: 'Maximum duration'
      - name: 'mean'
        type: 'number'
        description: 'Average duration'
      - name: 'percentiles'
        type: 'Map<number, number>'
        description: 'Percentile values'

  MetricCollector:
    description: 'Interface for collecting metrics'
    business-context: 'Standardized metric collection across resilience patterns'
    
    methods:
      - name: 'collectGauge'
        description: 'Collects gauge metric'
      - name: 'collectCounter'
        description: 'Collects counter metric'
      - name: 'collectHistogram'
        description: 'Collects histogram metric'
      - name: 'collectTimer'
        description: 'Collects timer metric'
      - name: 'getMetrics'
        description: 'Returns all collected metrics'

  MetricRegistry:
    description: 'Registry for metric management'
    business-context: 'Central registry for all application metrics'
    
    methods:
      - name: 'register'
        description: 'Registers new metric'
      - name: 'unregister'
        description: 'Unregisters metric'
      - name: 'get'
        description: 'Gets metric by name'
      - name: 'getAll'
        description: 'Gets all metrics'
      - name: 'clear'
        description: 'Clears all metrics'
      - name: 'export'
        description: 'Exports metrics for monitoring'
      - name: 'addCollector'
        description: 'Adds metric collector'
      - name: 'removeCollector'
        description: 'Removes metric collector'

  MetricExporter:
    description: 'Interface for exporting metrics'
    business-context: 'Exports metrics to monitoring systems'
    
    methods:
      - name: 'export'
        description: 'Exports metrics in specific format'
      - name: 'getFormat'
        description: 'Returns export format name'

  ObservabilityEvent:
    description: 'Event for observability'
    business-context: 'Structured events for monitoring and alerting'
    
    properties:
      - name: 'type'
        type: 'string'
        description: 'Event type'
      - name: 'timestamp'
        type: 'Date'
        description: 'Event timestamp'
      - name: 'source'
        type: 'string'
        description: 'Event source'
      - name: 'data'
        type: 'unknown'
        description: 'Event payload'
      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional metadata'
        optional: true

  ObservabilityEventListener:
    description: 'Listener for observability events'
    business-context: 'Handles observability events for monitoring'
    
    methods:
      - name: 'onEvent'
        description: 'Handles observability event'

  ObservabilityEventBus:
    description: 'Event bus for observability'
    business-context: 'Distributes events to monitoring systems'
    
    methods:
      - name: 'emit'
        description: 'Emits observability event'
      - name: 'subscribe'
        description: 'Subscribes to events'
      - name: 'unsubscribe'
        description: 'Unsubscribes from events'
      - name: 'subscribeAll'
        description: 'Subscribes to all events'
      - name: 'unsubscribeAll'
        description: 'Unsubscribes from all events'
      - name: 'getListeners'
        description: 'Gets event listeners'
      - name: 'getListenerCount'
        description: 'Gets listener count'
      - name: 'removeAllListeners'
        description: 'Removes all listeners'

  ResilienceMetrics:
    description: 'Base resilience metrics'
    business-context: 'Common metrics for all resilience patterns'
    
    properties:
      - name: 'pattern'
        type: 'string'
        description: 'Resilience pattern name'
      - name: 'totalExecutions'
        type: 'number'
        description: 'Total executions'
      - name: 'successCount'
        type: 'number'
        description: 'Successful executions'
      - name: 'failureCount'
        type: 'number'
        description: 'Failed executions'
      - name: 'averageExecutionTime'
        type: 'number'
        description: 'Average execution time'
      - name: 'lastExecutionTime'
        type: 'Date'
        description: 'Last execution timestamp'
        optional: true

  CircuitBreakerMetrics:
    description: 'Circuit breaker specific metrics'
    business-context: 'Metrics for circuit breaker monitoring'
    
    properties:
      - name: 'state'
        type: 'CircuitBreakerState'
        description: 'Current circuit state'
      - name: 'stateTransitions'
        type: 'number'
        description: 'Number of state changes'
      - name: 'openTime'
        type: 'Date'
        description: 'Time when circuit opened'
        optional: true

  RetryMetrics:
    description: 'Retry pattern metrics'
    business-context: 'Metrics for retry pattern monitoring'
    
    properties:
      - name: 'totalRetries'
        type: 'number'
        description: 'Total retry attempts'
      - name: 'averageRetryDelay'
        type: 'number'
        description: 'Average delay between retries'

  BulkheadMetrics:
    description: 'Bulkhead pattern metrics'
    business-context: 'Metrics for bulkhead monitoring'
    
    properties:
      - name: 'activeOperations'
        type: 'number'
        description: 'Currently active operations'
      - name: 'queuedOperations'
        type: 'number'
        description: 'Operations in queue'
      - name: 'rejectedOperations'
        type: 'number'
        description: 'Rejected operations count'
      - name: 'queueUtilization'
        type: 'number'
        description: 'Queue usage percentage'

  TimeoutMetrics:
    description: 'Timeout pattern metrics'
    business-context: 'Metrics for timeout monitoring'
    
    properties:
      - name: 'timedOutOperations'
        type: 'number'
        description: 'Number of timed out operations'
      - name: 'averageTimeout'
        type: 'number'
        description: 'Average timeout duration'
      - name: 'maxTimeout'
        type: 'number'
        description: 'Maximum timeout observed'