# MetricCollectors - Pattern-Specific Metric Collection

# === FILE METADATA ===
file-name: 'observability/metric-collectors'
title: 'MetricCollectors - Pattern Collectors'
description: 'Metric collectors for resilience patterns'
business-context: |
  Specialized metric collectors for each resilience pattern, providing
  detailed monitoring and performance metrics for circuit breakers,
  retry policies, bulkheads, and timeout mechanisms.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseMetricCollector:
    class-doc:
      description: 'Abstract base class for metric collectors'
      business-context: |
        Foundation for all resilience pattern metric collectors,
        providing common functionality for metric collection and aggregation.

      custom-tags:
        since: '1.0.0'
        abstract: true

    methods:
      constructor:
        description: 'Initializes base metric collector'
        business-context: 'Sets up common metric collection infrastructure'
        
        parameters:
          - name: 'name'
            type: 'string'
            description: 'Collector name'
          - name: 'labels'
            type: 'MetricLabels'
            description: 'Default labels'
            optional: true

      collectGauge:
        description: 'Collects gauge metric'
        business-context: 'Records current value metrics'
        
        parameters:
          - name: 'name'
            type: 'string'
            description: 'Metric name'
          - name: 'value'
            type: 'number'
            description: 'Current value'
          - name: 'labels'
            type: 'MetricLabels'
            description: 'Additional labels'
            optional: true

      collectCounter:
        description: 'Collects counter metric'
        business-context: 'Records cumulative count metrics'
        
        parameters:
          - name: 'name'
            type: 'string'
            description: 'Metric name'
          - name: 'increment'
            type: 'number'
            description: 'Increment value'
          - name: 'labels'
            type: 'MetricLabels'
            description: 'Additional labels'
            optional: true

      collectHistogram:
        description: 'Collects histogram metric'
        business-context: 'Records distribution metrics'
        
        parameters:
          - name: 'name'
            type: 'string'
            description: 'Metric name'
          - name: 'value'
            type: 'number'
            description: 'Sample value'
          - name: 'labels'
            type: 'MetricLabels'
            description: 'Additional labels'
            optional: true

      collectTimer:
        description: 'Collects timer metric'
        business-context: 'Records duration metrics'
        
        parameters:
          - name: 'name'
            type: 'string'
            description: 'Metric name'
          - name: 'duration'
            type: 'number'
            description: 'Duration in milliseconds'
          - name: 'labels'
            type: 'MetricLabels'
            description: 'Additional labels'
            optional: true

      getMetrics:
        description: 'Gets all collected metrics'
        business-context: 'Retrieves metrics for export'
        
        returns:
          type: 'Metric[]'
          description: 'Collected metrics'

      reset:
        description: 'Resets all metrics'
        business-context: 'Clears collected metrics'

  CircuitBreakerMetricCollector:
    class-doc:
      description: 'Metric collector for circuit breaker pattern'
      business-context: |
        Specialized collector for circuit breaker metrics including
        state transitions, failure rates, and recovery times.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseMetricCollector'

    methods:
      constructor:
        description: 'Creates circuit breaker metric collector'
        business-context: 'Initializes circuit breaker specific metrics'
        
        parameters:
          - name: 'circuitName'
            type: 'string'
            description: 'Circuit breaker name'

      collectStateChange:
        description: 'Records state transition'
        business-context: 'Tracks circuit state changes for monitoring'
        
        parameters:
          - name: 'fromState'
            type: 'CircuitBreakerState'
            description: 'Previous state'
          - name: 'toState'
            type: 'CircuitBreakerState'
            description: 'New state'

      collectFailure:
        description: 'Records operation failure'
        business-context: 'Tracks failures for threshold monitoring'
        
        parameters:
          - name: 'error'
            type: 'Error'
            description: 'Failure error'
          - name: 'duration'
            type: 'number'
            description: 'Operation duration'
            optional: true

      collectSuccess:
        description: 'Records operation success'
        business-context: 'Tracks successes for recovery monitoring'
        
        parameters:
          - name: 'duration'
            type: 'number'
            description: 'Operation duration'

      getCircuitBreakerMetrics:
        description: 'Gets circuit breaker specific metrics'
        business-context: 'Provides circuit breaker health metrics'
        
        returns:
          type: 'CircuitBreakerMetrics'
          description: 'Circuit breaker metrics'

  RetryMetricCollector:
    class-doc:
      description: 'Metric collector for retry pattern'
      business-context: |
        Collects retry pattern metrics including attempt counts,
        delay distributions, and success rates per attempt.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseMetricCollector'

    methods:
      constructor:
        description: 'Creates retry metric collector'
        business-context: 'Initializes retry pattern metrics'
        
        parameters:
          - name: 'operationName'
            type: 'string'
            description: 'Operation name'

      collectAttempt:
        description: 'Records retry attempt'
        business-context: 'Tracks individual retry attempts'
        
        parameters:
          - name: 'attemptNumber'
            type: 'number'
            description: 'Attempt sequence number'
          - name: 'delay'
            type: 'number'
            description: 'Delay before attempt'
          - name: 'duration'
            type: 'number'
            description: 'Attempt duration'
          - name: 'success'
            type: 'boolean'
            description: 'Whether attempt succeeded'

      collectExhaustion:
        description: 'Records retry exhaustion'
        business-context: 'Tracks when all retries are exhausted'
        
        parameters:
          - name: 'totalAttempts'
            type: 'number'
            description: 'Total attempts made'
          - name: 'totalDelay'
            type: 'number'
            description: 'Total delay across attempts'

      getRetryMetrics:
        description: 'Gets retry specific metrics'
        business-context: 'Provides retry pattern health metrics'
        
        returns:
          type: 'RetryMetrics'
          description: 'Retry metrics'

  BulkheadMetricCollector:
    class-doc:
      description: 'Metric collector for bulkhead pattern'
      business-context: |
        Tracks bulkhead utilization, queue depths, rejection rates,
        and resource isolation effectiveness.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseMetricCollector'

    methods:
      constructor:
        description: 'Creates bulkhead metric collector'
        business-context: 'Initializes bulkhead pattern metrics'
        
        parameters:
          - name: 'bulkheadName'
            type: 'string'
            description: 'Bulkhead name'
          - name: 'maxConcurrency'
            type: 'number'
            description: 'Maximum concurrency'
          - name: 'queueCapacity'
            type: 'number'
            description: 'Queue capacity'

      collectExecution:
        description: 'Records operation execution'
        business-context: 'Tracks bulkhead resource usage'
        
        parameters:
          - name: 'duration'
            type: 'number'
            description: 'Execution duration'
          - name: 'queueTime'
            type: 'number'
            description: 'Time spent in queue'
            optional: true

      collectRejection:
        description: 'Records operation rejection'
        business-context: 'Tracks resource exhaustion'
        
        parameters:
          - name: 'reason'
            type: "'QUEUE_FULL' | 'MAX_CONCURRENCY'"
            description: 'Rejection reason'

      collectQueueOperation:
        description: 'Records queue operation'
        business-context: 'Tracks queue dynamics'
        
        parameters:
          - name: 'operation'
            type: "'ENQUEUE' | 'DEQUEUE'"
            description: 'Queue operation'
          - name: 'queueLength'
            type: 'number'
            description: 'Current queue length'

      getBulkheadMetrics:
        description: 'Gets bulkhead specific metrics'
        business-context: 'Provides bulkhead health metrics'
        
        returns:
          type: 'BulkheadMetrics'
          description: 'Bulkhead metrics'

  TimeoutMetricCollector:
    class-doc:
      description: 'Metric collector for timeout pattern'
      business-context: |
        Monitors timeout occurrences, duration distributions,
        and cancellation effectiveness for timeout protection.

      custom-tags:
        since: '1.0.0'
        extends: 'BaseMetricCollector'

    methods:
      constructor:
        description: 'Creates timeout metric collector'
        business-context: 'Initializes timeout pattern metrics'
        
        parameters:
          - name: 'operationName'
            type: 'string'
            description: 'Operation name'
          - name: 'timeoutMs'
            type: 'number'
            description: 'Timeout duration'

      collectTimeout:
        description: 'Records timeout occurrence'
        business-context: 'Tracks timeout events'
        
        parameters:
          - name: 'duration'
            type: 'number'
            description: 'Duration before timeout'

      collectCompletion:
        description: 'Records successful completion'
        business-context: 'Tracks operations completing within timeout'
        
        parameters:
          - name: 'duration'
            type: 'number'
            description: 'Completion duration'

      collectCancellation:
        description: 'Records operation cancellation'
        business-context: 'Tracks manual cancellations'
        
        parameters:
          - name: 'duration'
            type: 'number'
            description: 'Duration before cancellation'

      getTimeoutMetrics:
        description: 'Gets timeout specific metrics'
        business-context: 'Provides timeout pattern health metrics'
        
        returns:
          type: 'TimeoutMetrics'
          description: 'Timeout metrics'