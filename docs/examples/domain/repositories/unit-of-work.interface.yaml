# IUnitOfWork Interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: "unit-of-work.interface"
title: "Unit of Work Interface Contract"
description: "Unit of Work pattern interface for transaction management"
business-context: "Defines the contract for transactional operations across multiple repositories"

# === HIERARCHY ===
hierarchy:
  strategy: "merge"
  scope: "file"

# === INTERFACES ===
interfaces:
  IUnitOfWork:
    # Interface Documentation
    description: "Unit of Work pattern interface for transaction management and event coordination"
    business-context: "Manages transactional boundaries across multiple repositories with domain event coordination"
    
    # Format-specific
    formats:
      jsdoc:
        description: "Unit of Work interface for transactional repository operations"
      cli:
        description: |
          ## IUnitOfWork
          
          Unit of Work pattern providing:
          - Transaction management
          - Repository coordination
          - Domain event publishing
          - ACID compliance
    
    # Methods
    methods:
      begin:
        description: "Begins a new transaction"
        business-context: "Starts a transactional boundary for coordinated repository operations"
        
        returns:
          type: "Promise<void>"
          description: "A promise that resolves when the transaction has started"
          
        throws:
          - type: "Error"
            description: "If a transaction is already in progress or cannot be started"
            
        examples:
          - id: "begin-transaction"
            code: |
              const unitOfWork: IUnitOfWork = new UnitOfWork();
              
              try {
                await unitOfWork.begin();
                console.log('Transaction started successfully');
              } catch (error) {
                console.error('Failed to begin transaction:', error.message);
              }
              
        custom-tags:
          async: "true"
          transaction: "required"
          idempotent: "false"
          
      commit:
        description: "Commits the current transaction and publishes collected domain events"
        business-context: "Persists all changes within the transaction and publishes domain events atomically"
        
        returns:
          type: "Promise<void>"
          description: "A promise that resolves when the transaction is committed successfully"
          
        throws:
          - type: "Error"
            description: "If no transaction is in progress or the commit fails"
            
        examples:
          - id: "commit-transaction"
            code: |
              await unitOfWork.begin();
              
              // Perform operations using repositories
              const userRepo = unitOfWork.getRepository<UserRepository>('user');
              const orderRepo = unitOfWork.getRepository<OrderRepository>('order');
              
              await userRepo.save(user);
              await orderRepo.save(order);
              
              // Commit atomically with event publishing
              await unitOfWork.commit();
              console.log('Transaction committed and events published');
              
        custom-tags:
          async: "true"
          transaction: "required"
          event-publishing: "automatic"
          atomic: "true"
          
      rollback:
        description: "Rolls back the current transaction, discarding all changes"
        business-context: "Ensures data consistency by reverting changes when errors occur"
        
        returns:
          type: "Promise<void>"
          description: "A promise that resolves when the transaction is rolled back"
          
        throws:
          - type: "Error"
            description: "If no transaction is in progress or the rollback fails"
            
        examples:
          - id: "rollback-transaction"
            code: |
              await unitOfWork.begin();
              
              try {
                await userRepo.save(user);
                await orderRepo.save(order);
                await unitOfWork.commit();
              } catch (error) {
                console.error('Transaction failed, rolling back:', error.message);
                await unitOfWork.rollback();
              }
              
        custom-tags:
          async: "true"
          transaction: "required"
          recovery: "automatic"
          safe: "true"
          
      getRepository:
        description: "Retrieves a repository registered with this Unit of Work"
        business-context: "Provides access to transactional repositories participating in the current transaction"
        
        parameters:
          - name: "name"
            type: "string"
            description: "The name of the repository to retrieve"
            
        returns:
          type: "T"
          description: "The repository instance"
          
        throws:
          - type: "Error"
            description: "If the repository with the specified name is not registered"
            
        examples:
          - id: "get-repository"
            code: |
              const unitOfWork: IUnitOfWork = new UnitOfWork();
              
              // Register repositories first
              unitOfWork.registerRepository('user', new UserRepository());
              unitOfWork.registerRepository('order', new OrderRepository());
              
              // Get registered repositories
              const userRepo = unitOfWork.getRepository<UserRepository>('user');
              const orderRepo = unitOfWork.getRepository<OrderRepository>('order');
              
              // Both repositories share the same transaction
              await unitOfWork.begin();
              await userRepo.save(user);
              await orderRepo.save(order);
              await unitOfWork.commit();
              
        custom-tags:
          generic: "true"
          transaction-aware: "true"
          registration-required: "true"
          
      registerRepository:
        description: "Registers a repository with this Unit of Work"
        business-context: "Enables repositories to participate in the transactional boundary"
        
        parameters:
          - name: "name"
            type: "string"
            description: "The name to register the repository under"
          - name: "repository"
            type: "T"
            description: "The repository instance to register"
            
        returns:
          type: "void"
          description: "No return value"
          
        examples:
          - id: "register-repository"
            code: |
              const unitOfWork: IUnitOfWork = new UnitOfWork();
              const userRepository = new UserRepository();
              const orderRepository = new OrderRepository();
              
              // Register repositories to participate in transactions
              unitOfWork.registerRepository('user', userRepository);
              unitOfWork.registerRepository('order', orderRepository);
              
              console.log('Repositories registered with Unit of Work');
              
        custom-tags:
          generic: "true"
          registration: "required"
          void-return: "true"
          
      getEventBus:
        description: "Gets the domain event bus associated with this Unit of Work"
        business-context: "Provides access to event bus that coordinates event publishing with transaction commits"
        
        returns:
          type: "IEventBus"
          description: "The event bus instance"
          
        examples:
          - id: "get-event-bus"
            code: |
              const unitOfWork: IUnitOfWork = new UnitOfWork();
              const eventBus = unitOfWork.getEventBus();
              
              // Events published through this bus will be dispatched
              // only after successful transaction commit
              await unitOfWork.begin();
              
              // Business operations...
              user.updateProfile({ name: 'John Doe' });
              
              // Events are queued but not yet published
              eventBus.publish(new UserProfileUpdatedEvent(user));
              
              // Events are published atomically with commit
              await unitOfWork.commit();
              
        custom-tags:
          event-coordination: "true"
          transaction-aware: "true"
          deferred-publishing: "true"

# === TRANSACTION PATTERNS ===
transaction-patterns:
  complete-workflow:
    description: "Complete transactional workflow with multiple repositories"
    example: |
      const unitOfWork: IUnitOfWork = new UnitOfWork();
      
      // Setup
      unitOfWork.registerRepository('user', new UserRepository());
      unitOfWork.registerRepository('order', new OrderRepository());
      
      try {
        await unitOfWork.begin();
        
        const userRepo = unitOfWork.getRepository<UserRepository>('user');
        const orderRepo = unitOfWork.getRepository<OrderRepository>('order');
        
        await userRepo.save(user);
        await orderRepo.save(order);
        
        await unitOfWork.commit();
        console.log('Transaction completed successfully');
      } catch (error) {
        await unitOfWork.rollback();
        console.error('Transaction failed and rolled back:', error.message);
      }

# === USAGE NOTES ===
usage-notes:
  - "Always call begin() before performing transactional operations"
  - "Use commit() to persist changes and publish domain events atomically"
  - "Use rollback() in error scenarios to maintain data consistency"
  - "Register repositories before using them in transactions"
  - "Events published through getEventBus() are deferred until commit"
  - "All registered repositories share the same transactional boundary"