# Repository Interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'base-repository.interface'
title: 'Repository Interface Contracts'
description: 'Core repository interface contracts for aggregate persistence'
business-context: 'Defines the fundamental contracts for repository patterns in DDD'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IRepository:
    # Interface Documentation
    description: 'Generic repository interface for aggregate persistence'
    business-context: 'Fundamental repository contract defining basic CRUD operations for aggregates'

    # Format-specific
    formats:
      jsdoc:
        description: 'Generic repository interface with optional CRUD operations'
      cli:
        description: |
          ## IRepository<T>

          Core repository interface providing:
          - Generic aggregate type support
          - Optional CRUD operations
          - Flexible implementation contract

    # Methods
    methods:
      findById:
        description: 'Find an aggregate by its identifier'
        business-context: 'Retrieves aggregate from storage using its unique identifier'
        strategy: 'replace'
        custom-tags:
          test: 'This is a test tag with replace strategy'

        parameters:
          - name: 'id'
            type: 'unknown'
            description: 'The aggregate identifier'

        returns:
          type: 'Promise<T | null>'
          description: 'The aggregate if found, null otherwise'

        examples:
          - id: 'basic-find'
            code: |
              const repository: IRepository<UserAggregate> = new UserRepository();
              const user = await repository.findById('user-123');
              if (user) {
                console.log('User found:', user.getId());
              }

      save:
        description: 'Save an aggregate (create or update)'
        business-context: 'Persists aggregate changes to storage with transaction safety'

        parameters:
          - name: 'aggregate'
            type: 'T'
            description: 'The aggregate to save'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when save is complete'

        examples:
          - id: 'basic-save'
            code: |
              const user = new UserAggregate('user-123');
              user.updateProfile({ name: 'John Doe' });
              await repository.save(user);

        custom-tags:
          required: 'true'
          async: 'true'
          transaction: 'recommended'

      delete:
        description: 'Delete an aggregate'
        business-context: 'Removes aggregate from storage with proper cleanup'

        parameters:
          - name: 'aggregate'
            type: 'T'
            description: 'The aggregate to delete'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when deletion is complete'

        examples:
          - id: 'basic-delete'
            code: |
              const user = await repository.findById('user-123');
              if (user) {
                await repository.delete(user);
              }

        custom-tags:
          optional: 'true'
          async: 'true'
          destructive: 'true'

  IRepositoryProvider:
    description: 'Provider for repository dependency injection'
    business-context: 'Service locator pattern for retrieving typed repository instances'

    formats:
      jsdoc:
        description: 'Provider interface for repository dependency injection'
      cli:
        description: |
          ## IRepositoryProvider

          Repository provider for:
          - Service locator pattern
          - Dependency injection support
          - Runtime repository resolution

    methods:
      getRepository:
        description: 'Get a repository instance by name'
        business-context: 'Resolves repository instances for dependency injection scenarios'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'The repository name to resolve'

        returns:
          type: 'T | undefined'
          description: 'The repository instance if found, undefined otherwise'

        examples:
          - id: 'provider-usage'
            code: |
              const provider: IRepositoryProvider = new RepositoryProvider();
              const userRepo = provider.getRepository<UserRepository>('user');
              if (userRepo) {
                const user = await userRepo.findById('user-123');
              }

        custom-tags:
          generic: 'true'
          resolution: 'runtime'

  IExtendedRepository:
    description: 'Extended repository with additional query capabilities'
    business-context: 'Enhanced repository contract with specification pattern support'

    formats:
      jsdoc:
        description: 'Extended repository with specification-based queries'
      cli:
        description: |
          ## IExtendedRepository<T>

          Extended repository providing:
          - Specification pattern support
          - Existence checking
          - Advanced query capabilities
          - Full CRUD inheritance

    methods:
      exists:
        description: 'Check if an aggregate exists'
        business-context: 'Efficient existence check without loading full aggregate'

        parameters:
          - name: 'id'
            type: 'unknown'
            description: 'The aggregate identifier'

        returns:
          type: 'Promise<boolean>'
          description: 'True if the aggregate exists'

        examples:
          - id: 'existence-check'
            code: |
              const exists = await repository.exists('user-123');
              if (exists) {
                console.log('User exists in storage');
              }

        custom-tags:
          required: 'true'
          async: 'true'
          performance: 'optimized'

      findBySpecification:
        description: 'Find aggregates matching a given specification'
        business-context: 'Query aggregates using specification pattern for complex filtering'

        parameters:
          - name: 'spec'
            type: 'unknown'
            description: 'The specification to match'

        returns:
          type: 'Promise<T[]>'
          description: 'Matching aggregates'

        examples:
          - id: 'spec-query'
            code: |
              const activeUsersSpec = new ActiveUsersSpecification();
              const activeUsers = await repository.findBySpecification(activeUsersSpec);
              console.log(`Found ${activeUsers.length} active users`);

        custom-tags:
          optional: 'true'
          async: 'true'
          pattern: 'specification-pattern'

      findOneBySpecification:
        description: 'Find a single aggregate matching a specification'
        business-context: 'Query single aggregate using specification pattern'

        parameters:
          - name: 'spec'
            type: 'unknown'
            description: 'The specification to match'

        returns:
          type: 'Promise<T | null>'
          description: 'The matching aggregate or null'

        examples:
          - id: 'single-spec-query'
            code: |
              const adminSpec = new AdminUserSpecification();
              const admin = await repository.findOneBySpecification(adminSpec);
              if (admin) {
                console.log('Admin user found:', admin.getId());
              }

        custom-tags:
          optional: 'true'
          async: 'true'
          pattern: 'specification-pattern'

# === INHERITANCE CHAIN ===
inheritance:
  IExtendedRepository:
    extends: 'IRepository<T>'
    description: 'IExtendedRepository inherits all methods from IRepository'

# === USAGE NOTES ===
usage-notes:
  - 'IRepository provides basic CRUD operations with optional methods'
  - 'IExtendedRepository adds specification pattern support'
  - 'IRepositoryProvider enables dependency injection scenarios'
  - 'All repository operations should be transaction-safe'
  - 'Use specification pattern for complex queries in IExtendedRepository'
