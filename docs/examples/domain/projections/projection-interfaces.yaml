# projection-interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'projection-interfaces'
title: 'Projection Interfaces - Contracts and Types'
description: 'Core interfaces and types for projection system'
business-context: 'Defines contracts for projections, stores, capabilities, and error handling'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IProjection:
    description: 'Core contract for event projections'
    business-context: 'Defines how events are transformed into read models'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Unique projection identifier'
        readonly: true

      - name: 'eventTypes'
        type: 'string[]'
        description: 'Event types handled by projection'
        readonly: true

    methods:
      - name: 'createInitialState'
        description: 'Creates initial read model state'
        returns: 'TReadModel | Promise<TReadModel>'

      - name: 'apply'
        description: 'Applies event to transform state'
        parameters:
          - 'readModel: TReadModel'
          - 'event: IExtendedDomainEvent'
        returns: 'TReadModel | Promise<TReadModel>'

      - name: 'handles'
        description: 'Checks if projection handles event type'
        parameters:
          - 'eventType: string'
        returns: 'boolean'

    examples:
      - id: 'implementation'
        code: |
          class UserProjection implements IProjection<UserReadModel> {
            readonly name = 'user-projection';
            readonly eventTypes = ['UserCreated', 'UserUpdated', 'UserDeleted'];
            
            createInitialState(): UserReadModel {
              return { users: new Map(), count: 0 };
            }
            
            apply(state: UserReadModel, event: IExtendedDomainEvent): UserReadModel {
              // Transform state based on event
              return newState;
            }
            
            handles(eventType: string): boolean {
              return this.eventTypes.includes(eventType);
            }
          }

  IProjectionStore:
    description: 'Contract for projection state persistence'
    business-context: 'Manages storage and retrieval of read model states'

    methods:
      - name: 'load'
        description: 'Loads projection state'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<TReadModel | null>'

      - name: 'save'
        description: 'Saves projection state'
        parameters:
          - 'projectionName: string'
          - 'state: TReadModel'
        returns: 'Promise<void>'

      - name: 'delete'
        description: 'Deletes projection state'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<void>'

      - name: 'deleteAll'
        description: 'Deletes all projection states'
        returns: 'Promise<void>'

      - name: 'exists'
        description: 'Checks if projection exists'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<boolean>'

    examples:
      - id: 'implementation'
        code: |
          class MongoProjectionStore<T> implements IProjectionStore<T> {
            async load(projectionName: string): Promise<T | null> {
              const doc = await this.collection.findOne({ _id: projectionName });
              return doc?.state || null;
            }
            
            async save(projectionName: string, state: T): Promise<void> {
              await this.collection.replaceOne(
                { _id: projectionName },
                { _id: projectionName, state, updatedAt: new Date() },
                { upsert: true }
              );
            }
          }

  IProjectionEngine:
    description: 'Contract for projection execution engine'
    business-context: 'Orchestrates event processing and state management'

    methods:
      - name: 'getProjectionName'
        description: 'Returns projection name'
        returns: 'string'

      - name: 'getEventTypes'
        description: 'Returns handled event types'
        returns: 'string[]'

      - name: 'processEvent'
        description: 'Processes single event'
        parameters:
          - 'event: IExtendedDomainEvent'
        returns: 'Promise<void>'

      - name: 'isInterestedIn'
        description: 'Checks if engine handles event'
        parameters:
          - 'event: IExtendedDomainEvent'
        returns: 'boolean'

      - name: 'getState'
        description: 'Retrieves current state'
        returns: 'Promise<TReadModel | null>'

      - name: 'reset'
        description: 'Resets projection state'
        returns: 'Promise<void>'

      - name: 'addCapability'
        description: 'Adds capability to engine'
        parameters:
          - 'capability: T extends Capability & IProjectionCapability'
        returns: 'this'

      - name: 'getCapability'
        description: 'Retrieves capability by type'
        parameters:
          - 'CapabilityClass: CapabilityConstructor<T>'
        returns: 'T | undefined'

      - name: 'hasCapability'
        description: 'Checks for capability'
        parameters:
          - 'CapabilityClass: CapabilityConstructor<T>'
        returns: 'boolean'

      - name: 'removeCapability'
        description: 'Removes capability'
        parameters:
          - 'CapabilityClass: CapabilityConstructor<T>'
        returns: 'this'

  IProjectionLifecycleCapability:
    description: 'Contract for projection lifecycle hooks'
    business-context: 'Enables cross-cutting concerns via lifecycle events'

    methods:
      - name: 'onBeforeApply'
        description: 'Hook before applying event'
        parameters:
          - 'state: TReadModel'
          - 'event: IExtendedDomainEvent'
        returns: 'Promise<void> | void'
        optional: true

      - name: 'onAfterApply'
        description: 'Hook after applying event'
        parameters:
          - 'state: TReadModel'
          - 'event: IExtendedDomainEvent'
        returns: 'Promise<void> | void'
        optional: true

      - name: 'onError'
        description: 'Hook on processing error'
        parameters:
          - 'error: ProjectionError'
          - 'event?: IExtendedDomainEvent'
        returns: 'Promise<void> | void'
        optional: true

  ICheckpointProjectionCapability:
    description: 'Contract for checkpoint capability'
    business-context: 'Enables incremental projection rebuilding'
    extends: 'IProjectionLifecycleCapability<TReadModel>'

    methods:
      - name: 'saveCheckpoint'
        description: 'Saves projection checkpoint'
        parameters:
          - 'state: TReadModel'
          - 'position: number'
        returns: 'Promise<void>'

      - name: 'loadCheckpoint'
        description: 'Loads last checkpoint'
        returns: 'Promise<{ state: TReadModel; position: number } | null>'

  ISnapshotProjectionCapability:
    description: 'Contract for snapshot capability'
    business-context: 'Optimizes projection recovery with snapshots'
    extends: 'IProjectionLifecycleCapability<TReadModel>'

    methods:
      - name: 'createSnapshot'
        description: 'Creates projection snapshot'
        parameters:
          - 'state: TReadModel'
          - 'position: number'
        returns: 'Promise<void>'

      - name: 'loadLatestSnapshot'
        description: 'Loads most recent snapshot'
        returns: 'Promise<{ state: TReadModel; position: number } | null>'

  IProjectionCheckpoint:
    description: 'Checkpoint data structure'
    business-context: 'Stores projection state at specific position'

    properties:
      - name: 'projectionName'
        type: 'string'
        description: 'Projection identifier'

      - name: 'position'
        type: 'number'
        description: 'Event stream position'

      - name: 'state'
        type: 'TState'
        description: 'Projection state at checkpoint'

      - name: 'timestamp'
        type: 'Date'
        description: 'Checkpoint creation time'

      - name: 'eventCount'
        type: 'number'
        description: 'Events processed count'
        optional: true

      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional checkpoint metadata'
        optional: true

  IProjectionCheckpointStore:
    description: 'Contract for checkpoint persistence'
    business-context: 'Manages checkpoint storage and retrieval'

    methods:
      - name: 'save'
        description: 'Saves checkpoint'
        parameters:
          - 'projectionName: string'
          - "checkpoint: Omit<IProjectionCheckpoint<TState>, 'projectionName'>"
        returns: 'Promise<void>'

      - name: 'load'
        description: 'Loads checkpoint'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<IProjectionCheckpoint<TState> | null>'

      - name: 'delete'
        description: 'Deletes checkpoint'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<void>'

  IProjectionSnapshot:
    description: 'Snapshot data structure'
    business-context: 'Complete projection state for recovery'

    properties:
      - name: 'projectionName'
        type: 'string'
        description: 'Projection identifier'

      - name: 'position'
        type: 'number'
        description: 'Event stream position'

      - name: 'state'
        type: 'TState'
        description: 'Complete projection state'

      - name: 'timestamp'
        type: 'Date'
        description: 'Snapshot creation time'

      - name: 'version'
        type: 'number'
        description: 'Snapshot version'
        optional: true

      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional snapshot metadata'
        optional: true

  IProjectionSnapshotStore:
    description: 'Contract for snapshot persistence'
    business-context: 'Manages snapshot storage with versioning'

    methods:
      - name: 'save'
        description: 'Saves snapshot'
        parameters:
          - 'projectionName: string'
          - "snapshot: Omit<IProjectionSnapshot<TState>, 'projectionName'>"
        returns: 'Promise<void>'

      - name: 'load'
        description: 'Loads specific snapshot'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<IProjectionSnapshot<TState> | null>'

      - name: 'loadLatest'
        description: 'Loads most recent snapshot'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<IProjectionSnapshot<TState> | null>'

      - name: 'delete'
        description: 'Deletes snapshot'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<void>'

      - name: 'deleteOlderThan'
        description: 'Deletes old snapshots'
        parameters:
          - 'projectionName: string'
          - 'date: Date'
        returns: 'Promise<number>'

  IProjectionBuilder:
    description: 'Contract for fluent projection builder'
    business-context: 'Configures projections with capabilities'

    methods:
      - name: 'withCheckpoints'
        description: 'Adds checkpoint capability'
        parameters:
          - 'store: IProjectionCheckpointStore'
          - 'options?: CheckpointProjectionOptions'
        returns: 'this'

      - name: 'withSnapshots'
        description: 'Adds snapshot capability'
        parameters:
          - 'store: IProjectionSnapshotStore'
          - 'options?: SnapshotProjectionOptions'
        returns: 'this'

      - name: 'withCustomCapability'
        description: 'Adds custom capability'
        parameters:
          - 'capability: T extends Capability & IProjectionCapability'
        returns: 'this'

      - name: 'build'
        description: 'Builds configured engine'
        returns: 'IProjectionEngine<TReadModel>'

  CheckpointProjectionOptions:
    description: 'Checkpoint configuration options'
    business-context: 'Controls checkpoint behavior'

    properties:
      - name: 'interval'
        type: 'number'
        description: 'Events between checkpoints'
        optional: true

      - name: 'saveOnRebuildComplete'
        type: 'boolean'
        description: 'Save checkpoint after rebuild'
        optional: true

  SnapshotProjectionOptions:
    description: 'Snapshot configuration options'
    business-context: 'Controls snapshot behavior'

    properties:
      - name: 'interval'
        type: 'number'
        description: 'Events between snapshots'
        optional: true

      - name: 'maxSnapshots'
        type: 'number'
        description: 'Maximum snapshots to retain'
        optional: true

      - name: 'compressState'
        type: '(state: unknown) => unknown'
        description: 'State compression function'
        optional: true

      - name: 'decompressState'
        type: '(compressed: unknown) => unknown'
        description: 'State decompression function'
        optional: true

  IProjectionRetryConfig:
    description: 'Retry configuration for resilience'
    business-context: 'Defines retry behavior for transient failures'

    properties:
      - name: 'maxAttempts'
        type: 'number'
        description: 'Maximum retry attempts'

      - name: 'baseDelayMs'
        type: 'number'
        description: 'Initial retry delay'

      - name: 'maxDelayMs'
        type: 'number'
        description: 'Maximum retry delay'

      - name: 'backoffMultiplier'
        type: 'number'
        description: 'Delay multiplication factor'

      - name: 'retryableErrors'
        type: 'string[]'
        description: 'Error codes to retry'

      - name: 'nonRetryableErrors'
        type: 'string[]'
        description: 'Error codes to not retry'

  IProjectionErrorStrategy:
    description: 'Contract for error handling strategy'
    business-context: 'Determines how to handle projection errors'

    methods:
      - name: 'shouldRetry'
        description: 'Determines if error should be retried'
        parameters:
          - 'error: Error'
          - 'attempt: number'
          - 'config?: IProjectionRetryConfig'
        returns: 'boolean'

      - name: 'getRetryDelay'
        description: 'Calculates retry delay'
        parameters:
          - 'attempt: number'
          - 'config: IProjectionRetryConfig'
        returns: 'number'

      - name: 'getDelay'
        description: 'Alternative delay calculation'
        parameters:
          - 'attempt: number'
          - 'config?: IProjectionRetryConfig'
        returns: 'number'
        optional: true

      - name: 'isRetryableError'
        description: 'Checks if error is retryable'
        parameters:
          - 'error: Error'
          - 'config: IProjectionRetryConfig'
        returns: 'boolean'

  IDeadLetterStore:
    description: 'Contract for dead letter persistence'
    business-context: 'Stores events that failed processing'

    methods:
      - name: 'store'
        description: 'Stores dead letter'
        parameters:
          - 'deadLetter: IDeadLetter'
        returns: 'Promise<void>'

      - name: 'getByProjection'
        description: 'Gets dead letters for projection'
        parameters:
          - 'projectionName: string'
        returns: 'Promise<IDeadLetter[]>'

      - name: 'retry'
        description: 'Retrieves event for retry'
        parameters:
          - 'deadLetterId: string'
        returns: 'Promise<IExtendedDomainEvent>'

      - name: 'delete'
        description: 'Deletes dead letter'
        parameters:
          - 'deadLetterId: string'
        returns: 'Promise<void>'

  IDeadLetter:
    description: 'Dead letter data structure'
    business-context: 'Failed event with error context'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Dead letter identifier'

      - name: 'projectionName'
        type: 'string'
        description: 'Failed projection name'

      - name: 'event'
        type: 'IExtendedDomainEvent'
        description: 'Event that failed'

      - name: 'error'
        type: 'Error'
        description: 'Processing error'

      - name: 'attemptCount'
        type: 'number'
        description: 'Processing attempts'

      - name: 'firstFailedAt'
        type: 'Date'
        description: 'First failure time'

      - name: 'lastFailedAt'
        type: 'Date'
        description: 'Last failure time'

      - name: 'metadata'
        type: 'Record<string, any>'
        description: 'Additional context'
        optional: true

  ICircuitBreakerConfig:
    description: 'Circuit breaker configuration'
    business-context: 'Prevents cascading failures'

    properties:
      - name: 'failureThreshold'
        type: 'number'
        description: 'Failures before opening'

      - name: 'recoveryTimeoutMs'
        type: 'number'
        description: 'Time before half-open'

      - name: 'halfOpenMaxAttempts'
        type: 'number'
        description: 'Tests in half-open state'

  ErrorProjectionState:
    description: 'Error tracking state structure'
    business-context: 'Monitors projection health'

    properties:
      - name: 'totalErrors'
        type: 'number'
        description: 'Total error count'

      - name: 'errorsByProjection'
        type: 'Map<string, number>'
        description: 'Errors per projection'

      - name: 'errorsByType'
        type: 'Map<string, number>'
        description: 'Errors by type'

      - name: 'recentErrors'
        type: 'Array<{ projectionName: string; eventType: string; error: string; timestamp: Date }>'
        description: 'Recent error details'

# === ENUMS ===
enums:
  CircuitState:
    description: 'Circuit breaker states'
    business-context: 'Tracks circuit breaker status'

    values:
      - name: 'CLOSED'
        value: "'CLOSED'"
        description: 'Normal operation'

      - name: 'OPEN'
        value: "'OPEN'"
        description: 'Failing, rejecting requests'

      - name: 'HALF_OPEN'
        value: "'HALF_OPEN'"
        description: 'Testing recovery'
