# error-strategy - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'error-strategy'
title: 'Error Strategy - Error Handling Strategies'
description: 'Strategies for handling projection errors'
business-context: 'Defines how projections recover from failures'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ExponentialBackoffStrategy:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Exponential backoff retry strategy for errors'
      business-context: 'Prevents overwhelming system with retries'

      formats:
        jsdoc:
          description: 'Exponential backoff error recovery strategy'
        cli:
          description: |
            ## ExponentialBackoffStrategy

            Retry features:
            - Exponential delay increase
            - Jitter support
            - Max delay limits
            - Configurable multiplier

      custom-tags:
        since: '1.0.0'
        implements: 'IProjectionErrorStrategy'

    # Methods
    methods:
      constructor:
        description: 'Creates exponential backoff strategy'
        business-context: 'Initializes retry configuration'

        parameters:
          - name: 'config'
            type: 'IExponentialBackoffConfig'
            description: 'Strategy configuration'
            optional: true

        examples:
          - id: 'setup'
            code: |
              const strategy = new ExponentialBackoffStrategy({
                baseDelayMs: 1000,
                maxDelayMs: 60000,
                multiplier: 2,
                jitter: true
              });

      shouldRetry:
        description: 'Determines if error should be retried'
        business-context: 'Controls retry decision'

        parameters:
          - name: 'error'
            type: 'Error'
            description: 'Error to evaluate'
          - name: 'attempt'
            type: 'number'
            description: 'Current attempt number'

        returns:
          type: 'boolean'
          description: 'True if should retry'

      getRetryDelay:
        description: 'Calculates retry delay'
        business-context: 'Determines wait time before retry'

        parameters:
          - name: 'attempt'
            type: 'number'
            description: 'Attempt number'

        returns:
          type: 'number'
          description: 'Delay in milliseconds'

        examples:
          - id: 'calculate-delay'
            code: |
              // Attempt 1: 1000ms
              // Attempt 2: 2000ms
              // Attempt 3: 4000ms
              // With jitter: adds 0-25% random variation
              const delay = strategy.getRetryDelay(attemptNumber);

  LinearBackoffStrategy:
    class-doc:
      description: 'Linear backoff retry strategy'
      business-context: 'Simple incremental retry delays'

      custom-tags:
        implements: 'IProjectionErrorStrategy'

  FixedDelayStrategy:
    class-doc:
      description: 'Fixed delay retry strategy'
      business-context: 'Consistent retry intervals'

      custom-tags:
        implements: 'IProjectionErrorStrategy'

  ImmediateRetryStrategy:
    class-doc:
      description: 'Immediate retry without delay'
      business-context: 'Fast retry for transient errors'

      custom-tags:
        implements: 'IProjectionErrorStrategy'

# === INTERFACES ===
interfaces:
  IProjectionErrorStrategy:
    description: 'Contract for error handling strategies'
    business-context: 'Defines error recovery behavior'

    methods:
      - name: 'shouldRetry'
        description: 'Determines retry eligibility'
        parameters:
          - 'error: Error'
          - 'attempt: number'
          - 'config?: IProjectionRetryConfig'
        returns: 'boolean'

      - name: 'getRetryDelay'
        description: 'Calculates retry delay'
        parameters:
          - 'attempt: number'
          - 'config: IProjectionRetryConfig'
        returns: 'number'

      - name: 'isRetryableError'
        description: 'Checks if error type is retryable'
        parameters:
          - 'error: Error'
          - 'config: IProjectionRetryConfig'
        returns: 'boolean'

  IExponentialBackoffConfig:
    description: 'Exponential backoff configuration'
    business-context: 'Controls backoff behavior'

    properties:
      - name: 'baseDelayMs'
        type: 'number'
        description: 'Initial delay'
        default: '1000'

      - name: 'maxDelayMs'
        type: 'number'
        description: 'Maximum delay'
        default: '60000'

      - name: 'multiplier'
        type: 'number'
        description: 'Delay multiplier'
        default: '2'

      - name: 'jitter'
        type: 'boolean'
        description: 'Add random jitter'
        default: 'true'
