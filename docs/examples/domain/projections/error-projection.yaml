# error-projection - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'error-projection'
title: 'ErrorProjection - Error Tracking Projection'
description: 'Projection for tracking and analyzing errors'
business-context: 'Monitors system health through error aggregation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ErrorProjection:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Projection that tracks errors across the system'
      business-context: 'Provides error analytics and monitoring capabilities'

      formats:
        jsdoc:
          description: 'Error tracking projection for system monitoring'
        cli:
          description: |
            ## ErrorProjection

            Error monitoring features:
            - Error aggregation
            - Trend analysis
            - Error categorization
            - Alert triggering

      custom-tags:
        since: '1.0.0'
        extends: 'BaseProjection<ErrorProjectionState>'
        implements: 'IProjection<ErrorProjectionState>'

    # Methods
    methods:
      constructor:
        description: 'Creates error tracking projection'
        business-context: 'Initializes error monitoring'

        examples:
          - id: 'setup'
            code: |
              const errorProjection = new ErrorProjection();

      createInitialState:
        description: 'Creates initial error tracking state'
        business-context: 'Establishes baseline for error monitoring'

        returns:
          type: 'ErrorProjectionState'
          description: 'Initial state'

        examples:
          - id: 'initial-state'
            code: |
              return {
                totalErrors: 0,
                errorsByType: new Map(),
                errorsByProjection: new Map(),
                recentErrors: [],
                errorTrends: {}
              };

      apply:
        description: 'Processes error-related events'
        business-context: 'Updates error statistics'

        parameters:
          - name: 'state'
            type: 'ErrorProjectionState'
            description: 'Current state'
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Error event'

        returns:
          type: 'ErrorProjectionState'
          description: 'Updated state'

        examples:
          - id: 'process-error'
            code: |
              switch (event.eventType) {
                case 'ProjectionErrorOccurred':
                  return this.handleProjectionError(state, event);
                case 'ErrorResolved':
                  return this.handleErrorResolved(state, event);
                default:
                  return state;
              }

# === TYPES ===
types:
  ErrorProjectionState:
    description: 'Error tracking state structure'
    business-context: 'Aggregated error information'

    properties:
      - name: 'totalErrors'
        type: 'number'
        description: 'Total error count'

      - name: 'errorsByType'
        type: 'Map<string, number>'
        description: 'Errors grouped by type'

      - name: 'errorsByProjection'
        type: 'Map<string, number>'
        description: 'Errors per projection'

      - name: 'recentErrors'
        type: 'ErrorEntry[]'
        description: 'Recent error list'

      - name: 'errorTrends'
        type: 'IErrorTrends'
        description: 'Error trend analysis'

  ErrorEntry:
    description: 'Individual error entry'
    business-context: 'Error details for tracking'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Error ID'

      - name: 'timestamp'
        type: 'Date'
        description: 'Error time'

      - name: 'type'
        type: 'string'
        description: 'Error type'

      - name: 'message'
        type: 'string'
        description: 'Error message'

      - name: 'projectionName'
        type: 'string'
        description: 'Affected projection'
        optional: true

      - name: 'eventType'
        type: 'string'
        description: 'Related event'
        optional: true
