# domain.errors - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'domain.errors'
title: 'Domain Errors - Projection Domain Errors'
description: 'Domain-specific error classes for projections'
business-context: 'Provides structured error handling for projection domain logic'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ProjectionDomainError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Base domain error for projection-related failures'
      business-context: 'Standardizes domain error handling in projections'

      formats:
        jsdoc:
          description: 'Domain error base class for projections'
        cli:
          description: |
            ## ProjectionDomainError

            Domain error handling:
            - Business rule violations
            - Domain invariant failures
            - Validation errors

      custom-tags:
        since: '1.0.0'
        extends: 'Error'
        domain: 'projections'

    # Methods
    methods:
      constructor:
        description: 'Creates domain error with context'
        business-context: 'Captures domain violation details'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Error message'
          - name: 'code'
            type: 'string'
            description: 'Domain error code'
          - name: 'context'
            type: 'IDomainErrorContext'
            description: 'Error context'
            optional: true

  InvalidProjectionStateError:
    class-doc:
      description: 'Error for invalid projection state'
      business-context: 'Indicates projection state corruption or invalid transformation'

      custom-tags:
        extends: 'ProjectionDomainError'

  ProjectionAlreadyExistsError:
    class-doc:
      description: 'Error when projection already exists'
      business-context: 'Prevents duplicate projection registration'

      custom-tags:
        extends: 'ProjectionDomainError'

  ProjectionVersionMismatchError:
    class-doc:
      description: 'Error for projection version conflicts'
      business-context: 'Handles incompatible projection versions'

      custom-tags:
        extends: 'ProjectionDomainError'

  EventSequenceError:
    class-doc:
      description: 'Error for out-of-sequence events'
      business-context: 'Ensures event ordering integrity'

      custom-tags:
        extends: 'ProjectionDomainError'

# === INTERFACES ===
interfaces:
  IDomainErrorContext:
    description: 'Domain error context'
    business-context: 'Additional error information'

    properties:
      - name: 'projectionName'
        type: 'string'
        description: 'Affected projection'
        optional: true

      - name: 'eventType'
        type: 'string'
        description: 'Related event type'
        optional: true

      - name: 'position'
        type: 'number'
        description: 'Event position'
        optional: true

      - name: 'aggregateId'
        type: 'string'
        description: 'Related aggregate'
        optional: true
