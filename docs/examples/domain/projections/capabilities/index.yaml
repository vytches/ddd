# index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'Capabilities Exports'
description: 'Central export file for projection capabilities'
business-context: 'Provides unified access to all capability implementations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  # Base Classes
  - name: 'Capability'
    from: './base-capability'
    description: 'Abstract base capability class'

  - name: 'BaseProjectionCapability'
    from: './base-capability'
    description: 'Base class for projection capabilities'

  # Capability Implementations
  - name: 'CheckpointCapability'
    from: './checkpoint-capability'
    description: 'Checkpoint management capability'

  - name: 'CircuitBreakerCapability'
    from: './circuit-breaker-capability'
    description: 'Circuit breaker pattern capability'

  - name: 'DeadLetterCapability'
    from: './dead-letter-capability'
    description: 'Dead letter queue capability'

  - name: 'SnapshotCapability'
    from: './snapshot-capability'
    description: 'Snapshot management capability'

  # Interfaces
  - name: 'ICapabilityContext'
    from: './base-capability'
    description: 'Capability initialization context'

  - name: 'IProjectionContext'
    from: './base-capability'
    description: 'Event processing context'

  - name: 'ICheckpointOptions'
    from: './checkpoint-capability'
    description: 'Checkpoint configuration'

  - name: 'ISnapshotOptions'
    from: './snapshot-capability'
    description: 'Snapshot configuration'

  - name: 'IDeadLetterOptions'
    from: './dead-letter-capability'
    description: 'Dead letter configuration'

  # Enums
  - name: 'CircuitState'
    from: './circuit-breaker-capability'
    description: 'Circuit breaker states'

# === USAGE EXAMPLES ===
examples:
  - id: 'import-all'
    description: 'Import all capabilities'
    code: |
      import {
        CheckpointCapability,
        SnapshotCapability,
        CircuitBreakerCapability,
        DeadLetterCapability
      } from '@vytches/ddd-projections/capabilities';

  - id: 'selective-import'
    description: 'Import specific capability'
    code: |
      import { CheckpointCapability } from '@vytches/ddd-projections/capabilities';

  - id: 'custom-capability'
    description: 'Create custom capability'
    code: |
      import { BaseProjectionCapability } from '@vytches/ddd-projections/capabilities';

      class MetricsCapability extends BaseProjectionCapability<MyReadModel> {
        onAfterApply(state, event) {
          // Custom logic
        }
      }
