# circuit-breaker-capability - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'circuit-breaker-capability'
title: 'CircuitBreakerCapability - Fault Tolerance'
description: 'Circuit breaker pattern for projection resilience'
business-context: 'Prevents cascading failures in projection processing'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CircuitBreakerCapability:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Implements circuit breaker pattern for projection fault tolerance'
      business-context: 'Protects projection from repeated failures and allows recovery'

      formats:
        jsdoc:
          description: 'Circuit breaker for projection resilience'
        cli:
          description: |
            ## CircuitBreakerCapability

            Fault tolerance features:
            - Three-state circuit (CLOSED, OPEN, HALF_OPEN)
            - Automatic failure detection
            - Recovery testing
            - Metrics collection

      custom-tags:
        since: '1.0.0'
        extends: 'BaseProjectionCapability<TReadModel>'

    # Methods
    methods:
      constructor:
        description: 'Creates circuit breaker with configuration'
        business-context: 'Initializes fault tolerance'

        parameters:
          - name: 'config'
            type: 'ICircuitBreakerConfig'
            description: 'Circuit breaker configuration'

        examples:
          - id: 'setup'
            code: |
              const capability = new CircuitBreakerCapability({
                failureThreshold: 5,
                recoveryTimeoutMs: 60000,
                halfOpenMaxAttempts: 3
              });

      trip:
        description: 'Opens the circuit breaker'
        business-context: 'Stops processing after threshold failures'

        parameters:
          - name: 'reason'
            type: 'string'
            description: 'Trip reason'
            optional: true

        examples:
          - id: 'manual-trip'
            code: |
              capability.trip('Too many database timeouts');

      reset:
        description: 'Resets circuit to closed state'
        business-context: 'Allows normal processing to resume'

        examples:
          - id: 'reset'
            code: |
              capability.reset();
              console.log('Circuit breaker reset, resuming processing');

      getState:
        description: 'Returns current circuit state'
        business-context: 'Monitors circuit breaker status'

        returns:
          type: 'CircuitState'
          description: 'Current state (CLOSED, OPEN, HALF_OPEN)'

      onError:
        description: 'Handles errors and manages circuit state'
        business-context: 'Automatic circuit management on failures'

        parameters:
          - name: 'error'
            type: 'ProjectionError'
            description: 'Processing error'
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Failed event'
            optional: true

        custom-tags:
          override: 'true'
          lifecycle: 'error-handling'

# === ENUMS ===
enums:
  CircuitState:
    description: 'Circuit breaker states'
    business-context: 'Represents circuit breaker status'

    values:
      - name: 'CLOSED'
        value: "'CLOSED'"
        description: 'Normal operation, requests pass through'

      - name: 'OPEN'
        value: "'OPEN'"
        description: 'Circuit tripped, requests rejected'

      - name: 'HALF_OPEN'
        value: "'HALF_OPEN'"
        description: 'Testing recovery, limited requests'
