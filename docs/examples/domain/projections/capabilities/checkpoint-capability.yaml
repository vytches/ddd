# checkpoint-capability - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'checkpoint-capability'
title: 'CheckpointCapability - Incremental Rebuild Support'
description: 'Capability for managing projection checkpoints'
business-context: 'Enables incremental rebuilding from last known good state'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CheckpointCapability:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Manages checkpoints for projection state recovery'
      business-context: 'Optimizes rebuilding by saving periodic state snapshots'

      formats:
        jsdoc:
          description: 'Checkpoint capability for incremental projection rebuilding'
        cli:
          description: |
            ## CheckpointCapability

            Checkpoint management:
            - Periodic state saving
            - Position tracking
            - Incremental rebuilding
            - Recovery optimization

      custom-tags:
        since: '1.0.0'
        extends: 'BaseProjectionCapability<TReadModel>'
        implements: 'ICheckpointProjectionCapability<TReadModel>'

    # Methods
    methods:
      constructor:
        description: 'Creates checkpoint capability with store and options'
        business-context: 'Initializes checkpoint management'

        parameters:
          - name: 'store'
            type: 'IProjectionCheckpointStore<TReadModel>'
            description: 'Checkpoint persistence store'
          - name: 'options'
            type: 'ICheckpointOptions'
            description: 'Checkpoint configuration'
            optional: true

        examples:
          - id: 'basic-setup'
            code: |
              const capability = new CheckpointCapability(
                checkpointStore
              );

          - id: 'with-options'
            code: |
              const capability = new CheckpointCapability(
                checkpointStore,
                {
                  interval: 1000, // Every 1000 events
                  saveOnRebuildComplete: true,
                  compressionEnabled: true
                }
              );

      saveCheckpoint:
        description: 'Saves projection checkpoint'
        business-context: 'Persists current state for recovery'

        parameters:
          - name: 'state'
            type: 'TReadModel'
            description: 'Current projection state'
          - name: 'position'
            type: 'number'
            description: 'Event stream position'
          - name: 'metadata'
            type: 'Record<string, any>'
            description: 'Additional checkpoint metadata'
            optional: true

        returns:
          type: 'Promise<void>'
          description: 'Checkpoint saved'

        examples:
          - id: 'save-checkpoint'
            code: |
              await capability.saveCheckpoint(
                currentState,
                eventPosition,
                {
                  eventCount: 1500,
                  timestamp: new Date(),
                  version: '1.0.0'
                }
              );

        custom-tags:
          async: 'true'

      loadCheckpoint:
        description: 'Loads last checkpoint'
        business-context: 'Retrieves saved state for recovery'

        returns:
          type: 'Promise<ICheckpoint<TReadModel> | null>'
          description: 'Checkpoint or null if none exists'

        examples:
          - id: 'load-checkpoint'
            code: |
              const checkpoint = await capability.loadCheckpoint();

              if (checkpoint) {
                console.log(`Resuming from position ${checkpoint.position}`);
                await engine.rebuildFrom(checkpoint.position + 1);
              } else {
                console.log('No checkpoint found, full rebuild required');
                await engine.rebuild();
              }

        custom-tags:
          async: 'true'

      deleteCheckpoint:
        description: 'Deletes stored checkpoint'
        business-context: 'Clears checkpoint for fresh rebuild'

        returns:
          type: 'Promise<void>'
          description: 'Checkpoint deleted'

        examples:
          - id: 'delete-checkpoint'
            code: |
              // Clear checkpoint before full rebuild
              await capability.deleteCheckpoint();
              await engine.rebuild();

        custom-tags:
          async: 'true'

      onAfterApply:
        description: 'Checks and saves checkpoint after event processing'
        business-context: 'Automatic checkpoint management'

        parameters:
          - name: 'state'
            type: 'TReadModel'
            description: 'Updated state'
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Processed event'
          - name: 'context'
            type: 'IProjectionContext'
            description: 'Processing context'

        returns:
          type: 'Promise<void>'
          description: 'Hook completed'

        examples:
          - id: 'auto-checkpoint'
            code: |
              // Automatically called by projection engine
              // Saves checkpoint based on configured interval

        custom-tags:
          override: 'true'
          lifecycle: 'processing'

      shouldCheckpoint:
        description: 'Determines if checkpoint should be saved'
        business-context: 'Controls checkpoint frequency'

        parameters:
          - name: 'context'
            type: 'IProjectionContext'
            description: 'Current processing context'

        returns:
          type: 'boolean'
          description: 'True if checkpoint needed'

        examples:
          - id: 'check-interval'
            code: |
              const shouldSave = capability.shouldCheckpoint({
                position: 1500,
                eventCount: 1500,
                lastCheckpoint: 500
              });

              if (shouldSave) {
                await capability.saveCheckpoint(state, position);
              }

        custom-tags:
          protected: 'true'

# === INTERFACES ===
interfaces:
  ICheckpointOptions:
    description: 'Configuration for checkpoint capability'
    business-context: 'Controls checkpoint behavior'

    properties:
      - name: 'interval'
        type: 'number'
        description: 'Events between checkpoints'
        default: '1000'
        optional: true

      - name: 'saveOnRebuildComplete'
        type: 'boolean'
        description: 'Save checkpoint after rebuild'
        default: 'true'
        optional: true

      - name: 'compressionEnabled'
        type: 'boolean'
        description: 'Enable state compression'
        default: 'false'
        optional: true

      - name: 'retentionCount'
        type: 'number'
        description: 'Number of checkpoints to retain'
        default: '3'
        optional: true

  ICheckpoint:
    description: 'Checkpoint data structure'
    business-context: 'Stores projection state at point in time'

    properties:
      - name: 'projectionName'
        type: 'string'
        description: 'Associated projection'

      - name: 'position'
        type: 'number'
        description: 'Event stream position'

      - name: 'state'
        type: 'TReadModel'
        description: 'Projection state'

      - name: 'timestamp'
        type: 'Date'
        description: 'Checkpoint creation time'

      - name: 'eventCount'
        type: 'number'
        description: 'Events processed'
        optional: true

      - name: 'metadata'
        type: 'Record<string, any>'
        description: 'Additional metadata'
        optional: true
