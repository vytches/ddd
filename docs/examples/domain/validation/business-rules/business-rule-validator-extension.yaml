# Business Rule Validator Extension - Enhanced Validation Capabilities

# === FILE METADATA ===
file-name: 'business-rule-validator-extension'
title: 'Business Rule Validator Extension Class'
description: 'Extension class providing advanced validation capabilities'
business-context: 'Enhances base business rule validator with specification integration and advanced features'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BusinessRuleValidatorExtension:
    class-doc:
      description: 'Extension class that adds advanced capabilities to BusinessRuleValidator'
      business-context: 'Provides specification integration and additional validation methods for complex business scenarios'

      formats:
        jsdoc:
          description: 'Extension for BusinessRuleValidator with specification support'
        cli:
          description: |
            ## BusinessRuleValidatorExtension<T>

            Advanced extension class that enhances BusinessRuleValidator with:
            - Specification pattern integration
            - Composite validation capabilities
            - Enhanced error handling and reporting

      custom-tags:
        since: '1.0.0'
        generic: 'T - Type being validated'
        pattern: 'decorator-pattern'
        category: 'validation-extension'

    methods:
      constructor:
        description: 'Creates extension wrapper around existing BusinessRuleValidator instance'
        business-context: 'Initializes extension with base validator for enhanced functionality'

        parameters:
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Base validator instance to extend with additional capabilities'

        examples:
          - id: 'basic-extension'
            code: |
              const baseValidator = new BusinessRuleValidator<User>();
              const extension = new BusinessRuleValidatorExtension(baseValidator);

      toSpecification:
        description: 'Converts the validator to a reusable specification'
        business-context: 'Enables validator reuse as specification in other validation contexts'

        parameters:
          - name: '_errorMessage'
            type: 'string'
            description: 'Optional custom error message for specification failures'
            optional: true

        returns:
          type: 'ISpecification<T>'
          description: 'Specification that encapsulates validator logic'

        examples:
          - id: 'validator-to-spec'
            code: |
              const validator = new BusinessRuleValidatorExtension(baseValidator);
              const spec = validator.toSpecification('Custom validation failed');

      validateWithSpecifications:
        description: 'Validates object using base validator plus additional specifications'
        business-context: 'Combines business rule validation with specification-based validation for comprehensive validation'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Object to validate against all rules and specifications'
          - name: 'specs'
            type: 'ISpecification<T>[]'
            description: 'Additional specifications to validate against'
            rest: true

        returns:
          type: 'Result<T, ValidationErrors>'
          description: 'Result containing validated object or validation errors'

        examples:
          - id: 'composite-validation'
            code: |
              const result = extension.validateWithSpecifications(
                user,
                new AgeSpecification(18),
                new EmailSpecification()
              );
              if (result.isSuccess()) {
                console.log('All validations passed');
              }

# === MODULE AUGMENTATION ===
module-augmentation:
  BusinessRuleValidator:
    description: 'Module augmentation adding extension methods to BusinessRuleValidator'
    business-context: 'Extends base validator interface with extension capabilities'

    methods:
      toSpecification:
        description: 'Converts validator to specification (augmented method)'
        business-context: 'Added via module augmentation for direct access from base validator'

        parameters:
          - name: 'errorMessage'
            type: 'string'
            description: 'Optional error message for specification failures'
            optional: true

        returns:
          type: 'ISpecification<T>'
          description: 'Specification encapsulating validator logic'

      validateWithSpecifications:
        description: 'Validates with additional specifications (augmented method)'
        business-context: 'Added via module augmentation for enhanced validation capabilities'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Object to validate'
          - name: 'specs'
            type: 'ISpecification<T>[]'
            description: 'Additional specifications'
            rest: true

        returns:
          type: 'Result<T, ValidationErrors>'
          description: 'Validation result'

      apply:
        description: 'Applies transformation function to validator (augmented method)'
        business-context: 'Enables functional composition of validator transformations'

        parameters:
          - name: 'rule'
            type: '(validator: BusinessRuleValidator<T>) => BusinessRuleValidator<T>'
            description: 'Transformation function to apply to validator'

        returns:
          type: 'BusinessRuleValidator<T>'
          description: 'Transformed validator instance'
