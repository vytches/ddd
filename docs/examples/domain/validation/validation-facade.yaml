# ValidationFacade - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'validation-facade'
title: 'ValidationFacade - Simplified Validation API'
description: 'Simplified facade providing convenient validation utilities and factory methods'
business-context: 'One-stop validation API for common validation scenarios and patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CONSTANTS ===
constants:
  Validation:
    description: 'Facade providing simplified validation API and utilities'
    business-context: 'Central access point for all validation patterns and utilities in the domain'

    formats:
      jsdoc:
        description: 'Validation facade with factory methods and utilities'
      cli:
        description: |
          ## Validation Facade

          The Validation constant provides a simplified, unified API for all validation scenarios.
          It serves as a facade over the various validation classes, providing convenient factory methods
          and utilities for common validation patterns.

          **Key Features:**
          - Factory methods for all validator types
          - Specification-to-validator conversion
          - Validator combination utilities  
          - Nested path validation
          - External validator integration
          - Direct validation methods

    methods:
      create:
        description: 'Creates new business rule validator'
        business-context: 'Factory method for starting comprehensive business rule validation'

        returns:
          type: 'BusinessRuleValidator<T>'
          description: 'New empty business rule validator ready for configuration'

        examples:
          - id: 'create-business-validator'
            code: |
              const validator = Validation.create<User>()
                .addRule('email', user => !!user.email, 'Email required')
                .addRule('age', user => user.age >= 18, 'Must be adult')
                .mustSatisfy(new ActiveUserSpec(), 'User must be active');

      fromSpecification:
        description: 'Creates validator from single specification'
        business-context: 'Quick factory for specification-based validation'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to use for validation'
          - name: 'message'
            type: 'string'
            description: 'Error message when specification fails'
          - name: 'property'
            type: 'string | undefined'
            description: 'Optional property name for error reporting'

        returns:
          type: 'IValidator<T>'
          description: 'New specification validator'

        examples:
          - id: 'from-specification'
            code: |
              const ageSpec = new AgeRangeSpecification(18, 65);
              const validator = Validation.fromSpecification(
                ageSpec, 
                'Age must be between 18-65',
                'age'
              );

              const result = validator.validate(user);

      combine:
        description: 'Combines multiple validators into single validator'
        business-context: 'Merges validation logic from different validators for comprehensive validation'

        parameters:
          - name: '...validators'
            type: 'IValidator<T>[]'
            description: 'Array of validators to combine'

        returns:
          type: 'IValidator<T>'
          description: 'Combined validator that runs all input validators'

        examples:
          - id: 'combine-validators'
            code: |
              const basicValidator = Validation.create<User>()
                .addRule('name', user => !!user.name, 'Name required');
                
              const emailValidator = Validation.fromSpecification(
                new EmailSpec(), 'Valid email required', 'email'
              );

              const profileValidator = Validation.create<User>()
                .addRule('bio', user => user.bio.length <= 500, 'Bio too long');

              const combinedValidator = Validation.combine(
                basicValidator, 
                emailValidator, 
                profileValidator
              );

      validateWithSpecification:
        description: 'Validates object directly using specification'
        business-context: 'One-shot validation using specification without creating validator'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Object to validate'
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to validate against'
          - name: 'message'
            type: 'string'
            description: 'Error message when validation fails'

        returns:
          type: 'Result<T, IValidationErrors>'
          description: 'Validation result with object or errors'

        examples:
          - id: 'validate-with-specification'
            code: |
              const eligibilitySpec = new EligibilitySpecification();
              const result = Validation.validateWithSpecification(
                user, 
                eligibilitySpec, 
                'User is not eligible'
              );

              if (result.isSuccess) {
                processEligibleUser(result.value);
              }

      validateWithRules:
        description: 'Validates using multiple specifications with individual messages'
        business-context: 'Validates object against multiple specifications with custom error messages'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Object to validate'
          - name: 'rules'
            type: 'Array<{ specification: ISpecification<T>; message: string; property?: string; }>'
            description: 'Array of validation rules with specifications and messages'

        returns:
          type: 'Result<T, ValidationErrors>'
          description: 'Validation result with object or detailed errors'

        examples:
          - id: 'validate-with-rules'
            code: |
              const result = Validation.validateWithRules(user, [
                {
                  specification: new AgeRangeSpec(18, 65),
                  message: 'Age must be between 18-65',
                  property: 'age'
                },
                {
                  specification: new EmailFormatSpec(),
                  message: 'Invalid email format',
                  property: 'email'
                },
                {
                  specification: new ActiveUserSpec(),
                  message: 'User account must be active'
                }
              ]);

      specificationToValidator:
        description: 'Converts specification to validator'
        business-context: 'Utility to adapt specifications for validator-based workflows'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to convert'
          - name: 'message'
            type: 'string'
            description: 'Error message for validation failures'
          - name: 'property'
            type: 'string | undefined'
            description: 'Optional property name'

        returns:
          type: 'IValidator<T>'
          description: 'Validator wrapping the specification'

        examples:
          - id: 'specification-to-validator'
            code: |
              const ageSpec = new AgeRangeSpecification(18, 65);
              const validator = Validation.specificationToValidator(
                ageSpec, 
                'Age validation failed',
                'age'
              );

      validatorToSpecification:
        description: 'Converts validator to specification'
        business-context: 'Utility to adapt validators for specification-based workflows'

        parameters:
          - name: 'validator'
            type: 'IValidator<T>'
            description: 'Validator to convert to specification'

        returns:
          type: 'ISpecification<T>'
          description: 'Specification that uses validator.validate() for isSatisfiedBy()'

        examples:
          - id: 'validator-to-specification'
            code: |
              const validator = Validation.create<User>()
                .addRule('email', user => !!user.email, 'Email required')
                .addRule('age', user => user.age >= 18, 'Must be adult');
                
              const spec = Validation.validatorToSpecification(validator);

              // Use as specification
              const isValid = spec.isSatisfiedBy(user);

              // Compose with other specifications
              const eligibleSpec = spec.and(new ActiveUserSpec());

      forNestedPath:
        description: 'Creates validator for deeply nested object structures'
        business-context: 'Validates nested domain objects with full path tracking'

        parameters:
          - name: 'path'
            type: 'string[]'
            description: 'Array of property names forming the path to nested object'
          - name: 'validator'
            type: 'IValidator<unknown>'
            description: 'Validator for the nested object at the path'

        returns:
          type: 'IValidator<T>'
          description: 'Validator that applies nested validation with path context'

        examples:
          - id: 'for-nested-path'
            code: |
              const addressValidator = Validation.create<Address>()
                .addRule('street', addr => !!addr.street, 'Street required')
                .addRule('zipCode', addr => /^\d{5}$/.test(addr.zipCode), 'Invalid zip');

              // Validate nested address in user profile
              const nestedValidator = Validation.forNestedPath(
                ['profile', 'address'], 
                addressValidator
              );

              const result = nestedValidator.validate(user);
              // Errors will include full path: "profile.address.street"

      validatePath:
        description: 'Validates deeply nested property by path'
        business-context: 'Validates specific nested property with path-aware error reporting'

        parameters:
          - name: 'object'
            type: 'T'
            description: 'Root object containing nested structure'
          - name: 'path'
            type: '(string | number)[]'
            description: 'Path to nested property (supports array indices)'
          - name: 'valueValidator'
            type: 'IValidator<P>'
            description: 'Validator for the value at the path'

        returns:
          type: 'Result<T, ValidationErrors>'
          description: 'Validation result with path-aware error reporting'

        examples:
          - id: 'validate-path'
            code: |
              const emailValidator = Validation.fromSpecification(
                new EmailSpec(), 'Invalid email format'
              );

              // Validate email nested in user.profile.contact.email
              const result = Validation.validatePath(
                user,
                ['profile', 'contact', 'email'],
                emailValidator
              );

              // Error will be reported as "profile.contact.email: Invalid email format"
          - id: 'validate-array-path'
            code: |
              const phoneValidator = Validation.create<string>()
                .addRule('', phone => /^\d{10}$/.test(phone), 'Invalid phone format');

              // Validate first phone number in array
              const result = Validation.validatePath(
                user,
                ['profile', 'phoneNumbers', 0],
                phoneValidator
              );

      useExternal:
        description: 'Integrates external validator implementing IValidator interface'
        business-context: 'Enables integration with third-party validation libraries'

        parameters:
          - name: 'validator'
            type: 'IValidator<T>'
            description: 'External validator implementing IValidator interface'

        returns:
          type: 'IValidator<T>'
          description: 'The same validator (pass-through for API consistency)'

        examples:
          - id: 'use-external'
            code: |
              // Example integration with hypothetical external library
              class ZodValidator<T> implements IValidator<T> {
                constructor(private schema: ZodSchema<T>) {}
                
                validate(value: T): Result<T, ValidationErrors> {
                  const result = this.schema.safeParse(value);
                  if (result.success) {
                    return Result.ok(result.data);
                  }
                  
                  const errors = result.error.issues.map(issue => 
                    new ValidationError(issue.path.join('.'), issue.message)
                  );
                  return Result.fail(new ValidationErrors(errors));
                }
              }

              const zodValidator = new ZodValidator(userSchema);
              const validator = Validation.useExternal(zodValidator);
          - id: 'use-external-composition'
            code: |
              // Combine external validator with domain validators
              const externalValidator = Validation.useExternal(new ZodValidator(schema));
              const domainValidator = Validation.create<User>()
                .mustSatisfy(new BusinessRuleSpec(), 'Business rule failed');

              const combinedValidator = Validation.combine(
                externalValidator,
                domainValidator
              );
