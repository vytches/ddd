# SpecificationValidator - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'specification-validator'
title: 'SpecificationValidator - Specification-Based Validation'
description: 'Validator focused on specification pattern with Result integration'
business-context: 'Lightweight validator for specification-based business rule validation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  SpecificationValidator:
    class-doc:
      description: 'Validator implementation focused on specification pattern with Result pattern integration'
      business-context: 'Lightweight validator for specification-based domain business rules'

      formats:
        jsdoc:
          description: 'Specification-based validator with Result pattern and property rules'
        cli:
          description: |
            ## SpecificationValidator<T>

            A validator implementation that focuses specifically on the specification pattern.
            Provides simple API for adding specification-based validation rules with Result pattern.
            Lighter weight alternative to BusinessRuleValidator for specification-only scenarios.

            **Key Features:**
            - Specification-focused validation rules
            - Property-specific specification rules
            - Result pattern integration
            - Simple fluent API
            - Automatic error collection
            - Type-safe validation

      custom-tags:
        since: '1.0.0'
        pattern: 'Specification-based validation with Result pattern'
        domain: 'Domain specification validation'
        lightweight: 'Focused alternative to BusinessRuleValidator'

    methods:
      constructor:
        description: 'Creates new specification validator instance'
        business-context: 'Initializes validator for specification-based business rules'

        examples:
          - id: 'basic-constructor'
            code: |
              const validator = new SpecificationValidator<User>();

              // Add specification rules
              const ageSpec = new AgeRangeSpecification(18, 65);
              validator.addRule(ageSpec, 'Age must be between 18-65');

      addRule:
        description: 'Adds validation rule based on specification'
        business-context: 'Adds reusable specification-based business rule to validator'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification that defines the validation rule'
          - name: 'message'
            type: 'string'
            description: 'Error message when specification is not satisfied'
          - name: 'property'
            type: 'string | undefined'
            description: 'Optional property name for error reporting (defaults to empty string)'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional additional context for error reporting'

        returns:
          type: 'SpecificationValidator<T>'
          description: 'Self for fluent chaining'

        examples:
          - id: 'add-rule-basic'
            code: |
              const emailSpec = new EmailFormatSpecification();
              const ageSpec = new AgeRangeSpecification(18, 120);

              validator
                .addRule(emailSpec, 'Invalid email format', 'email')
                .addRule(ageSpec, 'Age must be between 18-120', 'age');
          - id: 'add-rule-with-context'
            code: |
              const activeSpec = new ActiveUserSpecification();
              validator.addRule(
                activeSpec, 
                'User account must be active',
                'status',
                { priority: 'high', category: 'account-status' }
              );

      addPropertyRule:
        description: 'Adds rule for specific object property using specification and value extractor'
        business-context: 'Validates specific property using specification with custom value extraction logic'

        parameters:
          - name: 'property'
            type: 'keyof T & string'
            description: 'Property name to validate'
          - name: 'specification'
            type: 'ISpecification<P>'
            description: 'Specification for the property value type'
          - name: 'message'
            type: 'string'
            description: 'Error message when specification fails'
          - name: 'getValue'
            type: '(obj: T) => P'
            description: 'Function to extract property value from object'
          - name: 'context'
            type: 'Record<string, any> | undefined'
            description: 'Optional additional context for error reporting'

        returns:
          type: 'SpecificationValidator<T>'
          description: 'Self for fluent chaining'

        examples:
          - id: 'add-property-rule'
            code: |
              const lengthSpec = new LengthRangeSpecification(2, 50);
              const emailSpec = new EmailFormatSpecification();

              validator
                .addPropertyRule('name', lengthSpec, 'Name must be 2-50 characters', user => user.name)
                .addPropertyRule('email', emailSpec, 'Invalid email format', user => user.email);

      validate:
        description: 'Performs validation based on all configured specifications'
        business-context: 'Executes all specification-based business rules and reports validation results'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Object to validate against configured specifications'

        returns:
          type: 'Result<T, ValidationErrors>'
          description: 'Result containing validated object or collection of validation errors'

        examples:
          - id: 'validate-execution'
            code: |
              const result = validator.validate(user);

              if (result.isSuccess) {
                console.log('All specifications satisfied:', result.value);
              } else {
                console.log('Specification validation failed:');
                result.error.errors.forEach(err => 
                  console.log(`${err.property}: ${err.message}`)
                );
              }
          - id: 'validate-with-error-details'
            code: |
              const result = validator.validate(user);

              if (result.isFailure) {
                const errors = result.error.errors;
                
                // Group errors by property
                const errorsByProperty = errors.reduce((acc, error) => {
                  const prop = error.property || 'general';
                  if (!acc[prop]) acc[prop] = [];
                  acc[prop].push(error.message);
                  return acc;
                }, {} as Record<string, string[]>);
                
                return { valid: false, errors: errorsByProperty };
              }

              return { valid: true, data: result.value };

      fromSpecification:
        description: 'Static factory method to create validator with single specification rule'
        business-context: 'Quick factory for creating validator from single specification'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to use for validation'
          - name: 'message'
            type: 'string'
            description: 'Error message when specification fails'
          - name: 'property'
            type: 'string | undefined'
            description: 'Optional property name for error reporting'
          - name: 'context'
            type: 'Record<string, any> | undefined'
            description: 'Optional additional context'

        returns:
          type: 'SpecificationValidator<T>'
          description: 'New validator with single specification rule'

        custom-tags:
          static: 'Static factory method'
          pattern: 'Factory pattern for single specification validators'

        examples:
          - id: 'from-specification-factory'
            code: |
              const ageSpec = new AgeRangeSpecification(18, 65);
              const validator = SpecificationValidator.fromSpecification(
                ageSpec,
                'Age must be between 18-65 for eligibility',
                'age'
              );

              const result = validator.validate(user);
          - id: 'from-specification-composition'
            code: |
              // Create from composed specification
              const eligibilitySpec = Specification
                .propertyEquals<User>('status', 'active')
                .and(Specification.propertyBetween<User>('age', 18, 65))
                .and(Specification.create<User>(user => user.emailVerified));
                
              const validator = SpecificationValidator.fromSpecification(
                eligibilitySpec,
                'User does not meet eligibility requirements'
              );

      create:
        description: 'Static factory method to create empty specification validator'
        business-context: 'Factory method for starting specification validator configuration'

        returns:
          type: 'SpecificationValidator<T>'
          description: 'New empty validator ready for specification rule configuration'

        custom-tags:
          static: 'Static factory method'

        examples:
          - id: 'create-factory'
            code: |
              const validator = SpecificationValidator.create<User>()
                .addRule(new EmailFormatSpec(), 'Invalid email', 'email')
                .addRule(new ActiveUserSpec(), 'User must be active', 'status');
          - id: 'create-with-composed-specs'
            code: |
              const validator = SpecificationValidator.create<Order>()
                .addRule(
                  Specification.propertyBetween<Order>('amount', 0, 100000),
                  'Order amount must be between $0-$100,000',
                  'amount'
                )
                .addRule(
                  Specification.propertyIn<Order>('status', ['pending', 'confirmed']),
                  'Order must be pending or confirmed',
                  'status'
                );
