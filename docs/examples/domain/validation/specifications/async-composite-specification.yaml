# AsyncCompositeSpecification - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'async-composite-specification'
title: 'AsyncCompositeSpecification - Asynchronous Specification Pattern'
description: 'Base class for building complex asynchronous specifications with database/API operations'
business-context: 'Enables async business rule validation requiring external data sources'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  AsyncCompositeSpecification:
    class-doc:
      description: 'Abstract base class for building complex asynchronous specifications using Composite pattern'
      business-context: 'Foundation for async domain specifications requiring database queries or API calls'

      formats:
        jsdoc:
          description: 'Abstract async composite specification with fluent composition API'
        cli:
          description: |
            ## AsyncCompositeSpecification

            Abstract base class for building complex asynchronous specifications using the Composite pattern.
            Provides standard logical operators (and, or, not) for combining async specifications.
            Useful for specifications that require async operations like database queries or API calls.

            **Key Features:**
            - Async fluent composition API with `and()`, `or()`, `not()` methods
            - Context propagation for complex evaluation scenarios
            - Optional failure explanation for debugging
            - Parallel execution optimization for better performance
            - Type-safe async specification building

      custom-tags:
        since: '1.0.0'
        pattern: 'Async Composite pattern for specification composition'
        domain: 'Async domain specification building blocks'
        async: 'All operations are asynchronous'

    properties:
      name:
        description: 'Optional name for debugging and logging purposes'
        type: 'string | undefined'
        business-context: 'Helps identify specifications in logs and error messages'

      description:
        description: 'Optional description for debugging and logging purposes'
        type: 'string | undefined'
        business-context: 'Provides detailed specification purpose for maintainability'

    methods:
      isSatisfiedByAsync:
        description: 'Abstract method to check if candidate satisfies specification asynchronously'
        business-context: 'Core async business rule evaluation method requiring external data'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'The entity or value object to validate against specification'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context for evaluation (user, tenant, environment)'

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true if candidate satisfies specification'

        custom-tags:
          abstract: 'Must be implemented by concrete async specifications'
          pattern: 'Async specification pattern core method'

        examples:
          - id: 'async-implementation'
            code: |
              class UserExistsSpecification extends AsyncCompositeSpecification<{ email: string }> {
                constructor(private userRepository: IUserRepository) {
                  super();
                }
                
                async isSatisfiedByAsync(
                  candidate: { email: string }, 
                  context?: Record<string, unknown>
                ): Promise<boolean> {
                  const user = await this.userRepository.findByEmail(candidate.email);
                  return user !== null;
                }
              }

      and:
        description: 'Combines this async specification with another using AND logic'
        business-context: 'Creates composite async specification where both conditions must be true'

        parameters:
          - name: 'other'
            type: 'IAsyncSpecification<T>'
            description: 'Another async specification to combine with AND logic'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New AndAsyncSpecification combining both specifications'

        examples:
          - id: 'async-and-composition'
            code: |
              const userExistsSpec = new UserExistsSpecification(userRepo);
              const hasPermissionSpec = new HasPermissionSpecification(authService);
              const combined = userExistsSpec.and(hasPermissionSpec);

              const isValid = await combined.isSatisfiedByAsync(candidate, context);

      or:
        description: 'Combines this async specification with another using OR logic'
        business-context: 'Creates composite async specification where at least one condition must be true'

        parameters:
          - name: 'other'
            type: 'IAsyncSpecification<T>'
            description: 'Another async specification to combine with OR logic'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New OrAsyncSpecification combining both specifications'

        examples:
          - id: 'async-or-composition'
            code: |
              const isAdminSpec = new IsAdminSpecification(roleService);
              const isOwnerSpec = new IsOwnerSpecification(ownershipService);
              const hasAccess = isAdminSpec.or(isOwnerSpec);

              const canAccess = await hasAccess.isSatisfiedByAsync(user, context);

      not:
        description: 'Negates this async specification'
        business-context: 'Creates async specification that is satisfied when this specification fails'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New NotAsyncSpecification that negates this specification'

        examples:
          - id: 'async-not-negation'
            code: |
              const userExistsSpec = new UserExistsSpecification(userRepo);
              const userNotExistsSpec = userExistsSpec.not();

              const isNewUser = await userNotExistsSpec.isSatisfiedByAsync(candidate);

      create:
        description: 'Static factory method to create async specification from predicate function'
        business-context: 'Quick way to create async specifications without defining full classes'

        parameters:
          - name: 'predicate'
            type: '(candidate: T, context?: Record<string, unknown>) => Promise<boolean>'
            description: 'Async function that returns Promise<boolean> for specification evaluation'
          - name: 'name'
            type: 'string | undefined'
            description: 'Optional name for debugging purposes'
          - name: 'description'
            type: 'string | undefined'
            description: 'Optional description for debugging purposes'

        returns:
          type: 'IAsyncSpecification<T>'
          description: 'New PredicateAsyncSpecification wrapping the async predicate function'

        custom-tags:
          static: 'Static factory method'
          pattern: 'Factory pattern for simple async specifications'

        examples:
          - id: 'async-predicate-factory'
            code: |
              // Create async specification from lambda
              const hasValidSubscriptionSpec = AsyncCompositeSpecification.create<User>(
                async (user, context) => {
                  const subscription = await subscriptionService.getByUserId(user.id);
                  return subscription?.isActive ?? false;
                },
                'HasValidSubscription',
                'Checks if user has active subscription'
              );

      explainFailureAsync:
        description: 'Optional method to explain why specification failed'
        business-context: 'Provides detailed failure reasons for debugging and user feedback'

        parameters:
          - name: '_candidate'
            type: 'T'
            description: 'The entity that failed validation'
          - name: '_context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context for failure explanation'

        returns:
          type: 'Promise<string | null>'
          description: 'Promise resolving to failure explanation or null if not implemented'

        custom-tags:
          optional: 'Can be implemented by concrete specifications'
          debugging: 'Useful for debugging and error messages'

  AndAsyncSpecification:
    class-doc:
      description: 'Combines two async specifications with AND logic - both must be satisfied'
      business-context: 'Both async business rules must pass for composite validation to succeed'

      formats:
        jsdoc:
          description: 'AND composition of two async specifications with parallel execution'
        cli:
          description: |
            ## AndAsyncSpecification

            Combines two async specifications with AND logic. Both specifications must be satisfied
            for the result to be true. Executes both specifications in parallel for better performance.

    methods:
      constructor:
        description: 'Creates AND async specification with two component specifications'
        business-context: 'Combines two async business rules that must both be satisfied'

        parameters:
          - name: 'left'
            type: 'IAsyncSpecification<T>'
            description: 'First async specification to evaluate'
          - name: 'right'
            type: 'IAsyncSpecification<T>'
            description: 'Second async specification to evaluate'

        examples:
          - id: 'and-async-constructor'
            code: |
              const userExistsSpec = new UserExistsSpecification(userRepo);
              const hasPermissionSpec = new HasPermissionSpecification(authService);
              const andSpec = new AndAsyncSpecification(userExistsSpec, hasPermissionSpec);

      isSatisfiedByAsync:
        description: 'Evaluates both specifications in parallel and returns true only if both are satisfied'
        business-context: 'Enforces that user meets all combined async business rules efficiently'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity to evaluate against both async specifications'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context passed to both specifications'

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true only if both specifications are satisfied'

        custom-tags:
          performance: 'Uses Promise.all for parallel execution'

        examples:
          - id: 'and-async-evaluation'
            code: |
              const result = await andSpec.isSatisfiedByAsync(user, { tenantId: 'tenant-123' });
              // Both user existence and permission checks run in parallel

      explainFailureAsync:
        description: 'Provides combined failure explanation from both specifications'
        business-context: 'Explains which async business rules failed and why'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity that failed validation'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context for failure explanation'

        returns:
          type: 'Promise<string | null>'
          description: "Combined failure explanations joined with ' AND '"

  OrAsyncSpecification:
    class-doc:
      description: 'Combines two async specifications with OR logic - at least one must be satisfied'
      business-context: 'Either async business rule can pass for composite validation to succeed'

      formats:
        jsdoc:
          description: 'OR composition of two async specifications with parallel execution'

    methods:
      constructor:
        description: 'Creates OR async specification with two component specifications'
        business-context: 'Combines two async business rules where either can be satisfied'

        parameters:
          - name: 'left'
            type: 'IAsyncSpecification<T>'
            description: 'First async specification to evaluate'
          - name: 'right'
            type: 'IAsyncSpecification<T>'
            description: 'Second async specification to evaluate'

      isSatisfiedByAsync:
        description: 'Evaluates both specifications in parallel and returns true if either is satisfied'
        business-context: 'Allows flexibility where user can meet alternative async business rules'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity to evaluate against both async specifications'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context passed to both specifications'

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true if at least one specification is satisfied'

        custom-tags:
          performance: 'Uses Promise.all for parallel execution'

  NotAsyncSpecification:
    class-doc:
      description: 'Negates an async specification - satisfied when wrapped specification fails'
      business-context: 'Async specification is satisfied when wrapped async business rule fails'

      formats:
        jsdoc:
          description: 'NOT negation of an async specification'

    methods:
      constructor:
        description: 'Creates NOT async specification that negates another async specification'
        business-context: 'Inverts async business rule logic for exclusion scenarios'

        parameters:
          - name: 'spec'
            type: 'IAsyncSpecification<T>'
            description: 'Async specification to negate'

      isSatisfiedByAsync:
        description: 'Returns negation of wrapped async specification result'
        business-context: 'Enforces that user does NOT meet the wrapped async business rule'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity to evaluate against negated async specification'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional context passed to wrapped specification'

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true if wrapped specification is NOT satisfied'

# === PRIVATE CLASSES ===
types:
  PredicateAsyncSpecification:
    description: 'Internal async specification implementation for predicate functions'
    business-context: 'Wrapper for lambda-based async specifications created via factory method'
