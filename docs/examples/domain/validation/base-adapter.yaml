# BaseAdapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'base-adapter'
title: 'BaseValidationAdapter - External Validator Integration'
description: 'Base class and utilities for integrating external validation libraries'
business-context: 'Adapter pattern for integrating third-party validation libraries into domain validation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseValidationAdapter:
    class-doc:
      description: 'Abstract base class for creating adapters to external validation libraries'
      business-context: 'Foundation for integrating external validation libraries using adapter pattern'

      formats:
        jsdoc:
          description: 'Abstract validation adapter with helper methods for external library integration'
        cli:
          description: |
            ## BaseValidationAdapter<T, TSchema>

            Abstract base class for creating adapters that integrate external validation libraries
            into the domain validation system. Provides common utilities and helper methods
            for converting external validation results to domain validation errors.

            **Key Features:**
            - Abstract validation method for implementation
            - Helper methods for error creation and conversion
            - Result pattern integration
            - Schema-based validation support
            - Standardized error formatting
            - Type-safe adapter implementation

      custom-tags:
        since: '1.0.0'
        pattern: 'Adapter pattern for external library integration'
        domain: 'External validation library integration'
        abstract: 'Must be implemented by concrete adapters'

    methods:
      constructor:
        description: 'Creates base adapter with schema or configuration'
        business-context: 'Initializes adapter with external library schema or configuration'

        parameters:
          - name: 'schema'
            type: 'TSchema'
            description: 'Schema or configuration object for the external validation library'

        examples:
          - id: 'schema-constructor'
            code: |
              // Example with Zod schema
              class ZodAdapter extends BaseValidationAdapter<User, ZodSchema<User>> {
                constructor(schema: ZodSchema<User>) {
                  super(schema);
                }
                
                validate(value: User): Result<User, IValidationErrors> {
                  // Implementation using this.schema
                  const result = this.schema.safeParse(value);
                  // ... convert to ValidationErrors
                }
              }

      validate:
        description: 'Abstract validation method that must be implemented by concrete adapters'
        business-context: 'Core validation logic using external library - must be implemented'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Value to validate using external library'

        returns:
          type: 'Result<T, IValidationErrors>'
          description: 'Validation result with success value or domain validation errors'

        custom-tags:
          abstract: 'Must be implemented by concrete adapter classes'

        examples:
          - id: 'validate-implementation'
            code: |
              class JoiAdapter extends BaseValidationAdapter<User, JoiSchema> {
                validate(value: User): Result<User, IValidationErrors> {
                  const result = this.schema.validate(value);
                  
                  if (result.error) {
                    const errors = result.error.details.map(detail =>
                      this.createValidationError(
                        detail.path.join('.'),
                        detail.message,
                        { type: detail.type }
                      )
                    );
                    return this.failWithErrors(errors);
                  }
                  
                  return this.success(result.value);
                }
              }

      createValidationError:
        description: 'Helper method to create ValidationError with context'
        business-context: 'Standardizes error creation across different external libraries'

        parameters:
          - name: 'property'
            type: 'string'
            description: 'Property name where validation failed'
          - name: 'message'
            type: 'string'
            description: 'Error message from external library'
          - name: 'context'
            type: 'Record<string, unknown> | undefined'
            description: 'Optional additional context from external library'

        returns:
          type: 'ValidationError'
          description: 'Domain ValidationError object'

        custom-tags:
          protected: 'Available to subclasses'
          helper: 'Utility method for error standardization'

        examples:
          - id: 'create-validation-error'
            code: |
              // Inside adapter implementation
              const error = this.createValidationError(
                'email',
                'Invalid email format',
                { rule: 'email', library: 'joi' }
              );

      createValidationErrors:
        description: 'Helper method to create ValidationErrors collection from array'
        business-context: 'Creates comprehensive error collection for multiple validation failures'

        parameters:
          - name: 'errors'
            type: 'ValidationError[]'
            description: 'Array of individual validation errors to aggregate'

        returns:
          type: 'ValidationErrors'
          description: 'Domain ValidationErrors collection'

        custom-tags:
          protected: 'Available to subclasses'
          helper: 'Utility method for error aggregation'

      pathToString:
        description: 'Helper method to convert property path array to dot-separated string'
        business-context: 'Standardizes property path formatting across different external libraries'

        parameters:
          - name: 'path'
            type: '(string | number)[]'
            description: 'Array representing property path (supports nested objects and arrays)'

        returns:
          type: 'string'
          description: 'Dot-separated property path string'

        custom-tags:
          protected: 'Available to subclasses'
          helper: 'Utility method for path formatting'

        examples:
          - id: 'path-to-string'
            code: |
              // Inside adapter implementation
              const path = ['user', 'profile', 'address', 0, 'street'];
              const pathString = this.pathToString(path);
              // Result: 'user.profile.address.0.street'

      failWithErrors:
        description: 'Helper method to create Result.fail with ValidationErrors'
        business-context: 'Standardizes error result creation for validation failures'

        parameters:
          - name: 'errors'
            type: 'ValidationError[]'
            description: 'Array of validation errors to include in failure result'

        returns:
          type: 'Result<T, IValidationErrors>'
          description: 'Failed result containing validation errors'

        custom-tags:
          protected: 'Available to subclasses'
          helper: 'Utility method for result creation'

      success:
        description: 'Helper method to create Result.ok with validated value'
        business-context: 'Standardizes success result creation for valid values'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Successfully validated value'

        returns:
          type: 'Result<T, IValidationErrors>'
          description: 'Success result containing validated value'

        custom-tags:
          protected: 'Available to subclasses'
          helper: 'Utility method for success result creation'

  AdapterUtils:
    class-doc:
      description: 'Utility class providing factory methods for creating validation adapters'
      business-context: 'Convenient utilities for quickly creating adapters without full class definitions'

      formats:
        jsdoc:
          description: 'Utility class with factory methods for validation adapters'
        cli:
          description: |
            ## AdapterUtils

            Utility class providing factory methods and utilities for creating validation adapters.
            Offers simple ways to create adapters without defining full classes, especially useful
            for quick integrations or simple validation scenarios.

            **Key Features:**
            - Factory methods for simple adapters
            - Adapter combination utilities
            - Custom error mapping support
            - Function-based adapter creation
            - Multiple adapter composition

    methods:
      create:
        description: 'Creates simple adapter from validation function'
        business-context: 'Quick factory for creating adapters from validation functions'

        parameters:
          - name: 'validateFn'
            type: '(value: T) => { success: boolean; errors?: string[] | undefined }'
            description: 'Function that validates value and returns success/errors structure'
          - name: 'errorProperty'
            type: 'string'
            description: 'Default property name for errors (defaults to empty string)'

        returns:
          type: 'IValidator<T>'
          description: 'Validator adapter wrapping the validation function'

        custom-tags:
          static: 'Static factory method'

        examples:
          - id: 'create-simple-adapter'
            code: |
              const emailValidator = AdapterUtils.create<string>(
                (email) => ({
                  success: /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email),
                  errors: /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) ? undefined : ['Invalid email format']
                }),
                'email'
              );

              const result = emailValidator.validate('invalid-email');
          - id: 'create-object-adapter'
            code: |
              const userValidator = AdapterUtils.create<User>(
                (user) => {
                  const errors: string[] = [];
                  if (!user.name) errors.push('Name is required');
                  if (!user.email) errors.push('Email is required');
                  if (user.age < 18) errors.push('Must be at least 18 years old');
                  
                  return { success: errors.length === 0, errors: errors.length > 0 ? errors : undefined };
                }
              );

      combine:
        description: 'Combines multiple adapters into single composite adapter'
        business-context: 'Merges validation logic from multiple external libraries or adapters'

        parameters:
          - name: '...adapters'
            type: 'IValidator<T>[]'
            description: 'Array of adapters to combine'

        returns:
          type: 'IValidator<T>'
          description: 'Combined adapter that runs all input adapters'

        custom-tags:
          static: 'Static factory method'

        examples:
          - id: 'combine-adapters'
            code: |
              const zodAdapter = new ZodValidationAdapter(userSchema);
              const joiAdapter = new JoiValidationAdapter(userJoiSchema);
              const customAdapter = AdapterUtils.create(customValidation);

              const combinedAdapter = AdapterUtils.combine(
                zodAdapter,
                joiAdapter, 
                customAdapter
              );

              const result = combinedAdapter.validate(user);
          - id: 'combine-with-domain'
            code: |
              const externalAdapter = new ZodValidationAdapter(schema);
              const domainAdapter = AdapterUtils.create<User>(
                user => ({
                  success: businessRule.isSatisfiedBy(user),
                  errors: businessRule.isSatisfiedBy(user) ? undefined : ['Business rule violation']
                })
              );

              const fullAdapter = AdapterUtils.combine(externalAdapter, domainAdapter);

      withErrorMapping:
        description: 'Creates adapter with custom error mapping from external library errors'
        business-context: 'Enables custom error transformation for specific external library error formats'

        parameters:
          - name: 'validateFn'
            type: '(value: T) => { success: boolean; errors?: TError[] | undefined }'
            description: 'Function that validates and returns external library errors'
          - name: 'errorMapper'
            type: 'ErrorMapper<TError>'
            description: 'Function that maps external errors to ValidationError objects'

        returns:
          type: 'IValidator<T>'
          description: 'Adapter with custom error mapping'

        custom-tags:
          static: 'Static factory method'

        examples:
          - id: 'with-error-mapping'
            code: |
              interface AjvError {
                instancePath: string;
                message: string;
                params: Record<string, unknown>;
              }

              const ajvAdapter = AdapterUtils.withErrorMapping<User, AjvError>(
                (user) => {
                  const valid = ajvValidate(user);
                  return {
                    success: valid,
                    errors: valid ? undefined : ajvValidate.errors
                  };
                },
                (ajvError) => new ValidationError(
                  ajvError.instancePath.replace('/', ''),
                  ajvError.message || 'Validation failed',
                  { params: ajvError.params, library: 'ajv' }
                )
              );

# === INTERFACES ===
interfaces:
  ErrorMapper:
    description: 'Function interface for mapping external library errors to ValidationError'
    business-context: 'Contract for converting external validation errors to domain errors'

    signature:
      parameters:
        - name: 'error'
          type: 'TExternalError'
          description: 'External library error object'
      returns:
        type: 'ValidationError'
        description: 'Domain ValidationError object'

    examples:
      - id: 'error-mapper-example'
        code: |
          // Example error mapper for Yup library
          const yupErrorMapper: ErrorMapper<YupError> = (yupError) => {
            return new ValidationError(
              yupError.path || '',
              yupError.message,
              { 
                type: yupError.type,
                value: yupError.value,
                library: 'yup'
              }
            );
          };
      - id: 'complex-error-mapper'
        code: |
          // Complex error mapper with conditional logic
          const customErrorMapper: ErrorMapper<CustomError> = (error) => {
            const property = error.field || error.path || '';
            let message = error.message;
            
            // Customize messages based on error type
            if (error.code === 'REQUIRED') {
              message = `${property} is required`;
            } else if (error.code === 'FORMAT') {
              message = `${property} has invalid format`;
            }
            
            return new ValidationError(property, message, {
              code: error.code,
              originalMessage: error.message,
              library: 'custom'
            });
          };
