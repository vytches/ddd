# Saga Discovery Plugin - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'saga-discovery-plugin'
title: 'SagaDiscoveryPlugin - Auto-Discovery Integration'
description: 'Plugin for automatic saga discovery and registration in DI containers'
business-context: 'Enables seamless saga integration with dependency injection frameworks'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  SagaDiscoveryPlugin:
    class-doc:
      description: 'Auto-discovery plugin for saga classes with decorator-based registration'
      business-context: 'Automates saga registration reducing manual configuration overhead'

      formats:
        jsdoc:
          description: 'Saga auto-discovery plugin for DI integration'
        cli:
          description: |
            ## SagaDiscoveryPlugin

            Auto-discovery plugin providing:
            - Decorator-based saga detection
            - Automatic registration with DI containers
            - Metadata extraction and validation
            - Event handler discovery
            - Compensation handler mapping
            - Configuration validation

    methods:
      constructor:
        description: 'Creates discovery plugin with optional configuration'
        business-context: 'Initializes auto-discovery with customizable behavior'

        parameters:
          - name: 'options'
            type: 'SagaDiscoveryOptions'
            description: 'Discovery configuration options'
            required: false
            default: '{}'

        examples:
          - id: 'plugin-creation'
            code: |
              const discoveryPlugin = new SagaDiscoveryPlugin({
                autoRegister: true,
                validateConfiguration: true,
                enableLogging: true,
                scanPackages: ['./sagas', './workflows'],
                excludePatterns: ['test.ts', 'spec.ts']
              });

      discover:
        description: 'Discovers saga classes in specified paths or containers'
        business-context: 'Scans codebase for saga implementations and metadata'

        parameters:
          - name: 'scanPaths'
            type: 'string[]'
            description: 'Paths to scan for saga classes'
            required: false

        returns:
          type: 'Promise<SagaDiscoveryResult>'
          description: 'Discovery results with found sagas and errors'

        examples:
          - id: 'discover-sagas'
            code: |
              const result = await discoveryPlugin.discover([
                './src/sagas',
                './src/workflows'
              ]);

              console.log(`Discovered ${result.sagaClasses.length} saga classes`);
              console.log(`Found ${result.eventHandlers.length} event handlers`);

              if (result.errors.length > 0) {
                console.error('Discovery errors:', result.errors);
              }

      registerWithContainer:
        description: 'Registers discovered sagas with dependency injection container'
        business-context: 'Integrates sagas with application DI infrastructure'

        parameters:
          - name: 'container'
            type: 'DIContainer'
            description: 'DI container for registration'

          - name: 'discoveryResult'
            type: 'SagaDiscoveryResult'
            description: 'Results from discovery process'
            required: false

        returns:
          type: 'Promise<void>'
          description: 'Completes when registration is finished'

        examples:
          - id: 'register-with-di'
            code: |
              import { VytchesDDD } from '@vytches/ddd-di';

              // Discover sagas
              const result = await discoveryPlugin.discover();

              // Register with VytchesDDD container
              await discoveryPlugin.registerWithContainer(
                VytchesDDD.container, 
                result
              );

              // Sagas now available via DI
              const orderSaga = VytchesDDD.resolve<OrderProcessingSaga>('orderProcessingSaga');

      validateSagaClass:
        description: 'Validates saga class configuration and metadata'
        business-context: 'Ensures saga classes meet framework requirements'

        parameters:
          - name: 'sagaClass'
            type: 'SagaConstructor'
            description: 'Saga class constructor to validate'

        returns:
          type: 'ValidationResult'
          description: 'Validation result with errors if any'

        examples:
          - id: 'validate-saga'
            code: |
              @Saga('OrderProcessingSaga', {
                startEvents: ['OrderCreated'],
                maxInstances: 100
              })
              class OrderProcessingSaga extends BaseSaga {
                // ... implementation
              }

              const validation = discoveryPlugin.validateSagaClass(OrderProcessingSaga);
              if (!validation.isValid) {
                console.error('Validation errors:', validation.errors);
              }

      extractMetadata:
        description: 'Extracts metadata from saga class decorators'
        business-context: 'Retrieves configuration data for saga registration'

        parameters:
          - name: 'sagaClass'
            type: 'SagaConstructor'
            description: 'Saga class to extract metadata from'

        returns:
          type: 'SagaMetadata | null'
          description: 'Extracted metadata or null if not a saga'

        examples:
          - id: 'extract-metadata'
            code: |
              const metadata = discoveryPlugin.extractMetadata(OrderProcessingSaga);

              if (metadata) {
                console.log('Saga type:', metadata.sagaType);
                console.log('Start events:', metadata.startEvents);
                console.log('Event handlers:', metadata.eventHandlers.length);
              }

      findEventHandlers:
        description: 'Finds event handler methods in saga class'
        business-context: 'Maps event types to handler methods for orchestration'

        parameters:
          - name: 'sagaClass'
            type: 'SagaConstructor'
            description: 'Saga class to scan for handlers'

        returns:
          type: 'EventHandlerMetadata[]'
          description: 'List of discovered event handlers'

        examples:
          - id: 'find-handlers'
            code: |
              const handlers = discoveryPlugin.findEventHandlers(OrderProcessingSaga);

              handlers.forEach(handler => {
                console.log(`Handler: ${handler.methodName} -> ${handler.eventType}`);
                console.log(`Options:`, handler.options);
              });

      findCompensationHandlers:
        description: 'Finds compensation handler methods in saga class'
        business-context: 'Maps steps to compensation logic for rollback scenarios'

        parameters:
          - name: 'sagaClass'
            type: 'SagaConstructor'
            description: 'Saga class to scan for compensation handlers'

        returns:
          type: 'CompensationHandlerMetadata[]'
          description: 'List of discovered compensation handlers'

        examples:
          - id: 'find-compensation-handlers'
            code: |
              const compensationHandlers = discoveryPlugin.findCompensationHandlers(OrderProcessingSaga);

              compensationHandlers.forEach(handler => {
                console.log(`Compensation: ${handler.stepName} -> ${handler.methodName}`);
              });

      enableAutoRegistration:
        description: 'Enables automatic registration of discovered sagas'
        business-context: 'Streamlines saga deployment with zero-configuration setup'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'enable-auto-registration'
            code: |
              // Enable automatic registration
              discoveryPlugin.enableAutoRegistration();

              // All discovered sagas will be automatically registered
              await discoveryPlugin.discover();

# === FUNCTIONS ===
functions:
  sagaDiscoveryPlugin:
    description: 'Factory function for creating saga discovery plugin instance'
    business-context: 'Convenience factory for quick plugin setup'

    parameters:
      - name: 'options'
        type: 'SagaDiscoveryOptions'
        description: 'Plugin configuration options'
        required: false

    returns:
      type: 'SagaDiscoveryPlugin'
      description: 'Configured plugin instance'

    examples:
      - id: 'plugin-factory'
        code: |
          // Quick plugin setup
          const plugin = sagaDiscoveryPlugin({
            autoRegister: true,
            enableLogging: true
          });

          // Use with VytchesDDD
          VytchesDDD.usePlugin(plugin);

# === TYPES ===
types:
  SagaDiscoveryOptions:
    description: 'Configuration options for saga discovery'
    business-context: 'Customizes auto-discovery behavior'

    properties:
      - name: 'autoRegister'
        type: 'boolean'
        description: 'Automatically register discovered sagas'
        default: 'true'

      - name: 'validateConfiguration'
        type: 'boolean'
        description: 'Validate saga configurations during discovery'
        default: 'true'

      - name: 'enableLogging'
        type: 'boolean'
        description: 'Enable discovery process logging'
        default: 'false'

      - name: 'scanPackages'
        type: 'string[]'
        description: 'Package paths to scan'
        default: "['./src']"

      - name: 'excludePatterns'
        type: 'string[]'
        description: 'File patterns to exclude from scanning'
        default: "['test.ts', 'spec.ts']"

      - name: 'includePatterns'
        type: 'string[]'
        description: 'File patterns to include in scanning'
        required: false

  SagaDiscoveryResult:
    description: 'Result of saga discovery process'
    business-context: 'Provides discovery outcomes and diagnostic information'

    properties:
      - name: 'sagaClasses'
        type: 'SagaClassInfo[]'
        description: 'Discovered saga classes with metadata'

      - name: 'eventHandlers'
        type: 'EventHandlerMetadata[]'
        description: 'Discovered event handler methods'

      - name: 'compensationHandlers'
        type: 'CompensationHandlerMetadata[]'
        description: 'Discovered compensation handler methods'

      - name: 'errors'
        type: 'DiscoveryError[]'
        description: 'Errors encountered during discovery'

      - name: 'statistics'
        type: 'DiscoveryStatistics'
        description: 'Discovery process statistics'

  SagaClassInfo:
    description: 'Information about discovered saga class'
    business-context: 'Combines class constructor with extracted metadata'

    properties:
      - name: 'constructor'
        type: 'SagaConstructor'
        description: 'Saga class constructor'

      - name: 'metadata'
        type: 'SagaMetadata'
        description: 'Extracted saga metadata'

      - name: 'filePath'
        type: 'string'
        description: 'Source file path'

      - name: 'className'
        type: 'string'
        description: 'Class name'

  EventHandlerMetadata:
    description: 'Metadata for event handler method'
    business-context: 'Maps events to handler methods'

    properties:
      - name: 'methodName'
        type: 'string'
        description: 'Handler method name'

      - name: 'eventType'
        type: 'string'
        description: 'Event type handled'

      - name: 'options'
        type: 'SagaEventHandlerOptions'
        description: 'Handler configuration options'

  CompensationHandlerMetadata:
    description: 'Metadata for compensation handler method'
    business-context: 'Maps steps to compensation methods'

    properties:
      - name: 'methodName'
        type: 'string'
        description: 'Compensation method name'

      - name: 'stepName'
        type: 'string'
        description: 'Step name for compensation'

      - name: 'options'
        type: 'CompensationHandlerOptions'
        description: 'Compensation configuration options'

  SagaConstructor:
    description: 'Type for saga class constructor'
    business-context: 'Represents instantiable saga class'

    type-definition: 'new (...args: any[]) => ISaga'

  DIContainer:
    description: 'Generic dependency injection container interface'
    business-context: 'Abstraction for different DI frameworks'

    methods:
      - name: 'register'
        description: 'Registers service with container'
      - name: 'resolve'
        description: 'Resolves service from container'

  DiscoveryError:
    description: 'Error encountered during saga discovery'
    business-context: 'Provides diagnostic information for discovery issues'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Error message'

      - name: 'filePath'
        type: 'string'
        description: 'Source file with error'
        required: false

      - name: 'className'
        type: 'string'
        description: 'Class name with error'
        required: false

  DiscoveryStatistics:
    description: 'Statistics about discovery process'
    business-context: 'Provides insights into discovery performance'

    properties:
      - name: 'filesScanned'
        type: 'number'
        description: 'Number of files scanned'

      - name: 'classesFound'
        type: 'number'
        description: 'Number of classes found'

      - name: 'sagasDiscovered'
        type: 'number'
        description: 'Number of saga classes discovered'

      - name: 'handlersFound'
        type: 'number'
        description: 'Number of event handlers found'

      - name: 'discoveryTimeMs'
        type: 'number'
        description: 'Discovery process duration'
