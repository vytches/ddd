# Sagas Interfaces Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'Sagas Interfaces - Export Module'
description: 'Re-exports all saga interfaces and types'
business-context: 'Type contracts for saga framework'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  description: 'Saga interface exports'
  items:
    - from: './saga.interfaces'
      exports:
        [
          'ISaga',
          'ISagaState',
          'ISagaStep',
          'ISagaActionResult',
          'ISagaExecutionContext',
          'SagaStatus',
        ]
    - from: './decorators.interfaces'
      exports: ['ISagaDecoratorOptions', 'ISagaEventHandlerOptions', 'ICompensationHandlerOptions']
    - from: './orchestrator.interfaces'
      exports:
        [
          'ISagaOrchestrator',
          'ISagaOrchestratorConfig',
          'ISagaOrchestratorStatistics',
          'ISagaProcessingResult',
        ]
    - from: './repository.interfaces'
      exports: ['ISagaRepository', 'ISagaRepositoryConfig', 'ISagaQuery', 'ISagaQueryResult']
