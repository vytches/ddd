# Saga Interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'saga.interfaces'
title: 'Saga Core Interfaces and Types'
description: 'Core interfaces and types for saga pattern implementation'
business-context: 'Defines contracts for long-running business processes with compensation support'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ISagaState:
    description: 'State container for saga instance data and metadata'
    business-context: 'Tracks saga progress, correlation, and provides persistence structure'

    properties:
      - name: 'sagaId'
        type: 'string'
        description: 'Unique identifier for the saga instance'
        required: true
        readonly: true

      - name: 'sagaType'
        type: 'string'
        description: 'Type identifier for the saga definition'
        required: true
        readonly: true

      - name: 'status'
        type: 'SagaStatus'
        description: 'Current status of the saga'
        required: true

      - name: 'currentStep'
        type: 'string'
        description: 'Current step being executed'
        required: true

      - name: 'stepData'
        type: 'Record<string, unknown>'
        description: 'Data associated with the current step'
        required: true

      - name: 'compensationData'
        type: 'Record<string, unknown>'
        description: 'Data needed for compensation actions'
        required: true

      - name: 'correlationId'
        type: 'string'
        description: 'Correlation identifier for related events/commands'
        required: true

      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional metadata for the saga'
        required: true

      - name: 'createdAt'
        type: 'Date'
        description: 'Timestamp when saga was created'
        required: true
        readonly: true

      - name: 'updatedAt'
        type: 'Date'
        description: 'Timestamp when saga was last updated'
        required: true

      - name: 'timeoutAt'
        type: 'Date | undefined'
        description: 'Optional timeout for saga completion'
        required: false

      - name: 'version'
        type: 'number'
        description: 'Version for optimistic concurrency control'
        required: true

      - name: 'error'
        type: 'SagaError'
        description: 'Error information if saga failed'
        required: false

  ISaga:
    description: 'Core saga contract defining event handling and compensation'
    business-context: 'Represents a long-running business process with error recovery'

    properties:
      - name: 'sagaId'
        type: 'string'
        description: 'Unique identifier for the saga instance'
        readonly: true

      - name: 'sagaType'
        type: 'string'
        description: 'Type identifier for the saga definition'
        readonly: true

      - name: 'status'
        type: 'SagaStatus'
        description: 'Current status of the saga'
        readonly: true

      - name: 'state'
        type: 'ISagaState'
        description: 'Current saga state'
        readonly: true

    methods:
      handleEvent:
        description: 'Handles incoming domain event'
        business-context: 'Core event processing logic for saga orchestration'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Domain event to process'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISagaActionResult>'
          description: 'Result of event processing'

      compensate:
        description: 'Executes compensation for a specific step'
        business-context: 'Implements rollback logic for failed transactions'

        parameters:
          - name: 'stepName'
            type: 'string'
            description: 'Name of the step to compensate'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISagaActionResult>'
          description: 'Result of compensation'

      canHandle:
        description: 'Checks if saga can handle the given event'
        business-context: 'Event filtering for saga routing'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Domain event to check'

        returns:
          type: 'boolean'
          description: 'True if saga can handle event'

      getCorrelationData:
        description: 'Gets correlation data for event filtering'
        business-context: 'Enables event routing and instance correlation'

        returns:
          type: 'Record<string, unknown>'
          description: 'Correlation data'

  ISagaExecutionContext:
    description: 'Execution context providing tracing and metadata'
    business-context: 'Carries correlation data and user context across saga execution'

    properties:
      - name: 'correlationId'
        type: 'string'
        description: 'Correlation identifier for tracing'
        required: true

      - name: 'userId'
        type: 'string'
        description: 'User identifier if available'
        required: false

      - name: 'tenantId'
        type: 'string'
        description: 'Tenant identifier for multi-tenancy'
        required: false

      - name: 'requestId'
        type: 'string'
        description: 'Request identifier for tracing'
        required: false

      - name: 'sessionId'
        type: 'string'
        description: 'Session identifier'
        required: false

      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Additional context metadata'
        required: true

      - name: 'timestamp'
        type: 'Date'
        description: 'Timestamp when context was created'
        required: true

      - name: 'timeout'
        type: 'number'
        description: 'Timeout for saga step execution'
        required: false

  ISagaActionResult:
    description: 'Result of saga action execution with next steps'
    business-context: 'Communicates saga step outcomes and orchestration decisions'

    properties:
      - name: 'success'
        type: 'boolean'
        description: 'Whether the action was successful'
        required: true

      - name: 'error'
        type: 'ActionError'
        description: 'Error information if action failed'
        required: false

      - name: 'commands'
        type: 'unknown[]'
        description: 'Commands to execute as result'
        required: false

      - name: 'events'
        type: 'IExtendedDomainEvent[]'
        description: 'Events to publish as result'
        required: false

      - name: 'completesSaga'
        type: 'boolean'
        description: 'Whether action triggers saga completion'
        required: false

      - name: 'requiresCompensation'
        type: 'boolean'
        description: 'Whether action triggers compensation'
        required: false

      - name: 'compensationData'
        type: 'Record<string, unknown>'
        description: 'Data to store for future compensation'
        required: false

      - name: 'nextStep'
        type: 'string'
        description: 'Next step to execute'
        required: false

      - name: 'delay'
        type: 'number'
        description: 'Delay before executing next step (ms)'
        required: false

  ISagaStep:
    description: 'Individual step in saga workflow with execution and compensation logic'
    business-context: 'Represents atomic business operation with rollback capability'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Unique name of the step'
        readonly: true

      - name: 'displayName'
        type: 'string'
        description: 'Display name for monitoring'
        readonly: true

      - name: 'description'
        type: 'string'
        description: 'Step description'
        readonly: true
        required: false

      - name: 'compensatable'
        type: 'boolean'
        description: 'Whether this step can be compensated'
        readonly: true

      - name: 'timeout'
        type: 'number | undefined'
        description: 'Timeout for step execution (ms)'
        readonly: true

      - name: 'maxRetries'
        type: 'number'
        description: 'Maximum retry attempts for this step'
        readonly: true
        required: false

      - name: 'triggerEvents'
        type: 'string[]'
        description: 'Events that can trigger this step'
        readonly: true

      - name: 'completionEvents'
        type: 'string[]'
        description: 'Events that can complete this step'
        readonly: true

    methods:
      execute:
        description: 'Executes the step logic'
        business-context: 'Core business operation implementation'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Triggering event'

          - name: 'state'
            type: 'ISagaState'
            description: 'Current saga state'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISagaActionResult>'
          description: 'Step execution result'

      compensate:
        description: 'Executes compensation logic for this step'
        business-context: 'Rollback operation for failed saga'

        parameters:
          - name: 'state'
            type: 'ISagaState'
            description: 'Current saga state'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISagaActionResult>'
          description: 'Compensation result'

        required: false

      canExecute:
        description: 'Validates that step can be executed'
        business-context: 'Pre-execution validation and guards'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Triggering event'

          - name: 'state'
            type: 'ISagaState'
            description: 'Current saga state'

        returns:
          type: 'boolean'
          description: 'True if step can execute'

  ISagaDefinition:
    description: 'Saga type definition with configuration and factory methods'
    business-context: 'Template for creating saga instances with business rules'

    properties:
      - name: 'sagaType'
        type: 'string'
        description: 'Type identifier for this saga'
        readonly: true

      - name: 'displayName'
        type: 'string'
        description: 'Display name for monitoring'
        readonly: true

      - name: 'description'
        type: 'string'
        description: 'Description of saga purpose'
        readonly: true
        required: false

      - name: 'startEvents'
        type: 'string[]'
        description: 'Events that can start this saga'
        readonly: true

      - name: 'defaultTimeout'
        type: 'number | undefined'
        description: 'Default timeout for saga completion (ms)'
        readonly: true

      - name: 'maxInstances'
        type: 'number | undefined'
        description: 'Maximum number of saga instances'
        readonly: true

      - name: 'steps'
        type: 'ISagaStep[]'
        description: 'Steps that comprise this saga'
        readonly: true

    methods:
      createInstance:
        description: 'Creates new saga instance'
        business-context: 'Factory method for saga instantiation'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Starting event'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISaga>'
          description: 'New saga instance'

      getCorrelationData:
        description: 'Gets correlation data from starting event'
        business-context: 'Extracts correlation information for routing'

        parameters:
          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Starting event'

        returns:
          type: 'Record<string, unknown>'
          description: 'Correlation data'

      validate:
        description: 'Validates saga configuration'
        business-context: 'Configuration validation for deployment safety'

        returns:
          type: 'string[]'
          description: 'Array of validation errors'

  ISagaFactory:
    description: 'Factory for creating saga instances of different types'
    business-context: 'Provides saga creation abstraction for orchestrator'

    methods:
      createSaga:
        description: 'Creates saga instance of specified type'
        business-context: 'Dynamic saga creation based on event routing'

        parameters:
          - name: 'sagaType'
            type: 'string'
            description: 'Type of saga to create'

          - name: 'event'
            type: 'IExtendedDomainEvent'
            description: 'Starting event'

          - name: 'context'
            type: 'ISagaExecutionContext'
            description: 'Execution context'

        returns:
          type: 'Promise<ISaga>'
          description: 'Created saga instance'

      canCreate:
        description: 'Checks if factory can create saga of specified type'
        business-context: 'Capability checking for saga routing'

        parameters:
          - name: 'sagaType'
            type: 'string'
            description: 'Type to check'

        returns:
          type: 'boolean'
          description: 'True if type is supported'

      getAvailableTypes:
        description: 'Gets available saga types'
        business-context: 'Discovery of supported saga types'

        returns:
          type: 'string[]'
          description: 'Array of supported types'

# === ENUMS ===
enums:
  SagaStatus:
    description: 'Saga lifecycle status enumeration'
    business-context: 'Tracks saga progress through execution and compensation phases'

    values:
      - name: 'STARTED'
        value: "'STARTED'"
        description: 'Saga has been started and is in progress'

      - name: 'EXECUTING'
        value: "'EXECUTING'"
        description: 'Saga is currently executing a step'

      - name: 'WAITING'
        value: "'WAITING'"
        description: 'Saga is waiting for an event or timeout'

      - name: 'COMPLETED'
        value: "'COMPLETED'"
        description: 'Saga completed successfully'

      - name: 'FAILED'
        value: "'FAILED'"
        description: 'Saga failed and requires compensation'

      - name: 'COMPENSATING'
        value: "'COMPENSATING'"
        description: 'Saga is executing compensation actions'

      - name: 'COMPENSATED'
        value: "'COMPENSATED'"
        description: 'Saga compensation completed successfully'

      - name: 'CANCELLED'
        value: "'CANCELLED'"
        description: 'Saga was cancelled'

      - name: 'TIMED_OUT'
        value: "'TIMED_OUT'"
        description: 'Saga timed out'

# === TYPES ===
types:
  SagaError:
    description: 'Error information for failed sagas'
    business-context: 'Provides diagnostic information for saga failures'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Error message'

      - name: 'stack'
        type: 'string'
        description: 'Error stack trace'
        required: false

      - name: 'step'
        type: 'string'
        description: 'Step where error occurred'

      - name: 'timestamp'
        type: 'Date'
        description: 'When error occurred'

  ActionError:
    description: 'Error information for failed saga actions'
    business-context: 'Provides error details for action failures'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Error message'

      - name: 'code'
        type: 'string'
        description: 'Error code'

      - name: 'details'
        type: 'Record<string, unknown>'
        description: 'Additional error details'
        required: false
