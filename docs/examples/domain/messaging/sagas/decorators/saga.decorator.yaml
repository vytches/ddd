# Saga Decorator - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'saga.decorator'
title: '@Saga Decorator - Saga Class Registration'
description: 'Decorator for marking and configuring saga classes with automatic DI registration'
business-context: 'Enables declarative saga configuration with zero-configuration dependency injection'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FUNCTIONS ===
functions:
  Saga:
    description: 'Decorator function for marking classes as sagas with configuration options'
    business-context: 'Provides declarative saga registration with automatic DI integration'

    parameters:
      - name: 'optionsOrType'
        type: 'SagaDecoratorOptions | string'
        description: 'Saga configuration options or simple saga type string'

    returns:
      type: 'ClassDecorator'
      description: 'Class decorator function for saga registration'

    examples:
      - id: 'simple-saga-decorator'
        code: |
          @Saga('OrderProcessingSaga')
          class OrderProcessingSaga extends BaseSaga {
            // Saga implementation
          }

      - id: 'advanced-saga-decorator'
        code: |
          @Saga({
            sagaType: 'OrderProcessingSaga',
            displayName: 'Order Processing Workflow',
            description: 'Handles complete order processing with payment and fulfillment',
            startEvents: ['OrderCreated', 'OrderRestarted'],
            defaultTimeout: 3600000, // 1 hour
            maxInstances: 1000,
            autoRegister: true,
            lifetime: 'transient',
            context: 'OrderManagement'
          })
          class OrderProcessingSaga extends BaseSaga {
            @SagaEventHandler('OrderCreated')
            async handleOrderCreated(event: OrderCreatedEvent): Promise<ISagaActionResult> {
              // Handle order creation
              return { success: true };
            }
            
            @CompensationHandler('ProcessPayment')
            async compensatePayment(context: ISagaExecutionContext): Promise<ISagaActionResult> {
              // Compensate payment step
              return { success: true };
            }
          }

    custom-tags:
      decorator-type: 'class'
      registration: 'automatic'

  getSagaMetadata:
    description: 'Retrieves saga metadata from decorated class'
    business-context: 'Enables runtime access to saga configuration'

    parameters:
      - name: 'target'
        type: 'Constructor'
        description: 'Saga class constructor'

    returns:
      type: 'SagaMetadata | undefined'
      description: 'Saga metadata if class is decorated, undefined otherwise'

    examples:
      - id: 'get-metadata'
        code: |
          const metadata = getSagaMetadata(OrderProcessingSaga);
          if (metadata?.saga) {
            console.log('Saga type:', metadata.saga.sagaType);
            console.log('Start events:', metadata.saga.startEvents);
            console.log('Max instances:', metadata.saga.maxInstances);
          }

  getSagaType:
    description: 'Gets saga type string from decorated class'
    business-context: 'Quick access to saga type for registration and routing'

    parameters:
      - name: 'target'
        type: 'Constructor'
        description: 'Saga class constructor'

    returns:
      type: 'string | undefined'
      description: 'Saga type if decorated, undefined otherwise'

    examples:
      - id: 'get-saga-type'
        code: |
          const sagaType = getSagaType(OrderProcessingSaga);
          console.log('Saga type:', sagaType); // 'OrderProcessingSaga'

  isSagaClass:
    description: 'Checks if class is decorated with @Saga decorator'
    business-context: 'Type guard for saga class identification'

    parameters:
      - name: 'target'
        type: 'Constructor'
        description: 'Class constructor to check'

    returns:
      type: 'boolean'
      description: 'True if class is decorated as saga'

    examples:
      - id: 'is-saga-check'
        code: |
          if (isSagaClass(SomeClass)) {
            const sagaType = getSagaType(SomeClass);
            console.log(`${SomeClass.name} is a saga of type: ${sagaType}`);
          }

  getAllSagaTypes:
    description: 'Extracts all saga types from array of class constructors'
    business-context: 'Bulk saga discovery for orchestrator registration'

    parameters:
      - name: 'targets'
        type: 'Constructor[]'
        description: 'Array of class constructors to examine'

    returns:
      type: 'string[]'
      description: 'Array of saga type strings from decorated classes'

    examples:
      - id: 'get-all-saga-types'
        code: |
          const allClasses = [
            OrderProcessingSaga,
            UserRegistrationSaga,
            RegularService, // Not a saga
            PaymentProcessingSaga
          ];

          const sagaTypes = getAllSagaTypes(allClasses);
          console.log('Found saga types:', sagaTypes);
          // Output: ['OrderProcessingSaga', 'UserRegistrationSaga', 'PaymentProcessingSaga']

# === CONSTANTS ===
constants:
  SAGA_METADATA_KEY:
    description: 'Symbol key for storing saga metadata in reflect-metadata system'
    business-context: 'Ensures metadata key uniqueness and prevents conflicts'
    type: 'Symbol'
    value: "Symbol('saga:metadata')"

  SAGA_TYPE_METADATA_KEY:
    description: 'Symbol key for storing saga type in reflect-metadata system'
    business-context: 'Quick access to saga type without full metadata retrieval'
    type: 'Symbol'
    value: "Symbol('saga:type')"

# === TYPES ===
types:
  SagaDecoratorOptions:
    description: 'Configuration options for @Saga decorator'
    business-context: 'Comprehensive saga configuration interface'

    properties:
      - name: 'sagaType'
        type: 'string'
        description: 'Unique saga type identifier'
        required: true

      - name: 'displayName'
        type: 'string'
        description: 'Human-readable name for monitoring'
        required: false
        default: 'sagaType value'

      - name: 'description'
        type: 'string'
        description: 'Saga purpose description'
        required: false
        default: 'empty string'

      - name: 'startEvents'
        type: 'string[]'
        description: 'Events that can start this saga'
        required: false
        default: '[]'

      - name: 'defaultTimeout'
        type: 'number'
        description: 'Default timeout in milliseconds'
        required: false
        default: '3600000 (1 hour)'

      - name: 'maxInstances'
        type: 'number'
        description: 'Maximum concurrent instances'
        required: false

      - name: 'autoRegister'
        type: 'boolean'
        description: 'Automatically register with DI container'
        required: false
        default: 'true'

      - name: 'lifetime'
        type: 'ServiceLifetime'
        description: 'DI service lifetime'
        required: false
        default: 'transient'

      - name: 'context'
        type: 'string'
        description: 'DI context for registration'
        required: false

  SagaMetadata:
    description: 'Complete saga metadata structure'
    business-context: 'Aggregates all saga-related metadata for runtime access'

    properties:
      - name: 'saga'
        type: 'SagaDecoratorOptions'
        description: 'Core saga configuration'
        required: false

      - name: 'eventHandlers'
        type: 'EventHandlerMetadata[]'
        description: 'Event handler method metadata'
        required: false
        default: '[]'

      - name: 'compensationHandlers'
        type: 'CompensationHandlerMetadata[]'
        description: 'Compensation handler method metadata'
        required: false
        default: '[]'
