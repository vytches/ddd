# Compensation Handler Decorator - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'compensation-handler.decorator'
title: '@CompensationHandler Decorator - Compensation Logic Registration'
description: 'Decorator for marking methods as saga compensation handlers for rollback operations'
business-context: 'Enables declarative compensation logic mapping for saga failure recovery'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FUNCTIONS ===
functions:
  CompensationHandler:
    description: 'Decorator for marking methods as saga compensation handlers'
    business-context: 'Declarative compensation logic for distributed transaction rollback'

    parameters:
      - name: 'optionsOrStepName'
        type: 'CompensationHandlerOptions | string'
        description: 'Compensation handler configuration or step name to compensate'

    returns:
      type: 'MethodDecorator'
      description: 'Method decorator for compensation handler registration'

    examples:
      - id: 'simple-compensation-handler'
        code: |
          @Saga('OrderProcessingSaga')
          class OrderProcessingSaga extends BaseSaga {
            @SagaEventHandler('OrderCreated')
            async handleOrderCreated(event: OrderCreatedEvent): Promise<ISagaActionResult> {
              // Process payment
              return { success: true };
            }
            
            @CompensationHandler('ProcessPayment')
            async compensatePayment(): Promise<ISagaActionResult> {
              const paymentData = this.state.compensationData['ProcessPayment'];
              if (paymentData?.paymentId) {
                await this.paymentService.refund(paymentData.paymentId);
              }
              return { success: true };
            }
          }

      - id: 'advanced-compensation-handler'
        code: |
          @CompensationHandler({
            stepName: 'ReserveInventory',
            timeout: 30000,
            maxRetries: 5,
            critical: true,
            order: 100
          })
          async compensateInventoryReservation(): Promise<ISagaActionResult> {
            const reservationData = this.state.compensationData['ReserveInventory'];
            
            if (reservationData?.reservationId) {
              try {
                await this.inventoryService.releaseReservation(
                  reservationData.reservationId
                );
                return { success: true };
              } catch (error) {
                // Critical compensation failed - escalate
                return {
                  success: false,
                  error: {
                    message: 'Failed to release inventory reservation',
                    code: 'COMPENSATION_FAILED',
                    escalate: true
                  }
                };
              }
            }
            
            return { success: true };
          }

      - id: 'ordered-compensation-handlers'
        code: |
          // Higher order numbers execute first during compensation
          @CompensationHandler({ stepName: 'ShipOrder', order: 300 })
          async compensateShipping(): Promise<ISagaActionResult> {
            // Cancel shipping first
            return { success: true };
          }

          @CompensationHandler({ stepName: 'ChargePayment', order: 200 })
          async compensatePayment(): Promise<ISagaActionResult> {
            // Then refund payment
            return { success: true };
          }

          @CompensationHandler({ stepName: 'ReserveInventory', order: 100 })
          async compensateInventory(): Promise<ISagaActionResult> {
            // Finally release inventory
            return { success: true };
          }

    custom-tags:
      decorator-type: 'method'
      metadata-key: 'saga:compensationHandler'
      execution-order: 'reverse-order-of-steps'

  getCompensationHandlerMetadata:
    description: 'Retrieves compensation handler metadata from decorated method'
    business-context: 'Runtime access to compensation configuration'

    parameters:
      - name: 'target'
        type: 'any'
        description: 'Target class or instance'

      - name: 'methodName'
        type: 'string'
        description: 'Name of the compensation handler method'

    returns:
      type: 'CompensationHandlerOptions | undefined'
      description: 'Handler options if method is decorated, undefined otherwise'

    examples:
      - id: 'get-compensation-metadata'
        code: |
          const metadata = getCompensationHandlerMetadata(
            OrderProcessingSaga.prototype, 
            'compensatePayment'
          );

          if (metadata) {
            console.log('Step name:', metadata.stepName);
            console.log('Critical:', metadata.critical);
            console.log('Max retries:', metadata.maxRetries);
          }

  getCompensationHandlerMethods:
    description: 'Gets all compensation handler methods from saga class'
    business-context: 'Discovery of all compensation handlers for rollback planning'

    parameters:
      - name: 'target'
        type: 'any'
        description: 'Target class or constructor'

    returns:
      type: 'Map<string, CompensationHandlerOptions>'
      description: 'Map of method names to compensation handler options'

    examples:
      - id: 'get-all-compensation-handlers'
        code: |
          const handlers = getCompensationHandlerMethods(OrderProcessingSaga);

          handlers.forEach((options, methodName) => {
            console.log(`Compensation Handler: ${methodName}`);
            console.log(`- Step: ${options.stepName}`);
            console.log(`- Critical: ${options.critical}`);
            console.log(`- Order: ${options.order}`);
          });

  isCompensationHandlerMethod:
    description: 'Checks if method is decorated as compensation handler'
    business-context: 'Type guard for compensation handler method identification'

    parameters:
      - name: 'target'
        type: 'any'
        description: 'Target class or instance'

      - name: 'methodName'
        type: 'string'
        description: 'Method name to check'

    returns:
      type: 'boolean'
      description: 'True if method is decorated as compensation handler'

    examples:
      - id: 'is-compensation-handler-check'
        code: |
          if (isCompensationHandlerMethod(OrderProcessingSaga.prototype, 'compensatePayment')) {
            console.log('compensatePayment is a compensation handler');
            
            const metadata = getCompensationHandlerMetadata(
              OrderProcessingSaga.prototype,
              'compensatePayment'
            );
            // Process compensation metadata...
          }

  getCompensationHandlerForStep:
    description: 'Finds compensation handler method for specific saga step'
    business-context: 'Runtime lookup of compensation logic for failed steps'

    parameters:
      - name: 'target'
        type: 'any'
        description: 'Target class or constructor'

      - name: 'stepName'
        type: 'string'
        description: 'Name of step to find compensation for'

    returns:
      type: '{ methodName: string; options: CompensationHandlerOptions; } | undefined'
      description: 'Handler method and options if found'

    examples:
      - id: 'find-handler-for-step'
        code: |
          const handler = getCompensationHandlerForStep(
            OrderProcessingSaga, 
            'ProcessPayment'
          );

          if (handler) {
            console.log(`Compensation method: ${handler.methodName}`);
            console.log(`Critical: ${handler.options.critical}`);
            
            // Execute compensation
            const sagaInstance = new OrderProcessingSaga(state);
            const result = await sagaInstance[handler.methodName]();
          }

  getOrderedCompensationHandlers:
    description: 'Gets compensation handlers ordered by execution priority'
    business-context: 'Ensures correct rollback sequence for distributed transactions'

    parameters:
      - name: 'target'
        type: 'any'
        description: 'Target class or constructor'

    returns:
      type: 'Array<{ methodName: string; options: CompensationHandlerOptions; }>'
      description: 'Ordered array of compensation handlers'

    examples:
      - id: 'ordered-compensation'
        code: |
          const orderedHandlers = getOrderedCompensationHandlers(OrderProcessingSaga);

          // Execute compensation in order
          for (const handler of orderedHandlers) {
            console.log(`Executing compensation: ${handler.methodName} (order: ${handler.options.order})`);
            
            try {
              const result = await sagaInstance[handler.methodName]();
              if (!result.success && handler.options.critical) {
                // Critical compensation failed - escalate
                throw new CriticalCompensationFailedError(
                  handler.options.stepName,
                  result.error?.message || 'Unknown error'
                );
              }
            } catch (error) {
              if (handler.options.critical) {
                throw error; // Stop compensation chain for critical failures
              }
              // Log non-critical failures but continue
              console.warn(`Non-critical compensation failed: ${handler.methodName}`, error);
            }
          }

# === TYPES ===
types:
  CompensationHandlerOptions:
    description: 'Configuration options for @CompensationHandler decorator'
    business-context: 'Comprehensive compensation handler configuration'

    properties:
      - name: 'stepName'
        type: 'string'
        description: 'Name of saga step this handler compensates'
        required: true

      - name: 'timeout'
        type: 'number'
        description: 'Compensation execution timeout in milliseconds'
        required: false

      - name: 'maxRetries'
        type: 'number'
        description: 'Maximum retry attempts on compensation failure'
        required: false
        default: '3'

      - name: 'critical'
        type: 'boolean'
        description: 'Whether compensation failure should escalate'
        required: false
        default: 'true'

      - name: 'order'
        type: 'number'
        description: 'Execution order (lower numbers execute first)'
        required: false
        default: '0'
