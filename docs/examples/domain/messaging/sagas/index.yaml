# Sagas Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'Sagas - Main Export Module'
description: 'Re-exports all saga-related functionality'
business-context: 'Central access point for saga framework components'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  description: 'Complete saga framework exports'
  items:
    - from: './base'
      exports: ['BaseSaga', 'ConcreteSagaStep', 'SagaDefinition', 'SagaStep']
    - from: './decorators'
      exports: ['Saga', 'SagaEventHandler', 'CompensationHandler']
    - from: './interfaces'
      exports:
        [
          'ISaga',
          'ISagaStep',
          'ISagaState',
          'ISagaActionResult',
          'ISagaExecutionContext',
          'SagaStatus',
        ]
    - from: './errors'
      exports: ['SagaError', 'SagaExecutionError', 'SagaCompensationError', 'SagaTimeoutError']
    - from: './orchestrator'
      exports: ['SagaOrchestrator']
    - from: './repository'
      exports: ['InMemorySagaRepository']
    - from: './middleware'
      exports: ['SagaMiddlewarePipeline', 'LoggingMiddleware', 'RetryMiddleware']
    - from: './discovery'
      exports: ['SagaDiscoveryPlugin']
