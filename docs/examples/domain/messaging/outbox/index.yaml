# Outbox Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'outbox-index'
title: 'Outbox Pattern - Module Exports'
description: 'Re-exports all outbox pattern components for external consumption'
business-context: 'Provides unified access to outbox pattern infrastructure'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  outbox-interfaces:
    description: 'Core interfaces, enums, and types for outbox pattern'
    includes:
      - 'IOutboxMessage'
      - 'OutboxMessageOptions'
      - 'IOutboxMessageHandler'
      - 'OutboxMiddleware'
      - 'MessageStatus'
      - 'MessagePriority'
    business-context: 'Foundation types for message structure and processing'

  outbox-repository.interface:
    description: 'Abstract repository interface for message persistence'
    includes:
      - 'IOutboxRepository'
    business-context: 'Storage abstraction for different database implementations'

  outbox-message-factory:
    description: 'Factory utilities for creating outbox messages'
    includes:
      - 'OutboxMessageFactory'
    business-context: 'Consistent message creation patterns'

  outbox-processor:
    description: 'Message processing engine with retry and middleware support'
    includes:
      - 'OutboxProcessor'
      - 'EventBusOutboxHandler'
      - 'OutboxProcessorOptions'
    business-context: 'Core processing infrastructure for reliable delivery'

  outbox-service:
    description: 'High-level service for outbox operations'
    includes:
      - 'OutboxService'
      - 'OutboxServiceOptions'
    business-context: 'Simplified API for common outbox operations'

# === MODULE OVERVIEW ===
module-overview:
  description: 'Complete outbox pattern implementation for reliable message delivery'
  business-context: 'Ensures message delivery in distributed systems by persisting messages before sending'

  key-components:
    - name: 'Message Structure'
      description: 'IOutboxMessage with status tracking and metadata'

    - name: 'Repository Pattern'
      description: 'Pluggable persistence layer for different databases'

    - name: 'Processing Engine'
      description: 'Configurable processor with retry logic and middleware'

    - name: 'Service Layer'
      description: 'High-level API with convenience methods'

    - name: 'Factory Pattern'
      description: 'Consistent message creation utilities'

  usage-patterns:
    - pattern: 'Basic Message Publishing'
      description: 'Save messages for reliable delivery'

    - pattern: 'Scheduled Messages'
      description: 'Delay message processing for time-based workflows'

    - pattern: 'Priority Processing'
      description: 'Handle critical messages first'

    - pattern: 'Domain Event Integration'
      description: 'Bridge domain events with outbox pattern'

    - pattern: 'Batch Operations'
      description: 'Efficient bulk message handling'

  integration-points:
    - component: 'Event Bus'
      description: 'EventBusOutboxHandler publishes to event bus'

    - component: 'Domain Events'
      description: 'Convert domain events to outbox messages'

    - component: 'Repository'
      description: 'Pluggable storage implementations'

    - component: 'Middleware'
      description: 'Cross-cutting concerns like logging and validation'
