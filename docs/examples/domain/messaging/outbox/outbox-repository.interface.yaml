# Outbox Repository Interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'outbox-repository.interface'
title: 'IOutboxRepository - Persistence Contract'
description: 'Abstract repository interface for outbox message persistence'
business-context: 'Defines storage contract for reliable message delivery infrastructure'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  IOutboxRepository:
    class-doc:
      description: 'Abstract repository interface for outbox message persistence'
      business-context: 'Provides storage abstraction for different database implementations'

      formats:
        jsdoc:
          description: 'Abstract repository for outbox message persistence'
        cli:
          description: |
            ## IOutboxRepository

            Repository abstraction supporting:
            - Message persistence and retrieval
            - Priority-based message querying
            - Batch operations for performance
            - Status tracking and updates
            - Scheduled message handling
            - Cleanup operations

    methods:
      saveMessage:
        description: 'Saves a message to the outbox'
        business-context: 'Persists individual message for reliable delivery'

        generic-parameters:
          - name: 'T'
            default: 'unknown'
            description: 'Type of the message payload'

        parameters:
          - name: 'message'
            type: 'IOutboxMessage<T>'
            description: 'Message to persist'

        returns:
          type: 'Promise<string>'
          description: 'ID of the saved message'

        custom-tags:
          abstract: 'true'
          transactional: 'Should be atomic for data consistency'

        examples:
          - id: 'save-message'
            code: |
              const message: IOutboxMessage = {
                id: 'msg-123',
                messageType: 'user.created',
                payload: { userId: '456' },
                status: MessageStatus.PENDING,
                // ... other properties
              };

              const messageId = await repository.saveMessage(message);

      saveBatch:
        description: 'Saves multiple messages to the outbox in a single operation'
        business-context: 'Enables efficient bulk message persistence'

        generic-parameters:
          - name: 'T'
            default: 'unknown'
            description: 'Type of the message payload'

        parameters:
          - name: 'messages'
            type: 'IOutboxMessage<T>[]'
            description: 'Array of messages to persist'

        returns:
          type: 'Promise<string[]>'
          description: 'Array of saved message IDs'

        custom-tags:
          abstract: 'true'
          transactional: 'Should be atomic for all-or-nothing semantics'
          performance: 'More efficient than multiple saveMessage calls'

        examples:
          - id: 'batch-save'
            code: |
              const messages: IOutboxMessage[] = [
                { id: 'msg-1', messageType: 'user.created', /* ... */ },
                { id: 'msg-2', messageType: 'email.sent', /* ... */ }
              ];

              const messageIds = await repository.saveBatch(messages);

      getUnprocessedMessages:
        description: 'Gets unprocessed messages from the outbox ordered by priority'
        business-context: 'Retrieves messages for processing with priority ordering'

        parameters:
          - name: 'limit'
            type: 'number'
            description: 'Maximum number of messages to retrieve'
            required: false

          - name: 'priorityOrder'
            type: 'MessagePriority[]'
            description: 'Order of priority for processing'
            required: false
            default: '[CRITICAL, HIGH, NORMAL, LOW]'

        returns:
          type: 'Promise<IOutboxMessage[]>'
          description: 'Array of unprocessed messages ordered by priority'

        custom-tags:
          abstract: 'true'
          ordering: 'Should respect priority order and creation timestamp'
          filtering: 'Only returns PENDING status messages ready for processing'

        examples:
          - id: 'get-unprocessed'
            code: |
              // Get next 20 messages for processing
              const messages = await repository.getUnprocessedMessages(20);

              // Custom priority order
              const highPriorityFirst = await repository.getUnprocessedMessages(
                10, 
                [MessagePriority.HIGH, MessagePriority.CRITICAL]
              );

      getById:
        description: 'Gets a specific message by its ID'
        business-context: 'Retrieves message for tracking and debugging purposes'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Message ID to retrieve'

        returns:
          type: 'Promise<IOutboxMessage | null>'
          description: 'Message if found, null otherwise'

        custom-tags:
          abstract: 'true'

        examples:
          - id: 'get-by-id'
            code: |
              const message = await repository.getById('msg-123');
              if (message) {
                console.log('Status:', message.status);
                console.log('Attempts:', message.attempts);
              }

      updateStatus:
        description: 'Updates message status and optionally stores error information'
        business-context: 'Tracks processing state and failure reasons'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Message ID to update'

          - name: 'status'
            type: 'MessageStatus'
            description: 'New status to set'

          - name: 'error'
            type: 'Error'
            description: 'Optional error information for failed messages'
            required: false

        returns:
          type: 'Promise<void>'
          description: 'Completes when status is updated'

        custom-tags:
          abstract: 'true'
          atomic: 'Should be atomic operation'

        examples:
          - id: 'update-status'
            code: |
              // Mark as processing
              await repository.updateStatus('msg-123', MessageStatus.PROCESSING);

              // Mark as failed with error
              const error = new Error('Handler not found');
              await repository.updateStatus('msg-123', MessageStatus.FAILED, error);

      updateStatusBatch:
        description: 'Updates status for multiple messages in a single operation'
        business-context: 'Efficient bulk status updates for operational tasks'

        parameters:
          - name: 'ids'
            type: 'string[]'
            description: 'Array of message IDs to update'

          - name: 'status'
            type: 'MessageStatus'
            description: 'New status to set for all messages'

        returns:
          type: 'Promise<void>'
          description: 'Completes when all statuses are updated'

        custom-tags:
          abstract: 'true'
          transactional: 'Should be atomic for data consistency'

        examples:
          - id: 'batch-update'
            code: |
              const failedIds = ['msg-123', 'msg-124', 'msg-125'];
              await repository.updateStatusBatch(failedIds, MessageStatus.PENDING);

      incrementAttempt:
        description: 'Increments the attempt counter for a message'
        business-context: 'Tracks retry attempts for failed message processing'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Message ID to increment'

        returns:
          type: 'Promise<number>'
          description: 'Updated attempt count'

        custom-tags:
          abstract: 'true'
          atomic: 'Should be atomic increment operation'

        examples:
          - id: 'increment-attempts'
            code: |
              const attempts = await repository.incrementAttempt('msg-123');
              if (attempts >= MAX_RETRIES) {
                await repository.updateStatus('msg-123', MessageStatus.FAILED);
              }

      deleteByStatusAndAge:
        description: 'Deletes messages with specified status older than threshold'
        business-context: 'Cleanup operation to maintain database performance'

        parameters:
          - name: 'olderThan'
            type: 'Date'
            description: 'Delete messages created before this date'

          - name: 'status'
            type: 'MessageStatus'
            description: 'Status of messages to delete'

        returns:
          type: 'Promise<number>'
          description: 'Number of messages deleted'

        custom-tags:
          abstract: 'true'
          cleanup: 'Maintenance operation for old records'

        examples:
          - id: 'cleanup-old'
            code: |
              // Delete processed messages older than 30 days
              const cutoff = new Date();
              cutoff.setDate(cutoff.getDate() - 30);

              const deletedCount = await repository.deleteByStatusAndAge(
                cutoff, 
                MessageStatus.PROCESSED
              );

      scheduleMessage:
        description: 'Schedules a message for delayed processing'
        business-context: 'Enables time-based message delivery for business workflows'

        generic-parameters:
          - name: 'T'
            default: 'unknown'
            description: 'Type of the message payload'

        parameters:
          - name: 'message'
            type: 'IOutboxMessage<T>'
            description: 'Message to schedule'

          - name: 'processAfter'
            type: 'Date'
            description: 'When to process the message'

        returns:
          type: 'Promise<string>'
          description: 'ID of the scheduled message'

        custom-tags:
          abstract: 'true'
          scheduling: 'Message should not be returned by getUnprocessedMessages until processAfter'

        examples:
          - id: 'schedule-message'
            code: |
              const scheduledTime = new Date(Date.now() + 24 * 60 * 60 * 1000);
              const messageId = await repository.scheduleMessage(
                reminderMessage, 
                scheduledTime
              );
