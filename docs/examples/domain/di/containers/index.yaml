# Containers Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'DI Containers Module Index'
description: 'Container implementations for dependency injection'
business-context: 'Built-in container implementations with enterprise features'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  ContainerBuilder:
    description: 'Fluent builder for configuring dependency containers'
    business-context: 'Enables fluent configuration of DI containers with lifetime management and service registration'
    source: './container-builder'
    export-type: 'class'

    formats:
      jsdoc:
        description: 'Fluent builder for DI container configuration'
      cli:
        description: |
          ## ContainerBuilder
          Fluent builder pattern for container configuration:
          - Service registration with lifetime management
          - Factory and instance registration
          - Configuration validation
          - Builder pattern for complex scenarios

  SimpleContainer:
    description: 'Lightweight dependency injection container'
    business-context: 'Production-ready DI container with service lifetime management, factory support, and enterprise features'
    source: './simple-container'
    export-type: 'class'

    formats:
      jsdoc:
        description: 'Lightweight DI container implementation'
      cli:
        description: |
          ## SimpleContainer
          Complete DI container implementation:
          - Service registration and resolution
          - Lifetime management (Singleton, Transient, Scoped)
          - Factory and instance support
          - Tag-based service discovery
          - Circular dependency detection

# === MODULE OVERVIEW ===
module:
  purpose: 'Built-in Container Implementations'
  description: 'Production-ready dependency injection containers with enterprise features'
  patterns:
    - 'Dependency Injection Container pattern'
    - 'Service Locator pattern integration'
    - 'Factory pattern for service creation'
    - 'Builder pattern for configuration'

  features:
    - 'Service lifetime management (Singleton, Transient, Scoped)'
    - 'Factory function support for custom service creation'
    - 'Instance registration for pre-created services'
    - 'Tag-based service discovery and filtering'
    - 'Circular dependency detection and prevention'
    - 'Service descriptor introspection'
    - 'Thread-safe service resolution'
    - 'Configuration validation and error handling'

# === USAGE EXAMPLES ===
examples:
  - id: 'container-builder-usage'
    title: 'Using ContainerBuilder for Configuration'
    code: |
      import { ContainerBuilder } from '@vytches/ddd-di/containers';

      // Configure container with builder
      const container = ContainerBuilder.create()
        .register('userService', UserService, { 
          lifetime: ServiceLifetime.Singleton,
          tags: ['domain-service'] 
        })
        .registerFactory('configService', () => new ConfigService(process.env))
        .registerInstance('logger', new Logger())
        .build();

      // Use with VytchesDDD
      VytchesDDD.configure(container);

  - id: 'simple-container-direct'
    title: 'Direct SimpleContainer Usage'
    code: |
      import { SimpleContainer, ServiceLifetime } from '@vytches/ddd-di/containers';

      // Direct container usage
      const container = new SimpleContainer();

      container.register('userService', UserService, { 
        lifetime: ServiceLifetime.Singleton 
      });

      container.registerFactory('dynamicService', (container) => {
        const dep = container.resolve('userService');
        return new DynamicService(dep);
      });

      // Resolve services
      const userService = container.resolve<UserService>('userService');
      const dynamicService = container.resolve<DynamicService>('dynamicService');
