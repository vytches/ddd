# DI Errors - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'errors'
title: 'DI Errors - Dependency Injection Error Types'
description: 'Comprehensive error hierarchy for dependency injection operations'
business-context: 'Type-safe error handling for enterprise dependency injection scenarios'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  DIError:
    class-doc:
      description: 'Base error class for all dependency injection operations'
      business-context: 'Root error type providing consistent error handling across DI operations'

      formats:
        jsdoc:
          description: 'Base DI error with optional cause chaining'
        cli:
          description: |
            ## DIError
            Base error class for dependency injection:
            - Extends BaseError from domain-primitives
            - Supports error cause chaining
            - Consistent error messaging
            - Type-safe error handling

    constructor:
      description: 'Create a new DIError instance'
      business-context: 'Initialize base DI error with message and optional cause chain'
      parameters:
        - name: 'message'
          type: 'string'
          description: 'Error message describing the failure'
        - name: 'cause'
          type: 'Error'
          description: 'Optional underlying error that caused this error'
          optional: true
      examples:
        - id: 'basic-error'
          code: |
            throw new DIError('Dependency injection operation failed');

        - id: 'chained-error'
          code: |
            try {
              // Some operation that fails
            } catch (originalError) {
              throw new DIError('Service resolution failed', originalError);
            }

    properties:
      cause:
        description: 'Optional underlying error that caused this DI error'
        type: 'Error | undefined'
        business-context: 'Enables error cause chaining for debugging and error analysis'

  ServiceNotFoundError:
    class-doc:
      description: 'Error thrown when a requested service cannot be found'
      business-context: 'Indicates service registration or resolution configuration issues'

      formats:
        jsdoc:
          description: 'Service resolution failure error'
        cli:
          description: |
            ## ServiceNotFoundError
            Thrown when service resolution fails:
            - Indicates missing service registration
            - Includes context information when available
            - Provides clear error messaging for debugging
            - Helps identify DI configuration issues

    constructor:
      description: 'Create a ServiceNotFoundError'
      business-context: 'Initialize error with service token information and optional context'
      parameters:
        - name: 'token'
          type: 'ServiceToken'
          description: 'Service token that could not be resolved'
        - name: 'context'
          type: 'string'
          description: 'Optional context name where resolution was attempted'
          optional: true
      examples:
        - id: 'service-not-found'
          code: |
            // Thrown during service resolution
            const service = container.resolve<UserService>('userService');
            // Throws: ServiceNotFoundError("Service 'userService' not found")

        - id: 'context-specific-error'
          code: |
            // With context information
            const service = VytchesDDD.resolve<OrderService>('orderService', 'OrderManagement');
            // Throws: ServiceNotFoundError("Service 'orderService' not found in context 'OrderManagement'")

  CircularDependencyError:
    class-doc:
      description: 'Error thrown when circular dependencies are detected'
      business-context: 'Prevents infinite loops and stack overflow errors in dependency resolution'

      formats:
        jsdoc:
          description: 'Circular dependency detection error'
        cli:
          description: |
            ## CircularDependencyError
            Thrown when circular dependencies are detected:
            - Prevents infinite resolution loops
            - Shows complete dependency chain
            - Helps identify architectural issues
            - Essential for enterprise application stability

    constructor:
      description: 'Create a CircularDependencyError'
      business-context: 'Initialize error with complete resolution chain showing circular dependency'
      parameters:
        - name: 'resolutionChain'
          type: 'ServiceToken[]'
          description: 'Array of service tokens showing the circular dependency path'
      examples:
        - id: 'circular-dependency'
          code: |
            // Services with circular dependencies
            class ServiceA {
              constructor(serviceB: ServiceB) {}
            }

            class ServiceB {
              constructor(serviceA: ServiceA) {}  
            }

            container.register('serviceA', ServiceA);
            container.register('serviceB', ServiceB);

            // Throws CircularDependencyError: "Circular dependency detected: serviceA -> serviceB -> serviceA"
            container.resolve<ServiceA>('serviceA');

  InvalidRegistrationError:
    class-doc:
      description: 'Error thrown for invalid service registration attempts'
      business-context: 'Indicates configuration errors in service registration parameters'

      formats:
        jsdoc:
          description: 'Service registration validation error'
        cli:
          description: |
            ## InvalidRegistrationError
            Thrown for invalid service registrations:
            - Null or undefined implementations
            - Invalid factory functions
            - Malformed service tokens
            - Configuration validation failures

    constructor:
      description: 'Create an InvalidRegistrationError'
      business-context: 'Initialize error with service token and specific validation failure reason'
      parameters:
        - name: 'token'
          type: 'ServiceToken'
          description: 'Service token that failed registration validation'
        - name: 'reason'
          type: 'string'
          description: 'Specific reason why the registration is invalid'
      examples:
        - id: 'null-implementation'
          code: |
            // Null implementation
            container.register('userService', null);
            // Throws: InvalidRegistrationError("Invalid registration for service 'userService': Implementation cannot be null or undefined")

        - id: 'invalid-factory'
          code: |
            // Invalid factory function
            container.registerFactory('configService', null);
            // Throws: InvalidRegistrationError("Invalid registration for service 'configService': Factory cannot be null or undefined")

  ServiceAlreadyRegisteredError:
    class-doc:
      description: 'Error thrown when attempting to register a service that is already registered'
      business-context: 'Prevents accidental service overrides and configuration conflicts'

      formats:
        jsdoc:
          description: 'Duplicate service registration error'
        cli:
          description: |
            ## ServiceAlreadyRegisteredError
            Thrown when service is already registered:
            - Prevents accidental service overrides
            - Maintains DI container integrity
            - Includes context information
            - Helps identify configuration conflicts

    constructor:
      description: 'Create a ServiceAlreadyRegisteredError'
      business-context: 'Initialize error with service token and optional context information'
      parameters:
        - name: 'token'
          type: 'ServiceToken'
          description: 'Service token that is already registered'
        - name: 'context'
          type: 'string'
          description: 'Optional context name where registration was attempted'
          optional: true
      examples:
        - id: 'duplicate-registration'
          code: |
            container.register('userService', UserService);
            container.register('userService', AnotherUserService);
            // Throws: ServiceAlreadyRegisteredError("Service 'userService' is already registered")

        - id: 'context-duplicate'
          code: |
            container.register('orderService', OrderService, { context: 'OrderManagement' });
            container.register('orderService', AnotherOrderService, { context: 'OrderManagement' });
            // Throws: ServiceAlreadyRegisteredError("Service 'orderService' is already registered in context 'OrderManagement'")

  ContainerConfigurationError:
    class-doc:
      description: 'Error thrown for container setup and configuration failures'
      business-context: 'Indicates problems with container initialization and global configuration'

      formats:
        jsdoc:
          description: 'Container setup and configuration error'
        cli:
          description: |
            ## ContainerConfigurationError
            Thrown for container configuration issues:
            - Missing global container setup
            - Invalid container instances
            - Configuration validation failures
            - Setup sequence problems

    constructor:
      description: 'Create a ContainerConfigurationError'
      business-context: 'Initialize error with configuration failure details and optional cause'
      parameters:
        - name: 'message'
          type: 'string'
          description: 'Specific configuration error message'
        - name: 'cause'
          type: 'Error'
          description: 'Optional underlying error that caused the configuration failure'
          optional: true
      examples:
        - id: 'missing-configuration'
          code: |
            // Attempting to resolve without configuring container
            VytchesDDD.resolve<UserService>('userService');
            // Throws: ContainerConfigurationError("No global container configured. Call configure() first.")

        - id: 'invalid-container'
          code: |
            // Configuring with null container
            VytchesDDD.configure(null);
            // Throws: ContainerConfigurationError("Container cannot be null or undefined")

  ContainerDisposedError:
    class-doc:
      description: 'Error thrown when attempting to use a disposed container'
      business-context: 'Prevents operations on containers that have been cleaned up'

      formats:
        jsdoc:
          description: 'Disposed container usage error'
        cli:
          description: |
            ## ContainerDisposedError
            Thrown when using disposed containers:
            - Prevents use-after-dispose scenarios
            - Ensures proper resource management
            - Indicates lifecycle management issues
            - Helps prevent memory leaks

    constructor:
      description: 'Create a ContainerDisposedError'
      business-context: 'Initialize error indicating container has been disposed'
      examples:
        - id: 'disposed-container'
          code: |
            const container = new SimpleContainer();
            container.dispose();

            // Any subsequent operations throw this error
            container.resolve<UserService>('userService');
            // Throws: ContainerDisposedError("Container has been disposed and cannot be used")

# === ERROR HANDLING PATTERNS ===
patterns:
  error-recovery:
    title: 'Error Recovery Patterns'
    description: 'Best practices for handling DI errors in enterprise applications'
    example: |
      try {
        const userService = VytchesDDD.resolve<UserService>('userService');
        return await userService.getUser(id);
      } catch (error) {
        if (error instanceof ServiceNotFoundError) {
          // Service not registered - configuration issue
          logger.error('Service registration missing', { service: 'userService', error });
          throw new ApplicationError('User service unavailable');
        }
        
        if (error instanceof CircularDependencyError) {
          // Architectural problem - needs immediate attention
          logger.critical('Circular dependency detected', { error });
          throw new SystemError('Application configuration error');
        }
        
        if (error instanceof ContainerDisposedError) {
          // Application shutdown scenario
          logger.warn('Container disposed during operation', { error });
          throw new ApplicationError('Application shutting down');
        }
        
        // Unknown DI error
        logger.error('Dependency injection failure', { error });
        throw error;
      }

  graceful-fallback:
    title: 'Graceful Fallback Pattern'
    description: 'Provide fallback services when primary services are unavailable'
    example: |
      function createUserService(): UserService {
        try {
          return VytchesDDD.resolve<UserService>('userService');
        } catch (error) {
          if (error instanceof ServiceNotFoundError) {
            logger.warn('Primary user service not available, using fallback');
            return new FallbackUserService();
          }
          throw error;
        }
      }

  validation-chain:
    title: 'Registration Validation Chain'
    description: 'Validate container configuration at startup'
    example: |
      function validateContainerConfiguration(): void {
        const requiredServices = [
          'userService',
          'orderService', 
          'paymentService',
          'logger',
          'database'
        ];
        
        const missingServices: string[] = [];
        
        for (const service of requiredServices) {
          try {
            if (!VytchesDDD.isRegistered(service)) {
              missingServices.push(service);
            }
          } catch (error) {
            if (error instanceof ContainerConfigurationError) {
              throw new ApplicationError('DI container not properly configured');
            }
            throw error;
          }
        }
        
        if (missingServices.length > 0) {
          throw new ApplicationError(
            `Required services not registered: ${missingServices.join(', ')}`
          );
        }
      }

# === DEBUGGING SUPPORT ===
debugging:
  error-context:
    title: 'Error Context Information'
    description: 'DI errors provide rich context for debugging'
    features:
      - 'Service token information in error messages'
      - 'Context names for bounded context isolation'
      - 'Resolution chain for circular dependency tracking'
      - 'Cause chaining for root cause analysis'

  logging-integration:
    title: 'Integration with Logging System'
    description: 'DI errors integrate with VytchesDDD logging for debugging'
    example: |
      // Errors are automatically logged with context
      try {
        const service = VytchesDDD.resolve<UserService>('userService');
      } catch (error) {
        // Error is logged with:
        // - Service token attempted
        // - Resolution context
        // - Stack trace
        // - Cause chain if applicable
        logger.error('Service resolution failed', { 
          serviceToken: 'userService',
          error: error.message,
          cause: error.cause?.message 
        });
      }
