# Service Locator - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'service-locator'
title: 'ServiceLocator & VytchesDDD - Global Service Locator'
description: 'Enterprise service locator with context isolation and auto-discovery'
business-context: 'Global service resolution following MediatR pattern for enterprise applications'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IServiceLocator:
    description: 'Service locator contract with context isolation support'
    business-context: 'Enables bounded context separation in DDD applications'

    methods:
      configure:
        description: 'Configure the global container'
        business-context: 'One-time setup for application-wide service resolution'
        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Container instance to use globally'
        returns:
          type: 'void'
          description: 'No return value'
        examples:
          - id: 'basic-configure'
            code: |
              const container = new SimpleContainer();
              serviceLocator.configure(container);

      configureContext:
        description: 'Configure a context-specific container'
        business-context: 'Enables bounded context isolation in enterprise DDD systems'
        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Name of the bounded context'
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Container instance for the context'
        returns:
          type: 'void'
          description: 'No return value'
        examples:
          - id: 'context-setup'
            code: |
              const orderContext = new SimpleContainer();
              serviceLocator.configureContext('OrderManagement', orderContext);

      resolve:
        description: 'Smart resolution: context-aware when available, global otherwise'
        business-context: 'Resolves services with automatic context detection and fallback'
        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service token to resolve'
          - name: 'context'
            type: 'string'
            description: 'Optional context name for resolution'
            optional: true
        returns:
          type: 'T'
          description: 'Resolved service instance'
        custom-tags:
          smart-resolution: 'Automatically detects context from call stack'
          fallback-strategy: 'Falls back to global container if context resolution fails'

# === CLASSES ===
classes:
  ServiceLocator:
    class-doc:
      description: 'Core service locator implementation with singleton pattern'
      business-context: 'Central service resolution point with enterprise context isolation'

      formats:
        jsdoc:
          description: 'Singleton service locator with context support'
        cli:
          description: |
            ## ServiceLocator
            Enterprise service locator implementation providing:
            - Global service resolution
            - Bounded context isolation
            - Auto-discovery system
            - Call stack context detection
            - Resource cleanup and disposal

    methods:
      getInstance:
        description: 'Get the singleton instance'
        business-context: 'Ensures single service locator instance across application'
        returns:
          type: 'ServiceLocator'
          description: 'Singleton ServiceLocator instance'
        custom-tags:
          static: true
          pattern: 'Singleton'
        examples:
          - id: 'singleton-access'
            code: |
              const locator = ServiceLocator.getInstance();

      configure:
        description: 'Configure the global container'
        business-context: 'Primary setup method for application-wide DI container'
        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Container instance to use globally'
        throws:
          - type: 'ContainerConfigurationError'
            description: 'When container is null or undefined'
        examples:
          - id: 'global-setup'
            code: |
              const container = new SimpleContainer();
              locator.configure(container);

      resolve:
        description: 'Resolve service with smart context detection'
        business-context: 'Enterprise service resolution with automatic context awareness'
        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service token to resolve'
          - name: 'context'
            type: 'string'
            description: 'Optional context name'
            optional: true
        returns:
          type: 'T'
          description: 'Resolved service instance'
        throws:
          - type: 'ContainerConfigurationError'
            description: 'When no global container is configured'
          - type: 'ServiceNotFoundError'
            description: 'When service is not registered in any container'
        custom-tags:
          resolution-order: '1. Context-specific, 2. Auto-detected context, 3. Global'
          call-stack-detection: 'Automatically detects bounded context from file paths'
        examples:
          - id: 'context-resolution'
            code: |
              // Context-specific resolution
              const service = locator.resolve<OrderService>('orderService', 'OrderManagement');

              // Auto-detection from call stack
              const autoDetected = locator.resolve<UserService>('userService');

      discoverAndRegisterHandlers:
        description: 'Auto-discover and register handlers through plugin system'
        business-context: 'Automatically registers domain services, command handlers, query handlers'
        parameters:
          - name: 'assemblies'
            type: 'any[]'
            description: 'Optional assemblies to scan for handlers'
            optional: true
        returns:
          type: 'Promise<void>'
          description: 'Completes when all handlers are registered'
        throws:
          - type: 'ContainerConfigurationError'
            description: 'When no global container is configured'
        custom-tags:
          auto-discovery: 'Scans for @DomainService, @CommandHandler, @QueryHandler decorators'
          plugin-system: 'Extensible through IHandlerDiscoveryPlugin implementations'
        examples:
          - id: 'auto-discovery'
            code: |
              // Register all decorated handlers
              await locator.discoverAndRegisterHandlers();

              // Scan specific modules
              await locator.discoverAndRegisterHandlers([UserModule, OrderModule]);

      reset:
        description: 'Reset the service locator (useful for testing)'
        business-context: 'Clean slate for test isolation and development scenarios'
        returns:
          type: 'void'
          description: 'No return value'
        examples:
          - id: 'test-reset'
            code: |
              // Clean up between tests
              locator.reset();

      dispose:
        description: 'Dispose of all containers and clean up resources'
        business-context: 'Proper resource cleanup for application shutdown'
        returns:
          type: 'void'
          description: 'No return value'
        examples:
          - id: 'cleanup'
            code: |
              // Application shutdown
              locator.dispose();

  VytchesDDD:
    class-doc:
      description: 'Global service locator facade (primary API)'
      business-context: 'Main entry point following MediatR pattern for enterprise DI'

      formats:
        jsdoc:
          description: 'Static facade for VytchesDDD service location'
        cli:
          description: |
            ## VytchesDDD Facade
            Primary API for enterprise dependency injection:
            - Static methods for ease of use
            - MediatR-inspired design
            - Global service locator pattern
            - Context-aware resolution
            - Auto-discovery capabilities

    methods:
      configure:
        description: "Primary setup method (like MediatR's AddMediatR)"
        business-context: 'One-time application setup for global service resolution'
        parameters:
          - name: 'container'
            type: 'IDependencyContainer'
            description: 'Container instance for global services'
        returns:
          type: 'void'
          description: 'No return value'
        custom-tags:
          static: true
          pattern: 'Service Locator'
          inspired-by: 'MediatR.AddMediatR()'
        examples:
          - id: 'primary-setup'
            code: |
              import { VytchesDDD, SimpleContainer } from '@vytches/ddd-di';

              // Primary application setup
              const container = new SimpleContainer();
              VytchesDDD.configure(container);

      resolve:
        description: 'Smart service resolution with context awareness'
        business-context: 'Main method for service resolution in enterprise applications'
        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service token to resolve'
          - name: 'context'
            type: 'string'
            description: 'Optional bounded context name'
            optional: true
        returns:
          type: 'T'
          description: 'Resolved service instance'
        custom-tags:
          static: true
          smart-resolution: 'Context-aware with automatic fallback'
        examples:
          - id: 'service-resolution'
            code: |
              // Basic resolution
              const userService = VytchesDDD.resolve<UserService>('userService');

              // Context-specific resolution
              const orderService = VytchesDDD.resolve<OrderService>('orderService', 'OrderManagement');

      discoverAndRegisterHandlers:
        description: 'Auto-discover and register decorated handlers'
        business-context: 'Automatically registers all @DomainService, @CommandHandler, @QueryHandler'
        parameters:
          - name: 'assemblies'
            type: 'any[]'
            description: 'Optional assemblies to scan'
            optional: true
        returns:
          type: 'Promise<void>'
          description: 'Completes when discovery is finished'
        custom-tags:
          static: true
          auto-discovery: true
        examples:
          - id: 'handler-discovery'
            code: |
              // Discover all handlers in application
              await VytchesDDD.discoverAndRegisterHandlers();

# === INTEGRATION EXAMPLES ===
integration:
  nestjs:
    title: 'NestJS Integration with Bridge Pattern'
    description: 'Avoid double instance risk using bridge pattern'
    code: |
      @Injectable()
      export class UserController {
        private readonly userService: UserService;
        
        constructor() {
          // Bridge to VytchesDDD instance
          this.userService = VytchesDDD.resolve<UserService>('userService');
        }
        
        @Post('users')
        async createUser(@Body() data: CreateUserData) {
          return await this.userService.createUser(data);
        }
      }

      @Module({
        controllers: [UserController],
      })
      export class UserModule implements OnModuleInit {
        async onModuleInit() {
          // Initialize VytchesDDD before NestJS DI
          await VytchesDDD.configure();
        }
      }

  context-detection:
    title: 'Automatic Context Detection'
    description: 'Call stack analysis for bounded context resolution'
    code: |
      // File: /src/order-context/services/order.service.ts
      export class OrderService {
        processOrder() {
          // Auto-detects 'order' context from file path
          const paymentService = VytchesDDD.resolve<PaymentService>('paymentService');
          // Resolves from OrderManagement context if available
        }
      }
