# Handler Discovery Registry - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'handler-discovery-registry'
title: 'HandlerDiscoveryRegistry - Plugin Management System'
description: 'Registry for managing and coordinating handler discovery plugins'
business-context: 'Central coordination point for auto-discovery plugins in enterprise applications'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  HandlerDiscoveryRegistry:
    class-doc:
      description: 'Registry for managing and coordinating handler discovery plugins'
      business-context: 'Central management system for all auto-discovery plugins with error handling and logging'

      formats:
        jsdoc:
          description: 'Plugin registry for handler auto-discovery'
        cli:
          description: |
            ## HandlerDiscoveryRegistry
            Central registry for discovery plugins:
            - Plugin lifecycle management
            - Availability checking before registration
            - Coordinated discovery across all plugins
            - Error handling and graceful degradation
            - Debug logging for plugin operations

    constructor:
      description: 'Create a new HandlerDiscoveryRegistry instance'
      business-context: 'Initialize registry with empty plugin collection'
      examples:
        - id: 'basic-registry'
          code: |
            const registry = new HandlerDiscoveryRegistry();

    methods:
      registerPlugin:
        description: 'Register a discovery plugin'
        business-context: 'Add plugin to registry with availability validation'
        parameters:
          - name: 'plugin'
            type: 'IHandlerDiscoveryPlugin'
            description: 'Plugin instance to register'
        custom-tags:
          availability-check: 'Only registers plugin if isAvailable() returns true'
          debug-logging: 'Logs registration success and failures'
        examples:
          - id: 'plugin-registration'
            code: |
              const cqrsPlugin = new CQRSDiscoveryPlugin();
              registry.registerPlugin(cqrsPlugin);
              // Logs: "Registered handler discovery plugin: cqrs-discovery"

          - id: 'unavailable-plugin'
            code: |
              const missingDepsPlugin = new RequiresMissingDepsPlugin();
              registry.registerPlugin(missingDepsPlugin);
              // Logs: "Plugin requires-missing-deps not available, skipping registration"

      discoverAllHandlers:
        description: 'Discover handlers from all registered plugins'
        business-context: 'Coordinated discovery with error handling and aggregation across all plugins'
        parameters:
          - name: 'assemblies'
            type: 'any[]'
            description: 'Optional assemblies to scan across all plugins'
            optional: true
        returns:
          type: 'Promise<HandlerInfo[]>'
          description: 'Aggregated array of all discovered handlers'
        custom-tags:
          error-handling: "Individual plugin failures don't stop overall discovery"
          aggregation: 'Combines results from all successful plugins'
          debug-logging: 'Logs discovery progress and results per plugin'
        examples:
          - id: 'full-discovery'
            code: |
              const handlers = await registry.discoverAllHandlers([
                UserModule,
                OrderModule,
                PaymentModule
              ]);

              console.log(`Total handlers discovered: ${handlers.length}`);
              // Logs per plugin:
              // "Discovering handlers with plugin: cqrs-discovery"
              // "Plugin cqrs-discovery discovered 12 handlers"
              // "Discovering handlers with plugin: domain-services"
              // "Plugin domain-services discovered 8 handlers"

          - id: 'discovery-with-errors'
            code: |
              // Even if some plugins fail, others continue
              const handlers = await registry.discoverAllHandlers();

              // Logs for failed plugin:
              // "Plugin problematic-plugin failed to discover handlers: Error details"
              // Logs for successful plugins continue normally

      getRegisteredPlugins:
        description: 'Get all registered plugin names'
        business-context: 'Plugin introspection for debugging and system monitoring'
        returns:
          type: 'string[]'
          description: 'Array of registered plugin names'
        examples:
          - id: 'plugin-inspection'
            code: |
              const pluginNames = registry.getRegisteredPlugins();
              console.log('Active discovery plugins:', pluginNames);
              // Output: ['cqrs-discovery', 'domain-services', 'event-handlers']

      clear:
        description: 'Clear all registered plugins (useful for testing)'
        business-context: 'Test isolation and registry cleanup for unit testing'
        returns:
          type: 'void'
          description: 'No return value'
        custom-tags:
          testing: 'Primarily for test cleanup between test cases'
        examples:
          - id: 'test-cleanup'
            code: |
              // In test setup
              beforeEach(() => {
                registry.clear(); // Clean slate for each test
              });

# === PLUGIN COORDINATION ===
coordination:
  error-handling:
    title: 'Graceful Error Handling'
    description: "Individual plugin failures don't prevent overall discovery"
    example: |
      // Registry handles plugin failures gracefully
      async discoverAllHandlers(assemblies?: any[]): Promise<HandlerInfo[]> {
        const allHandlers: HandlerInfo[] = [];
        
        for (const [name, plugin] of this.plugins) {
          try {
            console.debug(`Discovering handlers with plugin: ${name}`);
            const handlers = await plugin.discoverHandlers(assemblies);
            allHandlers.push(...handlers);
            console.debug(`Plugin ${name} discovered ${handlers.length} handlers`);
          } catch (error) {
            // Log error but continue with other plugins
            console.warn(`Plugin ${name} failed to discover handlers:`, error);
          }
        }
        
        return allHandlers;
      }

  plugin-lifecycle:
    title: 'Plugin Lifecycle Management'
    description: 'Complete plugin lifecycle from registration to execution'
    stages:
      registration:
        description: 'Plugin registration with availability checking'
        code: |
          registerPlugin(plugin: IHandlerDiscoveryPlugin): void {
            if (plugin.isAvailable()) {
              this.plugins.set(plugin.name, plugin);
              console.debug(`Registered handler discovery plugin: ${plugin.name}`);
            } else {
              console.debug(`Plugin ${plugin.name} not available, skipping registration`);
            }
          }

      discovery:
        description: 'Coordinated discovery execution across all plugins'
        code: |
          // Each plugin discovers handlers from its domain
          for (const [name, plugin] of this.plugins) {
            const handlers = await plugin.discoverHandlers(assemblies);
            allHandlers.push(...handlers);
          }

      aggregation:
        description: 'Results aggregation and deduplication'
        code: |
          // Combine results from all plugins
          const allHandlers = [];
          // ... collect from all plugins
          return allHandlers; // No deduplication by design - handled by DI container

# === INTEGRATION EXAMPLES ===
integration:
  application-startup:
    title: 'Application Startup Integration'
    description: 'Complete setup with multiple discovery plugins'
    example: |
      import { HandlerDiscoveryRegistry } from '@vytches/ddd-di';
      import { CQRSDiscoveryPlugin } from '@vytches/ddd-cqrs';
      import { EventDiscoveryPlugin } from '@vytches/ddd-events';

      export class ApplicationBootstrap {
        private readonly discoveryRegistry = new HandlerDiscoveryRegistry();
        
        async setupAutoDiscovery(): Promise<void> {
          // Register all available plugins
          this.discoveryRegistry.registerPlugin(new CQRSDiscoveryPlugin());
          this.discoveryRegistry.registerPlugin(new EventDiscoveryPlugin());
          this.discoveryRegistry.registerPlugin(new DomainServicesPlugin());
          
          // Log registered plugins
          const plugins = this.discoveryRegistry.getRegisteredPlugins();
          console.log(`Registered ${plugins.length} discovery plugins:`, plugins);
          
          // Discover all handlers
          const allHandlers = await this.discoveryRegistry.discoverAllHandlers([
            // Application modules
            UserModule,
            OrderModule,
            PaymentModule,
            NotificationModule
          ]);
          
          console.log(`Auto-discovery completed: ${allHandlers.length} handlers found`);
          
          // Handlers are automatically registered with VytchesDDD
          return allHandlers;
        }
      }

  modular-plugin-loading:
    title: 'Modular Plugin Loading'
    description: 'Conditional plugin loading based on available packages'
    example: |
      export class PluginManager {
        private readonly registry = new HandlerDiscoveryRegistry();
        
        loadAvailablePlugins(): void {
          // Core plugins (always available)
          this.registry.registerPlugin(new DomainServicesPlugin());
          
          // Conditional plugins based on package availability
          this.tryLoadCQRSPlugin();
          this.tryLoadEventsPlugin();
          this.tryLoadMessagingPlugin();
          
          const plugins = this.registry.getRegisteredPlugins();
          console.log(`Loaded ${plugins.length} discovery plugins`);
        }
        
        private tryLoadCQRSPlugin(): void {
          try {
            const { CQRSDiscoveryPlugin } = require('@vytches/ddd-cqrs/plugins');
            this.registry.registerPlugin(new CQRSDiscoveryPlugin());
          } catch (error) {
            console.debug('CQRS discovery plugin not available');
          }
        }
        
        private tryLoadEventsPlugin(): void {
          try {
            const { EventDiscoveryPlugin } = require('@vytches/ddd-events/plugins');
            this.registry.registerPlugin(new EventDiscoveryPlugin());
          } catch (error) {
            console.debug('Events discovery plugin not available');
          }
        }
        
        async discoverAll(modules: any[]): Promise<HandlerInfo[]> {
          return await this.registry.discoverAllHandlers(modules);
        }
      }

  testing-support:
    title: 'Testing Support'
    description: 'Registry features for unit testing and isolation'
    example: |
      describe('HandlerDiscoveryRegistry', () => {
        let registry: HandlerDiscoveryRegistry;
        
        beforeEach(() => {
          registry = new HandlerDiscoveryRegistry();
        });
        
        afterEach(() => {
          // Clean up between tests
          registry.clear();
        });
        
        it('should register available plugins', () => {
          const mockPlugin = {
            name: 'test-plugin',
            isAvailable: () => true,
            discoverHandlers: () => []
          };
          
          registry.registerPlugin(mockPlugin);
          
          const plugins = registry.getRegisteredPlugins();
          expect(plugins).toContain('test-plugin');
        });
        
        it('should skip unavailable plugins', () => {
          const unavailablePlugin = {
            name: 'unavailable-plugin',
            isAvailable: () => false,
            discoverHandlers: () => []
          };
          
          registry.registerPlugin(unavailablePlugin);
          
          const plugins = registry.getRegisteredPlugins();
          expect(plugins).not.toContain('unavailable-plugin');
        });
        
        it('should handle plugin errors gracefully', async () => {
          const errorPlugin = {
            name: 'error-plugin',
            isAvailable: () => true,
            discoverHandlers: () => { throw new Error('Plugin error'); }
          };
          
          const workingPlugin = {
            name: 'working-plugin',
            isAvailable: () => true,
            discoverHandlers: () => [{ type: 'command', /* ... */ }]
          };
          
          registry.registerPlugin(errorPlugin);
          registry.registerPlugin(workingPlugin);
          
          const handlers = await registry.discoverAllHandlers();
          
          // Should return handlers from working plugin despite error plugin failure
          expect(handlers).toHaveLength(1);
        });
      });

# === PERFORMANCE CONSIDERATIONS ===
performance:
  lazy-loading:
    title: 'Lazy Plugin Loading'
    description: 'Load plugins only when needed to improve startup time'

  caching:
    title: 'Discovery Result Caching'
    description: 'Cache discovery results for faster subsequent operations'

  parallel-discovery:
    title: 'Parallel Plugin Execution'
    description: 'Execute plugin discovery in parallel for better performance'
    example: |
      async discoverAllHandlers(assemblies?: any[]): Promise<HandlerInfo[]> {
        // Execute all plugins in parallel
        const discoveryPromises = Array.from(this.plugins.entries()).map(
          async ([name, plugin]) => {
            try {
              const handlers = await plugin.discoverHandlers(assemblies);
              console.debug(`Plugin ${name} discovered ${handlers.length} handlers`);
              return handlers;
            } catch (error) {
              console.warn(`Plugin ${name} failed:`, error);
              return [];
            }
          }
        );
        
        const results = await Promise.all(discoveryPromises);
        return results.flat();
      }
