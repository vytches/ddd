# Discovery Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'DI Discovery Module Index'
description: 'Handler discovery interfaces and registry for automatic service registration'
business-context: 'Auto-discovery system for command handlers, query handlers, and domain services'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === EXPORTS ===
exports:
  IHandlerDiscoveryPlugin:
    description: 'Interface for handler discovery plugins'
    business-context: 'Plugin interface for discovering and registering handlers automatically'
    source: './handler-discovery.interface'
    export-type: 'interface'

    formats:
      jsdoc:
        description: 'Plugin interface for handler auto-discovery'
      cli:
        description: |
          ## IHandlerDiscoveryPlugin
          Plugin interface for automatic handler discovery:
          - Discovers command handlers, query handlers, domain services
          - Plugin-based extensibility for custom discovery logic
          - Integration with decorator-based registration

  IHandlerDiscoveryRegistry:
    description: 'Registry interface for managing discovery plugins'
    business-context: 'Central registry for managing multiple discovery plugins and coordinating handler registration'
    source: './handler-discovery.interface'
    export-type: 'interface'

    formats:
      jsdoc:
        description: 'Registry for managing discovery plugins'
      cli:
        description: |
          ## IHandlerDiscoveryRegistry
          Central registry for discovery coordination:
          - Manages multiple discovery plugins
          - Coordinates handler registration
          - Provides unified discovery interface

  HandlerInfo:
    description: 'Type for handler metadata information'
    business-context: 'Metadata structure containing handler registration details and configuration'
    source: './handler-discovery.interface'
    export-type: 'type'

    formats:
      jsdoc:
        description: 'Handler metadata type definition'
      cli:
        description: |
          ## HandlerInfo
          Handler metadata structure:
          - Handler class constructor
          - Registration options and configuration
          - Decorator metadata and tags

  HandlerDiscoveryRegistry:
    description: 'Concrete implementation of handler discovery registry'
    business-context: 'Production-ready registry implementation for coordinating multiple discovery plugins'
    source: './handler-discovery-registry'
    export-type: 'class'

    formats:
      jsdoc:
        description: 'Concrete registry implementation for handler discovery'
      cli:
        description: |
          ## HandlerDiscoveryRegistry
          Production discovery registry:
          - Plugin registration and management
          - Handler discovery coordination
          - Service registration automation
          - Metadata caching and optimization

# === MODULE OVERVIEW ===
module:
  purpose: 'Auto-Discovery System'
  description: 'Automatic service and handler discovery system with plugin-based extensibility'
  patterns:
    - 'Plugin pattern for extensible discovery'
    - 'Registry pattern for centralized management'
    - 'Decorator pattern for metadata collection'
    - 'Observer pattern for discovery notifications'

  features:
    - 'Automatic handler discovery via decorators'
    - 'Plugin-based extensibility for custom discovery logic'
    - 'Central registry for coordinating multiple plugins'
    - 'Metadata extraction from decorated classes'
    - 'Integration with VytchesDDD service registration'
    - 'Support for command handlers, query handlers, domain services'
    - 'Configuration validation and error handling'
    - 'Performance optimization with metadata caching'

# === DISCOVERY WORKFLOW ===
workflow:
  steps:
    - step: 1
      name: 'Plugin Registration'
      description: 'Register discovery plugins with the registry'
    - step: 2
      name: 'Handler Scanning'
      description: 'Plugins scan for decorated classes and extract metadata'
    - step: 3
      name: 'Metadata Processing'
      description: 'Registry processes handler metadata and prepares registration'
    - step: 4
      name: 'Service Registration'
      description: 'Handlers are registered with the DI container automatically'
    - step: 5
      name: 'Validation'
      description: 'Registry validates registration and reports any conflicts'

# === USAGE EXAMPLES ===
examples:
  - id: 'discovery-setup'
    title: 'Setting Up Auto-Discovery'
    code: |
      import { 
        HandlerDiscoveryRegistry,
        IHandlerDiscoveryPlugin 
      } from '@vytches/ddd-di/discovery';

      // Create discovery registry
      const discoveryRegistry = new HandlerDiscoveryRegistry();

      // Register discovery plugins
      discoveryRegistry.registerPlugin(new CommandHandlerDiscoveryPlugin());
      discoveryRegistry.registerPlugin(new QueryHandlerDiscoveryPlugin());
      discoveryRegistry.registerPlugin(new DomainServiceDiscoveryPlugin());

      // Run discovery and registration
      const handlerInfos = await discoveryRegistry.discoverHandlers();

      // Handlers are automatically registered with VytchesDDD
      console.log(`Discovered ${handlerInfos.length} handlers`);

  - id: 'custom-discovery-plugin'
    title: 'Custom Discovery Plugin'
    code: |
      import { IHandlerDiscoveryPlugin, HandlerInfo } from '@vytches/ddd-di/discovery';

      export class CustomDiscoveryPlugin implements IHandlerDiscoveryPlugin {
        getName(): string {
          return 'custom-plugin';
        }
        
        async discover(): Promise<HandlerInfo[]> {
          const handlers: HandlerInfo[] = [];
          
          // Custom discovery logic
          const decoratedClasses = this.scanForDecorators('@CustomHandler');
          
          for (const cls of decoratedClasses) {
            handlers.push({
              constructor: cls,
              options: this.extractOptions(cls),
              metadata: this.extractMetadata(cls)
            });
          }
          
          return handlers;
        }
      }
