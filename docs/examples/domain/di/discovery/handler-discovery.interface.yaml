# Handler Discovery Interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'handler-discovery.interface'
title: 'Handler Discovery Interfaces - Auto-Discovery System Contracts'
description: 'Interfaces for plugin-based handler discovery and registration system'
business-context: 'Enables automatic registration of domain services, command handlers, and query handlers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  HandlerInfo:
    description: 'Metadata about discovered handler or domain service'
    business-context: 'Provides complete information needed for automatic service registration'

    properties:
      - name: 'type'
        type: "'command' | 'query' | 'event' | 'domain-service'"
        description: 'Type of handler or service discovered'
        business-context: 'Determines registration strategy and DI container configuration'

      - name: 'messageType'
        type: 'Constructor'
        description: 'Message type constructor (for handlers) or service constructor (for domain services)'
        business-context: 'Used as service token for message-to-handler mappings'

      - name: 'handlerType'
        type: 'Constructor'
        description: 'Handler or service constructor'
        business-context: 'Actual implementation class to be registered in DI container'

      - name: 'metadata'
        type: 'any'
        description: 'DI metadata from decorator (options, configuration, etc.)'
        business-context: 'Contains decorator configuration like lifetime, context, tags'

    examples:
      - id: 'command-handler-info'
        code: |
          // Command handler discovery
          const handlerInfo: HandlerInfo = {
            type: 'command',
            messageType: CreateUserCommand,
            handlerType: CreateUserCommandHandler,
            metadata: {
              lifetime: ServiceLifetime.Transient,
              context: 'UserManagement',
              tags: ['command-handler']
            }
          };

      - id: 'domain-service-info'
        code: |
          // Domain service discovery
          const serviceInfo: HandlerInfo = {
            type: 'domain-service',
            messageType: UserService, // Service itself
            handlerType: UserService,
            metadata: {
              serviceId: 'userService',
              lifetime: ServiceLifetime.Singleton,
              tags: ['domain-service']
            }
          };

  IHandlerDiscoveryPlugin:
    description: 'Interface for handler discovery plugin implementations'
    business-context: 'Enables extensible auto-discovery for different frameworks and patterns'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Plugin name for identification and debugging'
        business-context: 'Used in logging and plugin management'
        readonly: true

    methods:
      discoverHandlers:
        description: "Discover handlers from the plugin's domain"
        business-context: 'Core discovery method - scans assemblies/modules for decorated classes'
        parameters:
          - name: 'assemblies'
            type: 'any[]'
            description: 'Optional assemblies or modules to scan'
            optional: true
        returns:
          type: 'Promise<HandlerInfo[]> | HandlerInfo[]'
          description: 'Array of discovered handlers (sync or async)'
        examples:
          - id: 'cqrs-discovery'
            code: |
              // CQRS plugin discovering handlers
              async discoverHandlers(assemblies?: any[]): Promise<HandlerInfo[]> {
                const handlers: HandlerInfo[] = [];
                
                for (const assembly of assemblies || []) {
                  // Scan for @CommandHandler decorated classes
                  const commandHandlers = this.scanForCommandHandlers(assembly);
                  handlers.push(...commandHandlers);
                  
                  // Scan for @QueryHandler decorated classes
                  const queryHandlers = this.scanForQueryHandlers(assembly);
                  handlers.push(...queryHandlers);
                }
                
                return handlers;
              }

          - id: 'domain-services-discovery'
            code: |
              // Domain services plugin
              discoverHandlers(assemblies?: any[]): HandlerInfo[] {
                const services: HandlerInfo[] = [];
                
                for (const assembly of assemblies || []) {
                  // Scan for @DomainService decorated classes
                  const domainServices = this.scanForDomainServices(assembly);
                  services.push(...domainServices);
                }
                
                return services;
              }

      isAvailable:
        description: 'Check if the plugin is available (dependencies installed)'
        business-context: 'Prevents plugin registration when required dependencies are missing'
        returns:
          type: 'boolean'
          description: 'True if plugin can be used'
        examples:
          - id: 'availability-check'
            code: |
              // Check if CQRS dependencies are available
              isAvailable(): boolean {
                try {
                  require('@vytches/ddd-cqrs');
                  return true;
                } catch {
                  return false;
                }
              }

  IHandlerDiscoveryRegistry:
    description: 'Registry for managing discovery plugins'
    business-context: 'Central coordination point for all discovery plugins in the system'

    methods:
      registerPlugin:
        description: 'Register a discovery plugin'
        business-context: 'Add new plugin to the discovery system for auto-registration'
        parameters:
          - name: 'plugin'
            type: 'IHandlerDiscoveryPlugin'
            description: 'Plugin instance to register'
        examples:
          - id: 'plugin-registration'
            code: |
              // Register CQRS discovery plugin
              const cqrsPlugin = new CQRSDiscoveryPlugin();
              registry.registerPlugin(cqrsPlugin);

              // Register domain services plugin
              const domainPlugin = new DomainServicesPlugin();
              registry.registerPlugin(domainPlugin);

      discoverAllHandlers:
        description: 'Discover handlers from all registered plugins'
        business-context: 'Coordinated discovery across all plugins for complete auto-registration'
        parameters:
          - name: 'assemblies'
            type: 'any[]'
            description: 'Optional assemblies to scan across all plugins'
            optional: true
        returns:
          type: 'Promise<HandlerInfo[]>'
          description: 'Array of all discovered handlers from all plugins'
        examples:
          - id: 'full-discovery'
            code: |
              // Discover all handlers across plugins
              const allHandlers = await registry.discoverAllHandlers([
                UserModule,
                OrderModule,
                PaymentModule
              ]);

              console.log(`Discovered ${allHandlers.length} handlers`);

      getRegisteredPlugins:
        description: 'Get all registered plugin names'
        business-context: 'Plugin introspection for debugging and system monitoring'
        returns:
          type: 'string[]'
          description: 'Array of plugin names'
        examples:
          - id: 'plugin-list'
            code: |
              const plugins = registry.getRegisteredPlugins();
              console.log('Available discovery plugins:', plugins);

# === PLUGIN PATTERNS ===
patterns:
  cqrs-plugin:
    title: 'CQRS Discovery Plugin'
    description: 'Plugin for discovering command and query handlers'
    example: |
      export class CQRSDiscoveryPlugin implements IHandlerDiscoveryPlugin {
        readonly name = 'cqrs-discovery';
        
        async discoverHandlers(assemblies?: any[]): Promise<HandlerInfo[]> {
          const handlers: HandlerInfo[] = [];
          
          for (const assembly of assemblies || this.getDefaultAssemblies()) {
            // Scan for command handlers
            for (const [name, constructor] of Object.entries(assembly)) {
              if (this.isCommandHandler(constructor)) {
                const metadata = Reflect.getMetadata('command-handler', constructor);
                handlers.push({
                  type: 'command',
                  messageType: metadata.commandType,
                  handlerType: constructor as Constructor,
                  metadata
                });
              }
              
              if (this.isQueryHandler(constructor)) {
                const metadata = Reflect.getMetadata('query-handler', constructor);
                handlers.push({
                  type: 'query',
                  messageType: metadata.queryType,
                  handlerType: constructor as Constructor,
                  metadata
                });
              }
            }
          }
          
          return handlers;
        }
        
        isAvailable(): boolean {
          try {
            require('@vytches/ddd-cqrs');
            return true;
          } catch {
            return false;
          }
        }
        
        private isCommandHandler(constructor: any): boolean {
          return Reflect.hasMetadata('command-handler', constructor);
        }
        
        private isQueryHandler(constructor: any): boolean {
          return Reflect.hasMetadata('query-handler', constructor);
        }
      }

  domain-services-plugin:
    title: 'Domain Services Discovery Plugin'
    description: 'Plugin for discovering @DomainService decorated classes'
    example: |
      export class DomainServicesPlugin implements IHandlerDiscoveryPlugin {
        readonly name = 'domain-services';
        
        discoverHandlers(assemblies?: any[]): HandlerInfo[] {
          const services: HandlerInfo[] = [];
          
          for (const assembly of assemblies || this.getDefaultAssemblies()) {
            for (const [name, constructor] of Object.entries(assembly)) {
              if (this.isDomainService(constructor)) {
                const metadata = Reflect.getMetadata('domain-service', constructor);
                services.push({
                  type: 'domain-service',
                  messageType: constructor as Constructor,
                  handlerType: constructor as Constructor,
                  metadata
                });
              }
            }
          }
          
          return services;
        }
        
        isAvailable(): boolean {
          return true; // No external dependencies
        }
        
        private isDomainService(constructor: any): boolean {
          return Reflect.hasMetadata('domain-service', constructor);
        }
      }

  event-handlers-plugin:
    title: 'Event Handlers Discovery Plugin'
    description: 'Plugin for discovering event handlers'
    example: |
      export class EventHandlersPlugin implements IHandlerDiscoveryPlugin {
        readonly name = 'event-handlers';
        
        async discoverHandlers(assemblies?: any[]): Promise<HandlerInfo[]> {
          const handlers: HandlerInfo[] = [];
          
          for (const assembly of assemblies || this.getDefaultAssemblies()) {
            for (const [name, constructor] of Object.entries(assembly)) {
              if (this.isEventHandler(constructor)) {
                const metadata = Reflect.getMetadata('event-handler', constructor);
                handlers.push({
                  type: 'event',
                  messageType: metadata.eventType,
                  handlerType: constructor as Constructor,
                  metadata
                });
              }
            }
          }
          
          return handlers;
        }
        
        isAvailable(): boolean {
          try {
            require('@vytches/ddd-events');
            return true;
          } catch {
            return false;
          }
        }
        
        private isEventHandler(constructor: any): boolean {
          return Reflect.hasMetadata('event-handler', constructor);
        }
      }

# === USAGE PATTERNS ===
usage:
  plugin-registration:
    title: 'Plugin Registration Pattern'
    description: 'How to register discovery plugins in application startup'
    example: |
      // Application startup
      import { VytchesDDD, SimpleContainer } from '@vytches/ddd-di';
      import { CQRSDiscoveryPlugin, DomainServicesPlugin, EventHandlersPlugin } from './plugins';

      async function setupDependencyInjection() {
        // Configure container
        const container = new SimpleContainer();
        VytchesDDD.configure(container);
        
        // Register discovery plugins
        VytchesDDD.registerDiscoveryPlugin(new CQRSDiscoveryPlugin());
        VytchesDDD.registerDiscoveryPlugin(new DomainServicesPlugin());
        VytchesDDD.registerDiscoveryPlugin(new EventHandlersPlugin());
        
        // Auto-discover and register all handlers
        await VytchesDDD.discoverAndRegisterHandlers([
          UserModule,
          OrderModule,
          PaymentModule,
          NotificationModule
        ]);
        
        console.log('Auto-discovery completed');
      }

  conditional-plugin-loading:
    title: 'Conditional Plugin Loading'
    description: 'Load plugins based on available dependencies'
    example: |
      function registerAvailablePlugins() {
        const plugins: IHandlerDiscoveryPlugin[] = [];
        
        // Core plugins (always available)
        plugins.push(new DomainServicesPlugin());
        
        // Optional plugins based on available packages
        try {
          require('@vytches/ddd-cqrs');
          plugins.push(new CQRSDiscoveryPlugin());
        } catch {
          console.log('CQRS package not available, skipping CQRS discovery');
        }
        
        try {
          require('@vytches/ddd-events');
          plugins.push(new EventHandlersPlugin());
        } catch {
          console.log('Events package not available, skipping event handler discovery');
        }
        
        // Register available plugins
        plugins.forEach(plugin => {
          if (plugin.isAvailable()) {
            VytchesDDD.registerDiscoveryPlugin(plugin);
          }
        });
      }
