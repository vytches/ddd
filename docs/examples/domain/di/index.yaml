# DI Package Index - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'DI Package - Enterprise Dependency Injection System'
description: 'Main entry point for enterprise dependency injection with global service locator'
business-context: 'Provides unified interface for DI container abstractions and service resolution'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === PACKAGE EXPORTS ===
exports:
  types:
    ServiceLifetime:
      description: 'Enum defining service lifetime strategies'
      business-context: 'Controls instance creation and lifecycle management'
      values:
        - name: 'Transient'
          value: "'transient'"
          description: 'New instance created for each resolution'
        - name: 'Singleton'
          value: "'singleton'"
          description: 'Single instance shared across all resolutions'
        - name: 'Scoped'
          value: "'scoped'"
          description: 'Instance scoped to specific context or request'

    ServiceToken:
      description: 'Union type for service identification tokens'
      business-context: 'Flexible service identification using strings, symbols, or constructors'
      definition: 'string | symbol | Constructor<T>'

    Constructor:
      description: 'Generic constructor type'
      business-context: 'Type-safe constructor reference for dependency injection'
      definition: 'new (...args: any[]) => T'

    ServiceFactory:
      description: 'Factory function for creating service instances'
      business-context: 'Enables custom service instantiation logic with container access'
      definition: '(container: IDependencyContainer) => T'

  interfaces:
    IDependencyContainer:
      description: 'Core container abstraction for dependency injection'
      business-context: 'Framework-agnostic container interface for enterprise DI systems'

    IServiceLocator:
      description: 'Global service locator with context isolation'
      business-context: 'Enterprise service location with bounded context support'

    IContainerBuilder:
      description: 'Fluent builder interface for container configuration'
      business-context: 'Type-safe container setup with method chaining'

  classes:
    VytchesDDD:
      description: 'Global service locator facade (main API entry point)'
      business-context: 'Primary interface following MediatR pattern for enterprise DI'

    ServiceLocator:
      description: 'Core service locator implementation with context isolation'
      business-context: 'Singleton pattern with context-aware resolution'

    SimpleContainer:
      description: 'Built-in lightweight dependency injection container'
      business-context: 'Production-ready container with lifetime management'

    ContainerBuilder:
      description: 'Fluent builder for configuring dependency containers'
      business-context: 'Type-safe container configuration with method chaining'

    BaseContainerAdapter:
      description: 'Base class for external framework adapters'
      business-context: 'Enables integration with NestJS, InversifyJS, TSyringe, etc.'

  errors:
    DIError:
      description: 'Base error for dependency injection operations'
      business-context: 'Root error type for all DI-related failures'

    ServiceNotFoundError:
      description: 'Service resolution failure error'
      business-context: 'Thrown when requested service cannot be located'

    CircularDependencyError:
      description: 'Circular dependency detection error'
      business-context: 'Prevents infinite loops in dependency resolution'

    ContainerConfigurationError:
      description: 'Container setup and configuration error'
      business-context: 'Thrown during container initialization failures'

# === DISCOVERY SYSTEM ===
discovery:
  HandlerDiscoveryRegistry:
    description: 'Registry for auto-discovery plugins'
    business-context: 'Enables automatic handler registration through plugin system'

  IHandlerDiscoveryPlugin:
    description: 'Interface for discovery plugin implementations'
    business-context: 'Extensible auto-discovery for domain services and handlers'

# === EXAMPLES ===
examples:
  - id: 'basic-setup'
    title: 'Basic VytchesDDD Setup'
    code: |
      import { VytchesDDD, SimpleContainer } from '@vytches/ddd-di';

      // One-time global setup
      const container = new SimpleContainer();
      VytchesDDD.configure(container);

      // Services are now available globally
      const userService = VytchesDDD.resolve<UserService>('userService');

  - id: 'context-isolation'
    title: 'Bounded Context Setup'
    code: |
      import { VytchesDDD, SimpleContainer } from '@vytches/ddd-di';

      // Global container
      const globalContainer = new SimpleContainer();
      VytchesDDD.configure(globalContainer);

      // Context-specific container
      const orderContainer = new SimpleContainer();
      VytchesDDD.configureContext('OrderManagement', orderContainer);

      // Context-aware resolution
      const orderService = VytchesDDD.resolve<OrderService>('orderService', 'OrderManagement');

  - id: 'service-lifetimes'
    title: 'Service Lifetime Management'
    code: |
      import { VytchesDDD, SimpleContainer, ServiceLifetime } from '@vytches/ddd-di';

      const container = new SimpleContainer();

      // Transient service (new instance each time)
      container.register('logger', ConsoleLogger, { 
        lifetime: ServiceLifetime.Transient 
      });

      // Singleton service (shared instance)
      container.register('config', Configuration, { 
        lifetime: ServiceLifetime.Singleton 
      });

      VytchesDDD.configure(container);

# === INTEGRATION PATTERNS ===
integration:
  nestjs:
    description: 'NestJS framework integration using bridge pattern'
    business-context: 'Avoid double instance risk while leveraging NestJS DI'

  inversifyjs:
    description: 'InversifyJS adapter for enterprise IoC containers'
    business-context: 'Enterprise-grade DI with advanced features'

  tsyringe:
    description: 'TSyringe integration for Microsoft DI patterns'
    business-context: 'Familiar DI patterns from .NET ecosystem'
