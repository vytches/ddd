# Types - NestJS Integration Types and Interfaces

# === FILE METADATA ===
file-name: 'types'
title: 'NestJS Integration Types'
description: 'Type definitions and interfaces for VytchesDDD NestJS integration'
business-context: 'Provides type-safe configuration options and module metadata for enterprise integration'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  VytchesDDDModuleOptions:
    description: 'Configuration options for VytchesDDD module'
    business-context: 'Simple interface supporting custom provider configuration like IEventBus => UnifiedEventBus mapping'

    # Format-specific
    formats:
      jsdoc:
        description: 'Module configuration options interface'
      cli:
        description: |
          ## VytchesDDDModuleOptions

          Core configuration interface providing:
          - **Custom Provider Registration**: Map interface tokens to implementations
          - **Module Imports**: Additional NestJS modules to import
          - **Export Configuration**: Control what gets exported beyond default services
          - **Type Safety**: Full TypeScript support for configuration options

    properties:
      - name: 'providers'
        type: 'Provider[]'
        optional: true
        description: 'Custom providers for dependency injection'
        business-context: 'Allows mapping interface tokens to concrete implementations for enterprise DI patterns'

      - name: 'imports'
        type: "ModuleMetadata['imports']"
        optional: true
        description: 'Additional imports for the module'
        business-context: 'Enables composition with other NestJS modules'

      - name: 'exports'
        type: "ModuleMetadata['exports']"
        optional: true
        description: 'Additional exports beyond the default explorer service'
        business-context: 'Controls module API surface and what services are available to consuming modules'

    examples:
      - id: 'basic-config'
        title: 'Basic Configuration'
        business-context: 'Standard enterprise setup with custom bus implementations'
        code: |
          const options: VytchesDDDModuleOptions = {
            providers: [
              { provide: 'ICommandBus', useClass: EnhancedCommandBus },
              { provide: 'IQueryBus', useClass: EnhancedQueryBus },
              { provide: 'IEventBus', useClass: UnifiedEventBus },
            ]
          };

      - id: 'factory-config'
        title: 'Factory Provider Configuration'
        business-context: 'Advanced configuration with factory functions for complex setup'
        code: |
          const options: VytchesDDDModuleOptions = {
            providers: [
              {
                provide: 'IEventBus',
                useFactory: async () => {
                  const eventBus = new UnifiedEventBus();
                  await eventBus.initialize();
                  return eventBus;
                },
              },
            ],
          };

      - id: 'full-config'
        title: 'Complete Configuration'
        business-context: 'Full configuration example with imports and exports'
        code: |
          const options: VytchesDDDModuleOptions = {
            providers: [
              { provide: 'ICommandBus', useClass: EnhancedCommandBus },
            ],
            imports: [ConfigModule, DatabaseModule],
            exports: ['CustomService'],
          };

  VytchesDDDDynamicModule:
    description: 'Extended module metadata with VytchesDDD-specific options'
    business-context: 'Type-safe representation of the dynamic module returned by VytchesDDD configuration methods'

    # Format-specific
    formats:
      jsdoc:
        description: 'Dynamic module interface extending NestJS ModuleMetadata'
      cli:
        description: |
          ## VytchesDDDDynamicModule

          Enhanced dynamic module interface providing:
          - **Module Reference**: Reference to VytchesDDDModule class
          - **Extended Metadata**: Full NestJS ModuleMetadata support
          - **Type Safety**: Compile-time validation of module configuration

    properties:
      - name: 'module'
        type: 'typeof VytchesDDDModule'
        description: 'Reference to the VytchesDDDModule class'
        business-context: 'Identifies the module class for NestJS dynamic module system'

    examples:
      - id: 'dynamic-module-usage'
        title: 'Dynamic Module Usage'
        business-context: 'How the dynamic module interface is used in practice'
        code: |
          const dynamicModule: VytchesDDDDynamicModule = VytchesDDDModule.forRoot({
            providers: [
              { provide: 'IEventBus', useClass: UnifiedEventBus }
            ]
          });

          @Module({
            imports: [dynamicModule],
          })
          export class AppModule {}

# === IMPORTS ===
imported-types:
  ModuleMetadata:
    description: 'Base NestJS module metadata interface'
    source: '@nestjs/common'
    business-context: 'Foundation for all NestJS module configuration'

  Provider:
    description: 'NestJS provider configuration type'
    source: '@nestjs/common'
    business-context: 'Supports various provider patterns: class, factory, value, existing'
