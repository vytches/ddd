# Testing Strategies - Comprehensive Testing with VytchesDDD and NestJS

# === FILE METADATA ===
file-name: 'testing-strategies'
title: 'Comprehensive Testing Strategies'
description: 'Complete testing guide for VytchesDDD NestJS applications'
business-context: 'Production-ready testing patterns ensuring reliable delivery of enterprise DDD applications'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TESTING STRATEGIES ===
strategies:
  unit-testing:
    title: 'Unit Testing Domain Services'
    description: 'Testing domain logic in isolation'
    business-context: 'Ensures business rules are correctly implemented and maintain behavior under changes'

    complexity: 'beginner'
    test-types: ['Unit tests', 'Domain logic', 'Business rules']

    code: |
      // user.service.spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { UserService } from './user.service';
      import { safeRun } from '@vytches/ddd-utils';
      import { DomainError } from '@vytches/ddd-domain-primitives';

      describe('UserService', () => {
        let service: UserService;
        let module: TestingModule;
        let mockEventBus: any;
        
        beforeEach(async () => {
          mockEventBus = {
            publish: vi.fn().mockResolvedValue(undefined),
            publishMany: vi.fn().mockResolvedValue(undefined),
          };
          
          module = await Test.createTestingModule({
            imports: [
              VytchesDDDModule.forTesting({
                mocks: {
                  eventBus: mockEventBus,
                },
              }),
            ],
            providers: [UserService],
          }).compile();
          
          service = module.get<UserService>(UserService);
        });
        
        afterEach(async () => {
          await module.close();
        });
        
        describe('createUser', () => {
          it('should create user successfully with valid data', async () => {
            // Arrange
            const userData = {
              name: 'John Doe',
              email: 'john@example.com',
              age: 30,
            };
            
            // Act
            const result = await service.createUser(userData);
            
            // Assert
            expect(result.isSuccess()).toBe(true);
            expect(result.value.name).toBe('John Doe');
            expect(result.value.email).toBe('john@example.com');
            expect(mockEventBus.publish).toHaveBeenCalledWith(
              expect.objectContaining({
                eventType: 'UserCreated',
                payload: expect.objectContaining({
                  userId: result.value.id,
                  email: 'john@example.com',
                }),
              })
            );
          });
          
          it('should return failure for invalid email', async () => {
            // Arrange
            const userData = {
              name: 'John Doe',
              email: 'invalid-email',
              age: 30,
            };
            
            // Act
            const result = await service.createUser(userData);
            
            // Assert
            expect(result.isFailure()).toBe(true);
            expect(result.error).toBeInstanceOf(DomainError);
            expect(result.error.message).toContain('Invalid email format');
            expect(mockEventBus.publish).not.toHaveBeenCalled();
          });
          
          it('should handle service errors gracefully', async () => {
            // Arrange
            const userData = { name: 'John', email: 'john@example.com', age: 17 };
            
            // Act - Using safeRun for error testing
            const [error] = safeRun(async () => {
              const result = await service.createUser(userData);
              if (result.isFailure()) {
                throw result.error;
              }
              return result.value;
            });
            
            // Assert
            expect(error).toBeInstanceOf(DomainError);
            expect(error?.message).toContain('User must be 18 or older');
          });
        });
      });

  integration-testing:
    title: 'Integration Testing'
    description: 'Testing service interactions and module integration'
    business-context: 'Verifies that components work together correctly and data flows properly between services'

    complexity: 'intermediate'
    test-types: ['Integration tests', 'Module testing', 'Service interaction']

    code: |
      // order.integration.spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { INestApplication } from '@nestjs/common';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { OrderService } from './order.service';
      import { PaymentService } from '../payment/payment.service';
      import { InventoryService } from '../inventory/inventory.service';
      import { TestHarness, TestEventBus } from '@vytches/ddd-testing';

      describe('Order Integration', () => {
        let app: INestApplication;
        let orderService: OrderService;
        let paymentService: PaymentService;
        let inventoryService: InventoryService;
        let testHarness: TestHarness;
        let testEventBus: TestEventBus;
        
        beforeAll(async () => {
          testEventBus = new TestEventBus();
          testHarness = new TestHarness();
          
          const module = await Test.createTestingModule({
            imports: [
              VytchesDDDModule.forRoot({
                providers: [
                  { provide: 'IEventBus', useValue: testEventBus },
                  { provide: 'ICommandBus', useClass: TestCommandBus },
                ],
              }),
              OrderModule,
              PaymentModule,
              InventoryModule,
            ],
          }).compile();
          
          app = module.createNestApplication();
          await app.init();
          
          orderService = module.get<OrderService>(OrderService);
          paymentService = module.get<PaymentService>(PaymentService);
          inventoryService = module.get<InventoryService>(InventoryService);
        });
        
        beforeEach(async () => {
          await testHarness.reset();
          testEventBus.clear();
        });
        
        describe('Order Creation Flow', () => {
          it('should complete end-to-end order creation', async () => {
            // Arrange
            await testHarness.seedData({
              products: [{ id: 'prod-1', stock: 10, price: 100 }],
              users: [{ id: 'user-1', balance: 1000 }],
            });
            
            const orderData = {
              userId: 'user-1',
              items: [{ productId: 'prod-1', quantity: 2 }],
            };
            
            // Act
            const result = await orderService.createOrder(orderData);
            
            // Assert - Order creation
            expect(result.isSuccess()).toBe(true);
            expect(result.value.status).toBe('pending');
            
            // Assert - Events published in correct order
            const events = testEventBus.getPublishedEvents();
            expect(events).toHaveLength(3);
            expect(events[0].eventType).toBe('OrderCreated');
            expect(events[1].eventType).toBe('PaymentRequested');
            expect(events[2].eventType).toBe('InventoryReserved');
            
            // Assert - Side effects
            const updatedStock = await inventoryService.getStock('prod-1');
            expect(updatedStock).toBe(8); // 10 - 2
            
            const userBalance = await paymentService.getBalance('user-1');
            expect(userBalance).toBe(800); // 1000 - 200
          });
          
          it('should handle payment failure with proper rollback', async () => {
            // Arrange
            await testHarness.seedData({
              products: [{ id: 'prod-1', stock: 10, price: 100 }],
              users: [{ id: 'user-1', balance: 50 }], // Insufficient funds
            });
            
            const orderData = {
              userId: 'user-1',
              items: [{ productId: 'prod-1', quantity: 2 }],
            };
            
            // Act
            const result = await orderService.createOrder(orderData);
            
            // Assert - Order failed
            expect(result.isFailure()).toBe(true);
            expect(result.error.message).toContain('Insufficient funds');
            
            // Assert - Rollback events
            const events = testEventBus.getPublishedEvents();
            expect(events.some(e => e.eventType === 'InventoryReleased')).toBe(true);
            
            // Assert - Stock was restored
            const finalStock = await inventoryService.getStock('prod-1');
            expect(finalStock).toBe(10); // Stock restored
          });
        });
        
        afterAll(async () => {
          await app.close();
        });
      });

  e2e-testing:
    title: 'End-to-End Testing'
    description: 'Full application testing through HTTP endpoints'
    business-context: 'Validates complete user journeys and ensures the application works correctly from a user perspective'

    complexity: 'intermediate'
    test-types: ['E2E tests', 'HTTP API', 'User journeys']

    code: |
      // app.e2e-spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { INestApplication } from '@nestjs/common';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import * as request from 'supertest';
      import { AppModule } from '../src/app.module';
      import { DatabaseService } from '../src/database/database.service';

      describe('AppController (e2e)', () => {
        let app: INestApplication;
        let databaseService: DatabaseService;
        
        beforeAll(async () => {
          const moduleFixture: TestingModule = await Test.createTestingModule({
            imports: [AppModule],
          })
          .overrideModule(VytchesDDDModule)
          .compile();
          
          app = moduleFixture.createNestApplication();
          databaseService = moduleFixture.get<DatabaseService>(DatabaseService);
          
          await app.init();
        });
        
        beforeEach(async () => {
          // Clean database before each test
          await databaseService.cleanup();
        });
        
        describe('User Management', () => {
          it('should create and retrieve user', async () => {
            const userData = {
              name: 'John Doe',
              email: 'john@example.com',
              age: 30,
            };
            
            // Create user
            const createResponse = await request(app.getHttpServer())
              .post('/users')
              .send(userData)
              .expect(201);
              
            expect(createResponse.body).toMatchObject({
              id: expect.any(String),
              name: 'John Doe',
              email: 'john@example.com',
              age: 30,
            });
            
            const userId = createResponse.body.id;
            
            // Retrieve user
            const getResponse = await request(app.getHttpServer())
              .get(`/users/${userId}`)
              .expect(200);
              
            expect(getResponse.body).toMatchObject(createResponse.body);
          });
          
          it('should return 400 for invalid user data', async () => {
            const invalidData = {
              name: 'John',
              email: 'invalid-email',
              age: 17, // Too young
            };
            
            const response = await request(app.getHttpServer())
              .post('/users')
              .send(invalidData)
              .expect(400);
              
            expect(response.body.message).toContain('Invalid email format');
          });
        });
        
        describe('Order Flow', () => {
          it('should complete full order workflow', async () => {
            // Setup test data
            const userResponse = await request(app.getHttpServer())
              .post('/users')
              .send({ name: 'John', email: 'john@test.com', age: 30 });
              
            const productResponse = await request(app.getHttpServer())
              .post('/products')
              .send({ name: 'Widget', price: 100, stock: 10 });
            
            const orderData = {
              userId: userResponse.body.id,
              items: [
                { productId: productResponse.body.id, quantity: 2 }
              ],
            };
            
            // Create order
            const orderResponse = await request(app.getHttpServer())
              .post('/orders')
              .send(orderData)
              .expect(201);
              
            expect(orderResponse.body).toMatchObject({
              id: expect.any(String),
              status: 'confirmed',
              totalAmount: 200,
            });
            
            // Verify inventory was updated
            const updatedProduct = await request(app.getHttpServer())
              .get(`/products/${productResponse.body.id}`)
              .expect(200);
              
            expect(updatedProduct.body.stock).toBe(8);
          });
        });
        
        afterAll(async () => {
          await app.close();
        });
      });

  cqrs-testing:
    title: 'CQRS Handler Testing'
    description: 'Testing command and query handlers'
    business-context: 'Ensures command and query separation works correctly and handlers process messages as expected'

    complexity: 'intermediate'
    test-types: ['Command testing', 'Query testing', 'Handler isolation']

    code: |
      // create-user.handler.spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { CreateUserHandler } from './create-user.handler';
      import { CreateUserCommand } from './create-user.command';
      import { UserService } from '../user.service';
      import { Result } from '@vytches/ddd-utils';
      import { safeRun } from '@vytches/ddd-utils';

      describe('CreateUserHandler', () => {
        let handler: CreateUserHandler;
        let userService: UserService;
        let module: TestingModule;
        
        beforeEach(async () => {
          const mockUserService = {
            createUser: vi.fn(),
          };
          
          module = await Test.createTestingModule({
            imports: [VytchesDDDModule.forTesting()],
            providers: [
              CreateUserHandler,
              { provide: UserService, useValue: mockUserService },
            ],
          }).compile();
          
          handler = module.get<CreateUserHandler>(CreateUserHandler);
          userService = module.get<UserService>(UserService);
        });
        
        afterEach(async () => {
          await module.close();
        });
        
        it('should execute command successfully', async () => {
          // Arrange
          const command = new CreateUserCommand({
            name: 'John Doe',
            email: 'john@example.com',
            age: 30,
          });
          
          const expectedUser = { id: 'user-1', name: 'John Doe', email: 'john@example.com' };
          vi.mocked(userService.createUser).mockResolvedValue(Result.success(expectedUser));
          
          // Act
          const result = await handler.execute(command);
          
          // Assert
          expect(result.isSuccess()).toBe(true);
          expect(result.value).toEqual(expectedUser);
          expect(userService.createUser).toHaveBeenCalledWith(command.data);
        });
        
        it('should propagate service errors', async () => {
          // Arrange
          const command = new CreateUserCommand({
            name: 'John',
            email: 'invalid-email',
            age: 17,
          });
          
          const expectedError = new Error('Validation failed');
          vi.mocked(userService.createUser).mockResolvedValue(Result.failure(expectedError));
          
          // Act
          const result = await handler.execute(command);
          
          // Assert
          expect(result.isFailure()).toBe(true);
          expect(result.error).toBe(expectedError);
        });
        
        it('should handle handler timeout', async () => {
          // Arrange
          const command = new CreateUserCommand({
            name: 'John',
            email: 'john@test.com',
            age: 30,
          });
          
          vi.mocked(userService.createUser).mockImplementation(
            () => new Promise(resolve => setTimeout(() => resolve(Result.success({})), 35000))
          );
          
          // Act
          const [error] = await safeRun(async () => {
            return await handler.execute(command);
          });
          
          // Assert - Handler should have timeout configuration
          expect(error?.message).toContain('timeout');
        }, 40000);
      });

      // get-user.handler.spec.ts
      describe('GetUserHandler', () => {
        let handler: GetUserHandler;
        let userRepository: IUserRepository;
        
        beforeEach(async () => {
          const mockRepository = {
            findById: vi.fn(),
          };
          
          const module = await Test.createTestingModule({
            imports: [VytchesDDDModule.forTesting()],
            providers: [
              GetUserHandler,
              { provide: 'IUserRepository', useValue: mockRepository },
            ],
          }).compile();
          
          handler = module.get<GetUserHandler>(GetUserHandler);
          userRepository = module.get<IUserRepository>('IUserRepository');
        });
        
        it('should return user for valid query', async () => {
          // Arrange
          const query = new GetUserQuery('user-1');
          const expectedUser = { id: 'user-1', name: 'John', email: 'john@test.com' };
          
          vi.mocked(userRepository.findById).mockResolvedValue(expectedUser);
          
          // Act
          const result = await handler.execute(query);
          
          // Assert
          expect(result).toEqual(expectedUser);
          expect(userRepository.findById).toHaveBeenCalledWith('user-1');
        });
        
        it('should throw not found error for missing user', async () => {
          // Arrange
          const query = new GetUserQuery('non-existent');
          vi.mocked(userRepository.findById).mockResolvedValue(null);
          
          // Act & Assert
          const [error] = await safeRun(async () => {
            return await handler.execute(query);
          });
          
          expect(error?.message).toContain('User not found');
        });
      });

  event-testing:
    title: 'Event Handler Testing'
    description: 'Testing event handlers and event-driven flows'
    business-context: 'Ensures event handlers respond correctly to domain events and maintain system consistency'

    complexity: 'intermediate'
    test-types: ['Event handlers', 'Event flows', 'Side effects']

    code: |
      // user-created.handler.spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { UserCreatedEventHandler } from './user-created.handler';
      import { UserCreatedEvent } from '../events/user-created.event';
      import { EmailService } from '../email/email.service';
      import { safeRun } from '@vytches/ddd-utils';

      describe('UserCreatedEventHandler', () => {
        let handler: UserCreatedEventHandler;
        let emailService: EmailService;
        let module: TestingModule;
        
        beforeEach(async () => {
          const mockEmailService = {
            sendWelcomeEmail: vi.fn().mockResolvedValue(undefined),
          };
          
          module = await Test.createTestingModule({
            imports: [VytchesDDDModule.forTesting()],
            providers: [
              UserCreatedEventHandler,
              { provide: EmailService, useValue: mockEmailService },
            ],
          }).compile();
          
          handler = module.get<UserCreatedEventHandler>(UserCreatedEventHandler);
          emailService = module.get<EmailService>(EmailService);
        });
        
        afterEach(async () => {
          await module.close();
        });
        
        it('should send welcome email when user is created', async () => {
          // Arrange
          const event = new UserCreatedEvent({
            userId: 'user-1',
            email: 'john@example.com',
            name: 'John Doe',
            timestamp: new Date().toISOString(),
          });
          
          // Act
          await handler.handle(event);
          
          // Assert
          expect(emailService.sendWelcomeEmail).toHaveBeenCalledWith({
            to: 'john@example.com',
            userName: 'John Doe',
            userId: 'user-1',
          });
        });
        
        it('should handle email service errors gracefully', async () => {
          // Arrange
          const event = new UserCreatedEvent({
            userId: 'user-1',
            email: 'invalid@example.com',
            name: 'John Doe',
            timestamp: new Date().toISOString(),
          });
          
          vi.mocked(emailService.sendWelcomeEmail).mockRejectedValue(
            new Error('Email service unavailable')
          );
          
          // Act & Assert - Should not throw, but handle gracefully
          const [error] = await safeRun(async () => {
            await handler.handle(event);
          });
          
          // Event handler should handle errors internally
          expect(error).toBeUndefined();
          expect(emailService.sendWelcomeEmail).toHaveBeenCalled();
        });
      });

      // Event flow testing
      describe('Event Flow Integration', () => {
        let app: INestApplication;
        let eventBus: TestEventBus;
        
        beforeAll(async () => {
          eventBus = new TestEventBus();
          
          const module = await Test.createTestingModule({
            imports: [
              VytchesDDDModule.forRoot({
                providers: [{ provide: 'IEventBus', useValue: eventBus }],
              }),
              UserModule,
              NotificationModule,
            ],
          }).compile();
          
          app = module.createNestApplication();
          await app.init();
        });
        
        it('should trigger all downstream handlers for user creation', async () => {
          // Arrange
          const event = new UserCreatedEvent({
            userId: 'user-1',
            email: 'john@test.com',
            name: 'John Doe',
          });
          
          // Act
          await eventBus.publish(event);
          await eventBus.waitForHandlers(); // Wait for all handlers to complete
          
          // Assert
          const handlersExecuted = eventBus.getExecutedHandlers();
          expect(handlersExecuted).toContain('UserCreatedEventHandler');
          expect(handlersExecuted).toContain('UserProfileCreatedHandler');
          expect(handlersExecuted).toContain('WelcomeEmailHandler');
          
          // Verify side effects
          const publishedEvents = eventBus.getPublishedEvents();
          expect(publishedEvents.some(e => e.eventType === 'WelcomeEmailSent')).toBe(true);
          expect(publishedEvents.some(e => e.eventType === 'UserProfileCreated')).toBe(true);
        });
        
        afterAll(async () => {
          await app.close();
        });
      });

  testing-utilities:
    title: 'Custom Testing Utilities'
    description: 'Creating reusable testing utilities for VytchesDDD'
    business-context: 'Provides standardized testing infrastructure reducing test maintenance and improving reliability'

    complexity: 'advanced'
    test-types: ['Test utilities', 'Mocks', 'Test harness']

    code: |
      // test-utils/vytches-test.module.ts
      import { DynamicModule, Module } from '@nestjs/common';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { TestEventBus } from './test-event-bus';
      import { TestCommandBus } from './test-command-bus';
      import { TestQueryBus } from './test-query-bus';

      export interface VytchesTestModuleOptions {
        mocks?: Record<string, any>;
        debug?: boolean;
        enableRealEventBus?: boolean;
      }

      @Module({})
      export class VytchesTestModule {
        static forTest(options: VytchesTestModuleOptions = {}): DynamicModule {
          const testProviders = [
            {
              provide: 'IEventBus',
              useValue: options.enableRealEventBus ? new UnifiedEventBus() : new TestEventBus(),
            },
            {
              provide: 'ICommandBus',
              useClass: TestCommandBus,
            },
            {
              provide: 'IQueryBus',
              useClass: TestQueryBus,
            },
          ];
          
          // Add mock providers
          if (options.mocks) {
            Object.entries(options.mocks).forEach(([token, mock]) => {
              testProviders.push({
                provide: token,
                useValue: mock,
              });
            });
          }
          
          return {
            module: VytchesTestModule,
            imports: [
              VytchesDDDModule.forRoot({
                providers: testProviders,
              }),
            ],
            exports: [VytchesDDDModule],
          };
        }
      }

      // test-utils/test-event-bus.ts
      export class TestEventBus implements IEventBus {
        private publishedEvents: IExtendedDomainEvent[] = [];
        private executedHandlers: string[] = [];
        private handlers: Map<string, Function[]> = new Map();
        
        async publish(event: IExtendedDomainEvent): Promise<void> {
          this.publishedEvents.push(event);
          
          // Execute handlers if any
          const handlers = this.handlers.get(event.eventType) || [];
          for (const handler of handlers) {
            try {
              await handler(event);
              this.executedHandlers.push(handler.constructor.name);
            } catch (error) {
              console.warn(`Handler failed: ${error.message}`);
            }
          }
        }
        
        async publishMany(events: IExtendedDomainEvent[]): Promise<void> {
          for (const event of events) {
            await this.publish(event);
          }
        }
        
        async registerHandler<T extends IExtendedDomainEvent>(
          eventType: string,
          handler: (event: T) => Promise<void>
        ): Promise<void> {
          if (!this.handlers.has(eventType)) {
            this.handlers.set(eventType, []);
          }
          this.handlers.get(eventType)!.push(handler);
        }
        
        getPublishedEvents(): IExtendedDomainEvent[] {
          return [...this.publishedEvents];
        }
        
        getExecutedHandlers(): string[] {
          return [...this.executedHandlers];
        }
        
        clear(): void {
          this.publishedEvents = [];
          this.executedHandlers = [];
        }
        
        async waitForHandlers(): Promise<void> {
          // Simple implementation - in real scenarios, might need more sophisticated waiting
          await new Promise(resolve => setTimeout(resolve, 10));
        }
      }

      // test-utils/data-seeder.ts
      export class TestDataSeeder {
        private data: Map<string, any[]> = new Map();
        
        seed<T>(entity: string, items: T[]): void {
          this.data.set(entity, items);
        }
        
        get<T>(entity: string): T[] {
          return this.data.get(entity) || [];
        }
        
        clear(): void {
          this.data.clear();
        }
        
        // Factory methods for common test data
        createUser(overrides: Partial<User> = {}): User {
          return {
            id: 'test-user-' + Math.random().toString(36).substr(2, 9),
            name: 'Test User',
            email: 'test@example.com',
            age: 30,
            ...overrides,
          };
        }
        
        createOrder(overrides: Partial<Order> = {}): Order {
          return {
            id: 'test-order-' + Math.random().toString(36).substr(2, 9),
            userId: 'test-user-1',
            status: 'pending',
            items: [],
            totalAmount: 0,
            ...overrides,
          };
        }
      }

      // Usage example
      describe('Order Service with Test Utils', () => {
        let orderService: OrderService;
        let testEventBus: TestEventBus;
        let dataSeeder: TestDataSeeder;
        
        beforeEach(async () => {
          testEventBus = new TestEventBus();
          dataSeeder = new TestDataSeeder();
          
          const module = await Test.createTestingModule({
            imports: [
              VytchesTestModule.forTest({
                mocks: {
                  eventBus: testEventBus,
                },
                debug: true,
              }),
            ],
            providers: [OrderService],
          }).compile();
          
          orderService = module.get<OrderService>(OrderService);
        });
        
        it('should create order with seeded data', async () => {
          // Arrange
          const user = dataSeeder.createUser({ id: 'user-1', name: 'John' });
          const orderData = {
            userId: user.id,
            items: [{ productId: 'prod-1', quantity: 2 }],
          };
          
          dataSeeder.seed('users', [user]);
          dataSeeder.seed('products', [
            { id: 'prod-1', name: 'Widget', price: 100, stock: 10 }
          ]);
          
          // Act
          const result = await orderService.createOrder(orderData);
          
          // Assert
          expect(result.isSuccess()).toBe(true);
          expect(testEventBus.getPublishedEvents()).toHaveLength(1);
          expect(testEventBus.getPublishedEvents()[0].eventType).toBe('OrderCreated');
        });
      });

# === TESTING BEST PRACTICES ===
best-practices:
  structure:
    title: 'Test Structure and Organization'
    recommendations:
      - 'Follow AAA pattern: Arrange, Act, Assert'
      - 'Use descriptive test names that explain business scenarios'
      - 'Group related tests with describe blocks'
      - 'Keep tests independent and isolated'

  mocking:
    title: 'Mocking Strategy'
    recommendations:
      - 'Mock external dependencies at the boundary'
      - 'Use real implementations for domain logic testing'
      - 'Create reusable mock factories for complex objects'
      - 'Verify both behavior and state changes'

  data-management:
    title: 'Test Data Management'
    recommendations:
      - 'Use factory methods for test data creation'
      - 'Clean up data between tests'
      - 'Seed only the minimum data needed'
      - 'Use meaningful test data that reflects real scenarios'

  coverage:
    title: 'Test Coverage Strategy'
    recommendations:
      - 'Focus on business logic coverage over code coverage'
      - 'Test error paths and edge cases'
      - 'Include integration tests for critical workflows'
      - 'Test event flows and side effects'
