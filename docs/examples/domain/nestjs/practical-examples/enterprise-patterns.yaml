# === ENTERPRISE PATTERNS ===
patterns:
  multi-tenant-setup:
    title: 'Multi-Tenant Architecture'
    description: 'Configure VytchesDDD for multi-tenant applications'
    business-context: 'Enables tenant isolation and context-aware service resolution for SaaS applications'

    complexity: 'advanced'
    use-cases: ['SaaS platforms', 'Enterprise applications', 'B2B systems']

    code: |
      // app.module.ts - Multi-tenant configuration
      import { Module, Scope } from '@nestjs/common';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { REQUEST } from '@nestjs/core';

      @Module({
        imports: [
          VytchesDDDModule.forRoot({
            providers: [
              {
                provide: 'ITenantEventBus',
                useFactory: (request: any) => {
                  const tenantId = request.headers['x-tenant-id'];
                  return new TenantAwareEventBus(tenantId);
                },
                inject: [REQUEST],
                scope: Scope.REQUEST,
              },
            ],
          }),
        ],
      })
      export class AppModule {}

      // tenant-aware.service.ts
      @DomainService('userService', {
        context: 'UserManagement',
        lifetime: ServiceLifetime.Scoped,
      })
      export class TenantAwareUserService {
        constructor(
          @Inject('ITenantEventBus') private eventBus: TenantAwareEventBus,
          @Inject(REQUEST) private request: any
        ) {}
        
        private get tenantId(): string {
          return this.request.headers['x-tenant-id'];
        }
        
        async createUser(userData: CreateUserData): Promise<Result<User, Error>> {
          const user = User.create({ ...userData, tenantId: this.tenantId });
          
          await this.eventBus.publish(
            new UserCreatedEvent({ ...user, tenantId: this.tenantId })
          );
          
          return Result.success(user);
        }
      }

  bounded-context-separation:
    title: 'Bounded Context Separation'
    description: 'Organize services by bounded contexts with isolated containers'
    business-context: 'Maintains clear domain boundaries and prevents unwanted coupling between business contexts'

    complexity: 'intermediate'
    use-cases: ['Large enterprises', 'Domain-complex applications', 'Microservices']

    code: |
      // user-management.module.ts
      @Module({
        imports: [
          VytchesDDDModule.forRoot({
            providers: [
              {
                provide: 'IUserCommandBus',
                useFactory: () => {
                  const container = new SimpleContainer();
                  return new EnhancedCommandBus(container);
                },
              },
            ],
          }),
        ],
        providers: [
          UserService,
          CreateUserHandler,
          UserCreatedEventHandler,
        ],
      })
      export class UserManagementModule {}

      // order-management.module.ts  
      @Module({
        imports: [
          VytchesDDDModule.forRoot({
            providers: [
              {
                provide: 'IOrderCommandBus', 
                useFactory: () => {
                  const container = new SimpleContainer();
                  return new EnhancedCommandBus(container);
                },
              },
            ],
          }),
        ],
        providers: [
          OrderService,
          CreateOrderHandler,
          OrderCreatedEventHandler,
        ],
      })
      export class OrderManagementModule {}

      // Cross-context communication via events only
      @EventHandler(UserCreatedEvent, { context: 'OrderManagement' })
      export class UserCreatedInOrderContextHandler {
        async handle(event: UserCreatedEvent): Promise<void> {
          // Create default customer profile in order context
          await this.orderService.createCustomerProfile(event.payload.userId);
        }
      }

  saga-orchestration:
    title: 'Saga Pattern Implementation'
    description: 'Long-running business processes with compensation patterns'
    business-context: 'Manages complex business workflows that span multiple bounded contexts with failure recovery'

    complexity: 'advanced'
    use-cases: ['Payment processing', 'Order fulfillment', 'User onboarding']

    code: |
      // order-fulfillment.saga.ts
      import { BaseSaga, SagaStatus } from '@vytches/ddd-messaging';
      import { DomainService } from '@vytches/ddd-di';

      @DomainService('orderFulfillmentSaga', {
        context: 'OrderManagement',
      })
      export class OrderFulfillmentSaga extends BaseSaga {
        constructor(
          private commandBus: ICommandBus,
          private eventBus: IEventBus
        ) {
          super('OrderFulfillmentSaga', 'Order Processing Workflow');
        }
        
        async handleEvent(event: IExtendedDomainEvent): Promise<ISagaActionResult> {
          switch (event.eventType) {
            case 'OrderCreated':
              return await this.processPayment(event);
            case 'PaymentProcessed':
              return await this.reserveInventory(event);
            case 'InventoryReserved':
              return await this.shipOrder(event);
            case 'PaymentFailed':
              return await this.cancelOrder(event);
            default:
              return { success: false, error: { message: 'Unhandled event' } };
          }
        }
        
        async compensate(stepName: string, context: ISagaExecutionContext): Promise<ISagaActionResult> {
          switch (stepName) {
            case 'PaymentProcessed':
              return await this.refundPayment(context);
            case 'InventoryReserved':
              return await this.releaseInventory(context);
            default:
              return { success: true };
          }
        }
        
        private async processPayment(event: IExtendedDomainEvent): Promise<ISagaActionResult> {
          try {
            await this.commandBus.execute(
              new ProcessPaymentCommand({
                orderId: event.payload.orderId,
                amount: event.payload.amount,
              })
            );
            
            return {
              success: true,
              events: [{ eventType: 'PaymentRequested', payload: event.payload }],
            };
          } catch (error) {
            return {
              success: false,
              error: { message: error.message, compensate: true },
            };
          }
        }
      }

      // order.module.ts - Register saga
      @Module({
        providers: [
          OrderFulfillmentSaga,
          // Saga is auto-discovered and registered
        ],
      })
      export class OrderModule {}

  event-sourcing-integration:
    title: 'Event Sourcing with NestJS'
    description: 'Complete event sourcing setup with snapshots and projections'
    business-context: 'Provides complete audit trail and enables temporal queries for compliance-heavy domains'

    complexity: 'advanced'
    use-cases: ['Financial systems', 'Audit-heavy domains', 'Compliance tracking']

    code: |
      // event-sourced.module.ts
      import { InMemoryEventStore } from '@vytches/ddd-event-store';
      import { ProjectionEngine } from '@vytches/ddd-projections';

      @Module({
        imports: [
          VytchesDDDModule.forRoot({
            providers: [
              {
                provide: 'IEventStore',
                useFactory: () => new InMemoryEventStore({
                  snapshotFrequency: 10,
                  enableEncryption: true,
                }),
              },
              {
                provide: 'IProjectionEngine',
                useFactory: (eventStore: IEventStore) => {
                  return new ProjectionEngine({
                    eventStore,
                    retryPolicy: { maxAttempts: 3, backoffMs: 1000 },
                  });
                },
                inject: ['IEventStore'],
              },
            ],
          }),
        ],
        providers: [
          AccountService,
          AccountProjection,
          AccountBalanceProjection,
        ],
      })
      export class AccountingModule {}

      // account.service.ts - Event sourced aggregate
      @DomainService('accountService', {
        context: 'Accounting',
      })
      export class AccountService {
        constructor(
          @Inject('IEventStore') private eventStore: IEventStore,
          @Inject('IProjectionEngine') private projectionEngine: IProjectionEngine
        ) {}
        
        async createAccount(accountData: CreateAccountData): Promise<Result<Account, Error>> {
          const accountId = EntityId.createWithRandomUUID();
          const account = AccountAggregate.create({ id: accountId, ...accountData });
          
          // Store events
          await this.eventStore.appendToStream(
            `account-${accountId}`,
            account.getUncommittedEvents(),
            0 // Expected version
          );
          
          // Update projections
          await this.projectionEngine.project(account.getUncommittedEvents());
          
          account.commit();
          return Result.success(account);
        }
        
        async getAccount(accountId: string): Promise<Account> {
          const events = await this.eventStore.getStreamEvents(`account-${accountId}`);
          const account = AccountAggregate.fromHistory(events);
          return account;
        }
      }

      // account.projection.ts
      @ProjectionHandler('AccountProjection')
      export class AccountProjection {
        @EventHandler(AccountCreatedEvent)
        async handleAccountCreated(event: AccountCreatedEvent): Promise<void> {
          // Update read model
          await this.accountReadModel.create({
            id: event.payload.accountId,
            name: event.payload.name,
            balance: event.payload.initialBalance,
            createdAt: event.timestamp,
          });
        }
        
        @EventHandler(MoneyDepositedEvent)
        async handleMoneyDeposited(event: MoneyDepositedEvent): Promise<void> {
          await this.accountReadModel.updateBalance(
            event.payload.accountId,
            event.payload.amount
          );
        }
      }

  resilience-patterns:
    title: 'Resilience Patterns Integration'
    description: 'Circuit breakers, retry policies, and bulkhead patterns'
    business-context: 'Ensures system stability and graceful degradation under load or external service failures'

    complexity: 'intermediate'
    use-cases: ['External API integration', 'High-availability systems', 'Microservices']

    code: |
      // resilient-service.module.ts
      import { CircuitBreakerStrategy, RetryStrategy, BulkheadStrategy } from '@vytches/ddd-resilience';

      @Module({
        imports: [
          VytchesDDDModule.forRoot({
            providers: [
              {
                provide: 'IPaymentGatewayService',
                useFactory: () => {
                  const circuitBreaker = new CircuitBreakerStrategy({
                    failureThreshold: 5,
                    resetTimeout: 60000,
                  });
                  
                  const retry = new RetryStrategy({
                    maxAttempts: 3,
                    baseDelay: 1000,
                    backoff: 'exponential',
                  });
                  
                  return new ResilientPaymentService(circuitBreaker, retry);
                },
              },
            ],
          }),
        ],
      })
      export class PaymentModule {}

      // resilient-payment.service.ts
      @DomainService('paymentService', {
        context: 'Payment',
      })
      export class ResilientPaymentService {
        constructor(
          private circuitBreaker: CircuitBreakerStrategy,
          private retry: RetryStrategy
        ) {}
        
        @Resilience({
          circuitBreaker: { failureThreshold: 5, resetTimeout: 60000 },
          retry: { maxAttempts: 3, baseDelay: 1000 },
          timeout: { duration: 30000 },
          bulkhead: { maxConcurrent: 10 },
        })
        async processPayment(paymentData: PaymentData): Promise<Result<PaymentResult, Error>> {
          // Resilience patterns applied automatically via decorator
          const result = await this.externalPaymentGateway.charge(paymentData);
          return Result.success(result);
        }
        
        @Resilience({
          circuitBreaker: { failureThreshold: 3, resetTimeout: 30000 },
          fallback: async () => Result.success({ status: 'pending' }),
        })
        async getPaymentStatus(paymentId: string): Promise<Result<PaymentStatus, Error>> {
          // Fallback to 'pending' status if external service is down
          const status = await this.externalPaymentGateway.getStatus(paymentId);
          return Result.success(status);
        }
      }

  advanced-testing:
    title: 'Advanced Testing Patterns'
    description: 'Testing strategies for complex DDD scenarios'
    business-context: 'Ensures reliable testing of complex business logic and integration points'

    complexity: 'intermediate'
    use-cases: ['TDD/BDD', 'Integration testing', 'Contract testing']

    code: |
      // order.service.integration.spec.ts
      import { Test, TestingModule } from '@nestjs/testing';
      import { VytchesDDDModule } from '@vytches/ddd-nestjs';
      import { TestHarness } from '@vytches/ddd-testing';

      describe('OrderService Integration', () => {
        let app: INestApplication;
        let orderService: OrderService;
        let testHarness: TestHarness;
        
        beforeAll(async () => {
          const module = await Test.createTestingModule({
            imports: [
              VytchesDDDModule.forRoot({
                providers: [
                  // Use test doubles for external dependencies
                  { provide: 'IPaymentGateway', useClass: MockPaymentGateway },
                  { provide: 'IInventoryService', useClass: MockInventoryService },
                ],
              }),
              OrderModule,
              PaymentModule,
              InventoryModule,
            ],
          }).compile();
          
          app = module.createNestApplication();
          await app.init();
          
          orderService = module.get<OrderService>(OrderService);
          testHarness = new TestHarness();
        });
        
        beforeEach(async () => {
          await testHarness.reset();
        });
        
        describe('Order Creation Workflow', () => {
          it('should complete successful order flow', async () => {
            // Arrange
            const orderData = testHarness.createOrderData();
            const mockPaymentGateway = app.get<MockPaymentGateway>('IPaymentGateway');
            mockPaymentGateway.setupSuccessfulPayment();
            
            // Act
            const result = await orderService.createOrder(orderData);
            
            // Assert
            expect(result.isSuccess()).toBe(true);
            expect(result.value.status).toBe('confirmed');
            
            // Verify events were published
            const publishedEvents = await testHarness.getPublishedEvents();
            expect(publishedEvents).toHaveLength(3);
            expect(publishedEvents[0]).toBeInstanceOf(OrderCreatedEvent);
            expect(publishedEvents[1]).toBeInstanceOf(PaymentProcessedEvent);
            expect(publishedEvents[2]).toBeInstanceOf(OrderConfirmedEvent);
          });
          
          it('should handle payment failure with compensation', async () => {
            // Arrange
            const orderData = testHarness.createOrderData();
            const mockPaymentGateway = app.get<MockPaymentGateway>('IPaymentGateway');
            mockPaymentGateway.setupFailedPayment();
            
            // Act
            const result = await orderService.createOrder(orderData);
            
            // Assert
            expect(result.isFailure()).toBe(true);
            expect(result.error.message).toContain('Payment failed');
            
            // Verify compensation events
            const compensationEvents = await testHarness.getCompensationEvents();
            expect(compensationEvents).toContainEqual(
              expect.objectContaining({ eventType: 'InventoryReleased' })
            );
          });
        });
        
        afterAll(async () => {
          await app.close();
        });
      });

      // Contract testing with external services
      describe('Payment Gateway Contract', () => {
        it('should match expected payment gateway interface', async () => {
          const paymentGateway = app.get<IPaymentGateway>('IPaymentGateway');
          const contractTest = new ContractTester(paymentGateway);
          
          await contractTest.verifyContract({
            method: 'processPayment',
            input: { amount: 100, currency: 'USD' },
            expectedOutput: { status: 'success', transactionId: expect.any(String) },
          });
        });
      });

