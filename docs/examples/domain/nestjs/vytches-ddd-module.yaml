# VytchesDDD Module - Main NestJS Integration Module

# === FILE METADATA ===
file-name: 'vytches-ddd.module'
title: 'VytchesDDDModule - NestJS Integration Module'
description: 'Main NestJS module for VytchesDDD integration following @nestjs/cqrs patterns'
business-context: 'Provides clean integration between NestJS and VytchesDDD with automatic handler discovery'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  VytchesDDDModule:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'VytchesDDD NestJS Integration Module'
      business-context: 'Simple, clean integration following @nestjs/cqrs patterns for maximum familiarity and reliability'

      # Format-specific
      formats:
        jsdoc:
          description: 'Main module providing VytchesDDD integration with NestJS'
        cli:
          description: |
            ## VytchesDDDModule

            Complete NestJS integration module providing:
            - **Dynamic Module Configuration**: forRoot() and forTesting() methods
            - **Automatic Handler Discovery**: Command, query, and event handler registration
            - **Custom Provider Support**: Interface token mapping (IEventBus => UnifiedEventBus)
            - **Global Module Support**: Optional global availability across application
            - **Testing Support**: Pre-configured buses for unit and integration tests

      custom-tags:
        since: '1.0.0'
        stability: 'stable'
        pattern: 'dynamic-module'
        framework: 'nestjs'
        similar-to: '@nestjs/cqrs'

    # Methods
    methods:
      forRoot:
        description: 'Configure VytchesDDD module with custom providers'
        business-context: 'Main configuration method for production applications with custom bus implementations'

        parameters:
          - name: 'options'
            type: 'VytchesDDDModuleOptions'
            description: 'Configuration options including custom providers, default: {}'
            optional: true

        returns:
          type: 'DynamicModule'
          description: 'Configured NestJS dynamic module with providers and exports'

        custom-tags:
          static: true
          pattern: 'factory-method'
          usage: 'production'

        examples:
          - id: 'basic-setup'
            title: 'Basic Module Setup'
            business-context: 'Standard production configuration with custom bus implementations'
            code: |
              @Module({
                imports: [
                  VytchesDDDModule.forRoot({
                    providers: [
                      { provide: 'ICommandBus', useClass: EnhancedCommandBus },
                      { provide: 'IQueryBus', useClass: EnhancedQueryBus },
                      { provide: 'IEventBus', useClass: UnifiedEventBus },
                    ]
                  })
                ]
              })
              export class AppModule {}

          - id: 'minimal-setup'
            title: 'Minimal Configuration'
            business-context: 'Quick setup without custom providers, uses default services'
            code: |
              @Module({
                imports: [VytchesDDDModule.forRoot()]
              })
              export class AppModule {}

          - id: 'interface-token-mapping'
            title: 'Interface Token Mapping'
            business-context: 'Enterprise pattern using abstract tokens for dependency injection'
            code: |
              import { ICommandBus, IQueryBus } from '@vytches/ddd-cqrs';
              import { IEventBus } from '@vytches/ddd-contracts';

              VytchesDDDModule.forRoot({
                providers: [
                  { provide: ICommandBus, useClass: EnhancedCommandBus },
                  { provide: IQueryBus, useClass: EnhancedQueryBus },
                  { provide: IEventBus, useClass: UnifiedEventBus },
                ]
              })

      forTesting:
        description: 'Simple configuration for testing and basic usage'
        business-context: 'Pre-configured module for unit and integration tests with default bus implementations'

        returns:
          type: 'DynamicModule'
          description: 'Testing-ready dynamic module with pre-configured bus implementations'

        custom-tags:
          static: true
          pattern: 'factory-method'
          usage: 'testing'

        examples:
          - id: 'test-setup'
            title: 'Testing Module Setup'
            business-context: 'Simple test configuration with pre-configured buses'
            code: |
              beforeEach(async () => {
                const module = await Test.createTestingModule({
                  imports: [VytchesDDDModule.forTesting()],
                  providers: [UserService]
                }).compile();
                
                service = module.get<UserService>(UserService);
              });

          - id: 'integration-test'
            title: 'Integration Testing'
            business-context: 'Full application testing with VytchesDDD integration'
            code: |
              const moduleFixture: TestingModule = await Test.createTestingModule({
                imports: [
                  VytchesDDDModule.forTesting(),
                  UserModule,
                  OrderModule
                ]
              }).compile();

              app = moduleFixture.createNestApplication();
              await app.init();

# === DECORATORS ===
decorators:
  Global:
    description: 'Makes module globally available across the application'
    business-context: 'Ensures VytchesDDD services are available without reimporting the module'
    from: '@nestjs/common'

  Module:
    description: 'NestJS module decorator defining the module metadata'
    business-context: 'Standard NestJS pattern for module definition'
    from: '@nestjs/common'

# === IMPORTS ===
imported-types:
  DynamicModule:
    description: 'NestJS dynamic module interface'
    source: '@nestjs/common'

  VytchesDDDModuleOptions:
    description: 'Configuration options interface'
    source: './types'
