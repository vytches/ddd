# NestJSContainerAdapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'nestjs-container-adapter'
title: 'NestJSContainerAdapter - Bridge Pattern Implementation'
description: 'Adapter that bridges NestJS DI with VytchesDDD service locator'
business-context: 'Enables dual container resolution preventing double instance issues'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  NestJSContainerAdapter:
    # Class Documentation
    class-doc:
      description: 'Container adapter implementing Bridge Pattern for framework isolation'
      business-context: 'Prevents double instance risk when integrating with NestJS'

      custom-tags:
        since: '1.0.0'
        pattern: 'Bridge Pattern'
        extends: 'BaseContainerAdapter'

    # Methods
    methods:
      constructor:
        description: 'Creates adapter with optional ModuleRef'
        business-context: 'Initializes bridge between containers'

        parameters:
          - name: 'moduleRef'
            type: 'ModuleRef'
            description: 'NestJS module reference'
            optional: true

        examples:
          - id: 'basic'
            code: |
              const adapter = new NestJSContainerAdapter(moduleRef);

      resolve:
        description: 'Resolves service from NestJS first, then VytchesDDD'
        business-context: 'Dual resolution strategy prevents duplicate instances'

        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service identifier'

        returns:
          type: 'T'
          description: 'Resolved service instance'

        examples:
          - id: 'resolution'
            code: |
              // Tries NestJS container first
              const service = adapter.resolve<UserService>('userService');
              // Falls back to internal registry if not found

      register:
        description: 'Registers service in internal container'
        business-context: 'Maintains internal registry for VytchesDDD services'

        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service identifier'
          - name: 'implementation'
            type: 'Constructor<T>'
            description: 'Service class'
          - name: 'options'
            type: 'ServiceRegistrationOptions'
            description: 'Registration options'
            optional: true

        examples:
          - id: 'registration'
            code: |
              adapter.register('orderService', OrderService, {
                lifetime: ServiceLifetime.Singleton,
                context: 'OrderManagement',
                tags: ['domain-service']
              });

      registerFactory:
        description: 'Register a service using a factory function'
        business-context: 'Enables complex service creation logic with dependencies'

        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service identifier'
          - name: 'factory'
            type: 'ServiceFactory<T>'
            description: 'Factory function to create service'
          - name: 'options'
            type: 'ServiceRegistrationOptions'
            description: 'Registration options'
            optional: true

        examples:
          - id: 'factory-registration'
            code: |
              adapter.registerFactory('logger', (container) => {
                const config = container.resolve('config');
                return new Logger(config.logLevel);
              });

      registerInstance:
        description: 'Register a service instance'
        business-context: 'Registers pre-created instances for configuration or external services'

        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service identifier'
          - name: 'instance'
            type: 'T'
            description: 'Pre-created service instance'
          - name: 'options'
            type: 'ServiceRegistrationOptions'
            description: 'Registration options'
            optional: true

        examples:
          - id: 'instance-registration'
            code: |
              const config = { apiUrl: 'https://api.example.com' };
              adapter.registerInstance('apiConfig', config);

      isRegistered:
        description: 'Check if a service is registered'
        business-context: 'Verifies service availability before resolution attempts'

        parameters:
          - name: 'token'
            type: 'ServiceToken<T>'
            description: 'Service identifier to check'

        returns:
          type: 'boolean'
          description: 'True if service is registered'

        examples:
          - id: 'registration-check'
            code: |
              if (adapter.isRegistered('userService')) {
                const service = adapter.resolve('userService');
              }

      getServices:
        description: 'Get all registered services'
        business-context: 'Provides visibility into registered services for debugging and monitoring'

        returns:
          type: 'ServiceDescriptor[]'
          description: 'Array of service descriptors'

        examples:
          - id: 'list-services'
            code: |
              const services = adapter.getServices();
              services.forEach(s => console.log(s.token, s.lifetime));

      getServicesByTag:
        description: 'Get services by tag'
        business-context: 'Enables grouped service operations based on categorization'

        parameters:
          - name: 'tag'
            type: 'string'
            description: 'Tag to filter services'

        returns:
          type: 'ServiceDescriptor[]'
          description: 'Services matching the tag'

        examples:
          - id: 'tagged-services'
            code: |
              const domainServices = adapter.getServicesByTag('domain-service');
              domainServices.forEach(s => s.initialize());

      createScope:
        description: 'Create a scoped container'
        business-context: 'Provides isolated container scope for request-specific services'

        parameters:
          - name: '_context'
            type: 'string'
            description: 'Optional scope context identifier'
            optional: true

        returns:
          type: 'IDependencyContainer'
          description: 'New scoped container instance'

        examples:
          - id: 'scoped-container'
            code: |
              const scopedContainer = adapter.createScope('request-123');
              scopedContainer.registerInstance('requestId', 'req-123');

      dispose:
        description: 'Dispose of the container and clean up resources'
        business-context: 'Ensures proper cleanup of resources and prevents memory leaks'

        examples:
          - id: 'cleanup'
            code: |
              // Clean up on application shutdown
              adapter.dispose();
