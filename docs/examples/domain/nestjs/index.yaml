# Index - NestJS Package Exports

# === FILE METADATA ===
file-name: 'index'
title: 'NestJS Package Public API'
description: 'Main export file for clean NestJS integration with VytchesDDD'
business-context: 'Provides simple, proven integration following @nestjs/cqrs patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Simple, clean NestJS integration for VytchesDDD Enterprise Domain-Driven Design framework'
  business-context: 'Following @nestjs/cqrs patterns for familiar, proven integration with automatic handler discovery'

  formats:
    jsdoc:
      description: 'NestJS integration package with auto-discovery and CQRS support'
    cli:
      description: |
        ## NestJS Package - Clean Integration

        Simple NestJS integration providing:
        - **VytchesDDDModule**: Main module with forRoot() and forTesting() methods
        - **VytchesExplorerService**: Automatic handler discovery following @nestjs/cqrs patterns
        - **TypeScript Integration**: Full type support with interface tokens
        - **Zero Configuration**: Works out of the box with sensible defaults

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'framework-integration'
    pattern: 'adapter-pattern'
    framework: 'nestjs'
    lines-of-code: '~250'
    complexity: 'simple'

# === EXPORTS DOCUMENTATION ===
exports:
  VytchesDDDModule:
    description: 'Main NestJS module for VytchesDDD integration'
    business-context: 'Configures VytchesDDD services within NestJS application with automatic handler discovery'
    source: './vytches-ddd.module'
    type: 'class'
    pattern: 'dynamic-module'

  VytchesExplorerService:
    description: 'Explorer service for automatic handler discovery'
    business-context: 'Automatically discovers and registers command, query, and event handlers'
    source: './services/vytches-explorer.service'
    type: 'service'
    pattern: 'discovery-service'

  VytchesDDDModuleOptions:
    description: 'Configuration options interface for VytchesDDD module'
    business-context: 'Provides type-safe configuration for custom providers and module setup'
    source: './types'
    type: 'interface'
