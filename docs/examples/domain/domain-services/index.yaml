# Domain Services Package - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'Domain Services Package - Main Exports'
description: 'Main export definitions for the domain services package with comprehensive API surface'
business-context: 'Provides the public API surface for domain service patterns and DDD service layer implementation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === PACKAGE DOCUMENTATION ===
package-doc:
  name: '@vytches/ddd-domain-services'
  version: '1.0.0'
  description: 'Domain services implementation for DDD architecture with enterprise patterns'
  business-context: 'Enables implementation of domain services that encapsulate business logic crossing aggregate boundaries'

  key-features:
    - 'Abstract base classes for domain service implementation'
    - 'Event-aware services with automatic event bus integration'
    - 'Transactional services with Unit of Work pattern support'
    - 'Async lifecycle management for services with external dependencies'
    - 'DI integration with automatic service discovery'
    - 'Enterprise error handling with domain-specific exceptions'

  patterns:
    - 'Domain Service Pattern'
    - 'Unit of Work Pattern'
    - 'Event-Driven Architecture'
    - 'Dependency Injection Pattern'
    - 'Async Lifecycle Pattern'

  dependencies:
    - '@vytches/ddd-contracts'
    - '@vytches/ddd-core'
    - '@vytches/ddd-repositories'
    - '@vytches/ddd-di'
    - 'reflect-metadata'

# === EXPORTS ===
exports:
  # Most commonly used - prioritized exports
  classes:
    AsyncDomainService:
      description: 'Domain service with asynchronous lifecycle management'
      source-file: 'base-domain-service'
      business-context: 'For services requiring async initialization/cleanup'

    EventAwareDomainService:
      description: 'Domain service with event publishing capabilities'
      source-file: 'base-domain-service'
      business-context: 'For services that need to publish domain events'

    IBaseDomainService:
      description: 'Abstract base class for domain service implementation'
      source-file: 'base-domain-service'
      business-context: 'Foundation class for all domain services'

    UnitOfWorkAwareDomainService:
      description: 'Domain service with transactional capabilities'
      source-file: 'base-domain-service'
      business-context: 'For services requiring transactional coordination'

  functions:
    DomainService:
      description: 'Decorator for registering domain services with DI'
      source-file: 'domain-service.decorator'
      business-context: 'Enables automatic service discovery and registration'

    getDIDomainServiceMetadata:
      description: 'Retrieves enhanced DI metadata from decorated classes'
      source-file: 'domain-service.decorator'
      business-context: 'For accessing DI metadata programmatically'

    getDomainServiceMetadata:
      description: 'Retrieves basic service metadata from decorated classes'
      source-file: 'domain-service.decorator'
      business-context: 'For backward compatibility and metadata inspection'

    isDomainServicePendingDIRegistration:
      description: 'Checks if service is pending DI registration'
      source-file: 'domain-service.decorator'
      business-context: 'Used by auto-discovery systems'

  interfaces:
    IAsyncDomainService:
      description: 'Interface for services with async lifecycle'
      source-file: 'domain-service.interface'
      business-context: 'Contract for async service initialization/cleanup'

    IDomainService:
      description: 'Base interface for all domain services'
      source-file: 'domain-service.interface'
      business-context: 'Fundamental domain service contract'

    IEventBusAware:
      description: 'Interface for event-publishing services'
      source-file: 'domain-service.interface'
      business-context: 'Contract for services that publish events'

    IUnitOfWorkAware:
      description: 'Interface for transactional services'
      source-file: 'domain-service.interface'
      business-context: 'Contract for services using Unit of Work'

  types:
    DIServiceMetadata:
      description: 'Complete DI metadata structure for services'
      source-file: 'di-types'
      business-context: 'Internal metadata for DI system integration'

    EnhancedDomainServiceOptions:
      description: 'Enhanced service configuration with DI capabilities'
      source-file: 'di-types'
      business-context: 'Full configuration options for advanced services'

    DomainServiceOptions:
      description: 'Basic domain service configuration options'
      source-file: 'domain-service.decorator'
      business-context: 'Configuration for basic service registration'

  errors:
    ServiceCircularError:
      description: 'Error for circular dependency detection'
      source-file: 'service.errors'
      business-context: 'Prevents infinite loops in service resolution'

    ServiceDuplicateError:
      description: 'Error for duplicate service registration'
      source-file: 'service.errors'
      business-context: 'Prevents service ID conflicts'

    ServiceNotFoundError:
      description: 'Error for missing service resolution'
      source-file: 'service.errors'
      business-context: 'Indicates missing service dependencies'

# === USAGE EXAMPLES ===
usage-examples:
  basic-service:
    description: 'Basic domain service implementation'
    code: |
      @DomainService('paymentService')
      class PaymentService extends IBaseDomainService {
        async processPayment(order: Order): Promise<Result<Payment, Error>> {
          // Business logic for payment processing
          return Result.success(processedPayment);
        }
      }

  event-aware-service:
    description: 'Service with event publishing capabilities'
    code: |
      @DomainService({
        serviceId: 'orderService',
        publishesEvents: true,
        dependencies: ['paymentService']
      })
      class OrderService extends EventAwareDomainService {
        async processOrder(order: Order): Promise<void> {
          // Business logic
          this.publishEvent(new OrderProcessedEvent(order.id));
        }
      }

  transactional-service:
    description: 'Service with transactional capabilities'
    code: |
      @DomainService({
        serviceId: 'transferService',
        transactional: true,
        dependencies: ['accountRepository']
      })
      class TransferService extends UnitOfWorkAwareDomainService {
        async transfer(fromId: string, toId: string, amount: number): Promise<void> {
          return this.executeInTransaction(async () => {
            const accountRepo = this.getRepository<IAccountRepository>('accounts');
            // Transactional business logic
          });
        }
      }

  async-service:
    description: 'Service with async lifecycle management'
    code: |
      @DomainService({
        serviceId: 'externalApiService',
        async: true,
        caching: { enabled: true, ttl: 300 }
      })
      class ExternalApiService extends AsyncDomainService {
        async initialize(): Promise<void> {
          this.client = await ExternalAPI.connect();
        }

        async dispose(): Promise<void> {
          if (this.client) {
            await this.client.disconnect();
          }
        }
      }

# === ARCHITECTURAL GUIDANCE ===
architectural-guidance:
  when-to-use:
    - 'Complex business logic that spans multiple aggregates'
    - 'External system integration within domain layer'
    - 'Coordination of multiple repository operations'
    - 'Business processes requiring event publication'
    - 'Domain calculations that do not belong to specific aggregates'

  best-practices:
    - 'Keep services stateless for better scalability'
    - 'Use dependency injection for external dependencies'
    - 'Implement proper error handling with domain-specific errors'
    - 'Use transactions for operations spanning multiple aggregates'
    - 'Publish domain events for cross-aggregate communication'

  common-pitfalls:
    - 'Making services too granular (anemic services)'
    - 'Putting aggregate logic in services instead of aggregates'
    - 'Creating stateful services that break scalability'
    - 'Mixing infrastructure concerns with domain logic'
    - 'Not handling transactional boundaries properly'
