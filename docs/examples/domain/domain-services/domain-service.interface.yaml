# DomainService Interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'domain-service.interface'
title: 'Domain Service Interfaces - Core Contracts'
description: 'Core interfaces defining contracts for domain services and their capabilities'
business-context: 'Defines the fundamental contracts that all domain services must implement in DDD architecture'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      interface-documentation: 'enabled'

    # Interface Documentation
    interface-doc:
      description: 'Base interface that all domain services must implement, providing service identification'
      business-context: 'Establishes the fundamental contract for domain services in DDD architecture'

      # Format-specific
      formats:
        jsdoc:
          description: 'Core domain service interface with service identification'
        cli:
          description: |
            ## IDomainService
            
            Base interface for all domain services in DDD architecture.
            Provides service identification for dependency injection and debugging.

      custom-tags:
        since: '1.0.0'
        pattern: 'Domain Service Pattern'
        contract: 'Core service contract'

    # Properties
    properties:
      - name: 'serviceId'
        type: 'string | undefined'
        description: 'Optional service identifier used for registration and lookup in service registry'
        readonly: true
        optional: true
        business-context: 'Unique identifier for service registration and DI container lookup'
        
        custom-tags:
          optional: 'Service ID is optional but recommended'
          readonly: 'Cannot be modified after creation'

  IAsyncDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      interface-documentation: 'enabled'

    # Interface Documentation
    interface-doc:
      description: 'Interface for domain services requiring asynchronous lifecycle management'
      business-context: 'Used for services that need async initialization/cleanup, such as external API connections'

      # Format-specific
      formats:
        jsdoc:
          description: 'Async lifecycle domain service interface with initialization and disposal hooks'
        cli:
          description: |
            ## IAsyncDomainService
            
            Interface for domain services with asynchronous lifecycle.
            Extends IDomainService with async initialization and cleanup capabilities.

      custom-tags:
        since: '1.0.0'
        pattern: 'Async Lifecycle Pattern'
        extends: 'IDomainService'

    # Methods
    methods:
      initialize:
        description: 'Asynchronously initializes the service'
        business-context: 'Called after service creation for async setup tasks like connecting to external APIs'
        optional: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when initialization is complete'

        examples:
          - id: 'basic'
            code: |
              class ExternalApiService implements IAsyncDomainService {
                async initialize(): Promise<void> {
                  this.connection = await ExternalAPI.connect();
                  this.isReady = true;
                }
              }

        custom-tags:
          lifecycle: 'Service lifecycle hook'
          async: 'Must return Promise<void>'

      dispose:
        description: 'Asynchronously disposes of the service resources'
        business-context: 'Called when service is no longer needed to cleanup resources and close connections'
        optional: true

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when disposal is complete'

        examples:
          - id: 'basic'
            code: |
              class ExternalApiService implements IAsyncDomainService {
                async dispose(): Promise<void> {
                  if (this.connection) {
                    await this.connection.close();
                    this.connection = null;
                  }
                }
              }

        custom-tags:
          lifecycle: 'Service cleanup hook'
          async: 'Must return Promise<void>'

  IUnitOfWorkAware:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      interface-documentation: 'enabled'

    # Interface Documentation
    interface-doc:
      description: 'Interface for services that can work with Unit of Work for transactional operations'
      business-context: 'Enables domain services to participate in transactional contexts across multiple repositories'

      # Format-specific
      formats:
        jsdoc:
          description: 'Unit of Work aware interface for transactional domain services'
        cli:
          description: |
            ## IUnitOfWorkAware
            
            Interface for services that support Unit of Work pattern.
            Enables transactional coordination across multiple repository operations.

      custom-tags:
        since: '1.0.0'
        pattern: 'Unit of Work Pattern'
        transactional: 'Enables transactional operations'

    # Methods
    methods:
      setUnitOfWork:
        description: 'Sets the Unit of Work context for transactional operations'
        business-context: 'Configures the service to use the provided Unit of Work for all transactional operations'

        parameters:
          - name: 'unitOfWork'
            type: 'IUnitOfWork'
            description: 'The Unit of Work instance to use for transactions'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              class TransferService implements IUnitOfWorkAware {
                setUnitOfWork(unitOfWork: IUnitOfWork): void {
                  this.unitOfWork = unitOfWork;
                  this.eventBus = unitOfWork.getEventBus();
                }
              }

        custom-tags:
          transactional: 'Configures transactional context'

      clearUnitOfWork:
        description: 'Clears the current Unit of Work context'
        business-context: 'Removes transactional context when service scope ends or transaction completes'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              class TransferService implements IUnitOfWorkAware {
                clearUnitOfWork(): void {
                  this.unitOfWork = undefined;
                  this.eventBus = undefined;
                }
              }

        custom-tags:
          cleanup: 'Removes transactional context'

  IEventBusAware:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      interface-documentation: 'enabled'

    # Interface Documentation
    interface-doc:
      description: 'Interface for services that can publish events through an event bus'
      business-context: 'Enables domain services to participate in event-driven architecture by publishing domain events'

      # Format-specific
      formats:
        jsdoc:
          description: 'Event bus aware interface for event-publishing domain services'
        cli:
          description: |
            ## IEventBusAware
            
            Interface for services that support event publishing.
            Enables domain services to participate in event-driven architecture.

      custom-tags:
        since: '1.0.0'
        pattern: 'Event-Driven Architecture'
        events: 'Enables event publishing'

    # Methods
    methods:
      setEventBus:
        description: 'Sets the event bus for the service to use when publishing events'
        business-context: 'Configures the service to publish domain events through the provided event bus'

        parameters:
          - name: 'eventBus'
            type: 'IEventBus'
            description: 'The event bus instance to use for publishing events'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              class OrderService implements IEventBusAware {
                setEventBus(eventBus: IEventBus): void {
                  this.eventBus = eventBus;
                }
                
                processOrder(order: Order): void {
                  // Business logic
                  this.eventBus.publish(new OrderProcessedEvent(order.id));
                }
              }

        custom-tags:
          events: 'Configures event publishing capability'

  ITransactionalDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      interface-documentation: 'enabled'

    # Interface Documentation
    interface-doc:
      description: 'Composite interface combining domain service identity with Unit of Work awareness'
      business-context: 'Convenience interface for domain services that need both service identity and transactional capabilities'

      # Format-specific
      formats:
        jsdoc:
          description: 'Composite interface for transactional domain services'
        cli:
          description: |
            ## ITransactionalDomainService
            
            Composite interface combining IDomainService and IUnitOfWorkAware.
            Convenience interface for services requiring both identity and transactional capabilities.

      custom-tags:
        since: '1.0.0'
        pattern: 'Composite Interface'
        extends: 'IDomainService, IUnitOfWorkAware'
        convenience: 'Combines common interfaces'