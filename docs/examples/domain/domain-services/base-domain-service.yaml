# BaseDomainService - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'base-domain-service'
title: 'BaseDomainService - Core Domain Service Implementation'
description: 'Abstract base classes for domain services with enterprise patterns'
business-context: 'Foundation for stateless domain logic that crosses aggregate boundaries'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  IBaseDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class implementing the IDomainService interface with service ID management'
      business-context: 'Foundation class for all domain services, providing basic identity and DI support'

      # Format-specific
      formats:
        jsdoc:
          description: 'Base domain service implementation with service ID management'
        cli:
          description: |
            ## IBaseDomainService

            Foundation abstract class for domain services in DDD architecture.
            Provides service identity and basic patterns for domain service implementation.

      custom-tags:
        since: '1.0.0'
        pattern: 'Domain Service Pattern'
        stateless: 'Designed for stateless operations'
        abstract: 'Abstract base class'

    # Methods
    methods:
      constructor:
        description: 'Creates a new instance of a domain service with service identification'
        business-context: 'Initializes the service with a unique identifier for DI registration and debugging'

        parameters:
          - name: 'serviceId'
            type: 'string'
            description: 'Unique identifier for this service instance'

        examples:
          - id: 'basic'
            code: |
              class PaymentService extends IBaseDomainService {
                constructor() {
                  super('PaymentService');
                }
              }

  EventAwareDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Domain service with built-in event publishing capabilities through IEventBus integration'
      business-context: 'Used for domain services that need to publish domain events as part of their operations'

      # Format-specific
      formats:
        jsdoc:
          description: 'Event-aware domain service for publishing domain events'
        cli:
          description: |
            ## EventAwareDomainService

            Domain service extension that provides event publishing capabilities.
            Automatically manages event bus integration for domain event publishing.

      custom-tags:
        since: '1.0.0'
        pattern: 'Event-Driven Architecture'
        capabilities: 'Domain event publishing'
        extends: 'IBaseDomainService'

    # Methods
    methods:
      constructor:
        description: 'Creates a new event-aware domain service instance'
        business-context: 'Initializes the service with event publishing capabilities'

        parameters:
          - name: 'serviceId'
            type: 'string'
            description: 'Unique identifier for this service instance'

        examples:
          - id: 'basic'
            code: |
              class OrderService extends EventAwareDomainService {
                constructor() {
                  super('OrderService');
                }
              }

      setEventBus:
        description: 'Sets the event bus for publishing domain events'
        business-context: 'Configures the service to publish events through the provided event bus'

        parameters:
          - name: 'eventBus'
            type: 'IEventBus'
            description: 'The event bus instance to use for publishing events'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              const eventBus = new UnifiedEventBus();
              const orderService = new OrderService();
              orderService.setEventBus(eventBus);

      publishEvent:
        description: 'Publishes a domain event to the registered event bus'
        business-context: 'Used by service methods to emit domain events for cross-aggregate communication'

        parameters:
          - name: 'event'
            type: 'T extends IDomainEvent'
            description: 'The domain event to publish'

        returns:
          type: 'void'
          description: 'No return value'

        throws:
          - type: 'Error'
            description: 'When no event bus has been configured'

        examples:
          - id: 'basic'
            code: |
              class OrderService extends EventAwareDomainService {
                processOrder(order: Order): void {
                  // Business logic
                  this.publishEvent(new OrderProcessedEvent(order.id));
                }
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          generic: 'Accepts any type extending IDomainEvent'

  UnitOfWorkAwareDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Domain service with transactional capabilities through Unit of Work pattern integration'
      business-context: 'Used for domain services that need to coordinate multiple repository operations within transactions'

      # Format-specific
      formats:
        jsdoc:
          description: 'Transactional domain service with Unit of Work support'
        cli:
          description: |
            ## UnitOfWorkAwareDomainService

            Advanced domain service with transactional capabilities.
            Provides Unit of Work pattern integration for coordinating repository operations.

      custom-tags:
        since: '1.0.0'
        pattern: 'Unit of Work Pattern'
        capabilities: 'Transactional operations, repository coordination'
        extends: 'EventAwareDomainService'

    # Methods
    methods:
      constructor:
        description: 'Creates a new Unit of Work aware domain service instance'
        business-context: 'Initializes service with transactional and event publishing capabilities'

        parameters:
          - name: 'serviceId'
            type: 'string'
            description: 'Unique identifier for this service instance'

        examples:
          - id: 'basic'
            code: |
              class TransferService extends UnitOfWorkAwareDomainService {
                constructor() {
                  super('TransferService');
                }
              }

      setUnitOfWork:
        description: 'Sets the Unit of Work for transactional operations and automatically configures event bus'
        business-context: 'Enables transactional coordination across multiple repositories and automatic event publishing'

        parameters:
          - name: 'unitOfWork'
            type: 'IUnitOfWork'
            description: 'The Unit of Work instance to use for transactions'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              const unitOfWork = new UnitOfWork();
              const transferService = new TransferService();
              transferService.setUnitOfWork(unitOfWork);

      clearUnitOfWork:
        description: 'Clears the Unit of Work and event bus references'
        business-context: 'Cleanup method to remove transactional context when service scope ends'

        returns:
          type: 'void'
          description: 'No return value'

        examples:
          - id: 'basic'
            code: |
              transferService.clearUnitOfWork();

      getRepository:
        description: 'Retrieves a repository from the current Unit of Work'
        business-context: 'Provides access to repositories within the transactional context'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'The name of the repository to retrieve'

        returns:
          type: 'T'
          description: 'The repository instance of the specified type'

        throws:
          - type: 'Error'
            description: 'When no Unit of Work has been configured'

        examples:
          - id: 'basic'
            code: |
              class TransferService extends UnitOfWorkAwareDomainService {
                async transfer(fromId: string, toId: string, amount: number): Promise<void> {
                  const accountRepo = this.getRepository<IAccountRepository>('accounts');
                  // Use repository within transaction
                }
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          generic: 'Returns strongly typed repository'

      executeInTransaction:
        description: 'Executes an operation within a transaction with automatic begin, commit, and rollback handling'
        business-context: 'Ensures ACID properties for complex operations spanning multiple aggregates'

        parameters:
          - name: 'operation'
            type: '() => Promise<T>'
            description: 'The async operation to execute within the transaction'

        returns:
          type: 'Promise<T>'
          description: 'Promise resolving to the operation result'

        throws:
          - type: 'Error'
            description: 'When no Unit of Work has been configured or operation fails'

        examples:
          - id: 'basic'
            code: |
              class TransferService extends UnitOfWorkAwareDomainService {
                async transfer(fromId: string, toId: string, amount: number): Promise<void> {
                  return this.executeInTransaction(async () => {
                    const accountRepo = this.getRepository<IAccountRepository>('accounts');
                    const fromAccount = await accountRepo.findById(fromId);
                    const toAccount = await accountRepo.findById(toId);
                    
                    fromAccount.debit(amount);
                    toAccount.credit(amount);
                    
                    await accountRepo.save(fromAccount);
                    await accountRepo.save(toAccount);
                  });
                }
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          generic: 'Returns result of operation'
          transaction: 'Handles transaction lifecycle automatically'

  AsyncDomainService:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Domain service with asynchronous lifecycle management for initialization and cleanup'
      business-context: 'Used for domain services that need async setup/teardown, such as external service connections'

      # Format-specific
      formats:
        jsdoc:
          description: 'Async lifecycle domain service with initialization and disposal hooks'
        cli:
          description: |
            ## AsyncDomainService

            Domain service with asynchronous lifecycle management.
            Provides hooks for async initialization and cleanup operations.

      custom-tags:
        since: '1.0.0'
        pattern: 'Async Lifecycle Pattern'
        capabilities: 'Async initialization and disposal'
        extends: 'IBaseDomainService'

    # Methods
    methods:
      constructor:
        description: 'Creates a new asynchronous domain service instance'
        business-context: 'Initializes service that requires async lifecycle management'

        parameters:
          - name: 'serviceId'
            type: 'string'
            description: 'Unique identifier for this service instance'

        examples:
          - id: 'basic'
            code: |
              class ExternalApiService extends AsyncDomainService {
                constructor() {
                  super('ExternalApiService');
                }
              }

      initialize:
        description: 'Initializes the domain service asynchronously'
        business-context: 'Called after service creation to perform async setup like connecting to external services'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when initialization is complete'

        examples:
          - id: 'basic'
            code: |
              class ExternalApiService extends AsyncDomainService {
                async initialize(): Promise<void> {
                  // Connect to external API
                  this.client = await ApiClient.connect(this.config);
                }
              }

        custom-tags:
          lifecycle: 'Initialization hook'
          override: 'Override in subclasses for custom initialization'

      dispose:
        description: 'Disposes of the domain service resources asynchronously'
        business-context: 'Called when service is no longer needed to cleanup resources like closing connections'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when disposal is complete'

        examples:
          - id: 'basic'
            code: |
              class ExternalApiService extends AsyncDomainService {
                async dispose(): Promise<void> {
                  // Clean up connections
                  if (this.client) {
                    await this.client.disconnect();
                  }
                }
              }

        custom-tags:
          lifecycle: 'Cleanup hook'
          override: 'Override in subclasses for custom cleanup'
