# policy-group - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'policy-group'
title: 'PolicyGroup - Policy Group Management'
description: 'Groups multiple policies with logical operators'
business-context: 'Enables complex business rules through policy composition'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  PolicyGroup:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Groups multiple policies with AND/OR logic for complex validation'
      business-context: 'Implements composite business rules with flexible combination logic'

      formats:
        jsdoc:
          description: 'Policy group with logical operators'
        cli:
          description: |
            ## PolicyGroup

            Group features:
            - AND/OR operators
            - Nested groups
            - Short-circuit evaluation
            - Violation aggregation
            - Priority ordering
            - Conditional groups

      custom-tags:
        since: '2.0.0'
        pattern: 'Composite Pattern'
        generic-type: 'TEntity - Entity type to validate'

    # Methods
    methods:
      static create:
        description: 'Creates new policy group'
        business-context: 'Factory for group creation'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Group identifier'
          - name: 'operator'
            type: "'AND' | 'OR'"
            description: 'Logical operator'
            default: 'AND'

        returns:
          type: 'PolicyGroup<TEntity>'
          description: 'New policy group'

        examples:
          - id: 'create-group'
            code: |
              const creditGroup = PolicyGroup.create<LoanApplication>(
                'credit-evaluation',
                'OR'
              );

      constructor:
        description: 'Creates policy group'
        business-context: 'Initializes group with configuration'

        parameters:
          - name: 'config'
            type: 'PolicyGroupConfig<TEntity>'
            description: 'Group configuration'

      addPolicy:
        description: 'Adds policy to group'
        business-context: 'Extends group with new policy'

        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to add'
          - name: 'weight'
            type: 'number'
            description: 'Policy weight/priority'
            optional: true

        returns:
          type: 'this'
          description: 'Group for chaining'

        examples:
          - id: 'add-policies'
            code: |
              group
                .addPolicy(emailPolicy, 100)
                .addPolicy(agePolicy, 50)
                .addPolicy(creditPolicy, 200);

      removePolicy:
        description: 'Removes policy from group'
        business-context: 'Removes existing policy'

        parameters:
          - name: 'policyId'
            type: 'string'
            description: 'Policy ID to remove'

        returns:
          type: 'boolean'
          description: 'True if removed'

      mustSatisfy:
        description: 'Adds inline predicate'
        business-context: 'Quick rule addition'

        parameters:
          - name: 'predicate'
            type: '(entity: TEntity) => boolean'
            description: 'Validation predicate'
          - name: 'code'
            type: 'string'
            description: 'Violation code'
            optional: true
          - name: 'message'
            type: 'string'
            description: 'Violation message'
            optional: true

        returns:
          type: 'this'
          description: 'Group for chaining'

        examples:
          - id: 'inline-predicate'
            code: |
              group
                .mustSatisfy(
                  app => app.creditScore >= 700,
                  'HIGH_CREDIT',
                  'Excellent credit required'
                )
                .mustSatisfy(
                  app => app.income > 100000,
                  'HIGH_INCOME',
                  'High income required'
                );

      and:
        description: 'Adds AND sub-group'
        business-context: 'Creates nested AND group'

        returns:
          type: 'PolicyGroup<TEntity>'
          description: 'New AND group'

      or:
        description: 'Adds OR sub-group'
        business-context: 'Creates nested OR group'

        returns:
          type: 'PolicyGroup<TEntity>'
          description: 'New OR group'

      check:
        description: 'Evaluates group policies'
        business-context: 'Executes group logic'

        parameters:
          - name: 'request'
            type: 'PolicyRequest<TEntity>'
            description: 'Evaluation request'

        returns:
          type: 'Promise<Result<TEntity, PolicyViolation>>'
          description: 'Group evaluation result'

        examples:
          - id: 'group-evaluation'
            code: |
              // AND group - all must pass
              const andResult = await andGroup.check({ entity: user });

              // OR group - at least one must pass
              const orResult = await orGroup.check({ entity: user });

      getPolicies:
        description: 'Returns group policies'
        business-context: 'Access group members'

        returns:
          type: 'IBusinessPolicy<TEntity>[]'
          description: 'Policies in group'

      getOperator:
        description: 'Returns group operator'
        business-context: 'Access combination logic'

        returns:
          type: "'AND' | 'OR'"
          description: 'Logical operator'

  PolicyGroupBuilder:
    class-doc:
      description: 'Fluent builder for policy groups'
      business-context: 'Simplifies group construction'

      custom-tags:
        since: '2.0.0'
        pattern: 'Builder Pattern'

    methods:
      static create:
        description: 'Creates group builder'
        parameters:
          - name: 'operator'
            type: "'AND' | 'OR'"
            default: 'AND'
        returns: 'PolicyGroupBuilder<TEntity>'

      withPolicy:
        description: 'Adds policy to builder'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
        returns: 'this'

      withPredicate:
        description: 'Adds predicate to builder'
        parameters:
          - name: 'predicate'
            type: '(entity: TEntity) => boolean'
          - name: 'violation'
            type: 'PolicyViolation'
        returns: 'this'

      build:
        description: 'Builds the group'
        returns: 'PolicyGroup<TEntity>'

# === INTERFACES ===
interfaces:
  PolicyGroupConfig:
    description: 'Policy group configuration'
    business-context: 'Structures group behavior'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Group identifier'

      - name: 'name'
        type: 'string'
        description: 'Group name'
        optional: true

      - name: 'operator'
        type: "'AND' | 'OR'"
        description: 'Logical operator'
        default: 'AND'

      - name: 'policies'
        type: 'IBusinessPolicy<TEntity>[]'
        description: 'Initial policies'
        default: '[]'

      - name: 'evaluationMode'
        type: 'GroupEvaluationMode'
        description: 'Evaluation strategy'
        default: 'short-circuit'

      - name: 'metadata'
        type: 'PolicyMetadata'
        description: 'Group metadata'
        optional: true

  PolicyWeight:
    description: 'Weighted policy entry'
    business-context: 'Prioritizes policies'

    properties:
      - name: 'policy'
        type: 'IBusinessPolicy<TEntity>'
        description: 'The policy'

      - name: 'weight'
        type: 'number'
        description: 'Policy weight'
        default: '0'

      - name: 'required'
        type: 'boolean'
        description: 'Is required'
        default: 'true'

# === ENUMS ===
enums:
  GroupEvaluationMode:
    description: 'Group evaluation strategy'
    business-context: 'Controls evaluation behavior'

    values:
      - name: 'SHORT_CIRCUIT'
        value: "'short-circuit'"
        description: 'Stop on first AND failure or OR success'

      - name: 'EVALUATE_ALL'
        value: "'evaluate-all'"
        description: 'Evaluate all policies regardless'

      - name: 'WEIGHTED'
        value: "'weighted'"
        description: 'Consider policy weights'

# === EXAMPLES ===
examples:
  - id: 'complex-group'
    description: 'Complex nested groups'
    code: |
      const loanPolicy = PolicyGroup.create<LoanApplication>('loan-approval', 'AND')
        .addPolicy(basicEligibilityPolicy)
        .or() // Create OR sub-group
          .mustSatisfy(app => app.creditScore >= 800, 'EXCELLENT_CREDIT')
          .and() // Nested AND within OR
            .mustSatisfy(app => app.creditScore >= 650, 'GOOD_CREDIT')
            .mustSatisfy(app => app.collateral >= 50000, 'COLLATERAL')
          .endGroup()
        .endGroup()
        .addPolicy(compliancePolicy);
        
      const result = await loanPolicy.check({ entity: application });
