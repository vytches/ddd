# policy-builder - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'policy-builder'
title: 'PolicyBuilder - Fluent Policy Construction'
description: 'Fluent builder for creating business policies'
business-context: 'Provides intuitive API for complex policy construction'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  PolicyBuilder:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Fluent builder for constructing business policies with chainable API'
      business-context: 'Simplifies creation of complex business rules with readable syntax'

      formats:
        jsdoc:
          description: 'Fluent builder pattern for policy creation'
        cli:
          description: |
            ## PolicyBuilder

            Fluent policy construction:
            - Chainable API design
            - Specification integration
            - Conditional policies
            - Group logic (AND/OR)
            - Async support
            - Context awareness

      custom-tags:
        since: '2.0.0'
        pattern: 'Fluent Builder'
        generic-type: 'TEntity - Entity type to validate'

    # Methods
    methods:
      static create:
        description: 'Creates new policy builder'
        business-context: 'Entry point for fluent API'

        parameters:
          - name: 'entityType'
            type: 'Type<TEntity>'
            description: 'Entity type for type safety'
            optional: true

        returns:
          type: 'PolicyBuilder<TEntity>'
          description: 'New builder instance'

        examples:
          - id: 'create-builder'
            code: |
              const builder = PolicyBuilder.create<User>();

              // With explicit type
              const userBuilder = PolicyBuilder.create(User);

        custom-tags:
          static: 'true'
          factory: 'true'

      withId:
        description: 'Sets policy ID'
        business-context: 'Unique identification'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'

        returns:
          type: 'this'
          description: 'Builder for chaining'

        custom-tags:
          fluent: 'true'

      withName:
        description: 'Sets policy name'
        business-context: 'Human-readable identification'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Policy name'

        returns:
          type: 'this'
          description: 'Builder for chaining'

      withDomain:
        description: 'Sets business domain'
        business-context: 'Domain categorization'

        parameters:
          - name: 'domain'
            type: 'string'
            description: 'Business domain'

        returns:
          type: 'this'
          description: 'Builder for chaining'

      must:
        description: 'Adds required specification'
        business-context: 'Defines mandatory rule'

        parameters:
          - name: 'specification'
            type: 'ISpecification<TEntity>'
            description: 'Required specification'

        returns:
          type: 'PolicyStepBuilder<TEntity>'
          description: 'Step builder for configuration'

        examples:
          - id: 'must-specification'
            code: |
              builder
                .must(new AgeSpecification(18))
                .withCode('AGE_REQUIREMENT')
                .withMessage('Must be 18 or older')
                .withSeverity('ERROR');

      mustAsync:
        description: 'Adds async required specification'
        business-context: 'Defines async mandatory rule'

        parameters:
          - name: 'specification'
            type: 'IAsyncSpecification<TEntity>'
            description: 'Async specification'

        returns:
          type: 'PolicyStepBuilder<TEntity>'
          description: 'Step builder'

      should:
        description: 'Adds optional specification'
        business-context: 'Defines warning-level rule'

        parameters:
          - name: 'specification'
            type: 'ISpecification<TEntity>'
            description: 'Optional specification'

        returns:
          type: 'PolicyStepBuilder<TEntity>'
          description: 'Step builder'

      mustSatisfy:
        description: 'Adds custom predicate'
        business-context: 'Inline rule definition'

        parameters:
          - name: 'predicate'
            type: '(entity: TEntity) => boolean'
            description: 'Validation predicate'
          - name: 'code'
            type: 'string'
            description: 'Violation code'
          - name: 'message'
            type: 'string'
            description: 'Violation message'

        returns:
          type: 'this'
          description: 'Builder for chaining'

        examples:
          - id: 'custom-predicate'
            code: |
              builder
                .mustSatisfy(
                  user => user.email.includes('@'),
                  'INVALID_EMAIL',
                  'Email must contain @'
                )
                .mustSatisfy(
                  user => user.age >= 18,
                  'UNDERAGE',
                  'Must be adult'
                );

      when:
        description: 'Starts conditional policy'
        business-context: 'Dynamic rule application'

        parameters:
          - name: 'condition'
            type: '(entity: TEntity, context?: PolicyContext) => boolean'
            description: 'Condition predicate'

        returns:
          type: 'ConditionalPolicyBuilder<TEntity>'
          description: 'Conditional builder'

        examples:
          - id: 'conditional-policy'
            code: |
              builder
                .when(user => user.role === 'admin')
                .then()
                  .must(new AdminPermissionSpec())
                .otherwise()
                  .must(new BasicPermissionSpec());

      and:
        description: 'Continues builder chain'
        business-context: 'Adds another rule'

        returns:
          type: 'this'
          description: 'Builder for chaining'

      or:
        description: 'Creates OR group'
        business-context: 'Alternative rules'

        returns:
          type: 'PolicyGroupBuilder<TEntity>'
          description: 'Group builder'

      withEvents:
        description: 'Enables event emission'
        business-context: 'Event-driven policies'

        parameters:
          - name: 'config'
            type: 'EventConfig'
            description: 'Event configuration'

        returns:
          type: 'this'
          description: 'Builder for chaining'

      withMetadata:
        description: 'Sets policy metadata'
        business-context: 'Additional configuration'

        parameters:
          - name: 'metadata'
            type: 'PolicyMetadata'
            description: 'Policy metadata'

        returns:
          type: 'this'
          description: 'Builder for chaining'

      build:
        description: 'Builds the policy'
        business-context: 'Creates final policy'

        returns:
          type: 'IBusinessPolicy<TEntity>'
          description: 'Configured policy'

        examples:
          - id: 'complete-build'
            code: |
              const userPolicy = PolicyBuilder.create<User>()
                .withId('user-validation')
                .withName('User Validation Policy')
                .withDomain('authentication')
                .must(new EmailSpecification())
                  .withCode('INVALID_EMAIL')
                  .withMessage('Valid email required')
                .and()
                .must(new AgeSpecification(18))
                  .withCode('UNDERAGE')
                  .withMessage('Must be 18+')
                .and()
                .when(user => user.country === 'US')
                .then()
                  .must(new USComplianceSpec())
                .build();

# === EXAMPLES ===
examples:
  - id: 'complex-policy'
    description: 'Complex policy with groups'
    code: |
      const loanPolicy = PolicyBuilder.create<LoanApplication>()
        .withId('loan-approval')
        .withDomain('lending')
        .must(new BasicEligibilitySpec())
        .and()
        .shouldSatisfyAny(
          PolicyGroup.create('excellent-credit')
            .mustSatisfy(app => app.creditScore >= 800),
          PolicyGroup.create('good-credit-with-collateral')
            .mustSatisfy(app => app.creditScore >= 650)
            .and()
            .mustSatisfy(app => app.collateral >= 50000)
        )
        .build();
