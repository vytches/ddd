# policy-builder.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'policy-builder.interface'
title: 'Policy Builder Interfaces'
description: 'Interfaces for fluent policy builder pattern'
business-context: 'Defines contracts for building policies with chainable API'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IPolicyBuilder:
    description: 'Core interface for policy builders'
    business-context: 'Defines fluent API for policy construction'

    generic-type: 'TEntity - Entity type to validate'

    methods:
      - name: 'withId'
        description: 'Sets policy identifier'
        parameters:
          - 'id: string'
        returns: 'this'

      - name: 'withName'
        description: 'Sets policy name'
        parameters:
          - 'name: string'
        returns: 'this'

      - name: 'withDomain'
        description: 'Sets business domain'
        parameters:
          - 'domain: string'
        returns: 'this'

      - name: 'withMetadata'
        description: 'Sets policy metadata'
        parameters:
          - 'metadata: PolicyMetadata'
        returns: 'this'

      - name: 'must'
        description: 'Adds required specification'
        parameters:
          - 'specification: ISpecification<TEntity>'
        returns: 'IPolicyStepBuilder<TEntity>'

      - name: 'mustAsync'
        description: 'Adds async required specification'
        parameters:
          - 'specification: IAsyncSpecification<TEntity>'
        returns: 'IPolicyStepBuilder<TEntity>'

      - name: 'should'
        description: 'Adds optional specification'
        parameters:
          - 'specification: ISpecification<TEntity>'
        returns: 'IPolicyStepBuilder<TEntity>'

      - name: 'when'
        description: 'Starts conditional policy'
        parameters:
          - 'condition: PolicyConditionPredicate<TEntity>'
        returns: 'IConditionalPolicyBuilder<TEntity>'

      - name: 'build'
        description: 'Builds the policy'
        returns: 'IBusinessPolicy<TEntity>'

    examples:
      - id: 'builder-interface'
        code: |
          class FluentPolicyBuilder<T> implements IPolicyBuilder<T> {
            private metadata: PolicyMetadata = {};
            private rules: PolicyRule[] = [];
            
            withId(id: string): this {
              this.metadata.id = id;
              return this;
            }
            
            must(spec: ISpecification<T>): IPolicyStepBuilder<T> {
              return new PolicyStepBuilder(this, spec);
            }
            
            build(): IBusinessPolicy<T> {
              return new CompiledPolicy(this.metadata, this.rules);
            }
          }

  IPolicyStepBuilder:
    description: 'Builder for individual policy steps'
    business-context: 'Configures individual policy rules'

    generic-type: 'TEntity - Entity type'

    methods:
      - name: 'withCode'
        description: 'Sets violation code'
        parameters:
          - 'code: string'
        returns: 'this'

      - name: 'withMessage'
        description: 'Sets violation message'
        parameters:
          - 'message: string'
        returns: 'this'

      - name: 'withSeverity'
        description: 'Sets violation severity'
        parameters:
          - 'severity: PolicySeverity'
        returns: 'this'

      - name: 'withField'
        description: 'Sets affected field'
        parameters:
          - 'field: string'
        returns: 'this'

      - name: 'and'
        description: 'Returns to main builder'
        returns: 'IPolicyBuilder<TEntity>'

      - name: 'or'
        description: 'Starts OR group'
        returns: 'IPolicyGroupBuilder<TEntity>'

  IConditionalPolicyBuilder:
    description: 'Builder for conditional policies'
    business-context: 'Creates policies with conditional execution'

    generic-type: 'TEntity - Entity type'

    methods:
      - name: 'then'
        description: 'Defines then branch'
        returns: 'IPolicyBuilder<TEntity>'

      - name: 'otherwise'
        description: 'Defines else branch'
        returns: 'IPolicyBuilder<TEntity>'

      - name: 'elseIf'
        description: 'Adds else-if condition'
        parameters:
          - 'condition: PolicyConditionPredicate<TEntity>'
        returns: 'IConditionalPolicyBuilder<TEntity>'

  IPolicyGroupBuilder:
    description: 'Builder for policy groups'
    business-context: 'Combines multiple policies with logic operators'

    generic-type: 'TEntity - Entity type'

    methods:
      - name: 'must'
        description: 'Adds required policy to group'
        parameters:
          - 'specification: ISpecification<TEntity>'
        returns: 'IPolicyStepBuilder<TEntity>'

      - name: 'should'
        description: 'Adds optional policy to group'
        parameters:
          - 'specification: ISpecification<TEntity>'
        returns: 'IPolicyStepBuilder<TEntity>'

      - name: 'mustSatisfy'
        description: 'Adds custom predicate'
        parameters:
          - 'predicate: (entity: TEntity) => boolean'
          - 'code: string'
          - 'message: string'
        returns: 'this'

      - name: 'endGroup'
        description: 'Closes group and returns to builder'
        returns: 'IPolicyBuilder<TEntity>'

  IPolicyCompiler:
    description: 'Compiles builder configuration to policy'
    business-context: 'Transforms builder state to executable policy'

    methods:
      - name: 'compile'
        description: 'Compiles configuration'
        parameters:
          - 'config: PolicyBuilderConfig'
        returns: 'IBusinessPolicy<any>'

      - name: 'validate'
        description: 'Validates configuration'
        parameters:
          - 'config: PolicyBuilderConfig'
        returns: 'ValidationResult'

# === TYPES ===
types:
  PolicyConditionPredicate:
    description: 'Condition evaluation function'
    business-context: 'Determines conditional execution'

    signature: '(entity: TEntity, context?: PolicyContext) => boolean'

  PolicyBuilderConfig:
    description: 'Builder configuration state'
    business-context: 'Captures builder settings'

    properties:
      - name: 'metadata'
        type: 'PolicyMetadata'
        description: 'Policy metadata'

      - name: 'rules'
        type: 'PolicyRule[]'
        description: 'Policy rules'

      - name: 'conditions'
        type: 'PolicyCondition[]'
        description: 'Execution conditions'
        optional: true

      - name: 'groups'
        type: 'PolicyGroup[]'
        description: 'Policy groups'
        optional: true

      - name: 'options'
        type: 'PolicyOptions'
        description: 'Policy options'
        optional: true

  PolicyOptions:
    description: 'Policy configuration options'
    business-context: 'Customizes policy behavior'

    properties:
      - name: 'failFast'
        type: 'boolean'
        description: 'Stop on first violation'
        default: 'false'
        optional: true

      - name: 'parallel'
        type: 'boolean'
        description: 'Evaluate rules in parallel'
        default: 'false'
        optional: true

      - name: 'timeout'
        type: 'number'
        description: 'Evaluation timeout in ms'
        optional: true

      - name: 'cache'
        type: 'boolean'
        description: 'Cache evaluation results'
        default: 'false'
        optional: true

      - name: 'events'
        type: 'EventConfig'
        description: 'Event emission config'
        optional: true
