# conditional-policy-builder - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'conditional-policy-builder'
title: 'ConditionalPolicyBuilder - Conditional Policy Construction'
description: 'Builder for creating policies with conditional execution'
business-context: 'Enables dynamic policy application based on runtime conditions'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ConditionalPolicyBuilder:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Fluent builder for creating policies with if-then-else logic'
      business-context: 'Implements conditional business rules with dynamic execution paths'

      formats:
        jsdoc:
          description: 'Builder for conditional policy execution'
        cli:
          description: |
            ## ConditionalPolicyBuilder

            Conditional policy features:
            - If-then-else branching
            - Multiple else-if conditions
            - Nested conditions
            - Context-aware evaluation
            - Lazy evaluation
            - Short-circuit logic

      custom-tags:
        since: '2.0.0'
        pattern: 'Builder Pattern'
        generic-type: 'TEntity - Entity type to validate'

    # Methods
    methods:
      constructor:
        description: 'Creates conditional builder'
        business-context: 'Initializes conditional policy structure'

        parameters:
          - name: 'parentBuilder'
            type: 'PolicyBuilder<TEntity>'
            description: 'Parent builder reference'
          - name: 'condition'
            type: 'PolicyConditionPredicate<TEntity>'
            description: 'Initial condition'

        examples:
          - id: 'create-conditional'
            code: |
              const builder = new ConditionalPolicyBuilder(
                parentBuilder,
                (user, context) => user.role === 'admin'
              );

      then:
        description: 'Defines then branch'
        business-context: 'Specifies policy for true condition'

        returns:
          type: 'PolicyBuilder<TEntity>'
          description: 'Builder for then branch'

        examples:
          - id: 'then-branch'
            code: |
              builder
                .when(user => user.role === 'admin')
                .then()
                  .must(new AdminPermissionSpec())
                  .must(new AdminLimitSpec());

      otherwise:
        description: 'Defines else branch'
        business-context: 'Specifies policy for false condition'

        returns:
          type: 'PolicyBuilder<TEntity>'
          description: 'Builder for else branch'

        examples:
          - id: 'else-branch'
            code: |
              builder
                .when(user => user.role === 'admin')
                .then()
                  .must(new AdminPermissionSpec())
                .otherwise()
                  .must(new BasicPermissionSpec());

      elseIf:
        description: 'Adds else-if condition'
        business-context: 'Additional conditional branch'

        parameters:
          - name: 'condition'
            type: 'PolicyConditionPredicate<TEntity>'
            description: 'Else-if condition'

        returns:
          type: 'ConditionalPolicyBuilder<TEntity>'
          description: 'New conditional builder'

        examples:
          - id: 'else-if-chain'
            code: |
              builder
                .when(user => user.role === 'admin')
                .then()
                  .must(new AdminSpec())
                .elseIf(user => user.role === 'moderator')
                .then()
                  .must(new ModeratorSpec())
                .elseIf(user => user.role === 'user')
                .then()
                  .must(new UserSpec())
                .otherwise()
                  .must(new GuestSpec());

      thenMust:
        description: 'Define what happens when condition is met using specification'
        business-context: 'Builds then-branch with specification validation'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to validate in then branch'

        returns:
          type: 'IConditionalPolicyThenStepBuilder<T>'
          description: 'Then step builder for fluent configuration'

        examples:
          - id: 'then-must-spec'
            code: |
              builder
                .when(user => user.isVip)
                .thenMust(new VipPermissionSpec())
                .withCode('VIP_PERMISSION_REQUIRED')
                .withMessage('VIP permissions required')
                .otherwise()
                .must(new BasicPermissionSpec());

      thenMustAsync:
        description: 'Define what happens when condition is met using async specification'
        business-context: 'Builds then-branch with async specification validation'

        parameters:
          - name: 'specification'
            type: 'IAsyncSpecification<T>'
            description: 'Async specification to validate in then branch'

        returns:
          type: 'IConditionalPolicyThenStepBuilder<T>'
          description: 'Then step builder for fluent configuration'

        examples:
          - id: 'then-must-async-spec'
            code: |
              builder
                .when(user => user.isPremium)
                .thenMustAsync(new ExternalCreditCheckSpec())
                .withCode('CREDIT_CHECK_FAILED')
                .withMessage('Credit check validation failed')
                .otherwise()
                .must(new BasicValidationSpec());

      endCondition:
        description: 'Closes conditional block'
        business-context: 'Returns to parent builder'

        returns:
          type: 'PolicyBuilder<TEntity>'
          description: 'Parent builder'

      build:
        description: 'Builds conditional policy'
        business-context: 'Creates executable policy'

        returns:
          type: 'ConditionalPolicy<TEntity>'
          description: 'Conditional policy instance'

  ConditionalPolicyThenStepBuilder:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Builder for configuring then-branch of conditional policies'
      business-context: 'Provides fluent API for specifying then-clause behavior and configuration'

      formats:
        jsdoc:
          description: 'Then-step builder for conditional policy configuration'
        cli:
          description: |
            ## ConditionalPolicyThenStepBuilder

            Then-step builder features:
            - Error code and message configuration
            - Severity level setting
            - Otherwise clause definition
            - Fluent API chaining
            - Type-safe configuration

      custom-tags:
        since: '2.0.0'
        pattern: 'Builder Pattern'
        generic-type: 'T - Entity type being validated'

    # Methods
    methods:
      constructor:
        description: 'Creates then-step builder'
        business-context: 'Initializes builder for then-clause configuration'

        parameters:
          - name: 'parentBuilder'
            type: 'IPolicyBuilder<T>'
            description: 'Parent policy builder'
          - name: 'condition'
            type: '(entity: T, context?: PolicyContext) => boolean'
            description: 'Conditional predicate'
          - name: 'thenStep'
            type: 'ConditionalThenStep<T>'
            description: 'Then-step configuration'

        examples:
          - id: 'create-then-builder'
            code: |
              const thenBuilder = new ConditionalPolicyThenStepBuilder(
                parentBuilder,
                user => user.role === 'admin',
                thenStep
              );

      withCode:
        description: 'Set error code for the then clause'
        business-context: 'Specifies error code when then-clause validation fails'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Error code for validation failures'

        returns:
          type: 'IConditionalPolicyThenStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'with-code'
            code: |
              builder
                .thenMust(new AdminPermissionSpec())
                .withCode('ADMIN_PERMISSION_REQUIRED')
                .withMessage('Administrator permissions required');

      withMessage:
        description: 'Set error message for the then clause'
        business-context: 'Specifies user-friendly error message for validation failures'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Error message for validation failures'

        returns:
          type: 'IConditionalPolicyThenStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'with-message'
            code: |
              builder
                .thenMust(new VipAccessSpec())
                .withMessage('VIP access required for this operation')
                .withSeverity('ERROR');

      withSeverity:
        description: 'Set severity for the then clause'
        business-context: 'Specifies severity level for validation violations'

        parameters:
          - name: 'severity'
            type: 'PolicyViolationSeverity'
            description: 'Violation severity level (ERROR, WARNING, INFO)'

        returns:
          type: 'IConditionalPolicyThenStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'with-severity'
            code: |
              builder
                .thenMust(new SecurityCheckSpec())
                .withSeverity('ERROR')
                .withCode('SECURITY_VIOLATION')
                .otherwise()
                .must(new BasicSecuritySpec());

      otherwise:
        description: 'Continue to else clause with policy'
        business-context: 'Defines policy to execute when condition is false'

        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<T>'
            description: 'Policy for else clause'

        returns:
          type: 'IConditionalPolicyElse<T>'
          description: 'Else clause builder'

        examples:
          - id: 'otherwise-policy'
            code: |
              builder
                .thenMust(new PremiumFeatureSpec())
                .otherwise(new StandardFeaturePolicy());

      otherwiseMust:
        description: 'Continue to else clause with specification'
        business-context: 'Defines specification to validate when condition is false'

        parameters:
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification for else clause'

        returns:
          type: 'IConditionalPolicyElseStepBuilder<T>'
          description: 'Else step builder for configuration'

        examples:
          - id: 'otherwise-must'
            code: |
              builder
                .thenMust(new AdminAccessSpec())
                .withCode('ADMIN_REQUIRED')
                .otherwiseMust(new UserAccessSpec())
                .withCode('USER_ACCESS_DENIED');

      otherwisePass:
        description: 'Pass if condition is not met'
        business-context: 'Allows execution to continue when condition is false'

        returns:
          type: 'IConditionalPolicyElse<T>'
          description: 'Else clause that passes validation'

        examples:
          - id: 'otherwise-pass'
            code: |
              builder
                .thenMust(new StrictValidationSpec())
                .withSeverity('ERROR')
                .otherwisePass(); // No validation for else branch

      otherwiseWarn:
        description: 'Emit warning if condition is not met'
        business-context: 'Issues warning when condition is false but allows continuation'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Warning message'

        returns:
          type: 'IConditionalPolicyElse<T>'
          description: 'Else clause with warning'

        examples:
          - id: 'otherwise-warn'
            code: |
              builder
                .thenMust(new OptimalPathSpec())
                .otherwiseWarn('Using suboptimal processing path');

  ConditionalPolicyElseStepBuilder:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Builder for configuring else-branch of conditional policies'
      business-context: 'Provides fluent API for specifying else-clause behavior and building final policy'

      formats:
        jsdoc:
          description: 'Else-step builder for conditional policy configuration'
        cli:
          description: |
            ## ConditionalPolicyElseStepBuilder

            Else-step builder features:
            - Error code and message configuration
            - Severity level setting
            - Final policy building
            - Fluent API completion
            - Type-safe validation

      custom-tags:
        since: '2.0.0'
        pattern: 'Builder Pattern'
        generic-type: 'T - Entity type being validated'

    # Methods
    methods:
      constructor:
        description: 'Creates else-step builder'
        business-context: 'Initializes builder for else-clause configuration and final policy creation'

        parameters:
          - name: 'parentBuilder'
            type: 'IPolicyBuilder<T>'
            description: 'Parent policy builder'
          - name: 'condition'
            type: '(entity: T, context?: PolicyContext) => boolean'
            description: 'Conditional predicate'
          - name: 'thenPolicy'
            type: 'IBusinessPolicy<T>'
            description: 'Policy for then-branch'
          - name: 'elseStep'
            type: 'ConditionalElseStep<T>'
            description: 'Else-step configuration'

        examples:
          - id: 'create-else-builder'
            code: |
              const elseBuilder = new ConditionalPolicyElseStepBuilder(
                parentBuilder,
                user => user.isVip,
                thenPolicy,
                elseStep
              );

      withCode:
        description: 'Set error code for the else clause'
        business-context: 'Specifies error code when else-clause validation fails'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Error code for validation failures'

        returns:
          type: 'IConditionalPolicyElseStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'else-with-code'
            code: |
              builder
                .thenMust(new VipAccessSpec())
                .otherwiseMust(new StandardAccessSpec())
                .withCode('STANDARD_ACCESS_DENIED')
                .withMessage('Standard access requirements not met');

      withMessage:
        description: 'Set error message for the else clause'
        business-context: 'Specifies user-friendly error message for else-clause validation failures'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Error message for validation failures'

        returns:
          type: 'IConditionalPolicyElseStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'else-with-message'
            code: |
              builder
                .otherwiseMust(new BasicValidationSpec())
                .withMessage('Basic validation failed')
                .withSeverity('WARNING')
                .build();

      withSeverity:
        description: 'Set severity for the else clause'
        business-context: 'Specifies severity level for else-clause validation violations'

        parameters:
          - name: 'severity'
            type: 'PolicyViolationSeverity'
            description: 'Violation severity level (ERROR, WARNING, INFO)'

        returns:
          type: 'IConditionalPolicyElseStepBuilder<T>'
          description: 'Builder instance for chaining'

        examples:
          - id: 'else-with-severity'
            code: |
              builder
                .otherwiseMust(new FallbackValidationSpec())
                .withSeverity('INFO')
                .withCode('FALLBACK_USED')
                .build();

      build:
        description: 'Build the conditional policy'
        business-context: 'Creates final executable conditional policy with configured then and else branches'

        returns:
          type: 'IBusinessPolicy<T>'
          description: 'Complete conditional policy ready for execution'

        examples:
          - id: 'build-conditional'
            code: |
              const policy = PolicyBuilder.create<User>()
                .when(user => user.isPremium)
                .thenMust(new PremiumFeatureSpec())
                .withCode('PREMIUM_REQUIRED')
                .otherwiseMust(new BasicFeatureSpec())
                .withCode('BASIC_ACCESS_DENIED')
                .withSeverity('ERROR')
                .build();

              // Policy is now ready for execution
              const result = await policy.check({ entity: user, context });

  ConditionalPolicyElse:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Final step in conditional policy building process'
      business-context: 'Represents complete conditional policy ready for building'

      formats:
        jsdoc:
          description: 'Conditional policy else clause for final building'
        cli:
          description: |
            ## ConditionalPolicyElse

            Final conditional builder features:
            - Complete policy building
            - Both branches configured
            - Ready for execution
            - Type-safe completion

      custom-tags:
        since: '2.0.0'
        pattern: 'Builder Pattern'
        generic-type: 'T - Entity type being validated'

    # Methods
    methods:
      constructor:
        description: 'Creates conditional policy else clause'
        business-context: 'Initializes final builder with complete conditional configuration'

        parameters:
          - name: 'parentBuilder'
            type: 'IPolicyBuilder<T>'
            description: 'Parent policy builder'
          - name: 'condition'
            type: '(entity: T, context?: PolicyContext) => boolean'
            description: 'Conditional predicate'
          - name: 'thenPolicy'
            type: 'IBusinessPolicy<T>'
            description: 'Policy for then-branch'
          - name: 'elsePolicy'
            type: 'IBusinessPolicy<T> | null'
            description: 'Policy for else-branch (null for pass-through)'

        examples:
          - id: 'create-conditional-else'
            code: |
              const conditionalElse = new ConditionalPolicyElse(
                parentBuilder,
                user => user.role === 'admin',
                adminPolicy,
                userPolicy
              );

      build:
        description: 'Build the conditional policy'
        business-context: 'Creates final executable conditional policy with complete then-else logic'

        returns:
          type: 'IBusinessPolicy<T>'
          description: 'Complete conditional policy ready for execution'

        examples:
          - id: 'build-final-policy'
            code: |
              // Complete conditional policy building
              const conditionalPolicy = PolicyBuilder.create<User>()
                .when(user => user.subscription === 'premium')
                .then(new PremiumAccessPolicy())
                .otherwise(new StandardAccessPolicy())
                .build();

              // Execute the conditional policy
              const result = await conditionalPolicy.check({
                entity: user,
                context: { requestType: 'feature-access' }
              });

              if (result.isFailure()) {
                console.log('Access denied:', result.error.violations);
              }

# === INTERFACES ===
interfaces:
  ConditionalBranch:
    description: 'Single conditional branch'
    business-context: 'Represents if-then pair'

    properties:
      - name: 'condition'
        type: 'PolicyConditionPredicate<TEntity>'
        description: 'Branch condition'

      - name: 'policy'
        type: 'IBusinessPolicy<TEntity>'
        description: 'Policy to execute'

      - name: 'description'
        type: 'string'
        description: 'Branch description'
        optional: true

  ConditionalPolicyConfig:
    description: 'Conditional policy configuration'
    business-context: 'Structures conditional logic'

    properties:
      - name: 'branches'
        type: 'ConditionalBranch<TEntity>[]'
        description: 'Conditional branches'

      - name: 'defaultPolicy'
        type: 'IBusinessPolicy<TEntity>'
        description: 'Default policy'
        optional: true

      - name: 'evaluationMode'
        type: "'first-match' | 'all-matching'"
        description: 'Evaluation strategy'
        default: 'first-match'

      - name: 'metadata'
        type: 'PolicyMetadata'
        description: 'Policy metadata'
        optional: true

# === TYPES ===
types:
  ConditionalEvaluationMode:
    description: 'How to evaluate conditions'
    business-context: 'Controls branch selection'

    values:
      - name: 'FIRST_MATCH'
        value: "'first-match'"
        description: 'Execute first matching branch'

      - name: 'ALL_MATCHING'
        value: "'all-matching'"
        description: 'Execute all matching branches'

      - name: 'LAST_MATCH'
        value: "'last-match'"
        description: 'Execute last matching branch'

# === EXAMPLES ===
examples:
  - id: 'complex-conditional'
    description: 'Complex conditional policy'
    code: |
      const policy = PolicyBuilder.create<LoanApplication>()
        .withId('loan-approval')
        .when(app => app.amount > 1000000)
        .then()
          .must(new ExecutiveApprovalSpec())
          .must(new RiskAssessmentSpec())
        .elseIf(app => app.amount > 100000)
        .then()
          .must(new ManagerApprovalSpec())
        .elseIf(app => app.creditScore < 600)
        .then()
          .must(new CreditReviewSpec())
          .must(new CollateralSpec())
        .otherwise()
          .must(new StandardApprovalSpec())
        .endCondition()
        .and()
        .must(new ComplianceSpec())
        .build();
