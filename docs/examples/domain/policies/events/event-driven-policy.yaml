# event-driven-policy - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'event-driven-policy'
title: 'EventDrivenPolicy - Event-Emitting Policy'
description: 'Policy that emits events during evaluation'
business-context: 'Enables observability and audit trails for policy evaluations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EventDrivenPolicy:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Policy wrapper that emits events for evaluation lifecycle'
      business-context: 'Provides audit trail and observability for compliance tracking'

      formats:
        jsdoc:
          description: 'Event-emitting policy decorator'
        cli:
          description: |
            ## EventDrivenPolicy

            Event features:
            - Pre-evaluation events
            - Post-evaluation events
            - Violation events
            - Success events
            - Timing events
            - Custom events

      custom-tags:
        since: '2.0.0'
        pattern: 'Decorator Pattern'
        implements: 'IBusinessPolicy<TEntity>'

    # Methods
    methods:
      constructor:
        description: 'Creates event-driven policy'
        business-context: 'Wraps policy with event emission'

        parameters:
          - name: 'innerPolicy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to wrap'
          - name: 'eventBus'
            type: 'IPolicyEventBus'
            description: 'Event bus for publishing'
          - name: 'config'
            type: 'EventConfig'
            description: 'Event configuration'
            optional: true

      check:
        description: 'Evaluates with event emission'
        business-context: 'Emits lifecycle events'

        parameters:
          - name: 'request'
            type: 'PolicyRequest<TEntity>'
            description: 'Evaluation request'

        returns:
          type: 'Promise<Result<TEntity, PolicyViolation>>'
          description: 'Result with events'

# === INTERFACES ===
interfaces:
  EventConfig:
    description: 'Event configuration'
    business-context: 'Controls event emission'

    properties:
      - name: 'enabled'
        type: 'boolean'
        description: 'Enable events'
        default: 'true'

      - name: 'includeEntity'
        type: 'boolean'
        description: 'Include entity in events'
        default: 'false'

      - name: 'includeContext'
        type: 'boolean'
        description: 'Include context in events'
        default: 'true'
