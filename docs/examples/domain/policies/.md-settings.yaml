# Package Settings - Policies

# === PACKAGE IDENTITY ===
package-name: 'policies'
display-name: 'Business Policies'
description: 'Business policy and rule enforcement patterns'
business-context: 'Enforces business rules and domain invariants with fluent API'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'business-rules'
complexity: 'intermediate'
patterns:
  - 'policy-pattern'
  - 'specification-pattern'
  - 'fluent-builder'
  - 'decorator-pattern'
  - 'strategy-pattern'

# === INTEGRATION ===
integration:
  validation: 'Integrates with validation package'
  specifications: 'Supports specification pattern'
  events: 'Event-driven policy evaluation'
  caching: 'Policy result caching'
  retry: 'Retry mechanisms for policies'

# === ENTERPRISE FEATURES ===
enterprise-features:
  - 'Fluent policy builder API'
  - 'Conditional policy execution'
  - 'Policy groups with AND/OR logic'
  - 'Async policy support'
  - 'Policy decorators (cache, retry, temporal)'
  - 'Event-driven architecture'
  - 'Policy registry management'
  - 'Specification pattern integration'
  - 'Context-aware execution'
  - 'Violation tracking'
