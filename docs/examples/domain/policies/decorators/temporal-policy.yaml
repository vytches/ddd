# temporal-policy - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'temporal-policy'
title: 'TemporalPolicy - Time-Based Policy Decorator'
description: 'Decorator adding temporal constraints to policies'
business-context: 'Enables time-based policy execution and business hours validation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  PolicyTemporalBehavior:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Wraps business policy with time-based execution constraints'
      business-context: 'Implements business hours, time windows, and temporal validation rules'

      formats:
        jsdoc:
          description: 'Temporal decorator for time-aware business policies'
        cli:
          description: |
            ## PolicyTemporalBehavior

            Temporal features:
            - Business hours validation
            - Working days/weekends
            - Time window constraints
            - Timezone support
            - Holiday awareness
            - Scheduled activation

      custom-tags:
        since: '2.1.0'
        pattern: 'Decorator'
        implements: 'IBusinessPolicy<TEntity>'
        note: 'Renamed from TemporalPolicy for clarity'

    # Methods
    methods:
      constructor:
        description: 'Creates temporal decorator'
        business-context: 'Wraps policy with time constraints'

        parameters:
          - name: 'innerPolicy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to wrap'
          - name: 'config'
            type: 'TemporalConfig'
            description: 'Temporal configuration'

        examples:
          - id: 'business-hours'
            code: |
              const businessHoursPolicy = new PolicyTemporalBehavior(
                strictPolicy,
                {
                  businessHours: { start: '09:00', end: '17:00' },
                  workingDays: [1, 2, 3, 4, 5], // Mon-Fri
                  timezone: 'America/New_York',
                  fallbackPolicy: relaxedPolicy
                }
              );

      static create:
        description: 'Factory method for temporal policy'
        business-context: 'Simplified creation'

        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to wrap'
          - name: 'duringHours'
            type: 'TimeWindow'
            description: 'Active time window'
          - name: 'fallback'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Off-hours policy'
            optional: true

        returns:
          type: 'PolicyTemporalBehavior<TEntity>'
          description: 'Temporal policy'

      check:
        description: 'Evaluates with temporal constraints'
        business-context: 'Applies time-appropriate policy'

        parameters:
          - name: 'request'
            type: 'PolicyRequest<TEntity>'
            description: 'Evaluation request'

        returns:
          type: 'Promise<Result<TEntity, PolicyViolation>>'
          description: 'Time-aware result'

        examples:
          - id: 'temporal-check'
            code: |
              // During business hours - strict policy
              const morningResult = await temporalPolicy.check({
                entity: transaction,
                context: { timestamp: new Date('2024-01-15 10:00') }
              });

              // After hours - relaxed policy
              const eveningResult = await temporalPolicy.check({
                entity: transaction,
                context: { timestamp: new Date('2024-01-15 20:00') }
              });

      isActive:
        description: 'Checks if policy is active'
        business-context: 'Determines temporal state'

        parameters:
          - name: 'timestamp'
            type: 'Date'
            description: 'Time to check'
            default: 'new Date()'

        returns:
          type: 'boolean'
          description: 'True if active'

      getActivePolicy:
        description: 'Returns currently active policy'
        business-context: 'Gets time-appropriate policy'

        parameters:
          - name: 'timestamp'
            type: 'Date'
            description: 'Time to check'
            default: 'new Date()'

        returns:
          type: 'IBusinessPolicy<TEntity>'
          description: 'Active policy'

  PolicyTemporalBehaviorBuilder:
    class-doc:
      description: 'Fluent builder for temporal policies'
      business-context: 'Simplifies temporal configuration'

      custom-tags:
        since: '2.1.0'
        pattern: 'Builder Pattern'

    methods:
      static from:
        description: 'Starts builder from policy'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
        returns: 'PolicyTemporalBehaviorBuilder<TEntity>'

      withBusinessHours:
        description: 'Sets business hours'
        parameters:
          - name: 'start'
            type: 'string'
            description: 'Start time (HH:mm)'
          - name: 'end'
            type: 'string'
            description: 'End time (HH:mm)'
        returns: 'this'

      withWorkingDays:
        description: 'Sets working days'
        parameters:
          - name: 'days'
            type: 'number[]'
            description: 'Days (0=Sun, 6=Sat)'
        returns: 'this'

      withTimezone:
        description: 'Sets timezone'
        parameters:
          - name: 'timezone'
            type: 'string'
        returns: 'this'

      duringBusinessHours:
        description: 'Policy for business hours'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
        returns: 'this'

      duringAfterHours:
        description: 'Policy for after hours'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
        returns: 'this'

      duringWeekends:
        description: 'Policy for weekends'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
        returns: 'this'

      build:
        description: 'Builds temporal policy'
        returns: 'PolicyTemporalBehavior<TEntity>'

  PolicyTemporalBehaviorFactory:
    class-doc:
      description: 'Factory for common temporal patterns'
      business-context: 'Provides pre-configured temporal policies'

      custom-tags:
        since: '2.1.0'
        static: 'true'

    methods:
      static forBusinessHours:
        description: 'Business hours policy'
        parameters:
          - name: 'businessPolicy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'afterHoursPolicy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'hours'
            type: 'TimeWindow'
        returns: 'PolicyTemporalBehavior<TEntity>'

      static forWorkingDays:
        description: 'Working days policy'
        parameters:
          - name: 'weekdayPolicy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'weekendPolicy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'workingDays'
            type: 'number[]'
            default: '[1,2,3,4,5]'
        returns: 'PolicyTemporalBehavior<TEntity>'

# === ALIASES ===
aliases:
  TemporalPolicy:
    description: 'Backward compatibility alias'
    aliasFor: 'PolicyTemporalBehavior'
    deprecated: '2.1.0'
    deprecationMessage: 'Use PolicyTemporalBehavior instead'

  PolicyTemporalDecorator:
    description: 'Alternative naming'
    aliasFor: 'PolicyTemporalBehavior'

# === INTERFACES ===
interfaces:
  TemporalConfig:
    description: 'Temporal configuration'
    business-context: 'Defines time constraints'

    properties:
      - name: 'businessHours'
        type: 'TimeWindow'
        description: 'Business hours window'
        optional: true

      - name: 'workingDays'
        type: 'number[]'
        description: 'Working days (0=Sun)'
        default: '[1,2,3,4,5]'
        optional: true

      - name: 'timezone'
        type: 'string'
        description: 'Timezone identifier'
        default: 'UTC'
        optional: true

      - name: 'holidays'
        type: 'Date[] | HolidayProvider'
        description: 'Holiday dates'
        optional: true

      - name: 'fallbackPolicy'
        type: 'IBusinessPolicy<TEntity>'
        description: 'Off-hours policy'
        optional: true

      - name: 'includeTemporalInfo'
        type: 'boolean'
        description: 'Add temporal info to result'
        default: 'false'
        optional: true

  TimeWindow:
    description: 'Time window definition'
    business-context: 'Defines active period'

    properties:
      - name: 'start'
        type: 'string'
        description: 'Start time (HH:mm)'

      - name: 'end'
        type: 'string'
        description: 'End time (HH:mm)'

  HolidayProvider:
    description: 'Holiday provider interface'
    business-context: 'Dynamic holiday resolution'

    methods:
      - name: 'isHoliday'
        description: 'Checks if date is holiday'
        parameters:
          - 'date: Date'
        returns: 'boolean'

      - name: 'getHolidays'
        description: 'Gets holidays for year'
        parameters:
          - 'year: number'
        returns: 'Date[]'
