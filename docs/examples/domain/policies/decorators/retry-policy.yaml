# retry-policy - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'retry-policy'
title: 'RetryPolicy - Policy Retry Decorator'
description: 'Decorator adding retry capability to policies'
business-context: 'Handles transient failures with automatic retry'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  PolicyRetryBehavior:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Wraps business policy with retry logic for transient failures'
      business-context: 'Provides resilience against temporary failures in policy evaluation'

      formats:
        jsdoc:
          description: 'Retry decorator for business policies following MediatR pattern'
        cli:
          description: |
            ## PolicyRetryBehavior

            Retry capabilities:
            - Configurable retry attempts
            - Exponential backoff
            - Custom retry conditions
            - Error categorization
            - Metrics collection

      custom-tags:
        since: '2.1.0'
        pattern: 'Decorator'
        implements: 'IBusinessPolicy<TEntity>'
        note: 'Renamed from RetryPolicy for clarity'

    # Methods
    methods:
      constructor:
        description: 'Creates retry decorator'
        business-context: 'Wraps policy with retry logic'

        parameters:
          - name: 'innerPolicy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to wrap'
          - name: 'config'
            type: 'RetryConfig'
            description: 'Retry configuration'

        examples:
          - id: 'basic-retry'
            code: |
              const retryPolicy = new PolicyRetryBehavior(
                basePolicy,
                {
                  maxAttempts: 3,
                  baseDelay: 1000,
                  backoff: 'exponential',
                  shouldRetry: (violation) => 
                    violation.code.includes('TIMEOUT')
                }
              );

      static create:
        description: 'Factory method for retry policy'
        business-context: 'Simplified creation'

        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
            description: 'Policy to wrap'
          - name: 'maxAttempts'
            type: 'number'
            description: 'Maximum retry attempts'
            default: '3'

        returns:
          type: 'PolicyRetryBehavior<TEntity>'
          description: 'Retry-enabled policy'

      check:
        description: 'Evaluates with retry logic'
        business-context: 'Handles transient failures'

        parameters:
          - name: 'request'
            type: 'PolicyRequest<TEntity>'
            description: 'Evaluation request'

        returns:
          type: 'Promise<Result<TEntity, PolicyViolation>>'
          description: 'Result after retries'

      getRetryMetrics:
        description: 'Returns retry statistics'
        business-context: 'Monitoring and diagnostics'

        returns:
          type: 'RetryMetrics'
          description: 'Retry statistics'

  PolicyRetryBehaviorFactory:
    class-doc:
      description: 'Factory for creating retry policies'
      business-context: 'Provides common retry configurations'

      custom-tags:
        since: '2.1.0'
        static: 'true'

    methods:
      static forTransientFailures:
        description: 'Creates retry for transient errors'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'maxAttempts'
            type: 'number'
            default: '3'
        returns: 'PolicyRetryBehavior<TEntity>'

      static forExternalServices:
        description: 'Creates retry for external service calls'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'config'
            type: 'ExternalServiceRetryConfig'
        returns: 'PolicyRetryBehavior<TEntity>'

      static withCustomLogic:
        description: 'Creates retry with custom logic'
        parameters:
          - name: 'policy'
            type: 'IBusinessPolicy<TEntity>'
          - name: 'shouldRetry'
            type: '(violation: PolicyViolation) => boolean'
          - name: 'maxAttempts'
            type: 'number'
          - name: 'baseDelay'
            type: 'number'
        returns: 'PolicyRetryBehavior<TEntity>'

# === ALIASES ===
aliases:
  RetryPolicy:
    description: 'Backward compatibility alias'
    aliasFor: 'PolicyRetryBehavior'
    deprecated: '2.1.0'
    deprecationMessage: 'Use PolicyRetryBehavior instead'

  PolicyRetryDecorator:
    description: 'Alternative naming'
    aliasFor: 'PolicyRetryBehavior'

# === INTERFACES ===
interfaces:
  RetryConfig:
    description: 'Retry configuration'
    business-context: 'Controls retry behavior'

    properties:
      - name: 'maxAttempts'
        type: 'number'
        description: 'Maximum retry attempts'
        default: '3'

      - name: 'baseDelay'
        type: 'number'
        description: 'Initial delay in ms'
        default: '1000'

      - name: 'maxDelay'
        type: 'number'
        description: 'Maximum delay in ms'
        default: '30000'
        optional: true

      - name: 'backoff'
        type: "'linear' | 'exponential' | 'fixed'"
        description: 'Backoff strategy'
        default: 'exponential'

      - name: 'shouldRetry'
        type: '(violation: PolicyViolation, attempt: number) => boolean'
        description: 'Custom retry condition'
        optional: true

      - name: 'onRetry'
        type: '(attempt: number, violation: PolicyViolation) => void'
        description: 'Retry callback'
        optional: true

  RetryMetrics:
    description: 'Retry statistics'
    business-context: 'Performance monitoring'

    properties:
      - name: 'totalAttempts'
        type: 'number'
        description: 'Total retry attempts'

      - name: 'successfulEvaluations'
        type: 'number'
        description: 'Successful evaluations'

      - name: 'failedEvaluations'
        type: 'number'
        description: 'Failed evaluations'

      - name: 'retriedEvaluations'
        type: 'number'
        description: 'Evaluations that required retry'

      - name: 'averageRetries'
        type: 'number'
        description: 'Average retries per evaluation'
