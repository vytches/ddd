# specification-adapters - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'specification-adapters'
title: 'Specification Adapters - Specification Pattern Integration'
description: 'Adapters for integrating specifications with policies'
business-context: 'Bridges specification pattern with policy pattern for reusable validation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BusinessRuleValidatorAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Adapts business rule validators as specifications'
      business-context: 'Bridge between validation framework and specification pattern'

      formats:
        jsdoc:
          description: 'Converts BusinessRuleValidator to ISpecification'
        cli:
          description: |
            ## BusinessRuleValidatorAdapter

            Adapter features:
            - Rule validator wrapping
            - Specification interface compliance
            - Composite operations (and, or, not)
            - Error explanation

      custom-tags:
        since: '2.0.0'
        pattern: 'Adapter Pattern'
        implements: 'ISpecification<T>'

    # Methods
    methods:
      constructor:
        description: 'Creates adapter from validator'
        business-context: 'Initializes adapter with business rule validator'

        parameters:
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'name'
            type: 'string'
            description: 'Optional specification name'
            optional: true
          - name: 'description'
            type: 'string'
            description: 'Optional specification description'
            optional: true

      isSatisfiedBy:
        description: 'Checks if candidate satisfies rules'
        business-context: 'Core specification validation logic'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Entity to validate'

        returns:
          type: 'boolean'
          description: 'Validation result'

      explainFailure:
        description: 'Explains validation failure'
        business-context: 'Provides failure diagnostics'

        parameters:
          - name: 'candidate'
            type: 'T'
            description: 'Failed entity'

        returns:
          type: 'string | null'
          description: 'Failure explanation or null'

      and:
        description: 'Combines with AND logic'
        business-context: 'Specification composition'

        parameters:
          - name: 'other'
            type: 'ISpecification<T>'
            description: 'Other specification'

        returns:
          type: 'ISpecification<T>'
          description: 'Combined specification'

      or:
        description: 'Combines with OR logic'
        business-context: 'Specification composition'

        parameters:
          - name: 'other'
            type: 'ISpecification<T>'
            description: 'Other specification'

        returns:
          type: 'ISpecification<T>'
          description: 'Combined specification'

      not:
        description: 'Negates this specification'
        business-context: 'Specification negation'

        returns:
          type: 'ISpecification<T>'
          description: 'Negated specification'

      create:
        description: 'Creates adapter from validator'
        business-context: 'Factory method for adapter creation'

        parameters:
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'name'
            type: 'string'
            description: 'Optional specification name'
            optional: true
          - name: 'description'
            type: 'string'
            description: 'Optional specification description'
            optional: true

        returns:
          type: 'BusinessRuleValidatorAdapter<T>'
          description: 'New adapter instance'

        custom-tags:
          static: 'true'

  BusinessRuleValidatorPolicy:
    class-doc:
      description: 'Policy implementation using business rule validator'
      business-context: 'Converts business rule validator to policy pattern'

      custom-tags:
        since: '2.0.0'
        extends: 'BaseBusinessPolicy<T>'

    methods:
      constructor:
        description: 'Creates policy from validator'
        business-context: 'Initializes policy with business rule validator'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'errorCode'
            type: 'string'
            description: 'Optional error code'
            optional: true

      check:
        description: 'Evaluates entity against business rules'
        business-context: 'Core policy evaluation using validator'

        parameters:
          - name: 'request'
            type: 'PolicyRequest<T>'
            description: 'Policy evaluation request'

        returns:
          type: 'Promise<Result<T, PolicyViolation>>'
          description: 'Policy evaluation result'

        custom-tags:
          async: 'true'

      fromValidator:
        description: 'Creates policy from business rule validator'
        business-context: 'Factory method for validator-based policies'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'errorCode'
            type: 'string'
            description: 'Optional error code'
            optional: true

        returns:
          type: 'BusinessRuleValidatorPolicy<T>'
          description: 'New policy instance'

        custom-tags:
          static: 'true'

  PolicySpecificationFactory:
    class-doc:
      description: 'Factory for creating specification-based policies'
      business-context: 'Centralized factory for various specification adapters'

      custom-tags:
        since: '2.0.0'
        static-class: 'true'

    methods:
      fromSpecification:
        description: 'Creates policy from ISpecification'
        business-context: 'Converts specifications to policies'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'specification'
            type: 'ISpecification<T>'
            description: 'Specification to adapt'
          - name: 'options'
            type: 'SpecificationOptions'
            description: 'Optional configuration'
            optional: true

        returns:
          type: 'SpecificationPolicy<T>'
          description: 'Specification-based policy'

        custom-tags:
          static: 'true'

      fromAsyncSpecification:
        description: 'Creates policy from IAsyncSpecification'
        business-context: 'Converts async specifications to policies'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'specification'
            type: 'IAsyncSpecification<T>'
            description: 'Async specification to adapt'
          - name: 'options'
            type: 'SpecificationOptions'
            description: 'Optional configuration'
            optional: true

        returns:
          type: 'AsyncSpecificationPolicy<T>'
          description: 'Async specification-based policy'

        custom-tags:
          static: 'true'

      fromBusinessRuleValidator:
        description: 'Creates policy from BusinessRuleValidator'
        business-context: 'Converts business rule validator to policy'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'errorCode'
            type: 'string'
            description: 'Optional error code'
            optional: true

        returns:
          type: 'BusinessRuleValidatorPolicy<T>'
          description: 'Validator-based policy'

        custom-tags:
          static: 'true'

      businessRuleValidatorToSpecification:
        description: 'Converts validator to specification'
        business-context: 'Creates specification adapter from validator'

        parameters:
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'name'
            type: 'string'
            description: 'Optional specification name'
            optional: true
          - name: 'description'
            type: 'string'
            description: 'Optional specification description'
            optional: true

        returns:
          type: 'BusinessRuleValidatorAdapter<T>'
          description: 'Specification adapter'

        custom-tags:
          static: 'true'

      fromBusinessRuleValidatorAsSpecification:
        description: 'Creates policy via specification adapter'
        business-context: 'Two-step conversion: validator→specification→policy'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Policy identifier'
          - name: 'domain'
            type: 'string'
            description: 'Policy domain'
          - name: 'name'
            type: 'string'
            description: 'Policy name'
          - name: 'validator'
            type: 'BusinessRuleValidator<T>'
            description: 'Business rule validator'
          - name: 'options'
            type: 'ValidatorAsSpecificationOptions'
            description: 'Configuration options'
            optional: true

        returns:
          type: 'SpecificationPolicy<T>'
          description: 'Specification-based policy'

        examples:
          - id: 'validator-to-specification-policy'
            code: |
              const validator = new UserAgeValidator(18);

              const agePolicy = PolicySpecificationFactory.fromBusinessRuleValidatorAsSpecification(
                'user-age-policy',
                'authentication',
                'User Age Validation',
                validator,
                {
                  errorCode: 'AGE_TOO_LOW',
                  errorMessage: 'User must be at least 18 years old',
                  specificationName: 'Age Specification',
                  specificationDescription: 'Validates user age requirement'
                }
              );

        custom-tags:
          static: 'true'

# === TYPES ===
types:
  SpecificationOptions:
    description: 'Configuration for specification-based policies'

  ValidatorAsSpecificationOptions:
    description: 'Configuration for validator-to-specification conversion'
