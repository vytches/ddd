# policy-metadata - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'policy-metadata'
title: 'PolicyMetadata - Policy Metadata Model'
description: 'Metadata model for business policies'
business-context: 'Provides rich metadata for policy identification and management'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  PolicyMetadata:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Encapsulates metadata about a business policy'
      business-context: 'Provides comprehensive policy information for management and discovery'

      formats:
        jsdoc:
          description: 'Policy metadata container'
        cli:
          description: |
            ## PolicyMetadata

            Metadata features:
            - Unique identification
            - Version management
            - Domain classification
            - Tag-based discovery
            - Priority ordering
            - Lifecycle tracking

      custom-tags:
        since: '1.0.0'
        immutable: 'true'

    # Methods
    methods:
      constructor:
        description: 'Creates policy metadata'
        business-context: 'Initializes policy information'

        parameters:
          - name: 'data'
            type: 'PolicyMetadataData'
            description: 'Metadata values'

        examples:
          - id: 'create-metadata'
            code: |
              const metadata = new PolicyMetadata({
                id: 'user-validation',
                name: 'User Validation Policy',
                domain: 'authentication',
                version: '2.1.0',
                description: 'Validates user registration data',
                tags: ['security', 'validation', 'user'],
                priority: 100,
                author: 'Security Team',
                createdAt: new Date('2024-01-01'),
                updatedAt: new Date('2024-03-15')
              });

      getId:
        description: 'Returns policy ID'
        business-context: 'Unique identifier access'

        returns:
          type: 'string'
          description: 'Policy ID'

      getName:
        description: 'Returns policy name'
        business-context: 'Human-readable name'

        returns:
          type: 'string'
          description: 'Policy name'

      getDomain:
        description: 'Returns business domain'
        business-context: 'Domain classification'

        returns:
          type: 'string'
          description: 'Business domain'

      getVersion:
        description: 'Returns policy version'
        business-context: 'Version tracking'

        returns:
          type: 'string'
          description: 'Version string'

      getTags:
        description: 'Returns policy tags'
        business-context: 'Discovery tags'

        returns:
          type: 'string[]'
          description: 'Tag array'

      getPriority:
        description: 'Returns policy priority'
        business-context: 'Execution ordering'

        returns:
          type: 'number'
          description: 'Priority value'

      getDescription:
        description: 'Returns policy description'
        business-context: 'Detailed explanation'

        returns:
          type: 'string | undefined'
          description: 'Description text'

      getAuthor:
        description: 'Returns policy author'
        business-context: 'Authorship tracking'

        returns:
          type: 'string | undefined'
          description: 'Author name'

      getCreatedAt:
        description: 'Returns creation timestamp'
        business-context: 'Creation tracking'

        returns:
          type: 'Date | undefined'
          description: 'Creation date'

      getUpdatedAt:
        description: 'Returns update timestamp'
        business-context: 'Modification tracking'

        returns:
          type: 'Date | undefined'
          description: 'Last update date'

      hasTag:
        description: 'Checks for specific tag'
        business-context: 'Tag verification'

        parameters:
          - name: 'tag'
            type: 'string'
            description: 'Tag to check'

        returns:
          type: 'boolean'
          description: 'True if tag exists'

      toJSON:
        description: 'Serializes metadata'
        business-context: 'Export for persistence'

        returns:
          type: 'PolicyMetadataData'
          description: 'Serialized metadata'

      static fromJSON:
        description: 'Deserializes metadata'
        business-context: 'Import from storage'

        parameters:
          - name: 'json'
            type: 'PolicyMetadataData'
            description: 'Serialized data'

        returns:
          type: 'PolicyMetadata'
          description: 'Metadata instance'

      merge:
        description: 'Merges with other metadata'
        business-context: 'Combines metadata'

        parameters:
          - name: 'other'
            type: 'Partial<PolicyMetadataData>'
            description: 'Metadata to merge'

        returns:
          type: 'PolicyMetadata'
          description: 'New merged metadata'

        examples:
          - id: 'merge-metadata'
            code: |
              const base = new PolicyMetadata({
                id: 'policy-1',
                name: 'Base Policy',
                domain: 'core'
              });

              const updated = base.merge({
                version: '2.0.0',
                tags: ['updated'],
                updatedAt: new Date()
              });

# === INTERFACES ===
interfaces:
  PolicyMetadataData:
    description: 'Policy metadata data structure'
    business-context: 'Serializable metadata representation'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier'

      - name: 'name'
        type: 'string'
        description: 'Policy name'

      - name: 'domain'
        type: 'string'
        description: 'Business domain'

      - name: 'version'
        type: 'string'
        description: 'Policy version'
        default: '1.0.0'
        optional: true

      - name: 'description'
        type: 'string'
        description: 'Policy description'
        optional: true

      - name: 'tags'
        type: 'string[]'
        description: 'Discovery tags'
        default: '[]'
        optional: true

      - name: 'priority'
        type: 'number'
        description: 'Execution priority'
        default: '0'
        optional: true

      - name: 'author'
        type: 'string'
        description: 'Policy author'
        optional: true

      - name: 'createdAt'
        type: 'Date | string'
        description: 'Creation timestamp'
        optional: true

      - name: 'updatedAt'
        type: 'Date | string'
        description: 'Update timestamp'
        optional: true

      - name: 'deprecated'
        type: 'boolean'
        description: 'Deprecation flag'
        optional: true

      - name: 'deprecationMessage'
        type: 'string'
        description: 'Deprecation reason'
        optional: true

      - name: 'replacedBy'
        type: 'string'
        description: 'Replacement policy ID'
        optional: true

      - name: 'custom'
        type: 'Record<string, any>'
        description: 'Custom metadata'
        optional: true

# === TYPES ===
types:
  PolicyPriority:
    description: 'Policy priority levels'
    business-context: 'Standard priority values'

    values:
      - name: 'CRITICAL'
        value: '1000'
        description: 'Critical priority'

      - name: 'HIGH'
        value: '100'
        description: 'High priority'

      - name: 'NORMAL'
        value: '0'
        description: 'Normal priority'

      - name: 'LOW'
        value: '-100'
        description: 'Low priority'

  PolicyStatus:
    description: 'Policy lifecycle status'
    business-context: 'Tracks policy state'

    values:
      - name: 'DRAFT'
        value: "'draft'"
        description: 'Under development'

      - name: 'ACTIVE'
        value: "'active'"
        description: 'Currently active'

      - name: 'DEPRECATED'
        value: "'deprecated'"
        description: 'Marked for removal'

      - name: 'ARCHIVED'
        value: "'archived'"
        description: 'No longer used'
