# business-policy.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'business-policy.interface'
title: 'Business Policy Interfaces'
description: 'Core interfaces for business policy pattern'
business-context: 'Defines contracts for policy implementation and evaluation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IBusinessPolicy:
    description: 'Core contract for business policies'
    business-context: 'Defines how business rules are evaluated'

    generic-type: 'TEntity - Entity type to validate'

    methods:
      - name: 'check'
        description: 'Evaluates entity against policy'
        parameters:
          - 'request: PolicyRequest<TEntity>'
        returns: 'Promise<Result<TEntity, PolicyViolation>>'

      - name: 'evaluate'
        description: 'Alternative evaluation method'
        parameters:
          - 'entity: TEntity'
          - 'context?: PolicyContext'
        returns: 'Promise<Result<TEntity, PolicyViolation>>'
        optional: true

      - name: 'getName'
        description: 'Returns policy name'
        returns: 'string'

      - name: 'getId'
        description: 'Returns policy identifier'
        returns: 'string'

      - name: 'getDomain'
        description: 'Returns business domain'
        returns: 'string'
        optional: true

      - name: 'getMetadata'
        description: 'Returns policy metadata'
        returns: 'PolicyMetadata'
        optional: true

    examples:
      - id: 'implementation'
        code: |
          class EmailValidationPolicy implements IBusinessPolicy<User> {
            async check(request: PolicyRequest<User>): Promise<Result<User, PolicyViolation>> {
              if (!isValidEmail(request.entity.email)) {
                return Result.fail(new PolicyViolation(
                  'INVALID_EMAIL',
                  'Email format is invalid',
                  'ERROR',
                  'email'
                ));
              }
              return Result.ok(request.entity);
            }
            
            getName(): string {
              return 'Email Validation Policy';
            }
            
            getId(): string {
              return 'email-validation';
            }
          }

  IAsyncBusinessPolicy:
    description: 'Async-specific business policy interface'
    business-context: 'For policies requiring async operations'

    extends: 'IBusinessPolicy<TEntity>'

    methods:
      - name: 'checkAsync'
        description: 'Async policy evaluation'
        parameters:
          - 'request: PolicyRequest<TEntity>'
        returns: 'Promise<Result<TEntity, PolicyViolation>>'

  ISyncBusinessPolicy:
    description: 'Sync-specific business policy interface'
    business-context: 'For policies with synchronous evaluation'

    generic-type: 'TEntity - Entity type to validate'

    methods:
      - name: 'checkSync'
        description: 'Synchronous evaluation'
        parameters:
          - 'request: PolicyRequest<TEntity>'
        returns: 'Result<TEntity, PolicyViolation>'

  IPolicyWithRules:
    description: 'Policy with explicit rule definitions'
    business-context: 'Enables rule-based policy configuration'

    extends: 'IBusinessPolicy<TEntity>'

    methods:
      - name: 'getRules'
        description: 'Returns policy rules'
        returns: 'PolicyRule[]'

      - name: 'addRule'
        description: 'Adds new rule'
        parameters:
          - 'rule: PolicyRule'
        returns: 'void'

      - name: 'removeRule'
        description: 'Removes rule'
        parameters:
          - 'ruleId: string'
        returns: 'boolean'

  IPolicyWithContext:
    description: 'Context-aware policy interface'
    business-context: 'For policies requiring rich context'

    extends: 'IBusinessPolicy<TEntity>'
    generic-type: 'TEntity, TContext extends PolicyContext'

    methods:
      - name: 'checkWithContext'
        description: 'Context-aware evaluation'
        parameters:
          - 'entity: TEntity'
          - 'context: TContext'
        returns: 'Promise<Result<TEntity, PolicyViolation>>'

  IConditionalPolicy:
    description: 'Policy with conditional execution'
    business-context: 'Enables dynamic policy application'

    extends: 'IBusinessPolicy<TEntity>'

    methods:
      - name: 'shouldApply'
        description: 'Determines if policy applies'
        parameters:
          - 'entity: TEntity'
          - 'context?: PolicyContext'
        returns: 'boolean | Promise<boolean>'

      - name: 'getConditions'
        description: 'Returns application conditions'
        returns: 'PolicyCondition[]'

  IPolicyGroup:
    description: 'Group of related policies'
    business-context: 'Manages policy collections'

    methods:
      - name: 'getPolicies'
        description: 'Returns grouped policies'
        returns: 'IBusinessPolicy<TEntity>[]'

      - name: 'addPolicy'
        description: 'Adds policy to group'
        parameters:
          - 'policy: IBusinessPolicy<TEntity>'
        returns: 'void'

      - name: 'removePolicy'
        description: 'Removes policy from group'
        parameters:
          - 'policyId: string'
        returns: 'boolean'

      - name: 'checkAll'
        description: 'Evaluates all policies'
        parameters:
          - 'request: PolicyRequest<TEntity>'
        returns: 'Promise<PolicyGroupResult<TEntity>>'

# === TYPES ===
types:
  PolicyRule:
    description: 'Individual policy rule'
    business-context: 'Atomic business rule'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Rule identifier'

      - name: 'name'
        type: 'string'
        description: 'Rule name'

      - name: 'description'
        type: 'string'
        description: 'Rule description'
        optional: true

      - name: 'evaluate'
        type: '(entity: any) => boolean | Promise<boolean>'
        description: 'Rule evaluation function'

      - name: 'violationCode'
        type: 'string'
        description: 'Code when rule violated'

      - name: 'violationMessage'
        type: 'string'
        description: 'Message when violated'

  PolicyCondition:
    description: 'Policy application condition'
    business-context: 'Determines when policy applies'

    properties:
      - name: 'type'
        type: "'entity' | 'context' | 'custom'"
        description: 'Condition type'

      - name: 'field'
        type: 'string'
        description: 'Field to check'
        optional: true

      - name: 'operator'
        type: "'equals' | 'contains' | 'greaterThan' | 'lessThan' | 'custom'"
        description: 'Comparison operator'

      - name: 'value'
        type: 'any'
        description: 'Expected value'

      - name: 'predicate'
        type: '(entity: any, context?: any) => boolean'
        description: 'Custom condition function'
        optional: true

  PolicyGroupResult:
    description: 'Result of group policy evaluation'
    business-context: 'Aggregated policy results'

    properties:
      - name: 'success'
        type: 'boolean'
        description: 'Overall success'

      - name: 'entity'
        type: 'TEntity'
        description: 'Evaluated entity'
        optional: true

      - name: 'violations'
        type: 'PolicyViolation[]'
        description: 'All violations'

      - name: 'results'
        type: 'Map<string, Result<TEntity, PolicyViolation>>'
        description: 'Individual results'
