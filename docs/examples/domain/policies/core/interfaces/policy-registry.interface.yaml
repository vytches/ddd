# policy-registry.interface - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'policy-registry.interface'
title: 'Policy Registry Interfaces'
description: 'Interfaces for policy registration and discovery'
business-context: 'Manages centralized policy storage and retrieval'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IPolicyRegistry:
    description: 'Central registry for business policies'
    business-context: 'Provides centralized policy management and discovery'

    methods:
      - name: 'register'
        description: 'Registers policy in registry'
        parameters:
          - 'policy: IBusinessPolicy<any>'
          - 'options?: RegistrationOptions'
        returns: 'void'

      - name: 'unregister'
        description: 'Removes policy from registry'
        parameters:
          - 'policyId: string'
        returns: 'boolean'

      - name: 'resolve'
        description: 'Resolves policy by ID'
        parameters:
          - 'policyId: string'
        returns: 'IBusinessPolicy<T> | undefined'

      - name: 'resolveByDomain'
        description: 'Finds policies by domain'
        parameters:
          - 'domain: string'
        returns: 'IBusinessPolicy<any>[]'

      - name: 'resolveByTags'
        description: 'Finds policies by tags'
        parameters:
          - 'tags: string[]'
          - 'matchAll?: boolean'
        returns: 'IBusinessPolicy<any>[]'

      - name: 'exists'
        description: 'Checks if policy exists'
        parameters:
          - 'policyId: string'
        returns: 'boolean'

      - name: 'clear'
        description: 'Clears all registered policies'
        returns: 'void'

      - name: 'getAll'
        description: 'Returns all registered policies'
        returns: 'IBusinessPolicy<any>[]'

      - name: 'getMetadata'
        description: 'Gets policy metadata'
        parameters:
          - 'policyId: string'
        returns: 'PolicyMetadata | undefined'

    examples:
      - id: 'registry-usage'
        code: |
          class GlobalPolicyRegistry implements IPolicyRegistry {
            private policies = new Map<string, IBusinessPolicy<any>>();
            
            register(policy: IBusinessPolicy<any>, options?: RegistrationOptions): void {
              const id = policy.getId();
              if (options?.overwrite || !this.policies.has(id)) {
                this.policies.set(id, policy);
              }
            }
            
            resolve<T>(policyId: string): IBusinessPolicy<T> | undefined {
              return this.policies.get(policyId) as IBusinessPolicy<T>;
            }
            
            resolveByDomain(domain: string): IBusinessPolicy<any>[] {
              return Array.from(this.policies.values())
                .filter(p => p.getDomain() === domain);
            }
          }

  IPolicyResolver:
    description: 'Policy resolution interface'
    business-context: 'Abstracts policy discovery mechanism'

    methods:
      - name: 'resolve'
        description: 'Resolves policy by criteria'
        parameters:
          - 'criteria: PolicyCriteria'
        returns: 'IBusinessPolicy<T> | undefined'

      - name: 'resolveMany'
        description: 'Resolves multiple policies'
        parameters:
          - 'criteria: PolicyCriteria'
        returns: 'IBusinessPolicy<T>[]'

      - name: 'resolveAsync'
        description: 'Async policy resolution'
        parameters:
          - 'criteria: PolicyCriteria'
        returns: 'Promise<IBusinessPolicy<T> | undefined>'

  IPolicyProvider:
    description: 'Policy provider interface'
    business-context: 'Sources policies for registration'

    methods:
      - name: 'getPolicies'
        description: 'Returns available policies'
        returns: 'IBusinessPolicy<any>[]'

      - name: 'loadPolicies'
        description: 'Loads policies from source'
        returns: 'Promise<IBusinessPolicy<any>[]>'

      - name: 'watchPolicies'
        description: 'Watches for policy changes'
        parameters:
          - 'callback: (policies: IBusinessPolicy<any>[]) => void'
        returns: '() => void'

  IPolicyCache:
    description: 'Policy caching interface'
    business-context: 'Optimizes policy resolution'

    methods:
      - name: 'get'
        description: 'Gets cached policy'
        parameters:
          - 'key: string'
        returns: 'IBusinessPolicy<T> | undefined'

      - name: 'set'
        description: 'Caches policy'
        parameters:
          - 'key: string'
          - 'policy: IBusinessPolicy<T>'
          - 'ttl?: number'
        returns: 'void'

      - name: 'invalidate'
        description: 'Invalidates cache entry'
        parameters:
          - 'key: string'
        returns: 'boolean'

      - name: 'clear'
        description: 'Clears entire cache'
        returns: 'void'

# === TYPES ===
types:
  RegistrationOptions:
    description: 'Policy registration options'
    business-context: 'Controls registration behavior'

    properties:
      - name: 'overwrite'
        type: 'boolean'
        description: 'Overwrite existing policy'
        optional: true

      - name: 'tags'
        type: 'string[]'
        description: 'Policy tags for discovery'
        optional: true

      - name: 'metadata'
        type: 'PolicyMetadata'
        description: 'Additional metadata'
        optional: true

      - name: 'priority'
        type: 'number'
        description: 'Policy priority'
        optional: true

      - name: 'scope'
        type: "'global' | 'domain' | 'local'"
        description: 'Policy scope'
        optional: true

  PolicyCriteria:
    description: 'Policy search criteria'
    business-context: 'Enables flexible policy discovery'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Policy ID'
        optional: true

      - name: 'domain'
        type: 'string'
        description: 'Business domain'
        optional: true

      - name: 'tags'
        type: 'string[]'
        description: 'Required tags'
        optional: true

      - name: 'entityType'
        type: 'Type<any>'
        description: 'Entity type'
        optional: true

      - name: 'version'
        type: 'string'
        description: 'Policy version'
        optional: true

      - name: 'active'
        type: 'boolean'
        description: 'Only active policies'
        optional: true
