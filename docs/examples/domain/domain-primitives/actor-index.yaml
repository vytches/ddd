# Actor Index - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'actor-index'
title: 'Actor System Exports'
description: 'Actor system re-export module'
business-context: 'Centralized exports for actor pattern implementation including errors and interfaces'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Export hub for actor pattern functionality'
  business-context: 'Provides consolidated access to actor errors and interfaces'

  formats:
    jsdoc:
      description: 'Actor system module exports'
    cli:
      description: |
        ## Actor System Exports

        Centralized exports for the actor pattern implementation:
        - ActorError for actor-specific errors
        - DefaultActorType enumeration
        - IActor interface contract

  custom-tags:
    since: '1.0.0'
    pattern: 'Actor Pattern'
    features: 'Actor errors, type definitions, interface contracts'

# === EXPORTS DOCUMENTATION ===
exports:
  ActorError:
    description: 'Actor-specific domain error class'
    business-context: 'Specialized error handling for actor pattern operations'
    source: './actor.error'
    export-type: 'named'

    examples:
      - id: 'actor-error-usage'
        code: |
          import { ActorError } from '@vytches/ddd-domain-primitives';

          // Invalid actor type
          throw ActorError.withType('unknown-type', {
            allowedTypes: ['user', 'system', 'admin']
          });

          // Custom actor error
          throw ActorError.withMessage(
            'Actor does not have permission to perform this action',
            { actorId: 'user-123', action: 'delete' }
          );

  DefaultActorType:
    description: 'Default actor type enumeration'
    business-context: 'Standard actor types for system operations'
    source: './actor.interface'
    export-type: 'named'

    examples:
      - id: 'actor-type-usage'
        code: |
          import { DefaultActorType, IActor } from '@vytches/ddd-domain-primitives';

          const systemActor: IActor = {
            type: DefaultActorType.SYSTEM,
            source: 'OrderService',
            id: 'system-001',
            metadata: { automated: true }
          };

  IActor:
    description: 'Core actor interface'
    business-context: 'Contract for actor identification in domain operations'
    source: './actor.interface'
    export-type: 'type'

    examples:
      - id: 'actor-interface-usage'
        code: |
          import { IActor, DefaultActorType } from '@vytches/ddd-domain-primitives';

          const userActor: IActor = {
            type: DefaultActorType.USER,
            source: 'WebApplication',
            id: 'user-456',
            metadata: {
              sessionId: 'session-789',
              permissions: ['read', 'write']
            }
          };

usage-examples:
  - id: 'complete-actor-system'
    title: 'Complete Actor System Usage'
    code: |
      import { ActorError, DefaultActorType, IActor } from '@vytches/ddd-domain-primitives';

      // Define actor
      const actor: IActor = {
        type: DefaultActorType.USER,
        source: 'UserManagement',
        id: 'user-123'
      };

      // Validate actor
      function validateActor(actor: IActor): void {
        if (!Object.values(DefaultActorType).includes(actor.type)) {
          throw ActorError.withType(actor.type, {
            allowedTypes: Object.values(DefaultActorType)
          });
        }
      }

      validateActor(actor);
