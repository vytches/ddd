# Errors Index - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'errors-index'
title: 'Error System Exports'
description: 'Comprehensive error system re-export module'
business-context: 'Centralized exports for complete DDD error handling system including base errors, domain errors, and error codes'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Export hub for complete error handling system'
  business-context: 'Provides consolidated access to all error classes, interfaces, and enumerations'

  formats:
    jsdoc:
      description: 'Comprehensive error system exports'
    cli:
      description: |
        ## Error System Exports

        Complete error handling system including:
        - Base error classes and interfaces
        - Domain-specific error implementations
        - Error code categorization system
        - Type definitions for error options

  custom-tags:
    since: '1.0.0'
    pattern: 'Error Handling Pattern'
    features: 'Base errors, domain errors, error codes, type safety'

# === EXPORTS DOCUMENTATION ===
exports:
  # Base Error System
  BaseError:
    description: 'Foundation error class for all domain errors'
    business-context: 'Abstract base providing consistent error structure and behavior'
    source: './base.error'
    export-type: 'named'

    examples:
      - id: 'base-error-usage'
        code: |
          import { BaseError } from '@vytches/ddd-domain-primitives';

          class CustomDomainError extends BaseError {
            constructor(message: string) {
              super(message);
              this.name = 'CustomDomainError';
            }
          }

          throw new CustomDomainError('Domain operation failed');

  ErrorOptions:
    description: 'Base error configuration options interface'
    business-context: 'Flexible configuration for error context and metadata'
    source: './base.error'
    export-type: 'type'

  # Domain Error System
  DuplicateError:
    description: 'Error for duplicate entity detection'
    business-context: 'Handles unique constraint violations and duplicate prevention'
    source: './domain.errors'
    export-type: 'named'

    examples:
      - id: 'duplicate-error-usage'
        code: |
          import { DuplicateError } from '@vytches/ddd-domain-primitives';

          throw DuplicateError.withEntityId('user-123', {
            entity: 'User',
            field: 'id',
            context: { operation: 'create' }
          });

  IDomainError:
    description: 'Core domain error interface with rich context'
    business-context: 'Standard contract for all domain-specific error implementations'
    source: './domain.errors'
    export-type: 'named'

  InvalidParameterError:
    description: 'Error for invalid domain operation parameters'
    business-context: 'Parameter validation failures with detailed feedback'
    source: './domain.errors'
    export-type: 'named'

    examples:
      - id: 'invalid-parameter-usage'
        code: |
          import { InvalidParameterError } from '@vytches/ddd-domain-primitives';

          throw InvalidParameterError.withParameter(
            'email',
            'Must be valid email format',
            { provided: 'not-an-email', expected: 'user@domain.com' }
          );

  MissingValueError:
    description: 'Error for absent required values'
    business-context: 'Required field validation with clear error context'
    source: './domain.errors'
    export-type: 'named'

    examples:
      - id: 'missing-value-usage'
        code: |
          import { MissingValueError } from '@vytches/ddd-domain-primitives';

          throw MissingValueError.withValue('user name', {
            field: 'name',
            context: { operation: 'createUser', userId: 'user-123' }
          });

  NotFoundError:
    description: 'Error for missing entities or resources'
    business-context: 'Entity lookup failures and resource availability issues'
    source: './domain.errors'
    export-type: 'named'

    examples:
      - id: 'not-found-usage'
        code: |
          import { NotFoundError } from '@vytches/ddd-domain-primitives';

          throw NotFoundError.withEntityId('order-456', {
            entity: 'Order',
            context: { customerId: 'customer-789' }
          });

  DomainErrorOptions:
    description: 'Domain-specific error configuration options'
    business-context: 'Extended error options with domain context and metadata'
    source: './domain.errors'
    export-type: 'type'

  ErrorCode:
    description: 'Union type of all available error codes'
    business-context: 'Type-safe error code usage across all domains'
    source: './domain.errors'
    export-type: 'type'

  # Error Code System
  ApplicationErrorCode:
    description: 'Application-level error code enumeration'
    business-context: 'Categorizes application infrastructure and flow errors'
    source: './error.enum'
    export-type: 'named'

    examples:
      - id: 'application-error-code-usage'
        code: |
          import { ApplicationErrorCode, IDomainError } from '@vytches/ddd-domain-primitives';

          class ApplicationError extends IDomainError {
            constructor(message: string) {
              super(message, {
                code: ApplicationErrorCode.DatabaseError,
                domain: 'Infrastructure'
              });
            }
          }

  DomainErrorCode:
    description: 'Domain-specific error code enumeration'
    business-context: 'Categorizes business rule and domain logic errors'
    source: './error.enum'
    export-type: 'named'

    examples:
      - id: 'domain-error-code-usage'
        code: |
          import { DomainErrorCode, IDomainError } from '@vytches/ddd-domain-primitives';

          class ValidationError extends IDomainError {
            constructor(message: string) {
              super(message, {
                code: DomainErrorCode.ValidationFailed,
                domain: 'UserManagement'
              });
            }
          }

  FrameworkErrorCode:
    description: 'Framework-level error code enumeration'
    business-context: 'Categorizes framework infrastructure and setup errors'
    source: './error.enum'
    export-type: 'named'

    examples:
      - id: 'framework-error-code-usage'
        code: |
          import { FrameworkErrorCode, IDomainError } from '@vytches/ddd-domain-primitives';

          class FrameworkError extends IDomainError {
            constructor(message: string) {
              super(message, {
                code: FrameworkErrorCode.ConfigurationError,
                domain: 'Framework'
              });
            }
          }

usage-examples:
  - id: 'complete-error-system'
    title: 'Complete Error System Usage'
    code: |
      import {
        BaseError,
        IDomainError,
        DomainErrorCode,
        MissingValueError,
        InvalidParameterError,
        NotFoundError,
        DuplicateError
      } from '@vytches/ddd-domain-primitives';

      // Custom domain error
      class UserValidationError extends IDomainError {
        constructor(message: string, context?: any) {
          super(message, {
            code: DomainErrorCode.ValidationFailed,
            domain: 'UserManagement',
            data: context
          });
        }
      }

      // Using factory methods
      function validateUser(userData: any): void {
        if (!userData.name) {
          throw MissingValueError.withValue('name');
        }
        
        if (userData.email && !isValidEmail(userData.email)) {
          throw InvalidParameterError.withParameter('email', 'Invalid format');
        }
      }

      function isValidEmail(email: string): boolean {
        return email.includes('@');
      }
