# Actor Error - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: "actor.error"
title: "Actor Error Classes"
description: "Error classes for actor-related domain operations"
business-context: "Provides specialized error handling for actor validation and authorization failures"

# === HIERARCHY ===
hierarchy:
  strategy: "merge"
  scope: "file"

# === CLASSES ===
classes:
  ActorError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: "separate"
      class-documentation: "enabled"
      
    # Class Documentation
    class-doc:
      description: "Domain error for actor-related failures"
      business-context: "Handles errors in actor identification, authorization, and validation"
      
      # Format-specific
      formats:
        jsdoc:
          description: "Actor-specific domain error"
        cli:
          description: |
            ## ActorError
            Domain error for actor-related issues:
            - Invalid actor types
            - Authorization failures
            - Actor validation errors
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    # Methods
    methods:
      withType:
        description: "Creates an ActorError for invalid actor type"
        business-context: "Validates actor type against allowed values"
        
        parameters:
          - name: "type"
            type: "string"
            description: "The invalid actor type provided"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "ActorError"
          description: "Configured error instance"
          
        examples:
          - id: "invalid-type"
            code: |
              throw ActorError.withType('unknown-type', {
                allowedTypes: ['user', 'system', 'admin']
              });
              
        custom-tags:
          static: "true"

      withMessage:
        description: "Creates an ActorError with custom message"
        business-context: "Generic actor error with flexible messaging"
        
        parameters:
          - name: "message"
            type: "string"
            description: "Custom error message"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "ActorError"
          description: "Configured error instance"
          
        examples:
          - id: "custom-message"
            code: |
              throw ActorError.withMessage(
                'Actor does not have permission to perform this action',
                { actorId: 'user-123', action: 'delete' }
              );
              
        custom-tags:
          static: "true"