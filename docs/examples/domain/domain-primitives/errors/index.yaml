# Errors Index - Domain Error Exports

# === FILE METADATA ===
file-name: 'index'
title: 'Domain Error Package Exports'
description: 'Comprehensive domain error system exports'
business-context: 'Provides unified access to all domain error handling functionality'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Central export hub for domain error handling system'
  business-context: 'Simplifies imports for comprehensive error handling in domain-driven applications'
  
  formats:
    jsdoc:
      description: 'Domain error system exports and interfaces'
    cli:
      description: |
        ## Domain Error System Exports
        
        Complete error handling system including:
        - Base error classes and interfaces
        - Domain-specific error types
        - Error code enumerations
        - Error option interfaces

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'error-handling'
    pattern: 'facade-pattern'
    
# === EXPORTS DOCUMENTATION ===
exports:
  BaseError:
    description: 'Foundation error class with structured metadata and error codes'
    business-context: 'Base class for all domain errors with consistent error handling patterns'
    source: './base.error'
    
  ErrorOptions:
    description: 'Configuration options interface for error construction'
    business-context: 'Provides flexible error configuration with context and metadata'
    source: './base.error'
    type: 'type'
    
  DuplicateError:
    description: 'Error thrown when duplicate entities or values are detected'
    business-context: 'Handles business rule violations for unique constraints and duplicate prevention'
    source: './domain.errors'
    
  IDomainError:
    description: 'Core domain error interface extending base error functionality'
    business-context: 'Standard contract for all domain-specific error implementations'
    source: './domain.errors'
    
  InvalidParameterError:
    description: 'Error for invalid input parameters in domain operations'
    business-context: 'Validates domain operation inputs and provides clear feedback'
    source: './domain.errors'
    
  MissingValueError:
    description: 'Error thrown when required values are absent or null'
    business-context: 'Enforces required field validation in domain operations'
    source: './domain.errors'
    
  NotFoundError:
    description: 'Error for missing entities or resources in domain operations'
    business-context: 'Handles entity lookup failures and resource availability issues'
    source: './domain.errors'
    
  DomainErrorOptions:
    description: 'Configuration options specific to domain error construction'
    business-context: 'Extends base error options with domain-specific metadata'
    source: './domain.errors'
    type: 'type'
    
  ErrorCode:
    description: 'Union type of all available error codes across error categories'
    business-context: 'Provides type-safe error code usage across the domain'
    source: './domain.errors'
    type: 'type'
    
  ApplicationErrorCode:
    description: 'Enumeration of application-level error codes'
    business-context: 'Categorizes errors related to application infrastructure and flow'
    source: './error.enum'
    
  DomainErrorCode:
    description: 'Enumeration of domain-specific error codes'
    business-context: 'Categorizes errors related to business rules and domain logic'
    source: './error.enum'
    
  FrameworkErrorCode:
    description: 'Enumeration of framework-level error codes'
    business-context: 'Categorizes errors related to framework infrastructure and setup'
    source: './error.enum'