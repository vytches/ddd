    examples:
      - id: 'application-error-usage'
        code: |
          // Using application error codes
          class UserApplicationError extends BaseError {
            constructor(message: string) {
              super(message);
              this.code = ApplicationErrorCode.CannotCreateEntity;
            }
          }

          // Service coordination error
          if (error.code === ApplicationErrorCode.ExternalServiceError) {
