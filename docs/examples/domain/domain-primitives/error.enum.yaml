      - name: 'FileWriteError'
        value: "'A_FILE_WRITE_ERROR'"
        description: 'File write error in application'
      - name: 'InvalidCredentials'
        value: "'A_INVALID_CREDENTIALS'"
        description: 'Invalid credentials for application access'
      - name: 'InsufficientPermissions'
        value: "'A_INSUFFICIENT_PERMISSIONS'"
