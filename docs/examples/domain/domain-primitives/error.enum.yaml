# Error Enum - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'error.enum'
title: 'Error Code Enumerations'
description: 'Error code enumerations for consistent error classification across the library'
business-context: 'Provides standardized error codes for domain, application, and framework layers ensuring consistent error handling'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === ENUMS ===
enums:
  DomainErrorCode:
    description: 'Enumeration of domain-level error codes'
    business-context: 'Classifies domain-specific errors for business rule violations and domain logic failures'

    formats:
      jsdoc:
        description: 'Domain error code enumeration'
      cli:
        description: |
          ## DomainErrorCode
          Domain-level error codes for:
          - Business rule violations
          - Domain validation failures  
          - Domain logic errors
          - Entity state issues

    values:
      - name: 'Default'
        value: "'D_ERROR'"
        description: 'Default domain error code'
      - name: 'UnknownError'
        value: "'D_UNKNOWN_ERROR'"
        description: 'Unknown domain error occurred'
      - name: 'NotFound'
        value: "'D_NOT_FOUND'"
        description: 'Domain entity or resource not found'
      - name: 'Unauthorized'
        value: "'D_UNAUTHORIZED'"
        description: 'Domain operation not authorized'
      - name: 'Forbidden'
        value: "'D_FORBIDDEN'"
        description: 'Domain operation forbidden by business rules'
      - name: 'ValidationFailed'
        value: "'D_VALIDATION_FAILED'"
        description: 'Domain validation rules failed'
      - name: 'DuplicateEntry'
        value: "'D_DUPLICATE_ENTRY'"
        description: 'Duplicate domain entity detected'
      - name: 'InvalidFormat'
        value: "'D_INVALID_FORMAT'"
        description: 'Invalid data format in domain operation'
      - name: 'InvalidParameter'
        value: "'D_INVALID_PARAMETER'"
        description: 'Invalid parameter passed to domain method'
      - name: 'DatabaseError'
        value: "'D_DATABASE_ERROR'"
        description: 'Database error in domain persistence'
      - name: 'ExternalServiceError'
        value: "'D_EXTERNAL_SERVICE_ERROR'"
        description: 'External service error affecting domain'
      - name: 'TimeoutError'
        value: "'D_TIMEOUT_ERROR'"
        description: 'Domain operation timeout'
      - name: 'FileReadError'
        value: "'D_FILE_READ_ERROR'"
        description: 'File read error in domain operation'
      - name: 'FileWriteError'
        value: "'D_FILE_WRITE_ERROR'"
        description: 'File write error in domain operation'
      - name: 'InvalidCredentials'
        value: "'D_INVALID_CREDENTIALS'"
        description: 'Invalid credentials for domain access'
      - name: 'MissingValue'
        value: "'D_MISSING_VALUE'"
        description: 'Required domain value is missing'
      - name: 'InternalError'
        value: "'D_INTERNAL_ERROR'"
        description: 'Internal domain logic error'
      - name: 'MethodNotSupported'
        value: "'D_METHOD_NOT_SUPPORTED'"
        description: 'Domain method not supported in current context'
      - name: 'InvalidState'
        value: "'D_INVALID_STATE'"
        description: 'Domain entity in invalid state'
      - name: 'InsufficientPermissions'
        value: "'D_INSUFFICIENT_PERMISSIONS'"
        description: 'Insufficient permissions for domain operation'

    examples:
      - id: 'domain-error-usage'
        code: |
          // Using domain error codes
          class UserDomainError extends IDomainError {
            constructor(message: string) {
              super(message, {
                code: DomainErrorCode.ValidationFailed,
                domain: 'UserManagement'
              });
            }
          }

          // Checking error codes
          if (error.code === DomainErrorCode.NotFound) {
            // Handle not found scenario
          }

    custom-tags:
      since: '1.0.0'
      layer: 'domain'

