# Domain Errors - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: "domain.errors"
title: "Domain Error Classes"
description: "Core domain error classes for DDD error handling"
business-context: "Provides comprehensive error hierarchy for domain-driven design with specific error types for common scenarios"

# === HIERARCHY ===
hierarchy:
  strategy: "merge"
  scope: "file"

# === TYPES ===
types:
  DomainErrorOptions:
    description: "Type definition for domain error options"
    business-context: "Flexible error configuration supporting domain context, error codes, and custom data"
    
    formats:
      jsdoc:
        description: "Options for configuring domain errors"
      cli:
        description: |
          ## DomainErrorOptions
          Type for configuring domain errors with optional:
          - Domain context
          - Error codes
          - Custom data
          - Wrapped errors

# === CLASSES ===
classes:
  IDomainError:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: "separate"
      class-documentation: "enabled"
      
    # Class Documentation
    class-doc:
      description: "Abstract base class for all domain errors in DDD"
      business-context: "Central error type providing consistent error handling across domain boundaries"
      
      # Format-specific
      formats:
        jsdoc:
          description: "Base domain error with rich context"
        cli:
          description: |
            ## IDomainError
            Abstract domain error providing:
            - Error code classification
            - Domain context tracking
            - Data attachment capability
            - Timestamp recording
            - Error wrapping
      
      custom-tags:
        since: "1.0.0"
        abstract: "true"
        extends: "BaseError"
    
    # Methods
    methods:
      constructor:
        description: "Creates a new domain error with message and options"
        business-context: "Initialize domain error with comprehensive context for debugging"
        
        parameters:
          - name: "message"
            type: "string"
            description: "Error message describing the problem"
          - name: "options"
            type: "DomainErrorOptions | Error"
            description: "Configuration options or wrapped error"
            optional: true
            
        examples:
          - id: "basic"
            code: |
              class CustomError extends IDomainError {
                constructor(message: string) {
                  super(message, {
                    code: DomainErrorCode.VALIDATION_ERROR,
                    domain: 'UserManagement'
                  });
                }
              }

  MissingValueError:
    class-doc:
      description: "Error thrown when a required value is missing"
      business-context: "Validates presence of required data in domain operations"
      
      formats:
        jsdoc:
          description: "Error for missing required values"
        cli:
          description: |
            ## MissingValueError
            Thrown when required values are absent
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withValue:
        description: "Creates a MissingValueError with specific message and data"
        business-context: "Factory method for consistent missing value error creation"
        
        parameters:
          - name: "msg"
            type: "string"
            description: "Error message describing what value is missing"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "MissingValueError"
          description: "Configured error instance"
          
        examples:
          - id: "missing-field"
            code: |
              throw MissingValueError.withValue('user name', { 
                field: 'name',
                context: { userId: 123 } 
              });
              
        custom-tags:
          static: "true"

  InvalidParameterError:
    class-doc:
      description: "Error thrown when a parameter value is invalid"
      business-context: "Validates parameter constraints and business rules"
      
      formats:
        jsdoc:
          description: "Error for invalid parameter values"
        cli:
          description: |
            ## InvalidParameterError
            Thrown when parameters violate constraints
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withParameter:
        description: "Creates an InvalidParameterError with parameter details"
        business-context: "Factory method for parameter validation errors"
        
        parameters:
          - name: "parameterName"
            type: "string"
            description: "Name of the invalid parameter"
          - name: "reason"
            type: "string"
            description: "Reason why the parameter is invalid"
            optional: true
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "InvalidParameterError"
          description: "Configured error instance"
          
        examples:
          - id: "invalid-age"
            code: |
              throw InvalidParameterError.withParameter(
                'age',
                'must be between 0 and 150',
                { providedValue: -5 }
              );
              
        custom-tags:
          static: "true"

  AlreadyExistsError:
    class-doc:
      description: "Error thrown when attempting to create a duplicate entity"
      business-context: "Ensures uniqueness constraints in domain aggregates"
      
      formats:
        jsdoc:
          description: "Error for duplicate entity creation"
        cli:
          description: |
            ## AlreadyExistsError
            Prevents duplicate entity creation
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withEntity:
        description: "Creates an AlreadyExistsError with entity details"
        business-context: "Factory method for duplicate entity errors"
        
        parameters:
          - name: "entityType"
            type: "string"
            description: "Type of the entity that already exists"
          - name: "identifier"
            type: "string | number"
            description: "Identifier of the existing entity"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "AlreadyExistsError"
          description: "Configured error instance"
          
        examples:
          - id: "duplicate-user"
            code: |
              throw AlreadyExistsError.withEntity(
                'User',
                'user@example.com',
                { field: 'email' }
              );
              
        custom-tags:
          static: "true"

  DuplicateError:
    class-doc:
      description: "Error thrown when attempting to create a duplicate entity"
      business-context: "Ensures uniqueness constraints in domain aggregates"
      
      formats:
        jsdoc:
          description: "Error for duplicate entity creation"
        cli:
          description: |
            ## DuplicateError
            Prevents duplicate entity creation
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withEntityId:
        description: "Creates a DuplicateError for a specific entity ID"
        business-context: "Factory method for duplicate entity errors"
        
        parameters:
          - name: "id"
            type: "string"
            description: "Entity ID that already exists"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "DuplicateError"
          description: "Configured error instance"
          
        examples:
          - id: "duplicate-id"
            code: |
              throw DuplicateError.withEntityId(
                'user-123',
                { entity: 'User', field: 'id' }
              );
              
        custom-tags:
          static: "true"

  NotFoundError:
    class-doc:
      description: "Error thrown when an entity cannot be found"
      business-context: "Handles missing entity scenarios in repositories"
      
      formats:
        jsdoc:
          description: "Error for entity not found"
        cli:
          description: |
            ## NotFoundError
            Entity lookup failure error
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withEntity:
        description: "Creates a NotFoundError with entity details"
        business-context: "Factory method for entity not found errors"
        
        parameters:
          - name: "entityType"
            type: "string"
            description: "Type of the entity not found"
          - name: "identifier"
            type: "string | number"
            description: "Identifier used in the failed lookup"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "NotFoundError"
          description: "Configured error instance"
          
        examples:
          - id: "user-not-found"
            code: |
              throw NotFoundError.withEntity(
                'User',
                'user-123',
                { searchCriteria: { id: 'user-123' } }
              );
              
        custom-tags:
          static: "true"

  OperationNotAllowedError:
    class-doc:
      description: "Error thrown when an operation violates business rules"
      business-context: "Enforces business invariants and operation constraints"
      
      formats:
        jsdoc:
          description: "Error for disallowed operations"
        cli:
          description: |
            ## OperationNotAllowedError
            Business rule violation error
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withOperation:
        description: "Creates an OperationNotAllowedError with operation details"
        business-context: "Factory method for operation constraint errors"
        
        parameters:
          - name: "operation"
            type: "string"
            description: "Name of the disallowed operation"
          - name: "reason"
            type: "string"
            description: "Reason why the operation is not allowed"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "OperationNotAllowedError"
          description: "Configured error instance"
          
        examples:
          - id: "withdrawal-blocked"
            code: |
              throw OperationNotAllowedError.withOperation(
                'withdraw',
                'insufficient balance',
                { balance: 100, requested: 500 }
              );
              
        custom-tags:
          static: "true"

  ValidationError:
    class-doc:
      description: "Error thrown when validation rules are violated"
      business-context: "Comprehensive validation error with field-level details"
      
      formats:
        jsdoc:
          description: "Error for validation failures"
        cli:
          description: |
            ## ValidationError
            Multi-field validation error
      
      custom-tags:
        since: "1.0.0"
        extends: "IDomainError"
    
    methods:
      withErrors:
        description: "Creates a ValidationError with multiple field errors"
        business-context: "Factory method for complex validation errors"
        
        parameters:
          - name: "errors"
            type: "Record<string, string>"
            description: "Map of field names to error messages"
          - name: "data"
            type: "DomainErrorOptions"
            description: "Additional error context"
            optional: true
            
        returns:
          type: "ValidationError"
          description: "Configured error instance"
          
        examples:
          - id: "form-validation"
            code: |
              throw ValidationError.withErrors({
                email: 'Invalid email format',
                age: 'Must be at least 18',
                password: 'Too weak'
              });
              
        custom-tags:
          static: "true"