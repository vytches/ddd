# Domain Primitives Error Enums - Standardized Error Code Enumerations
# Enhanced Metadata System V2 - Error code standardization for DDD applications

# === FILE METADATA ===
file-name: 'error-enum'
title: 'Domain Primitives Error Enums - Standardized Error Codes'
description: 'Comprehensive error code enumerations for domain, application, and framework layers'
business-context: 'Standardized error classification system enabling consistent error handling and debugging across all DDD layers'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === ENUMS ===
enums:
  DomainErrorCode:
    description: 'Domain layer error codes for business logic failures'
    business-context: 'Core business error classification for domain rule violations, entity validation failures, and business constraint breaches'

    custom-tags:
      since: '1.0.0'
      stability: 'stable'
      category: 'foundation'
      layer: 'domain'
      prefix: 'D_'

    values:
      - name: 'Default'
        value: 'D_ERROR'
        description: 'Generic domain error when specific type cannot be determined'
      - name: 'UnknownError'
        value: 'D_UNKNOWN_ERROR'
        description: 'Unexpected domain error requiring investigation'
      - name: 'NotFound'
        value: 'D_NOT_FOUND'
        description: 'Domain entity or aggregate not found'
      - name: 'Unauthorized'
        value: 'D_UNAUTHORIZED'
        description: 'Domain-level authorization failure'
      - name: 'Forbidden'
        value: 'D_FORBIDDEN'
        description: 'Domain rule prohibits the requested operation'
      - name: 'ValidationFailed'
        value: 'D_VALIDATION_FAILED'
        description: 'Domain entity or value object validation failure'
      - name: 'DuplicateEntry'
        value: 'D_DUPLICATE_ENTRY'
        description: 'Domain uniqueness constraint violation'
      - name: 'InvalidFormat'
        value: 'D_INVALID_FORMAT'
        description: 'Domain value format validation failure'
      - name: 'InvalidParameter'
        value: 'D_INVALID_PARAMETER'
        description: 'Invalid parameter passed to domain method'
      - name: 'InvalidState'
        value: 'D_INVALID_STATE'
        description: 'Domain entity in invalid state for operation'

    examples:
      - id: 'domain-error-usage'
        code: |
          // Using domain error codes in business logic
          if (!user.canPerformAction(action)) {
            throw new DomainError('Action not allowed', DomainErrorCode.Forbidden);
          }

          if (!aggregate.isValidState()) {
            throw new DomainError('Invalid aggregate state', DomainErrorCode.InvalidState);
          }

  ApplicationErrorCode:
    description: 'Application layer error codes for use case and service failures'
    business-context: 'Application service error classification for use case execution failures, coordination errors, and application-level constraints'

    custom-tags:
      since: '1.0.0'
      stability: 'stable'
      category: 'foundation'
      layer: 'application'
      prefix: 'A_'

    values:
      - name: 'Default'
        value: 'A_ERROR_OCCURED'
        description: 'Generic application error when specific type cannot be determined'
      - name: 'UnknownError'
        value: 'A_UNKNOWN_ERROR'
        description: 'Unexpected application error requiring investigation'
      - name: 'NotFound'
        value: 'A_NOT_FOUND'
        description: 'Application resource not found'
      - name: 'Unauthorized'
        value: 'A_UNAUTHORIZED'
        description: 'Application-level authorization failure'
      - name: 'Forbidden'
        value: 'A_FORBIDDEN'
        description: 'Application policy prohibits the requested operation'
      - name: 'ValidationFailed'
        value: 'A_VALIDATION_FAILED'
        description: 'Application input validation failure'
      - name: 'CannotCreateEntity'
        value: 'A_CANNOT_CREATE_ENTITY'
        description: 'Application cannot create the requested entity'
      - name: 'DuplicateEntry'
        value: 'A_DUPLICATE_ENTRY'
        description: 'Application-level duplicate detection'
      - name: 'DatabaseError'
        value: 'A_DATABASE_ERROR'
        description: 'Database operation failure at application level'
      - name: 'ExternalServiceError'
        value: 'A_EXTERNAL_SERVICE_ERROR'
        description: 'External service integration failure'
      - name: 'ConnectionError'
        value: 'A_CONNECTION_ERROR'
        description: 'Network or connection failure'
      - name: 'PaymentRequired'
        value: 'A_PAYMENT_REQUIRED'
        description: 'Payment or subscription required for operation'
      - name: 'LimitExceeded'
        value: 'A_LIMIT_EXCEEDED'
        description: 'Application usage limit exceeded'

    examples:
      - id: 'application-error-usage'
        code: |
          // Using application error codes in use cases
          try {
            await this.paymentService.processPayment(payment);
          } catch (error) {
            throw new ApplicationError('Payment failed', ApplicationErrorCode.ExternalServiceError);
          }

          if (user.hasExceededLimit()) {
            throw new ApplicationError('Usage limit exceeded', ApplicationErrorCode.LimitExceeded);
          }

  FrameworkErrorCode:
    description: 'Framework layer error codes for infrastructure and technical failures'
    business-context: 'Infrastructure and framework error classification for technical failures, system errors, and external dependency issues'

    custom-tags:
      since: '1.0.0'
      stability: 'stable'
      category: 'foundation'
      layer: 'framework'
      prefix: 'F_'

    values:
      - name: 'Default'
        value: 'F_SERVER_ERROR'
        description: 'Generic server error when specific type cannot be determined'
      - name: 'UnknownError'
        value: 'F_UNKNOWN_ERROR'
        description: 'Unexpected framework error requiring investigation'
      - name: 'NotFound'
        value: 'F_NOT_FOUND'
        description: 'Framework resource not found (endpoint, service, etc.)'
      - name: 'Unauthorized'
        value: 'F_UNAUTHORIZED'
        description: 'Framework-level authentication failure'
      - name: 'Forbidden'
        value: 'F_FORBIDDEN'
        description: 'Framework-level authorization failure'
      - name: 'ValidationFailed'
        value: 'F_VALIDATION_FAILED'
        description: 'Framework input validation failure'
      - name: 'DatabaseError'
        value: 'F_DATABASE_ERROR'
        description: 'Database connection or operation failure'
      - name: 'ExternalServiceError'
        value: 'F_EXTERNAL_SERVICE_ERROR'
        description: 'External service communication failure'
      - name: 'ConnectionError'
        value: 'F_CONNECTION_ERROR'
        description: 'Network connection failure'
      - name: 'ConfigurationError'
        value: 'F_CONFIGURATION_ERROR'
        description: 'Framework configuration error'
      - name: 'DependencyError'
        value: 'F_DEPENDENCY_ERROR'
        description: 'Dependency injection or resolution error'
      - name: 'SecurityError'
        value: 'F_SECURITY_ERROR'
        description: 'Security validation or enforcement failure'
      - name: 'RateLimitExceeded'
        value: 'F_RATE_LIMIT_EXCEEDED'
        description: 'API rate limit exceeded'
      - name: 'ServiceUnavailable'
        value: 'F_SERVICE_UNAVAILABLE'
        description: 'Framework service temporarily unavailable'

    examples:
      - id: 'framework-error-usage'
        code: |
          // Using framework error codes in infrastructure
          try {
            await this.databaseConnection.connect();
          } catch (error) {
            throw new FrameworkError('Database unavailable', FrameworkErrorCode.DatabaseError);
          }

          if (!this.isConfigurationValid()) {
            throw new FrameworkError('Invalid configuration', FrameworkErrorCode.ConfigurationError);
          }
