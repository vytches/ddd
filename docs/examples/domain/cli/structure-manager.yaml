# StructureManager - Project Architecture Management
# Enhanced Metadata System V2 - DDD project structure definitions and scaffolding

# === FILE METADATA ===
file-name: 'structure-manager'
title: 'StructureManager - Project Architecture Management'
description: 'Comprehensive project structure management for DDD architectures'
business-context: 'Core system managing different DDD architectural patterns including Clean Architecture, Hexagonal, Onion, and custom structures'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  StructureConfig:
    description: 'Complete configuration for a DDD project structure'
    business-context: 'Defines all aspects of a project architecture including directories, files, and layer patterns'

    properties:
      - name: 'name'
        type: 'ProjectStructure'
        description: 'Structure type identifier'
      - name: 'description'
        type: 'string'
        description: 'Human-readable structure description'
      - name: 'directories'
        type: 'string[]'
        description: 'Required directory structure'
      - name: 'files'
        type: '{ [path: string]: string }'
        description: 'Template files for structure initialization'
      - name: 'patterns'
        type: 'LayerPatterns'
        description: 'Layer organization patterns'

# === CLASSES ===
classes:
  StructureManager:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Project architecture structure management system'
      business-context: 'Central manager for different DDD architectural patterns, providing structure detection, creation, and component path resolution'

      formats:
        jsdoc:
          description: 'DDD project structure manager'
        cli:
          description: |
            ## StructureManager
            Complete project architecture management for DDD patterns

      custom-tags:
        since: '1.0.0'
        pattern: 'Manager Pattern'
        architectures: 'Clean, Hexagonal, Onion, Modular Monolith'

    # Methods
    methods:
      constructor:
        description: 'Initialize structure manager with built-in architectures'
        business-context: 'Creates manager with pre-loaded DDD structure configurations'

        examples:
          - id: 'basic'
            code: |
              const manager = new StructureManager();
              // Pre-loaded with Clean, Hexagonal, Onion architectures

      create:
        description: 'Factory method to create structure manager instance'
        business-context: 'Convenient factory method for manager creation'

        returns:
          type: 'StructureManager'
          description: 'New manager instance with built-in structures'

        custom-tags:
          static: 'true'
          factory: 'Factory method'

        examples:
          - id: 'factory'
            code: |
              const manager = StructureManager.create();
              // Clean factory method approach

      getStructure:
        description: 'Get complete structure configuration by type'
        business-context: 'Retrieve architecture configuration for project scaffolding'

        parameters:
          - name: 'type'
            type: 'ProjectStructure'
            description: 'Architecture type (clean-architecture, hexagonal, etc.)'

        returns:
          type: 'StructureConfig'
          description: 'Complete structure configuration'

        examples:
          - id: 'structure-lookup'
            code: |
              const cleanArch = manager.getStructure('clean-architecture');
              console.log(cleanArch.directories); // Required folders
              console.log(cleanArch.patterns); // Layer organization

      getAllStructures:
        description: 'Get all available structure configurations'
        business-context: 'Complete architecture catalog for selection and discovery'

        returns:
          type: 'StructureConfig[]'
          description: 'Array of all structure configurations'

        examples:
          - id: 'catalog'
            code: |
              const structures = manager.getAllStructures();
              structures.forEach(s => console.log(s.name, s.description));

      registerStructure:
        description: 'Register custom architecture structure'
        business-context: 'Extensibility for organization-specific architectural patterns'

        parameters:
          - name: 'config'
            type: 'StructureConfig'
            description: 'Custom structure configuration'

        returns:
          type: 'void'
          description: 'Structure registered successfully'

        examples:
          - id: 'custom-structure'
            code: |
              manager.registerStructure({
                name: 'micro-frontend',
                description: 'Micro-frontend architecture',
                directories: ['apps/', 'libs/', 'shared/'],
                files: {
                  'apps/shell/main.ts': 'shellTemplate',
                  'libs/shared/index.ts': 'sharedTemplate'
                },
                patterns: {
                  domain: 'libs/domain',
                  application: 'libs/application',
                  infrastructure: 'libs/infrastructure'
                }
              });

      detectStructure:
        description: 'Automatically detect existing project architecture'
        business-context: 'Smart detection for existing codebases to determine architectural pattern'

        parameters:
          - name: 'projectPath'
            type: 'string'
            description: 'Absolute path to project root'

        returns:
          type: 'Promise<ProjectStructure | null>'
          description: 'Detected architecture type or null'

        custom-tags:
          async: 'true'
          detection: 'Directory structure analysis'

        examples:
          - id: 'auto-detection'
            code: |
              const detected = await manager.detectStructure('./my-project');
              if (detected) {
                console.log(`Detected: ${detected} architecture`);
              }

      createStructure:
        description: 'Create complete project structure with directories and files'
        business-context: 'Full project scaffolding with architectural best practices'

        parameters:
          - name: 'type'
            type: 'ProjectStructure'
            description: 'Architecture type to create'
          - name: 'projectPath'
            type: 'string'
            description: 'Target project directory'

        returns:
          type: 'Promise<void>'
          description: 'Project structure created successfully'

        custom-tags:
          async: 'true'
          scaffolding: 'Complete project creation'

        examples:
          - id: 'project-scaffolding'
            code: |
              await manager.createStructure('clean-architecture', './new-project');
              // Creates complete Clean Architecture structure

      getComponentPath:
        description: 'Generate appropriate file path for component in architecture'
        business-context: 'Consistent component placement according to architectural conventions'

        parameters:
          - name: 'structure'
            type: 'ProjectStructure'
            description: 'Target architecture type'
          - name: 'componentType'
            type: "'domain' | 'application' | 'infrastructure' | 'presentation'"
            description: 'Component layer type'
          - name: 'componentName'
            type: 'string'
            description: 'Component name for file generation'
          - name: 'moduleName'
            type: 'string'
            description: 'Optional module/context name'

        returns:
          type: 'string'
          description: 'Proper file path for component'

        examples:
          - id: 'path-generation'
            code: |
              const path = manager.getComponentPath(
                'clean-architecture', 'domain', 'User', 'authentication'
              );
              // Returns: src/domain/authentication/entities/User.ts

      validateStructure:
        description: 'Validate structure configuration for completeness'
        business-context: 'Quality assurance for custom structure definitions'

        parameters:
          - name: 'config'
            type: 'StructureConfig'
            description: 'Structure configuration to validate'

        returns:
          type: 'boolean'
          description: 'true if configuration is valid'

        examples:
          - id: 'validation'
            code: |
              const isValid = manager.validateStructure(customConfig);
              if (!isValid) {
                console.log('Structure configuration has issues');
              }

      generateDocumentation:
        description: 'Generate comprehensive documentation for architecture'
        business-context: 'Automated architecture documentation for team onboarding'

        parameters:
          - name: 'type'
            type: 'ProjectStructure'
            description: 'Architecture type to document'

        returns:
          type: 'string'
          description: 'Generated markdown documentation'

        examples:
          - id: 'documentation'
            code: |
              const docs = manager.generateDocumentation('hexagonal');
              // Returns complete architecture documentation
