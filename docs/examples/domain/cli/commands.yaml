# CLI Commands - Core Command Implementations
# Enhanced Metadata System V2 - CLI command definitions and implementations

# === FILE METADATA ===
file-name: 'commands'
title: 'CLI Commands - Core Command System'
description: 'Primary command implementations for VytchesDDD CLI functionality'
business-context: 'Main user interface for code generation, example management, and documentation operations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  ExamplesOptions:
    description: 'Configuration options for examples command'
    business-context: 'Flexible options for example generation, validation, and display with Enhanced Metadata System V2 support'

    properties:
      - name: 'help'
        type: 'boolean'
        description: 'Show command help information'
      - name: 'complexity'
        type: 'string'
        description: 'Filter by complexity: basic, intermediate, advanced'
      - name: 'framework'
        type: 'string'
        description: 'Target framework: nestjs, express, fastify'
      - name: 'llmOptimized'
        type: 'boolean'
        description: 'Generate LLM-optimized documentation format'
      - name: 'enhancedMetadata'
        type: 'boolean'
        description: 'Use Enhanced Metadata System V2 for hierarchical metadata resolution'
      - name: 'maxExamples'
        type: 'number'
        description: 'Limit number of examples returned'
      - name: 'seed'
        type: 'string'
        description: 'Seed for reproducible randomization'
      - name: 'output'
        type: 'string'
        description: 'Output file path for generated content'
      - name: 'fix'
        type: 'boolean'
        description: 'Auto-fix validation issues in examples'

# === CONSTANTS ===
constants:
  examplesCommand:
    description: 'Main examples management command'
    business-context: 'Central command for all example-related operations including generation, validation, and Enhanced Metadata System V2 processing'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Command name: "examples"'
      - name: 'description'
        type: 'string'
        description: 'Human-readable command description'
      - name: 'action'
        type: '(args: string[], options: ExamplesOptions) => Promise<void>'
        description: 'Command execution function with options processing'

    examples:
      - id: 'basic-usage'
        code: |
          // CLI usage examples:
          // vytches-ddd examples generate aggregates --complexity intermediate
          // vytches-ddd examples validate --package policies --fix
          // vytches-ddd examples find-by-tag "policies:core" --enhanced-metadata

  generateCommand:
    description: 'Code generation command implementation'
    business-context: 'Core command for DDD component generation using template system and Enhanced Metadata'

    type: 'Command'

    examples:
      - id: 'component-generation'
        code: |
          // CLI usage examples:
          // vytches-ddd generate aggregate User --framework nestjs
          // vytches-ddd generate value-object Email --output ./src/domain
          // vytches-ddd generate policy UserValidation --complexity advanced
