# Command Registry - CLI Command Management System

# === FILE METADATA ===
file-name: 'command-registry'
title: 'Command Registry - CLI Command Management'
description: 'Central registry for managing CLI command discovery, registration, and execution'
business-context: 'Extensible command system for CLI operations with plugin support'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CommandRegistry:
    class-doc:
      description: 'Central command management system for CLI operations'
      business-context: 'Provides extensible command registration and execution with plugin architecture'

    methods:
      constructor:
        description: 'Creates command registry with CLI configuration'
        business-context: 'Initializes registry with project-specific settings'

        parameters:
          - name: 'config'
            type: 'CLIConfig'
            description: 'CLI configuration for command setup'

        examples:
          - code: |
              import { CommandRegistry } from '@vytches/ddd-cli';

              const registry = new CommandRegistry({
                debug: true,
                outputDir: './src/domain',
                framework: 'nestjs'
              });

      create:
        description: 'Factory method to create configured command registry'
        business-context: 'Provides convenient registry creation with validation'

        parameters:
          - name: 'config'
            type: 'CLIConfig'
            description: 'CLI configuration settings'

        returns:
          type: 'CommandRegistry'
          description: 'Configured registry instance'

        custom-tags:
          static: 'true'
          factory-method: 'true'

        examples:
          - code: |
              const registry = CommandRegistry.create({
                debug: false,
                outputDir: './generated',
                templateDir: './templates',
                framework: 'nestjs',
                projectStructure: 'clean-architecture'
              });

      registerCommand:
        description: 'Register a new CLI command with the registry'
        business-context: 'Enables extensible command system for custom generators'

        parameters:
          - name: 'command'
            type: 'Command'
            description: 'Command definition with metadata and action'

        returns:
          type: 'void'
          description: 'Command registered successfully'

        examples:
          - code: |
              registry.registerCommand({
                name: 'scaffold',
                description: 'Scaffold complete domain module',
                aliases: ['s'],
                action: async (args, options) => {
                  const moduleName = args[0];
                  console.log(`Scaffolding ${moduleName} domain`);
                },
                examples: ['scaffold UserManagement']
              });

      loadCommands:
        description: 'Load all available commands from modules and plugins'
        business-context: 'Discovers and registers commands from core and plugin sources'

        returns:
          type: 'Promise<void>'
          description: 'All commands loaded successfully'

        custom-tags:
          async: 'true'
          discovery: 'true'

        examples:
          - code: |
              const registry = CommandRegistry.create(config);

              // Load all available commands
              await registry.loadCommands();

              // Registry now contains all core and plugin commands
              const commands = registry.getAllCommands();
              console.log(`Loaded ${commands.length} commands`);

      execute:
        description: 'Execute CLI with provided command-line arguments'
        business-context: 'Main execution entry point for command processing'

        parameters:
          - name: 'args'
            type: 'string[]'
            description: 'Command line arguments to process'

        returns:
          type: 'Promise<void>'
          description: 'Command execution completed'

        custom-tags:
          async: 'true'
          main-entry: 'true'

        examples:
          - code: |
              // Execute with command line args
              await registry.execute(['generate', 'entity', 'User']);

              // Execute with options
              await registry.execute([
                'generate', 
                'aggregate', 
                'Order',
                '--framework', 
                'nestjs'
              ]);

      getCommand:
        description: 'Retrieve registered command by name'
        business-context: 'Command lookup for validation and introspection'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Command name to retrieve'

        returns:
          type: 'Command | undefined'
          description: 'Command definition or undefined if not found'

        examples:
          - code: |
              const command = registry.getCommand('generate');

              if (command) {
                console.log(`Found command: ${command.description}`);
                console.log(`Aliases: ${command.aliases?.join(', ')}`);
              }

      getAllCommands:
        description: 'Get all registered commands'
        business-context: 'Command introspection for help systems and validation'

        returns:
          type: 'Command[]'
          description: 'Array of all registered commands'

        examples:
          - code: |
              const commands = registry.getAllCommands();

              // Display available commands
              console.log('Available commands:');
              commands.forEach(cmd => {
                console.log(`  ${cmd.name} - ${cmd.description}`);
              });

      setupProgram:
        description: 'Setup the base Commander.js program with global options'
        business-context: 'Initialize CLI program with common options and help system'

        custom-tags:
          private: 'true'
          initialization: 'true'

      loadCoreCommands:
        description: 'Load built-in CLI commands'
        business-context: 'Register core generation and management commands'

        custom-tags:
          private: 'true'
          core-commands: 'true'

      loadPluginCommands:
        description: 'Load commands from registered plugins'
        business-context: 'Discover and register plugin-provided commands'

        custom-tags:
          private: 'true'
          plugin-system: 'true'

      enhanceHelp:
        description: 'Enhance CLI help output with additional information'
        business-context: 'Provide rich help system with examples and context'

        custom-tags:
          private: 'true'
          help-system: 'true'

      createAnalyzeAction:
        description: 'Create action for code analysis commands'
        business-context: 'Placeholder for future code analysis features'

        custom-tags:
          private: 'true'
          placeholder: 'true'

      createSetupAction:
        description: 'Create action for project setup commands'
        business-context: 'Placeholder for future project setup features'

        custom-tags:
          private: 'true'
          placeholder: 'true'
