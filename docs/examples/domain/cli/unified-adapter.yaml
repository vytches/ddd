# UnifiedAdapter - CLI Format Adapter System

# === FILE METADATA ===
file-name: 'unified-adapter'
title: 'UnifiedAdapter - Format-Agnostic Output System'
description: 'Clean architecture adapter for metadata formatting across output formats'
business-context: 'Enterprise formatting system supporting JSDoc and CLI output formats'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  UnifiedAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Main facade implementing clean adapter pattern for metadata formatting'
      business-context: 'Separates metadata loading from output formatting for enterprise flexibility'

      formats:
        jsdoc:
          description: 'Unified adapter for JSDoc and CLI format generation'
        cli:
          description: |
            ## UnifiedAdapter
            Clean architecture adapter with format-specific output generation

      custom-tags:
        since: '1.0.0'
        architecture: 'Clean architecture with separation of concerns'
        performance: 'Batch processing and intelligent caching'
        formats: 'Supports JSDoc and CLI output formats'

    # Methods
    methods:
      constructor:
        description: 'Creates unified adapter with optional base directory'
        business-context: 'Initializes adapter with metadata engine and format-specific adapters'

        parameters:
          - name: 'baseDir'
            type: 'string'
            description: 'Optional base directory for metadata resolution'

        examples:
          - id: 'basic-adapter'
            code: |
              const adapter = new UnifiedAdapter();

              // Custom base directory
              const customAdapter = new UnifiedAdapter('/path/to/docs');

      formatMetadata:
        description: 'Main entry point - load metadata and format for specific output'
        business-context: 'Primary formatting operation demonstrating clean architecture separation'

        parameters:
          - name: 'config'
            type: 'MetadataConfig'
            description: 'Metadata configuration for resolution'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Target output format (jsdoc or cli)'

        returns:
          type: 'Promise<string | null>'
          description: 'Formatted output string or null if metadata unavailable'

        custom-tags:
          main-operation: 'Primary metadata formatting method'
          clean-architecture: '1. Load metadata, 2. Format output'

        examples:
          - id: 'format-metadata'
            code: |
              const config = {
                packageName: 'aggregates',
                className: 'AggregateRoot',
                methodName: 'commit'
              };

              // Generate JSDoc format
              const jsDocOutput = await adapter.formatMetadata(config, 'jsdoc');

              // Generate CLI format
              const cliOutput = await adapter.formatMetadata(config, 'cli');

              console.log('JSDoc:', jsDocOutput);
              console.log('CLI:', cliOutput);

      formatAllMethodsMetadata:
        description: 'Batch process all methods in a class (performance optimization)'
        business-context: 'High-performance batch processing for enterprise-scale documentation'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for class context'
          - name: 'className'
            type: 'string'
            description: 'Class name to process all methods'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Target output format'

        returns:
          type: 'Promise<Record<string, string | null>>'
          description: 'Map of method names to formatted output'

        custom-tags:
          performance: 'Optimized batch processing'
          enterprise: 'Handles large class hierarchies efficiently'

        examples:
          - id: 'batch-formatting'
            code: |
              const allMethods = await adapter.formatAllMethodsMetadata(
                'aggregates',
                'AggregateRoot',
                'jsdoc'
              );

              Object.entries(allMethods).forEach(([methodName, formatted]) => {
                if (formatted) {
                  console.log(`${methodName}:\n${formatted}\n`);
                }
              });

      getRawMetadata:
        description: 'Get raw metadata without formatting (for debugging/testing)'
        business-context: 'Development and testing support for metadata inspection'

        parameters:
          - name: 'config'
            type: 'MetadataConfig'
            description: 'Metadata configuration for resolution'

        returns:
          type: 'Promise<ResolvedMetadata | null>'
          description: 'Raw resolved metadata or null if unavailable'

        custom-tags:
          debugging: 'Raw metadata access for development'
          testing: 'Supports unit testing and validation'

        examples:
          - id: 'raw-metadata'
            code: |
              const config = { packageName: 'cqrs', className: 'CommandBus' };
              const rawMetadata = await adapter.getRawMetadata(config);

              if (rawMetadata) {
                console.log('Raw metadata structure:', {
                  description: rawMetadata.description,
                  businessContext: rawMetadata.businessContext,
                  examples: rawMetadata.examples?.length || 0
                });
              }

      formatSingleTag:
        description: 'Format single tag for injection (JSDoc specific)'
        business-context: 'Granular tag formatting for precise JSDoc injection'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to format'
          - name: 'value'
            type: 'string'
            description: 'Metadata value to format'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Target output format'

        returns:
          type: 'string'
          description: 'Formatted tag string'

        examples:
          - id: 'single-tag-format'
            code: |
              const tag = adapter.formatSingleTag(
                'businessContext',
                'Core DDD building block',
                'jsdoc'
              );

              console.log('Formatted tag:', tag);
              // Output: "@businessContext Core DDD building block"

      formatExamplesOnly:
        description: 'Format only examples (useful for specific use cases)'
        business-context: 'Example-focused formatting for documentation generation'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata containing examples'
          - name: 'format'
            type: 'OutputFormat'
            description: 'Target output format'

        returns:
          type: 'string'
          description: 'Formatted examples output'

        examples:
          - id: 'examples-only'
            code: |
              const metadata = await adapter.getRawMetadata(config);
              if (metadata) {
                const examplesOutput = adapter.formatExamplesOnly(metadata, 'cli');
                console.log('Examples only:', examplesOutput);
              }

      getCacheStats:
        description: 'Get performance statistics'
        business-context: 'Performance monitoring for enterprise caching optimization'

        returns:
          type: 'object'
          description: 'Cache performance statistics'

        custom-tags:
          monitoring: 'Cache performance metrics'
          optimization: 'Data for cache tuning decisions'

        examples:
          - id: 'cache-stats'
            code: |
              const stats = adapter.getCacheStats();

              console.log('Cache Performance:', {
                hitRate: `${(stats.hitRate * 100).toFixed(1)}%`,
                totalReads: stats.reads,
                cacheSize: stats.cacheSize,
                efficiency: stats.hits / (stats.hits + stats.misses)
              });

      clearCache:
        description: 'Clear cache for testing/performance monitoring'
        business-context: 'Cache management for testing and performance optimization'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Optional specific file path to clear from cache'

        returns:
          type: 'void'
          description: 'Cache cleared successfully'

        examples:
          - id: 'cache-management'
            code: |
              // Clear specific file
              adapter.clearCache('/docs/examples/domain/aggregates/aggregate-root.yaml');

              // Clear entire cache
              adapter.clearCache();

              console.log('Cache cleared');

# === FUNCTIONS ===
functions:
  formatAsJSDoc:
    description: 'Create JSDoc formatted output from metadata config'
    business-context: 'Convenience function for JSDoc format generation'

    parameters:
      - name: 'config'
        type: 'MetadataConfig'
        description: 'Metadata configuration'
      - name: 'baseDir'
        type: 'string'
        description: 'Optional base directory'

    returns:
      type: 'Promise<string | null>'
      description: 'JSDoc formatted output'

    examples:
      - id: 'jsdoc-function'
        code: |
          const jsDoc = await formatAsJSDoc({
            packageName: 'events',
            className: 'DomainEvent'
          });

  formatAsCLI:
    description: 'Create CLI formatted output from metadata config'
    business-context: 'Convenience function for CLI format generation'

    parameters:
      - name: 'config'
        type: 'MetadataConfig'
        description: 'Metadata configuration'
      - name: 'baseDir'
        type: 'string'
        description: 'Optional base directory'

    returns:
      type: 'Promise<string | null>'
      description: 'CLI formatted output'

    examples:
      - id: 'cli-function'
        code: |
          const cliOutput = await formatAsCLI({
            packageName: 'cqrs',
            className: 'CommandBus'
          });

  formatAllMethodsAsJSDoc:
    description: 'Batch format all methods in a class as JSDoc'
    business-context: 'High-performance JSDoc batch generation'

    parameters:
      - name: 'packageName'
        type: 'string'
        description: 'Package name'
      - name: 'className'
        type: 'string'
        description: 'Class name'
      - name: 'baseDir'
        type: 'string'
        description: 'Optional base directory'

    returns:
      type: 'Promise<Record<string, string | null>>'
      description: 'Map of method names to JSDoc output'

  formatAllMethodsAsCLI:
    description: 'Batch format all methods in a class as CLI'
    business-context: 'High-performance CLI batch generation'

    parameters:
      - name: 'packageName'
        type: 'string'
        description: 'Package name'
      - name: 'className'
        type: 'string'
        description: 'Class name'
      - name: 'baseDir'
        type: 'string'
        description: 'Optional base directory'

    returns:
      type: 'Promise<Record<string, string | null>>'
      description: 'Map of method names to CLI output'

# === TYPES ===
types:
  OutputFormat:
    description: 'Supported output format types'
    business-context: 'Format specification for adapter output generation'

    values:
      - name: 'jsdoc'
        description: 'JSDoc comment format for TypeScript documentation'
      - name: 'cli'
        description: 'CLI output format for command-line tools'
