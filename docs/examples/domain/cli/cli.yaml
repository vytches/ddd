# CLI Main Entry Point - Enterprise CLI Application

# === FILE METADATA ===
file-name: 'cli'
title: 'VytchesDDD CLI Main Entry Point'
description: 'Main CLI entry point for enterprise-grade domain-driven design tooling'
business-context: 'Primary entry point for all VytchesDDD CLI operations and commands'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FUNCTIONS ===
functions:
  main:
    description: 'Main CLI entry point function'
    business-context: 'Orchestrates CLI startup, argument parsing, and command routing'

    returns:
      type: 'Promise<void>'
      description: 'Completes when CLI execution finishes'

    custom-tags:
      cli-entry: 'true'
      enterprise-ready: 'true'
      async: 'true'

    examples:
      - id: 'cli-startup'
        description: 'CLI startup and execution'
        code: |
          #!/usr/bin/env node
          import { main } from './cli';

          // Execute CLI with process arguments
          main().catch(error => {
            console.error('CLI execution failed:', error);
            process.exit(1);
          });

      - id: 'programmatic-usage'
        description: 'Programmatic CLI execution'
        code: |
          import { main } from '@vytches/ddd-cli';

          // Override arguments for programmatic use
          process.argv = ['node', 'cli', 'generate', 'entity', 'User'];
          await main();
