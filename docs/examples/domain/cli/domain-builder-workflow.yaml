# Domain Builder Workflow - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'domain-builder-workflow'
title: 'DomainBuilderWorkflow - Enterprise Domain Modeling Orchestration'
description: 'Complete domain builder workflow with multi-step guided domain modeling'
business-context: 'Enterprise-grade domain modeling workflow with architecture planning, bounded context mapping, and code generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  DomainBuilderWorkflow:
    class-doc:
      description: 'Comprehensive domain builder workflow orchestrating domain discovery, architecture planning, and code generation'
      business-context: 'Enterprise-grade workflow for guided domain-driven design implementation with multi-framework support'

      custom-tags:
        since: '1.0.0'
        patterns: 'Workflow orchestration pattern'
        capabilities: 'Multi-step domain modeling, architecture planning, bounded context mapping, pattern selection, security configuration, code generation'

    methods:
      constructor:
        description: 'Initialize domain builder workflow with configuration options'
        business-context: 'Sets up workflow with domain modeling options and initializes execution context'

        parameters:
          - name: 'options'
            type: 'DomainBuilderOptions'
            description: 'Domain builder configuration options'

        examples:
          - id: 'basic-initialization'
            code: |
              const workflow = new DomainBuilderWorkflow({
                domainName: 'OrderManagement',
                structure: 'monolith',
                framework: 'nestjs',
                guided: true,
                patterns: ['cqrs', 'event-sourcing'],
                boundedContexts: ['Orders', 'Payments'],
                compliance: ['gdpr'],
                security: ['authentication'],
                monitoring: true,
                dryRun: false
              });

      execute:
        description: 'Execute the complete domain builder workflow with all steps'
        business-context: 'Orchestrates entire domain modeling process from discovery to code generation'

        returns:
          type: 'Promise<WorkflowResult>'
          description: 'Complete workflow execution result with generated files and configuration'

        custom-tags:
          async: 'true'
          main-execution: 'Primary workflow entry point'
          orchestration: 'Coordinates all workflow steps'

        examples:
          - id: 'full-workflow-execution'
            code: |
              const result = await workflow.execute();

              if (result.success) {
                console.log(`Generated ${result.generatedFiles.length} files`);
                console.log(`Bounded contexts: ${result.boundedContexts.join(', ')}`);
                console.log(`Applied patterns: ${result.patterns.join(', ')}`);
              } else {
                console.error('Workflow failed:', result.error?.message);
              }

      stepDomainDiscovery:
        description: 'Step 1: Domain discovery phase identifying core business concepts'
        business-context: 'Interactive domain exploration to identify entities, value objects, and business rules'

        returns:
          type: 'Promise<void>'
          description: 'Completes domain discovery and updates workflow context'

        custom-tags:
          step-number: '1'
          phase: 'Discovery'
          interactive: 'Uses prompts for domain exploration'

      stepArchitecturePlanning:
        description: 'Step 2: Architecture planning phase defining system structure'
        business-context: 'Plans overall system architecture including layers, dependencies, and integration points'

        returns:
          type: 'Promise<void>'
          description: 'Completes architecture planning and updates workflow context'

        custom-tags:
          step-number: '2'
          phase: 'Planning'
          architectural-decisions: 'Defines system structure'

      stepBoundedContextMapping:
        description: 'Step 3: Bounded context mapping phase defining domain boundaries'
        business-context: 'Maps bounded contexts and their relationships following DDD strategic patterns'

        returns:
          type: 'Promise<void>'
          description: 'Completes bounded context mapping and updates workflow context'

        custom-tags:
          step-number: '3'
          phase: 'Strategic Design'
          ddd-patterns: 'Bounded contexts, context mapping'

      stepPatternSelection:
        description: 'Step 4: Pattern selection phase choosing DDD implementation patterns'
        business-context: 'Selects appropriate DDD tactical patterns based on domain complexity and requirements'

        returns:
          type: 'Promise<void>'
          description: 'Completes pattern selection and updates workflow context'

        custom-tags:
          step-number: '4'
          phase: 'Tactical Design'
          ddd-patterns: 'Aggregates, entities, value objects, repositories, services'

      stepSecurityCompliance:
        description: 'Step 5: Security and compliance configuration phase'
        business-context: 'Configures security measures and compliance requirements for enterprise deployment'

        returns:
          type: 'Promise<void>'
          description: 'Completes security configuration and updates workflow context'

        custom-tags:
          step-number: '5'
          phase: 'Security & Compliance'
          enterprise-features: 'GDPR, authentication, authorization'

      stepCodeGeneration:
        description: 'Step 6: Code generation phase creating implementation files'
        business-context: 'Generates complete DDD implementation with framework integration and best practices'

        returns:
          type: 'Promise<void>'
          description: 'Completes code generation and updates workflow result'

        custom-tags:
          step-number: '6'
          phase: 'Implementation'
          code-generation: 'Creates complete DDD implementation'

      generateProjectStructure:
        description: 'Generate project structure files and directories'
        business-context: 'Creates standard DDD project structure with proper organization'

        returns:
          type: 'Promise<void>'
          description: 'Creates project structure files'

        custom-tags:
          generation-type: 'Project structure'
          outputs: 'Directories, configuration files, package structure'

      generateBoundedContext:
        description: 'Generate bounded context implementation files'
        business-context: 'Creates complete bounded context implementation with layers and patterns'

        returns:
          type: 'Promise<void>'
          description: 'Creates bounded context implementation'

        custom-tags:
          generation-type: 'Bounded context'
          outputs: 'Domain layer, application layer, infrastructure layer'

      generatePattern:
        description: 'Generate DDD pattern implementations'
        business-context: 'Creates specific DDD pattern implementations based on selected patterns'

        returns:
          type: 'Promise<void>'
          description: 'Creates pattern implementations'

        custom-tags:
          generation-type: 'DDD patterns'
          outputs: 'Aggregates, repositories, services, value objects'

      generateFrameworkIntegration:
        description: 'Generate framework-specific integration code'
        business-context: 'Creates framework integration code for selected target framework'

        returns:
          type: 'Promise<void>'
          description: 'Creates framework integration'

        custom-tags:
          generation-type: 'Framework integration'
          outputs: 'Controllers, modules, dependency injection configuration'

      updateProgress:
        description: 'Update progress display for user feedback'
        business-context: 'Provides real-time progress updates during workflow execution'

        returns:
          type: 'void'
          description: 'Updates progress display'

        custom-tags:
          ui-feedback: 'Progress tracking'
          user-experience: 'Real-time updates'

      calculateTotalSteps:
        description: 'Calculate total workflow steps based on configuration'
        business-context: 'Determines total step count based on enabled features and options'

        returns:
          type: 'number'
          description: 'Total number of workflow steps'

        custom-tags:
          calculation: 'Step counting'
          workflow-planning: 'Progress calculation'

      generateDefaultContexts:
        description: 'Generate default bounded contexts based on domain name'
        business-context: 'Creates sensible default bounded contexts when not explicitly specified'

        returns:
          type: 'string[]'
          description: 'Array of default bounded context names'

        custom-tags:
          generation-type: 'Default contexts'
          fallback-strategy: 'Domain-based defaults'

      hasFeature:
        description: 'Check if a specific feature is enabled in workflow configuration'
        business-context: 'Utility method for conditional feature activation'

        returns:
          type: 'boolean'
          description: 'Whether feature is enabled'

        custom-tags:
          utility: 'Feature checking'
          conditional-logic: 'Feature flags'
