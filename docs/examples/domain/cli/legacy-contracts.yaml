# Legacy Contracts - CLI Backward Compatibility Types

# === FILE METADATA ===
file-name: 'legacy-contracts'
title: 'Legacy Contracts - Backward Compatibility Type System'
description: 'Legacy contracts types for CLI package backward compatibility'
business-context: 'Maintains backward compatibility during YAML metadata system transition'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  ComplexityLevel:
    description: 'Documentation complexity level enumeration'
    business-context: 'Standardized complexity classification for examples'

    values:
      - name: 'basic'
        description: 'Simple examples for beginners'
      - name: 'intermediate'
        description: 'Standard examples with moderate complexity'
      - name: 'advanced'
        description: 'Complex examples for experienced developers'

# === INTERFACES ===
interfaces:
  ExampleDefinition:
    description: 'Complete example definition with metadata and validation'
    business-context: 'Core example structure for CLI documentation system'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique example identifier'
      - name: 'name'
        type: 'string'
        description: 'Human-readable example name'
      - name: 'file'
        type: 'string'
        description: 'File path to example content'
      - name: 'path'
        type: 'string'
        description: 'Optional custom path override'
      - name: 'tags'
        type: 'string[]'
        description: 'Classification tags for example discovery'
      - name: 'complexity'
        type: 'ComplexityLevel'
        description: 'Example complexity level'
      - name: 'framework'
        type: 'string'
        description: 'Optional framework integration (nestjs, express, etc.)'
      - name: 'priority'
        type: "'high' | 'medium' | 'low'"
        description: 'Example priority for selection algorithms'
      - name: 'description'
        type: 'string'
        description: 'Detailed example description'
      - name: 'prerequisites'
        type: 'string[]'
        description: 'Optional example prerequisites'
      - name: 'dependencies'
        type: 'string[]'
        description: 'Optional package dependencies'
      - name: 'deprecated'
        type: 'boolean'
        description: 'Optional deprecation flag'
      - name: 'package'
        type: 'string'
        description: 'Optional package context'
      - name: 'diSupport'
        type: 'boolean'
        description: 'Optional dependency injection support flag'
      - name: 'frameworkIntegrations'
        type: 'FrameworkIntegration[]'
        description: 'Optional framework integration configurations'
      - name: 'validation'
        type: 'object'
        description: 'Optional validation configuration'

  PackageExampleConfig:
    description: 'Package-level example configuration and metadata'
    business-context: 'Comprehensive package documentation configuration'

    properties:
      - name: 'package'
        type: 'string'
        description: 'Optional package identifier'
      - name: 'packageName'
        type: 'string'
        description: 'Optional alternative package name'
      - name: 'displayName'
        type: 'string'
        description: 'Human-readable package display name'
      - name: 'description'
        type: 'string'
        description: 'Package description'
      - name: 'version'
        type: 'string'
        description: 'Package version'
      - name: 'domain'
        type: 'string'
        description: 'Optional domain classification'
      - name: 'patterns'
        type: 'string[]'
        description: 'Optional design patterns implemented'
      - name: 'dependencies'
        type: 'string[]'
        description: 'Optional package dependencies'
      - name: 'examples'
        type: 'ExampleDefinition[]'
        description: 'Array of example definitions'
      - name: 'framework'
        type: 'FrameworkIntegration'
        description: 'Optional primary framework integration'
      - name: 'frameworks'
        type: 'FrameworkIntegration[]'
        description: 'Optional multiple framework integrations'
      - name: 'content'
        type: 'ContentConfig'
        description: 'Optional content configuration'
      - name: 'llmSupport'
        type: 'LLMSupport'
        description: 'Optional LLM optimization configuration'
      - name: 'tags'
        type: 'TagSystem'
        description: 'Optional tag system configuration'
      - name: 'relatedPackages'
        type: 'RelatedPackage[] | Record<string, any>'
        description: 'Optional related packages configuration'

  FrameworkIntegration:
    description: 'Framework integration configuration'
    business-context: 'Defines how examples integrate with specific frameworks'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Framework name identifier'
      - name: 'displayName'
        type: 'string'
        description: 'Optional human-readable framework name'
      - name: 'description'
        type: 'string'
        description: 'Optional framework description'
      - name: 'supported'
        type: 'string[]'
        description: 'Optional supported versions or features'
      - name: 'complexityLevels'
        type: 'ComplexityLevel[]'
        description: 'Optional supported complexity levels'
      - name: 'dependencies'
        type: 'string[]'
        description: 'Optional framework dependencies'
      - name: 'defaultComplexity'
        type: 'ComplexityLevel'
        description: 'Optional default complexity level'

  ContentConfig:
    description: 'Content generation and display configuration'
    business-context: 'Controls example content generation and presentation'

    properties:
      - name: 'baseExamplesPath'
        type: 'string'
        description: 'Optional base examples directory path'
      - name: 'frameworkExamplesPath'
        type: 'string'
        description: 'Optional framework examples directory path'
      - name: 'sections'
        type: 'string[]'
        description: 'Optional content sections to include'
      - name: 'complexityLevels'
        type: 'ComplexityLevel[]'
        description: 'Optional complexity levels to include'
      - name: 'showImportStatements'
        type: 'boolean'
        description: 'Optional flag to show import statements'
      - name: 'showErrorHandling'
        type: 'boolean'
        description: 'Optional flag to show error handling'
      - name: 'showTesting'
        type: 'boolean'
        description: 'Optional flag to show testing examples'
      - name: 'showPerformance'
        type: 'boolean'
        description: 'Optional flag to show performance considerations'
      - name: 'includeBestPractices'
        type: 'boolean'
        description: 'Optional flag to include best practices'
      - name: 'includeCommonPitfalls'
        type: 'boolean'
        description: 'Optional flag to include common pitfalls'
      - name: 'showVersionHistory'
        type: 'boolean'
        description: 'Optional flag to show version history'

  LLMSupport:
    description: 'LLM optimization configuration'
    business-context: 'Optimizes documentation for AI/LLM consumption and processing'

    properties:
      - name: 'enabled'
        type: 'boolean'
        description: 'Enable LLM optimizations'
      - name: 'summaryFormat'
        type: "'default' | 'enhanced'"
        description: 'Optional summary format specification'
      - name: 'includeTypes'
        type: 'boolean'
        description: 'Optional flag to include TypeScript types'
      - name: 'includeTests'
        type: 'boolean'
        description: 'Optional flag to include test examples'
      - name: 'includePrompts'
        type: 'boolean'
        description: 'Optional flag to include usage prompts'
      - name: 'includeTips'
        type: 'boolean'
        description: 'Optional flag to include tips and best practices'
      - name: 'includePatterns'
        type: 'boolean'
        description: 'Optional flag to include design patterns'
      - name: 'optimizeForCodeGeneration'
        type: 'boolean'
        description: 'Optional flag to optimize for code generation'
      - name: 'metadata'
        type: 'Record<string, unknown>'
        description: 'Optional additional metadata for LLM processing'

  TagSystem:
    description: 'Hierarchical tag system for example classification'
    business-context: 'Enables sophisticated example discovery and categorization'

    properties:
      - name: 'core'
        type: 'string[]'
        description: 'Optional core functionality tags'
      - name: 'integrations'
        type: 'string[]'
        description: 'Optional integration tags'
      - name: 'frameworks'
        type: 'string[]'
        description: 'Optional framework tags'
      - name: 'domain'
        type: 'string[]'
        description: 'Optional domain-specific tags'
      - name: 'patterns'
        type: 'string[]'
        description: 'Optional design pattern tags'
      - name: 'features'
        type: 'string[]'
        description: 'Optional feature tags'
      - name: 'custom'
        type: 'string[]'
        description: 'Optional custom tags'

  RelatedPackage:
    description: 'Related package reference with dependency information'
    business-context: 'Documents package relationships and dependencies'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Related package name'
      - name: 'optional'
        type: 'boolean'
        description: 'Whether the package is optional'
      - name: 'description'
        type: 'string'
        description: 'Relationship description'

  GenerateDocumentationOptions:
    description: 'Documentation generation options'
    business-context: 'Configuration for dynamic documentation generation'

    properties:
      - name: 'package'
        type: 'string'
        description: 'Target package for documentation generation'
      - name: 'complexity'
        type: 'ComplexityLevel'
        description: 'Optional complexity level filter'
      - name: 'framework'
        type: 'string'
        description: 'Optional framework filter'
      - name: 'sections'
        type: 'string[]'
        description: 'Optional sections to include'
      - name: 'format'
        type: "'jsdoc' | 'cli'"
        description: 'Optional output format specification'
      - name: 'llmOptimized'
        type: 'boolean'
        description: 'Optional LLM optimization flag'
      - name: 'enhancedMetadata'
        type: 'boolean'
        description: 'Optional enhanced metadata flag'
      - name: 'maxExamples'
        type: 'number'
        description: 'Optional maximum examples limit'
      - name: 'randomize'
        type: 'boolean'
        description: 'Optional randomization flag'
      - name: 'seed'
        type: 'string'
        description: 'Optional randomization seed'

  GenerateDocumentationResult:
    description: 'Documentation generation result'
    business-context: 'Result of documentation generation operation'

    properties:
      - name: 'content'
        type: 'string'
        description: 'Generated documentation content'
      - name: 'metadata'
        type: 'object'
        description: 'Generation metadata and statistics'

  ValidationResult:
    description: 'Validation operation result'
    business-context: 'Result of documentation validation with errors and fixes'

    properties:
      - name: 'valid'
        type: 'boolean'
        description: 'Overall validation result'
      - name: 'warnings'
        type: 'ValidationWarning[]'
        description: 'Array of validation warnings'
      - name: 'errors'
        type: 'ValidationError[]'
        description: 'Array of validation errors'
      - name: 'fixes'
        type: 'ValidationFix[]'
        description: 'Optional array of automated fixes'

  ValidationWarning:
    description: 'Validation warning information'
    business-context: 'Non-critical validation issue information'

    properties:
      - name: 'file'
        type: 'string'
        description: 'File path where warning occurred'
      - name: 'line'
        type: 'number'
        description: 'Optional line number'
      - name: 'message'
        type: 'string'
        description: 'Warning message'
      - name: 'type'
        type: 'string'
        description: 'Warning type classification'

  ValidationError:
    description: 'Validation error information'
    business-context: 'Critical validation issue information'

    properties:
      - name: 'file'
        type: 'string'
        description: 'File path where error occurred'
      - name: 'line'
        type: 'number'
        description: 'Optional line number'
      - name: 'message'
        type: 'string'
        description: 'Error message'
      - name: 'type'
        type: 'string'
        description: 'Error type classification'

  ValidationFix:
    description: 'Automated validation fix information'
    business-context: 'Automated fix applied during validation'

    properties:
      - name: 'file'
        type: 'string'
        description: 'File path where fix was applied'
      - name: 'line'
        type: 'number'
        description: 'Optional line number'
      - name: 'fix'
        type: 'string'
        description: 'Applied fix content'
      - name: 'description'
        type: 'string'
        description: 'Fix description'
