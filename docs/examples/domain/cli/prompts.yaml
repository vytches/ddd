# Prompts - Interactive User Input System

# === FILE METADATA ===
file-name: 'prompts'
title: 'Prompts - Interactive CLI User Input'
description: 'Zero-dependency interactive prompt system for CLI user interaction'
business-context: 'User input collection for CLI workflows and configuration'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  PromptOptions:
    description: 'Configuration options for text input prompts'
    business-context: 'Flexible prompt configuration with validation and defaults'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Prompt message displayed to user'
      - name: 'default'
        type: 'string'
        description: 'Default value if user provides no input'
      - name: 'validate'
        type: '(input: string) => boolean | string'
        description: 'Validation function returning true or error message'
      - name: 'mask'
        type: 'boolean'
        description: 'Whether to mask input characters (for passwords)'

  SelectOptions:
    description: 'Configuration options for selection prompts'
    business-context: 'Single-choice selection with descriptions and defaults'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Prompt message displayed to user'
      - name: 'choices'
        type: 'Array<{ name: string; value: T; description?: string }>'
        description: 'Array of selectable options with display names and values'
      - name: 'default'
        type: 'number'
        description: 'Default choice index'

  ConfirmOptions:
    description: 'Configuration options for confirmation prompts'
    business-context: 'Simple yes/no confirmation with default values'

    properties:
      - name: 'message'
        type: 'string'
        description: 'Confirmation question displayed to user'
      - name: 'default'
        type: 'boolean'
        description: 'Default confirmation value'

# === CLASSES ===
classes:
  Prompts:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Interactive prompt system for CLI user input and interaction'
      business-context: 'Provides comprehensive user interaction capabilities for CLI applications without external dependencies'

      # Format-specific
      formats:
        jsdoc:
          description: 'Zero-dependency interactive prompt system'
        cli:
          description: |
            ## Interactive Prompts
            Complete user input system for CLI applications

      custom-tags:
        since: '1.0.0'
        pattern: 'Utility Pattern'
        category: 'User Interaction'

    # Methods
    methods:
      close:
        description: 'Close readline interface and cleanup resources'
        business-context: 'Proper resource cleanup for readline interface'

        returns:
          type: 'void'
          description: 'Readline interface closed'

        examples:
          - id: 'basic'
            code: |
              // Cleanup after all prompts are done
              await Prompts.ask({ message: 'Enter name:' });
              Prompts.close(); // Clean up resources

        custom-tags:
          cleanup: 'Essential for resource management'
          static: true

      ask:
        description: 'Ask user for text input with validation and defaults'
        business-context: 'Primary text input method with comprehensive validation support'

        parameters:
          - name: 'options'
            type: 'PromptOptions'
            description: 'Prompt configuration including message, validation, and defaults'

        returns:
          type: 'Promise<string>'
          description: 'User input string'

        examples:
          - id: 'basic'
            code: |
              const name = await Prompts.ask({
                message: 'Enter your name:',
                default: 'Anonymous'
              });
          - id: 'with-validation'
            code: |
              const email = await Prompts.ask({
                message: 'Enter email:',
                validate: input => input.includes('@') || 'Please enter valid email'
              });

        custom-tags:
          async: true
          static: true
          validation: 'Supports custom validation functions'

      password:
        description: 'Ask user for password input with masked characters'
        business-context: 'Secure password input with character masking for sensitive data'

        parameters:
          - name: 'options'
            type: 'Omit<PromptOptions, "mask">'
            description: 'Prompt options without mask property (always masked)'

        returns:
          type: 'Promise<string>'
          description: 'Password input string'

        examples:
          - id: 'basic'
            code: |
              const password = await Prompts.password({
                message: 'Enter password:',
                validate: input => input.length >= 8 || 'Password too short'
              });

        custom-tags:
          async: true
          static: true
          security: 'Automatically masks input characters'

      confirm:
        description: 'Ask user for yes/no confirmation'
        business-context: 'Simple confirmation prompts for user decisions and actions'

        parameters:
          - name: 'options'
            type: 'ConfirmOptions'
            description: 'Confirmation options including message and default value'

        returns:
          type: 'Promise<boolean>'
          description: 'User confirmation result'

        examples:
          - id: 'basic'
            code: |
              const confirmed = await Prompts.confirm({
                message: 'Delete all files?',
                default: false
              });

              if (confirmed) {
                console.log('Proceeding with deletion...');
              }

        custom-tags:
          async: true
          static: true
          decision: 'Returns boolean for user decisions'

      select:
        description: 'Select single option from a list of choices'
        business-context: 'Single-choice selection from predefined options with descriptions'

        parameters:
          - name: 'options'
            type: 'SelectOptions<T>'
            description: 'Selection configuration with choices and default'

        returns:
          type: 'Promise<T>'
          description: 'Selected option value'

        examples:
          - id: 'basic'
            code: |
              const framework = await Prompts.select({
                message: 'Choose framework:',
                choices: [
                  { name: 'NestJS', value: 'nestjs', description: 'Enterprise Node.js' },
                  { name: 'Express', value: 'express', description: 'Minimal web framework' },
                  { name: 'Fastify', value: 'fastify', description: 'High-performance web framework' }
                ],
                default: 0
              });

        custom-tags:
          async: true
          static: true
          generic: 'Type-safe return values'

      multiSelect:
        description: 'Select multiple options from a list of choices'
        business-context: 'Multi-choice selection for complex configuration scenarios'

        parameters:
          - name: 'options'
            type: 'SelectOptions<T>'
            description: 'Multi-selection configuration with choices'

        returns:
          type: 'Promise<T[]>'
          description: 'Array of selected option values'

        examples:
          - id: 'basic'
            code: |
              const features = await Prompts.multiSelect({
                message: 'Select features to include:',
                choices: [
                  { name: 'Authentication', value: 'auth', description: 'User authentication system' },
                  { name: 'Database ORM', value: 'orm', description: 'Database integration' },
                  { name: 'Caching', value: 'cache', description: 'Redis caching layer' }
                ]
              });

        custom-tags:
          async: true
          static: true
          multiple: 'Returns array of selected values'

      spinner:
        description: 'Create animated loading spinner for long operations'
        business-context: 'Visual feedback for long-running CLI operations'

        parameters:
          - name: 'message'
            type: 'string'
            description: 'Initial spinner message'

        returns:
          type: '{ start: () => void; stop: () => void; update: (newMessage: string) => void }'
          description: 'Spinner control object'

        examples:
          - id: 'basic'
            code: |
              const spinner = Prompts.spinner('Generating components...');
              spinner.start();

              await generateComponents();
              spinner.update('Finishing up...');

              await cleanup();
              spinner.stop();

        custom-tags:
          static: true
          visual: 'Animated loading indicator'
          control: 'Returns object with start/stop/update methods'

      progressBar:
        description: 'Display progress bar for tracked operations'
        business-context: 'Visual progress indication for file processing and batch operations'

        parameters:
          - name: 'current'
            type: 'number'
            description: 'Current progress value'
          - name: 'total'
            type: 'number'
            description: 'Total expected value'
          - name: 'message'
            type: 'string'
            description: 'Optional progress message'

        returns:
          type: 'void'
          description: 'Progress bar displayed on console'

        examples:
          - id: 'basic'
            code: |
              const files = ['file1.ts', 'file2.ts', 'file3.ts'];

              for (let i = 0; i < files.length; i++) {
                Prompts.progressBar(i + 1, files.length, `Processing ${files[i]}`);
                await processFile(files[i]);
              }

        custom-tags:
          static: true
          visual: 'Progress bar display'
          tracking: 'Shows completion percentage'

      clearLine:
        description: 'Clear current terminal line'
        business-context: 'Terminal manipulation for clean output formatting'

        returns:
          type: 'void'
          description: 'Current line cleared'

        examples:
          - id: 'basic'
            code: |
              console.log('Processing...');
              await longOperation();
              Prompts.clearLine();
              console.log('Completed!');

        custom-tags:
          static: true
          terminal: 'Direct terminal manipulation'

      cursorUp:
        description: 'Move terminal cursor up specified lines'
        business-context: 'Terminal cursor control for dynamic output updates'

        parameters:
          - name: 'lines'
            type: 'number'
            description: 'Number of lines to move up (default: 1)'

        returns:
          type: 'void'
          description: 'Cursor moved up'

        examples:
          - id: 'basic'
            code: |
              console.log('Line 1');
              console.log('Line 2');
              Prompts.cursorUp(1);
              console.log('Updated Line 2');

        custom-tags:
          static: true
          terminal: 'Cursor positioning'

      cursorDown:
        description: 'Move terminal cursor down specified lines'
        business-context: 'Terminal cursor control for output positioning'

        parameters:
          - name: 'lines'
            type: 'number'
            description: 'Number of lines to move down (default: 1)'

        returns:
          type: 'void'
          description: 'Cursor moved down'

        examples:
          - id: 'basic'
            code: |
              Prompts.cursorUp(2);
              console.log('Insert between lines');
              Prompts.cursorDown(1);

        custom-tags:
          static: true
          terminal: 'Cursor positioning'

# === FUNCTIONS ===
functions:
  promptForInput:
    description: 'Standalone function for simple text input'
    business-context: 'Convenient text input function with validation'

    parameters:
      - name: 'message'
        type: 'string'
        description: 'Input prompt message'
      - name: 'options'
        type: '{ defaultValue?: string; required?: boolean; validate?: (input: string) => boolean | string }'
        description: 'Input options with defaults and validation'

    returns:
      type: 'Promise<string>'
      description: 'User input string'

    examples:
      - id: 'basic'
        code: |
          const name = await promptForInput('Enter name:', {
            defaultValue: 'Anonymous',
            required: true,
            validate: input => input.length > 0 || 'Name is required'
          });

    custom-tags:
      async: true
      standalone: 'Independent prompt function'

  promptForChoice:
    description: 'Standalone function for single choice selection'
    business-context: 'Simple choice selection with type safety'

    parameters:
      - name: 'message'
        type: 'string'
        description: 'Selection prompt message'
      - name: 'choices'
        type: 'Array<{ name: string; value: T; description?: string }>'
        description: 'Array of selectable choices'
      - name: 'defaultIndex'
        type: 'number'
        description: 'Default choice index'

    returns:
      type: 'Promise<T>'
      description: 'Selected choice value'

    examples:
      - id: 'basic'
        code: |
          const choice = await promptForChoice('Select option:', [
            { name: 'Create', value: 'create', description: 'Create new component' },
            { name: 'Update', value: 'update', description: 'Update existing component' }
          ], 0);

    custom-tags:
      async: true
      standalone: 'Independent choice function'
      generic: 'Type-safe choice values'

  promptForConfirmation:
    description: 'Standalone function for yes/no confirmation'
    business-context: 'Simple confirmation prompts'

    parameters:
      - name: 'message'
        type: 'string'
        description: 'Confirmation message'
      - name: 'defaultValue'
        type: 'boolean'
        description: 'Default confirmation value'

    returns:
      type: 'Promise<boolean>'
      description: 'User confirmation result'

    examples:
      - id: 'basic'
        code: |
          const confirmed = await promptForConfirmation(
            'Continue with operation?',
            false
          );

    custom-tags:
      async: true
      standalone: 'Independent confirmation function'

  promptForMultiSelect:
    description: 'Standalone function for multiple choice selection'
    business-context: 'Multi-selection functionality as standalone function'

    parameters:
      - name: 'message'
        type: 'string'
        description: 'Multi-selection prompt message'
      - name: 'choices'
        type: 'Array<{ name: string; value: T; description?: string }>'
        description: 'Array of selectable choices'

    returns:
      type: 'Promise<T[]>'
      description: 'Array of selected choice values'

    examples:
      - id: 'basic'
        code: |
          const selected = await promptForMultiSelect('Select multiple:', [
            { name: 'Option A', value: 'a' },
            { name: 'Option B', value: 'b' },
            { name: 'Option C', value: 'c' }
          ]);

    custom-tags:
      async: true
      standalone: 'Independent multi-select function'
      generic: 'Type-safe array of values'
