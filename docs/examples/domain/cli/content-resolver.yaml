# ContentResolver - CLI Content Resolution System

# === FILE METADATA ===
file-name: 'content-resolver'
title: 'ContentResolver - Template Content Resolution'
description: 'Intelligent content resolution system with fallback mechanisms for CLI templates'
business-context: 'Enables flexible template content loading with automatic fallbacks and generated content'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ContentResolver:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Static content resolver with intelligent fallback mechanisms for template generation'
      business-context: 'Central system for resolving template content from multiple sources with automatic fallbacks'

      # Format-specific
      formats:
        jsdoc:
          description: 'Static content resolver with intelligent fallback mechanisms'
        cli:
          description: |
            ## ContentResolver

            Static content resolution system that provides intelligent template content loading
            with multiple fallback strategies and automatic content generation.

      custom-tags:
        since: '1.0.0'
        capabilities: 'Multi-source content resolution'
        patterns: 'Static factory pattern with fallback mechanisms'

    # Methods
    methods:
      resolveContent:
        description: 'Resolves template content with intelligent fallback mechanisms from multiple sources'
        business-context: 'Primary method for getting template content with automatic fallbacks to pattern-based generation'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Target package name for content resolution'
          - name: 'requestedPath'
            type: 'string'
            description: 'Requested content path with fallback options'

        returns:
          type: 'string'
          description: 'Resolved template content or generated fallback'

        custom-tags:
          static: 'true'
          main-method: 'Primary content resolution entry point'
          fallback-strategy: 'Exact → Mapped → Pattern → Generated'

        examples:
          - id: 'basic-resolution'
            code: |
              const content = ContentResolver.resolveContent(
                'aggregates',
                'entity-creation'
              );
              // Returns: Template content with business examples

          - id: 'fallback-resolution'
            code: |
              const content = ContentResolver.resolveContent(
                'domain-services', 
                'non-existent-pattern'
              );
              // Returns: Auto-generated content with package patterns

      tryExactPath:
        description: 'Attempts exact path match for requested content'
        business-context: 'First resolution strategy - direct file matching'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for path resolution'
          - name: 'requestedPath'
            type: 'string'
            description: 'Exact path to match'

        returns:
          type: 'string | null'
          description: 'Content if found, null if not matched'

        custom-tags:
          private: 'true'
          strategy: 'exact-match'

      tryMappedPath:
        description: 'Attempts content resolution using path mapping strategies'
        business-context: 'Second resolution strategy - flexible path mapping for template variations'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for mapping resolution'
          - name: 'requestedPath'
            type: 'string'
            description: 'Path for mapping attempt'

        returns:
          type: 'string | null'
          description: 'Mapped content if found, null otherwise'

        custom-tags:
          private: 'true'
          strategy: 'path-mapping'

      tryPatternFallback:
        description: 'Attempts pattern-based content resolution as fallback strategy'
        business-context: 'Third resolution strategy - pattern matching for similar content types'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for pattern matching'
          - name: 'requestedPath'
            type: 'string'
            description: 'Path for pattern-based matching'

        returns:
          type: 'string | null'
          description: 'Pattern-matched content if found, null otherwise'

        custom-tags:
          private: 'true'
          strategy: 'pattern-matching'

      tryGeneratedContent:
        description: 'Generates content automatically when no existing content is found'
        business-context: 'Final resolution strategy - automatic content generation with package-specific patterns'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for content generation context'
          - name: 'requestedPath'
            type: 'string'
            description: 'Path context for generation'

        returns:
          type: 'string'
          description: 'Generated template content'

        custom-tags:
          private: 'true'
          strategy: 'auto-generation'
          guaranteed-return: 'Always returns content'

      generatePackageDescription:
        description: 'Generates package-specific descriptions for template content'
        business-context: 'Creates contextual package descriptions for auto-generated templates'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for description generation'

        returns:
          type: 'string'
          description: 'Generated package description'

        custom-tags:
          private: 'true'
          generation-type: 'description'

      generateImportsPattern:
        description: 'Generates standard import patterns for package templates'
        business-context: 'Creates proper import statements based on package structure and exports'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for import pattern generation'

        returns:
          type: 'string'
          description: 'Generated import pattern'

        custom-tags:
          private: 'true'
          generation-type: 'imports'

      generateErrorHandlingPattern:
        description: 'Generates error handling patterns appropriate for package context'
        business-context: 'Creates standardized error handling examples based on package patterns'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for error handling context'

        returns:
          type: 'string'
          description: 'Generated error handling pattern'

        custom-tags:
          private: 'true'
          generation-type: 'error-handling'

      generateTestingPattern:
        description: 'Generates testing patterns and examples for package components'
        business-context: 'Creates appropriate test examples using package-specific testing utilities'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for testing pattern context'

        returns:
          type: 'string'
          description: 'Generated testing pattern'

        custom-tags:
          private: 'true'
          generation-type: 'testing'

      generatePatternContent:
        description: 'Generates comprehensive pattern content for specific template types'
        business-context: 'Creates full template patterns based on requested content type and package context'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for pattern generation'
          - name: 'requestedPath'
            type: 'string'
            description: 'Requested content type for pattern generation'

        returns:
          type: 'string'
          description: 'Generated pattern content'

        custom-tags:
          private: 'true'
          generation-type: 'full-pattern'

      getMainExport:
        description: 'Extracts main export information from package for template context'
        business-context: 'Identifies primary package exports for use in generated template content'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for export analysis'

        returns:
          type: 'string'
          description: 'Main export identifier'

        custom-tags:
          private: 'true'
          analysis-type: 'package-exports'

      generateHeroSection:
        description: 'Generates hero section content for package documentation templates'
        business-context: 'Creates compelling introductory content highlighting package value proposition'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for hero section generation'

        returns:
          type: 'string'
          description: 'Generated hero section content'

        custom-tags:
          private: 'true'
          generation-type: 'hero-section'

      generateWhenToUse:
        description: 'Generates appropriate usage scenarios for package components'
        business-context: 'Creates guidance on when to use specific package features in business scenarios'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for usage scenario generation'

        returns:
          type: 'string'
          description: 'Generated usage scenarios'

        custom-tags:
          private: 'true'
          generation-type: 'usage-guidance'

      generateWhenNotToUse:
        description: 'Generates guidance on inappropriate usage scenarios for package components'
        business-context: 'Creates warnings about when NOT to use specific features to prevent misuse'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for anti-pattern guidance'

        returns:
          type: 'string'
          description: 'Generated anti-usage guidance'

        custom-tags:
          private: 'true'
          generation-type: 'anti-patterns'

      generateCommonPitfalls:
        description: 'Generates common pitfalls and mistakes for package usage'
        business-context: 'Creates educational content about typical mistakes to help developers avoid issues'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for pitfall analysis'

        returns:
          type: 'string'
          description: 'Generated common pitfalls'

        custom-tags:
          private: 'true'
          generation-type: 'pitfalls'

      generateTroubleshooting:
        description: 'Generates troubleshooting guidance for package-specific issues'
        business-context: 'Creates diagnostic and solution guidance for common package usage problems'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for troubleshooting context'

        returns:
          type: 'string'
          description: 'Generated troubleshooting guide'

        custom-tags:
          private: 'true'
          generation-type: 'troubleshooting'

      generatePerformanceSection:
        description: 'Generates performance considerations and optimization tips for package usage'
        business-context: 'Creates performance guidance specific to package capabilities and constraints'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for performance analysis'

        returns:
          type: 'string'
          description: 'Generated performance guidance'

        custom-tags:
          private: 'true'
          generation-type: 'performance'

      getDefaultContent:
        description: 'Returns default fallback content when all resolution strategies fail'
        business-context: 'Provides basic template content as last resort to ensure templates always work'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name for default content context'

        returns:
          type: 'string'
          description: 'Default fallback content'

        custom-tags:
          private: 'true'
          fallback: 'ultimate-fallback'
