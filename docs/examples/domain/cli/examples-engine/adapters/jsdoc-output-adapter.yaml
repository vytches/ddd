            code: |
              // Formatting rules:
              // camelCase -> kebab-case
              // Adds @ prefix for JSDoc tags
              // Maintains readability and JSDoc conventions

        custom-tags:
          private: true
          name-formatting: 'CamelCase to kebab-case conversion'
          jsdoc-conventions: 'Follows JSDoc tag naming standards'
