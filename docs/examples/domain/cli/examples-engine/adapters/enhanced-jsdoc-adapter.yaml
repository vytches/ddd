# Enhanced JSDoc Adapter - Enhanced Metadata System JSDoc Generation

# === FILE METADATA ===
file-name: 'enhanced-jsdoc-adapter'
title: 'EnhancedJSDocAdapter - JSDoc Generation for Enhanced Metadata System'
description: 'Advanced JSDoc adapter for Enhanced Metadata System with block formatting and documentation generation'
business-context: 'Core adapter component that transforms Enhanced Metadata System blocks into properly formatted JSDoc comments for TypeScript declaration files'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EnhancedJSDocAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Advanced JSDoc generation adapter for Enhanced Metadata System'
      business-context: 'Core adapter component that transforms Enhanced Metadata System extract blocks and hierarchical metadata into properly formatted JSDoc comments optimized for TypeScript declaration files'

      # Format-specific
      formats:
        jsdoc:
          description: 'JSDoc generation adapter for Enhanced Metadata System V2'
        cli:
          description: |
            ## EnhancedJSDocAdapter
            Advanced JSDoc generation system for Enhanced Metadata with block formatting and documentation transformation

      custom-tags:
        since: '1.0.0'
        pattern: 'Adapter Pattern'
        category: 'Enhanced Metadata System'
        features: 'JSDoc generation, block formatting, metadata transformation, TypeScript integration'
        metadata-system: 'Enhanced Metadata System V2 adapter component'

    # Methods
    methods:
      formatBlock:
        description: 'Convert extract block to JSDoc format'
        business-context: 'Transforms individual Enhanced Metadata System extract blocks into properly formatted JSDoc comment sections'

        parameters:
          - name: 'block'
            type: 'ExtractBlock'
            description: 'Enhanced Metadata System extract block to format as JSDoc'

        returns:
          type: 'string'
          description: 'Formatted JSDoc comment section'

        examples:
          - id: 'block-formatting'
            code: |
              const adapter = new EnhancedJSDocAdapter();
              const formattedBlock = adapter.formatBlock(extractBlock);
              // Returns JSDoc-formatted comment section
          - id: 'example-block'
            code: |
              // Transforms extract blocks like:
              // @example basic-usage
              // ```typescript
              // const result = method();
              // ```
              // Into JSDoc @example format

        custom-tags:
          block-formatting: 'Individual extract block transformation'
          jsdoc-generation: 'JSDoc comment section generation'
          extract-blocks: 'Enhanced Metadata System block processing'

      formatMethodDoc:
        description: 'Format multiple blocks for method documentation'
        business-context: 'Combines multiple Enhanced Metadata System extract blocks into comprehensive method-level JSDoc documentation'

        parameters:
          - name: 'blocks'
            type: 'ExtractBlock[]'
            description: 'Array of extract blocks for method documentation'

        returns:
          type: 'string'
          description: 'Complete method JSDoc documentation'

        examples:
          - id: 'method-documentation'
            code: |
              const blocks = [descriptionBlock, parameterBlock, exampleBlock];
              const methodDoc = adapter.formatMethodDoc(blocks);
              // Returns complete method JSDoc with all blocks
          - id: 'comprehensive-docs'
            code: |
              // Combines all blocks for method:
              // - Description and business context
              // - Parameters with types and descriptions
              // - Examples with code snippets
              // - Custom tags and metadata

        custom-tags:
          method-documentation: 'Complete method JSDoc generation'
          block-combination: 'Multiple block aggregation and formatting'
          comprehensive: 'Full method documentation generation'

      getJSDocTagName:
        description: 'Map metadata keys to JSDoc tags'
        business-context: 'Internal utility that maps Enhanced Metadata System property names to corresponding JSDoc tag names with proper formatting'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Enhanced Metadata System property key'

        returns:
          type: 'string'
          description: 'Corresponding JSDoc tag name'

        examples:
          - id: 'tag-mapping'
            code: |
              // Internal method - maps metadata to JSDoc tags
              // "businessContext" -> "@businessContext"
              // "customTag" -> "@custom-tag"
              // Ensures proper JSDoc tag formatting

        custom-tags:
          private: true
          tag-mapping: 'Metadata key to JSDoc tag conversion'
          name-formatting: 'JSDoc tag name standardization'
          internal-utility: 'Internal adapter utility method'

      generateJSDocComment:
        description: 'Generate complete JSDoc comment'
        business-context: 'Main generation method that produces complete JSDoc comment blocks with proper formatting and indentation for TypeScript declaration files'

        parameters:
          - name: 'blocks'
            type: 'ExtractBlock[]'
            description: 'Array of extract blocks to include in JSDoc comment'
          - name: 'indent'
            type: 'string'
            description: 'Optional indentation string for proper code formatting'

        returns:
          type: 'string'
          description: 'Complete JSDoc comment block with proper formatting'

        examples:
          - id: 'complete-jsdoc'
            code: |
              const jsdocComment = adapter.generateJSDocComment(
                extractBlocks,
                '    ' // 4-space indentation
              );
              // Returns properly formatted JSDoc comment block
          - id: 'typescript-integration'
            code: |
              // Generated JSDoc ready for TypeScript files:
              /**
               * Method description
               * @businessContext Business context explanation
               * @param param Parameter description
               * @returns Return value description
               * @example
               * ```typescript
               * const result = method(param);
               * ```
               */

        custom-tags:
          main-method: 'Primary JSDoc generation interface'
          complete-generation: 'Full JSDoc comment block creation'
          typescript-ready: 'Optimized for TypeScript declaration files'
          formatting: 'Proper indentation and structure'