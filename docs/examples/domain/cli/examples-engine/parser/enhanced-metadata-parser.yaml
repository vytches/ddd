# Enhanced Metadata Parser - Advanced Metadata Processing System

# === FILE METADATA ===
file-name: 'enhanced-metadata-parser'
title: 'EnhancedMetadataParser - Hierarchical Metadata Resolution Engine'
description: 'Advanced metadata parser with dot notation and hierarchical resolution for Enhanced Metadata System V2'
business-context: 'Core component of Enhanced Metadata System V2 for processing YAML metadata with format-specific overrides'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  EnhancedMetadataParser:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Advanced metadata parser with hierarchical resolution and format-specific overrides'
      business-context: 'Central parser for Enhanced Metadata System V2 enabling dot notation, format overrides, and hierarchical configuration inheritance'

      # Format-specific
      formats:
        jsdoc:
          description: 'Metadata parser with hierarchical resolution'
        cli:
          description: |
            ## EnhancedMetadataParser
            Advanced metadata parsing engine with hierarchical resolution and format-specific overrides

      custom-tags:
        since: '1.0.0'
        pattern: 'Parser Pattern'
        category: 'Metadata Processing'
        features: 'Dot notation support, hierarchical resolution, format-specific overrides, configuration inheritance'
        performance: 'Optimized parsing with caching and efficient resolution strategies'

    # Methods
    methods:
      constructor:
        description: 'Create new EnhancedMetadataParser instance with optional format rules'
        business-context: 'Initialize parser with format-specific rules for JSDoc and CLI output customization'

        parameters:
          - name: 'formatRules'
            type: 'FormatRules'
            description: 'Optional. Optional format-specific transformation rules'

        examples:
          - id: 'default-parser'
            code: |
              const parser = new EnhancedMetadataParser();
              // Uses default format rules
          - id: 'custom-rules'
            code: |
              const parser = new EnhancedMetadataParser({
                jsdoc: { maxLineLength: 80 },
                cli: { markdown: true }
              });

        custom-tags:
          initialization: 'Sets up format rules and parsing configuration'

      parseMetadata:
        description: 'Parse metadata with dot notation support'
        business-context: 'Main parsing method that processes YAML metadata with dot notation for format-specific overrides'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'YAML metadata content to parse'

        returns:
          type: 'ParsedMetadata'
          description: 'Parsed metadata object with dot notation resolved'

        examples:
          - id: 'basic-parsing'
            code: |
              const metadata = parser.parseMetadata(`
                description: Base description
                description.jsdoc: JSDoc-specific description
                business-context: Business use case
              `);
          - id: 'complex-parsing'
            code: |
              const metadata = parser.parseMetadata(`
                description: Base description
                description.jsdoc: Concise JSDoc description
                description.cli: |
                  ## Extended CLI Description
                  With markdown formatting
                custom-tags:
                  warning.jsdoc: JSDoc-only warning
              `);

        custom-tags:
          main-method: 'Primary parsing interface'
          dot-notation: 'Supports format-specific overrides via dot notation'
          yaml-processing: 'Processes YAML metadata content'

      parseGlobalSettings:
        description: 'Parse global settings block'
        business-context: 'Extract global configuration settings from Enhanced Metadata System V2 global configuration'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Content containing global settings blocks'

        returns:
          type: 'GlobalSettings[]'
          description: 'Array of parsed global settings configurations'

        examples:
          - id: 'global-parsing'
            code: |
              const settings = parser.parseGlobalSettings(`
                @global-settings
                @strategy: merge
                @description: Global description
                @author: DDD Team
                @global-settings-end
              `);

        custom-tags:
          configuration: 'Handles global configuration parsing'
          blocks: 'Processes @global-settings blocks'

      resolveMetadata:
        description: 'Resolve metadata for specific format with hierarchy'
        business-context: 'Core resolution engine that combines global, package, and local metadata with format-specific overrides'

        parameters:
          - name: 'configs'
            type: 'ConfigLevel[]'
            description: 'Array of configuration levels (global, package, local)'
          - name: 'localMetadata'
            type: 'ParsedMetadata'
            description: 'Local metadata to merge with hierarchy'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target format for resolution'
          - name: 'scope'
            type: 'string'
            description: 'Optional. Optional scope for resolution context'

        returns:
          type: 'ResolvedMetadata'
          description: 'Final resolved metadata for the specified format'

        examples:
          - id: 'hierarchical-resolution'
            code: |
              const resolved = parser.resolveMetadata(
                [globalConfig, packageConfig],
                localMetadata,
                'jsdoc'
              );
          - id: 'scoped-resolution'
            code: |
              const resolved = parser.resolveMetadata(
                configs,
                localMetadata,
                'cli',
                'method-scope'
              );

        custom-tags:
          hierarchical: 'Implements hierarchical metadata inheritance'
          format-specific: 'Resolves format-specific overrides'
          core-engine: 'Central resolution mechanism'

      mergeMetadata:
        description: 'Merge two metadata objects'
        business-context: 'Internal method for combining metadata configurations with strategy-aware merging'

        parameters:
          - name: 'target'
            type: 'ParsedMetadata'
            description: 'Target metadata object to merge into'
          - name: 'source'
            type: 'ParsedMetadata'
            description: 'Source metadata object to merge from'
          - name: 'strategy'
            type: 'string'
            description: 'Merge strategy (merge, replace, append)'

        returns:
          type: 'ParsedMetadata'
          description: 'Merged metadata object'

        examples:
          - id: 'merge-strategy'
            code: |
              // Internal method - merges configurations
              // Uses strategy-aware combining (merge/replace/append)

        custom-tags:
          private: true
          strategy-aware: 'Respects merge strategies'
          combination: 'Combines metadata objects intelligently'

      resolveForFormat:
        description: 'Resolve metadata for specific format'
        business-context: 'Internal method for applying format-specific transformations and overrides'

        parameters:
          - name: 'metadata'
            type: 'ParsedMetadata'
            description: 'Metadata to resolve for format'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target output format'

        returns:
          type: 'ResolvedMetadata'
          description: 'Format-specific resolved metadata'

        examples:
          - id: 'format-resolution'
            code: |
              // Internal method - applies format transformations
              // Handles JSDoc vs CLI-specific formatting

        custom-tags:
          private: true
          format-transformation: 'Applies format-specific rules'
          output-optimization: 'Optimizes for target format'

      isAlreadyFormatted:
        description: 'Check if value is already formatted for the target format'
        business-context: 'Internal utility to prevent double-formatting of metadata values'

        parameters:
          - name: 'value'
            type: 'string'
            description: 'Value to check for existing formatting'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target format to check against'

        returns:
          type: 'boolean'
          description: 'True if value is already formatted for target format'

        examples:
          - id: 'format-check'
            code: |
              // Internal method - prevents double formatting
              // Detects existing format-specific content

        custom-tags:
          private: true
          validation: 'Prevents duplicate formatting'
          utility: 'Internal format detection'

      applyFormatRule:
        description: 'Apply format rules to content'
        business-context: 'Apply format-specific transformation rules to metadata content for JSDoc or CLI output'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to apply rules to'
          - name: 'content'
            type: 'string'
            description: 'Content to transform'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target format for transformation'

        returns:
          type: 'string'
          description: 'Transformed content according to format rules'

        examples:
          - id: 'rule-application'
            code: |
              const transformed = parser.applyFormatRule(
                'description',
                'Base description',
                'jsdoc'
              );
          - id: 'cli-formatting'
            code: |
              const cliFormatted = parser.applyFormatRule(
                'description',
                'Base description',
                'cli'
              );

        custom-tags:
          transformation: 'Applies format-specific transformations'
          rules-engine: 'Uses configurable formatting rules'
          public-utility: 'Available for external format application'