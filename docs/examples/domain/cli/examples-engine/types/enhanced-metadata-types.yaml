# Enhanced Metadata Types - Core Type Definitions for Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'enhanced-metadata-types'
title: 'Enhanced Metadata Types - Core Type System'
description: 'Comprehensive type definitions for Enhanced Metadata System V2 with hierarchical metadata processing'
business-context: 'Foundation type system that defines all interfaces and types for Enhanced Metadata System V2, enabling hierarchical metadata resolution, format-specific overrides, and structured documentation generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  MetadataValue:
    description: 'Format-specific metadata value container supporting dot notation overrides'
    business-context: 'Core value container that stores metadata with format-specific overrides using dot notation (e.g., description.jsdoc, description.cli) for Enhanced Metadata System V2'

    properties:
      - name: 'default'
        type: 'string'
        description: 'Default metadata value used when no format-specific override exists'
        business-context: 'Base value that applies to all formats unless overridden by format-specific values'

      - name: 'jsdoc'
        type: 'string'
        description: 'JSDoc-specific metadata value override for TypeScript documentation'
        business-context: 'Specialized value optimized for JSDoc documentation generation with concise descriptions and proper formatting'

      - name: 'cli'
        type: 'string'
        description: 'CLI-specific metadata value override for command-line interface documentation'
        business-context: 'Enhanced value for CLI documentation with extended descriptions, markdown formatting, and interactive examples'

    examples:
      - id: 'format-overrides'
        code: |
          const metadata: MetadataValue = {
            default: "Base description for all formats",
            jsdoc: "Concise JSDoc description", 
            cli: "## Extended CLI Description\nWith markdown formatting"
          };
      - id: 'dynamic-formats'
        code: |
          // Support for dynamic format keys
          const dynamicMetadata: MetadataValue = {
            default: "Base value",
            [format]: "Format-specific value",
            pdf: "PDF documentation value"
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Value Object Pattern'
      category: 'Enhanced Metadata System'
      features: 'Format-specific overrides, dot notation support, dynamic format keys'
      core-type: 'Foundation metadata value container'

  ParsedMetadata:
    description: 'Parsed metadata structure with keyed metadata values'
    business-context: 'Complete metadata structure after YAML parsing containing all metadata keys with their format-specific values for hierarchical resolution'

    examples:
      - id: 'parsed-structure'
        code: |
          const parsed: ParsedMetadata = {
            description: {
              default: "Method description",
              jsdoc: "Concise JSDoc version",
              cli: "Extended CLI description"
            },
            businessContext: {
              default: "Business use case explanation"
            },
            since: {
              default: "1.0.0"
            }
          };
      - id: 'nested-metadata'
        code: |
          // Complex metadata with multiple overrides
          const complexParsed: ParsedMetadata = {
            "custom-tags.warning": {
              jsdoc: "Important JSDoc warning",
              cli: "## CLI Warning\nDetailed warning for CLI users"
            }
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Dictionary Pattern'
      category: 'Enhanced Metadata System'
      features: 'Key-value metadata storage, format resolution support'
      structure: 'Post-parsing metadata representation'

  ConfigLevel:
    description: 'Hierarchical configuration level with resolution strategy'
    business-context: 'Represents single level in metadata hierarchy (global, package, class, method) with strategy configuration for inheritance resolution'

    properties:
      - name: 'source'
        type: "'library' | 'package' | 'file' | 'local'"
        description: 'Source level in metadata hierarchy'
        business-context: 'Identifies hierarchy level: library (global), package, file (class), local (method) for resolution precedence'

      - name: 'strategy'
        type: "'merge' | 'replace'"
        description: 'Resolution strategy for this configuration level'
        business-context: 'Defines how this level interacts with lower levels: merge combines, replace overrides completely'

      - name: 'scope'
        type: 'string'
        description: 'Optional scope identifier for context-specific resolution'
        business-context: 'Namespace for scoped metadata resolution enabling context-aware inheritance patterns'

      - name: 'metadata'
        type: 'ParsedMetadata'
        description: 'Parsed metadata for this configuration level'
        business-context: 'Complete metadata structure for this hierarchy level ready for resolution processing'

    examples:
      - id: 'config-level'
        code: |
          const globalLevel: ConfigLevel = {
            source: 'library',
            strategy: 'merge',
            scope: 'global',
            metadata: {
              author: { default: "VytchesDDD Team" },
              since: { default: "1.0.0" }
            }
          };
      - id: 'method-level'
        code: |
          const methodLevel: ConfigLevel = {
            source: 'local',
            strategy: 'replace',
            metadata: {
              description: {
                default: "Method-specific description",
                jsdoc: "Concise method description"
              }
            }
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Configuration Pattern'
      category: 'Enhanced Metadata System'
      features: 'Hierarchical levels, resolution strategies, scope isolation'
      hierarchy: 'Single level in metadata inheritance chain'

  ResolvedMetadata:
    description: 'Fully resolved metadata after hierarchical processing'
    business-context: 'Final metadata structure after applying hierarchical resolution strategies with format-specific values resolved for target output'

    examples:
      - id: 'resolved-jsdoc'
        code: |
          // Resolved for JSDoc format
          const resolvedJSDoc: ResolvedMetadata = {
            description: "Concise method description",
            businessContext: "Business use case", 
            author: "VytchesDDD Team",
            since: "1.0.0"
          };
      - id: 'resolved-cli'
        code: |
          // Resolved for CLI format  
          const resolvedCLI: ResolvedMetadata = {
            description: "## Method Description\nExtended CLI description",
            businessContext: "Business use case",
            author: "VytchesDDD Team"
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Result Pattern'
      category: 'Enhanced Metadata System'
      features: 'Format-resolved values, hierarchical inheritance, final output structure'
      resolution: 'Post-resolution metadata for specific format'

  ExtractBlock:
    description: 'Extracted code block with metadata for documentation generation'
    business-context: 'Represents extracted code example with complete metadata context for Enhanced Metadata System documentation generation'

    properties:
      - name: 'tag'
        type: 'string'
        description: 'Block identifier tag for categorization'
        business-context: 'Unique identifier for organizing and referencing extracted code blocks'

      - name: 'target'
        type: 'string'
        description: 'Target method or component name'
        business-context: 'Specifies which method, class, or component this block documents'

      - name: 'context'
        type: 'string'
        description: 'Domain or business context identifier'
        business-context: 'Business domain context (e.g., domain, advanced, enterprise) for proper categorization'

      - name: 'level'
        type: 'string'
        description: 'Complexity or detail level identifier'
        business-context: 'Complexity level (beginner, intermediate, advanced) for appropriate audience targeting'

      - name: 'variant'
        type: 'string'
        description: 'Optional block variant for different scenarios'
        business-context: 'Enables multiple examples for same method with different use cases or patterns'

      - name: 'metadata'
        type: 'ResolvedMetadata'
        description: 'Resolved metadata for this code block'
        business-context: 'Complete resolved metadata providing context, descriptions, and formatting for documentation generation'

      - name: 'code'
        type: 'string'
        description: 'Extracted code content'
        business-context: 'Actual TypeScript code example demonstrating library usage patterns'

      - name: 'startLine'
        type: 'number'
        description: 'Starting line number in source'
        business-context: 'Source location tracking for maintenance and debugging'

      - name: 'endLine'
        type: 'number'
        description: 'Ending line number in source'
        business-context: 'Source location tracking for complete block identification'

    examples:
      - id: 'extract-block'
        code: |
          const block: ExtractBlock = {
            tag: "basic-usage",
            target: "createUser",
            context: "domain",
            level: "intermediate",
            variant: "validation",
            metadata: {
              description: "Create user with validation",
              businessContext: "User management workflow"
            },
            code: "const user = await userService.createUser(data);",
            startLine: 15,
            endLine: 17
          };
      - id: 'complex-block'
        code: |
          // Advanced example with comprehensive metadata
          const advancedBlock: ExtractBlock = {
            tag: "error-handling",
            target: "processPayment", 
            context: "enterprise",
            level: "advanced",
            metadata: {
              description: "Payment processing with comprehensive error handling",
              warning: "Requires proper transaction management"
            },
            code: `try {
              const result = await paymentService.process(payment);
              return result;
            } catch (error) {
              await compensationService.rollback(payment);
              throw error;
            }`,
            startLine: 45,
            endLine: 52
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Extract Pattern'
      category: 'Enhanced Metadata System'
      features: 'Code extraction, metadata association, source tracking'
      documentation: 'Code block representation for documentation generation'

  GlobalSettings:
    description: 'Global configuration settings for Enhanced Metadata System'
    business-context: 'Top-level configuration that provides default settings and strategies for entire Enhanced Metadata System hierarchy'

    properties:
      - name: 'strategy'
        type: "'merge' | 'replace'"
        description: 'Default resolution strategy for hierarchy'
        business-context: 'Global default strategy applied when lower levels do not specify their own resolution approach'

      - name: 'metadata'
        type: 'ParsedMetadata'
        description: 'Global metadata defaults'
        business-context: 'Foundation metadata inherited by all lower levels unless overridden, providing consistent base values'

      - name: 'scope'
        type: 'string'
        description: 'Optional global scope identifier'
        business-context: 'Global namespace for organization-wide metadata consistency and branding'

    examples:
      - id: 'global-settings'
        code: |
          const global: GlobalSettings = {
            strategy: 'merge',
            scope: 'vytches-ddd',
            metadata: {
              author: { default: "VytchesDDD Team" },
              license: { default: "MIT" },
              since: { default: "1.0.0" },
              organization: { default: "Vytches" }
            }
          };
      - id: 'minimal-global'
        code: |
          // Minimal global configuration
          const minimal: GlobalSettings = {
            strategy: 'merge',
            metadata: {
              author: { default: "Development Team" }
            }
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Configuration Pattern'
      category: 'Enhanced Metadata System'
      features: 'Global defaults, hierarchy foundation, organization branding'
      hierarchy: 'Top-level metadata configuration'

  FormatRules:
    description: 'Format-specific transformation rules for metadata processing'
    business-context: 'Configurable transformation rules that modify metadata content based on target output format for optimal documentation quality'

    examples:
      - id: 'format-rules'
        code: |
          const rules: FormatRules = {
            jsdoc: {
              description: (content) => content.length > 80 ? 
                content.substring(0, 77) + "..." : content,
              businessContext: (content) => `Business: ${content}`
            },
            cli: {
              description: (content) => `## ${content}\n\nDetailed description...`,
              warning: (content) => `⚠️ **Warning:** ${content}`
            }
          };
      - id: 'transformation-rules'
        code: |
          // Advanced transformation with formatting
          const advancedRules: FormatRules = {
            pdf: {
              description: (content) => content.replace(/`([^`]+)`/g, '\\texttt{$1}'),
              example: (content) => `\\begin{lstlisting}\n${content}\n\\end{lstlisting}`
            },
            html: {
              description: (content) => content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'),
              code: (content) => `<pre><code>${content}</code></pre>`
            }
          };

    custom-tags:
      since: '1.0.0'
      pattern: 'Transform Pattern'
      category: 'Enhanced Metadata System'
      features: 'Format-specific transformations, content optimization, rule-based processing'
      transformation: 'Metadata content transformation engine'
