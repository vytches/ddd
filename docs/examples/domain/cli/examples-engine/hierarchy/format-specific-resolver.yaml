# Format Specific Resolver - Enhanced Metadata System Format Resolution

# === FILE METADATA ===
file-name: 'format-specific-resolver'
title: 'FormatSpecificResolver - Format-Aware Metadata Resolution'
description: 'Advanced metadata resolver for Enhanced Metadata System V2 with format-specific output optimization'
business-context: 'Critical component of Enhanced Metadata System that resolves hierarchical metadata and formats it appropriately for different output targets (JSDoc, CLI)'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  FormatSpecificResolver:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Advanced format-aware metadata resolution system'
      business-context: 'Core component of Enhanced Metadata System V2 that transforms hierarchical metadata into format-specific output for JSDoc generation and CLI display'

      # Format-specific
      formats:
        jsdoc:
          description: 'Format-specific metadata resolver for Enhanced Metadata System V2'
        cli:
          description: |
            ## FormatSpecificResolver
            Enhanced Metadata System V2 format resolution engine with hierarchical processing and output optimization

      custom-tags:
        since: '1.0.0'
        pattern: 'Resolver Pattern'
        category: 'Enhanced Metadata System'
        features: 'Format-specific resolution, hierarchical metadata processing, JSDoc generation, CLI formatting'
        metadata-system: 'Enhanced Metadata System V2 core component'

    # Methods
    methods:
      resolveForFormat:
        description: 'Resolve metadata for specific output format (jsdoc vs cli)'
        business-context: 'Main resolution method that processes hierarchical metadata and applies format-specific transformations for optimal output quality'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Hierarchical metadata structure to resolve'
          - name: 'format'
            type: "'jsdoc' | 'cli'"
            description: 'Target output format for resolution'

        returns:
          type: 'ResolvedMetadata'
          description: 'Format-optimized metadata structure'

        examples:
          - id: 'jsdoc-resolution'
            code: |
              const jsdocMetadata = FormatSpecificResolver.resolveForFormat(
                hierarchicalMetadata,
                'jsdoc'
              );
              // Returns JSDoc-optimized metadata with concise descriptions
          - id: 'cli-resolution'
            code: |
              const cliMetadata = FormatSpecificResolver.resolveForFormat(
                hierarchicalMetadata,
                'cli'
              );
              // Returns CLI-optimized metadata with enhanced formatting

        custom-tags:
          static: true
          main-method: 'Primary format resolution interface'
          format-aware: 'Applies format-specific transformations'
          hierarchical: 'Processes hierarchical metadata structures'

      enhanceForCLI:
        description: 'Enhance text for CLI display (convert \\n to actual newlines)'
        business-context: 'Internal utility for converting escaped newlines to actual newlines for improved CLI readability'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text content with escaped newlines'

        returns:
          type: 'string'
          description: 'Enhanced text with actual newlines for CLI display'

        examples:
          - id: 'newline-enhancement'
            code: |
              // Internal method - enhances CLI text formatting
              // "Line 1\\nLine 2" -> "Line 1\nLine 2"
              // Improves CLI readability and formatting

        custom-tags:
          private: true
          static: true
          cli-formatting: 'CLI display enhancement and text processing'
          text-processing: 'Newline conversion and formatting optimization'

      formatAsJSDoc:
        description: 'Format metadata as JSDoc comment'
        business-context: 'Transforms resolved metadata into properly formatted JSDoc comments with all required tags and documentation'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata to format as JSDoc'

        returns:
          type: 'string'
          description: 'Complete JSDoc comment block'

        examples:
          - id: 'jsdoc-formatting'
            code: |
              const jsdocComment = FormatSpecificResolver.formatAsJSDoc(metadata);
              // Returns complete JSDoc with @businessContext, @param, @returns, etc.
          - id: 'metadata-to-jsdoc'
            code: |
              // Transforms hierarchical metadata into JSDoc format
              // Includes all custom tags, examples, and business context
              // Optimized for TypeScript declaration files

        custom-tags:
          static: true
          jsdoc-generation: 'JSDoc comment generation and formatting'
          metadata-transformation: 'Converts metadata to JSDoc format'
          ast-integration: 'Integrates with TypeScript AST processing'

      formatCustomTag:
        description: 'Format custom tag name from key'
        business-context: 'Internal utility for converting metadata keys to properly formatted JSDoc tags with kebab-case conversion'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to format as JSDoc tag'

        returns:
          type: 'string'
          description: 'Formatted JSDoc tag name'

        examples:
          - id: 'tag-formatting'
            code: |
              // Internal method - formats JSDoc tags
              // "complexityNote" -> "@complexity-note"
              // "documentationUrl" -> "@documentation-url"
              // Ensures consistent JSDoc tag formatting

        custom-tags:
          private: true
          static: true
          tag-formatting: 'JSDoc tag name formatting and case conversion'
          kebab-case: 'Converts camelCase to kebab-case for JSDoc tags'

      formatForCLI:
        description: 'Format metadata for CLI display'
        business-context: 'Transforms resolved metadata into human-readable CLI output with enhanced formatting and visual structure'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata to format for CLI display'

        returns:
          type: 'string'
          description: 'Formatted CLI display output'

        examples:
          - id: 'cli-formatting'
            code: |
              const cliOutput = FormatSpecificResolver.formatForCLI(metadata);
              // Returns formatted CLI display with headers, descriptions, examples
          - id: 'cli-display'
            code: |
              // Enhanced CLI formatting with:
              // - Structured headers and sections
              // - Code syntax highlighting
              // - Business context explanations

        custom-tags:
          static: true
          cli-formatting: 'CLI display formatting and visual structure'
          user-interface: 'Human-readable output generation'
          enhanced-display: 'Rich CLI formatting with structured presentation'
