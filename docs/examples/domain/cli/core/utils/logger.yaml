# Logger - CLI Logging Utility

# === FILE METADATA ===
file-name: 'logger'
title: 'Logger - CLI Logging Utility'
description: 'Simple structured logging utility for CLI operations with multiple log levels'
business-context: 'Core CLI logging utility that provides structured console output with different log levels for debugging, information, warnings, errors, and success messages'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CONSTANTS ===
constants:
  logger:
    description: 'CLI logging utility object with multiple log levels'
    business-context: 'Core logging utility that provides structured console output for CLI operations with different log levels and message formatting'

    custom-tags:
      since: '1.0.0'
      pattern: 'Logger Utility Pattern'
      category: 'CLI Utilities'
      features: 'Multiple log levels, structured output, console formatting, debug support'
      console-utility: 'Provides structured console output for CLI operations'

    properties:
      debug:
        description: 'Debug level logging function for development and troubleshooting'
        business-context: 'Outputs debug-level messages for development and troubleshooting purposes'

      info:
        description: 'Information level logging function for general operation status'
        business-context: 'Outputs informational messages for general CLI operation status and progress updates'

      warn:
        description: 'Warning level logging function for non-critical issues'
        business-context: 'Outputs warning messages for non-critical issues that users should be aware of but do not prevent operation'

      error:
        description: 'Error level logging function for critical failures'
        business-context: 'Outputs error messages for critical issues that prevent operation or cause failures'

      success:
        description: 'Success level logging function for operation completion'
        business-context: 'Outputs success messages for completed operations and positive confirmations'
