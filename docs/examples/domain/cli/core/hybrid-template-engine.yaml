      render:
        description: 'Render template with data using Handlebars engine'
        business-context: 'Main template rendering method with intelligent caching and content loading'

        parameters:
          - name: 'layout'
            type: 'string'
            description: 'Template layout name or path to render'
          - name: 'data'
            type: 'Record<string, unknown>'
            description: 'Template data object with variables for rendering'

        returns:
          type: 'Promise<string>'
          description: 'Promise resolving to rendered template content'

        examples:
          - id: 'basic-render'
            code: |
              const engine = new HybridTemplateEngine();
              const output = await engine.render('component', {
                className: 'UserService',
                methods: ['create', 'update', 'delete']
              });
          - id: 'complex-data'
            code: |
              const output = await engine.render('entity-template', {
                entityName: 'User',
                properties: [
                  { name: 'id', type: 'EntityId' },
                  { name: 'email', type: 'string' }
                ],
                framework: 'nestjs'
              });

