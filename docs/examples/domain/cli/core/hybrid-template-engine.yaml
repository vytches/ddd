      clearCache:
        description: 'Clear all template and content caches'
        business-context: 'Cache management for forcing fresh template loading and development workflow'

        returns:
          type: 'void'
          description: 'No return value, all caches are cleared'

        examples:
          - id: 'cache-clear'
            code: |
              const engine = new HybridTemplateEngine();
              engine.clearCache();
              // Next render() calls will reload templates from disk
          - id: 'development-workflow'
            code: |
              // During development, clear cache to see template changes
              engine.clearCache();
              const freshOutput = await engine.render('component', data);

