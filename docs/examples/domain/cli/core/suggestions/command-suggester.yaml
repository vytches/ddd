# Command Suggester - Intelligent CLI Command Recommendations

# === FILE METADATA ===
file-name: 'command-suggester'
title: 'CommandSuggester - Smart CLI Command Recommendations'
description: 'Intelligent command suggestion system for CLI workflow optimization'
business-context: 'AI-powered command recommendation engine that analyzes project state and suggests contextually relevant CLI commands'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  CommandSuggestion:
    description: 'Command suggestion interface for CLI recommendations'
    business-context: 'Structured representation of intelligent command suggestions with priority, categorization, and confidence scoring'

    properties:
      - name: 'command'
        type: 'string'
        description: 'Suggested command string ready for execution'
      - name: 'description'
        type: 'string'
        description: 'Human-readable description of command purpose and benefits'
      - name: 'reason'
        type: 'string'
        description: 'Detailed explanation of why this command is suggested based on analysis'
      - name: 'priority'
        type: "'high' | 'medium' | 'low'"
        description: 'Suggestion priority level based on project impact and urgency'
      - name: 'category'
        type: "'next-step' | 'improvement' | 'fix' | 'enhancement'"
        description: 'Categorization of suggestion type for workflow organization'
      - name: 'confidence'
        type: 'number'
        description: 'Confidence score for suggestion accuracy and relevance (0-1)'

    custom-tags:
      priority-based: 'Supports intelligent priority-based suggestion ordering'
      categorized: 'Organized by workflow type and purpose'
      confidence-scoring: 'Includes ML-based accuracy confidence metrics'

# === CLASSES ===
classes:
  CommandSuggester:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Intelligent command suggestion system with project state analysis'
      business-context: 'AI-powered recommendation engine that analyzes project structure, dependencies, patterns, and development workflow to suggest contextually relevant CLI commands'

      # Format-specific
      formats:
        jsdoc:
          description: 'Smart CLI command suggestion engine'
        cli:
          description: |
            ## CommandSuggester
            Intelligent CLI recommendation system with project analysis and workflow optimization

      custom-tags:
        since: '1.0.0'
        pattern: 'Recommendation Engine Pattern'
        category: 'CLI Intelligence'
        features: 'Project analysis, intelligent suggestions, workflow optimization, contextual recommendations'
        ai-powered: 'Machine learning-based suggestion algorithms'

    # Methods
    methods:
      constructor:
        description: 'Create new CommandSuggester instance'
        business-context: 'Initialize suggestion engine with recommendation rules and prompt engine for intelligent command analysis'

        examples:
          - id: 'basic-constructor'
            code: |
              const suggester = new CommandSuggester();
              // Ready for intelligent command suggestions

        custom-tags:
          initialization: 'Sets up suggestion rules and analysis engine'
          ai-engine: 'Configures intelligent recommendation algorithms'

      create:
        description: 'Factory method to create suggester'
        business-context: 'Static factory for creating configured CommandSuggester instance with optimal recommendation settings'

        returns:
          type: 'CommandSuggester'
          description: 'New configured command suggester instance'

        examples:
          - id: 'factory-creation'
            code: |
              const suggester = CommandSuggester.create();
              // Optimally configured for intelligent suggestions
          - id: 'workflow-integration'
            code: |
              const suggester = CommandSuggester.create();
              const suggestions = await suggester.getSuggestions();

        custom-tags:
          static: true
          factory: true
          optimal-config: 'Pre-configured with best recommendation settings'

      getSuggestions:
        description: 'Get smart command suggestions based on project state'
        business-context: 'Main recommendation method that analyzes project structure, dependencies, and workflow to generate contextually relevant command suggestions'

        parameters:
          - name: 'projectPath'
            type: 'string'
            description: 'Optional. Project path to analyze for suggestions'

        returns:
          type: 'Promise<CommandSuggestionType[]>'
          description: 'Promise resolving to array of prioritized command suggestions'

        examples:
          - id: 'project-suggestions'
            code: |
              const suggestions = await suggester.getSuggestions('./my-project');
              suggestions.forEach(s => console.log(s.command, s.reason));
          - id: 'current-directory'
            code: |
              const suggestions = await suggester.getSuggestions();
              // Analyzes current directory for suggestions
          - id: 'workflow-optimization'
            code: |
              const suggestions = await suggester.getSuggestions(projectPath);
              const highPriority = suggestions.filter(s => s.priority === 'high');

        custom-tags:
          async: true
          main-method: 'Primary recommendation interface'
          intelligent: 'AI-powered project state analysis'
          contextual: 'Project-aware suggestion generation'

      displaySuggestions:
        description: 'Display suggestions to user'
        business-context: 'User interface method for presenting command suggestions in formatted, actionable output with priorities and reasoning'

        parameters:
          - name: 'suggestions'
            type: 'CommandSuggestionType[]'
            description: 'Array of command suggestions to display'

        returns:
          type: 'void'
          description: 'No return value, outputs formatted suggestions to console'

        examples:
          - id: 'suggestion-display'
            code: |
              const suggestions = await suggester.getSuggestions();
              suggester.displaySuggestions(suggestions);
              // Formatted output with priorities and reasoning
          - id: 'filtered-display'
            code: |
              const highPriority = suggestions.filter(s => s.priority === 'high');
              suggester.displaySuggestions(highPriority);

        custom-tags:
          synchronous: true
          ui: 'User interface for suggestion presentation'
          formatting: 'Structured console output with colors and priorities'

      setupSuggestionRules:
        description: 'Setup suggestion rules'
        business-context: 'Internal method for configuring recommendation algorithms, pattern matching rules, and contextual analysis logic'

        returns:
          type: 'void'
          description: 'No return value, configures internal suggestion rules'

        examples:
          - id: 'rules-setup'
            code: |
              // Internal method - configures recommendation rules
              // Project pattern recognition, workflow analysis
              // Command prioritization algorithms

        custom-tags:
          private: true
          initialization: 'Configures intelligent recommendation rules'
          ai-configuration: 'Sets up pattern recognition and scoring algorithms'

      generateContextSuggestions:
        description: 'Generate context-specific suggestions'
        business-context: 'Internal method for creating intelligent suggestions based on project analysis, current state, and development workflow patterns'

        parameters:
          - name: 'projectPath'
            type: 'string'
            description: 'Project path for contextual analysis'

        returns:
          type: 'Promise<CommandSuggestionType[]>'
          description: 'Promise resolving to context-aware suggestions'

        examples:
          - id: 'context-analysis'
            code: |
              // Internal method - generates contextual suggestions
              // Analyzes project structure, dependencies, patterns
              // Suggests next logical workflow steps

        custom-tags:
          private: true
          async: true
          contextual: 'Project-aware suggestion generation'
          intelligent: 'Advanced pattern recognition and analysis'

      prioritizeSuggestions:
        description: 'Prioritize suggestions'
        business-context: 'Internal algorithm for scoring and ranking command suggestions based on project impact, urgency, and workflow relevance'

        parameters:
          - name: 'suggestions'
            type: 'CommandSuggestionType[]'
            description: 'Raw suggestions to prioritize and rank'

        returns:
          type: 'CommandSuggestionType[]'
          description: 'Prioritized and ranked suggestion array'

        examples:
          - id: 'prioritization'
            code: |
              // Internal method - intelligent suggestion ranking
              // Impact analysis, urgency scoring, workflow relevance
              // ML-based prioritization algorithms

        custom-tags:
          private: true
          algorithmic: 'Advanced scoring and ranking algorithms'
          ai-powered: 'Machine learning-based prioritization'
          optimization: 'Workflow optimization through intelligent ranking'

      categorizeSuggestions:
        description: 'Categorize suggestions'
        business-context: 'Internal method for classifying command suggestions into workflow categories for better organization and user experience'

        parameters:
          - name: 'suggestions'
            type: 'CommandSuggestionType[]'
            description: 'Suggestions to categorize by type and purpose'

        returns:
          type: 'CommandSuggestionType[]'
          description: 'Categorized suggestion array'

        examples:
          - id: 'categorization'
            code: |
