          workflow-aware: 'Categories based on development workflow patterns'

      displaySuggestion:
        description: 'Display single suggestion'
        business-context: 'Internal utility for formatting and displaying individual command suggestions with consistent styling and information'

        parameters:
          - name: 'suggestion'
            type: 'CommandSuggestionType'
            description: 'Single suggestion to format and display'

        returns:
          type: 'void'
          description: 'No return value, outputs formatted suggestion'

        examples:
          - id: 'single-display'
            code: |
              // Internal method - formats individual suggestions
              // Consistent styling, priority indicators, reasoning
              // Color-coded output based on category and priority

        custom-tags:
          private: true
          formatting: 'Individual suggestion formatting and styling'
          ui: 'Consistent user interface for suggestion display'

      getQuickSuggestion:
        description: 'Get quick suggestion for current directory'
        business-context: 'Fast recommendation method for immediate workflow suggestions based on current directory analysis'

        returns:
          type: 'Promise<CommandSuggestionType | null>'
          description: 'Promise resolving to quick suggestion or null if none available'

        examples:
          - id: 'quick-suggestion'
            code: |
              const quickSuggestion = await suggester.getQuickSuggestion();
              if (quickSuggestion) {
                console.log('Quick tip:', quickSuggestion.command);
              }
          - id: 'workflow-hint'
            code: |
              // Get immediate workflow hint
              const hint = await suggester.getQuickSuggestion();
              // Fast analysis for immediate productivity improvement

        custom-tags:
          async: true
          fast: 'Optimized for quick analysis and immediate suggestions'
          nullable: 'Returns null when no immediate suggestions available'
          productivity: 'Designed for immediate workflow improvement'

      needsInitialization:
        description: 'Check if project needs initialization'
        business-context: 'Analysis method for determining if project requires setup or initialization commands for DDD library usage'

        parameters:
          - name: 'projectPath'
            type: 'string'
            description: 'Optional. Project path to analyze for initialization needs'

        returns:
          type: 'Promise<boolean>'
          description: 'Promise resolving to true if initialization is needed'

        examples:
          - id: 'initialization-check'
            code: |
              const needsInit = await suggester.needsInitialization('./project');
              if (needsInit) {
                console.log('Project needs DDD setup');
              }
          - id: 'setup-analysis'
            code: |
              // Check if project is ready for DDD patterns
              const needsSetup = await suggester.needsInitialization();
              // Returns true for new or unconfigured projects

        custom-tags:
          async: true
          analysis: 'Project readiness and setup analysis'
          initialization: 'DDD library setup detection'
          boolean-return: 'Simple true/false initialization status'
