# Component Validator - CLI Component Generation Validation

# === FILE METADATA ===
file-name: 'component-validator'
title: 'ComponentValidator - Intelligent Component Generation Validation'
description: 'Advanced validation system for CLI component generation with conflict detection and context analysis'
business-context: 'Comprehensive validation engine that ensures proper component naming, prevents conflicts, and provides intelligent suggestions for DDD component generation'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
