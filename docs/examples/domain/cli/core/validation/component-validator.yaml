            code: |
              const validator = ComponentValidator.create();
              // Optimally configured for DDD component validation
          - id: 'validation-workflow'
            code: |
              const validator = ComponentValidator.create();
              const result = await validator.validateComponent('aggregate', 'User', context);

        custom-tags:
          static: true
          factory: true
          optimal-config: 'Pre-configured with DDD validation best practices'

      validateComponent:
        description: 'Validate component generation request'
        business-context: 'Main validation method that analyzes component naming, checks for conflicts, examines project context, and provides comprehensive validation results'

        parameters:
          - name: 'type'
            type: 'ComponentType'
            description: 'Type of DDD component to validate (aggregate, entity, service, etc.)'
          - name: 'name'
            type: 'string'
            description: 'Proposed component name to validate'
          - name: 'context'
            type: 'ValidationContext'
            description: 'Project context and validation configuration'

        returns:
          type: 'Promise<ValidationResult>'
          description: 'Promise resolving to comprehensive validation results with suggestions'

        examples:
          - id: 'component-validation'
            code: |
              const result = await validator.validateComponent(
                'aggregate',
                'UserProfile',
                validationContext
              );
              if (result.isValid) {
                console.log('Component validation passed');
              }
          - id: 'validation-with-suggestions'
            code: |
              const result = await validator.validateComponent(
                'entity',
                'order',
                context
              );
              result.suggestions.forEach(s => console.log(s.message));
          - id: 'conflict-detection'
            code: |
              const result = await validator.validateComponent(
                'service',
                'PaymentService',
                context
              );
              if (!result.isValid) {
                console.log('Conflicts found:', result.errors);
              }

        custom-tags:
          async: true
          main-method: 'Primary validation interface'
          comprehensive: 'Complete component validation with conflict detection'
          intelligent: 'AI-powered validation with contextual suggestions'

