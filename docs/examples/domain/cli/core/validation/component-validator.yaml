      description: 'Advanced validation system for CLI component generation'
      business-context: 'Comprehensive validation engine that ensures proper naming conventions, prevents conflicts with existing components, analyzes project context, and provides intelligent suggestions for Domain-Driven Design component generation'

      # Format-specific
      formats:
        jsdoc:
          description: 'Intelligent component generation validation system'
        cli:
          description: |
            ## ComponentValidator
            Advanced validation engine for DDD component generation with conflict detection, naming validation, and context analysis

      custom-tags:
        since: '1.0.0'
        pattern: 'Validator Pattern'
        category: 'CLI Validation'
        features: 'Naming validation, conflict detection, project analysis, dependency analysis, intelligent suggestions'
        ddd-aware: 'Domain-Driven Design component validation and best practices'

    # Methods
    methods:
      constructor:
        description: 'Create new ComponentValidator instance'
        business-context: 'Initialize validator with comprehensive validation rules for different DDD component types'

        examples:
          - id: 'basic-constructor'
            code: |
              const validator = new ComponentValidator();
              // Ready for comprehensive component validation

        custom-tags:
          initialization: 'Sets up validation rules for all DDD component types'
          rule-configuration: 'Configures naming conventions and conflict detection'

