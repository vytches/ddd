              // Prompt adapted to project context and patterns

        custom-tags:
          async: true
          adaptive: 'Dynamic prompt modification based on context'
          optimization: 'Optimizes user experience based on project analysis'

      analyzeProjectStructure:
        description: 'Analyze project directory structure'
        business-context: 'Internal method for comprehensive directory structure analysis to understand project organization and patterns'

        parameters:
