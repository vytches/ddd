          comprehensive: 'Covers wide range of JavaScript/TypeScript frameworks'

      analyzeNamingConventions:
        description: 'Analyze naming conventions'
        business-context: 'Internal method for identifying naming patterns, coding conventions, and style preferences used in project'

        parameters:
