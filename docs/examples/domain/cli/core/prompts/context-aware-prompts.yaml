          contextual: 'Uses project analysis for relevant suggestions'

      generateProjectSuggestions:
        description: 'Generate project-level suggestions'
        business-context: 'Internal method for creating project-wide improvement suggestions based on analysis results'

        parameters:
          - name: 'analysis'
            type: 'ProjectAnalysis'
            description: 'Comprehensive project analysis'

        returns:
          type: 'PromptSuggestion[]'
          description: 'Array of project improvement suggestions'

        examples:
          - id: 'project-suggestions'
            code: |
              // Internal method - suggests project improvements
              // Architecture recommendations, missing patterns
              // Best practice implementations

        custom-tags:
          private: true
          advisory: 'Provides project improvement recommendations'
          best-practices: 'Based on DDD and architectural best practices'

      categorizeDependency:
        description: 'Categorize dependency by name'
        business-context: 'Internal utility for classifying dependencies into categories like framework, utility, testing, or development tools'

        parameters:
          - name: 'depName'
            type: 'string'
