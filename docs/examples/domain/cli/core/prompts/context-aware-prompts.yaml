# === FILE-LEVEL ELEMENTS ===
interfaces:
  CommandSuggestion:
    description: 'Command suggestion interface for CLI recommendations'
    business-context: 'Structured representation of intelligent command suggestions with priority and categorization'

    properties:
      - name: 'command'
        type: 'string'
        description: 'Suggested command string'
      - name: 'description'
        type: 'string'
        description: 'Human-readable description of command purpose'
      - name: 'reason'
        type: 'string'
        description: 'Explanation of why this command is suggested'
      - name: 'priority'
        type: "'high' | 'medium' | 'low'"
        description: 'Suggestion priority level'
      - name: 'category'
        type: "'next-step' | 'improvement' | 'fix' | 'enhancement'"
        description: 'Categorization of suggestion type'
      - name: 'confidence'
        type: 'number'
        description: 'Confidence score for suggestion accuracy (0-1)'

    custom-tags:
      priority-based: 'Supports priority-based suggestion ordering'
      categorized: 'Organized by suggestion type and purpose'
      confidence-scoring: 'Includes accuracy confidence metrics'