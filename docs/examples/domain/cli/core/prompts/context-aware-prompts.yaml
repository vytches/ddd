  SmartPrompts:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Static factory class for creating intelligent context-aware prompts'
      business-context: 'Utility class providing pre-configured intelligent prompts for common CLI workflows with smart defaults and suggestions'

      # Format-specific
      formats:
        jsdoc:
          description: 'Smart prompt factory with context awareness'
        cli:
          description: |
            ## SmartPrompts
            Factory for intelligent CLI prompts with context-aware suggestions and auto-detection

      custom-tags:
        since: '1.0.0'
        pattern: 'Factory Pattern'
        category: 'CLI Interaction'
        features: 'Pre-configured prompts, intelligent defaults, context adaptation'

    # Methods
    methods:
      componentName:
        description: 'Create component name prompt with intelligent suggestions'
        business-context: 'Factory method for creating intelligent component naming prompts with suggestions based on project patterns and conventions'

        parameters:
          - name: 'componentType'
            type: 'string'
            description: 'Type of component to create (aggregate, entity, service, etc.)'

        returns:
          type: 'ContextAwarePrompt'
          description: 'Configured context-aware prompt for component naming'

        examples:
          - id: 'component-naming'
            code: |
              const prompt = SmartPrompts.componentName('aggregate');
              // Intelligent suggestions based on domain and patterns
          - id: 'service-naming'
