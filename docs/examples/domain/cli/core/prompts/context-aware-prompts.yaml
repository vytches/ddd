# Context Aware Prompts - Intelligent CLI Interaction System

# === FILE METADATA ===
file-name: 'context-aware-prompts'
title: 'ContextAwarePromptEngine - Intelligent CLI User Interaction'
description: 'Advanced prompt engine with project context analysis for intelligent CLI suggestions'
business-context: 'Core CLI interaction system providing intelligent prompts and suggestions based on project analysis'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ContextAwarePromptEngine:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Intelligent prompt engine with project context analysis'
      business-context: 'Core CLI interaction system that analyzes project structure, patterns, and dependencies to provide contextually relevant suggestions and prompts'

      # Format-specific
      formats:
        jsdoc:
          description: 'Context-aware prompt engine with project analysis'
        cli:
          description: |
            ## ContextAwarePromptEngine
            Intelligent CLI interaction system with comprehensive project analysis and smart suggestions

      custom-tags:
        since: '1.0.0'
        pattern: 'Context Analysis Pattern'
        category: 'CLI Interaction'
        features: 'Project analysis, intelligent suggestions, context adaptation, framework detection'
        intelligence: 'AI-powered context understanding and suggestion generation'

    # Methods
    methods:
      create:
        description: 'Factory method to create prompt engine'
        business-context: 'Static factory for creating configured ContextAwarePromptEngine instance with optimal settings'

        returns:
          type: 'ContextAwarePromptEngine'
          description: 'New configured prompt engine instance'

        examples:
          - id: 'basic-factory'
            code: |
              const promptEngine = ContextAwarePromptEngine.create();
              // Ready for intelligent project analysis

        custom-tags:
          factory: true
          static: true
          initialization: 'Sets up prompt engine with analysis capabilities'

      analyzeContext:
        description: 'Analyze project context for intelligent suggestions'
        business-context: 'Comprehensive project analysis including directory structure, patterns, dependencies, and frameworks to understand project context'

        parameters:
          - name: 'context'
            type: 'WorkflowContext'
            description: 'Workflow context containing project path and metadata'

        returns:
          type: 'Promise<ProjectAnalysis>'
          description: 'Promise resolving to comprehensive project analysis results'

        examples:
          - id: 'project-analysis'
            code: |
              const analysis = await promptEngine.analyzeContext(workflowContext);
              console.log('Detected patterns:', analysis.patterns);
              console.log('Frameworks:', analysis.frameworks);
          - id: 'cached-analysis'
            code: |
              // Uses intelligent caching for performance
              const analysis = await promptEngine.analyzeContext(context);
              // Subsequent calls use cached results

        custom-tags:
          async: true
          caching: 'Intelligent project analysis caching'
          comprehensive: 'Full project structure and pattern analysis'

      generateSuggestions:
        description: 'Generate intelligent suggestions for prompts'
        business-context: 'AI-powered suggestion generation based on project analysis, user context, and best practices'

        parameters:
          - name: 'prompt'
            type: 'ContextAwarePrompt'
            description: 'Context-aware prompt configuration'
          - name: 'context'
            type: 'WorkflowContext'
            description: 'Current workflow context'

        returns:
          type: 'Promise<PromptSuggestion[]>'
          description: 'Promise resolving to array of intelligent suggestions'

        examples:
          - id: 'component-suggestions'
            code: |
              const suggestions = await promptEngine.generateSuggestions(
                componentPrompt,
                workflowContext
              );
              suggestions.forEach(s => console.log(s.text, s.reasoning));
          - id: 'contextual-suggestions'
            code: |
              // Generates suggestions based on project patterns
              const suggestions = await promptEngine.generateSuggestions(
                prompt,
                context
              );

        custom-tags:
          async: true
          ai-powered: 'Uses project analysis for intelligent suggestions'
          contextual: 'Suggestions based on project patterns and context'

      adaptPrompt:
        description: 'Adapt prompt based on context'
        business-context: 'Dynamic prompt adaptation based on project analysis to provide most relevant user experience'

        parameters:
          - name: 'prompt'
            type: 'ContextAwarePrompt'
            description: 'Original prompt configuration'
          - name: 'context'
            type: 'WorkflowContext'
            description: 'Current workflow context'

        returns:
          type: 'Promise<PromptConfig>'
          description: 'Promise resolving to adapted prompt configuration'

        examples:
          - id: 'prompt-adaptation'
            code: |
              const adaptedPrompt = await promptEngine.adaptPrompt(
                basePrompt,
