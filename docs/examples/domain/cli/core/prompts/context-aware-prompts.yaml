              // Used for intelligent project analysis

        custom-tags:
          private: true
          synchronous: true
          classification: 'Categorizes dependencies by purpose'
          utility: 'Helper method for dependency analysis'

      extractDomainWords:
        description: 'Extract domain words from project context'
        business-context: 'Internal method for identifying domain-specific terminology and business concepts from project structure and code'

        parameters:
          - name: 'context'
            type: 'WorkflowContext'
            description: 'Workflow context to analyze for domain words'

        returns:
