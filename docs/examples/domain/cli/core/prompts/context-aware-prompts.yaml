          dependency-analysis: 'Comprehensive package dependency analysis'
          categorization: 'Groups dependencies by purpose and type'

      detectFrameworks:
        description: 'Detect frameworks in use'
        business-context: 'Internal method for identifying web frameworks, testing frameworks, and other technology frameworks used in project'

        parameters:
          - name: 'dependencies'
            type: 'string[]'
            description: 'Array of project dependencies to analyze'

        returns:
          type: 'string[]'
