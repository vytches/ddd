# JsDocOutputAdapter - CLI JSDoc Output Formatter

# === FILE METADATA ===
file-name: 'jsdoc-output-adapter'
title: 'JsDocOutputAdapter - Pure JSDoc Formatting System'
description: 'Single-responsibility JSDoc formatter following clean architecture principles'
business-context: 'Enterprise JSDoc generation with separation of concerns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  JsDocOutputAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Pure JSDoc formatting adapter with no metadata loading logic'
      business-context: 'Follows single responsibility principle for enterprise architecture'

      formats:
        jsdoc:
          description: 'Pure JSDoc formatter with clean architecture'
        cli:
          description: |
            ## JsDocOutputAdapter
            Clean architecture JSDoc formatter with single responsibility

      custom-tags:
        since: '1.0.0'
        architecture: 'Single responsibility principle'
        clean-code: 'Separation of concerns - formatting only'
        pure-function: 'No side effects, pure formatting logic'

    # Methods
    methods:
      format:
        description: 'Format resolved metadata as JSDoc comment'
        business-context: 'Main public method for complete JSDoc comment generation'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Resolved metadata containing all documentation information'

        returns:
          type: 'string'
          description: 'Formatted JSDoc comment string'

        custom-tags:
          main-operation: 'Primary formatting method'
          single-responsibility: 'Only handles formatting, no metadata loading'
          pure-function: 'Deterministic output based on input metadata'

        examples:
          - id: 'format-metadata'
            code: |
              const adapter = new JsDocOutputAdapter();

              const metadata = {
                description: 'Creates a new user account',
                businessContext: 'User registration workflow',
                parameters: [
                  { name: 'userData', type: 'UserData', description: 'User registration data' }
                ],
                returns: { type: 'Promise<User>', description: 'Created user object' },
                examples: ['const user = await service.createUser(userData);']
              };

              const jsDocComment = adapter.format(metadata);
              console.log(jsDocComment);

      formatSingleTag:
        description: 'Format metadata as single-line JSDoc tag (for injection)'
        business-context: 'Granular tag formatting for precise JSDoc injection workflows'

        parameters:
          - name: 'key'
            type: 'string'
            description: 'Metadata key to format as JSDoc tag'
          - name: 'value'
            type: 'string'
            description: 'Metadata value to format'

        returns:
          type: 'string'
          description: 'Formatted JSDoc tag string'

        custom-tags:
          injection: 'Used for targeted JSDoc injection'
          granular: 'Single tag formatting for precision'

        examples:
          - id: 'single-tag-format'
            code: |
              const adapter = new JsDocOutputAdapter();

              const tag = adapter.formatSingleTag('businessContext', 'User management workflow');
              console.log(tag);
              // Output: "@businessContext User management workflow"

              const customTag = adapter.formatSingleTag('customTag', 'Enterprise feature');
              console.log(customTag);
              // Output: "@custom-tag Enterprise feature"

      formatExamples:
        description: 'Format examples as JSDoc @example blocks'
        business-context: 'Code example formatting for comprehensive documentation'

        parameters:
          - name: 'examples'
            type: 'string[]'
            description: 'Array of code example strings'

        returns:
          type: 'string'
          description: 'Formatted JSDoc @example blocks'

        custom-tags:
          examples: 'Handles multiple code examples'
          formatting: 'Proper JSDoc @example block structure'

        examples:
          - id: 'format-examples'
            code: |
              const adapter = new JsDocOutputAdapter();

              const examples = [
                'const user = await service.createUser(userData);',
                'const result = await service.updateUser(userId, changes);'
              ];

              const formattedExamples = adapter.formatExamples(examples);
              console.log(formattedExamples);
              // Output:
              // * @example
              // * ```typescript
              // * const user = await service.createUser(userData);
              // * ```
              // * @example
              // * ```typescript  
              // * const result = await service.updateUser(userId, changes);
              // * ```
