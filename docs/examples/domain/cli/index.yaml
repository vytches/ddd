# VytchesDDD CLI - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'index'
title: 'VytchesDDD CLI - Enterprise Domain Builder'
description: 'Command-line interface for generating Domain-Driven Design components and documentation'
business-context: 'Enterprise-grade scaffolding and code generation for VytchesDDD patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLI OVERVIEW ===
cli:
  name: 'VytchesDDD CLI'
  description: 'Enterprise-grade command-line tool for DDD development'
  version: '1.0.0'
  binary: 'vytches-ddd'

  commands:
    generate:
      description: 'Generate DDD components (entities, aggregates, services)'
      aliases: ['g']
      examples:
        - 'vytches-ddd generate entity User'
        - 'vytches-ddd generate aggregate Order'
        - 'vytches-ddd generate service UserService'

    examples:
      description: 'Manage and generate framework usage examples'
      subcommands:
        - 'generate <package> - Generate examples for specific package'
        - 'bundle --packages <list> - Bundle multiple package examples'
        - 'find-by-tag <tag> - Find examples by specific tags'
        - 'validate --package <name> - Validate example files'

    domain-builder:
      description: 'Interactive domain modeling workflow'
      aliases: ['db']
      examples:
        - 'vytches-ddd domain-builder --interactive'
        - 'vytches-ddd db --bounded-context UserManagement'

# === EXPORTS DOCUMENTATION ===
exports:
  # Core Engines
  CommandRegistry:
    description: 'Registry for managing CLI commands and their metadata'
    business-context: 'Central command management for extensible CLI architecture'

    examples:
      - id: 'command-registration'
        description: 'Register custom CLI commands'
        code: |
          import { CommandRegistry } from '@vytches/ddd-cli';

          const registry = new CommandRegistry();

          // Register custom command
          registry.register({
            name: 'scaffold',
            description: 'Scaffold complete domain module',
            action: async (args, options) => {
              console.log('Scaffolding domain:', args[0]);
            }
          });

  ConfigManager:
    description: 'Configuration management for CLI settings and project setup'
    business-context: 'Manages CLI configuration, templates, and project-specific settings'

    examples:
      - id: 'config-management'
        description: 'Configure CLI for project'
        code: |
          import { ConfigManager } from '@vytches/ddd-cli';

          // Initialize configuration
          const config = await ConfigManager.initialize();

          // Update configuration
          config.update({
            outputDir: './src/domain',
            framework: 'nestjs',
            patterns: ['aggregate-pattern', 'repository-pattern']
          });

  TemplateEngine:
    description: 'Template engine for generating code from Handlebars templates'
    business-context: 'Generates DDD components from predefined templates with variable substitution'

    examples:
      - id: 'template-generation'
        description: 'Generate code from templates'
        code: |
          import { TemplateEngine } from '@vytches/ddd-cli';

          const engine = new TemplateEngine();

          // Generate entity from template
          const entityCode = await engine.render('entity.hbs', {
            className: 'User',
            properties: [
              { name: 'id', type: 'EntityId' },
              { name: 'email', type: 'string' }
            ]
          });

  WorkflowEngine:
    description: 'Workflow engine for complex multi-step domain generation processes'
    business-context: 'Orchestrates complex domain modeling workflows with step-by-step guidance'

    examples:
      - id: 'workflow-execution'
        description: 'Execute domain modeling workflow'
        code: |
          import { WorkflowEngine } from '@vytches/ddd-cli';

          const engine = new WorkflowEngine();

          // Execute domain builder workflow
          await engine.execute('domain-builder', {
            boundedContext: 'UserManagement',
            aggregates: ['User', 'Profile'],
            services: ['UserService', 'AuthenticationService']
          });

  # Utilities
  Colors:
    description: 'Terminal color utilities for enhanced CLI output'
    business-context: 'Provides consistent, accessible terminal output with color coding'

    examples:
      - id: 'colored-output'
        description: 'Use colored terminal output'
        code: |
          import { Colors } from '@vytches/ddd-cli';

          // Success message
          console.log(Colors.green('✅ Component generated successfully'));

          // Error message
          console.log(Colors.red('❌ Generation failed'));

          // Warning
          console.log(Colors.yellow('⚠️  Template not found, using default'));

  FileSystem:
    description: 'File system utilities for safe file operations'
    business-context: 'Handles file creation, directory management, and safe file operations'

    examples:
      - id: 'file-operations'
        description: 'Perform safe file system operations'
        code: |
          import { FileSystem } from '@vytches/ddd-cli';

          // Create directory structure
          await FileSystem.ensureDir('./src/domain/entities');

          // Write file safely
          await FileSystem.writeFile(
            './src/domain/entities/User.ts',
            generatedCode,
            { backup: true }
          );

  Performance:
    description: 'Performance monitoring and timing utilities'
    business-context: 'Monitors CLI operation performance for optimization and user feedback'

    examples:
      - id: 'performance-tracking'
        description: 'Track operation performance'
        code: |
          import { Performance } from '@vytches/ddd-cli';

          const timer = Performance.start('generation');

          // Perform operations
          await generateComponents();

          const duration = Performance.end('generation');
          console.log(`Generation completed in ${duration}ms`);

  main:
    description: 'Main CLI entry point function'
    business-context: 'Primary function to run the CLI with argument parsing and command routing'

    examples:
      - id: 'programmatic-usage'
        description: 'Use CLI programmatically'
        code: |
          import { main } from '@vytches/ddd-cli';

          // Run CLI programmatically
          process.argv = ['node', 'cli.js', 'generate', 'entity', 'User'];
          await main();

  CLI_VERSION:
    description: 'Current version of the CLI tool'
    business-context: 'Version information for compatibility and feature detection'

    examples:
      - id: 'version-check'
        description: 'Check CLI version programmatically'
        code: |
          import { CLI_VERSION } from '@vytches/ddd-cli';

          console.log(`VytchesDDD CLI v${CLI_VERSION}`);

          // Version compatibility check
          const [major, minor] = CLI_VERSION.split('.').map(Number);
          if (major >= 1 && minor >= 0) {
            console.log('✅ CLI version is compatible');
          }

# === INTERFACES ===
interfaces:
  CLIConfig:
    description: 'Configuration interface for CLI settings'
    business-context: 'Defines project-specific CLI configuration options'

    properties:
      - name: 'debug'
        type: 'boolean'
        description: 'Enable debug output for troubleshooting'
        business-context: 'Provides detailed logging for development and debugging'

      - name: 'outputDir'
        type: 'string'
        description: 'Directory where generated files will be placed'
        business-context: 'Controls file generation location for project organization'

      - name: 'framework'
        type: 'FrameworkType'
        description: 'Target framework for code generation'
        business-context: 'Determines framework-specific code patterns and imports'

  Command:
    description: 'Command definition interface for CLI commands'
    business-context: 'Defines structure for extensible CLI commands'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Command name used in CLI'
        business-context: 'Primary identifier for command invocation'

      - name: 'description'
        type: 'string'
        description: 'Human-readable command description'
        business-context: 'Provides help text and command documentation'

      - name: 'action'
        type: 'CommandAction'
        description: 'Function executed when command is invoked'
        business-context: 'Contains the business logic for command execution'

  Template:
    description: 'Template definition for code generation'
    business-context: 'Defines reusable code generation templates'

    properties:
      - name: 'name'
        type: 'string'
        description: 'Template identifier'
        business-context: 'Unique name for template selection and referencing'

      - name: 'path'
        type: 'string'
        description: 'File system path to template file'
        business-context: 'Location of Handlebars template file'

      - name: 'variables'
        type: 'Record<string, unknown>'
        description: 'Template variables for substitution'
        business-context: 'Data context for template rendering'

# === TYPES ===
types:
  ProjectStructure:
    description: 'Supported project architecture patterns'
    business-context: 'Defines architectural patterns for code organization'

    values:
      - name: 'clean-architecture'
        description: 'Clean Architecture pattern with dependency inversion'
      - name: 'hexagonal'
        description: 'Hexagonal (Ports and Adapters) architecture'
      - name: 'onion'
        description: 'Onion architecture with layered dependencies'
      - name: 'modular-monolith'
        description: 'Modular monolith with bounded contexts'
      - name: 'microservices'
        description: 'Microservices architecture patterns'

  FrameworkType:
    description: 'Supported web frameworks for code generation'
    business-context: 'Framework-specific code generation patterns'

    values:
      - name: 'nestjs'
        description: 'NestJS framework with decorators and DI'
      - name: 'express'
        description: 'Express.js with minimal structure'
      - name: 'fastify'
        description: 'Fastify framework with plugins'
      - name: 'standalone'
        description: 'Framework-agnostic pure TypeScript'

  CommandAction:
    description: 'Type definition for command action functions'
    business-context: 'Function signature for implementing CLI commands'

    signature: '(args: string[], options: Record<string, unknown>) => Promise<void>'

    examples:
      - id: 'command-action'
        description: 'Implement custom command action'
        code: |
          import type { CommandAction } from '@vytches/ddd-cli';

          const myCommandAction: CommandAction = async (args, options) => {
            const entityName = args[0];
            const framework = options.framework as string;
            
            console.log(`Generating ${entityName} for ${framework}`);
            // Generation logic here
          };

# === USAGE EXAMPLES ===
usage-examples:
  basic-generation:
    description: 'Generate basic DDD components'
    code: |
      # Generate entity
      vytches-ddd generate entity User

      # Generate aggregate with options
      vytches-ddd generate aggregate Order --framework nestjs --output-dir ./src/domain

      # Generate complete service
      vytches-ddd generate service UserService --include-tests --include-repository

  interactive-domain-building:
    description: 'Interactive domain modeling workflow'
    code: |
      # Start interactive domain builder
      vytches-ddd domain-builder

      # Domain builder with specific context
      vytches-ddd domain-builder --bounded-context "Order Management"

      # Generate complete domain with relationships
      vytches-ddd domain-builder --interactive --include-relationships

  examples-management:
    description: 'Manage framework integration examples'
    code: |
      # Generate examples for specific package
      vytches-ddd examples generate aggregates --complexity intermediate

      # Bundle multiple package examples
      vytches-ddd examples bundle --packages policies,domain-services --framework nestjs

      # Find examples by business context
      vytches-ddd examples find-by-tag "user-management" --max-examples 5

  configuration:
    description: 'Configure CLI for project'
    code: |
      # Initialize CLI configuration
      vytches-ddd config init

      # Set default framework
      vytches-ddd config set framework nestjs

      # Set output directory
      vytches-ddd config set outputDir ./src/domain

# === ADVANCED FEATURES ===
advanced-features:
  custom-templates:
    description: 'Create and use custom templates'
    steps:
      - 'Create template files with .hbs extension'
      - 'Define template variables and placeholders'
      - 'Register templates with CLI configuration'
      - 'Use templates in generation commands'

    example: |
      # Custom entity template
      vytches-ddd generate entity User --template custom-entity.hbs

      # Custom aggregate with repository
      vytches-ddd generate aggregate Order --template aggregate-with-repo.hbs

  plugin-system:
    description: 'Extend CLI with custom plugins'
    capabilities:
      - 'Custom command registration'
      - 'Template processing hooks'
      - 'File system operation interception'
      - 'Output formatting customization'

    example: |
      # Load custom plugin
      vytches-ddd --plugin ./plugins/custom-generator.js generate custom MyComponent

  workflow-automation:
    description: 'Automate complex domain generation workflows'
    features:
      - 'Multi-step guided processes'
      - 'Dependency resolution and ordering'
      - 'Rollback and error recovery'
      - 'Progress tracking and reporting'

    example: |
      # Execute complete domain workflow
      vytches-ddd workflow execute domain-scaffold --config domain-config.json

# === PERFORMANCE OPTIMIZATIONS ===
performance:
  template-caching:
    description: 'Templates are cached in memory for faster repeated generation'
    benefit: '50-80% faster subsequent generations'

  incremental-updates:
    description: 'Only regenerates changed components'
    benefit: 'Significantly faster when updating existing domains'

  parallel-processing:
    description: 'Multiple files generated concurrently'
    benefit: '3x faster for bulk operations'

# === INTEGRATION GUIDE ===
integration:
  ci-cd-pipeline:
    description: 'Use CLI in continuous integration'
    example: |
      # In CI pipeline
      npm install -g @vytches/ddd-cli
      vytches-ddd examples validate --all
      vytches-ddd generate --dry-run --validate-only

  npm-scripts:
    description: 'Integrate with package.json scripts'
    example: |
      {
        "scripts": {
          "gen:entity": "vytches-ddd generate entity",
          "gen:aggregate": "vytches-ddd generate aggregate",
          "validate:examples": "vytches-ddd examples validate --all"
        }
      }

  programmatic-usage:
    description: 'Use CLI programmatically in Node.js applications'
    example: |
      import { main, ConfigManager } from '@vytches/ddd-cli';

      // Configure for programmatic use
      const config = await ConfigManager.initialize({
        framework: 'nestjs',
        outputDir: './generated'
      });

      // Execute commands programmatically
      process.argv = ['node', 'script.js', 'generate', 'entity', 'User'];
      await main();
