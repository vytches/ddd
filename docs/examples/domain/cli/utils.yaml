# CLI Utils - Core Utility Classes
# Enhanced Metadata System V2 - File system and color utilities

# === FILE METADATA ===
file-name: 'utils'
title: 'CLI Utils - Core Utility Classes'
description: 'Essential utility classes for file operations and terminal styling'
business-context: 'Foundation utilities used throughout CLI for file scaffolding and user interface'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  FileSystem:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Enhanced file operations with Node.js built-ins'
      business-context: 'Core file system utilities for code generation, template processing, and project scaffolding'

      formats:
        jsdoc:
          description: 'File system operations with async support'
        cli:
          description: |
            ## FileSystem
            Enhanced file operations for CLI scaffolding

      custom-tags:
        since: '1.0.0'
        pattern: 'Static Utility Class'
        dependencies: 'Node.js fs module'

    # Methods
    methods:
      exists:
        description: 'Check if file or directory exists'
        business-context: 'Validation before file operations to prevent errors'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to check for existence'

        returns:
          type: 'boolean'
          description: 'true if path exists, false otherwise'

        custom-tags:
          static: 'true'
          sync: 'true'

        examples:
          - id: 'validation'
            code: |
              if (FileSystem.exists('./package.json')) {
                console.log('Package file found');
              }

      isDirectory:
        description: 'Check if path is a directory'
        business-context: 'Directory validation for scaffolding operations'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to check'

        returns:
          type: 'boolean'
          description: 'true if path is directory'

        custom-tags:
          static: 'true'
          sync: 'true'

        examples:
          - id: 'directory-check'
            code: |
              if (FileSystem.isDirectory('./src')) {
                console.log('Source directory exists');
              }

      isFile:
        description: 'Check if path is a regular file'
        business-context: 'File validation before processing operations'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to check'

        returns:
          type: 'boolean'
          description: 'true if path is file'

        custom-tags:
          static: 'true'
          sync: 'true'

        examples:
          - id: 'file-check'
            code: |
              if (FileSystem.isFile('./README.md')) {
                console.log('README file exists');
              }

      createDirectory:
        description: 'Create directory recursively with parent directories'
        business-context: 'Project scaffolding and directory structure creation'

        parameters:
          - name: 'dirPath'
            type: 'string'
            description: 'Directory path to create'

        returns:
          type: 'Promise<void>'
          description: 'Directory created successfully'

        custom-tags:
          static: 'true'
          async: 'true'
          recursive: 'Creates parent directories'

        examples:
          - id: 'scaffolding'
            code: |
              await FileSystem.createDirectory('./src/domain/entities');
              // Creates all parent directories if needed

      readFile:
        description: 'Read file content as UTF-8 string'
        business-context: 'Template loading and configuration file processing'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path to read'

        returns:
          type: 'Promise<string>'
          description: 'File content as string'

        custom-tags:
          static: 'true'
          async: 'true'
          encoding: 'UTF-8'

        examples:
          - id: 'template-loading'
            code: |
              const template = await FileSystem.readFile('./templates/entity.hbs');
              // Returns template content for processing

      writeFile:
        description: 'Write content to file with directory creation'
        business-context: 'Code generation and project file creation'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Target file path'
          - name: 'content'
            type: 'string'
            description: 'Content to write'

        returns:
          type: 'Promise<void>'
          description: 'File written successfully'

        custom-tags:
          static: 'true'
          async: 'true'
          auto-create: 'Creates parent directories'

        examples:
          - id: 'code-generation'
            code: |
              await FileSystem.writeFile('./src/user.entity.ts', generatedCode);
              // Creates directories and writes generated code

      findFiles:
        description: 'Find files matching regex pattern recursively'
        business-context: 'Template discovery and project file scanning'

        parameters:
          - name: 'directory'
            type: 'string'
            description: 'Directory to search in'
          - name: 'pattern'
            type: 'RegExp'
            description: 'Regular expression pattern to match'

        returns:
          type: 'Promise<string[]>'
          description: 'Array of matching file paths'

        custom-tags:
          static: 'true'
          async: 'true'
          recursive: 'Searches subdirectories'

        examples:
          - id: 'template-discovery'
            code: |
              const templates = await FileSystem.findFiles('./templates', /\.hbs$/);
              // Finds all Handlebars templates

      resolvePath:
        description: 'Resolve to absolute path'
        business-context: 'Path normalization for consistent file operations'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Path to resolve'

        returns:
          type: 'string'
          description: 'Absolute path'

        custom-tags:
          static: 'true'
          sync: 'true'

        examples:
          - id: 'path-resolution'
            code: |
              const absolute = FileSystem.resolvePath('./src/user.ts');
              // Returns: /full/path/to/src/user.ts

      joinPath:
        description: 'Join multiple path segments correctly'
        business-context: 'Cross-platform path construction'

        parameters:
          - name: 'paths'
            type: '...string[]'
            description: 'Path segments to join'

        returns:
          type: 'string'
          description: 'Joined path'

        custom-tags:
          static: 'true'
          sync: 'true'
          variadic: 'Accepts multiple arguments'

        examples:
          - id: 'path-joining'
            code: |
              const path = FileSystem.joinPath('./src', 'domain', 'user.entity.ts');
              // Cross-platform path joining

  Colors:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'ANSI color utilities for terminal styling'
      business-context: 'Zero-dependency terminal styling for CLI user interface and logging'

      formats:
        jsdoc:
          description: 'Terminal colors without external dependencies'
        cli:
          description: |
            ## Colors
            Native ANSI color utilities for CLI styling

      custom-tags:
        since: '1.0.0'
        pattern: 'Static Utility Class'
        dependencies: 'None - native ANSI codes'

    # Methods
    methods:
      red:
        description: 'Apply red color to text'
        business-context: 'Error messages and critical status indicators'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to colorize'

        returns:
          type: 'string'
          description: 'Text with red ANSI color codes'

        custom-tags:
          static: 'true'
          color: 'Red foreground'

        examples:
          - id: 'error-styling'
            code: |
              console.log(Colors.red('Error: Operation failed'));
              // Displays text in red

      green:
        description: 'Apply green color to text'
        business-context: 'Success messages and positive status indicators'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to colorize'

        returns:
          type: 'string'
          description: 'Text with green ANSI color codes'

        custom-tags:
          static: 'true'
          color: 'Green foreground'

        examples:
          - id: 'success-styling'
            code: |
              console.log(Colors.green('✅ Operation completed'));
              // Displays text in green

      yellow:
        description: 'Apply yellow color to text'
        business-context: 'Warning messages and attention indicators'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to colorize'

        returns:
          type: 'string'
          description: 'Text with yellow ANSI color codes'

        custom-tags:
          static: 'true'
          color: 'Yellow foreground'

        examples:
          - id: 'warning-styling'
            code: |
              console.log(Colors.yellow('⚠️ Warning: Check configuration'));
              // Displays text in yellow

      bold:
        description: 'Apply bold formatting to text'
        business-context: 'Headers, emphasis, and important information highlighting'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text to make bold'

        returns:
          type: 'string'
          description: 'Text with bold ANSI formatting'

        custom-tags:
          static: 'true'
          formatting: 'Bold weight'

        examples:
          - id: 'emphasis'
            code: |
              console.log(Colors.bold('Important Notice'));
              // Displays text in bold

      success:
        description: 'Apply success styling (green + bold)'
        business-context: 'Prominent success message formatting'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Success message text'

        returns:
          type: 'string'
          description: 'Text with success styling'

        custom-tags:
          static: 'true'
          composite: 'Combines green + bold'

        examples:
          - id: 'success-message'
            code: |
              console.log(Colors.success('Package created successfully!'));
              // Green bold text for success

      error:
        description: 'Apply error styling (red + bold)'
        business-context: 'Prominent error message formatting'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Error message text'

        returns:
          type: 'string'
          description: 'Text with error styling'

        custom-tags:
          static: 'true'
          composite: 'Combines red + bold'

        examples:
          - id: 'error-message'
            code: |
              console.log(Colors.error('Generation failed!'));
              // Red bold text for errors

      warning:
        description: 'Apply warning styling (yellow + bold)'
        business-context: 'Prominent warning message formatting'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Warning message text'

        returns:
          type: 'string'
          description: 'Text with warning styling'

        custom-tags:
          static: 'true'
          composite: 'Combines yellow + bold'

        examples:
          - id: 'warning-message'
            code: |
              console.log(Colors.warning('Configuration missing!'));
              // Yellow bold text for warnings

      strip:
        description: 'Remove all ANSI color codes from text'
        business-context: 'Clean text for file output or logging without colors'

        parameters:
          - name: 'text'
            type: 'string'
            description: 'Text with ANSI codes'

        returns:
          type: 'string'
          description: 'Plain text without color codes'

        custom-tags:
          static: 'true'
          utility: 'ANSI code removal'

        examples:
          - id: 'clean-text'
            code: |
              const clean = Colors.strip(Colors.red('Error text'));
              // Returns: 'Error text' without ANSI codes

      isColorSupported:
        description: 'Check if terminal supports color output'
        business-context: 'Adaptive color usage based on terminal capabilities'

        returns:
          type: 'boolean'
          description: 'true if colors are supported'

        custom-tags:
          static: 'true'
          detection: 'Terminal capability detection'

        examples:
          - id: 'adaptive-coloring'
            code: |
              const useColors = Colors.isColorSupported();
              const message = useColors ? Colors.green('Success') : 'Success';

      progressBar:
        description: 'Generate ASCII progress bar with colors'
        business-context: 'Visual progress indication for long-running operations'

        parameters:
          - name: 'completed'
            type: 'number'
            description: 'Completed units'
          - name: 'total'
            type: 'number'
            description: 'Total units'
          - name: 'width'
            type: 'number'
            description: 'Optional bar width (default: 40)'

        returns:
          type: 'string'
          description: 'Formatted progress bar'

        custom-tags:
          static: 'true'
          visualization: 'Progress visualization'

        examples:
          - id: 'progress-display'
            code: |
              const bar = Colors.progressBar(7, 10, 20);
              console.log(`Progress: ${bar} 70%`);
              // Visual progress bar
