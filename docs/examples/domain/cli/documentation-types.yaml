# Documentation Types - CLI Documentation System Types

# === FILE METADATA ===
file-name: 'documentation-types'
title: 'Documentation Types - CLI Documentation System Type Definitions'
description: 'Type definitions for Enhanced Documentation System with framework integration support'
business-context: 'Provides comprehensive type system for documentation parsing, framework integration, and content management'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  FrameworkComponentType:
    description: 'Framework component types for documentation generation'
    business-context: 'Defines supported component types for framework-specific documentation generation'

    values:
      - name: 'module'
        description: 'Framework module/package configuration'
      - name: 'service'
        description: 'Service class implementation'
      - name: 'controller'
        description: 'HTTP controller implementation'
      - name: 'repository'
        description: 'Data repository implementation'
      - name: 'dto'
        description: 'Data transfer object'
      - name: 'config'
        description: 'Configuration module'
      - name: 'middleware'
        description: 'HTTP middleware component'
      - name: 'guard'
        description: 'Route guard implementation'
      - name: 'interceptor'
        description: 'HTTP interceptor component'

    custom-tags:
      since: '1.0.0'
      framework-support: 'NestJS, Express, Fastify'

  ComponentSectionMapping:
    description: 'Component section mapping for framework integrations'
    business-context: 'Maps framework component types to their corresponding documentation sections'

    structure:
      type: 'Record<FrameworkComponentType, string>'
      description: 'Record mapping component types to section names'

    custom-tags:
      since: '1.0.0'
      mapping-type: 'Component to section relationship'

# === INTERFACES ===
interfaces:
  ParsedDocumentationSet:
    description: 'Parsed documentation set containing base content and optional framework integration'
    business-context: 'Complete documentation package with base content, framework-specific content, and merged result'

    properties:
      - name: 'base'
        type: 'BaseDocumentationContent'
        description: 'Base documentation content extracted from markdown files'

      - name: 'framework'
        type: 'FrameworkIntegrationContent'
        optional: true
        description: 'Optional framework-specific integration content'

      - name: 'merged'
        type: 'MergedDocumentationContent'
        description: 'Merged documentation containing both base and framework content'

    custom-tags:
      since: '1.0.0'
      content-structure: 'Base + Framework + Merged content'

  BaseDocumentationContent:
    description: 'Base documentation content extracted from markdown files'
    business-context: 'Core documentation structure with metadata and content sections for universal use'

    properties:
      - name: 'metadata'
        type: 'EnhancedExampleDefinition'
        description: 'Enhanced metadata for the documentation'

      - name: 'content'
        type: 'object'
        description: 'Structured content sections'

        properties:
          - name: 'description'
            type: 'string'
            description: 'Main description of the component or pattern'

          - name: 'businessContext'
            type: 'string'
            description: 'Business context and use case explanation'

          - name: 'codeExample'
            type: 'string'
            description: 'Primary code example'

          - name: 'supportingTypes'
            type: 'string'
            description: 'Supporting types and interfaces'

          - name: 'usageExample'
            type: 'string'
            description: 'Usage example with real-world scenario'

          - name: 'testExample'
            type: 'string'
            description: 'Testing examples and patterns'

          - name: 'commonPitfalls'
            type: 'string[]'
            description: 'Array of common mistakes and pitfalls'

          - name: 'migrationNotes'
            type: 'string'
            description: 'Migration guidance and version notes'

    custom-tags:
      since: '1.0.0'
      structure: 'Universal base content for all documentation'

  FrameworkIntegrationContent:
    description: 'Framework-specific integration content'
    business-context: 'Framework-specific implementation details and integration patterns for targeted documentation'

    properties:
      - name: 'framework'
        type: "'nestjs' | 'express' | 'fastify'"
        description: 'Target framework for integration'

      - name: 'baseExampleId'
        type: 'string'
        description: 'ID of the base example this integration extends'

      - name: 'components'
        type: 'Map<FrameworkComponentType, string>'
        description: 'Map of component types to their implementation content'

      - name: 'configuration'
        type: 'string'
        description: 'Framework configuration and setup'

      - name: 'installation'
        type: 'string'
        description: 'Installation and dependency setup instructions'

      - name: 'errorHandling'
        type: 'string'
        description: 'Framework-specific error handling patterns'

      - name: 'testing'
        type: 'string'
        description: 'Framework-specific testing approaches'

      - name: 'deployment'
        type: 'string'
        description: 'Deployment considerations for the framework'

    custom-tags:
      since: '1.0.0'
      frameworks: 'NestJS, Express, Fastify'

  MergedDocumentationContent:
    description: 'Merged documentation containing both base and framework content'
    business-context: 'Complete documentation combining universal patterns with framework-specific implementations'

    properties:
      - name: 'metadata'
        type: 'EnhancedExampleDefinition'
        description: 'Enhanced metadata for the merged documentation'

      - name: 'baseContent'
        type: "BaseDocumentationContent['content']"
        description: 'Base documentation content sections'

      - name: 'frameworkContent'
        type: 'FrameworkIntegrationContent'
        optional: true
        description: 'Optional framework-specific content'

      - name: 'availableComponents'
        type: 'FrameworkComponentType[]'
        description: 'Array of available component types for this documentation'

    custom-tags:
      since: '1.0.0'
      merge-strategy: 'Base content + Framework integration'

  FrameworkIntegrationDefinition:
    description: 'Framework integration definition for examples'
    business-context: 'Configuration for framework-specific example generation and integration'

    properties:
      - name: 'framework'
        type: "'nestjs' | 'express' | 'fastify'"
        description: 'Target framework identifier'

      - name: 'path'
        type: 'string'
        description: 'Path to framework integration files'

      - name: 'components'
        type: 'FrameworkComponentType[]'
        description: 'Available component types for this framework'

    custom-tags:
      since: '1.0.0'
      configuration: 'Framework integration setup'

  EnhancedExampleDefinition:
    description: 'Enhanced example definition with framework integration support'
    business-context: 'Extended example metadata with comprehensive framework support and validation options'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier for the example'

      - name: 'name'
        type: 'string'
        description: 'Human-readable name for the example'

      - name: 'file'
        type: 'string'
        description: 'File name or path for the example'

      - name: 'path'
        type: 'string'
        optional: true
        description: 'Optional additional path information'

      - name: 'tags'
        type: 'string[]'
        description: 'Tags for categorization and search'

      - name: 'complexity'
        type: "'basic' | 'intermediate' | 'advanced'"
        description: 'Complexity level of the example'

      - name: 'framework'
        type: 'string'
        optional: true
        description: 'Target framework if framework-specific'

      - name: 'priority'
        type: "'high' | 'medium' | 'low'"
        description: 'Priority level for example selection'

      - name: 'description'
        type: 'string'
        description: 'Detailed description of the example'

      - name: 'prerequisites'
        type: 'string[]'
        optional: true
        description: 'Optional prerequisites for understanding the example'

      - name: 'dependencies'
        type: 'string[]'
        optional: true
        description: 'Optional package dependencies'

      - name: 'deprecated'
        type: 'boolean'
        optional: true
        description: 'Whether the example is deprecated'

      - name: 'package'
        type: 'string'
        optional: true
        description: 'Package name this example belongs to'

      - name: 'diSupport'
        type: 'boolean'
        optional: true
        description: 'Whether the example supports dependency injection'

      - name: 'frameworkIntegrations'
        type: 'FrameworkIntegrationDefinition[]'
        optional: true
        description: 'Available framework integrations for this example'

      - name: 'validation'
        type: 'object'
        optional: true
        description: 'Validation options for the example'

        properties:
          - name: 'fileExists'
            type: 'boolean'
            optional: true
            description: 'Whether to validate file existence'

          - name: 'syntaxCheck'
            type: 'boolean'
            optional: true
            description: 'Whether to perform syntax checking'

          - name: 'compilationTest'
            type: 'boolean'
            optional: true
            description: 'Whether to test compilation'

          - name: 'lintCheck'
            type: 'boolean'
            optional: true
            description: 'Whether to perform lint checking'

          - name: 'exampleTest'
            type: 'string'
            optional: true
            description: 'Optional test command for the example'

      - name: 'domain'
        type: 'string'
        optional: true
        description: 'Domain context for the example'

      - name: 'patterns'
        type: 'string[]'
        optional: true
        description: 'Design patterns demonstrated in the example'

    custom-tags:
      since: '1.0.0'
      comprehensive: 'Complete example metadata with all options'

  ExampleQueryOptions:
    description: 'Query options for finding documentation content'
    business-context: 'Flexible search criteria for discovering relevant documentation examples'

    properties:
      - name: 'package'
        type: 'string'
        optional: true
        description: 'Filter by package name'

      - name: 'complexity'
        type: "'basic' | 'intermediate' | 'advanced'"
        optional: true
        description: 'Filter by complexity level'

      - name: 'domain'
        type: 'string'
        optional: true
        description: 'Filter by domain context'

      - name: 'pattern'
        type: 'string'
        optional: true
        description: 'Filter by design pattern'

      - name: 'framework'
        type: "'nestjs' | 'express' | 'fastify'"
        optional: true
        description: 'Filter by target framework'

      - name: 'tags'
        type: 'string[]'
        optional: true
        description: 'Filter by tags'

    custom-tags:
      since: '1.0.0'
      search: 'Flexible documentation search criteria'

  IDocumentationRegistry:
    description: 'Documentation registry for managing example definitions and content'
    business-context: 'Central registry for discovering, querying, and managing all documentation examples'

    methods:
      loadAll:
        description: 'Load all example definitions from packages'
        business-context: 'Initialize registry with all available documentation examples'

        returns:
          type: 'Promise<void>'
          description: 'Completes when all examples are loaded'

      findById:
        description: 'Find example by unique identifier'
        business-context: 'Retrieve specific example using its unique ID'

        parameters:
          - name: 'id'
            type: 'string'
            description: 'Unique example identifier'

        returns:
          type: 'EnhancedExampleDefinition | undefined'
          description: 'Found example or undefined if not found'

      query:
        description: 'Query examples using flexible criteria'
        business-context: 'Search for examples using multiple filter options'

        parameters:
          - name: 'options'
            type: 'ExampleQueryOptions'
            description: 'Query criteria and filters'

        returns:
          type: 'EnhancedExampleDefinition[]'
          description: 'Array of matching examples'

      getAvailableFrameworks:
        description: 'Get available frameworks for a specific example'
        business-context: 'Discover which frameworks have integrations for an example'

        parameters:
          - name: 'exampleId'
            type: 'string'
            description: 'Example identifier to check'

        returns:
          type: 'string[]'
          description: 'Array of available framework names'

      getAvailableComponents:
        description: 'Get available components for framework integration'
        business-context: 'Discover available component types for specific framework integration'

        parameters:
          - name: 'exampleId'
            type: 'string'
            description: 'Example identifier'
          - name: 'framework'
            type: 'string'
            description: 'Target framework name'

        returns:
          type: 'FrameworkComponentType[]'
          description: 'Array of available component types'

      getPackages:
        description: 'Get all packages with available examples'
        business-context: 'Discover all packages that have documentation examples'

        returns:
          type: 'string[]'
          description: 'Array of package names with examples'

      getAllFrameworks:
        description: 'Get all available frameworks across all examples'
        business-context: 'Discover complete list of supported frameworks'

        returns:
          type: 'string[]'
          description: 'Array of all supported framework names'

    custom-tags:
      since: '1.0.0'
      registry: 'Central documentation management system'

  DocumentationParseOptions:
    description: 'Documentation parsing options'
    business-context: 'Configuration for parsing documentation content from various sources'

    properties:
      - name: 'exampleId'
        type: 'string'
        description: 'Identifier of example to parse'

      - name: 'framework'
        type: "'nestjs' | 'express' | 'fastify' | undefined"
        optional: true
        description: 'Optional target framework for parsing'

      - name: 'version'
        type: 'string | undefined'
        optional: true
        description: 'Optional version for parsing'

    custom-tags:
      since: '1.0.0'
      parsing: 'Documentation content parsing configuration'

  DocumentationFilterOptions:
    description: 'Documentation content filtering options'
    business-context: 'Options for filtering framework components in documentation generation'

    properties:
      - name: 'only'
        type: 'FrameworkComponentType[]'
        optional: true
        description: 'Include only these component types'

      - name: 'exclude'
        type: 'FrameworkComponentType[]'
        optional: true
        description: 'Exclude these component types'

    custom-tags:
      since: '1.0.0'
      filtering: 'Component inclusion/exclusion for documentation'

# === CONSTANTS ===
constants:
  globalDocumentationRegistry:
    description: 'Global documentation registry instance'
    business-context: 'Singleton registry for accessing documentation examples throughout the application'

    type: 'IDocumentationRegistry'

    custom-tags:
      since: '1.0.0'
      global: 'Application-wide registry instance'
      singleton: 'Single shared instance'
