# FileScanner - CLI File System Scanner

# === FILE METADATA ===
file-name: 'file-scanner'
title: 'FileScanner - Documentation File Discovery System'
description: 'High-performance recursive file scanner with metadata extraction'
business-context: 'Enterprise documentation discovery and parsing infrastructure'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  FileScanner:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Advanced file scanner with timeout protection and metadata parsing'
      business-context: 'High-performance documentation discovery for enterprise systems'

      formats:
        jsdoc:
          description: 'Scans and parses documentation files efficiently'
        cli:
          description: |
            ## FileScanner
            Enterprise-grade file discovery system with metadata extraction

      custom-tags:
        since: '1.0.0'
        performance: 'Optimized recursive scanning with timeout protection'
        metadata: 'Automatic extraction from markdown headers and paths'
        interfaces: 'Implements IFileScanner interface'

    # Methods
    methods:
      scanDirectory:
        description: 'Scan directory recursively for markdown files with timeout protection'
        business-context: 'Main directory scanning operation for documentation discovery'

        parameters:
          - name: 'path'
            type: 'string'
            description: 'Directory path to scan recursively'

        returns:
          type: 'Promise<string[]>'
          description: 'Array of discovered markdown file paths'

        custom-tags:
          main-operation: 'Primary directory scanning method'
          timeout-protection: 'Built-in protection against infinite loops'
          recursive: 'Processes subdirectories automatically'

        examples:
          - id: 'scan-documentation'
            code: |
              const scanner = new FileScanner();

              const files = await scanner.scanDirectory('./docs/examples');
              console.log(`Found ${files.length} documentation files`);

              // Files are returned as absolute paths
              files.forEach(file => {
                console.log(`  - ${file}`);
              });

      parseExampleFile:
        description: 'Parse example file and extract metadata'
        business-context: 'Comprehensive file parsing for documentation registry'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'Absolute path to markdown file to parse'

        returns:
          type: 'Promise<ExampleFile>'
          description: 'Parsed file with extracted metadata and content'

        custom-tags:
          parsing: 'Extracts metadata from headers and content'
          validation: 'Validates file structure and accessibility'

        examples:
          - id: 'parse-example-file'
            code: |
              const filePath = '/docs/examples/domain/aggregates/basic.md';
              const exampleFile = await scanner.parseExampleFile(filePath);

              console.log('Example metadata:', {
                id: exampleFile.metadata.id,
                complexity: exampleFile.metadata.complexity,
                domain: exampleFile.metadata.domain,
                patterns: exampleFile.metadata.patterns
              });

      extractMetadata:
        description: 'Extract metadata from markdown file headers'
        business-context: 'Parse structured metadata for example classification'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Markdown file content to parse'

        returns:
          type: "ExampleFile['metadata']"
          description: 'Extracted metadata object with structured information'

        custom-tags:
          header-parsing: 'Processes markdown headers for metadata extraction'
          structured-data: 'Returns typed metadata object'

        examples:
          - id: 'extract-metadata'
            code: |
              const content = `
              # AggregateRoot - Basic Example

              **Version**: 1.0.0
              **Package**: @vytches/ddd-aggregates  
              **Complexity**: basic
              **Domain**: domain-modeling
              **Patterns**: aggregate-pattern, ddd-building-blocks
              `;

              const metadata = scanner.extractMetadata(content);
              console.log('Extracted:', metadata.patterns); // ['aggregate-pattern', 'ddd-building-blocks']

      isFileAccessible:
        description: 'Check if file exists and is readable'
        business-context: 'File system validation for reliable scanning operations'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path to check for accessibility'

        returns:
          type: 'Promise<boolean>'
          description: 'True if file exists and is readable'

        custom-tags:
          validation: 'File system accessibility check'
          async: 'Non-blocking file system operation'

        examples:
          - id: 'check-file-access'
            code: |
              const filePath = './docs/examples/domain/aggregates/basic.md';
              const isAccessible = await scanner.isFileAccessible(filePath);

              if (isAccessible) {
                const parsed = await scanner.parseExampleFile(filePath);
                console.log('File parsed successfully:', parsed.metadata.id);
              } else {
                console.warn('File not accessible:', filePath);
              }

      getFileModificationTime:
        description: 'Get file modification time for caching'
        business-context: 'Cache invalidation and change detection for performance optimization'

        parameters:
          - name: 'filePath'
            type: 'string'
            description: 'File path to get modification time for'

        returns:
          type: 'Promise<Date>'
          description: 'File modification timestamp'

        custom-tags:
          caching: 'Supports intelligent cache invalidation'
          performance: 'Enables efficient file change detection'

        examples:
          - id: 'file-modification-time'
            code: |
              const filePath = './docs/examples/domain/aggregates/basic.md';
              const modTime = await scanner.getFileModificationTime(filePath);

              console.log(`File last modified: ${modTime.toISOString()}`);

              // Use for cache validation
              const cachedTime = cache.get(filePath)?.modTime;
              if (!cachedTime || modTime > cachedTime) {
                // File changed, re-parse
                const parsed = await scanner.parseExampleFile(filePath);
                cache.set(filePath, { data: parsed, modTime });
              }
