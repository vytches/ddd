# ContextAwarePrompts - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'context-aware-prompts'
title: 'ContextAwarePromptEngine - Intelligent CLI Prompts'
description: 'Context-aware prompting system with intelligent project analysis'
business-context: 'Advanced CLI prompting that provides intelligent suggestions based on project context and DDD patterns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ContextAwarePromptEngine:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Intelligent prompting engine with context-aware suggestions'
      business-context: 'Advanced CLI system that analyzes project structure and provides intelligent suggestions for DDD development'

      # Format-specific
      formats:
        jsdoc:
          description: 'Context-aware prompt engine with project analysis'
        cli:
          description: |
            ## ContextAwarePromptEngine

            Intelligent prompting system that analyzes project context to provide
            relevant suggestions for DDD component generation and architectural decisions.

      custom-tags:
        since: '1.0.0'
        pattern: 'Engine Pattern, Strategy Pattern, Analysis Pattern'
        features: 'Project analysis, intelligent suggestions, context adaptation, pattern detection'
        implements: 'SmartPromptEngine'

    # Methods
    methods:
      create:
        description: 'Factory method to create prompt engine'
        business-context: 'Creates configured prompt engine instance'

        returns:
          type: 'ContextAwarePromptEngine'
          description: 'Configured prompt engine instance'

        examples:
          - id: 'create-engine'
            code: |
              const promptEngine = ContextAwarePromptEngine.create();
              // Ready for intelligent prompting

        custom-tags:
          static: 'true'
          factory-method: 'Creates configured instance'

      analyzeContext:
        description: 'Analyze project context for intelligent suggestions'
        business-context: 'Comprehensive project analysis including structure, patterns, dependencies, and conventions'

        parameters:
          - name: 'context'
            type: 'WorkflowContext'
            description: 'Current workflow context for analysis'

        returns:
          type: 'Promise<ProjectAnalysis>'
          description: 'Complete project analysis with patterns and suggestions'

        examples:
          - id: 'analyze-context'
            code: |
              const analysis = await promptEngine.analyzeContext(workflowContext);
              console.log(`Detected frameworks: ${analysis.frameworks.join(', ')}`);
              console.log(`DDD patterns found: ${analysis.dddPatterns.length}`);
              console.log(`Project structure: ${analysis.projectStructure.type}`);

        custom-tags:
          async: 'true'
          analysis: 'Comprehensive project examination'
          caching: 'Results cached for performance'

      generateSuggestions:
        description: 'Generate intelligent suggestions for prompts'
        business-context: 'Creates contextual suggestions based on project analysis and current prompt'

        parameters:
          - name: 'prompt'
            type: 'ContextAwarePrompt'
            description: 'Prompt configuration for suggestions'

          - name: 'context'
            type: 'WorkflowContext'
            description: 'Current workflow context'

        returns:
          type: 'Promise<PromptSuggestion[]>'
          description: 'Intelligent suggestions for prompt choices'

        examples:
          - id: 'generate-suggestions'
            code: |
              const suggestions = await promptEngine.generateSuggestions(
                componentPrompt,
                workflowContext
              );

              suggestions.forEach(suggestion => {
                console.log(`${suggestion.value} - ${suggestion.description}`);
                console.log(`Confidence: ${suggestion.confidence}%`);
              });

        custom-tags:
          async: 'true'
          intelligence: 'Context-based suggestion generation'

      adaptPrompt:
        description: 'Adapt prompt based on context'
        business-context: 'Modifies prompt configuration to match project context and detected patterns'

        parameters:
          - name: 'prompt'
            type: 'ContextAwarePrompt'
            description: 'Original prompt to adapt'

          - name: 'context'
            type: 'WorkflowContext'
            description: 'Current workflow context'

        returns:
          type: 'Promise<PromptConfig>'
          description: 'Adapted prompt configuration'

        examples:
          - id: 'adapt-prompt'
            code: |
              const adaptedPrompt = await promptEngine.adaptPrompt(
                basePrompt,
                workflowContext
              );

              // Prompt now includes context-specific choices and defaults

        custom-tags:
          async: 'true'
          adaptation: 'Context-driven prompt modification'

      analyzeProjectStructure:
        description: 'Analyze project directory structure'
        business-context: 'Internal analysis of project organization and file structure patterns'
        visibility: 'private'

      detectPatterns:
        description: 'Detect DDD and architectural patterns'
        business-context: 'Internal pattern recognition for DDD entities, aggregates, services, and architectural styles'
        visibility: 'private'

        custom-tags:
          pattern-detection: 'Recognizes DDD and architectural patterns'

      analyzeDependencies:
        description: 'Analyze project dependencies'
        business-context: 'Internal dependency analysis for framework and library detection'
        visibility: 'private'

      detectFrameworks:
        description: 'Detect frameworks in use'
        business-context: 'Internal framework detection from dependencies and file structure'
        visibility: 'private'

        custom-tags:
          framework-detection: 'Identifies NestJS, Express, Fastify, etc.'

      analyzeNamingConventions:
        description: 'Analyze naming conventions'
        business-context: 'Internal analysis of project naming patterns and conventions'
        visibility: 'private'

      generateContextSuggestions:
        description: 'Generate context-based suggestions'
        business-context: 'Internal suggestion generation based on current context'
        visibility: 'private'

      generateProjectSuggestions:
        description: 'Generate project-level suggestions'
        business-context: 'Internal suggestion generation based on project-wide analysis'
        visibility: 'private'

      categorizeDependency:
        description: 'Categorize dependency by name'
        business-context: 'Internal utility for dependency classification'
        visibility: 'private'

      extractDomainWords:
        description: 'Extract domain words from project context'
        business-context: 'Internal domain language extraction for intelligent suggestions'
        visibility: 'private'

      scanAllFiles:
        description: 'Scan all TypeScript files in project'
        business-context: 'Internal file system scanning for comprehensive analysis'
        visibility: 'private'

      scanDirectory:
        description: 'Recursively scan directory for TypeScript files'
        business-context: 'Internal recursive directory scanning utility'
        visibility: 'private'

      displayAnalysis:
        description: 'Display project analysis results'
        business-context: 'Pretty-print analysis results for user feedback'

        parameters:
          - name: 'analysis'
            type: 'ProjectAnalysis'
            description: 'Analysis results to display'

        examples:
          - id: 'display-analysis'
            code: |
              promptEngine.displayAnalysis(analysis);
              // Shows formatted analysis with detected patterns,
              // frameworks, and architectural insights

        custom-tags:
          display: 'User-friendly analysis presentation'

  SmartPrompts:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Factory for creating intelligent context-aware prompts'
      business-context: 'Provides pre-configured intelligent prompts for common CLI scenarios'

      # Format-specific
      formats:
        jsdoc:
          description: 'Factory for context-aware prompts'
        cli:
          description: |
            ## SmartPrompts

            Factory class providing pre-configured intelligent prompts
            for common DDD development scenarios.

      custom-tags:
        since: '1.0.0'
        pattern: 'Factory Pattern'
        features: 'Smart prompts, context awareness, intelligent defaults'

    # Methods
    methods:
      componentName:
        description: 'Create component name prompt with intelligent suggestions'
        business-context: 'Creates smart prompt for component naming with context-aware suggestions'

        parameters:
          - name: 'componentType'
            type: 'string'
            description: 'Type of component being created (entity, aggregate, service, etc.)'

        returns:
          type: 'ContextAwarePrompt'
          description: 'Configured prompt with intelligent naming suggestions'

        examples:
          - id: 'component-name-prompt'
            code: |
              const prompt = SmartPrompts.componentName('aggregate');
              // Creates intelligent prompt for aggregate naming
              // with suggestions based on project context

        custom-tags:
          static: 'true'
          smart-suggestions: 'Context-based component naming'

      frameworkSelection:
        description: 'Create framework selection prompt with auto-detection'
        business-context: 'Creates smart prompt for framework selection with automatic detection and recommendations'

        returns:
          type: 'ContextAwarePrompt'
          description: 'Framework selection prompt with auto-detection'

        examples:
          - id: 'framework-selection'
            code: |
              const prompt = SmartPrompts.frameworkSelection();
              // Creates prompt that auto-detects current framework
              // and suggests appropriate options

        custom-tags:
          static: 'true'
          auto-detection: 'Automatically detects current framework'

      architectureSelection:
        description: 'Create architecture selection prompt with detection'
        business-context: 'Creates smart prompt for architectural pattern selection with context-based detection'

        returns:
          type: 'ContextAwarePrompt'
          description: 'Architecture selection prompt with pattern detection'

        examples:
          - id: 'architecture-selection'
            code: |
              const prompt = SmartPrompts.architectureSelection();
              // Creates prompt that detects current architecture
              // and suggests compatible patterns

        custom-tags:
          static: 'true'
          architecture-detection: 'Detects and suggests architectural patterns'
