# Workflow Engine - Multi-Step Process Orchestration

# === FILE METADATA ===
file-name: 'workflow-engine'
title: 'Workflow Engine - Process Orchestration'
description: 'Orchestrates complex multi-step CLI workflows with state management'
business-context: 'Enables guided domain modeling and generation processes with step-by-step execution'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  WorkflowEngine:
    class-doc:
      description: 'State-driven workflow execution engine for CLI processes'
      business-context: 'Manages complex multi-step processes with context preservation and step navigation'

    methods:
      constructor:
        description: 'Creates workflow engine with optional initial context'
        business-context: 'Initializes engine with state management for multi-step processes'

        parameters:
          - name: 'initialContext'
            type: 'Partial<WorkflowContext>'
            description: 'Optional initial workflow context'
            optional: true

        examples:
          - code: |
              import { WorkflowEngine } from '@vytches/ddd-cli';

              const engine = new WorkflowEngine({
                projectPath: './src',
                framework: 'nestjs'
              });

      create:
        description: 'Factory method to create workflow engine instance'
        business-context: 'Provides convenient engine creation with context initialization'

        parameters:
          - name: 'initialContext'
            type: 'Partial<WorkflowContext>'
            description: 'Optional initial workflow context'
            optional: true

        returns:
          type: 'WorkflowEngine'
          description: 'Configured workflow engine'

        custom-tags:
          static: 'true'
          factory-method: 'true'

        examples:
          - code: |
              const engine = WorkflowEngine.create({
                boundedContext: 'UserManagement',
                targetFramework: 'nestjs'
              });

      registerStep:
        description: 'Register single workflow step with execution logic'
        business-context: 'Adds step to workflow registry for execution sequence'

        parameters:
          - name: 'step'
            type: 'WorkflowStep'
            description: 'Workflow step definition'

        returns:
          type: 'void'
          description: 'Step registered successfully'

        examples:
          - code: |
              engine.registerStep({
                id: 'select-framework',
                title: 'Choose Framework',
                type: 'prompt',
                prompt: {
                  type: 'select',
                  message: 'Select your preferred framework:',
                  choices: ['nestjs', 'express', 'fastify', 'standalone']
                },
                next: 'define-aggregates'
              });

      registerSteps:
        description: 'Register multiple workflow steps as batch operation'
        business-context: 'Batch step registration for complex workflow definitions'

        parameters:
          - name: 'steps'
            type: 'WorkflowStep[]'
            description: 'Array of workflow step definitions'

        returns:
          type: 'void'
          description: 'All steps registered successfully'

        examples:
          - code: |
              const domainBuilderSteps = [
                {
                  id: 'welcome',
                  title: 'Welcome to Domain Builder',
                  type: 'action',
                  action: async (context) => {
                    console.log('Starting domain modeling workflow...');
                  },
                  next: 'select-framework'
                },
                {
                  id: 'select-framework',
                  title: 'Framework Selection',
                  type: 'prompt',
                  prompt: {
                    type: 'select',
                    message: 'Choose framework:',
                    choices: ['nestjs', 'express', 'fastify']
                  },
                  next: 'define-domain'
                },
                {
                  id: 'completion',
                  title: 'Workflow Complete',
                  type: 'completion'
                }
              ];

              engine.registerSteps(domainBuilderSteps);

      start:
        description: 'Start workflow execution from specified step'
        business-context: 'Initiates workflow execution with step navigation and state management'

        parameters:
          - name: 'startStepId'
            type: 'string'
            description: 'ID of starting workflow step'

        returns:
          type: 'Promise<WorkflowContext>'
          description: 'Final workflow context after completion'

        custom-tags:
          async: 'true'
          main-execution: 'true'

        examples:
          - code: |
              // Start domain builder workflow
              const finalContext = await engine.start('welcome');

              console.log('Workflow completed with context:', finalContext);
              console.log(`Generated ${finalContext.generatedFiles.length} files`);

      executeStep:
        description: 'Execute single workflow step with type-specific logic'
        business-context: 'Core step execution with proper type handling and context updates'

        custom-tags:
          private: 'true'
          execution-core: 'true'

      executePromptStep:
        description: 'Execute prompt step with user interaction'
        business-context: 'Handles user input collection with validation and context updates'

        custom-tags:
          private: 'true'
          user-interaction: 'true'

      executeActionStep:
        description: 'Execute action step with business logic'
        business-context: 'Performs automated actions like file generation and validation'

        custom-tags:
          private: 'true'
          automation: 'true'

      executeDecisionStep:
        description: 'Execute decision step with conditional routing'
        business-context: 'Implements conditional workflow branching based on context'

        custom-tags:
          private: 'true'
          conditional-routing: 'true'

      executeCompletionStep:
        description: 'Execute completion step with finalization logic'
        business-context: 'Finalizes workflow with summary and cleanup operations'

        custom-tags:
          private: 'true'
          finalization: 'true'

      getNextStep:
        description: 'Determine next step based on current configuration and context'
        business-context: 'Implements step navigation logic with conditional routing'

        custom-tags:
          private: 'true'
          navigation: 'true'
