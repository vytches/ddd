# Example Engine - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'engine'
title: 'ExampleEngine - Example Processing and Caching System'
description: 'Core example processing engine with caching, validation, and multi-format output'
business-context: 'High-performance example processing system for CLI documentation generation with intelligent caching'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ExampleEngine:
    class-doc:
      description: 'Comprehensive example processing engine with caching, validation, and formatted output'
      business-context: 'Central example processing system providing high-performance example extraction, validation, and multi-format output for CLI documentation generation'

      custom-tags:
        since: '1.0.0'
        patterns: 'Engine pattern, Caching pattern, Strategy pattern for output formatting'
        capabilities: 'Example scanning, content extraction, validation, caching, multi-format output'
        interface: 'IExampleEngine'

    methods:
      constructor:
        description: 'Initialize example engine with file scanner, tag extractor, validator, and cache'
        business-context: 'Sets up complete example processing pipeline with all necessary components'

        examples:
          - id: 'basic-initialization'
            code: |
              const engine = new ExampleEngine();

      clearGlobalCache:
        description: 'Clear global cache for testing or between builds'
        business-context: 'Utility method for cache management during testing or build processes'

        returns:
          type: 'void'
          description: 'Cache cleared successfully'

        custom-tags:
          static: 'true'
          utility: 'Cache management'
          use-cases: 'Testing, build processes'

        examples:
          - id: 'clear-cache'
            code: |
              ExampleEngine.clearGlobalCache();

      scanFolder:
        description: 'Scan folder for example files with intelligent caching and deduplication'
        business-context: 'High-performance folder scanning with caching to avoid redundant filesystem operations'

        parameters:
          - name: 'folderPath'
            type: 'string'
            description: 'Path to folder containing example files'

        returns:
          type: 'Promise<ExampleFile[]>'
          description: 'Array of discovered example files'

        custom-tags:
          async: 'true'
          caching: 'Global cache with deduplication'
          performance: 'Avoids redundant scans'

        examples:
          - id: 'scan-examples-folder'
            code: |
              const exampleFiles = await engine.scanFolder('./docs/examples/domain/aggregates');

      extractTaggedContent:
        description: 'Extract tagged content from example file using specified tag'
        business-context: 'Parses example files to extract specific tagged sections for documentation generation'

        parameters:
          - name: 'file'
            type: 'ExampleFile'
            description: 'Example file to process'
          - name: 'tag'
            type: 'string'
            description: 'Tag to extract content for'

        returns:
          type: 'Promise<ExtractedExample | null>'
          description: 'Extracted example content or null if not found'

        custom-tags:
          async: 'true'
          parsing: 'Tagged content extraction'
          null-safe: 'Returns null for missing content'

        examples:
          - id: 'extract-method-example'
            code: |
              const example = await engine.extractTaggedContent(file, 'commit:domain:basic');

      formatOutput:
        description: 'Format extracted content for specified output type with proper formatting'
        business-context: 'Transforms example content into appropriate format for different output targets'

        parameters:
          - name: 'content'
            type: 'string'
            description: 'Raw example content'
          - name: 'outputType'
            type: 'OutputType'
            description: 'Target output format (JSDoc, CLI, etc.)'

        returns:
          type: 'string'
          description: 'Formatted content for specified output type'

        custom-tags:
          formatting: 'Multi-format output'
          strategy-pattern: 'Different formatters for different outputs'

        examples:
          - id: 'format-for-jsdoc'
            code: |
              const jsdocContent = engine.formatOutput(rawContent, 'jsdoc');

          - id: 'format-for-cli'
            code: |
              const cliContent = engine.formatOutput(rawContent, 'cli');

      getExamplesForMethod:
        description: 'Get all examples for specific method across all complexity layers'
        business-context: 'Comprehensive method example retrieval for complete documentation coverage'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name to find examples for'
          - name: 'packageName'
            type: 'string'
            description: 'Package name to search within'

        returns:
          type: 'Promise<ExtractedExample[]>'
          description: 'Array of examples for the method'

        custom-tags:
          async: 'true'
          comprehensive: 'All layers and complexity levels'
          method-centric: 'Method-focused example retrieval'

        examples:
          - id: 'get-method-examples'
            code: |
              const examples = await engine.getExamplesForMethod('commit', 'aggregates');

      findExampleFileForMethod:
        description: 'Find example file containing specific method documentation'
        business-context: 'Locates the file containing method-specific examples for targeted processing'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name to locate'
          - name: 'packageName'
            type: 'string'
            description: 'Package name context'

        returns:
          type: 'Promise<ExampleFile | null>'
          description: 'Example file containing method or null if not found'

        custom-tags:
          async: 'true'
          file-location: 'Method-specific file finding'
          null-safe: 'Returns null for missing files'

      validateExample:
        description: 'Validate extracted example for completeness and correctness'
        business-context: 'Ensures example quality and completeness before output generation'

        parameters:
          - name: 'example'
            type: 'ExtractedExample'
            description: 'Example to validate'

        returns:
          type: 'Promise<ValidationResult>'
          description: 'Validation result with errors and warnings'

        custom-tags:
          async: 'true'
          quality-assurance: 'Example validation'
          error-reporting: 'Comprehensive validation results'

        examples:
          - id: 'validate-example'
            code: |
              const validation = await engine.validateExample(extractedExample);
              if (!validation.isValid) {
                console.log('Validation errors:', validation.errors);
              }

      getBestExampleForMethod:
        description: 'Get best example for method using prioritized selection criteria'
        business-context: 'Intelligent example selection based on layer preference and complexity requirements'

        parameters:
          - name: 'methodName'
            type: 'string'
            description: 'Method name to find best example for'
          - name: 'packageName'
            type: 'string'
            description: 'Package name context'
          - name: 'preferredLayer'
            type: 'LayerType | undefined'
            description: 'Optional preferred layer (domain, application, infrastructure)'
          - name: 'preferredComplexity'
            type: 'ComplexityLevel | undefined'
            description: 'Optional preferred complexity level'

        returns:
          type: 'Promise<ExtractedExample | null>'
          description: 'Best matching example or null if not found'

        custom-tags:
          async: 'true'
          intelligent-selection: 'Prioritized example selection'
          preferences: 'Layer and complexity preferences'

        examples:
          - id: 'get-best-example'
            code: |
              const bestExample = await engine.getBestExampleForMethod(
                'commit', 
                'aggregates',
                'domain',
                'intermediate'
              );

      clearCache:
        description: 'Clear instance cache for fresh scanning and processing'
        business-context: 'Cache management for testing or when fresh processing is needed'

        returns:
          type: 'void'
          description: 'Instance cache cleared'

        custom-tags:
          utility: 'Cache management'
          instance-method: 'Clears instance cache only'

      getCacheStats:
        description: 'Get cache statistics including size and keys for monitoring'
        business-context: 'Cache monitoring and debugging information for performance optimization'

        returns:
          type: 'object'
          description: 'Cache statistics with size and keys'

        custom-tags:
          monitoring: 'Cache statistics'
          debugging: 'Cache inspection'

        examples:
          - id: 'get-cache-stats'
            code: |
              const stats = engine.getCacheStats();
              console.log(`Cache size: ${stats.size}, Keys: ${stats.keys.length}`);

      formatForJSDoc:
        description: 'Format content for JSDoc injection with proper escaping and formatting'
        business-context: 'Prepares example content for JSDoc comment injection'

        returns:
          type: 'string'
          description: 'JSDoc-formatted content'

        custom-tags:
          formatting: 'JSDoc-specific formatting'
          private: 'Internal formatting method'

      formatForCLI:
        description: 'Format content for CLI display with terminal-appropriate formatting'
        business-context: 'Prepares example content for command-line interface display'

        returns:
          type: 'string'
          description: 'CLI-formatted content'

        custom-tags:
          formatting: 'CLI-specific formatting'
          private: 'Internal formatting method'

      resolveExamplesPath:
        description: 'Resolve examples path for specified package'
        business-context: 'Constructs proper file system paths for package-specific examples'

        returns:
          type: 'string'
          description: 'Resolved examples path'

        custom-tags:
          path-resolution: 'Package-specific paths'
          private: 'Internal path utility'

      validateExamples:
        description: 'Batch validate multiple examples for efficient processing'
        business-context: 'Efficient batch validation for multiple examples with consolidated results'

        parameters:
          - name: 'examples'
            type: 'ExtractedExample[]'
            description: 'Array of examples to validate'

        returns:
          type: 'Promise<ValidationResult[]>'
          description: 'Array of validation results'

        custom-tags:
          async: 'true'
          batch-processing: 'Multiple example validation'
          efficiency: 'Batch processing for performance'

      getPackageStatistics:
        description: 'Get comprehensive statistics for package examples including coverage and validation'
        business-context: 'Package-level analytics for example coverage monitoring and quality assessment'

        parameters:
          - name: 'packageName'
            type: 'string'
            description: 'Package name to analyze'

        returns:
          type: 'Promise<object>'
          description: 'Comprehensive package statistics'

        custom-tags:
          async: 'true'
          analytics: 'Package-level statistics'
          comprehensive: 'Complete coverage analysis'

        examples:
          - id: 'get-package-stats'
            code: |
              const stats = await engine.getPackageStatistics('aggregates');
              console.log(`Total examples: ${stats.totalExamples}`);
              console.log(`Valid examples: ${stats.validationResults.valid}`);
              console.log('Methods covered:', stats.methods.join(', '));
