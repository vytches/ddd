# Example Interfaces - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'interfaces'
title: 'CLI Example Engine Interfaces - Core Contracts'
description: 'Core interface definitions for example processing system'
business-context: 'Comprehensive interface contracts for example engine architecture with separation of concerns'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IExampleEngine:
    description: 'Core example extraction engine interface defining primary example processing operations'
    business-context: 'Central contract for example processing system providing scanning, extraction, and validation capabilities'

    custom-tags:
      since: '1.0.0'
      patterns: 'Interface segregation principle'
      capabilities: 'Example scanning, content extraction, validation, multi-format output'
      core-interface: 'Primary engine contract'

    properties:
      - name: 'scanFolder'
        type: '(folderPath: string) => Promise<ExampleFile[]>'
        description: 'Scan a folder for example files with metadata extraction'
      - name: 'extractTaggedContent'
        type: '(file: ExampleFile, tag: string) => Promise<ExtractedExample | null>'
        description: 'Extract tagged content from example file'
      - name: 'formatOutput'
        type: '(content: string, outputType: OutputType) => string'
        description: 'Format extracted content for specific output type'
      - name: 'getExamplesForMethod'
        type: '(methodName: string, packageName: string) => Promise<ExtractedExample[]>'
        description: 'Get examples for a specific method across all layers'
      - name: 'validateExample'
        type: '(example: ExtractedExample) => Promise<ValidationResult>'
        description: 'Validate extracted example against layer rules'

  IJSDocAdapter:
    description: 'JSDoc-specific adapter interface for JSDoc comment processing and injection'
    business-context: 'Specialized interface for JSDoc integration with YAML metadata system support'

    custom-tags:
      since: '1.0.0'
      patterns: 'Adapter pattern for JSDoc integration'
      capabilities: 'JSDoc injection, metadata processing, code transformation'
      yaml-integration: 'Enhanced Metadata System V2 support'

    properties:
      - name: 'getExampleForMethod'
        type: '(methodName: string, packageName: string, layer?: LayerType, complexity?: ComplexityLevel) => Promise<string>'
        description: 'Get best example for method at specific layer'
      - name: 'injectIntoJSDoc'
        type: '(code: string, methodName: string, packageName: string) => Promise<string>'
        description: 'Inject examples into JSDoc comments'
      - name: 'processInjectionDirectives'
        type: '(code: string, filePath: string) => Promise<string>'
        description: 'Process JSDoc directives using YAML metadata system'

  ICLIAdapter:
    description: 'CLI-specific adapter interface for command-line interface operations'
    business-context: 'Specialized interface for CLI example generation and documentation display'

    custom-tags:
      since: '1.0.0'
      patterns: 'Adapter pattern for CLI integration'
      capabilities: 'Example generation, documentation creation, example listing'
      cli-focused: 'Command-line interface operations'

    properties:
      - name: 'getCompleteExample'
        type: '(packageName: string, framework?: string) => Promise<string>'
        description: 'Get complete example file for package'
      - name: 'generateDocumentation'
        type: '(options: GenerationOptions) => Promise<string>'
        description: 'Generate documentation with specified options'
      - name: 'listExamples'
        type: '(packageName?: string) => Promise<ExampleFile[]>'
        description: 'List available examples for package'

  IExampleValidator:
    description: 'Example validation engine interface for comprehensive example quality assurance'
    business-context: 'Validation contract ensuring example quality, compilation success, and best practice adherence'

    custom-tags:
      since: '1.0.0'
      patterns: 'Strategy pattern for validation'
      capabilities: 'Layer validation, compilation checking, best practice validation'
      quality-assurance: 'Example quality control'

    properties:
      - name: 'validateExample'
        type: '(example: ExtractedExample, rules: ExampleValidationRules) => ValidationResult'
        description: 'Validate example against layer-specific rules'
      - name: 'validateCompilation'
        type: '(content: string) => Promise<ValidationResult>'
        description: 'Check if example compiles successfully'
      - name: 'validateBestPractices'
        type: '(example: ExtractedExample) => ValidationResult'
        description: 'Validate example follows best practices'

  IFileScanner:
    description: 'File system operations interface for example file discovery and parsing'
    business-context: 'File system abstraction for example file management with metadata extraction'

    custom-tags:
      since: '1.0.0'
      patterns: 'Repository pattern for file operations'
      capabilities: 'Directory scanning, file parsing, metadata extraction'
      file-operations: 'File system abstractions'

    properties:
      - name: 'scanDirectory'
        type: '(path: string) => Promise<string[]>'
        description: 'Scan directory for markdown files'
      - name: 'parseExampleFile'
        type: '(filePath: string) => Promise<ExampleFile>'
        description: 'Read and parse example file'
      - name: 'extractMetadata'
        type: "(content: string) => ExampleFile['metadata']"
        description: 'Extract metadata from file headers'

    examples:
      - id: 'basic-file-scanning'
        code: |
          // File scanner implementation
          class ExampleFileScanner implements IFileScanner {
            async scanDirectory(path: string): Promise<string[]> {
              return await fs.readdir(path);
            }
            
            async parseExampleFile(filePath: string): Promise<ExampleFile> {
              const content = await fs.readFile(filePath, 'utf8');
              return {
                path: filePath,
                content,
                metadata: this.extractMetadata(content)
              };
            }
          }

      - id: 'adapter-usage'
        code: |
          // Adapter pattern usage
          class JSDocExampleAdapter implements IJSDocAdapter {
            async getExampleForMethod(
              methodName: string, 
              packageName: string,
              layer?: LayerType
            ): Promise<string> {
              // Implementation using example engine
              return await this.engine.getBestExampleForMethod(
                methodName, packageName, layer
              );
            }
          }
