# CLI Validation - Input Validation Utilities
# Enhanced Metadata System V2 - Comprehensive CLI input validation

# === FILE METADATA ===
file-name: 'validation'
title: 'CLI Validation - Input Validation System'
description: 'Comprehensive validation utilities for CLI inputs and parameters'
business-context: 'Robust input validation ensuring data integrity and proper error handling across all CLI operations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  Validation:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Comprehensive validation utility class for CLI inputs'
      business-context: 'Central validation system providing type-safe input validation with detailed error messages for CLI operations'

      formats:
        jsdoc:
          description: 'Input validation utilities for CLI'
        cli:
          description: |
            ## Validation
            Comprehensive input validation for CLI operations with detailed error reporting

      custom-tags:
        since: '1.0.0'
        pattern: 'Utility Pattern'
        features: 'Type validation, pattern matching, composite validation'

    # Methods
    methods:
      required:
        description: 'Validate that a string is not empty or whitespace-only'
        business-context: 'Essential validation for mandatory CLI inputs preventing empty submissions'

        parameters:
          - name: 'value'
            type: 'string'
            description: 'String value to validate'
          - name: 'fieldName'
            type: 'string'
            description: 'Optional field name for error messages'

        returns:
          type: 'void'
          description: 'Throws ValidationError if value is empty'

        custom-tags:
          throws: 'ValidationError - When value is empty or whitespace'

        examples:
          - id: 'basic-required'
            code: |
              Validation.required(componentName, 'Component Name');
              // Throws if empty: "Component Name is required"

      stringLength:
        description: 'Validate string length within specified bounds'
        business-context: 'Ensures component names and paths meet size requirements for proper file system handling'

        parameters:
          - name: 'value'
            type: 'string'
            description: 'String to validate length'
          - name: 'min'
            type: 'number'
            description: 'Minimum length (optional)'
          - name: 'max'
            type: 'number'
            description: 'Maximum length (optional)'
          - name: 'fieldName'
            type: 'string'
            description: 'Field name for error messages'

        returns:
          type: 'void'
          description: 'Throws ValidationError if length is invalid'

        examples:
          - id: 'length-validation'
            code: |
              Validation.stringLength(name, 2, 50, 'Component Name');
              // Ensures name is between 2-50 characters

      pattern:
        description: 'Validate string matches regular expression pattern'
        business-context: 'Enforces naming conventions and format requirements for generated components'

        parameters:
          - name: 'value'
            type: 'string'
            description: 'String to validate against pattern'
          - name: 'pattern'
            type: 'RegExp'
            description: 'Regular expression pattern to match'
          - name: 'message'
            type: 'string'
            description: 'Custom error message'
          - name: 'fieldName'
            type: 'string'
            description: 'Field name for error messages'

        returns:
          type: 'void'
          description: 'Throws ValidationError if pattern does not match'

        examples:
          - id: 'pattern-validation'
            code: |
              const pascalCase = /^[A-Z][a-zA-Z0-9]*$/;
              Validation.pattern(className, pascalCase, 'Must be PascalCase', 'Class Name');

      componentName:
        description: 'Validate component name follows DDD naming conventions'
        business-context: 'Ensures generated components follow PascalCase naming and valid identifier rules'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Component name to validate'

        returns:
          type: 'void'
          description: 'Throws ValidationError if name is invalid'

        examples:
          - id: 'component-naming'
            code: |
              Validation.componentName('UserAggregate'); // Valid
              Validation.componentName('user-service'); // Throws: Must be PascalCase

      filePath:
        description: 'Validate file path format and accessibility'
        business-context: 'Ensures output paths are valid for file system operations and component generation'

        parameters:
          - name: 'path'
            type: 'string'
            description: 'File path to validate'

        returns:
          type: 'void'
          description: 'Throws ValidationError if path is invalid'

        examples:
          - id: 'path-validation'
            code: |
              Validation.filePath('./src/domain/entities/User.ts');
              // Validates path format and accessibility

      directoryPath:
        description: 'Validate directory path exists and is writable'
        business-context: 'Ensures output directories are accessible for component generation'

        parameters:
          - name: 'path'
            type: 'string'
            description: 'Directory path to validate'

        returns:
          type: 'void'
          description: 'Throws ValidationError if directory is invalid'

        examples:
          - id: 'directory-validation'
            code: |
              Validation.directoryPath('./src/domain');
              // Ensures directory exists and is writable

      packageName:
        description: 'Validate NPM package name follows naming rules'
        business-context: 'Ensures generated packages follow NPM naming conventions for publishing'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Package name to validate'

        returns:
          type: 'void'
          description: 'Throws ValidationError if name is invalid'

        examples:
          - id: 'package-naming'
            code: |
              Validation.packageName('@company/ddd-domain'); // Valid
              Validation.packageName('Invalid Name'); // Throws: Invalid package name

      oneOf:
        description: 'Validate value is one of allowed choices'
        business-context: 'Validates CLI options and flags against allowed values preventing invalid configurations'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Value to validate'
          - name: 'choices'
            type: 'T[]'
            description: 'Array of allowed values'
          - name: 'fieldName'
            type: 'string'
            description: 'Field name for error messages'

        returns:
          type: 'void'
          description: 'Throws ValidationError if value not in choices'

        examples:
          - id: 'choice-validation'
            code: |
              const frameworks = ['nestjs', 'express', 'fastify', 'standalone'];
              Validation.oneOf(selectedFramework, frameworks, 'Framework');

      combine:
        description: 'Combine multiple validators for complex validation'
        business-context: 'Enables composite validation scenarios for comprehensive input checking'

        parameters:
          - name: 'value'
            type: 'any'
            description: 'Value to validate'
          - name: 'validators'
            type: 'Array<(value: any) => void>'
            description: 'Array of validator functions'

        returns:
          type: 'void'
          description: 'Runs all validators, throws first validation error'

        examples:
          - id: 'combined-validation'
            code: |
              Validation.combine(componentName, [
                (v) => Validation.required(v, 'Component'),
                (v) => Validation.stringLength(v, 2, 50, 'Component'),
                (v) => Validation.componentName(v)
              ]);

      safe:
        description: 'Safe validation returning result instead of throwing'
        business-context: 'Non-throwing validation for optional validation scenarios and error collection'

        parameters:
          - name: 'value'
            type: 'T'
            description: 'Value to validate'
          - name: 'validator'
            type: '(value: T) => void'
            description: 'Validator function that may throw'

        returns:
          type: '{ isValid: boolean; error?: string }'
          description: 'Validation result with error details'

        examples:
          - id: 'safe-validation'
            code: |
              const result = Validation.safe(userInput, (v) => Validation.componentName(v));

              if (result.isValid) {
                console.log('Input is valid');
              } else {
                console.warn(`Warning: ${result.error}`);
              }

      custom:
        description: 'Create custom validator with predicate function'
        business-context: 'Enables domain-specific validation rules for specialized business requirements'

        parameters:
          - name: 'predicate'
            type: '(value: T) => boolean'
            description: 'Function returning true if valid'
          - name: 'message'
            type: 'string'
            description: 'Error message when validation fails'

        returns:
          type: '(value: T) => void'
          description: 'Validator function that can be used with other validation methods'

        examples:
          - id: 'custom-validator'
            code: |
              const isValidEntityName = Validation.custom(
                (name: string) => name.endsWith('Entity') || name.endsWith('Aggregate'),
                'Domain objects must end with Entity or Aggregate'
              );

              isValidEntityName('UserEntity'); // Passes
              isValidEntityName('UserService'); // Throws error
