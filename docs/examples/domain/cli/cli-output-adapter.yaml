# CliOutputAdapter - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'cli-output-adapter'
title: 'CliOutputAdapter - CLI/Markdown Formatting'
description: 'Pure CLI output adapter with markdown formatting'
business-context: 'Transforms resolved metadata into CLI-friendly display format'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  CliOutputAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'CLI output formatting adapter for metadata display'
      business-context: 'Transforms hierarchical metadata into readable CLI output with markdown formatting'

      # Format-specific
      formats:
        jsdoc:
          description: 'Formats resolved metadata as CLI/markdown output'
        cli:
          description: |
            ## CliOutputAdapter

            Pure CLI output formatter that transforms resolved metadata into user-friendly display format.
            Follows single responsibility principle - no metadata loading logic.

      custom-tags:
        since: '1.0.0'
        pattern: 'Adapter Pattern'
        features: 'Markdown formatting, CLI display, metadata transformation'

    # Methods
    methods:
      format:
        description: 'Format resolved metadata as CLI/markdown output'
        business-context: 'Main formatting operation for CLI display with comprehensive markdown structure'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Hierarchically resolved metadata object'

        returns:
          type: 'string'
          description: 'Formatted CLI/markdown output string'

        examples:
          - id: 'basic-format'
            code: |
              const adapter = new CliOutputAdapter();
              const formattedOutput = adapter.format(resolvedMetadata);
              console.log(formattedOutput);

        custom-tags:
          main-method: 'Primary public interface'
          single-responsibility: 'Formatting only, no metadata loading'

      formatSummary:
        description: 'Format metadata as compact one-line summary'
        business-context: 'Quick overview formatting for list displays and command line output'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata to summarize'

        returns:
          type: 'string'
          description: 'Compact one-line summary string'

        examples:
          - id: 'summary-format'
            code: |
              const summary = adapter.formatSummary(metadata);
              // Output: "AggregateRoot.commit() - Commits pending events"

      formatExamplesOnly:
        description: 'Format only examples section from metadata'
        business-context: 'Specialized formatting for example-focused display modes'

        parameters:
          - name: 'metadata'
            type: 'ResolvedMetadata'
            description: 'Metadata containing examples'

        returns:
          type: 'string'
          description: 'Formatted examples section only'

        examples:
          - id: 'examples-only'
            code: |
              const examplesOutput = adapter.formatExamplesOnly(metadata);
              // Shows only code examples without metadata

      addBusinessContext:
        description: 'Add business context section to output'
        business-context: 'Internal helper for business context formatting'
        visibility: 'private'

      addMetadataInfo:
        description: 'Add metadata information section'
        business-context: 'Internal helper for metadata info display'
        visibility: 'private'

      addWarnings:
        description: 'Add warnings section to output'
        business-context: 'Internal helper for warning message display'
        visibility: 'private'

      addExamples:
        description: 'Add examples section with code formatting'
        business-context: 'Internal helper for example code display'
        visibility: 'private'

      addCustomSections:
        description: 'Add custom metadata sections'
        business-context: 'Internal helper for extensible section display'
        visibility: 'private'

      formatSectionTitle:
        description: 'Convert metadata key to readable section title'
        business-context: 'Internal utility for consistent title formatting'
        visibility: 'private'

        examples:
          - id: 'title-formatting'
            code: |
              // Examples:
              // "performanceNote" -> "Performance Note"
              // "validation-rules" -> "Validation Rules"
              // "customField" -> "Custom Field"

      enhanceForCLI:
        description: 'Enhance text for CLI display'
        business-context: 'Internal utility to convert literal \\n to actual newlines'
        visibility: 'private'
