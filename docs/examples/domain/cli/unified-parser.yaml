# Unified Parser - Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'unified-parser'
title: 'UnifiedExampleParser - Documentation Parsing Engine'
description: 'Unified parser for base examples and framework integrations with markdown processing'
business-context: 'Comprehensive documentation parsing system supporting both base DDD examples and framework-specific integrations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === TYPES ===
types:
  ParseExampleOptions:
    description: 'Type alias for documentation parse options'
    business-context: 'Simplified type interface for example parsing configuration'

    custom-tags:
      since: '1.0.0'
      alias-of: 'DocumentationParseOptions'

# === CLASSES ===
classes:
  UnifiedExampleParser:
    class-doc:
      description: 'Unified parser for processing both base examples and framework integrations'
      business-context: 'Central documentation parsing system that handles markdown-based examples and framework-specific code integration'

      custom-tags:
        since: '1.0.0'
        patterns: 'Parser pattern, Strategy pattern for different content types'
        capabilities: 'Markdown parsing, framework integration, code extraction, component filtering'

    methods:
      constructor:
        description: 'Initialize unified parser with workspace root configuration'
        business-context: 'Sets up parser with workspace context for relative path resolution'

        parameters:
          - name: 'workspaceRoot'
            type: 'string | undefined'
            description: 'Optional workspace root path for file resolution'

        examples:
          - id: 'basic-initialization'
            code: |
              const parser = new UnifiedExampleParser();

          - id: 'workspace-initialization'
            code: |
              const parser = new UnifiedExampleParser('/path/to/workspace');

      parseExample:
        description: 'Parse example with optional framework integration support'
        business-context: 'Primary parsing method that combines base examples with framework-specific implementations'

        parameters:
          - name: 'options'
            type: 'ParseExampleOptions'
            description: 'Parsing configuration including example ID and framework'

        returns:
          type: 'Promise<ParsedDocumentationSet>'
          description: 'Complete parsed documentation set with base and framework content'

        custom-tags:
          async: 'true'
          main-method: 'Primary parsing entry point'
          integration: 'Combines base and framework examples'

        examples:
          - id: 'parse-base-example'
            code: |
              const result = await parser.parseExample({
                exampleId: 'aggregate-root-basic',
                framework: undefined
              });

          - id: 'parse-framework-integration'
            code: |
              const result = await parser.parseExample({
                exampleId: 'aggregate-root-basic',
                framework: 'nestjs',
                version: '1.0.0'
              });

      parseBaseExample:
        description: 'Parse base example from markdown file with metadata extraction'
        business-context: 'Extracts core DDD example content from markdown files'

        returns:
          type: 'Promise<BaseDocumentationContent>'
          description: 'Parsed base documentation content'

        custom-tags:
          parsing-type: 'Base examples'
          content-source: 'Markdown files'

      parseFrameworkIntegration:
        description: 'Parse framework integration from markdown file with component extraction'
        business-context: 'Processes framework-specific integration examples and components'

        returns:
          type: 'Promise<FrameworkIntegrationContent>'
          description: 'Parsed framework integration content'

        custom-tags:
          parsing-type: 'Framework integration'
          content-source: 'Framework-specific markdown files'

      mergeExamples:
        description: 'Merge base and framework examples into unified documentation set'
        business-context: 'Combines base DDD patterns with framework-specific implementation details'

        returns:
          type: 'MergedDocumentationContent'
          description: 'Merged documentation with both base and framework content'

        custom-tags:
          merge-strategy: 'Base + Framework integration'
          output-type: 'Unified documentation'

      extractSection:
        description: 'Extract text section from markdown content using section headers'
        business-context: 'Utility method for extracting specific markdown sections by header'

        returns:
          type: 'string'
          description: 'Extracted section text content'

        custom-tags:
          utility: 'Markdown processing'
          extraction-type: 'Text sections'

      extractCodeSection:
        description: 'Extract code section from markdown with language detection'
        business-context: 'Extracts code blocks with proper language identification and formatting'

        returns:
          type: 'string'
          description: 'Extracted code content'

        custom-tags:
          utility: 'Code extraction'
          extraction-type: 'Code blocks'

      extractListSection:
        description: 'Extract list items from markdown section with proper formatting'
        business-context: 'Processes markdown lists for features, pitfalls, and related content'

        returns:
          type: 'string[]'
          description: 'Array of extracted list items'

        custom-tags:
          utility: 'List processing'
          extraction-type: 'Markdown lists'

      getComponentSectionName:
        description: 'Get section name for framework component type mapping'
        business-context: 'Maps component types to their corresponding markdown section names'

        returns:
          type: 'string'
          description: 'Section name for component type'

        custom-tags:
          utility: 'Component mapping'
          mapping-strategy: 'Type to section name'

      resolveExamplePath:
        description: 'Resolve base example file path from example ID'
        business-context: 'Constructs full file path for base example markdown files'

        returns:
          type: 'string'
          description: 'Resolved example file path'

        custom-tags:
          utility: 'Path resolution'
          path-type: 'Base examples'

      resolveFrameworkPath:
        description: 'Resolve framework integration file path from example and framework'
        business-context: 'Constructs full file path for framework-specific integration files'

        returns:
          type: 'string'
          description: 'Resolved framework file path'

        custom-tags:
          utility: 'Path resolution'
          path-type: 'Framework integrations'

      readFileContent:
        description: 'Read file content with comprehensive error handling and validation'
        business-context: 'Safely reads file content with proper error handling for missing files'

        returns:
          type: 'Promise<string>'
          description: 'File content or empty string on error'

        custom-tags:
          utility: 'File I/O'
          error-handling: 'Graceful degradation'

      extractComponentsByFileMarkers:
        description: 'Extract components from code sections based on file comment markers'
        business-context: 'Parses multi-file code examples using comment markers for file separation'

        parameters:
          - name: 'code'
            type: 'string'
            description: 'Code content with file markers'

        returns:
          type: 'Map<string, string>'
          description: 'Map of filename to code content'

        custom-tags:
          parsing-type: 'Multi-file code'
          marker-based: 'Comment-based file separation'

        examples:
          - id: 'extract-multi-file-code'
            code: |
              const components = parser.extractComponentsByFileMarkers(`
              // user.service.ts
              export class UserService {
                // implementation
              }

              // user.module.ts
              @Module({})
              export class UserModule {}
              `);

      filterComponents:
        description: 'Filter components based on selection criteria with include/exclude options'
        business-context: 'Allows selective inclusion or exclusion of framework components based on user preferences'

        parameters:
          - name: 'components'
            type: 'Map<FrameworkComponentType, string>'
            description: 'Components map to filter'
          - name: 'options'
            type: 'DocumentationFilterOptions'
            description: 'Filtering options with include/exclude criteria'

        returns:
          type: 'Map<FrameworkComponentType, string>'
          description: 'Filtered components map'

        custom-tags:
          filtering: 'Component selection'
          options: 'Include/exclude criteria'

        examples:
          - id: 'filter-components'
            code: |
              const filtered = parser.filterComponents(allComponents, {
                only: ['service', 'module'],
                exclude: ['controller']
              });
