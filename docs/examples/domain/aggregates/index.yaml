# Index - Aggregates Package Exports
# Documentation for the main entry point of @vytches/ddd-aggregates package

# === FILE METADATA ===
file-name: 'index'
title: 'Aggregates Package - Main Exports'
description: 'Central export hub for DDD aggregate patterns and capabilities'
business-context: 'Entry point for domain aggregate implementation with enterprise features'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === MODULE DOCUMENTATION ===
module-doc:
  description: 'Complete aggregate implementation for Domain-Driven Design patterns'
  business-context: 'Provides enterprise-grade aggregate roots with event sourcing and capability system'

  formats:
    jsdoc:
      description: '@vytches/ddd-aggregates - Enterprise aggregate patterns with capabilities'
    cli:
      description: |
        ## DDD Aggregates Package

        Enterprise-grade aggregate implementation with:
        - Event sourcing capabilities
        - Extensible capability system
        - Optimistic concurrency control
        - Audit and compliance features

  custom-tags:
    since: '1.0.0'
    module: '@vytches/ddd-aggregates'
    exports: 'Core aggregate classes, capabilities, interfaces, and utilities'

# === EXPORTED ELEMENTS ===
exports:
  # Core Classes
  AggregateRoot:
    description: 'Base aggregate root class with event sourcing'
    source: './core/aggregate-root'
    category: 'core'

  AggregateBuilder:
    description: 'Fluent builder for aggregate construction'
    source: './core/aggregate-root.builder'
    category: 'core'

  aggregateBuilder:
    description: 'Factory function for creating aggregate builders'
    source: './core/aggregate-root.builder'
    category: 'core'

  # Capabilities (re-exported)
  capabilities:
    description: 'All capability implementations (audit, versioning, snapshot, event-sourcing)'
    source: './capabilities'
    category: 'capabilities'

  # Errors
  AggregateError:
    description: 'Base error class for aggregate-related errors'
    source: './aggregate-errors'
    category: 'errors'

  # Utility Functions
  asSnapshotAggregate:
    description: 'Type guard for snapshot capability'
    source: './core/aggregate-utilities'
    category: 'utilities'

  asVersioningAggregate:
    description: 'Type guard for versioning capability'
    source: './core/aggregate-utilities'
    category: 'utilities'

  asAuditAggregate:
    description: 'Type guard for audit capability'
    source: './core/aggregate-utilities'
    category: 'utilities'

  asEventSourcingAggregate:
    description: 'Type guard for event sourcing capability'
    source: './core/aggregate-utilities'
    category: 'utilities'

  getAggregateCapabilities:
    description: 'Get list of capabilities for an aggregate'
    source: './core/aggregate-utilities'
    category: 'utilities'

  hasAllCapabilities:
    description: 'Check if aggregate has all specified capabilities'
    source: './core/aggregate-utilities'
    category: 'utilities'

# === TYPE EXPORTS ===
type-exports:
  IAggregateRoot:
    description: 'Core aggregate root interface'
    source: './aggregate-interfaces'
    category: 'interfaces'

  IAggregateCapability:
    description: 'Base capability interface'
    source: './aggregate-interfaces'
    category: 'interfaces'

  IAggregateConstructorParams:
    description: 'Aggregate constructor parameters'
    source: './aggregate-interfaces'
    category: 'interfaces'

  IAggregateEventHandler:
    description: 'Event handler interface for aggregates'
    source: './aggregate-interfaces'
    category: 'interfaces'

  IAggregateBuilder:
    description: 'Builder interface for aggregate construction'
    source: './aggregate-interfaces'
    category: 'interfaces'

  AggregateWithSnapshotCapability:
    description: 'Type helper for snapshot-capable aggregates'
    source: './core/aggregate-utilities'
    category: 'type-helpers'

  AggregateWithVersioningCapability:
    description: 'Type helper for versioning-capable aggregates'
    source: './core/aggregate-utilities'
    category: 'type-helpers'

  AggregateWithAuditCapability:
    description: 'Type helper for audit-capable aggregates'
    source: './core/aggregate-utilities'
    category: 'type-helpers'

  AggregateWithEventSourcingCapability:
    description: 'Type helper for event-sourcing-capable aggregates'
    source: './core/aggregate-utilities'
    category: 'type-helpers'

# === USAGE EXAMPLES ===
examples:
  - id: 'basic-import'
    code: |
      import { AggregateRoot, AggregateBuilder } from '@vytches/ddd-aggregates';

      // Create aggregate with builder
      const aggregate = AggregateBuilder.create()
        .withId(EntityId.createWithRandomUUID())
        .withCapability('audit')
        .withCapability('versioning')
        .build();

  - id: 'capability-imports'
    code: |
      import { 
        AggregateRoot,
        asSnapshotAggregate,
        hasAllCapabilities 
      } from '@vytches/ddd-aggregates';

      // Check capabilities
      if (hasAllCapabilities(aggregate, ['audit', 'snapshot'])) {
        const snapshot = asSnapshotAggregate(aggregate);
        await snapshot.createSnapshot();
      }
