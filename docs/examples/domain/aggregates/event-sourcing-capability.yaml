# EventSourcingCapability - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: "event-sourcing-capability"
title: "EventSourcingCapability - Event Store Integration"
description: "Event sourcing capability that provides persistence and loading of aggregate events"
business-context: "Enables event-driven persistence, replay capabilities, and temporal querying for aggregates"

# === HIERARCHY ===
hierarchy:
  strategy: "merge"
  scope: "file"

# === CLASSES ===
classes:
  EventSourcingCapability:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: "separate"
      class-documentation: "enabled"
      
    # Class Documentation
    class-doc:
      description: "Capability that enables event sourcing for aggregates through event store integration"
      business-context: "Critical for implementing event-driven architecture with full event replay and temporal querying capabilities"
      
      # Format-specific
      formats:
        jsdoc:
          description: "Event sourcing capability with event store persistence and loading"
        cli:
          description: |
            ## EventSourcingCapability
            
            Provides event sourcing functionality by integrating aggregates with event stores.
            Enables persistence, loading, and replay of domain events for complete audit trails.
      
      custom-tags:
        since: "1.0.0"
        capability-type: "eventSourcing"
        architecture: "Event-driven, CQRS compatible"
        scalability: "Supports high-throughput event streaming"
    
    # Methods
    methods:
      constructor:
        description: "Creates new event sourcing capability instance"
        business-context: "Initializes capability without event store - must be configured separately"
        
        examples:
          - id: "basic"
            code: |
              const eventSourcingCapability = new EventSourcingCapability();
              aggregate.addCapability(eventSourcingCapability);
              
      attach:
        description: "Attaches event sourcing capability to aggregate"
        business-context: "Enables event persistence and loading for the target aggregate"
        
        parameters:
          - name: "aggregate"
            type: "unknown"
            description: "Aggregate instance to enable event sourcing for"
            
        returns:
          type: "void"
          description: "No return value - capability is now attached"
          
        examples:
          - id: "attachment"
            code: |
              const capability = new EventSourcingCapability();
              capability.attach(orderAggregate);
              
              // Now the aggregate can use event sourcing features
              await capability.setEventStore(eventStore);
              
        custom-tags:
          prerequisite: "Event store must be configured before use"
          
      detach:
        description: "Detaches event sourcing capability and cleans up resources"
        business-context: "Safely removes event sourcing without affecting aggregate core functionality"
        
        returns:
          type: "void"
          description: "No return value - capability is detached and cleaned up"
          
        examples:
          - id: "cleanup"
            code: |
              capability.detach();
              // Event store references are cleared
              
        custom-tags:
          cleanup: "Prevents memory leaks by clearing event store references"
          
      setEventStore:
        description: "Configures the event store instance for persistence operations"
        business-context: "Essential setup step that connects capability to persistent event storage"
        
        parameters:
          - name: "eventStore"
            type: "IEventStore"
            description: "Event store implementation for persisting and loading events"
            
        returns:
          type: "void"
          description: "No return value - event store is configured"
          
        examples:
          - id: "configuration"
            code: |
              const eventStore = new PostgreSQLEventStore(connectionString);
              capability.setEventStore(eventStore);
              
              // Alternative: In-memory for testing
              const testStore = new InMemoryEventStore();
              capability.setEventStore(testStore);
              
        custom-tags:
          required: "Must be called before any persistence operations"
          testing: "Use InMemoryEventStore for unit tests"
          
      getEventStore:
        description: "Returns currently configured event store instance or null"
        business-context: "Allows checking event store configuration and accessing store directly if needed"
        
        returns:
          type: "IEventStore | null"
          description: "Current event store instance or null if not configured"
          
        examples:
          - id: "store-access"
            code: |
              const store = capability.getEventStore();
              if (store) {
                console.log('Event store is configured');
                // Can access store methods directly if needed
              } else {
                throw new Error('Event store not configured');
              }
              
        custom-tags:
          null-check: "Always check for null before using returned store"
          
      loadFromEventStore:
        description: "Loads and replays all events for specified aggregate from event store"
        business-context: "Reconstructs aggregate state from complete event history - core event sourcing operation"
        
        parameters:
          - name: "aggregateId"
            type: "string | number"
            description: "Unique identifier of aggregate to load events for"
            
        returns:
          type: "Promise<void>"
          description: "Promise that resolves when all events are loaded and applied"
          
        throws:
          - type: "AggregateError"
            description: "When event store is not configured"
            
        examples:
          - id: "full-load"
            code: |
              // Load complete event history
              await capability.loadFromEventStore('order-123');
              
              // Aggregate now has full state reconstructed from events
              console.log(`Order version: ${aggregate.getVersion()}`);
              console.log(`Order events: ${aggregate.getDomainEvents().length}`);
              
          - id: "empty-history"
            code: |
              // Handles case where no events exist
              await capability.loadFromEventStore('new-order-456');
              // No events loaded, aggregate remains in initial state
              
        custom-tags:
          performance: "Loads all events - consider snapshots for large aggregates"
          idempotent: "Safe to call multiple times with same ID"
          
      saveToEventStore:
        description: "Persists all pending domain events to event store"
        business-context: "Commits aggregate changes to persistent storage - essential for event sourcing persistence"
        
        returns:
          type: "Promise<void>"
          description: "Promise that resolves when all events are successfully persisted"
          
        throws:
          - type: "AggregateError"
            description: "When event store is not configured"
            
        examples:
          - id: "save-events"
            code: |
              // Apply business logic that generates events
              aggregate.createOrder({ customerId: '123', amount: 100 });
              aggregate.addItem({ productId: 'ABC', quantity: 2 });
              
              // Persist all pending events
              await capability.saveToEventStore();
              
              // Events are now persisted, aggregate is clean
              console.log(`Saved events: ${aggregate.getDomainEvents().length}`);
              
        custom-tags:
          transaction: "Should be called within transaction for consistency"
          batch: "Saves all pending events in single operation"
          
      hasEventStore:
        description: "Checks if event store is configured and ready for operations"
        business-context: "Defensive programming check before attempting event store operations"
        
        returns:
          type: "boolean"
          description: "True if event store is configured, false otherwise"
          
        examples:
          - id: "validation"
            code: |
              if (!capability.hasEventStore()) {
                throw new Error('Event store must be configured before saving');
              }
              
              await capability.saveToEventStore();
              
        custom-tags:
          validation: "Use before all event store operations"
          
      getStreamName:
        description: "Generates event stream name combining aggregate type and ID"
        business-context: "Provides consistent stream naming convention for event store organization"
        
        returns:
          type: "string"
          description: "Stream name in format 'AggregateType-aggregateId'"
          
        examples:
          - id: "stream-naming"
            code: |
              const streamName = capability.getStreamName();
              console.log(streamName); // "OrderAggregate-order-123"
              
              // Used internally by event store operations
              // Can be used for external event store queries
              
        custom-tags:
          convention: "Format: 'ClassName-id' for consistent naming"
          external-use: "Can be used for direct event store queries"
          
      loadFromVersion:
        description: "Loads and applies events starting from specified version number"
        business-context: "Supports incremental loading and replay from specific points in aggregate history"
        
        parameters:
          - name: "aggregateId"
            type: "string | number"
            description: "Unique identifier of aggregate to load events for"
          - name: "fromVersion"
            type: "number"
            description: "Version number to start loading from (exclusive)"
            
        returns:
          type: "Promise<void>"
          description: "Promise that resolves when events from specified version are loaded"
          
        throws:
          - type: "AggregateError"
            description: "When event store is not configured"
            
        examples:
          - id: "incremental-load"
            code: |
              // Load only events after version 5
              await capability.loadFromVersion('order-123', 5);
              
              // Use case: Loading updates since last snapshot
              const snapshotVersion = snapshot.version;
              await capability.loadFromVersion(aggregateId, snapshotVersion);
              
          - id: "replay-scenario"
            code: |
              // Replay events from specific point for debugging
              const problemVersion = 10;
              await capability.loadFromVersion('order-123', problemVersion);
              
              // Aggregate now has state from version 11 onwards
              
        custom-tags:
          performance: "More efficient than full load for incremental updates"
          use-case: "Snapshot restoration, incremental updates, debugging"

# === STATIC PROPERTIES ===
static-properties:
  capabilityType:
    description: "Returns the string identifier for this capability type"
    business-context: "Used by capability system for registration and type checking"
    
    returns:
      type: "string"
      description: "Always returns 'eventSourcing'"
      
    examples:
      - id: "type-check"
        code: |
          console.log(EventSourcingCapability.capabilityType); // 'eventSourcing'
          
          // Used in capability management
          if (capability.type === EventSourcingCapability.capabilityType) {
            // Handle event sourcing capability
          }

# === INTERFACES ===
interfaces:
  IEventStore:
    description: "Event store interface for persisting and loading domain events"
    business-context: "Abstraction for different event store implementations (PostgreSQL, MongoDB, etc.)"
    
    properties:
      - name: "getEvents"
        type: "function"
        description: "Loads all events for specified aggregate ID"
      - name: "saveEvents"
        type: "function"
        description: "Persists array of events with version control"
      - name: "getEventsAfterVersion"
        type: "function"
        description: "Loads events after specified version number"

# === ERROR HANDLING ===
errors:
  AggregateError.configurationError:
    description: "Thrown when event store is not configured before operations"
    business-context: "Prevents runtime errors by enforcing proper configuration"
    
    examples:
      - id: "configuration-error"
        code: |
          try {
            await capability.saveToEventStore();
          } catch (error) {
            if (error instanceof AggregateError) {
              console.log('Event store not configured');
              // Configure event store and retry
            }
          }