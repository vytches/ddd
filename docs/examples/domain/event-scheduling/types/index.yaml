# Index - Event Scheduling Types

# === FILE METADATA ===
file-name: 'index'
title: 'Event Scheduling Types and Interfaces'
description: 'Type definitions and interfaces for event scheduling system'
business-context: 'Provides type safety and contracts for event scheduling operations'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Complete type definitions for event scheduling including interfaces and enums'
  business-context: 'Ensures type safety and consistency across scheduling implementations'

  formats:
    jsdoc:
      description: 'Event scheduling type definitions and re-exports'
    cli:
      description: |
        ## Event Scheduling Types
        
        Complete type system including:
        - Core scheduling interfaces
        - Job management types
        - Priority and status enums
        - Adapter interfaces

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'types'
    pattern: 'contract-pattern'

# === INTERFACES ===
interfaces:
  ISchedulerAdapter:
    description: 'Interface for scheduler adapter implementations'
    business-context: 'Contract for creating pluggable scheduler backends'

    methods:
      type:
        description: 'Unique identifier for the adapter type'
        business-context: 'Used for adapter selection and debugging'
        returns:
          type: 'string'
          description: 'Adapter type identifier'
        
        custom-tags:
          readonly: true
          required: true

      isRunning:
        description: 'Current running state of the scheduler'
        business-context: 'Indicates whether the scheduler is actively processing jobs'
        returns:
          type: 'boolean'
          description: 'True if scheduler is running, false otherwise'
        
        custom-tags:
          readonly: true
          required: true

    examples:
      - id: 'adapter-implementation'
        code: |
          class CustomSchedulerAdapter implements ISchedulerAdapter {
            readonly type = 'custom-scheduler';
            readonly isRunning = true;
            
            // Implementation details...
          }

    custom-tags:
      since: '1.0.0'
      stability: 'stable'
      category: 'interfaces'
      extensible: true

# === EXPORTS DOCUMENTATION ===
exports:
  # Re-exported contract types
  contracts:
    description: 'Core scheduling interfaces from contracts package'
    business-context: 'Shared interfaces for scheduler implementations'
    source: '@vytches/ddd-contracts'
    types:
      - 'IEventScheduler'
      - 'IJobFilter'
      - 'IJobQueryResult'
      - 'IRecurringPattern'
      - 'IScheduledEvent'
      - 'IScheduledJob'
      - 'IScheduleOptions'
      - 'ISchedulerConfig'
      - 'ISchedulerLifecycle'

  # Re-exported enums
  enums:
    description: 'Scheduling enums from contracts package'
    business-context: 'Standard enumerations for scheduling operations'
    source: '@vytches/ddd-contracts'
    types:
      - 'BackoffStrategy'
      - 'JobStatus'
      - 'SchedulePriority'