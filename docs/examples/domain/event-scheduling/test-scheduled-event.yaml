# TestScheduledEvent - Event Scheduling Test Utilities

# === FILE METADATA ===
file-name: 'test-utils/TestScheduledEvent'
title: 'Event Scheduling Test Utilities'
description: 'Test utilities for event scheduling functionality'
business-context: 'Helper classes for testing event scheduling behavior in unit and integration tests'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  TestScheduledEvent:
    class-doc:
      description: 'Basic test scheduled event for unit testing'
      business-context: 'Provides simple test event with configurable message payload'

    constructor:
      description: 'Creates a new test scheduled event'
      business-context: 'Initialize test event with basic scheduling parameters'

      parameters:
        - name: 'aggregateId'
          type: 'string'
          description: 'ID of the aggregate this event relates to'
        - name: 'scheduleAt'
          type: 'Date'
          description: 'When the event should be executed'
        - name: 'message'
          type: 'string'
          description: 'Optional test message payload'
        - name: 'scheduleOptions'
          type: 'IScheduleOptions'
          description: 'Optional scheduling configuration'

      examples:
        - id: 'basic-test-event'
          description: 'Create basic test event'
          code: |
            const testEvent = new TestScheduledEvent(
              'test-aggregate-123',
              new Date(Date.now() + 5000),
              'Test message'
            );

    custom-tags:
      since: '1.0.0'
      testing: 'Unit test utility'

  FailingScheduledEvent:
    class-doc:
      description: 'Test event that simulates processing failures'
      business-context: 'Used to test error handling and retry mechanisms in event scheduling'

    constructor:
      description: 'Creates a failing test event'
      business-context: 'Initialize event designed to fail during processing'

      parameters:
        - name: 'aggregateId'
          type: 'string'
          description: 'ID of the aggregate this event relates to'
        - name: 'scheduleAt'
          type: 'Date'
          description: 'When the event should be executed'
        - name: 'message'
          type: 'string'
          description: 'Optional failure message'
        - name: 'scheduleOptions'
          type: 'IScheduleOptions'
          description: 'Optional scheduling configuration'

      examples:
        - id: 'failure-test'
          description: 'Create failing event for error testing'
          code: |
            const failingEvent = new FailingScheduledEvent(
              'test-aggregate-456',
              new Date(Date.now() + 1000),
              'This will fail'
            );

    custom-tags:
      since: '1.0.0'
      testing: 'Error testing utility'

  SlowScheduledEvent:
    class-doc:
      description: 'Test event that simulates slow processing'
      business-context: 'Used to test timeout handling and performance characteristics'

    constructor:
      description: 'Creates a slow processing test event'
      business-context: 'Initialize event with configurable processing delay'

      parameters:
        - name: 'aggregateId'
          type: 'string'
          description: 'ID of the aggregate this event relates to'
        - name: 'scheduleAt'
          type: 'Date'
          description: 'When the event should be executed'
        - name: 'delay'
          type: 'number'
          description: 'Processing delay in milliseconds'
        - name: 'scheduleOptions'
          type: 'IScheduleOptions'
          description: 'Optional scheduling configuration'

      examples:
        - id: 'slow-processing'
          description: 'Create slow event for timeout testing'
          code: |
            const slowEvent = new SlowScheduledEvent(
              'test-aggregate-789',
              new Date(Date.now() + 2000),
              5000 // 5 second delay
            );

    custom-tags:
      since: '1.0.0'
      testing: 'Performance testing utility'

  TestEventFactory:
    class-doc:
      description: 'Factory for creating various types of test events'
      business-context: 'Provides convenient factory methods for common test event scenarios'

    methods:
      immediate:
        description: 'Create a test event scheduled for immediate execution'
        business-context: 'Quick creation of events for immediate processing tests'

        parameters:
          - name: 'aggregateId'
            type: 'string'
            description: 'Optional aggregate ID (defaults to generated ID)'
          - name: 'message'
            type: 'string'
            description: 'Optional test message'

        returns:
          type: 'TestScheduledEvent'
          description: 'Test event scheduled for immediate execution'

        examples:
          - id: 'immediate-event'
            description: 'Create immediate test event'
            code: |
              const immediateEvent = TestEventFactory.immediate('test-123', 'Hello');

      delayed:
        description: 'Create a test event scheduled for future execution'
        business-context: 'Create events with specific delay for timing tests'

        parameters:
          - name: 'delayMs'
            type: 'number'
            description: 'Delay in milliseconds from now'
          - name: 'aggregateId'
            type: 'string'
            description: 'Optional aggregate ID'
          - name: 'message'
            type: 'string'
            description: 'Optional test message'

        returns:
          type: 'TestScheduledEvent'
          description: 'Test event scheduled for future execution'

        examples:
          - id: 'delayed-event'
            description: 'Create delayed test event'
            code: |
              const delayedEvent = TestEventFactory.delayed(5000, 'test-456');

      withRetry:
        description: 'Create a test event with retry configuration'
        business-context: 'Test retry mechanisms and backoff strategies'

        parameters:
          - name: 'aggregateId'
            type: 'string'
            description: 'Optional aggregate ID'
          - name: 'maxRetries'
            type: 'number'
            description: 'Maximum retry attempts'
          - name: 'backoff'
            type: 'BackoffStrategy'
            description: 'Backoff strategy for retries'

        returns:
          type: 'TestScheduledEvent'
          description: 'Test event with retry configuration'

        examples:
          - id: 'retry-event'
            description: 'Create event with retry logic'
            code: |
              const retryEvent = TestEventFactory.withRetry(
                'test-789', 
                3, 
                BackoffStrategy.EXPONENTIAL
              );

      failing:
        description: 'Create a failing test event'
        business-context: 'Quick creation of events for error handling tests'

        parameters:
          - name: 'aggregateId'
            type: 'string'
            description: 'Optional aggregate ID'

        returns:
          type: 'FailingScheduledEvent'
          description: 'Event designed to fail during processing'

        examples:
          - id: 'failing-event'
            description: 'Create failing test event'
            code: |
              const failingEvent = TestEventFactory.failing('error-test');

      slow:
        description: 'Create a slow test event'
        business-context: 'Create events for timeout and performance testing'

        parameters:
          - name: 'delayMs'
            type: 'number'
            description: 'Processing delay in milliseconds'
          - name: 'aggregateId'
            type: 'string'
            description: 'Optional aggregate ID'

        returns:
          type: 'SlowScheduledEvent'
          description: 'Event with configurable processing delay'

        examples:
          - id: 'slow-event'
            description: 'Create slow processing event'
            code: |
              const slowEvent = TestEventFactory.slow(3000, 'perf-test');

    custom-tags:
      since: '1.0.0'
      patterns: 'Factory Pattern'
      testing: 'Test utility factory'
