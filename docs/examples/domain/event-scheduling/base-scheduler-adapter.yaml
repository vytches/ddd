# BaseSchedulerAdapter - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'base-scheduler-adapter'
title: 'BaseSchedulerAdapter - Abstract Scheduler Implementation'
description: 'Abstract base class providing common functionality for event scheduler implementations'
business-context: 'Foundation for building concrete event scheduling adapters with consistent behavior and lifecycle management'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseSchedulerAdapter:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class providing common functionality for event scheduler implementations'
      business-context: 'Foundation for building concrete schedulers with consistent lifecycle, validation, and job management'

      # Format-specific
      formats:
        jsdoc:
          description: 'Abstract scheduler adapter with common scheduling functionality'
        cli:
          description: |
            ## BaseSchedulerAdapter
            
            Abstract base class for event scheduler implementations.
            Provides common functionality for job management, lifecycle, and event processing.

      custom-tags:
        since: '1.0.0'
        pattern: 'Adapter Pattern, Template Method Pattern'
        abstract: 'Abstract base class'
        implements: 'IEventScheduler'

    # Properties
    properties:
      - name: 'logger'
        type: 'ILogger'
        description: 'Logger instance for scheduler operations and debugging'
        protected: true
        readonly: true
        business-context: 'Provides structured logging for scheduler operations and troubleshooting'

      - name: 'config'
        type: 'ISchedulerConfig'
        description: 'Configuration settings for the scheduler including concurrency and retry settings'
        protected: true
        readonly: true
        business-context: 'Controls scheduler behavior like concurrency limits and default timeouts'

      - name: 'lifecycle'
        type: 'ISchedulerLifecycle | undefined'
        description: 'Optional lifecycle hooks for scheduler and job processing events'
        protected: true
        readonly: true
        optional: true
        business-context: 'Enables custom logic during scheduler startup, shutdown, and job processing'

    # Methods
    methods:
      constructor:
        description: 'Creates a new scheduler adapter with configuration and default settings'
        business-context: 'Initializes scheduler with configuration, logger, and lifecycle hooks'

        parameters:
          - name: 'config'
            type: 'ISchedulerConfig'
            description: 'Scheduler configuration options'
            optional: true
            default: '{}'

        examples:
          - id: 'basic'
            code: |
              class MySchedulerAdapter extends BaseSchedulerAdapter {
                constructor(config?: ISchedulerConfig) {
                  super({
                    concurrency: 5,
                    defaultTimeout: 30000,
                    defaultMaxRetries: 3,
                    enablePersistence: true,
                    ...config
                  });
                }
              }

          - id: 'with-lifecycle'
            code: |
              const scheduler = new MySchedulerAdapter({
                concurrency: 10,
                lifecycle: {
                  onStart: async () => console.log('Scheduler starting'),
                  onStop: async () => console.log('Scheduler stopping'),
                  onBeforeProcess: async (job) => console.log(`Processing job ${job.id}`),
                  onAfterProcess: async (job) => console.log(`Completed job ${job.id}`),
                  onError: async (job, error) => console.error(`Job ${job.id} failed:`, error)
                }
              });

      validateEvent:
        description: 'Validates that a scheduled event has all required properties and valid values'
        business-context: 'Ensures event integrity before scheduling to prevent runtime errors'

        parameters:
          - name: 'event'
            type: 'IScheduledEvent'
            description: 'The scheduled event to validate'

        returns:
          type: 'void'
          description: 'No return value'

        throws:
          - type: 'Error'
            description: 'When event is invalid or missing required properties'

        examples:
          - id: 'basic'
            code: |
              protected async scheduleEvent(event: IScheduledEvent): Promise<string> {
                this.validateEvent(event); // Throws if invalid
                
                const job = this.createJob(event);
                return this.storeAndExecuteJob(job);
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          validation: 'Input validation'

      generateJobId:
        description: 'Generates a unique identifier for a scheduled job'
        business-context: 'Creates unique job IDs for tracking and management purposes'

        returns:
          type: 'string'
          description: 'Unique job identifier string'

        examples:
          - id: 'basic'
            code: |
              const jobId = this.generateJobId();
              console.log(jobId); // 'job-1693401234567-ab3c9ef'

        custom-tags:
          protected: 'Protected method for subclass use'
          id-generation: 'Unique ID creation'

      createJob:
        description: 'Creates a scheduled job data structure from a scheduled event'
        business-context: 'Transforms scheduled events into job objects for internal processing and storage'

        parameters:
          - name: 'event'
            type: 'IScheduledEvent'
            description: 'The scheduled event to convert'
          - name: 'options'
            type: 'IScheduleOptions'
            description: 'Optional scheduling options'
            optional: true

        returns:
          type: 'IScheduledJob'
          description: 'Job object ready for scheduling and execution'

        examples:
          - id: 'basic'
            code: |
              const event = new OrderReminderEvent('order-123', futureDate);
              const job = this.createJob(event, { 
                maxRetries: 5, 
                priority: 'high' 
              });
              
              console.log(job.id); // Generated job ID
              console.log(job.status); // JobStatus.PENDING

        custom-tags:
          protected: 'Protected method for subclass use'
          transformation: 'Event to job conversion'

      serializeEvent:
        description: 'Serializes a scheduled event to JSON string for storage'
        business-context: 'Enables event persistence and restoration across scheduler restarts'

        parameters:
          - name: 'event'
            type: 'IScheduledEvent'
            description: 'The scheduled event to serialize'

        returns:
          type: 'string'
          description: 'JSON string representation of the event'

        examples:
          - id: 'basic'
            code: |
              const event = new OrderReminderEvent('order-123', futureDate);
              const serialized = this.serializeEvent(event);
              
              // Store in database, file, or message queue
              await storage.save(job.id, serialized);

        custom-tags:
          protected: 'Protected method for subclass use'
          serialization: 'Event serialization'

      deserializeEvent:
        description: 'Deserializes a JSON string back into a scheduled event object'
        business-context: 'Restores events from storage for processing after scheduler restarts'

        parameters:
          - name: 'data'
            type: 'string'
            description: 'JSON string representation of the event'

        returns:
          type: 'IScheduledEvent'
          description: 'Restored scheduled event object'

        examples:
          - id: 'basic'
            code: |
              const serialized = await storage.load(jobId);
              const event = this.deserializeEvent(serialized);
              
              // Event is ready for processing
              await this.processEvent(event);

        custom-tags:
          protected: 'Protected method for subclass use'
          deserialization: 'Event deserialization'

      start:
        description: 'Starts the scheduler and begins processing scheduled events'
        business-context: 'Initializes scheduler operations and enables event processing'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when scheduler is fully started'

        examples:
          - id: 'basic'
            code: |
              const scheduler = new MySchedulerAdapter();
              await scheduler.start();
              
              console.log(scheduler.isRunning()); // true

        custom-tags:
          lifecycle: 'Scheduler lifecycle method'
          async: 'Asynchronous operation'

      stop:
        description: 'Stops the scheduler and halts event processing'
        business-context: 'Gracefully shuts down scheduler operations and cleans up resources'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when scheduler is fully stopped'

        examples:
          - id: 'graceful-shutdown'
            code: |
              // Graceful shutdown
              process.on('SIGTERM', async () => {
                console.log('Shutting down scheduler...');
                await scheduler.stop();
                process.exit(0);
              });

        custom-tags:
          lifecycle: 'Scheduler lifecycle method'
          async: 'Asynchronous operation'

      isRunning:
        description: 'Checks if the scheduler is currently running and processing events'
        business-context: 'Used for health checks and preventing duplicate start/stop operations'

        returns:
          type: 'boolean'
          description: 'True if scheduler is running, false otherwise'

        examples:
          - id: 'health-check'
            code: |
              app.get('/health', (req, res) => {
                const isHealthy = scheduler.isRunning();
                res.status(isHealthy ? 200 : 503).json({ 
                  scheduler: isHealthy ? 'running' : 'stopped' 
                });
              });

        custom-tags:
          status: 'Status check method'

      processJob:
        description: 'Processes a scheduled job with lifecycle hooks and error handling'
        business-context: 'Executes job processing with proper lifecycle management and error recovery'

        parameters:
          - name: 'job'
            type: 'IScheduledJob'
            description: 'The scheduled job to process'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when job processing completes'

        throws:
          - type: 'Error'
            description: 'When job processing fails after lifecycle hooks'

        examples:
          - id: 'basic'
            code: |
              protected async executeJob(job: IScheduledJob): Promise<void> {
                try {
                  await this.processJob(job); // Handles lifecycle hooks
                  await this.markJobCompleted(job);
                } catch (error) {
                  await this.markJobFailed(job, error);
                  throw error;
                }
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          lifecycle: 'Includes lifecycle hooks'

      calculateRetryDelay:
        description: 'Calculates retry delay based on attempt number and backoff strategy'
        business-context: 'Implements retry logic with various backoff strategies for failed job recovery'

        parameters:
          - name: 'attempt'
            type: 'number'
            description: 'Current attempt number (1-based)'
          - name: 'strategy'
            type: "'fixed' | 'linear' | 'exponential'"
            description: 'Backoff strategy to use for delay calculation'
          - name: 'baseDelay'
            type: 'number'
            description: 'Base delay in milliseconds'
            default: 1000

        returns:
          type: 'number'
          description: 'Delay in milliseconds for the retry attempt'

        examples:
          - id: 'retry-strategies'
            code: |
              // Fixed delay: always 1000ms
              const fixedDelay = this.calculateRetryDelay(3, 'fixed', 1000); // 1000ms
              
              // Linear backoff: attempt * baseDelay
              const linearDelay = this.calculateRetryDelay(3, 'linear', 1000); // 3000ms
              
              // Exponential backoff: baseDelay * 2^(attempt-1)
              const expDelay = this.calculateRetryDelay(3, 'exponential', 1000); // 4000ms

        custom-tags:
          protected: 'Protected method for subclass use'
          retry-logic: 'Implements retry backoff strategies'

      shouldRetry:
        description: 'Determines if a failed event should be retried based on retry configuration'
        business-context: 'Controls retry behavior to prevent infinite retry loops while allowing recovery'

        parameters:
          - name: 'event'
            type: 'IScheduledEvent'
            description: 'The event that failed processing'
          - name: 'currentAttempt'
            type: 'number'
            description: 'Current attempt number'

        returns:
          type: 'boolean'
          description: 'True if event should be retried, false otherwise'

        examples:
          - id: 'retry-logic'
            code: |
              protected async handleJobFailure(job: IScheduledJob, error: Error): Promise<void> {
                if (this.shouldRetry(job.event, job.attempts)) {
                  const delay = this.calculateRetryDelay(job.attempts + 1, 'exponential');
                  const retryTime = new Date(Date.now() + delay);
                  const retryEvent = job.event.reschedule(retryTime);
                  
                  await this.schedule(retryEvent);
                } else {
                  // Max retries reached - send to dead letter queue
                  await this.handleMaxRetriesReached(job, error);
                }
              }

        custom-tags:
          protected: 'Protected method for subclass use'
          retry-logic: 'Retry decision logic'

      filterJobs:
        description: 'Filters a list of jobs based on provided filter criteria'
        business-context: 'Enables querying and monitoring of scheduled jobs by various criteria'

        parameters:
          - name: 'jobs'
            type: 'IScheduledJob[]'
            description: 'Array of jobs to filter'
          - name: 'filter'
            type: 'IJobFilter'
            description: 'Filter criteria to apply'
            optional: true

        returns:
          type: 'IScheduledJob[]'
          description: 'Filtered array of jobs'

        examples:
          - id: 'filter-examples'
            code: |
              const allJobs = await this.getAllJobs();
              
              // Get pending jobs for a specific event type
              const pendingOrders = this.filterJobs(allJobs, {
                status: JobStatus.PENDING,
                eventType: 'OrderReminderEvent'
              });
              
              // Get jobs scheduled in the next hour
              const upcomingJobs = this.filterJobs(allJobs, {
                scheduledAfter: new Date(),
                scheduledBefore: new Date(Date.now() + 60 * 60 * 1000)
              });

        custom-tags:
          protected: 'Protected method for subclass use'
          filtering: 'Job filtering utility'

      sortJobs:
        description: 'Sorts jobs by specified field and direction'
        business-context: 'Enables ordered job lists for monitoring and processing prioritization'

        parameters:
          - name: 'jobs'
            type: 'IScheduledJob[]'
            description: 'Array of jobs to sort'
          - name: 'sortBy'
            type: 'string'
            description: 'Field to sort by (scheduledAt, createdAt, updatedAt)'
            optional: true
          - name: 'sortDirection'
            type: "'asc' | 'desc'"
            description: 'Sort direction'
            optional: true
            default: 'asc'

        returns:
          type: 'IScheduledJob[]'
          description: 'Sorted array of jobs'

        examples:
          - id: 'sorting-examples'
            code: |
              const jobs = await this.listJobs();
              
              // Sort by scheduled time (earliest first)
              const bySchedule = this.sortJobs(jobs, 'scheduledAt', 'asc');
              
              // Sort by creation time (newest first)
              const byCreation = this.sortJobs(jobs, 'createdAt', 'desc');

        custom-tags:
          protected: 'Protected method for subclass use'
          sorting: 'Job sorting utility'

      paginateJobs:
        description: 'Paginates job results with limit and offset for large result sets'
        business-context: 'Enables efficient handling of large job lists in monitoring and admin interfaces'

        parameters:
          - name: 'jobs'
            type: 'IScheduledJob[]'
            description: 'Array of jobs to paginate'
          - name: 'limit'
            type: 'number'
            description: 'Maximum number of jobs to return'
            optional: true
          - name: 'offset'
            type: 'number'
            description: 'Number of jobs to skip'
            optional: true

        returns:
          type: 'IJobQueryResult'
          description: 'Paginated result with jobs and metadata'

        examples:
          - id: 'pagination'
            code: |
              const allJobs = await this.getAllJobs();
              const page = this.paginateJobs(allJobs, 25, 50); // Page 3 (25 per page)
              
              console.log(`Showing ${page.count} of ${page.total} jobs`);
              console.log(`Current offset: ${page.offset}`);
              page.jobs.forEach(job => console.log(job.id));

        custom-tags:
          protected: 'Protected method for subclass use'
          pagination: 'Result pagination utility'

      # Abstract methods that must be implemented by subclasses
      schedule:
        description: 'Schedules an event for future execution (abstract method)'
        business-context: 'Core scheduling operation that must be implemented by concrete schedulers'

        parameters:
          - name: 'event'
            type: 'IScheduledEvent'
            description: 'The event to schedule'
          - name: 'options'
            type: 'IScheduleOptions'
            description: 'Optional scheduling configuration'
            optional: true

        returns:
          type: 'Promise<string>'
          description: 'Promise resolving to the job ID'

        custom-tags:
          abstract: 'Must be implemented by subclasses'
          core-operation: 'Primary scheduling method'

      cancel:
        description: 'Cancels a scheduled job (abstract method)'
        business-context: 'Job cancellation operation that must be implemented by concrete schedulers'

        parameters:
          - name: 'jobId'
            type: 'string'
            description: 'The job ID to cancel'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when job is cancelled'

        custom-tags:
          abstract: 'Must be implemented by subclasses'
          core-operation: 'Job cancellation method'

      reschedule:
        description: 'Reschedules a job for a new execution time (abstract method)'
        business-context: 'Job rescheduling operation that must be implemented by concrete schedulers'

        parameters:
          - name: 'jobId'
            type: 'string'
            description: 'The job ID to reschedule'
          - name: 'newTime'
            type: 'Date'
            description: 'New execution time'

        returns:
          type: 'Promise<void>'
          description: 'Promise that resolves when job is rescheduled'

        custom-tags:
          abstract: 'Must be implemented by subclasses'
          core-operation: 'Job rescheduling method'

      getJob:
        description: 'Retrieves a specific job by ID (abstract method)'
        business-context: 'Job lookup operation that must be implemented by concrete schedulers'

        parameters:
          - name: 'jobId'
            type: 'string'
            description: 'The job ID to retrieve'

        returns:
          type: 'Promise<IScheduledJob | undefined>'
          description: 'Promise resolving to the job or undefined if not found'

        custom-tags:
          abstract: 'Must be implemented by subclasses'
          query-operation: 'Job retrieval method'

      listJobs:
        description: 'Lists jobs matching filter criteria (abstract method)'
        business-context: 'Job querying operation that must be implemented by concrete schedulers'

        parameters:
          - name: 'filter'
            type: 'IJobFilter'
            description: 'Optional filter criteria'
            optional: true

        returns:
          type: 'Promise<IJobQueryResult>'
          description: 'Promise resolving to filtered job results'

        custom-tags:
          abstract: 'Must be implemented by subclasses'
          query-operation: 'Job listing method'