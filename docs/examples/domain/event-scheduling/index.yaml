# Index - Event Scheduling Package Exports

# === FILE METADATA ===
file-name: 'index'
title: 'Event Scheduling Package Public API'
description: 'Main export file for event scheduling and job management functionality'
business-context: 'Provides unified access to event scheduling capabilities for domain-driven design'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === FILE-LEVEL METADATA ===
file-doc:
  description: 'Comprehensive event scheduling system with schedulers, adapters, and test utilities'
  business-context: 'Enables time-based domain events and scheduled operations in enterprise applications'

  formats:
    jsdoc:
      description: 'Event scheduling package exports and re-exports'
    cli:
      description: |
        ## Event Scheduling Package Exports
        
        Complete event scheduling system including:
        - Scheduled event management
        - Multiple scheduler adapters
        - Test utilities and factories
        - Type definitions and interfaces

  custom-tags:
    since: '1.0.0'
    stability: 'stable'
    category: 'scheduling'
    pattern: 'facade-pattern'
    use-cases: 'delayed-processing, recurring-jobs, event-sourcing'

# === EXPORTS DOCUMENTATION ===
exports:
  # Type exports
  types:
    description: 'Complete type definitions for event scheduling'
    business-context: 'Provides type safety for scheduling operations'
    source: './types/index'

  # Core classes
  ScheduledEvent:
    description: 'Core scheduled event implementation'
    business-context: 'Main class for creating and managing scheduled events'
    source: './core/ScheduledEvent'

  # Adapters
  BaseSchedulerAdapter:
    description: 'Base adapter for scheduler implementations'
    business-context: 'Foundation for creating custom scheduler backends'
    source: './adapters/BaseSchedulerAdapter'

  InMemorySchedulerAdapter:
    description: 'In-memory scheduler for development and testing'
    business-context: 'Simple scheduler implementation for prototyping and testing'
    source: './adapters/InMemorySchedulerAdapter'

  # Contract types (re-exports)
  contracts:
    description: 'Scheduling interfaces and enums from contracts package'
