# ScheduledEvent - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'scheduled-event'
title: 'ScheduledEvent - Core Scheduled Event Implementation'
description: 'Core implementation for scheduled domain events with timing control'
business-context: 'Enables delayed and recurring event processing in event-driven architectures'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ScheduledEvent:
    # JSDoc Configuration
    jsdoc:
      placement-strategy: 'separate'
      class-documentation: 'enabled'

    # Class Documentation
    class-doc:
      description: 'Abstract base class for domain events scheduled for future execution with timing control'
      business-context: 'Essential for implementing time-based business processes, delayed operations, and recurring tasks'

      # Format-specific
      formats:
        jsdoc:
          description: 'Scheduled event implementation with timing and scheduling support'
        cli:
          description: |
            ## ScheduledEvent
            
            Core abstract class for managing scheduled domain events.
            Supports delayed execution, rescheduling, and time-based event processing.

      custom-tags:
        since: '1.0.0'
        pattern: 'Scheduled Event Pattern'
        abstract: 'Abstract base class'
        extends: 'DomainEvent, IScheduledEvent'

    # Properties
    properties:
      - name: 'scheduleAt'
        type: 'Date'
        description: 'The date and time when this event should be executed'
        readonly: true
        business-context: 'Determines when the event will be processed by the scheduler'

      - name: 'scheduleOptions'
        type: 'IScheduleOptions | undefined'
        description: 'Optional configuration for scheduling behavior like retries and priority'
        readonly: true
        optional: true
        business-context: 'Controls retry logic, priority, and other scheduling behaviors'

      - name: 'aggregateId'
        type: 'string'
        description: 'The ID of the aggregate that this scheduled event is associated with'
        readonly: true
        business-context: 'Links the event to the specific domain aggregate for proper event routing'

      - name: 'type'
        type: 'string'
        description: 'The type identifier for this event, typically the class name'
        readonly: true
        business-context: 'Used by event handlers and schedulers to identify and route the event'

    # Methods
    methods:
      constructor:
        description: 'Creates a new scheduled event with timing and configuration options'
        business-context: 'Initializes a scheduled event with all necessary timing and metadata information'

        parameters:
          - name: 'aggregateId'
            type: 'string'
            description: 'The ID of the aggregate associated with this event'
          - name: 'scheduleAt'
            type: 'Date'
            description: 'When the event should be executed'
          - name: 'payload'
            type: 'T'
            description: 'Event payload data'
            optional: true
          - name: 'scheduleOptions'
            type: 'IScheduleOptions'
            description: 'Optional scheduling configuration'
            optional: true
          - name: 'metadata'
            type: 'IEventMetadata'
            description: 'Optional event metadata'
            optional: true

        examples:
          - id: 'basic'
            code: |
              class OrderReminderEvent extends ScheduledEvent<{orderId: string}> {
                constructor(orderId: string, scheduleAt: Date) {
                  super('Order', scheduleAt, { orderId });
                }
              }
              
              const reminderTime = new Date(Date.now() + 24 * 60 * 60 * 1000); // 24 hours
              const reminder = new OrderReminderEvent('order-123', reminderTime);

      isScheduledEvent:
        description: 'Static type guard to check if an object is a scheduled event'
        business-context: 'Used for type checking and validation in event processing pipelines'

        parameters:
          - name: 'event'
            type: 'unknown'
            description: 'Object to test for scheduled event interface compliance'

        returns:
          type: 'event is IScheduledEvent'
          description: 'True if the object implements IScheduledEvent interface'

        examples:
          - id: 'basic'
            code: |
              const event = getEventFromQueue();
              if (ScheduledEvent.isScheduledEvent(event)) {
                const delay = event.getDelayMs();
                console.log(`Event scheduled for ${delay}ms from now`);
              }

        custom-tags:
          static: 'Static method'
          type-guard: 'TypeScript type guard'

      getDelayMs:
        description: 'Calculate the delay in milliseconds from the current time until the scheduled execution'
        business-context: 'Used by schedulers to determine when to execute the event and for monitoring purposes'

        returns:
          type: 'number'
          description: 'Delay in milliseconds (minimum 0 for past events)'

        examples:
          - id: 'basic'
            code: |
              const event = new OrderReminderEvent('order-123', futureDate);
              const delayMs = event.getDelayMs();
              
              if (delayMs === 0) {
                console.log('Event is ready for immediate execution');
              } else {
                console.log(`Event will execute in ${delayMs}ms`);
              }

        custom-tags:
          timing: 'Time calculation utility'

      isOverdue:
        description: 'Check if the event is overdue for execution (more than 1 second past scheduled time)'
        business-context: 'Used to identify events that missed their scheduled execution window for monitoring and recovery'

        returns:
          type: 'boolean'
          description: 'True if the event is significantly overdue (>=1 second)'

        examples:
          - id: 'basic'
            code: |
              const event = getScheduledEvent();
              if (event.isOverdue()) {
                logger.warn('Event is overdue', { 
                  eventId: event.id, 
                  scheduledAt: event.scheduleAt,
                  delayMs: event.getDelayMs()
                });
                // Handle overdue event - retry, alert, etc.
              }

        custom-tags:
          monitoring: 'Used for system monitoring'
          threshold: '1 second grace period'

      reschedule:
        description: 'Create a new instance of this event with a different scheduled time'
        business-context: 'Used when events need to be rescheduled due to failures, delays, or business rule changes'

        parameters:
          - name: 'newTime'
            type: 'Date'
            description: 'The new date and time for event execution'

        returns:
          type: 'IScheduledEvent'
          description: 'New scheduled event instance with updated timing'

        examples:
          - id: 'basic'
            code: |
              const originalEvent = new OrderReminderEvent('order-123', originalDate);
              
              // Reschedule for 2 hours later
              const newTime = new Date(Date.now() + 2 * 60 * 60 * 1000);
              const rescheduledEvent = originalEvent.reschedule(newTime);
              
              await scheduler.cancel(originalEvent.id);
              await scheduler.schedule(rescheduledEvent);

          - id: 'failure-recovery'
            code: |
              // Handle failed event by rescheduling with exponential backoff
              const failedEvent = getFailedEvent();
              const retryDelay = calculateRetryDelay(failedEvent.attempts);
              const retryTime = new Date(Date.now() + retryDelay);
              
              const retryEvent = failedEvent.reschedule(retryTime);
              await scheduler.schedule(retryEvent);

        custom-tags:
          immutable: 'Creates new instance rather than modifying existing'
          recovery: 'Used for failure recovery scenarios'