# TypedOperation - Type-Safe Operations for ACL

# === FILE METADATA ===
file-name: 'typed-operations'
title: 'TypedOperation - Type-Safe ACL Operations'
description: 'Type-safe operation definitions for ACL adapters'
business-context: |
  Provides compile-time type safety for ACL operations, ensuring that
  domain models and external representations are correctly typed and
  validated throughout the integration pipeline.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  TypedOperation:
    class-doc:
      description: 'Type-safe operation definition for ACL adapters'
      business-context: |
        Encapsulates operation metadata with full type information,
        enabling compile-time validation and runtime type checking
        for external system integrations.

      formats:
        jsdoc:
          description: 'Type-safe ACL operation with validation'
        cli:
          description: |
            ## TypedOperation
            Type-safe operations providing:
            - Compile-time type checking
            - Runtime validation
            - Operation metadata
            - Input/output contracts

      custom-tags:
        since: '1.0.0'
        pattern: 'Type Safety'

    methods:
      constructor:
        description: 'Creates typed operation definition'
        business-context: 'Defines operation contract with type safety'

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Operation name'
          - name: 'config'
            type: 'OperationConfig<TInput, TOutput>'
            description: 'Operation configuration'

        examples:
          - id: 'create-operation'
            code: |
              const createOrderOp = new TypedOperation<Order, OrderResponse>(
                'createOrder',
                {
                  inputValidator: (order: Order) => order.isValid(),
                  outputValidator: (response: any): response is OrderResponse => 
                    typeof response.orderId === 'string',
                  timeout: 10000,
                  retryable: true
                }
              );

      execute:
        description: 'Executes operation with type safety'
        business-context: 'Performs operation with full type validation'

        parameters:
          - name: 'input'
            type: 'TInput'
            description: 'Typed input data'
          - name: 'executor'
            type: 'OperationExecutor<TInput, TOutput>'
            description: 'Function that performs the operation'

        returns:
          type: 'Promise<Result<TOutput, ACLError>>'
          description: 'Type-safe result'

        examples:
          - id: 'execute-typed'
            code: |
              const result = await createOrderOp.execute(
                orderAggregate,
                async (order) => {
                  const external = translator.toExternal(order);
                  return await externalAPI.call('create', external);
                }
              );
              
              if (result.isSuccess()) {
                // result.value is typed as OrderResponse
                console.log('Order ID:', result.value.orderId);
              }

      validate:
        description: 'Validates input against operation contract'
        business-context: 'Ensures data meets operation requirements'

        parameters:
          - name: 'input'
            type: 'TInput'
            description: 'Input to validate'

        returns:
          type: 'ValidationResult'
          description: 'Validation outcome'

        examples:
          - id: 'validation'
            code: |
              const validation = createOrderOp.validate(orderData);
              
              if (!validation.isValid) {
                console.error('Invalid input:', validation.errors);
                return;
              }

      getName:
        description: 'Returns operation name'
        business-context: 'Identifies operation for logging and debugging'

        returns:
          type: 'string'
          description: 'Operation name'

      getMetadata:
        description: 'Returns operation metadata'
        business-context: 'Provides operation configuration details'

        returns:
          type: 'OperationMetadata'
          description: 'Operation metadata'

      static create:
        description: 'Factory method for creating typed operations'
        business-context: 'Convenient operation creation with type inference'
        static: true

        parameters:
          - name: 'name'
            type: 'string'
            description: 'Operation name'
          - name: 'config'
            type: 'OperationConfig<TInput, TOutput>'
            description: 'Operation configuration'

        returns:
          type: 'TypedOperation<TInput, TOutput>'
          description: 'Configured typed operation'

# === TYPES ===
types:
  OperationConfig:
    description: 'Configuration for typed operation'

    properties:
      - name: 'inputValidator'
        type: '(input: TInput) => boolean'
        description: 'Input validation function'
        optional: true
      - name: 'outputValidator'
        type: '(output: any) => output is TOutput'
        description: 'Output type guard'
        optional: true
      - name: 'timeout'
        type: 'number'
        description: 'Operation timeout in ms'
        optional: true
      - name: 'retryable'
        type: 'boolean'
        description: 'Whether operation can be retried'
        optional: true
      - name: 'description'
        type: 'string'
        description: 'Human-readable description'
        optional: true

  OperationExecutor:
    description: 'Function that performs the actual operation'
    signature: '(input: TInput) => Promise<TOutput>'

  ValidationResult:
    description: 'Result of operation validation'

    properties:
      - name: 'isValid'
        type: 'boolean'
        description: 'Whether validation passed'
      - name: 'errors'
        type: 'string[]'
        description: 'Validation error messages'
        optional: true

# === USAGE PATTERNS ===
patterns:
  - name: 'CRUD Operations'
    description: 'Standard create, read, update, delete operations'
    example: |
      class OrderOperations {
        static readonly CREATE = TypedOperation.create<Order, OrderCreatedResult>(
          'create',
          {
            inputValidator: (order) => order.getTotalAmount().isPositive(),
            timeout: 15000,
            retryable: true
          }
        );
        
        static readonly GET = TypedOperation.create<string, Order>(
          'get',
          {
            inputValidator: (id) => id.length > 0,
            timeout: 5000,
            retryable: true
          }
        );
        
        static readonly UPDATE = TypedOperation.create<Order, UpdateResult>(
          'update',
          {
            inputValidator: (order) => order.getId().isDefined(),
            timeout: 10000,
            retryable: false
          }
        );
      }

  - name: 'Batch Operations'
    description: 'Type-safe batch processing'
    example: |
      const batchCreateOp = TypedOperation.create<Order[], BatchResult<OrderCreatedResult>>(
        'batchCreate',
        {
          inputValidator: (orders) => orders.length > 0 && orders.length <= 100,
          timeout: 60000,
          retryable: true
        }
      );