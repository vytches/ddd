# ACL Interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'acl-interfaces'
title: 'ACL Interfaces - Core Integration Contracts'
description: 'Core interfaces defining ACL integration patterns'
business-context: 'Essential contracts for building anti-corruption layers that protect domain boundaries'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IACLAdapter:
    description: 'Core adapter interface for ACL pattern implementation'
    business-context: 'Defines essential operations for domain-external system integration'

    methods:
      execute:
        description: 'Executes an operation through the ACL with domain model translation'
        business-context: 'Main entry point for domain operations requiring external system interaction'
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation name to execute on external system'
          - name: 'domainModel'
            type: 'TDomainModel'
            description: 'Domain model to translate and send'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Optional execution configuration'
        returns:
          type: 'Promise<Result<TResult, ACLError>>'
          description: 'Result containing response or error'

      fetch:
        description: 'Fetches and translates external data to domain model'
        business-context: 'Retrieves external system data while maintaining domain integrity'
        parameters:
          - name: 'identifier'
            type: 'string'
            description: 'Unique identifier for the resource'
        returns:
          type: 'Promise<Result<TDomainModel, ACLError>>'
          description: 'Domain model or error'

      supportsOperation:
        description: 'Checks if adapter supports specific operation'
        business-context: 'Prevents invalid operations and provides clear capability boundaries'
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation name to check'
        returns:
          type: 'boolean'
          description: 'True if operation is supported'

      getContextInfo:
        description: 'Returns adapter context information'
        business-context: 'Provides metadata about bounded context and external system'
        returns:
          type: 'ACLContextInfo'
          description: 'Context metadata and configuration'

  ACLMiddleware:
    description: 'Middleware interface for cross-cutting concerns'
    business-context: 'Enables logging, caching, retry logic in ACL operations'

    methods:
      execute:
        description: 'Processes operation through middleware pipeline'
        business-context: 'Intercepts and enhances ACL operations with enterprise features'
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation being executed'
          - name: 'domainModel'
            type: 'any'
            description: 'Domain model being processed'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Execution options'
          - name: 'next'
            type: '() => Promise<Result<T, ACLError>>'
            description: 'Next middleware in chain'
        returns:
          type: 'Promise<Result<T, ACLError>>'
          description: 'Enhanced result from middleware chain'

  IEnhancedACLAdapter:
    description: 'Enhanced adapter with advanced features'
    business-context: 'Enterprise-grade ACL with caching, metrics, and type safety'

    methods:
      use:
        description: 'Adds middleware to processing pipeline'
        business-context: 'Configures cross-cutting concerns for ACL operations'
        parameters:
          - name: 'middleware'
            type: 'ACLMiddleware'
            description: 'Middleware to add'
        returns:
          type: 'this'
          description: 'Adapter instance for chaining'

      executeTyped:
        description: 'Executes typed operation with compile-time safety'
        business-context: 'Type-safe operation execution with validation'
        parameters:
          - name: 'operation'
            type: 'TypedOperation<TInput, TOutput>'
            description: 'Typed operation definition'
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to process'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Execution options'
        returns:
          type: 'Promise<Result<TOutput, ACLError>>'
          description: 'Type-safe result'

  IModelTranslator:
    description: 'Bidirectional model translator'
    business-context: 'Maintains clean separation between domain and external models'

    methods:
      toExternal:
        description: 'Translates domain model to external representation'
        business-context: 'Converts internal domain concepts to external system format'
        parameters:
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to translate'
        returns:
          type: 'TExternal'
          description: 'External model representation'

      fromExternal:
        description: 'Translates external model to domain representation'
        business-context: 'Converts external data to clean domain model'
        parameters:
          - name: 'externalModel'
            type: 'TExternal'
            description: 'External model to translate'
        returns:
          type: 'TDomain'
          description: 'Domain model representation'

      validateDomain:
        description: 'Validates domain model before translation'
        business-context: 'Ensures domain model integrity before external interaction'
        parameters:
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to validate'
        returns:
          type: 'Result<void, Error>'
          description: 'Validation result'

      validateExternal:
        description: 'Validates external model after translation'
        business-context: 'Ensures external data meets requirements'
        parameters:
          - name: 'externalModel'
            type: 'TExternal'
            description: 'External model to validate'
        returns:
          type: 'Result<void, Error>'
          description: 'Validation result'

  IExternalAPI:
    description: 'External system API abstraction'
    business-context: 'Clean interface for third-party service communication'

    methods:
      execute:
        description: 'Executes operation on external system'
        business-context: 'Performs actual external system interaction'
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation to execute'
          - name: 'model'
            type: 'TExternalModel'
            description: 'Model to send'
        returns:
          type: 'Promise<TResult>'
          description: 'Operation result'

      fetch:
        description: 'Fetches data from external system'
        business-context: 'Retrieves external system data'
        parameters:
          - name: 'identifier'
            type: 'string'
            description: 'Resource identifier'
        returns:
          type: 'Promise<TExternalModel>'
          description: 'External model data'

      healthCheck:
        description: 'Checks external system availability'
        business-context: 'Monitors external system health for resilience'
        returns:
          type: 'Promise<boolean>'
          description: 'True if system is healthy'

  ACLContextInfo:
    description: 'ACL context metadata'
    business-context: 'Provides essential information about ACL configuration'

    properties:
      contextName:
        type: 'string'
        description: 'Bounded context name'
        readonly: true

      externalSystemName:
        type: 'string'
        description: 'External system identifier'
        readonly: true

      version:
        type: 'string'
        description: 'ACL adapter version'
        readonly: true

      supportedOperations:
        type: 'readonly string[]'
        description: 'List of supported operations'
        readonly: true

      metadata:
        type: 'object'
        description: 'Optional metadata'
        properties:
          - name: 'description'
            type: 'string'
            optional: true
          - name: 'owner'
            type: 'string'
            optional: true
          - name: 'documentation'
            type: 'string'
            optional: true
          - name: 'baseUrl'
            type: 'string'
            optional: true

  ExecuteOptions:
    description: 'Execution configuration options'
    business-context: 'Configures ACL operation behavior'

    properties:
      version:
        type: 'string'
        description: 'API version to use'
        optional: true

      timeout:
        type: 'number'
        description: 'Operation timeout in milliseconds'
        optional: true

      retries:
        type: 'number'
        description: 'Number of retry attempts'
        optional: true

      metadata:
        type: 'Record<string, any>'
        description: 'Additional metadata'
        optional: true

      correlationId:
        type: 'string'
        description: 'Correlation ID for tracing'
        optional: true
