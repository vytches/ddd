# BaseACLMiddleware - Middleware Pipeline for ACL Operations

# === FILE METADATA ===
file-name: 'acl-middleware'
title: 'BaseACLMiddleware - Cross-cutting Concerns'
description: 'Base class for ACL middleware pipeline components'
business-context: |
  Enables implementation of cross-cutting concerns in ACL operations
  through a middleware pipeline pattern, supporting logging, caching,
  retry logic, authentication, and other enterprise requirements.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseACLMiddleware:
    class-doc:
      description: 'Abstract base for ACL middleware implementations'
      business-context: |
        Foundation for building middleware components that intercept and
        enhance ACL operations with additional functionality like logging,
        metrics, caching, and error handling without modifying core logic.

      formats:
        jsdoc:
          description: 'Base middleware class for ACL operation pipeline'
        cli:
          description: |
            ## BaseACLMiddleware
            Middleware foundation providing:
            - Request/response interception
            - Pre/post processing hooks
            - Error handling and recovery
            - Context propagation

      custom-tags:
        since: '1.0.0'
        pattern: 'Middleware Pattern'
        implements: 'ACLMiddleware'
        abstract: true

    methods:
      execute:
        description: 'Processes ACL operation through middleware pipeline'
        business-context: 'Intercepts and enhances ACL operations with cross-cutting concerns'
        abstract: true

        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Name of the operation being performed'
          - name: 'domainModel'
            type: 'any'
            description: 'Domain model being processed'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Execution options and context'
          - name: 'next'
            type: '() => Promise<Result<T, ACLError>>'
            description: 'Next function in the middleware chain'

        returns:
          type: 'Promise<Result<T, ACLError>>'
          description: 'Result of the middleware processing'

        generic: 'T'

        examples:
          - id: 'logging-middleware'
            code: |
              class LoggingMiddleware extends BaseACLMiddleware {
                async execute<T>(
                  operation: string,
                  domainModel: any,
                  options: ExecuteOptions,
                  next: () => Promise<Result<T, ACLError>>
                ): Promise<Result<T, ACLError>> {
                  console.log(`Starting ACL operation: ${operation}`);
                  
                  const startTime = Date.now();
                  const result = await next();
                  const duration = Date.now() - startTime;
                  
                  if (result.isSuccess()) {
                    console.log(`ACL operation ${operation} completed in ${duration}ms`);
                  } else {
                    console.error(`ACL operation ${operation} failed:`, result.error);
                  }
                  
                  return result;
                }
              }

          - id: 'caching-middleware'
            code: |
              class CachingMiddleware extends BaseACLMiddleware {
                private cache = new Map<string, any>();

                async execute<T>(
                  operation: string,
                  domainModel: any,
                  options: ExecuteOptions,
                  next: () => Promise<Result<T, ACLError>>
                ): Promise<Result<T, ACLError>> {
                  const cacheKey = `${operation}:${JSON.stringify(domainModel)}`;
                  
                  // For fetch operations, check cache first
                  if (operation === 'fetch' && this.cache.has(cacheKey)) {
                    return Result.success(this.cache.get(cacheKey));
                  }
                  
                  const result = await next();
                  
                  // Cache successful fetch operations
                  if (result.isSuccess() && operation === 'fetch') {
                    this.cache.set(cacheKey, result.value);
                  }
                  
                  return result;
                }
              }

          - id: 'retry-middleware'
            code: |
              class RetryMiddleware extends BaseACLMiddleware {
                constructor(
                  private maxAttempts = 3,
                  private baseDelay = 1000
                ) {
                  super();
                }

                async execute<T>(
                  operation: string,
                  domainModel: any,
                  options: ExecuteOptions,
                  next: () => Promise<Result<T, ACLError>>
                ): Promise<Result<T, ACLError>> {
                  let lastError: ACLError;
                  
                  for (let attempt = 1; attempt <= this.maxAttempts; attempt++) {
                    const result = await next();
                    
                    if (result.isSuccess()) {
                      return result;
                    }
                    
                    lastError = result.error;
                    
                    // Don't retry on the last attempt
                    if (attempt < this.maxAttempts) {
                      const delay = this.baseDelay * Math.pow(2, attempt - 1);
                      await new Promise(resolve => setTimeout(resolve, delay));
                    }
                  }
                  
                  return Result.failure(lastError!);
                }
              }

# === MIDDLEWARE EXAMPLES ===
examples:
  - name: 'CachingMiddleware'
    description: 'Caches ACL operation results'
    code: |
      class CachingMiddleware extends BaseACLMiddleware {
        private cache = new Map<string, any>();
        
        async process(
          context: MiddlewareContext,
          next: NextFunction
        ): Promise<Result<any, ACLError>> {
          const cacheKey = this.getCacheKey(context);
          
          // Check cache for GET operations
          if (context.operation === 'fetch') {
            const cached = this.cache.get(cacheKey);
            if (cached) {
              return Result.success(cached);
            }
          }
          
          // Execute and cache result
          const result = await next(context);
          if (result.isSuccess() && context.operation === 'fetch') {
            this.cache.set(cacheKey, result.value);
          }
          
          return result;
        }
        
        private getCacheKey(context: MiddlewareContext): string {
          return `${context.operation}:${context.identifier}`;
        }
      }

  - name: 'RetryMiddleware'
    description: 'Retries failed operations with backoff'
    code: |
      class RetryMiddleware extends BaseACLMiddleware {
        constructor(
          private maxRetries: number = 3,
          private baseDelay: number = 1000
        ) {
          super();
        }
        
        async process(
          context: MiddlewareContext,
          next: NextFunction
        ): Promise<Result<any, ACLError>> {
          let lastError: ACLError;
          
          for (let attempt = 0; attempt <= this.maxRetries; attempt++) {
            try {
              const result = await next(context);
              if (result.isSuccess()) {
                return result;
              }
              lastError = result.error;
            } catch (error) {
              lastError = error as ACLError;
            }
            
            if (attempt < this.maxRetries) {
              await this.delay(this.baseDelay * Math.pow(2, attempt));
            }
          }
          
          return Result.failure(lastError!);
        }
        
        private delay(ms: number): Promise<void> {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
      }

  - name: 'AuthenticationMiddleware'
    description: 'Adds authentication to external API calls'
    code: |
      class AuthenticationMiddleware extends BaseACLMiddleware {
        constructor(
          private tokenProvider: ITokenProvider
        ) {
          super();
        }
        
        async process(
          context: MiddlewareContext,
          next: NextFunction
        ): Promise<Result<any, ACLError>> {
          // Add auth token to context
          const token = await this.tokenProvider.getToken();
          context.headers = {
            ...context.headers,
            'Authorization': `Bearer ${token}`
          };
          
          return next(context);
        }
      }
