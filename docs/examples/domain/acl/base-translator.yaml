# BaseModelTranslator - Foundation for Model Translation

# === FILE METADATA ===
file-name: 'base-translator'
title: 'BaseModelTranslator - Model Translation Foundation'
description: 'Abstract base class for bidirectional model translation'
business-context: |
  Provides the foundation for translating between clean domain models
  and external system representations, ensuring domain isolation while
  enabling seamless data exchange with third-party systems.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseModelTranslator:
    class-doc:
      description: 'Abstract base for domain-external model translation'
      business-context: |
        Implements the Translator pattern to convert between domain models
        (clean, business-focused) and external models (legacy, third-party).
        Ensures that external system peculiarities don't leak into the domain.

      formats:
        jsdoc:
          description: 'Base class for bidirectional model translation'
        cli:
          description: |
            ## BaseModelTranslator
            Foundation for model translation providing:
            - Domain to external conversion
            - External to domain conversion
            - Validation and error handling
            - Field mapping strategies

      custom-tags:
        since: '1.0.0'
        pattern: 'Translator Pattern'
        implements: 'IModelTranslator'

    methods:
      toDomain:
        description: 'Translates external model to clean domain model'
        business-context: 'Converts external data into domain-appropriate format'
        abstract: true

        parameters:
          - name: 'external'
            type: 'TExternalModel'
            description: 'External system representation'

        returns:
          type: 'Result<TDomainModel, TranslationError>'
          description: 'Domain model or translation error'

        examples:
          - id: 'to-domain'
            code: |
              class OrderTranslator extends BaseModelTranslator<Order, LegacyOrderDTO> {
                toDomain(external: LegacyOrderDTO): Result<Order, TranslationError> {
                  try {
                    const order = Order.create({
                      id: EntityId.fromText(external.ORDER_ID),
                      customerId: external.CUST_NUM,
                      items: this.translateItems(external.LINE_ITEMS),
                      total: Money.fromCents(external.TOTAL_CENTS)
                    });
                    return Result.success(order);
                  } catch (error) {
                    return Result.failure(new TranslationError(
                      'Failed to translate legacy order',
                      'LegacyOrderDTO',
                      'Order'
                    ));
                  }
                }
              }

      toExternal:
        description: 'Translates domain model to external format'
        business-context: 'Prepares domain data for external system consumption'
        abstract: true

        parameters:
          - name: 'domain'
            type: 'TDomainModel'
            description: 'Clean domain model'

        returns:
          type: 'Result<TExternalModel, TranslationError>'
          description: 'External representation or error'

        examples:
          - id: 'to-external'
            code: |
              class OrderTranslator extends BaseModelTranslator<Order, LegacyOrderDTO> {
                toExternal(domain: Order): Result<LegacyOrderDTO, TranslationError> {
                  return Result.success({
                    ORDER_ID: domain.getId().value(),
                    CUST_NUM: domain.getCustomerId(),
                    LINE_ITEMS: domain.getItems().map(item => ({
                      PROD_CODE: item.productCode,
                      QTY: item.quantity,
                      PRICE: item.price.toCents()
                    })),
                    TOTAL_CENTS: domain.getTotal().toCents(),
                    STATUS_CODE: this.mapStatus(domain.getStatus())
                  });
                }
              }

      canTranslate:
        description: 'Validates if model can be translated'
        business-context: 'Pre-validates translation feasibility to fail fast'

        parameters:
          - name: 'model'
            type: 'any'
            description: 'Model to validate'
          - name: 'direction'
            type: "'toDomain' | 'toExternal'"
            description: 'Translation direction'

        returns:
          type: 'boolean'
          description: 'True if translation is possible'

        examples:
          - id: 'validation'
            code: |
              const translator = new OrderTranslator();
              
              // Check before translation
              if (translator.canTranslate(legacyData, 'toDomain')) {
                const result = translator.toDomain(legacyData);
              }

# === PATTERNS ===
patterns:
  - name: 'Field Mapping Strategy'
    description: 'Common patterns for field translation'
    example: |
      protected mapField<T, R>(
        source: T,
        fieldName: string,
        transformer: (value: any) => R
      ): R | undefined {
        const value = source[fieldName];
        if (value === null || value === undefined) {
          return undefined;
        }
        try {
          return transformer(value);
        } catch {
          throw new TranslationError(
            `Failed to map field: ${fieldName}`,
            source.constructor.name,
            'target'
          );
        }
      }

  - name: 'Nested Translation'
    description: 'Handling nested object translation'
    example: |
      protected translateNested<S, T>(
        items: S[],
        itemTranslator: (item: S) => T
      ): T[] {
        return items.map(item => {
          try {
            return itemTranslator(item);
          } catch (error) {
            throw new TranslationError(
              'Nested translation failed',
              'Source',
              'Target',
              [item.toString()]
            );
          }
        });
      }

  - name: 'Validation Pipeline'
    description: 'Multi-step validation before translation'
    example: |
      protected validateBeforeTranslation(
        model: any,
        rules: ValidationRule[]
      ): void {
        for (const rule of rules) {
          if (!rule.validate(model)) {
            throw new TranslationError(
              rule.errorMessage,
              model.constructor.name,
              'target'
            );
          }
        }
      }