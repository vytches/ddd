# ACL Interfaces - Core Contracts for Anti-Corruption Layer

# === FILE METADATA ===
file-name: 'acl.interfaces'
title: 'ACL Interface Definitions'
description: 'Core interfaces defining contracts for ACL components'
business-context: |
  Establishes the contractual boundaries for Anti-Corruption Layer components,
  ensuring consistent implementation across adapters, translators, and external
  API integrations while maintaining domain model isolation.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IACLAdapter:
    description: 'Core ACL adapter interface for external system integration'
    business-context: |
      Central contract defining the essential operations every ACL adapter must
      support, ensuring consistent behavior across different external system
      integrations while protecting domain boundaries and maintaining clean architecture.

    formats:
      jsdoc:
        description: 'Core ACL adapter interface for external system integration'
      cli:
        description: |
          ## IACLAdapter<TDomain, TExternal, TResult>
          Central contract for ACL adapters providing:
          - Execute operations on external systems
          - Fetch data with identifier-based retrieval
          - Operation support validation
          - Context information access

    custom-tags:
      since: '1.0.0'
      pattern: 'Adapter Pattern'
      category: 'Integration'

    methods:
      execute:
        description: 'Executes operation on external system with domain model'
        business-context: 'Core execution method that processes domain models through external systems while maintaining proper error handling and result wrapping'
        
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Name of the operation to execute (create, update, delete, etc.)'
          - name: 'domainModel'
            type: 'TDomainModel'
            description: 'Domain model to process through external system'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Optional execution configuration (timeout, retries, metadata)'
            optional: true
        
        returns:
          type: 'Promise<Result<TResult, ACLError>>'
          description: 'Result wrapping success value or ACL error'
        
        examples:
          - id: 'basic-execution'
            code: |
              const result = await adapter.execute('create', domainUser, {
                timeout: 5000,
                correlationId: 'req-123'
              });
              
              if (result.isSuccess()) {
                console.log('Created:', result.value);
              } else {
                console.error('Failed:', result.error.message);
              }

      fetch:
        description: 'Fetches domain model by identifier from external system'
        business-context: 'Retrieval method for getting domain models from external systems using external identifiers with proper translation and error handling'
        
        parameters:
          - name: 'identifier'
            type: 'string'
            description: 'External system identifier for the resource'
        
        returns:
          type: 'Promise<Result<TDomainModel, ACLError>>'
          description: 'Result containing domain model or ACL error'
        
        examples:
          - id: 'fetch-by-id'
            code: |
              const result = await adapter.fetch('external-user-123');
              
              if (result.isSuccess()) {
                const domainUser = result.value;
                console.log('Fetched user:', domainUser.name);
              }

      supportsOperation:
        description: 'Checks if adapter supports specific operation'
        business-context: 'Validation method to determine operation compatibility before execution to prevent runtime errors'
        
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation name to check for support'
        
        returns:
          type: 'boolean'
          description: 'True if operation is supported by this adapter'
        
        examples:
          - id: 'operation-check'
            code: |
              if (adapter.supportsOperation('bulkUpdate')) {
                await adapter.execute('bulkUpdate', users);
              } else {
                console.log('Bulk update not supported');
              }

      getContextInfo:
        description: 'Returns adapter context and configuration information'
        business-context: 'Provides metadata about adapter capabilities, supported operations, and external system details for monitoring and debugging'
        
        returns:
          type: 'ACLContextInfo'
          description: 'Context information including supported operations and metadata'
        
        examples:
          - id: 'context-info'
            code: |
              const info = adapter.getContextInfo();
              console.log(`Adapter: ${info.contextName}`);
              console.log(`Operations: ${info.supportedOperations.join(', ')}`);

  ACLMiddleware:
    description: 'Middleware interface for ACL operation pipeline processing'
    business-context: |
      Enables cross-cutting concerns in ACL operations through middleware pipeline,
      supporting logging, caching, retry logic, security, and other enterprise
      requirements with chainable execution patterns.

    formats:
      jsdoc:
        description: 'Middleware interface for ACL operation pipeline processing'
      cli:
        description: |
          ## ACLMiddleware
          Pipeline middleware providing:
          - Cross-cutting concerns (logging, caching, retry)
          - Chainable execution pattern
          - Request/response transformation
          - Error handling and recovery

    custom-tags:
      since: '1.0.0'
      pattern: 'Middleware Pattern'
      category: 'Pipeline'

    methods:
      execute:
        description: 'Executes middleware logic in the ACL operation pipeline'
        business-context: 'Core middleware execution method that processes ACL operations with cross-cutting concerns and delegates to next middleware in chain'
        
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Name of the ACL operation being executed'
          - name: 'domainModel'
            type: 'any'
            description: 'Domain model being processed through the pipeline'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Execution options and configuration'
          - name: 'next'
            type: '() => Promise<Result<T, ACLError>>'
            description: 'Function to call next middleware in the chain'
        
        returns:
          type: 'Promise<Result<T, ACLError>>'
          description: 'Result from middleware processing or next in chain'
        
        examples:
          - id: 'logging-middleware'
            code: |
              class LoggingMiddleware implements ACLMiddleware {
                async execute<T>(operation: string, domainModel: any, 
                               options: ExecuteOptions, next: () => Promise<Result<T, ACLError>>) {
                  console.log(`Executing ${operation}`);
                  const result = await next();
                  console.log(`Result: ${result.isSuccess() ? 'Success' : 'Error'}`);
                  return result;
                }
              }

  IEnhancedACLAdapter:
    description: 'Enhanced ACL adapter with advanced enterprise features'
    business-context: |
      Extends basic ACL functionality with middleware pipeline, typed operations,
      caching, bulk operations, health checks, and metrics for enterprise-grade
      integrations requiring advanced capabilities and observability.

    formats:
      jsdoc:
        description: 'Enhanced ACL adapter with advanced enterprise features'
      cli:
        description: |
          ## IEnhancedACLAdapter<TDomain, TExternal, TResult>
          Enterprise ACL adapter extending basic functionality with:
          - Middleware pipeline support
          - Typed operation execution
          - Advanced error handling
          - Performance monitoring

    custom-tags:
      since: '1.0.0'
      extends: 'IACLAdapter'
      pattern: 'Enhanced Adapter Pattern'
      category: 'Enterprise Integration'

    methods:
      use:
        description: 'Adds middleware to the adapter execution pipeline'
        business-context: 'Enables composition of cross-cutting concerns like logging, caching, retry logic through middleware pattern'
        
        parameters:
          - name: 'middleware'
            type: 'ACLMiddleware'
            description: 'Middleware instance to add to the pipeline'
        
        returns:
          type: 'this'
          description: 'Adapter instance for method chaining'
        
        examples:
          - id: 'middleware-chaining'
            code: |
              const adapter = new EnhancedACLAdapter(config)
                .use(new LoggingMiddleware())
                .use(new RetryMiddleware({ maxAttempts: 3 }))
                .use(new CachingMiddleware({ ttl: 60000 }));

      executeTyped:
        description: 'Executes typed operation with compile-time type safety'
        business-context: 'Type-safe operation execution providing better developer experience and runtime validation through typed operation contracts'
        
        parameters:
          - name: 'operation'
            type: 'TypedOperation<TInput, TOutput>'
            description: 'Typed operation definition with input/output contracts'
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to process'
          - name: 'options'
            type: 'ExecuteOptions'
            description: 'Optional execution configuration'
            optional: true
        
        returns:
          type: 'Promise<Result<TOutput, ACLError>>'
          description: 'Typed result matching operation output contract'
        
        examples:
          - id: 'typed-execution'
            code: |
              const createUserOp = new CreateUserOperation();
              const result = await adapter.executeTyped(createUserOp, domainUser, {
                timeout: 10000
              });
              
              // result.value is typed as User (TOutput)
              if (result.isSuccess()) {
                const createdUser: User = result.value;
              }

  IModelTranslator:
    description: 'Bidirectional model translator for domain/external conversion'
    business-context: |
      Defines how domain models are translated to/from external representations,
      ensuring clean separation between internal domain concepts and external
      system data structures while maintaining data integrity and validation.

    formats:
      jsdoc:
        description: 'Bidirectional model translator for domain/external conversion'
      cli:
        description: |
          ## IModelTranslator<TDomain, TExternal>
          Bidirectional translation providing:
          - Domain to external model conversion
          - External to domain model conversion
          - Optional validation for both directions
          - Clean boundary separation

    custom-tags:
      since: '1.0.0'
      pattern: 'Translator Pattern'
      category: 'Model Translation'

    methods:
      toExternal:
        description: 'Converts domain model to external system representation'
        business-context: 'Outbound translation ensuring domain concepts are properly mapped to external system data structures'
        
        parameters:
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to convert to external format'
        
        returns:
          type: 'TExternal'
          description: 'External system representation of the domain model'
        
        examples:
          - id: 'domain-to-external'
            code: |
              const externalUser = translator.toExternal(domainUser);
              // Maps domainUser.fullName to externalUser.full_name
              // Maps domainUser.email to externalUser.email_address

      fromExternal:
        description: 'Converts external model to domain representation'
        business-context: 'Inbound translation ensuring external system data is properly mapped to domain concepts'
        
        parameters:
          - name: 'externalModel'
            type: 'TExternal'
            description: 'External model to convert to domain format'
        
        returns:
          type: 'TDomain'
          description: 'Domain representation of the external model'
        
        examples:
          - id: 'external-to-domain'
            code: |
              const domainUser = translator.fromExternal(externalUserData);
              // Maps externalUserData.full_name to domainUser.fullName
              // Maps externalUserData.email_address to domainUser.email

      validateDomain:
        description: 'Validates domain model before translation'
        business-context: 'Optional validation ensuring domain model integrity before external system interaction'
        optional: true
        
        parameters:
          - name: 'domainModel'
            type: 'TDomain'
            description: 'Domain model to validate'
        
        returns:
          type: 'Result<void, Error>'
          description: 'Validation result indicating success or specific errors'
        
        examples:
          - id: 'domain-validation'
            code: |
              const validation = translator.validateDomain?.(domainUser);
              if (validation?.isFailure()) {
                throw new TranslationError('Invalid domain model', validation.error);
              }

      validateExternal:
        description: 'Validates external model after retrieval'
        business-context: 'Optional validation ensuring external model compatibility before domain translation'
        optional: true
        
        parameters:
          - name: 'externalModel'
            type: 'TExternal'
            description: 'External model to validate'
        
        returns:
          type: 'Result<void, Error>'
          description: 'Validation result indicating success or specific errors'
        
        examples:
          - id: 'external-validation'
            code: |
              const validation = translator.validateExternal?.(externalData);
              if (validation?.isFailure()) {
                throw new TranslationError('Invalid external model', validation.error);
              }

  IExternalAPI:
    description: 'External system API abstraction interface'
    business-context: |
      Abstracts external system communication details, providing a clean
      interface for ACL adapters to interact with third-party services,
      legacy systems, or external APIs while hiding implementation complexity.

    formats:
      jsdoc:
        description: 'External system API abstraction interface'
      cli:
        description: |
          ## IExternalAPI<TExternalModel, TResult>
          External system abstraction providing:
          - Operation execution on external systems
          - Data retrieval by identifier
          - Health check monitoring
          - Clean API boundaries

    custom-tags:
      since: '1.0.0'
      pattern: 'External API Pattern'
      category: 'External Integration'

    methods:
      execute:
        description: 'Executes operation on external system'
        business-context: 'Core method for performing operations on external systems with proper error handling and result management'
        
        parameters:
          - name: 'operation'
            type: 'string'
            description: 'Operation to execute on external system'
          - name: 'model'
            type: 'TExternalModel'
            description: 'External model data for the operation'
        
        returns:
          type: 'Promise<TResult>'
          description: 'Result from external system operation'
        
        examples:
          - id: 'api-execution'
            code: |
              const result = await externalAPI.execute('createUser', {
                full_name: 'John Doe',
                email_address: 'john@example.com'
              });

      fetch:
        description: 'Fetches data from external system by identifier'
        business-context: 'Retrieval method for getting external system data using system-specific identifiers'
        
        parameters:
          - name: 'identifier'
            type: 'string'
            description: 'External system identifier for the resource'
        
        returns:
          type: 'Promise<TExternalModel>'
          description: 'External model data from the system'
        
        examples:
          - id: 'api-fetch'
            code: |
              const userData = await externalAPI.fetch('ext-user-123');
              console.log('Retrieved:', userData.full_name);

      healthCheck:
        description: 'Performs health check on external system'
        business-context: 'Monitoring method to verify external system availability and connectivity for operational awareness'
        
        returns:
          type: 'Promise<boolean>'
          description: 'True if external system is healthy and reachable'
        
        examples:
          - id: 'health-check'
            code: |
              const isHealthy = await externalAPI.healthCheck();
              if (!isHealthy) {
                console.warn('External system unavailable');
              }

# === TYPES ===
types:
  ACLContextInfo:
    description: 'Context metadata for ACL operations'
    business-context: 'Provides bounded context and system identification'

    properties:
      - name: 'contextName'
        type: 'string'
        description: 'Bounded context name'
      - name: 'externalSystem'
        type: 'string'
        description: 'External system identifier'
      - name: 'version'
        type: 'string'
        description: 'API version'
        optional: true
      - name: 'metadata'
        type: 'Record<string, any>'
        description: 'Additional context metadata'
        optional: true

  ExecuteOptions:
    description: 'Configuration for operation execution'
    business-context: 'Controls execution behavior including timeouts and retries'

    properties:
      - name: 'timeout'
        type: 'number'
        description: 'Operation timeout in milliseconds'
        optional: true
      - name: 'retry'
        type: 'boolean | RetryConfig'
        description: 'Retry configuration'
        optional: true
      - name: 'cache'
        type: 'boolean | CacheConfig'
        description: 'Caching configuration'
        optional: true
      - name: 'correlationId'
        type: 'string'
        description: 'Request correlation ID'
        optional: true
