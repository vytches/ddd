# ACLDiscoveryPlugin - DI Integration for ACL

# === FILE METADATA ===
file-name: 'di-integration/acl-discovery-plugin'
title: 'ACLDiscoveryPlugin - Dependency Injection Integration'
description: 'DI plugin for automatic ACL adapter discovery and registration'
business-context: |
  Integrates ACL adapters with the VytchesDDD dependency injection system,
  enabling automatic discovery, registration, and lifecycle management of
  ACL adapters across the application.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ACLDiscoveryPlugin:
    class-doc:
      description: 'DI plugin for ACL adapter auto-discovery'
      business-context: |
        Automatically discovers and registers ACL adapters with the DI
        container, enabling seamless integration between domain services
        and external system adapters without manual wiring.

      formats:
        jsdoc:
          description: 'DI discovery plugin for ACL adapters'
        cli:
          description: |
            ## ACLDiscoveryPlugin
            DI integration providing:
            - Automatic adapter discovery
            - Container registration
            - Lifecycle management
            - Dependency resolution

      custom-tags:
        since: '1.0.0'
        implements: 'IDiscoveryPlugin'
        pattern: 'Plugin Pattern'

    methods:
      constructor:
        description: 'Initializes ACL discovery plugin'
        business-context: 'Sets up plugin with discovery configuration'

        parameters:
          - name: 'options'
            type: 'ACLDiscoveryOptions'
            description: 'Discovery configuration'
            optional: true

        examples:
          - id: 'plugin-setup'
            code: |
              const aclPlugin = new ACLDiscoveryPlugin({
                scanPaths: ['./adapters', './integrations'],
                autoRegister: true,
                namingConvention: 'kebab-case'
              });

      discover:
        description: 'Discovers ACL adapters in scan paths'
        business-context: 'Locates adapter classes for registration'

        parameters:
          - name: 'scanPaths'
            type: 'string[]'
            description: 'Paths to scan for adapters'

        returns:
          type: 'Promise<DiscoveredAdapter[]>'
          description: 'Array of discovered adapters'

        examples:
          - id: 'discovery-process'
            code: |
              const adapters = await aclPlugin.discover([
                './src/adapters',
                './src/integrations'
              ]);

              console.log(`Found ${adapters.length} ACL adapters`);

      register:
        description: 'Registers discovered adapters with DI container'
        business-context: 'Makes adapters available for dependency injection'

        parameters:
          - name: 'container'
            type: 'IContainer'
            description: 'DI container instance'
          - name: 'adapters'
            type: 'DiscoveredAdapter[]'
            description: 'Adapters to register'

        returns:
          type: 'void'

        examples:
          - id: 'adapter-registration'
            code: |
              // Auto-register with VytchesDDD container
              const container = VytchesDDD.getContainer();
              await aclPlugin.register(container, adapters);

              // Adapters are now available via DI
              const paymentAdapter = container.resolve<PaymentACLAdapter>('payment-adapter');

      getName:
        description: 'Returns plugin name'
        business-context: 'Identifies plugin for logging and debugging'

        returns:
          type: 'string'
          description: 'Plugin identifier'

      getVersion:
        description: 'Returns plugin version'
        business-context: 'Version information for compatibility'

        returns:
          type: 'string'
          description: 'Plugin version'

      canHandle:
        description: 'Checks if plugin can handle a class'
        business-context: 'Determines if class is an ACL adapter'

        parameters:
          - name: 'target'
            type: 'any'
            description: 'Class to check'

        returns:
          type: 'boolean'
          description: 'True if target is ACL adapter'

        examples:
          - id: 'adapter-detection'
            code: |
              // Plugin detects ACL adapters by:
              // 1. Class extends BaseACLAdapter
              // 2. Implements IACLAdapter interface  
              // 3. Has @ACLAdapter decorator

              @ACLAdapter('payment-service')
              class PaymentACLAdapter extends BaseACLAdapter {
                // Automatically discovered and registered
              }

# === DECORATORS ===
decorators:
  ACLAdapter:
    description: 'Decorator for marking ACL adapter classes'
    business-context: 'Enables automatic discovery and registration'

    parameters:
      - name: 'key'
        type: 'string'
        description: 'Unique adapter identifier'
      - name: 'options'
        type: 'ACLAdapterOptions'
        description: 'Adapter configuration'
        optional: true

    examples:
      - id: 'adapter-decorator'
        code: |
          @ACLAdapter('shipping-service', {
            context: 'OrderFulfillment',
            version: '2.1.0',
            timeout: 30000,
            retries: 3
          })
          class ShippingACLAdapter extends BaseACLAdapter<Order, ShipmentRequest> {
            // Implementation
          }

# === TYPES ===
types:
  ACLDiscoveryOptions:
    description: 'Configuration for ACL discovery'

    properties:
      - name: 'scanPaths'
        type: 'string[]'
        description: 'Directories to scan for adapters'
        optional: true
      - name: 'autoRegister'
        type: 'boolean'
        description: 'Automatically register discovered adapters'
        optional: true
      - name: 'namingConvention'
        type: "'camelCase' | 'kebab-case' | 'snake_case'"
        description: 'Service ID naming convention'
        optional: true
      - name: 'includeSubdirectories'
        type: 'boolean'
        description: 'Scan subdirectories recursively'
        optional: true

  DiscoveredAdapter:
    description: 'Information about discovered adapter'

    properties:
      - name: 'className'
        type: 'string'
        description: 'Adapter class name'
      - name: 'serviceId'
        type: 'string'
        description: 'Generated service identifier'
      - name: 'filePath'
        type: 'string'
        description: 'Source file path'
      - name: 'metadata'
        type: 'ACLAdapterMetadata'
        description: 'Adapter metadata'
        optional: true
      - name: 'dependencies'
        type: 'string[]'
        description: 'Required dependencies'
        optional: true

# === USAGE PATTERNS ===
patterns:
  - name: 'Automatic Bootstrap'
    description: 'Automatic ACL setup during application startup'
    example: |
      // In application bootstrap
      import { VytchesDDD } from '@vytches/ddd-di';
      import { ACLDiscoveryPlugin } from '@vytches/ddd-acl';

      const container = VytchesDDD.getContainer();
      const aclPlugin = new ACLDiscoveryPlugin({
        scanPaths: ['./src/adapters'],
        autoRegister: true
      });

      // Register plugin with DI system
      VytchesDDD.addPlugin(aclPlugin);

      // All ACL adapters are now available via DI
      const orderService = container.resolve<OrderService>('orderService');

  - name: 'Context-Aware Discovery'
    description: 'Discovering adapters by bounded context'
    example: |
      @ACLAdapter('inventory-adapter', { context: 'Inventory' })
      class InventoryACLAdapter extends BaseACLAdapter { }

      @ACLAdapter('shipping-adapter', { context: 'Shipping' })  
      class ShippingACLAdapter extends BaseACLAdapter { }

      // Plugin can filter by context
      const inventoryAdapters = await plugin.discoverByContext('Inventory');
