# BaseACLRegistry - Foundation for ACL Registry Implementations

# === FILE METADATA ===
file-name: 'base-acl-registry'
title: 'BaseACLRegistry - Registry Foundation'
description: 'Abstract base class for ACL registry implementations'
business-context: |
  Provides the foundational infrastructure for managing ACL adapters
  with support for metadata, lifecycle management, and discovery patterns
  essential for enterprise integration architectures.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  BaseACLRegistry:
    class-doc:
      description: 'Abstract base for ACL registry implementations'
      business-context: |
        Foundation for building specialized registry implementations that
        manage ACL adapters with specific capabilities like versioning,
        context isolation, or dynamic discovery.

      formats:
        jsdoc:
          description: 'Base registry class for ACL adapter management'
        cli:
          description: |
            ## BaseACLRegistry
            Registry foundation providing:
            - Adapter registration with metadata
            - Lifecycle management hooks
            - Discovery and query capabilities
            - Event-driven notifications

      custom-tags:
        since: '1.0.0'
        pattern: 'Registry Pattern'
        abstract: 'true'

    methods:
      register:
        description: 'Registers an ACL adapter with optional metadata'
        business-context: 'Central registration point for ACL adapters with metadata tracking'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name to register adapter under'
          - name: 'adapter'
            type: 'IACLAdapter<TDomain, TExternal>'
            description: 'ACL adapter instance'
          - name: 'metadata'
            type: 'Partial<ACLRegistrationMetadata>'
            description: 'Optional registration metadata'
            optional: true

        returns:
          type: 'this'
          description: 'Registry instance for method chaining'

        generic: 'TDomain, TExternal'

        examples:
          - id: 'basic-registration'
            code: |
              const registry = new ACLRegistry();
              registry.register('PaymentContext', paymentAdapter, {
                description: 'Payment processing adapter',
                version: '1.0.0'
              });

      get:
        description: 'Retrieves registered adapter by context name'
        business-context: 'Safe adapter retrieval with type casting'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name to retrieve adapter for'

        returns:
          type: 'IACLAdapter<TDomain, TExternal> | undefined'
          description: 'Adapter instance or undefined if not found'

        generic: 'TDomain, TExternal'

        examples:
          - id: 'safe-retrieval'
            code: |
              const adapter = registry.get<Order, ExternalOrder>('OrderContext');
              if (adapter) {
                const result = await adapter.execute('create', order);
              }

      getRequired:
        description: 'Retrieves registered adapter, throwing if not found'
        business-context: 'Fail-fast adapter retrieval for required dependencies'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name to retrieve adapter for'

        returns:
          type: 'IACLAdapter<TDomain, TExternal>'
          description: 'Adapter instance'

        throws:
          - type: 'Error'
            description: 'When adapter not found for context'

        generic: 'TDomain, TExternal'

        examples:
          - id: 'required-retrieval'
            code: |
              // Throws error if adapter not registered
              const adapter = registry.getRequired<User, ExternalUser>('UserContext');
              const result = await adapter.execute('update', user);

      hasContext:
        description: 'Checks if adapter is registered for given context'
        business-context: 'Context availability checking before adapter usage'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name to check'

        returns:
          type: 'boolean'
          description: 'True if adapter is registered'

        examples:
          - id: 'context-check'
            code: |
              if (registry.hasContext('PaymentContext')) {
                const adapter = registry.getRequired('PaymentContext');
                // Use adapter safely
              }

      getRegisteredContexts:
        description: 'Returns list of all registered context names'
        business-context: 'Registry introspection for debugging and monitoring'

        returns:
          type: 'string[]'
          description: 'Array of registered context names'

        examples:
          - id: 'list-contexts'
            code: |
              const contexts = registry.getRegisteredContexts();
              console.log('Registered contexts:', contexts);
              // Output: ['PaymentContext', 'OrderContext', 'UserContext']

      getRegistryName:
        description: 'Returns the name of this registry implementation'
        business-context: 'Registry identification for metadata and logging'
        visibility: 'protected'
        abstract: true

        returns:
          type: 'string'
          description: 'Registry implementation name'

      exportAdapters:
        description: 'Exports all registered adapters as Map'
        business-context: 'Bulk operations and registry migration support'

        returns:
          type: 'Map<string, IACLAdapter<unknown, unknown>>'
          description: 'Copy of all registered adapters'

        examples:
          - id: 'export-adapters'
            code: |
              const adapters = registry.exportAdapters();
              for (const [context, adapter] of adapters) {
                console.log(`Context: ${context}, Operations: ${adapter.getContextInfo().supportedOperations}`);
              }

# === INTERFACES ===
interfaces:
  ACLRegistrationMetadata:
    description: 'Metadata for ACL adapter registration'
    business-context: 'Essential metadata for tracking adapter registration and management'

    properties:
      - name: 'contextName'
        type: 'string'
        description: 'Context name the adapter is registered under'
      - name: 'registeredAt'
        type: 'Date'
        description: 'Timestamp when adapter was registered'
      - name: 'registeredBy'
        type: 'string'
        description: 'Name of the registry that registered this adapter'
      - name: 'description'
        type: 'string'
        description: 'Optional human-readable description'
        optional: true
      - name: 'version'
        type: 'string'
        description: 'Optional version identifier'
        optional: true
      - name: 'source'
        type: "'direct' | 'module' | 'import' | 'versioned' | 'enhanced'"
        description: 'Source type indicating how adapter was registered'
        optional: true
