# ContextACLRegistry - Context-Aware ACL Registry

# === FILE METADATA ===
file-name: 'context-acl-registry'
title: 'ContextACLRegistry - Bounded Context Registry'
description: 'Registry supporting context-based adapter isolation'
business-context: |
  Implements bounded context isolation for ACL adapters, ensuring that
  adapters are scoped to specific domain boundaries and preventing
  cross-context contamination in large enterprise systems.

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === CLASSES ===
classes:
  ContextACLRegistry:
    class-doc:
      description: 'ACL registry with bounded context isolation'
      business-context: |
        Provides context-aware adapter management, enabling different
        bounded contexts to maintain isolated adapter configurations
        while supporting cross-context communication when needed.

      formats:
        jsdoc:
          description: 'Context-isolated ACL adapter registry'
        cli:
          description: |
            ## ContextACLRegistry
            Context-aware registry providing:
            - Bounded context isolation
            - Context-scoped adapter resolution
            - Cross-context communication
            - Context hierarchy support

      custom-tags:
        since: '1.0.0'
        extends: 'BaseACLRegistry'
        pattern: 'Bounded Context'

    methods:
      registerForContext:
        description: 'Registers adapter for specific context'
        business-context: 'Isolates adapter to bounded context'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Bounded context name'
          - name: 'key'
            type: 'string'
            description: 'Adapter key within context'
          - name: 'adapter'
            type: 'IACLAdapter'
            description: 'Adapter instance'

        returns:
          type: 'void'

        examples:
          - id: 'context-registration'
            code: |
              const registry = new ContextACLRegistry();

              // Register adapters for different contexts
              registry.registerForContext(
                'OrderManagement',
                'inventory',
                inventoryAdapter
              );

              registry.registerForContext(
                'Shipping',
                'inventory',
                shippingInventoryAdapter
              );

      resolveInContext:
        description: 'Resolves adapter within context'
        business-context: 'Finds adapter scoped to specific context'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context to search in'
          - name: 'key'
            type: 'string'
            description: 'Adapter key'

        returns:
          type: 'IACLAdapter | undefined'
          description: 'Context-scoped adapter'

        examples:
          - id: 'context-resolution'
            code: |
              // Different adapters for same key in different contexts
              const orderInventory = registry.resolveInContext(
                'OrderManagement',
                'inventory'
              );

              const shippingInventory = registry.resolveInContext(
                'Shipping',
                'inventory'
              );

      getContextAdapters:
        description: 'Returns all adapters for a context'
        business-context: 'Discovers all adapters within boundary'

        parameters:
          - name: 'contextName'
            type: 'string'
            description: 'Context name'

        returns:
          type: 'Map<string, IACLAdapter>'
          description: 'Context adapters map'

      getAllContexts:
        description: 'Returns all registered contexts'
        business-context: 'Provides context discovery'

        returns:
          type: 'string[]'
          description: 'Array of context names'

      enableCrossContext:
        description: 'Allows cross-context adapter access'
        business-context: 'Enables controlled context communication'

        parameters:
          - name: 'sourceContext'
            type: 'string'
            description: 'Source context'
          - name: 'targetContext'
            type: 'string'
            description: 'Target context'
          - name: 'adapterKey'
            type: 'string'
            description: 'Adapter to share'
            optional: true

        returns:
          type: 'void'

        examples:
          - id: 'cross-context'
            code: |
              // Allow OrderManagement to use Shipping's tracking adapter
              registry.enableCrossContext(
                'OrderManagement',
                'Shipping',
                'tracking'
              );

              // Now OrderManagement can resolve Shipping's adapter
              const tracking = registry.resolveWithFallback(
                'OrderManagement',
                'tracking',
                ['Shipping'] // Fallback contexts
              );
