# ProcessManager Interfaces - Universal Enhanced Metadata System V2

# === FILE METADATA ===
file-name: 'process-manager.interface'
title: 'Process Manager Core Interfaces'
description: 'Core interfaces defining process manager contracts and event handling'
business-context: 'Foundation interfaces for implementing business workflow coordination and state management'

# === HIERARCHY ===
hierarchy:
  strategy: 'merge'
  scope: 'file'

# === INTERFACES ===
interfaces:
  IProcessManager:
    description: 'Core interface for all process managers in the VytchesDDD system'
    business-context: 'Defines the contract for process managers that orchestrate complex business workflows by coordinating between multiple aggregates and bounded contexts'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier for this process manager instance'
        readonly: true

      - name: 'type'
        type: 'string'
        description: 'Type identifier for this process manager class'
        readonly: true

      - name: 'state'
        type: 'TState'
        description: 'Current state of the process manager'
        readonly: true

      - name: 'status'
        type: 'ProcessManagerStatus'
        description: 'Current status of the process manager'
        readonly: true

      - name: 'createdAt'
        type: 'Date'
        description: 'Timestamp when this process manager was created'
        readonly: true

      - name: 'updatedAt'
        type: 'Date'
        description: 'Timestamp when this process manager was last updated'
        readonly: true

      - name: 'timeout'
        type: 'number | undefined'
        description: 'Optional timeout for the entire process'
        readonly: true

    methods:
      canHandle:
        description: 'Determines if this process manager can handle the given event'
        business-context: 'Enables event routing and filtering to ensure events are processed by the correct process manager instance'

        parameters:
          - name: 'event'
            type: 'IProcessManagerEvent'
            description: 'The domain event to check'

        returns:
          type: 'boolean'
          description: 'True if this process manager can handle the event'

      handle:
        description: 'Handles an incoming domain event and potentially updates state'
        business-context: 'Core orchestration method that processes business events and coordinates the next steps in the workflow'

        parameters:
          - name: 'event'
            type: 'IProcessManagerEvent'
            description: 'The domain event to handle'
          - name: 'context'
            type: 'IProcessManagerContext'
            description: 'The processing context'

        returns:
          type: 'Promise<ProcessManagerResult>'
          description: 'Promise resolving to commands/events to emit'

      isComplete:
        description: 'Checks if the process is complete and can be finalized'
        business-context: 'Defines completion criteria for the business workflow, enabling automatic cleanup and archival'

        returns:
          type: 'boolean'
          description: 'True if the process is complete'

      isTimedOut:
        description: 'Checks if the process has timed out'
        business-context: 'Enables automatic timeout detection for SLA monitoring and process escalation'

        returns:
          type: 'boolean'
          description: 'True if the process has exceeded its timeout'

      getCorrelationData:
        description: 'Gets correlation data used to route events to this process manager'
        business-context: 'Provides routing information to ensure related events are directed to the correct process manager instance'

        returns:
          type: 'Record<string, unknown>'
          description: 'Correlation data object'

      updateState:
        description: 'Updates the internal state of the process manager'
        business-context: 'Maintains process state with automatic versioning and timestamp tracking for audit trails'

        parameters:
          - name: 'newState'
            type: 'Partial<TState>'
            description: 'The new state to apply'

        returns:
          type: 'void'
          description: 'No return value'

      complete:
        description: 'Marks the process as complete'
        business-context: 'Finalizes the business process workflow and enables cleanup and archival'

        returns:
          type: 'void'
          description: 'No return value'

      fail:
        description: 'Marks the process as failed with an error'
        business-context: 'Handles business process failures with error tracking and enables compensating actions'

        parameters:
          - name: 'error'
            type: 'Error'
            description: 'The error that caused the failure'

        returns:
          type: 'void'
          description: 'No return value'

  IProcessManagerEvent:
    description: 'Extended domain event interface with additional properties needed for process management'
    business-context: 'Enriched event interface providing all necessary information for process manager event routing and handling'

    properties:
      - name: 'id'
        type: 'string'
        description: 'Unique identifier for the event'

      - name: 'eventName'
        type: 'string'
        description: 'Display name for the event'

      - name: 'aggregateId'
        type: 'string'
        description: 'ID of the aggregate that generated the event'

      - name: 'aggregateType'
        type: 'string'
        description: 'Type of the aggregate that generated the event'

      - name: 'aggregateVersion'
        type: 'number'
        description: 'Version of the aggregate after applying the event'

      - name: 'timestamp'
        type: 'Date'
        description: 'When the event occurred'

      - name: 'correlationId'
        type: 'string'
        description: 'Correlation ID for related events'
        optional: true

      - name: 'causationId'
        type: 'string'
        description: 'ID of the event that caused this event'
        optional: true

      - name: 'metadata'
        type: 'IEventMetadata'
        description: 'Additional event metadata'

  ProcessManagerResult:
    description: 'Result of processing an event in a process manager'
    business-context: 'Standardized result structure for process manager event handling with commands, events, and continuation status'

    properties:
      - name: 'success'
        type: 'boolean'
        description: 'Whether the processing was successful'

      - name: 'commands'
        type: 'Array<{ type: string; payload: unknown; targetBoundedContext?: string }>'
        description: 'Commands to emit as a result of processing'
        optional: true

      - name: 'events'
        type: 'Array<{ eventType: string; payload: unknown; targetBoundedContext?: string }>'
        description: 'Events to emit as a result of processing'
        optional: true

      - name: 'shouldContinue'
        type: 'boolean'
        description: 'Whether the process manager should continue processing'
        optional: true

      - name: 'error'
        type: '{ message: string; code?: string; details?: unknown }'
        description: 'Error information if processing failed'
        optional: true

# === ENUMS ===
enums:
  ProcessManagerStatus:
    description: 'Status enumeration for process managers'
    business-context: 'Defines the lifecycle states of a process manager for monitoring and operational control'

    values:
      - name: 'CREATED'
        value: "'CREATED'"
        description: 'Process manager has been created but not yet started'

      - name: 'RUNNING'
        value: "'RUNNING'"
        description: 'Process manager is actively processing events'

      - name: 'WAITING'
        value: "'WAITING'"
        description: 'Process manager is waiting for external events or human intervention'

      - name: 'COMPLETED'
        value: "'COMPLETED'"
        description: 'Process manager has completed successfully'

      - name: 'FAILED'
        value: "'FAILED'"
        description: 'Process manager has failed due to an error'

      - name: 'TIMED_OUT'
        value: "'TIMED_OUT'"
        description: 'Process manager has exceeded its configured timeout'
