# Process Managers Package Settings - Inherits from global-settings.yaml
package-name: 'process-managers'
display-name: 'DDD Process Managers'
description: 'Long-running business workflow coordination and state management'

hierarchy:
  strategy: 'merge'
  scope: 'package'

domain: 'workflow-coordination'
complexity: 'advanced'
patterns:
  - 'process-manager-pattern'
  - 'state-machine-pattern'
  - 'workflow-orchestration'
  - 'event-driven-coordination'

business-context: |
  Process Managers coordinate long-running business workflows that span multiple 
  aggregates and bounded contexts. Unlike Sagas which focus on transaction 
  compensation, Process Managers maintain state and orchestrate complex business 
  processes over extended time periods.

tags:
  - 'enterprise'
  - 'coordination'
  - 'workflow'
  - 'state-management'
  - 'long-running-processes'

dependencies:
  - '@vytches/ddd-contracts'
  - '@vytches/ddd-domain-primitives'
  - '@vytches/ddd-events'
  - '@vytches/ddd-aggregates'
  - '@vytches/ddd-logging'
  - '@vytches/ddd-utils'
