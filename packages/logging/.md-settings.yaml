# Package Settings - Inherits from global-settings.yaml

# === PACKAGE IDENTITY ===
package-name: 'logging'
display-name: 'DDD Structured Logging'
description: 'DDD-first structured logging with enterprise features'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'infrastructure-logging'
complexity: 'intermediate'
patterns:
  - 'structured-logging'
  - 'context-propagation'
  - 'enterprise-logging'

# === ENTERPRISE FEATURES ===
features:
  - 'Smart context detection'
  - 'Automatic DDD bounded context detection'
  - 'Data masking for PII and sensitive data'
  - 'Zero configuration with sensible defaults'
  - 'CQRS integration decorators'
  - 'Result pattern integration'
  - 'Multi-tenancy and correlation tracking'
  - 'Performance monitoring'

# === BUSINESS VALUE ===
business-context: 'Enterprise-grade structured logging designed specifically for Domain-Driven Design applications, providing automatic bounded context detection, correlation tracking, and comprehensive integration with DDD patterns'
