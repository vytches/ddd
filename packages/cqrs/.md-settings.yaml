# Package Settings for CQRS - Inherits from global-settings.yaml

# === PACKAGE IDENTITY ===
package-name: 'cqrs'
display-name: 'DDD CQRS'
description: 'Command Query Responsibility Segregation implementation'
business-context: 'Enterprise command and query handling with middleware support'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'architecture-patterns'
complexity: 'intermediate'
patterns:
  - 'cqrs-pattern'
  - 'command-pattern'
  - 'query-pattern'
  - 'mediator-pattern'
  - 'pipeline-pattern'
  - 'dependency-injection'

# === TECHNICAL CONTEXT ===
integration:
  dependencies:
    - '@vytches/ddd-di'
    - '@vytches/ddd-logging'
    - 'reflect-metadata'
  features:
    - 'command-bus'
    - 'query-bus'
    - 'handler-decorators'
    - 'middleware-pipeline'
    - 'di-integration'
    - 'auto-discovery'

# === BUSINESS VALUE ===
enterprise-features:
  - 'Decoupled command/query handling'
  - 'Automatic handler discovery through DI'
  - 'Middleware pipeline for cross-cutting concerns'
  - 'Type-safe command and query dispatching'
  - 'Enterprise logging and observability'
  - 'Framework-agnostic implementation'
