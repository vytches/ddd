# Package Settings for Aggregates - Enhanced Metadata System V2
# Inherits from global-settings.yaml and adds package-specific metadata

# === PACKAGE IDENTITY ===
package-name: 'aggregates'
display-name: 'DDD Aggregates'
description: 'Core aggregate patterns for domain modeling and event sourcing'
business-context: 'Essential for maintaining business invariants and event-driven architecture'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === JSDOC PLACEMENT CONFIGURATION (Package Level) ===
jsdoc:
  placement-strategy: 'separate' # separate | constructor-only | class-only | smart
  class-documentation: 'enabled' # enabled | disabled | auto
  constructor-documentation: 'enabled' # enabled | disabled | auto
  content-strategy: 'distinct' # distinct | shared | primary-secondary

  # Package-level defaults for class documentation
  class-defaults:
    description: 'DDD aggregate implementation following domain-driven design principles'
    business-context: 'Core building block for domain modeling and business logic encapsulation'
    tags:
      - 'aggregate'
      - 'ddd'
      - 'domain-model'

# === PACKAGE-SPECIFIC METADATA ===
domain: 'domain-modeling'
complexity: 'intermediate'
patterns:
  - 'aggregate-pattern'
  - 'event-sourcing'
  - 'capability-system'
  - 'builder-pattern'

dependencies:
  - '@vytches/ddd-contracts'
  - '@vytches/ddd-domain-primitives'

# === FORMAT-SPECIFIC OVERRIDES ===
formats:
  jsdoc:
    description: 'Core aggregate patterns with event sourcing capabilities'
    business-context: 'DDD aggregate implementation with capabilities'
    tags:
      - 'aggregate'
      - 'event-sourcing'
      - 'capabilities'
  cli:
    description: |
      ## DDD Aggregates Package

      Core aggregate patterns implementing Domain-Driven Design principles with event sourcing capabilities.

      ### Key Components
      - AggregateRoot: Base aggregate with event handling
      - AggregateBuilder: Fluent builder for aggregate construction
      - Capabilities: Extensible capability system (audit, versioning, snapshots)

      ### Enterprise Features
      - Event sourcing with automatic persistence
      - Optimistic concurrency control
      - Audit trail and compliance tracking
      - Performance optimization with snapshots

# === PACKAGE-SPECIFIC CUSTOM TAGS ===
custom-tags:

# === ENVIRONMENT-SPECIFIC PACKAGE SETTINGS ===
environment:
  VYTCHES_LOGGER:
    custom-tags:
      logging: 'Automatic logging of aggregate state changes and events'
      audit: 'Enhanced audit trail with detailed logging'

  VYTCHES_PERF_MONITORING:
    custom-tags:
      metrics: 'Performance metrics collection for aggregate operations'
      timing: 'Execution timing information'

# === EXAMPLES CONFIGURATION ===
examples:
  default-complexity: 'intermediate'
  show-performance-notes: true
  include-error-handling: true
