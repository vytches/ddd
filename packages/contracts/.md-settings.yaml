# Package Settings - Contracts Package
# Foundational contracts and interfaces for the VytchesDDD library
# Inherits from global-settings.yaml

# === PACKAGE IDENTITY ===
package-name: 'contracts'
display-name: 'DDD Contracts & Interfaces'
description: 'Foundation layer providing core interfaces and contracts for the entire DDD library'
business-context: 'Breaks circular dependencies while providing standardized contracts for all DDD components'

# === HIERARCHICAL STRATEGY ===
hierarchy:
  strategy: 'merge'
  scope: 'package'

# === PACKAGE METADATA ===
domain: 'foundation'
complexity: 'beginner'
patterns:
  - 'interface-segregation'
  - 'dependency-inversion'
  - 'contract-pattern'
  - 'foundation-layer'

# === ARCHITECTURAL CONTEXT ===
architectural-role: 'foundation-layer'
dependency-level: 'base'
circular-dependency-breaker: true

# === DOCUMENTATION SETTINGS ===
documentation:
  focus: 'interface-contracts'
  business-emphasis: 'architectural-foundation'
  examples-type: 'contract-usage'

# === JSDOC DEFAULTS ===
jsdoc:
  class-defaults:
    description: 'Foundation contract for VytchesDDD library'
    business-context: 'Core architectural interface'
  method-defaults:
    description: 'Contract method implementation'
    business-context: 'Foundation layer operation'
